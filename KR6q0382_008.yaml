body:
  text: 明憨山德清閲法語聖人知三障為患之大所以設懺摩法而蕩除之三障既蕩本心光圓本心光圓則自利利他無往而不克矣三障者何所謂煩惱障業障報障煩惱障者何本心無欠以日用而不知此點不知即煩惱障也由不知而造不善即業障也既造不善則天地鬼神必厭之矣厭必誅誅則據罪結款死必無赦即報障也如一心不生萬善不昧開物成務功高無纍此又由不知而悟不知初無自性不知成智以智治習習盡神全則無為而不可也假名曰聖夫水之為物也果有常耶果無常耶有常天人則以為琉璃餓鬼則以為猛焰魚龍則以為窟宅人間世則以為波流無常則舍琉璃而猛焰無從舍猛焰而窟宅無從舍窟宅則波流亦無本矣衆人日用之塵勞在聖人則無非解脫也塵勞解脫果一物乎果二物乎一則熱惱之與清涼不同二之則舍熱惱而求清涼譬如離波求水安可得哉今有人於此欲以塵勞作大佛事苟未知余説終不免受塵勞驅役奴而為主主寧不受命宜痛思之夫凡聖無常悟迷似異諦觀當處本絶纖塵然未拔情根愛憎封蔀綿歷長劫徒自疲勞固有衣珠莫知是寶一朝指破富樂無窮八大人覺經辭簡理勝風致幽奧即衆生一念之迷如來大人妙開八覺有緣衆生苟得一覺定超苦海況兼得者哉陸太宰季子基志受性多思徇習不悟殊不知多思則傷脾脾傷土瘠萬物以土為母母病而子豈獨無恙乎於是命其受持此經蓋欲以資覺思化思化無我無我則同同則無物物我既忘孰為能思孰為所思能所寂然一念之迷遂成八覺矣此季高續命丹也敢不寶之示陸繼臯持八大人覺經夫七情之與八覺果一乎哉果二乎哉隨順七情則苦海濤生隨順八覺則涅槃山寂於是大覺老人憫諸流浪即衆生日用之不覺開為八覺蓋欲一切衆生一覺永覺如分一燈之光光光無盡然此光在眼為見在耳為聞在鼻為嗅在舌為嘗在身為覺在意為知故曰分一精明為六和合如一心不生且道八覺在甚麼處英靈黑白直下果知好惡則經所謂八覺者何異畫蛾眉於渾沌者哉原夫鍛昏散之椎輪三世諸佛迭相授受者也第在用之何如耳用之果善消昏散於剎那扶止觀於大寂隕山河於未始有地蕩身心於無得之鄉斷欲結之利刀資靈軀之正命效見當人之勇心遊象帝之先本有神珠光明在掌初非他寶價直誰酬即凡身而證佛身依俗諦而造真諦功高空施福德難量誠以行人一息昏散清即一息佛一念昏散清即一念佛耳嗚呼茫茫苦海之中凡有血氣之屬莫不抱靈而頭出頭沒不可勝計設有一人能於椎輪之下清一息一念昏散成一息一念佛者若以佛眼觀之則其功德信不可思議況夫多時日者乎蓋人貴自反果能反照自己分上昏散自生至死剎那有停息乎故曰若人靜坐一須臾勝造河沙七寶塔寶塔畢竟化為塵一念靜心成正覺如或用之不善亦不荒失人天福田是以黑白賢豪能言者宜遊揚贊嘆有力者宜護持周給凡道場所在等心助揚之煆昏散道場壽夭無相相惟其心心生則吉凶可管不生則凡聖坐斷是以鑄夭為壽如土作塊成與不成顧我所作如何耳故以增上心持呪靡不成就平平心持呪但可敵夭眇劣心持呪終未得效但植來因也授元新持呪法立則不法者不立矣然不以智火鑄其情則法情並立矣大槩聖人立意不過化其情而不化其法也蓋法屬依他情屬遍計如能即遍計而入依他即依他而入圓成即圓成而入破沙盆即破沙盆而入塗毒鼓由塗毒鼓而入深慈三昧海則凡聖之罏錘在乾屎橛而不在法立也故曰煩他萬象説法我且博間耳法立薦此始不負石頭路滑之記示法立相本無常隨熏而就是以過去善惡之業熏心則感現在苦樂之報如印印泥卒難改轉此蓋論衆人也若修行之士則不可定其修短縱前生所造之業應感苦報以其現在力行精進罪不勝功轉苦為樂易短成修往往目見且驗之不少矣及讀南嶽思大禪師曲授心要印證明白皎如日星不復疑之其言曰初學行者未得事從心轉但可閉目假想為之久久純熟即諸法隨念改轉如指屈伸了無難者故大菩薩乃至二乘小聖五通仙人等能得即事改變無而現有有而現無也由是觀之以假觀熏心則法法皆假變易何難哉以空觀熏心法法皆空捲有入無相不可得何夭何壽何罪何福以中觀熏心則有無離即陰陽不能籠神智不能卜度言相可轉亦可不可轉亦可不可不違可可不違不可如夜光神珠宛轉橫斜於金盤之中雖聖似仲尼明如離婁孰能定其所向者乎故曰相逐心生相隨心滅有相無相生滅由心了心之人所以生死之際來如著衫去如脫褲略不作愛憎見也論相僧海洲參師問曰汝出家為甚麼曰為求出苦師曰以何法則求出苦曰我資鈍但念佛師曰汝念佛常間斷否曰合眼睡時便忘了師震威呵曰合眼便忘如此念佛念一萬年也沒幹汝自今而後直須睡夢中念佛不斷方有出苦分若睡夢中不能念佛忘記了一開眼時痛哭起來直向佛前叩頭流血或念千聲或念萬聲盡自家力量便罷如此做了三二十番自然大昏睡中佛即不斷矣且世上念佛底人或三二十年或盡形壽念佛及到臨時却又無用此是生前睡夢中不曾有念頭故也人生如覺人死如夢所以夢中念得佛底人臨死自然不亂也示念佛念佛法門最為簡便但如今念佛之人都無定志所以千百人念佛無有一兩人成就者這一句佛一切菩薩一切天一切人若生西方者莫不因此這一句阿彌陀佛而度苦海然念佛心真不真勘驗關頭直在歡喜煩惱兩處取證其真假之心歷然可辨大抵真心念佛人於歡喜煩惱中必然念念不間斷是以煩惱也動他不得歡喜也動他不得煩惱歡喜既不能動死生境上自然不驚怖今人念佛些小喜怒到前阿彌陀佛便撇在腦後了如何能得念佛靈驗若依我念佛果能於憎愛關頭不昧此句阿彌陀佛而現在日用不得受用臨終不得生西方我舌根必然破爛你若不依我法行則念佛無有靈驗過在汝與我無干示衆念佛夫人之識心久混塵勞莫知返本欲即塵勞契於覺性宜假攝持其方匪一寧有善乎諸如來密因總持陀羅尼者也何以故隨根利鈍逗教淺深非究竟故惟得持此呪不問愚癡智慧咸得成就無上甚深希有以密因不可思議故若開士信心觀照所持呪語一字一句歷歷耳根心耳交攝無所雜亂於睡夢中亦不忘失即持一遍勝百千萬遍能滅八萬四千塵勞能生八萬四千道果所有功德甚為希有不可思量以是呪為熾盛光王如來所説本願功德故開士當持呪時應當九禮熾盛光王如來合掌梵跪日持一百八遍持一氣畢取氣可繫心故是以經云其誦如錐謂當入心主持不少間斷也十二時中除對人語言外初醒可持未睡可持行可持住可持坐可持臥可持食飲可持便溺可持是以持誦不得間斷大要以合口默持令音相了然是為真實持呪當得四大安樂福慧增長有所希求必獲如願若持呪時當以兩手握金剛拳上下齒相匝舌拄上齒齦正中眼常觀鼻依鼻觀心從心觀臍全體精力默與呪會則冥契無功用觀法實心性得入之津梁也願見聞者歡喜受持乃至堅固盡形壽命信心不逆珍重流通是真佛子示持呪間居斗室一言不祥則千里應之好惡積意至公斯蔽矣藝藝萬物雖貴賤有序巨細弗倫而所謂生者未嘗不均也然則固情謹聲以嚴尊生則為君子如縱情肆聲不寶所生則為小人矣夫寶生者貴乎重身重身者貴乎制情慎言此三者惟君子能之夫色聲香味觸法皆名塵而不名心者何哉良以六者蔽蒙本覺如塵墮眼中不惟四方易位即伸己指莫能見矣故以塵名然塵名所根名能能所具則心不名心而名識也心去性不遠識則遠甚故知道之士以心推根塵根塵猶殘雪能推之智若罏火方熾而殘雪投之何慮其不化哉如推觸塵必究離合所自所自既得則根亦隨塵而拔根拔塵脫情化名性性既復焉然後於榮辱死生得喪之場千陶萬煉功深觀熟重以弘願熏之智光為導而大丈夫之能事畢矣一觸既爾餘塵獨非復性之雲梯乎士不可不知好惡以致流落異趣期再出頭難矣問白毫宛轉五須彌何以作此觀曰墮體黜聰可矣墮體則能外身黜聰則能外心外其身身則無量外其心心則無邊以無量之身無邊之心作此觀有何不成若局促於五尺之身較計於方寸之心是以見小而忽大也論觀白毫比丘乞食本為遠纍纍不遠則多擾擾多則初心者不能無亂此吾佛之深憂也而後世號為僧者以乞食為耻毋乃不思之甚乎又世之號金湯者唯貴阿諛是以搖尾乞憐善解迎合之徒皆得知事體之稱由是而觀僧徒苟且不獨出家者之罪也亦在家者毗成之耳今本朝取士惟以舉業僧徒試經之科寢而不行夫舉業者本無用之具藉之以羈縻人情消磨歲月則可若以之取人材裨治道譬如救火以油滋其焚矣僧不以試經剃染則佛言尚不知安知佛心乎不知佛心而為僧僧何殊俗僧不殊俗剃染奚為缺文故亡佛者非魔王外道能亡之亡之者不殊俗之僧耳論出家夫人之多欲始必生於不知足知足則欲不待遣而自忘矣吾嘗躬試之一日潞河舟中顧謂二三子曰吾與若俱安坐彼舟人徒步而牽我且食惡食吾與若豈惟安坐復食美食兩者相較慚懼之心不覺油然而生此心一生萬欲自薄寧假磨礪以損之耶雖然二三子與夫舟人或勞心勞力之不同人各自知焉眼也者明瞽俱一而所以有見有不見者以根之所具不同也根有二焉一者浮塵二者淨色浮塵根者有形之體而無照之用也淨色根者有照之用而無形之體也所以死人眼未嘗不存色未嘗不觸而終不能見者形具而用不存也吾人之所以能見者以兩者俱存故隨觸而照隨照而辨也蓋色者眼之相分以色之形於眼也而眼者尤識之相分以眼不能辨色必辨於識也故曰眼為親相分色為疏相分識為見分三者合而觀之則能不離所所不離能分而論之能中無所所中無能也故眼中無色識蓋親相分中無疏相分與見分也識中無色眼者見分中無親相分與疏相分也夫三者俱無則根塵不對能所不分雖有色之可見而色豈獨如石女生兒乎哉故曰離暗離明無有見體也論眼識普賢菩薩有十願王王王殊勝威猛若得一願王則成佛無疑況盡得哉一者禮敬諸佛則得身業殊勝二者稱贊如來則得口業殊勝三者廣修供養則得福業殊勝四者懺悔業障則得三業肅清五者隨喜功德則得妬習頓空六者請轉法輪則得慧光圓滿七者請佛住世則得自他兼益之勝八者常隨佛學則得慧命長生九者恆順衆生則得冤親平等十者普皆回向則得事理障消如是十願王於日用之際凡遇境緣逆順痛心呼之日積月久自然化憎為愛化愛為憎憎憎愛愛愛愛憎憎好惡無常願王不動直趨妙覺有何艱險達觀道人乞食足迹遍天下凡名山福地佛老道場靡不歷至其兩家之書亦頗涉獵然終必以無生為宗久視為資即擉火練魔水齋之業亦所不棄近寓潭柘山嘉福寺率二三禪人期服水齋一期既而輒改初轍因諸禪人根器隨其便宜或終其期或不克其期則命其讀大乘內典如天台四教儀永嘉禪宗集或者白道人曰既服水齋則內典非所急也茲廢水齋而勤文字般若似不可耳道人愀然對曰若無正知正見非但服一期水齋徒受枯淡即服千期萬期於正知見中有何干涉故溈山施衆僧小衣一僧不受且曰我自有娘生褲在溈遂拶曰父母未生前穿甚麼僧無語無語之僧不逾年坐化至火焚其軀得舍利無算有僧傳至溈山溈山曰縱有八斛四斗不若當時酬老僧一轉語由是觀之為佛弟子若不以開佛知見為急務饒你勤苦纍劫非無漏正因也且水齋之創考諸大藏並無所出我輩凡所舉止必奉教而行可以利當世開來學今子必欲道人終其水齋者不過怕人疑謗耳殊不知道人自脫白已來濫入空門三十餘年大小叢林知識法師或於道人生信讚嘆或於道人生疑謗毀而道人略不以讚嘆生喜亦不以毀謗生怒喜怒自彼與道人何預譬如浮雲觸石風遊太虗於道人有何損益且道人要喫水齋時如因地而倒要開水齋時如因地而起起倒皆在道人自起自倒與諸黑白本無相纍既無相纍或讚嘆或謗毀豈非畫蛾眉於渾沌鑿七竅於無始者哉雖然且道這老漢扯這一上葛藤為甚麼咄好歹是非能眼聽普門大士現全身水齋夫愛人以大者則其所存也遠愛人以小者則其所存也淺遠則難窺淺則易見是以利霸者不欲王利王者不欲佛夫佛道曠遠發一願立一行動經塵劫一生不克則千百生千百生不克必期於無盡生吾曹苟有志於佛道其所視人天之浮榮何啻置一毛於太虗哉今有人見淺而不見遠執小而謗大潭柘先生聞而哀之恐其斷佛慧命罪當坐墮借喻世法引淺入深使其知詐力近功不若真實仁義真實仁義不若開佛知見夫佛知見者不可以巧智得亦不可以苦行求唯貴熏蒸開發耳然熏蒸開發有萬不同如以十惡五逆熏蒸開發者乃地獄知見以慳吝熏蒸開發者乃餓鬼知見以愚癡熏蒸開發者乃畜生知見以五戒十善兼未到地等熏蒸開發者乃人天知見以生滅四諦熏蒸開發者乃聲聞知見以十二因緣熏蒸開發者乃辟支緣覺知見以無量四諦熏蒸開發者乃別教菩薩知見惟以無作四諦熏蒸開發者始名佛知見也嗚呼像季之世末法風高魔外雲興龍象稀覯不惟佛種難培即人天種子因果紕繆者多真正者寡矣況佛知見乎於是先生假水齋為旗鼓藉枯淡為熏蒸之資作其氣而堅其心密以文字般若熏蒸了因開發正因冀同行者即衆生日用不知之知見開發實相然根器利鈍弗倫難以克願願既未克功效不彰則所疑者必衆所信者必寡疑則生謗謗則招業或者告先生曰當稍順人情以收衆心使疑者生信信者開解不亦善乎先生含然大笑曰謗不孤生必待於讚疑亦無地必資於信今子欲我鑄謗成讚範疑為信譬如惡屈而去其信也殊不知為高人易而為大人難所謂高人者不過持一小節小行硜硜不回者是也所謂大人者但願有益於天下後世雖蒙盜跖飛廉之惡名亦所弗辭況小謗小疑何足介焉大都衆人所執者情也至人所行者智也情如堅冰質礙多端智如清水方圓任器故我大覺聖人有四悉檀隨緣設化不拘常度亦如大將用兵使其由之而不使其知之知則情生情生則利害隨之矣豈可以勝敵哉所謂四悉檀者一曰世界悉檀謂其有界限不可踰越也一曰對治悉檀謂其見病進藥也一曰為人悉檀謂其隨機宜也一曰第一義悉檀謂其開正知見也又前三悉檀近隨情三昧後一悉檀近隨智三昧此四悉檀凡為如來使者傳法弘道苟不知其端緒則中無有主外無法範或小觸境風便立腳不定矣又隨情三昧或易見隨智三昧則難窺難窺而生疑生謗固其分也子必欲先生解其疑止其謗先生非子安肯效子作無義事乎於是告者悶然而去水齋後語夫九橫而死言其不得天年而歿也然九橫中不應食而食不量食而食不習食而食不出食而食止熟而食皆致橫死者此橫死之常也至於不持戒而橫死近惡知識而橫死入里不時而橫死可避不避而橫死此四者又橫死之變也常則不驚不疑故犯者偏衆變則人情駭異驚疑生怖故犯者不多由是觀之飲食本欲資生而反致橫死者皆無明不覺而食故也如以覺照當先不唯不犯變橫即常橫永不犯矣故我曹滴水粒米未入口時必先覺照從何所來既入口中從口入喉從喉入腹化為何物又我食此食果於世法出世法中有補有損也耶如是則縱食金剛子亦能消得何況他物凡修禪波羅蜜者有十意焉一大意二釋名三明門四辨詮次五簡法心六別方便七釋修證八顯示果報九從禪起教十結會歸趣今於大意中以初心行人發心不同故有簡非正明之辨簡非者行人發心修禪不同多墮邪僻一為利養故發心修禪多屬發地獄心二為名聞稱嘆故發心修禪多屬發餓鬼心三為眷屬故發心修禪多屬發畜生心四為嫉妬勝他故發心修禪多屬發修羅心五為畏惡道苦報息諸不善業故發心修禪多屬發人心六為善心安樂故發心修禪多屬發六欲天心七為得力自在故發心修禪多屬發魔羅心八為得利智捷故發心修禪多屬發外道心九為生梵天處故發心修禪此屬發色無色界心十為度老病死苦速得涅槃故發心修禪此屬發二乘心即此十種行人善惡雖殊縛脫有異既並無大悲正觀發心邪僻皆非佛種故簡非之若夫正明菩薩行人修禪波羅蜜大意有二姑置弗論者蓋恐常人聞而駭怖怖則驚驚則疑疑則不信不信則生謗生謗則受苦受苦則為怨怨深則結業結業則不可解不可解則終仇對於是且置之耳嗚呼發心修禪豈易易哉最初發心若不遇明眼知識正其因地縱使不食如夷齊忍苦如墨翟勞勤萬劫於佛菩提有障無礙故曰戒緩乘急不是緩戒急乘緩真是緩吾於水齋中作慧行行行調治情習宛轉種種方便互相資用大抵慧行為正行行為助未及一七即覺身心輕利舊於經教中所聞有疑難而未釋者自然皆豁爾無滯并一切情習亦大廓落及以行行為正慧行為助磨礪多日終不若慧行為正行行為助得益之多既而自愧慧行薄劣於陰界入境藉觀入止資止入觀猶障礙多端相狀蒙昧遂復探討天台智者大師所説禪波羅蜜摩訶止觀併輔行等書以昭廓慧行且多識行行深淺顛末蓋非獨便自己進修之補亦乃為後之喫水齋者示其最初發心務須先審因地端正則不負聖人所誡是以掇綴十種發心邪僻者為殷鑒然水齋緣起考諸大藏未見所據即其方法相傳一晝夜芝麻三抄棗三七二十一枚分三飱服之終南伏牛皆以此為定式或以念佛為話頭持呪為話頭次者水齋雖服惟隨自意昏散延日而已所謂慧行行行名尚不聞安知其義義既不知憑何作觀觀既不作焉能入止止既不入攀緣豈息攀緣不息則心地不清心地不清則煩惱熾然煩惱熾然則我相堅固我相堅固則於臭皮袋上生大執著是以身心自相矛盾一動一靜護刺萬態言無好惡順情則雖無益於己欣然而樂聞逆情則雖有益於己勃然而不喜聞殊不知凡學佛者必須先達患纍緣於有身不存身以息患知生生由於稟化不順化以求宗若然者如於臭皮袋上生大執著於熱惱心中起諸護刺是存身耶是稟化耶若是存身則患纍終無期脫若是稟化則情識不枯乾患纍既無期脫則生死難逃情識既不枯乾則煩惱苦海何時可出如是過失患在知見不明知見即慧行具慧行則行行可資無漏若無慧行終屬有漏有漏則同前簡非中九種發心邪僻難升易墜斷非出苦津梁甚可怖畏是故若不解慧行行行即小乘見諦尚未知况始終頓圓之見諦乎故服水齋不以見諦為本終非正因雖盡形壽服之於己躬下事了無交涉雖然若較諸奢侈自縱而不甘枯淡者良亦可敬也又服水齋北地多寒薑可隨意服之設大便不甚通利則服蜜水由是觀之身心開遮惟如來大人體悉至當故於律部中雖則就情檢制逢緣亦可開遮如靴履裘毳遮比丘不許服既以多寒國土仍為開之後之喫水齋者可法也或曰師所謂有菩薩行人修禪大意恐衆人聞而不信以至終作怨對者寧有是事對曰吾初祖菩提達磨梯山航海不遠數萬里而來此土別無所求不過自既悟心悲他未悟所以勿憚寒暑專為度生而來然邪師魔外百計千套毒至於六即南嶽思大禪師生身已證六根清淨之位亦遭中毒幾死而復生彼皆聖人以弘法之故尚不能免况吾見思未斬分段猶存設不卷口縮舌裝癡賣顛則這條窮性命斷送久矣問曰師為生死出家如何怕死吾笑曰怕死不怕死不在口硬但臨期出脫看他便了修禪波羅蜜大要東平打破鏡已三百餘年龍潭吹滅燈復四百餘載後代子孫迷於正眼謂鏡燈滅而不知行住坐臥放十大光明燈未曾滅也見聞覺知虗鑑萬象鏡未曾破也燈雖無景能照生死長夜鏡雖無臺能辨生死魔惑鏡與燈光光常寂明與鑑幻幻皆如照之無窮則曰無盡之燈鑑之無窮則曰無盡之鏡日用不昧昭昭於心目之間但衆生迷而不知故有修多羅教開如幻方便設如幻道場度如幻衆生作如幻佛事譬如東西南北四維上下中點一燈外安十鏡以十鏡喻十法界一燈况一真心一真心則理不可分十法界則事有萬狀然則理外無事鏡外無燈雖鏡鏡有無窮燈無窮燈惟一燈也事事中有無盡理無盡理惟一理也以一理能成差別事故則事事無礙由一燈全照差別鏡故則鏡鏡交參一鏡不動而能遍能容能攝能入一事不壞而即彼即此即一即多主伴融通重重無盡悲夫衆生居一切塵中而不知塵塵皆毗盧遮那無盡剎海普賢示一毛孔而不知一一毛孔含衆生三昧色身然則一切衆生日用在普賢毛孔中毗盧光明內慈氏樓閣中出沒文殊劍刃上往來念念中與諸佛同出世證菩提轉法輪入滅度如鏡與鏡如燈與燈一切一時普融無礙誠謂不可思議解脫法門非大心衆生無以臻於此境或問即今日用見聞覺知畢竟是燈耶非燈耶是鏡耶非鏡耶答曰鏡燈燈鏡本無差大地山河眼裏花黃葉飄飄滿庭際一聲砧杵落誰家夫衆生無常隨所熏習熏之以五逆十惡則地獄衆生發現熏之以慳貪之業則餓鬼衆生發現熏之以愚癡貪欲則畜生衆生發現熏之以五戒善業則人道衆生發現熏之以好勝詐力福業則修羅道衆生發現熏之以純十善業兼修未到地定則天道衆生發現熏之以四諦之業則聲聞衆生發現熏之以十二還滅因緣則緣覺衆生發現熏之以三學六度之業則菩薩衆生發現熏之以無上菩提之業則諸佛發現矣由是觀之自佛而下九界衆生雖世出世聖凡之不同然皆未脫衆生之名自九界已上唯佛道中始脫衆生之名耳是以彌勒菩薩懸知釋迦緣化將滿繼佛位者以己身當之既將任佛職深慮一切衆生若不先以般若熏之培其智種則將來龍華位中內無智種雖外熏以無上法緣終無益也如地有種外藉陽和之力熏之則油然而各遂所生也於是彌勒菩薩乘悲願輪托生婺州雙林之傅氏現為居士身廣化有情時梁天鑑年間也然居士深知衆生得道因緣唯耳目最要徑而耳目中又慮衆生識文字者少聞法亦復不多既而設為藏輪藏法於中使一切衆生若見若聞若識字不識字以鼻嗅之以口舌讚之以身觸之以意慕之毋論其有心無心賢智與愚借此六根熏習植般若智種作成佛因嗚呼大士之心可謂極深廣大矣輪藏夫身不自身因觸而身所以身即觸也身既即觸反而推之即知觸亦身也身即觸身不可得觸即身觸亦不可得身觸既皆不可得矣則識本無生識本無生即身之與觸亦俱無生也今有人於此解路雖通靈機尚昧所以説時似悟對境仍迷耳是以知識依通非佛知見內瑩發光真名大智豫以是知身之與觸觸之與識迷時成三悟後一尚不得何况於三三一絶待獨露常光遇物即宗不乖血脈理事函蓋宗教同春枝有短長花心不二但善用其心者即觸途成觀不善用者觸事生迷也不見可欲則無所愛故以志一氣清明在躬志氣如神雖祿之以天下窮至於匹夫無所損益也雖然愛不可以自洗以聞道而洗之故曰聞道者靈臺常虗虗則明明則徹徹則遠遠則久久則大大則圓圓則備雖虗空之無際萬物之廣多天地之確隤衆妙之所出皆自道也道乃如是可不愛乎衆人則不然其所愛不出於飲食男女之間而已悲夫世儒每以知行合一為妙殊不知曾子述夫子之意則曰尊其所知則高明矣行其所知則光大矣由是而觀先知而後行明矣不知而行者又烏足道然知有解悟之知有修行之知有證極之知故無解悟之知則修行之知無本矣無修行之知則證極之知無道矣又證極之知為解悟修行之知之所歸宿也知行合一之旨可得聞乎曰行時非知時證時非行時到此地位不可以智知所知不能及知既不能及行亦不能及知行路窮不唯神仙失其靜篤管取羅漢遺其空醉矣若然者畢竟如何即是回看雲樹杪不覺月沉西夫義非文而不詮意非義而不得旨非意而不冥冥則無思無思則同同則無實無實則無同若然同而無待異亦無待矣譬如一指屈伸伸喻同焉屈喻異焉故正伸時伸本無待正屈時屈亦無待雖然且道離屈伸之外全指在甚麼處知此則可以言同異無待矣精神不凝而思謂之揣摩揣摩之患大矣杜靈機而生見刺故曰悟學廢於揣摩夫身為榮辱巢穴心為好惡根株如根株不拔巢穴未空入山則怕虎兕入水則怕蛟龍夜行則怕鬼入羣則怕衆凡愚之怕智短之怕長低之怕高近之怕遠或可怕不怕不可怕反怕究其所由有身則榮辱可以為巢穴有心則憎愛可以為根株能即身見空則何空非身即心了幻則何幻非照若然者榮辱好惡不唯可以為解脫之梯航實乃真為大夜之燈燭今有人事善知識而生怕怕則神不安神不安則恍惚起恍惚起則心無所見身無所主終必因怕至於遠離善知識既遠離善知識不期然而近惡知識矣嗚呼華嚴經有十種事失佛法道最初即於善知識不生渴慕方便親近失佛法道且善知識機緣有多種不同有以慈悲為佛事者有以瞋怒為佛事者有以和光同塵為佛事者有以叱吒棒喝為佛事者有以恭敬供養為佛事者有以守約為佛事者有以多聞為佛事者有以超放為佛事者有以莊重為佛事者有以人見喜而為佛事者有以人見怕而為佛事者故曰逆順皆方便而世之人循聲流轉觸相取著以為某善知識慈悲某善知識貢高某善知識有道心某善知識太孤峻此所謂孟八郎漢皆作實法回向不免被他明眼人鼻笑汝在又有一等人事善知識不以善知識見處為重專以伺察善知識直達無心之過托為口實向背地裡對人説去噫若將生死為間事知識何須親近他須把身心拋腦後自然陸地長蓮華凡學人沐浴當生大慚愧洞察所因稱摩訶般若波羅蜜多三聲方可入水蓋般若者一切諸佛之母稱其母則其子無論多寡皆隨之矣凡不明般若者不能生大慚愧不能洞察所因何以故以智鑒不明不辨好醜故何謂生大慚愧當作是念我此身垢濁不堪而見地不徹行業涼薄享此淨浴何以克當何謂洞察所因當作是念此沐浴水衆力所成深山寒雲之中雪老氷枯之地柴薪汲運轉冷為熱揣我有何行德受大衆心力即以沐浴一事入水出水毫忽不昧心光妙觸宣明坐入佛海至於飲食起居行住坐臥境緣逆順情隙愛憎若不生大慚愧洞察所因捨命時至管取九人之中有十人手忙腳亂在或比來凡沐浴時稱阿彌陀佛以為話頭但貴音聲不斷即為沐浴刀錢殊不知般若不明饒你佛聲不絶我知其大慚愧決生不起凡百所因決洞察不徹若然者吾曹沐浴不稱摩訶般若波羅蜜者是棄佛母也佛母既棄稱子奚為粗識如此惟賢者正之沐浴訓夫禪波羅蜜者其書有十卷大章亦有十乃天台智者大師所説也大章十者一禪波羅蜜大意二釋禪波羅蜜三明禪波羅蜜門四辨禪波羅蜜詮次五簡禪波羅蜜法心六分別禪波羅蜜前方便七釋禪波羅蜜修證八顯禪波羅蜜果報九説禪波羅蜜起教十結會禪波羅蜜歸趣而大章中第六分別禪波羅蜜方便章舉二子焉初外方便二內方便而內方便復生二孫初正明因止發內外善根二明驗惡根性大章第七釋禪波羅蜜修證章舉四子一修證世間禪相二修證亦世間亦出世間禪相三修證出世間禪相四修證非世間非出世間禪相而一修證世間禪相復生三孫初四禪二四無量心二四無色定二修證亦世間亦出世間禪相亦生三孫初六妙門二十六特勝三通明三修證出世間禪相生二孫初對治無漏二緣理無漏而對治無漏生九玄孫初九想二八念三十想四八背捨五八勝處六十一切處七九次第定八師子奮迅三昧九超越三昧大都禪書科判明白皎如日星善讀者得其科判譬如得祖而尋父得父而尋子得子而尋孫得孫而尋玄曾有何難哉蓋此書由祖而父由父而子由子而孫由孫而玄曾凡三十五科也若夫修禪之妙階級次第委曲精盡由欲界未到地定入初禪未到地定由初禪未到地定入二禪未到地定乃至色無色定九次第定等或發有漏通或發無漏通至於三乘聖道靡不資之是以凡緇素之流有志於修禪者是書不可不精熟焉嗚呼世謂神仙之術可以長生久視譁而嗜之殊不知神仙固奇矣而最上品者不過享地居之祿耳如中下品者不過浮遊深山海島之間渠安知地居之上有夜摩天夜摩之上有兜率天兜率之上有化樂天化樂之上有他化自在天他化之上有初禪天初禪之上有二禪天二禪之上有三禪天三禪之上有四禪天四禪之上有空無邊天空無邊之上有識處天識處之上有無所有天無所有之上有非想非非想天此蓋就凡夫天中論層級耳至於非想之上復有四聖人天乃置而弗及者行恐大鵬若鳴凡鳥皆驚故也禪波羅蜜科判
