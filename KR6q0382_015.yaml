body:
  text: 明憨山德清閲題題金剛經塔余瞻禮是塔自如是我聞以迄信受奉行一畫至於一字一字至於一句一句至於一行一行至於一經鱗鱗曳曳宛轉橫斜靜對之如遠水孤峰流觀之則長空鴈序及其標塔標佛忽然妙合則七寶無所施其工帝梵何所關其巧直自一心不生處為基不生用處為用世尊未說是經此塔先已成就經云應無所住而生其心全是此塔注腳鑒大師且從其注腳悟入而今此塔當機電掣豈無毒眼漢見鞭影而馳乎螺燈父子刻施是經余竊有囑纍昔有堅持此經者江風敗舟經遂漂墮意其竟入龍宮矣一日其妻浣於溪畔見羣螺結聚沉浮衍漾如水上燈毬怪而掇之羣螺既盡此經獨出誠願刻者施者受持者等彼羣螺遂與此塔共結一段不思議公案也題東坡禪喜集此集或以文章奇之無乃略神駿而取玄黃乎殊不知作者力在自性宗通以不傳之妙拋擲於語言三昧尻脊無常聖凡生殺譬夫夜光在盤宛轉流利雖智如神禹曷能測其向方哉題雪山半偈舍身卷聖人一言天地卒難以覆載蓋大道所在耳身為大患此男子能於千巖萬壑冰雪之閒捐大患而貨半偈非至明至勇者乎題普陀大士示現卷拜者不至大士現身豈因至者我至身現豈關菩薩反復觀察合現無地於無地中海山霞生妙容慈肅見者淚滴海水可枯此淚無竭作是念人普門頓入耳擲波閒眼聞鯨吼水陸空行圓通自在樂既無根苦非有蒂題師子林紀勝集師子林記紫柏道人得於吳門沈伯宏齊中嗚呼師子林榛莽久矣狐兔成群白日青天作諸妖孽師子貪睡不管今此集一出師子鼻孔竟為之牽痛矣痛則醒醒則吼請問見前大衆且道師子正吼時這一隊狐兔向何處著落能薦此師子林一旦復許渠來林中蹴踏自在去題包生所刻棱伽經此經以五法三自性八識二無我為宗為根熟菩薩直明識體全真頓成智用故佛於棱伽山說經者蓋山高峻下臨大海傍絶門戶惟得神通者堪通之乃表心地法門非修證可能往耳棱伽此言不可往若然者則一切衆生終不可往耶雖然境不自境由心故境心不自心由境故心境不自境境不可得心不自心心亦不可得心境既不可得則智山無待覺海無邊不動腳跟早登棱伽之頂才生心想頓入如來之藏矣僧問岩頭起滅不停時如何岩頭問僧誰起滅凡讀此經者果於岩頭句下別有轉身始來與老漢商量此經未晚題坡翁文字禪東坡老賊以文字為緑林出沒於峰前路口荊棘叢中窩弓藥箭無處不藏專候殺人不眨眼索性漢一觸其機刀箭齊發尸橫血濺碧流成赤你且道他是賊不是賊試辨驗看若辨得管取從來攔路石沸湯潑雪題趙生畫扇霧勢昏曉山形有無且不可以心測又豈可以筆墨盡哉然墨光之初心路之始必有主人存焉故達者知雲霧昏曉無常即例山形等耳然後筆筆墨墨橫拖豎抹意之所到筆之所隨主客升降初無常位意果意乎筆果筆乎吾於密郎扇頭得趙生矣題師子端禪師語録豫客代之清涼山一夕夢一僧蒙師子皮自東而西斜陽在天光燭其面忽然啓齒口如血盆牙似霜劒夢切自計曰如彼者我當為之及讀端師子語録驚其脫略窠臼大用縱橫不從軌則果若金毛師子跳擲露地百獸聞風靡不腦裂者也嗚呼去古既遠宗門爪牙希遘率皆如妖狐怪狗軟暖委靡凡見可欲搖尾乞憐萬態迎合一充其欲閻羅老漢叱咤其前猶不暇顧況顧我道哉至於由機緣而頌古作由頌古而評唱集由評唱而所謂祕要者行祕要行則後之學者評唱不知安知頌古頌古不知安知機緣機緣不知安知自心自心不知安知祖意夫機緣者活句耳生殺自在抑揚莫測凡聖路窮是非藥病苟非其人道不虗行唯了悟自心者即病為藥即藥為病即生而殺即縱而奪正抑乃揚正殺乃生以棒喝為廣長舌以鐵釘飯木札羮為供養臨機哮吼天龍欣悅狐兔魂銷若然者今之以祕要自謂正傳慢侮法道寧不有愧於師乎題穆玄菴所著書後昔人有將黃金鑄佛而供事之一旦為大盜負而藏之重泉之下世皆不知也奄忽更代初鑄佛者子孫亦皆星散異鄉矣爾時重泉倐然光達丹霄四方遠近靡不覩之且驚且駭譁然相汲引而尋光所自以善水者下重泉而獲金像浮舉而供事之巢陵唐邑內翰穆孔暉號玄菴其所著述發揮儒釋精奧書成若干部先生即世五十餘年矣茲由同郡傅侍御光宅表而彰之余故亦得鑽研玄菴祕典大凡男子立志不可淺近圖一時衒耀於俗黨但當務其深遠者精克而成之更百世之後或有同志者出焉其猶鑄佛以黃金雖藏之於重泉之下異日必光達丹霄也即此言之大盜藏像盜唯一人而俗黨蔽高無世不廣故莊周有曰高言不止於衆心妙樂不達於里耳然精光所積雖天地莫能蔽之況人情私嫉乎哉題王畫卷夫見畫不見筆見筆不見手見手不見心見心不見心之前者謂之見見可乎苟借畫見筆借筆見手借手見心借心見心之前者謂之不見見可乎雖然展卷則雲物縱橫收卷則峰泉寥寂且道展收把柄畢竟落誰手裏得恁麼自在疑則輞川有摩詰可問跋跋麒禪人血書華嚴經吾聞華嚴大經實根本法輪佛與大菩薩之事非小根可堪故曰龍象蹴踏非驢可堪終始一念今昔一時因果一佛凡聖一性十方一剎三界一體正像末一法初中後一際當處現前不涉情解本自圓成非修所得故曰智由三昧觀照方便迷解顯得不是修成若夫悲願熏炙稱性而周事亦無盡或曰願終功廢則過去諸佛帶果行因豈不多事雖然一乘無修始終一念云云者蓋指果體而言也若在凡夫必當先悟果體根本然後法古佛之樣規行矩步始以信入次則歷行住回向地等圓治積生染習習盡功圓則毗盧能事畢矣經中首以善財問法遍參勝友五十三者蓋聖人所慮書不盡言言不盡意故設像寓意使彼有志於一乘者玩意得像神而明之肉身現證無勞修得如法華以龍女成佛之象寓彼實相以至三周九喻重重旁敲與華嚴何別但下劣凡夫不信自心徒信佛語被文字所轉埋沒本光不能直下受用是非之僕榮辱之奴死生之仇好惡之黨顛之倒之奴主反位大用翻為迷事無明大機總成迷理之障理迷則觸事皆礙事礙則於理終迷故華嚴之法界法華之實相名存義昧義昧則理無所會理無所會則道不終通道既不通到家何日既不到家安有所得無得則見必不定見不定則偏圓無辨邪正不分謂之知解之徒渠尚無分豈能現證而受用者哉豫章潯陽之廬山山有黃龍寺寺額即今上所賜也寺衆有麒禪人有志於佛一乘顧惟天機不深受性魯鈍於華嚴法界率難通悟於是發願書大經全部意在青山白雲朝暮書而讀讀而禮稱懺洗過現重輕罪垢果其夙有微善仗毗盧之寵靈雜華之熏發法界頓開入佛種性麒之告余也如此余嘉其有志綴華嚴大槩如此余再謂麒曰若知舉筆飲墨向白紙上橫畫豎直之者念耶時耶佛耶性耶剎耶乃至際耶象耶意耶現前耶不現前耶嗚呼若能領此則須彌為筆太虗為紙大地為墨書若經者果有盡乎果無盡乎子若不會雖剝皮為紙析骨為筆刺血為汁與善財童子相去尚遠在況五十三勝友若能親近乎麒其勉之麒其體之跋黃山谷集此集如水清珠濁波萬頃投之立澄如摩尼寶饑寒之世得之主病即愈蓋此老不特尊其所知行其所知而已且能掉臂格外作獅子吼者也觀其於寵辱關頭死生路上跳躑自在若夜光之珠宛轉於金盤之中影不可留如水天蕩漾於太清之內光無定在有誣先生謂列子中亦有禪語禪豈普通始來哉此非先生語不識好惡者所贅語耳列子之言雖精密至到者亦可以義路通禪則不唯義路不可通縱無義路亦非禪也唯徹悟自心者即閉門造車出門合轍矣而不識好惡者欲以義理穿鑿所謂撮摩虗空祇益自勞耳余知其家裡人故跋數語跋賀知忍刺血書金剛經未刺指時指塞虗空才刺指時血流大地指即金剛血即般若故罪無輕重半字能消福無淺深援毫即滿雖然淡菴居士未即世時不以此經為常課則即世之後子雖有曾參之孝為書此經終與金剛般若血脉不能接續若然者居士即此經此經即學仁父子血脉豈以存沒斷續哉我聞般若無古今金剛無內外有古今則有延促有內外則有親疏而未至蘊空者則念念生滅情塵膠執即蚊虻唼膚而舉身毛竪稻芒在眼而四方易位況以熱指刺於冷針鮮血迸流能無痛乎今學仁即流為墨即墨成字至於句偈完茲一卷究其情悃與舍全身何異達觀道人見而哀之且感學仁精誠不愧紫岩書此附之經尾願見聞之者皆發是心跋鐘鼓頌聖人有身而無纍有心而不勞以其無纍故則一身可為千萬身以其無勞故則一心可以窮萬法衆人則不然有身則有纍有心則有勞纍之勞之從無始以至今日死死生生榮榮辱辱好惡萬端改頭換面羽毛鱗角無所不經得為人身忝在最靈極為希有於希有之身不能聞道洗長劫之勞纍與馬牛何異哉雖然勞之與纍亦不可易洗若欲洗之須以此頌為香水海久滌自除則衆人可至於聖人也智者思之跋牟子言道章莊子曰道惡乎在道在稊稗易則曰形而上者謂之道形而下者謂之器有人問趙州如何是大道州曰大道透長安今有人於此三者併舉而問曰牟子之言道莊邪易邪余應之曰莊易且置敢問趙州大道透長安句果言道耶不言道耶若謂言道則其言不可以智識知義路得若謂不言道問道答道有何差別有人於兩問中知得好惡雌黃不謬則莊易之道譬如月在秋空朗然廓徹若檢點不出不但於趙州句中無有出身之計即莊莊易易總向癡人說夢耳雖然由粗而得精由精而遺聞粗之與精固亦遺聞之嚆矢哉跋證道歌漢留侯狀如美婦人本朝劉誠意亦狀如婦人然皆臨大事決大幾若鏡中見眉目然當世無與等者永嘉大師雖雲外枯禪貌亦柔秀宋寂音尊者初讀其證道歌至大丈夫秉慧劒句寂音以為此老貌必傑特威掩萬僧者及禮其道影始知體不勝衣貌如少年宣律師乃歎曰斷不可以言貌觀人蓋此老平生踐履明白心智猛利故吐辭等刀鋸耳譬如香象擺脫五欲韁鎖超然而去真大丈夫哉邇來去聖轉遙人根薄劣凡所謂出家者皆産於荒寒昧略之鄉其父母不過為兒女負重舍而出家為其一身衣食之計非為求出世而來次則逋逃之徒憲網張迫以我緇林為其淵藪乃一時偷生之計豈有成佛志乎余浪迹江海三十餘年足跡遍天下在在處處所見緇流黃冠率飽食橫眠游談無根靡醜不作污佛污老退人信心若使一宿老人肉目睹此安得不痛哭流涕哉夫子房龍門設不為經世用出家求無上菩提當不在永嘉下風昔崔趙公問徑山國一欽禪師曰弟子出得家不欽曰出家乃大丈夫事豈將相之所能為趙公心服之故曰諦審先宗是何標格乃今狐兔成羣龍象騰逝則釋迦老子正當為酒肉班頭嗚呼痛哉跋大川和尚飯十萬八千僧卷余讀諸居士偈言跋語雖喜其有順水推船之心痛其無逆風把柁之手且道如何是逆風把柁咄直下死生嶮浪之中當頭榮辱顛風之際赤心不昧萬善常勤以舟為命則并力支撑以國為舟則同心共濟凡百情關冰消瓦解一切人我電掃雷轟方許渠向沒巴鼻漢前雌黃佛法去雖然出身一句又作麼生鐵索一條誰鎖放嶺頭諸佛笑同牽跋宋仲珩篆書金剛經金剛般若兩者之堅利世所共知惟愚癡之堅利或未察焉夫愚癡不堅我當先破愚癡不利我當先犯今我頑於死生好惡之執牢不可破鋒不可犯是以威音釋迦先我得道也雖然愚癡不堅不利則般若無本矣故聖人以金剛喻般若良以金剛能斷一切一切不能斷金剛故也如般若能斷一切愚癡愚癡不能斷般若也此就知有者言也如未知有則愚癡能斷般若般若不能斷愚癡也由是而觀愚癡之與般若金剛之與萬物豈有常哉顧其人用心如何耳如先以知有為前茅則般若如金剛如未知有強以事行破執則愚癡如金剛故金剛一物不惟能喻般若亦可以喻愚癡也此經有五千餘言疑二十有七吾曹果能善用其心則言言疑疑皆觀照之媒妁也反是則言言疑疑亦愚癡之紹介也如青蘿本元臣榮國公本緇流而所為如此果以言言疑疑為媒妁耶為紹介耶吾不得而知也宋仲珩篆書妙絶古今精密圓活神氣流注如春著花余雖至愚貪玩不知目勞況智者乎羅司理心堯初既得之於無心豈終能以有心寶之哉惟無心得之亦無心寶之則有未常有而無未常無所以得常無常有也書周輪雲發願文後有勝解無慚愧謂之見魔有慚愧無勝解謂之悲鬼見魔悲鬼皆自心宛昧所成苟能逆順關頭掉臂徐疾過得所謂見魔悲鬼俱鑄為文殊普賢矣嘻知即易行即難萬仞崖端談笑躑寒山拾得兩無功物不遷論跋豫聞入無生者方知剎那故五十計較經有菩薩白佛曰我罪滅如何不見罪滅之相佛曰汝曹心能轉生否對曰我心若不轉生則不能與如來共語佛曰汝曹心轉生時見心初生之相否對曰不知佛曰汝曹既不知心生初相豈罪滅相汝曹獨知之乎即此以觀心轉不轉生相滅相皆不越一剎那耳而物非物遷不遷又豈能越之哉豫以是知駁不遷辨不遷者剎那未知無生尚遙而駁駁辨辨得非掉棒打水月乎則豫亦不免多口之咎半山老人擬寒山詩跋月在秋水春在花枝若待指點而得者則非其天矣吾讀半山老人擬寒山詩恍若見秋水之月花枝之春無煩生心而悅果天耶非天耶具眼者試為薦之戒殺放生文跋夫貴賤殊業物我同靈恃力殘生滋蔓惡習暢一時之口味結萬劫之身殃痛不免之酬償截無始之苦本莫若戒殺殺若不戒則我暢物結物暢我結結暢相乘如汲井輪循環不已往復思之甚可恐怖恐怖既生視物如人視人如我夫殺機一動不惟殘賊同靈實則自斷命根作如是想何待佛出齒臼然後戒殺哉跋宋猪齒臼化佛文物物有佛物物不知以不知故遞相噉食如汲井輪長劫無已佛憫物故流慈齒臼猪口出佛梵相圓滿狀若拇指亦如秋月光明顯露若聞若見生希奇想俱大恐怖自是戒殺等不殺己我發是願佛即現前非色非空非凡非聖凡聖中出以是之故物物是佛云何業醉佛心佛佛相食願是慈波注入衆齒如一燈光分百千燈燈燈續分光光無盡物覩佛光普照三世於此實語凡見聞者號呼涕泣如猪正殺受痛即我作如是觀殺習頓止宋繡觀音經跋禪人林白持宋繡觀音經一卷豫拜而讀之至觀其音聲即得解脫忽然疑生意會不快及見無盡意菩薩聞佛贊觀音功德之利而無盡意即解頸衆珍寶瓔珞持上觀世音菩薩菩薩不肯受因佛勸而受之即將一分奉釋迦牟尼佛一分奉多寶佛塔處乃豁然疑消夫多寶佛過去佛也釋迦佛現在佛也若無過去則現在無待若無現在則過去成斷若無過去現在則未來奚立若廢三世則昧剎那若昧剎那則一切聖凡之用依正之基將何藉焉由是觀之蓋聖人本欲直示其旨顧衆生機鈍不能神而明之故設象以寓意使玩而得之則象忘而自契也知此則現前讀經者與觀讀經者雖愚智弗倫皆周旋於寂滅光中初無閒隔此經妙麗神采具足針針刺入圓通之境字字貫攝至道之真自宋迄明六百載矣而字畫鋒刃鏗然若新非瀝肝膽之誠孰能至此跋怪石供石本無怪怪自禹始迄於東坡居士豈惟不以石為怪直以石為無上供養衆人聞而怪之以為天厨王饌名花香果及珍羞異寶始足為至公以齊安小兒浴時戲石當禪師供不以褻乎然莊生有云高言不止於衆心余謂無上之供自應駭俗雖然禹之所怪坡之所愛皆未有樹也古德有言曰若人識得心大地無寸土寸土既無又安有石哉則禹所怪坡所愛總夢中語耳即達觀道人亦不免開眼說夢在或有傍不禁的出來請問和尚既無寸土只今腳跟在恁麼處老漢緩緩向他道汝不聞金屑雖貴落眼成塵耶跋宋圓明大師邵陽別吳強仲敘未戰誰不勇臨戰誰不恐惟置死生於不可得之地者如師子遊行孤踪絶侶然此不可得之地非獨石門安樂場實一切聖凡所共惟臨境不惑得受用之不然縱見道精深決非將種若圓明老漢居縲絏濵九死而飲食談笑如平時死生不入其懷真菩提場中梟騎耶又石門老人有言曰成就世出世法者特一切能舍耳此言雖若不甚精深細而味之苟非置死生於度外者孰能與此哉今老人於桎梏之中而榮辱不能入其懷飲食談笑不異平日猶超然而自得也者非洞徹自心圓用自心者雖見地高出佛祖我知其觸境旗靡矣跋半山老人擬寒山子詩受持千百萬過心地花開香浮鼻孔鼻孔生香香不聞香善知此者則半山老人舌根拖地亦不分外也書聖觀彌勒贊後理水如海吾心如魚以海養魚化龍奚難更得觸不如意事撼之即如天風激海雲濤洶湧潑日震空空為之殞墮則大用始得現前子思所謂尊其所知則高明矣行其所知則光大矣跋毗舍浮佛偈夫衆人知貴生而不知所以養生之道故為生之所纍至人知養生之道本於無生故能視生無生無生而生生無物纍也嗟乎今有人於此目為色之所纍耳為聲之所纍至於心為七情五欲之所纍猶曰我平生快樂無纍殊不知無纍者纍之久矣蓋衆人欲重神昏坐過而不知焉辟如醉夫臥於泥淖之中人曉之曰泥淖非可臥之所醉者瞪目怒曰我生平不解飲酒汝奚誣我今天下俱抱醉夫之疾安得有不醉者而與之言哉雖然毗舍浮佛頌即醉夫能讀而誦誦而思思而明明而得何患其終不醒耶跋寂音尊者十明論敘夫至愚之人使其蹈火則畏燒煮雖驅之不入五欲湯火燒煮衆生法身慧命非止一朝一夕而人甘心蹈之弗畏者豈其喪心病狂哉蓋計臭皮囊為淨器計無明心為命根不能以四大觀身四蘊觀心故也今人於眠臥之際枕子稍不安穩則不能睡必安之而後適死生於人亦大矣人皆公然自安略不為之計則負覺範老漢多矣跋宋圓明大師邵陽別胡強仲敘清淨光中無端強照於無身心處計有身心心為惡源形為罪藪源若不塞惡豈有窮藪若不空罪必無盡雖然心無善惡形未吉凶惡源未始不為慈悲之海罪藪未始不為功德之山顧其用心操行何如耳嗚呼介然有知知而不返惡流肆矣塊然有執執而不釋罪山崇矣唯有道者了心非有不待遺而愛憎自消知身本無不避患而榮辱自解故曰若人欲知佛境界當淨其意如虗空遠離妄想及諸取令心所向皆無礙我寂音尊者方羈縻於縲絏之中九死一生之地而能超然自得所謂生死憂患莫能入其胸中何術致此哉大丈夫既無經世之志則於出世宜盡心焉故曰盡心了知性知性即能用辟如龍能用水為雲用雲為雨故處水不溺行雲不墜耳豫以是知有道者脫處死生憂患之域非惟覔憂患不可得且能用憂患為廣長舌者也今以此敘作鐵釘飯供養一源宗禪人禪人知此豫何憾焉跋宋圓明大師別胡強仲敘遺愚菴講主夫法本出情以情求法法不可得知不可得而求之其惑滋甚如范滂孔北海之徒其人品高問學廣亦奇男子也至臨患難則疑悔橫生賫悶而沒惜哉此蓋打頭不遇作家以情求道誤之耳殊不知道若可以情求則儀秦之流皆可謂聞道矣即寂音尊者童丱剃除聲已藉甚所至講席白眉大龍靡不推服然猶不謂之聞道及見雲庵文叟始了自心宜其歷死生波險之地辟若娑竭出海慈雲法雨遐被窮荒也邇來去聖愈遠吾曹軟暖不勝觀矣敢望其出情求法乎嗟哉上則托名宗教次之奔走衣食而已率以為教之典要宗門活句是古人茶飯豈今人所能咬嚼自是一犬吠聲百犬狺之遂乃成風卒難移易惟愚菴貴講主情出流輩深痛斯弊亦恨挽之而未能焉豫故重之贈以洪老送胡生敘且跋數語如此讀法華普門品跋豫讀法華普門品至若有衆生多於淫欲常念恭敬觀世音菩薩便得離欲不覺置卷嗟歎久之衆生之大患患莫過於淫欲苟能常念恭敬觀世音菩薩便得離欲佛言不妄今天下恭敬念觀世音菩薩者在處有之乃稱名而離欲者何其寡哉則佛言亦有妄乎嗚呼淫欲恭敬初非兩物果能至誠常念菩薩即恭敬現而淫欲沒稱名少懈則淫欲現而恭敬沒如此境界深淺氣力生熟豫亦驗之屢矣佛語不妄人無恆志自墮疑網耳跋周叔宗書聽法華歌夫法華七軸六萬餘言而其所詮者雖三周九喻直談曲說亦不過一實相耳惟此實相昭然不離日用之中奈何樓子六十餘年辛勤行腳求之而不可得長慶蒲團七破求之而不得由是觀之行求亦不得坐求亦不得則此實相又非四威儀中可得而求矣然則昭然本在日用之語寧非夢言哉乃永嘉覺老又曰不離當處常湛然覔即知君不可見以永嘉之語較彼二老所求之見何天下老和尚舌頭雌黃不定若是耶及讀唐修雅法師法華經歌則若庖丁解牛公輸子之為匠而縱橫逆順精粗巨細皆大白牛之全體也是牛也頭角崢嶸出入於吾人六根門頭咆哮蹴踏喜怒無常平田淺草緑楊溪畔黑白互奪使吾即文字求之而不得離文字求之而不得離即離非求之而不得畢竟至於無可奈何此畜曇生通禪人每以奈何此畜不得為恨一見此歌便有跨牛之志然不得能書者書而寶之作一覔牛話頭無擇山林城市境緣逆順持此參此若不得牛殫生弗已紫柏道人舍然大笑曰汝非跳過魚盤覔豆腐之瞎猫乎當今能書者舍吾叔宗而他求豈不誤邪雖然若有人問大白牛兒畢竟在甚麼處張草米書揮筆處細聽蹄響墨池邊書東坡詩後鳥囚不忘飛馬繫常念馳靜中不自勝莫若任所之貧賤苦形勞富貴嗟神疲作堂名靜照此語子謂誰江湖隱淪士豈無適時資此東坡靜照堂詩也嗚呼心外無法觸目其誰動之與靜富貴貧賤但有名言初非他物眉山可謂了得便用何異繩鋸木斷水滴石穿斷則根塵不到主賓夢醒穿則十虗通達生殺機窮謂物即心而心外無物謂心即物而物外無心解用則賓不抗主自然接拍成令不解用則主逐賓隊觸處成乖故曰若能轉物即同如來且道轉物一句孰能吐得榮辱交加分主客根塵暫喚作常光跋蘇長公大悲閣記魚活而筌死欲魚馴筌苟無活者守之魚豈終肯馴筌哉如書不盡言言不盡意蓋意活而言死故也故曰承言者喪滯句者迷豫讀東坡大悲閣記乃知東坡得活而用死則死者皆活矣前大悲閣記則公示手眼於文字之中使人即文字而得照用也後大悲閣記則公示手眼於文字之外使人忘文字而得照用也若然則東坡之文字非文字也乃象也如意得而象忘則活者在我矣如所謂大悲菩薩具八萬四千清淨寶目八萬四千母陀羅臂豈菩薩獨有耶實我未嘗不具也但有照而無用謂之似具唯照用齊到者謂之真具故顏氏之子有不善未嘗不知此非照乎知之而未嘗復行此非用乎然而必欲八萬四千寶目八萬四千妙臂以象照用其故何哉蓋衆生具八萬四千煩惱堅等大地非照何以破之非用何以轉之又曰窮源達本謂之照鑄染成淨謂之用豫聞東坡嘗稱文章之妙宛曲精盡勝妙獨出無如棱嚴茲以二記觀之非但公得棱嚴死者之妙苟不得棱嚴活者烏能即文字而離文字離文字而示手目者哉跋陸大宗伯雲居募文昔如來不舍穿針之福者良以福非積善而不成善成則性有繼矣故曰繼之者善也成之者性也即此而觀善固緣生能乘緣生而入無生何殊因花而得春哉若然則穿針之福獨非花乎今陸大宗伯養高緑野有日矣年登九十猶不以老却穿針之緣為諸緣山主敷凍雲之花香浮遐邇可謂給孤後身也嗚呼善哉跋曹溪碎鉢夫一心不生則聖凡無地物我同光是故聖人不同而此心此道未始不同也唯執情忘本乃見有不同耳老子生於佛後孔子生於老後我讀道德不見其有非佛之言我讀春秋論語亦不見有非佛之言大都聖人應世本無常心但以百姓心為心故凡可以引其為善者靡所不至譬如良醫但欲愈病參苓薑桂隨宜用之至於奇症怪疾雖砒霜蛇蝎亦所不忌其去病一也後世三家之徒不達聖人本意互相是非攻擊排斥血戰不已是何異操戈而自刃也我聞莊衢魏公本朝盛德君子妬曹溪一鉢而不能容手碎之何示人不廣若是雖然大鑒本以虗空為鉢天地萬物為鉢中之食能稻糧饑饉藥草疾疫公亦鉢中食耳安有食食食哉夫何故無能所故無能所則無待無待則獨立獨立則無生心措手之地嗚呼起公九原讀是跋寧不汗顏哉雖然且道如何是和事老人手段逆順境緣風過樹殘生不直半文錢程康伯書圓覺經跋婆伽老漢直指衆生日用熱惱為神通大光明藏十二大士曲說如來神通大光明藏為熱惱自是父子情乖聖凡路斷康伯程氏旁觀忍酸不禁於是發心手書是經積畫成字積字成章積章成帙於一剎那中圓覺成就違而復順斷而復通父子歡呼接拍承令聖凡雲集水到渠成紫柏道人適買舟於岷江之干康伯氏於神通大光明藏中拈出供養道人是時不以面受乃用背享直得文殊杜口普賢失跌況其餘乎雖然蟣蝨以頭顱為崑崙屈步以蹄涔為滄海小大無常孰得孰失書周叔宗臨帖卷禪家有離經一字即是魔說依經解義三世佛冤書家有學書而死於法者謂之奴書觀叔宗周氏臨諸家帖於縱橫變態之中法時露焉譬夫濃雲雷動之初龍雖不見頭角暫露而天機深者神而明之則龍之頭角不在叔宗筆陳而在我欲得不得之閒耳跋石屋禪師山居詩詩曰莫謂山居便自由年來無日不懷憂竹邊婆子常偷笋麥裏兒童故放牛栗蟥地蠶傷菜甲野猪山鼠食禾頭施為便有不如意只得消歸自己休夫身心者死生好惡之鵠也鵠不忘則矢不已矢不已則害我者寧有窮哉然害我者大抵不出有心無心之域故至人去此不去彼此去則彼無主矣主無而敵恣何殊矢射虗空耶故此老以消歸自己為歸宿旨哉言乎跋東坡阿彌陀佛頌豫讀東坡阿彌陀佛頌異其頌旨曉然如日出大地光無不燭奇哉長公昔人謂五祖戒公之前身不亦宜乎夫圓覺倒想初非有常倒想在諸佛即名圓覺圓覺在衆生即名倒想如衆生能善用其心孰非無量壽覺娑婆孰非蓮花淨土必曰外衆生而得佛外娑婆而生淨土此為鈍根聊設化城爾今天下請其入化城則欣然皆喜延之寶所莫不攢眉而去何耶書某禪人募刻大藏卷後夫大藏佛語也而大藏之所詮者佛心也佛語如薪佛心如火薪多則火熾薪盡則火不可傳火不可傳則變生為熟破暗張明之用幾乎息矣故傳火必待於薪而火始有用傳心必合於佛語而心始無疑我心既無疑佛心我心也佛心我心則凡有知覺者孰非佛耶雖然衆生本佛奈何日用而不知謂之根本無明辟如生盲之人出胎墮地雖長百歲終不知天地日月是何物也衆生本佛日用不知謂之生盲謂之無明不亦可乎夫生盲之人一旦得良醫抉其障翳則天地之大日月之明了然無惑矣衆生之無明若不得佛語為之金錍抉其無明障翳雖佛性本有惡能識哉如火未始不在也不得薪以傳之則火不可得而用也故曰地二生火天三成之三若不成則火雖在亦不可得而照物也如衆生正因佛性雖在不得緣因佛性熏之則了因不開了因不開則正因終不得而復矣由是而言緣因佛語也了因佛語之所詮者也正因則衆生本有之自心也自心固有不得佛語傳之了因了之自心雖固有終不能用也正如火在而不得薪以傳之火亦終不可得而用也是故有志於用自心者必先明佛語夫自心明則無往而非明矣故曰不明自發則諸暗相永不能昏而永不能昏之人始可以開物成務矣豫是知大藏一刻豈惟凡夫可以登正覺實治道中開物成務一大機也刻大藏之緣始今某將丐緣於四方馮太史跋其前豫繼太史而復跋之者蓋念聚薪不易如薪聚而火不傳者未之有也佛語宏傳而衆生不明自心者亦未之有也某行矣無滯跋法華抒海余讀戒公法華抒海至全人即法處猛覺心廓目遺妙不越粗誠非思量分別所能解也夫蓮花象也妙法意也學人能玩象得意象未始非意粗未始非妙且道全人即法時阿誰玩象咄書鶴勒那問二十二祖公案後歲在萬曆癸巳春豫客燕山碧雲寺燈下讀佛祖通感至此不覺掩卷而歎且覆而思之鶴勒往世為比丘赴飯龍宮遍觀五百衆中無一人堪任妙供故不欲諸子同赴而諸子不解師意妄生人我師則勉強狥情携之赴會既而五百弟子以福微德薄生於羽族仍感惠而從化嗚呼當為最靈之物不以智照而以情較乃為羽族而從化蓋迷極而反覺也雖然至此而覺莫若先此而覺豈不勝哉時奇子問曰鶴勒如何不知鶴衆夙因二十二祖奚獨知之曰見道則無優劣損習則有淺深以深則洞照無涯淺乃光燭有限之故又問鶴勒說法九易寒暑鶴衆卒未解脫摩拏說偈將畢鶴衆即悟無生飛鳴而去何哉曰起信論云如來色心業勝故聞法者易悟由是而觀則摩拏道力過鶴勒多矣辟如撞鐘槌大則聲洪槌細則響邇奇子聞之躍然合掌作禮跋蘇長公集大眉山凡作文作贊作偈發揮不傳之妙縱橫誕幻使入莫得窺其藩籬者蓋其所得衆生語言陀羅尼三昧於大雄氏未覩明星之前久矣故能從是處說出非來從非處說出是來從是非處說出不是不非來從不是不非處說出是是非非來長亦可短亦可高亦可下亦可淺亦可深亦可近亦可遠亦可凡其可者皆千古不拔之定見也定見如盤其語言如珠珠走盤中盤盛其珠而橫斜曲直衝突自在竟不可方所測如有生心測之者辟如以網張風以籃盛水也知其難測而甘心終不敢測者益非矣東坡氏豈三頭六臂異乎人者耶亦橫眉竪鼻無所異乎人耶但事理之障障他不得所以無不可耳又事理之障不能障他妙在何處妙在不傳也只此不傳者孔氏得之而為萬世師老氏得之而為羣有師釋氏得之而為無師之師今有人於此能知無師之師住處則不可傳之妙許渠獨得焉跋唐修雅法師聽法華經歌夫心法本妙無閒聖凡乃今在聖人則能六根互用凡夫則甘坐豐蔀之愚以為眼惟能見而不能聞耳惟能聞而不能見殊不知凡夫以遍計不了謂藤是蛇故六根似不能互用耳如遍計情消則依他本妙根塵無得能所不斷匪涉情解日用現證故曰佛法在日用處所作所為舉心動念却又不是也吾大雄氏於法華會上三周九喻橫說竪說形容妙法可謂曲盡慈腸矣然終不若是歌拈提本妙使大心凡夫一讀其歌當處現前而法華富有六萬餘言演說妙法不為不廣然皆死句也惟雅得活句之妙能點死為活譬如一切瓦鑠銅鐵丹頭一點皆成黃金白璧又如月在秋水春著花枝其清明穠鮮豈待指點然後知其妙哉書棱嚴截流後佛頂即自心自心即佛頂心頂互奪常光現前此五乳峰下鼻祖截流之機如講主以截流之筆發揮棱嚴大意開爽絶塵一歷眼根耳根洞徹夫頂既不可以眼見心又豈可以智識知哉雖然五陰十二入十八界皆頂也特頂不見頂現行忽起用處生疑逐日頂墮耳跋五慈觀閣記棗柏有言曰十世古今始終不離於當念無邊剎海自他不隔於毫端由是觀之則一念未生之時謂之宗一念既生之後謂之用故宗之與用如一指之屈伸耳指未屈伸時指在而不可以見聞得指正屈伸時指隱而不可以動靜識謂其動乎屈不是伸謂其靜乎伸不是屈屈之伸之各各獨立故正伸時屈不可得正屈時伸亦不可得正屈伸時指體不可得未屈伸時屈伸亦不可得惟知宗者可以用用宗辟指體用辟屈伸又知宗者則情出古今用用者則自他不隔然後將此愛人謂之仁將此處事得宜謂之義將此施之於上下品節有條謂之禮將此變通一切而不滯謂之智將此確然固守臨死生交易之際無毫髮苟且謂之信此五者古人用不盡今人故得用之知此則五慈之旨思過半矣雖然愛見之慈忍力之慈與夫等慈大慈皆可以義理得也唯真慈一著子苟非明悟自心不纏知見辟如葉公畫龍真龍現前未必不投筆怖走也書肇論後夫心本無住有著者情情本無根離心無地故會心者情了全性者心空心空則大用自在如春在萬物風在千林其吼喚鮮明變化之態烏可以情智倣佛者哉肇祖五論之製宗本不遷等作何異春生萬物風嘯千林矣乎既能生而能鼓之則生鼓之前必有春不可得而生風不可得鼓者存焉雖然微宗本則四論無心微四論則宗本無身夫身也者心之郛郭也心也者性之郛郭也毗舍浮佛頌跋此頌四句二十八字包括大藏透徹禪源靡不罄矣但衆生浮淺憂慮弗深立志苟且見卵而求時夜見苗而求腹果是以讀者雖多獲效則寡耳豫持此凡十五易寒暑而猶精持不休每觸逆順憎愛交加之地必以此頌為前茅覆軍殺將亦不知其幾今人持未滿千萬過遂尤其不效復求效者持之辟如掘井去土三尺而無水尋易地而掘之復無水復易之水終不得而精神竭渴終不解苟有志持此頌者能知掘井之喻而持之無懈若無靈效老僧舌根定當腐壞八大人覺經跋八大人覺經辭旨清遠如月在秋水雖至愚之人無煩指點皎然意了耳然是經去古既遠流行亦寡初因明東禪人手寫一軸東雖即世其上足世南持而示余余疾讀之不覺心開意朗既而命諸黑白廣傳之夫八覺之妙豈外衆生日用不知之知別有所覺耶如來大人憫諸不覺即將衆生日用不知之知開為八覺有緣者脫得一覺乃可以破長夜之昏矣辟分一燈之𦦨遍照世中則其靈𦦨寧有窮哉又夫人之在心猶魚之在水也魚之在水果知水乎人之在心果知心乎魚能知水則龍已人能知心則聖已故曰百姓日用而不知嗚呼人為萬物之靈生既不知所以生死豈能知所以死乎一不知則永不知永不知則無所知矣人而無知可不痛哉於是大覺聖人見而悲之曰奇哉衆生俱有如來吾已先覺彼猶不覺不覺則昏迷長夜終古不思矣是豈忍乎遂將衆生日用不知之知開為八覺雖則淺深階次所用弗同要而言之從凡入聖自覺覺他靡不滿也此經總三百七十一字言簡旨豐遮照精深有而能無無而能有能得一覺則大夢頓醒況得八覺者乎嘻覺則衆生可以作佛凡魚可以為龍也元至政閒雪庵溥大師號稱能書書此經若干卷流行海宇自元迄今本朝將三百年於萬曆辛卯四月望日鶴林蕖公偶得一卷於本寺明秀禪房憲副包公乃鐫於石以壽其傳云書寶積經偈後寶積經偈曰四大假為女其中無所有凡夫迷惑心執取以為實女人如幻化愚者不能了妄見女相故生於染著心譬如幻化女而實非女人無智者迷惑便生於欲想如是了知已一切女無相此相皆寂然是名女三昧此偈載寶積經句十六字八十辭旨朗然譬如月在天碧清光照人涼入心肺積生熱惱當處冰銷此就天機深者染目得益而言也如根器稍鈍能讀而誦能誦而思能思而用之則毛嬙西施抱身執手唼舌吮唇何殊木偶雖然女人之為害大矣漢李陵與虜戰陵曰吾士氣少衰而鼓不起者何也軍中豈有女子乎搜於匿車下皆劒斬焉明日復戰斬首三千餘級彼但畜之已毀王師必勝之氣今吾曹壞服毀容求無上道於欲而不能斷淫機綿然一旦觸境不幸與之從事不唯出苦無期如針鼻缺如石折難合靜而思之首可碎也肝可裂也心可刳也遇如斯人此觀破壞生不若死死而不生則已死而有生生必入地獄矣跋蘇東坡十八大阿羅漢頌豫讀眉山蘇軾供十八大阿羅漢頌愛其思致幽深辭氣誕幻發揮不傳之妙如月在秋水無煩指點朗然現前使人見之不覺心游象先遺物獨立也若非得無所得心者烏能致是哉然以是知黃面老人并諸尊者離是無所得心亦無別奇勝或問曰無所得心可得聞乎對曰若不可得聞而問聞者又誰耶雖然心不知心眼不見眼知此則得無所得如啞人食蜜甜與不甜豈可以口舌窮之哉書黃龍寺藏經閣毗盧佛記後毗盧遮那此言光明遍一切處阿鼻此言無閒地獄謂諸苦具黑業遍一切處此義黑白粲然舉著便疑若謂光明果遍一切處則黑業不可遍一切處若謂黑業遍一切處則光明不可遍一切處若謂兩種俱遍不相妨礙者此又不然何以故千年暗室忽然一燈暗即隨滅光遍滿故唯石頭老人謂光明中有黑業不與黑業相對黑業中有光明不與光明相對噫宗風久衰此意寂寞往往舉似龐眉老衲取胡盧而笑況黃口禪雛吾觀華嚴文殊師利教善財童子一百一十城參五十三知識雖多境緣順逆三昧無常或以殺業或以淫業如是種種作諸佛事要之皆助發毗盧光耳故頓悟石頭參同之意則阿鼻即入毗盧之門不然毗盧即入阿鼻之牖蓋一切衆生無有定性以無上知見之香熏之則諸佛光生以四弘六度之香熏之則菩薩光生以十二因緣還滅之香熏之則緣覺光生以四諦之香熏之則聲聞光生以增上十善之香熏之則諸天光生以猜忌徼福之香熏之則修羅光生以五戒之香熏之則人光生以愚癡之香熏之則旁生光生以慳吝之香熏之則餓鬼光生以十惡五逆之香熏之則地獄光生或謂六凡非光者彼未了黑業無性故也了此則飛潛橫走孰非毗盧之光哉今匡廬黃龍寺有僧謂宰官菩薩曾乾亨言曰黃龍藏經閣成未有司閣者僕欲造毗盧佛一尊以為匡廬風月主人可乎曾公曰善哉希有子既欲以毗盧圓滿之香熏一切衆生亨雖不敏敢不以文字三昧助發此光達觀道人偶讀斯文亦橫口一上見作隨喜云耳跋陳仲醇大藏閣緣起後夫以藥治病病得愈者常醫也常醫死而抄其方者偶中病愈又醫之常之常者也惟良醫則不然直以病治病此下功也如無擇病與不病聞其風而喪我者此上功也嗟乎衆生四百四病皆客病也非主病也主病特飢渴兩者耳然兩者又本於有身身本於有我我故曰聞其風而喪我者上功也若夫五伯之爭長七雄之兢雄使其果能我喪我則雄雄長長得非翦龜之毛哉我如來大人凡有所說皆喪我之前茅也若然者垂裳而天下治苟非我喪我不能焉或謂藥可以治病者我知其非良醫也讀石壁經跋萬曆歲在癸巳春余挂錫燕山碧雲柳樹菴應華亭徐太僕琰之請也燈下讀唐蘇州刺史白居易重玄寺石壁經逆思隋靜琬尊者刊石為經積盈大藏竊校優劣不勝悲惋夫重玄經惟八種而白公極廣長舌相讚之猶恨不能盡而我琬公刊大藏於石設公一登白帶則其讚歎當復何如適開侍者賫大藏自三吳來令其讀之亦不勝悲惋因囑其刊於涿鹿崖壁之上使觀者知琬公之功殆非清冕諸師可並萬一矣跋東坡油水頌薪多火多境大智大離薪離境火智無地是故達人就陰息影日中逃影離境覔智從上以來無有是處油辟本性水辟妄情火辟境智究此三者初非有一況有三乎性變為情情變為境了境須智即情逆用以功較之賞罰立焉毫釐之閒名實難負智者思之敢不力行能力行者千古旦暮眉山長公乃是其子書般若無知論後此論文致婉密理路冲遠得之於心可以達六經徹大藏旁通百氏如登妙高羣峰該覽故用之出世度越諸乘穩證自心用之經世即事即理橫拈竪弄靡不合聖帝明王之轍是真實學讀而成誦誦而味之味之精了自疑永斷取決自心不由他印也
