body:
  text: 明憨山德清閲拈古凡佛經首有此然此字之義一切人天魔外皆不能知唯洞悟自心於一切佛經通達無礙者乃知此義也由此觀之則此字是一切諸佛綱宗也苟非佛之真子決不識此字義如汾陽黃犢偈雲岩寶鏡三昧臨濟三玄三要與夫四賓主句皆此字之訓詁也邇來大人不出典刑誰舉此所以佛祖之綱宗本具在而不知耳其不知者果不能知耶特其不畏生死之苦耳如其果知生死可畏唯佛祖典刑是究則知見漸開信力漸充疑情漸破而佛祖之綱宗舉著便知矣既知之則於一切古德防間魔外之具即能舉而行之矣豈唯知之而已哉夫衆生所以不得道者別無他障不過未悟現前日用能分別好惡之心是前塵影子認為本來人此認一錯則千錯萬錯淪墜長劫皆自此起也故長沙岑曰學道之人不識真只為從前認識神無量劫來生死本癡人喚作本來人如快性丈夫窮此識神為緣境而有耶為不緣境而有耶緣境而有則此識神本自無體不緣境而有則此識神境未觸時本無窠臼而稜嚴會上佛曰一切衆生不知常住真心性淨明體用諸妄想此想不真故有輪轉稜嚴常住真心即此本無窠臼者是稜嚴用字即此認字是然稜嚴即龍樹四性開而為七處徵窮阿難而阿難雖經七處窮討其攀緣之心必無所在而阿難猶認能推窮者為心故如來咄曰此非汝心前塵相想佛可謂老婆心徹底矣然阿難執吝相想尚不肯舍至於如來飛光左右輪掌開合種種方便開曉阿難以為手有開合見無開合頭有動靜見無動靜此非即客而辨主乎客譬開合動靜見譬亭主燦如黑白而阿難猶未敢認亭主為主人確計過客是主翁是以如來假匿王觀河之見本無童髦旁啓阿難既而阿難至於認見為物如來以為阿難見精既同於物則如來見精亦物矣如來見精既同於物則阿難可見如來之見矣故曰若同見者名為見吾吾不見時何不見吾不見之處此如來以離物獨立之見示阿難悟入而阿難似未承當故如來又曰若見不見自然非彼不見之相蓋不見之相無待而獨立者也縱如來五眼且不能窺覿況阿難乎故曰吾見既非是物汝見亦非是物此離物之見非汝而誰又見若同物汝既見物物亦應見汝果如是則物我雜亂并諸世間不成安立此如來宛轉預塞阿難轉計之路使其情枯智訖攀緣心歇則即物無纍之見逈然現前矣豈阿難果有如許轉計者哉偈曰攀緣心歇見精現前一肩擔荷豈有中邊用處本空何須離根根雖不離用合本源寄根明發如來自説寄非常住即根解脫根脫塵離圓明了知舉心動念照鏡頭迷娑婆此言堪忍蓋此界衆生於八萬四千煩惱一一堪忍於心吝而不肯洗除故也若大心凡夫頓了八萬四千煩惱皆無自性則八萬四千煩惱不名煩惱而名八萬四千三昧矣於諸三昧亦能堪忍於心則名菩薩不名衆生如但堪忍煩惱不能堪忍三昧則名衆生不名菩薩也即此觀之菩薩衆生初無常位苟達煩惱無性則衆生不異菩薩於無性中橫起無明則菩薩不異衆生古德有言菩薩衆生本唯一心心迷則法法皆迷心了則法法皆了了則物我無差迷則是非橫起且道如何是了的樣子於逆境中能作歡喜想於順境中能作煩惱想此想成熟則逆順死生之機在我而不在造物矣夫瑜伽之祕密與西天初祖教外別傳之祕密大有不同而瑜伽之祕密惟佛與佛乃能知之若教外別傳之祕密無論凡小或因拈花而領悟或因棒喝而明心而悟入境界斷非未悟之人所能測知故名祕密豫以是知瑜伽之祕密在佛則顯在凡則密惟教外別傳之祕密在凡則顯在佛則密何以故蓋教外別傳之宗不惟不拘凡小即販夫竈婦一悟其宗便解橫拈竪弄大震鼻祖之風若江陵賣米餅漢及凌行婆等所謂教外別傳之祕密在此等人分上謂之直顯則可謂之祕密則不免惹他鼻笑有分在故曰如來禪許師兄會祖師禪則恐未夢見在豫故曰瑜伽祕密在佛則顯禪宗祕密在佛則密此兩種祕密苟非宗教精深者決不可鹵莽舉似有招罪咎肇論總有四篇本無則直示無生之體不遷即示物外無真般若無知則無所不知無所不知所以知無知也不真空則無物不真無物不真物果真有哉涅槃無名所以即名本無名也然四論分門交相發光照我日用逆順之衝愛憎之口可意則心竅發悅不可意則毛孔生煙故曰一念瞋心起百萬障門開然此障謂從境生耶謂從心生耶若從境生境本無知安能生障若從心生境若不觸心非有障推之於境境生無理推之於心心生無理心境既皆無理凡謂從境生障從心生障從非心非境生障此皆情之橫計非達理之見也故讀此論者由讀而誦由誦而持持則精精則入神入神則根境若片雪之投紅爐我欲不化安可得哉果能至此方不負立言之心授言之慈也然後本無即不遷不遷即般若無知般若無知即不真空不真空即涅般無名涅槃無名即不真空不真空即般若無知般若無知即物不遷物不遷即本無頭而尾之尾而頭之縱亦可橫亦可交錯亦可分條亦可可不可不可無不可夜光在盤宛轉橫斜衝突之際豈可以方隅測哉但不出盤我則不疑也洞微如知此則異日作吾道金湯舍子而誰歟洞微勉之恰恰用心時恰恰無心用無心恰恰用常用恰恰無此四句乃是大師悟心之後消融習氣實效也前兩句謂調心之功貴在血脈不斷後兩句圓續本脈有恰恰用心無恰恰無心用則不免粘帶故也蓋妙性獨立坐斷兩頭血脈綿然廓爾虗融習氣任運而消真體無心而契任運而消習忘而本無功無心而契體證而本無得無功則無修無得則無寄無修無寄口挂東壁且道説甚麼法細聽年年三月裏鷓鴣啼處百花香此皆大師親曾踐履過來的光景故其吐辭渾璞不辭圭角模寫自受用境界何其切哉且道如何是血脈瞥起便是傷他無念佛即受殺傷殺之際血脈斷矣此箇竅子須是見地潔淨保任不虗觸著自知痛癢讀永嘉集示衆信心銘曰境由能境能由境能欲知兩段原是一空此四句只是一句一句了徹大事了畢若人果能了知能外境而不有我日月熾然分別之心即大智也果能了知境外能而本無則目前千差萬別之境一真獨露也夫兩段無常雖真不有一真隱顯兩段舒卷諦了無疑何貴何賤用處昭然生殺萬變殺則黃金失色生則瓦礫生光明暗相參權屬主張即言而了假名曰教即了通言假名為宗宗教如花春在何處待汝思量殘紅滿地有人喪妻者夢其妻求破地獄偈覺而求之無有也問薦福古老云若人欲了知三世一切佛應觀法界性一切唯心造此偈是也遂舉家持誦後見亡者寶衣天冠縹眇空中稱謝而去軾聞之佛印禪師佛印聞之范堯夫豫讀東坡書破地獄偈語恨其舌相不甚廣長吐偈意未盡嗚呼此偈豈特破地獄哉自地獄至餓鬼餓鬼至畜生畜生至人人至修羅修羅至天天至聲聞聲聞至緣覺緣覺至菩薩菩薩至佛是凡是聖一破無遺矣或謂地獄餓鬼畜生破則不疑至破人天及界外四聖恐不當理對曰四聖六凡雖染淨不同然皆念後事耳如曹溪問惠明不思善不思惡是阿那箇面目明言下大悟遂嗣曹溪能於曹溪句中有箇入頭方知破地獄偈是斬佛劒且道劒柄只今在誰手裏一念不生沈死水六根才動犯波濤聖凡路斷翻身處生殺那知在斗稍大智發於心於心何處尋成就一切義無古亦無今此四句偈事理不成就即是文殊根本智普賢差別智一部華嚴經盡具其中誦之者多能生慧何以故大智根本智也大智發於心理成就矣然智既發於心則心已化而為智更從何處覓心若心有可覓則是心能見心無有是理故曰於心何處尋也無處尋即所謂無依也大智無依則橫無外橫無外則橫無待矣無待之智非理不成就乎理不成就則不礙事而事成就故曰成就一切義雖能成就一切義而無古無今則事又不成就矣無古今無所住也無住故竪無外竪無外則竪無待矣此偈是南安巖嚴尊者為侍者而作侍者前生為牛以馱磚造寺功德獲報為僧苦無聞性誦此偈久聞性豁然而開一切經書遂能記憶故名此偈為智慧偈以誦之者多能發慧故也魏府元禪師曰佛法在日用處行住坐臥處吃茶吃飯處言語相問處所作所為處舉心動念又却不是也芙蓉育老行食龐居士擬接芙蓉却縮手曰生心受施淨名早訶去此一機還甘否老龐曰當時善現豈不作家芙蓉曰非關他事老龐曰食到口邊被他奪却芙蓉乃下食老龐曰不消一句達觀只今問諸善知識且道芙蓉老龐雙鏡交光之際機鋒捷出又如夜光之珠橫斜衝突於金盤之中卒難捉摸謂其東突忽復北突謂其中轉忽向西行是舉心動念耶不舉心動念耶若謂舉心動念魏老又道不是佛法若謂不舉心動念芙蓉老龐又非土木偶人有人直下揀別得出達觀當身為床座供養伊若揀別不出饒你芙蓉老龐復生雪屈也須捺下雲頭聽達觀處分始得古人一機一境有縱有奪有生有殺故曰我與汝同條生不與汝同條死且道同死同生作麼生會咄雙鏡交光休擬議法輪大轉食輪中東坡贊法偈以意為根四句云法塵是五塵落謝影子意根所取非有實境何以故蓋明了意識有初中後三分初分近前五識猶屬現量中分是六識正位屬比量後分近七識屬非量唯五識所取為現量為真境若六識既非現量不過五塵之影耳故曰法塵以佛為體佛是覺義現量所得在境為真境故曰法身永明云初居圓成現量之中浮塵未起此即法身也後落明了意根之地外狀潛形外狀即浮塵所謂法塵也昔龐居士見馬祖頓融前境前境既融非法身而何故偈云風止浪靜也然法身離法塵無別有故又曰水無別水也放為江河用則兼善也是大乘菩薩之作用非止自利兼亦利他且流通不滯也滙為沼沚不用則獨善也是聲聞小乘之法止於自利而已豈有及物之功用乎風止浪靜浪即前七箇識也八識規矩云淵深七浪境為風是也一喚回頭識我不依稀蘿月又成鈎千金之子才流落漠漠窮途有許愁天童此頌凡留心玄學者或喜其明白現成本無奇險或鄙其粘皮帶骨流墮識情殊不知劒無利鈍藥無貴賤聶政專諸用之立斷君相之命扁鵲華陀用之談笑中可以起死回生苟非其人雖莫耶善劒不若鋤钁之利腐草之效也於是感而重頌之頌曰牛頭南馬頭北覿面相逢還不識鄰寺金剛哭甚哀東村大姐呌冤屈若道豫此頌與天童本無差別然領會天童頌子則不難領會豫頌吾知趙州復起妙喜再生恐亦摸不著在況其下者乎若道豫之頌子與天童大別然天童亦頌此則因緣豫亦頌此則因緣豈一則因緣而有兩意耶諸兄弟這兩箇頌子若揀點不知好惡且謾道會禪也自佛教東來方外高賓方內勝士簧鼓其道者代不乏人惟東晉潯陽廬山東林遠祖憂深而慮遠所見卓然以為僧而不知其宗俗而不知其化則宗化混淆俱無所主乃撰在家出家宗化之所以然垂諸萬世使奉法之徒各知方向若揭日月於中天震雷霆於大夢有目者孰不覩焉有耳者孰不聞焉然而近世在家出家者有至死而不聞其篇目況其義乎嗚呼去佛既久魔強法弱邪説橫行正言蕪沒豫每思至此不知淚之所從也姑命奇郎先録在家出家論傳示有志於吾道者究心焉老氏曰天地不仁以萬物為芻狗聖人不仁以百姓為芻狗夫芻狗之為物也其未陳也錦繡以飾之音樂以獻之及其已陳也或棄之道塗或充之釜竈而已矣金剛般若經曰若有我相人相衆生相壽者相則非菩薩又曰若見衆生有可度者即是我相人相衆生相壽者相以此觀之則天地以萬物為芻狗聖人以百姓為芻狗非不仁也不仁也者特無我之異稱耳聖人豈不知芻狗束薪為之哉復以錦繡文之者以其無用而用也夫無用而用物無而用不無物無而用不無雖天地之大萬物之衆未始有物也知其未始有物而天地之用不無萬物之用競足此非無我相無人相無衆生相無壽者相而度生之用常然者安知不仁之仁仁大而無外者乎皖山永嘉並得教外別傳之妙貴在坐斷語言文字直悟自心而信心銘證道歌則千紅萬紫如方春之花果語言文字耶非語言文字耶有旁不禁者試道看雖然花果礙春乎花如礙春春則不花可也知礙而春必花之則春之癡矣春而不癡花果礙春哉如此則語言文字與教外別傳相去幾許無從而來蓬蓬如雷藉虗能遊觸物生號鼓萬物而有聲無形去來了無其蹤號之曰風然不免生滅故非真風也夫真風者不藉空而能遊不觸物而能鳴本無去來豈有生滅靈山拈之頭陀微笑迦葉呼之阿難應諾當面蹉過剎竿倒却以至鼻祖西來神光立雪少室風生玉樓起粟欲求安心心不可得斷臂胡為鮮血狼籍流入曹溪曹溪為碧天童頌而無聲三祖言而無語信心銘作虗空蟲蛀自是真風大扇智火熾然無論有心無心是凡是聖觸之則燒却面門背之則凍殺法身使能言者卷舌有智者成愚儒失所以為儒老失所以為老何其禍及自家念一聲佛者直須漱口三日此皆真風鼓舞所致也天童頌曰一段真風見也麼綿綿化母理機梭織成古錦含春象無奈東君漏泄何此頌翻騰家聲有損有益有雌有雄化真風而成古錦騾糞拈來換人眼珠好心不得好報雪裡送炭反道增寒達觀道人忍酸不禁口占一偈一段真風見也麼綿綿化母理機梭織成古錦含春象無奈東君漏泄何又有旁不禁者進曰此是天童頌老和尚何故白日青天之下驅耕夫之牛奪飢人之食和尚曰我也不管他天童不天童且道老漢鼻孔在甚麼處道不出且禮拜吃茶去再來真風中雌黃別白未晚知三合而有鳴五合而有聞則根塵之搆不待蕩洗而後除也故曰知之一字衆妙之門古之至人有以眼觀音聲耳視色相即遠示近即塞示通山壁可以直度虗空可以遊行無他道也其始不過知有待迷無待而成耳有待即無待也既知之矣復能行之故有待漸生無待漸熟熟則化化則同所以能於遠中示近塞中示通也拈東坡鐘銘迷性而為情則油水莫辨即情而悟性始知油水不可以同住同住水見火則起油見火則湛然湛然者可與火一一則無敵所以油不知火火不知油油火不相知而始能相為用水則與火不一矣所以見火則起耳火喻誘情之境水喻染境之情油喻了境之智然外境則情不生外情則智無地夫情與智初非兩物以其被境所轉名之為情了境非有名之為智是以智情同住如油共水情觸境則奔流莫返智了境則能所無生故智恆與理一情恆與理乖如油恆與火一水恆與火乖乖則成敵敵必有勝負如水不勝火則終必負敗而起矣即此而觀外境則無理外情亦無智學者知此便會老龐日用事無別頭頭自偶諧也老龐初發身於火宅沈家財於湘水妻子團圞共鍛無生根塵蕭然轉識成智生死大事一生了拔推其所由亦不過了達前境無性根識蒂脫乘理治情逆順無間動止一如知得徹行得到自然臨臘月三十日一家大小並應念而化宜其然矣如東坡作油水偈勝妙精絶非聞道而勇於行者不能也故有志於了辦生死者長公之偈不可不留意焉拈東坡油水頌洞山曰貪瞋癡太無知果賴今朝捉得伊行即打空即槌分付心王仔細推無量劫來不解脫問汝三人知不知神鼎曰貪瞋癡實無知十二時中任從伊行即往坐即隨分付心王無可為無量劫來元解脫何須更問知不知這兩頌有人愛洞山日用之間境緣逆順鍛鍊自心鉗鎚猛密有人愛神鼎真到大休歇處咳唾掉臂戲笑譏訶無非解脫三昧達觀老漢現前問汝大衆汝道洞山鼻孔神鼎腳根在甚麼處汝敢胡亂揣摩殊不知神鼎不打洞山爐鞴中陶鑄來安得便恁麼自在洞山不打神鼎見地上得箇消息從汝朝即打暮即槌敢保貪瞋癡直待驢年也未調伏在汝等若揀別得出許汝會如來禪若祖師禪猶鄉關萬里若要會祖師禪須把洞山神鼎置向腦後自家面前尋一條轉身路頭始得故曰只是舊時行履處相逢舉著便淆訛奇男子家本來鼻孔撩天腳跟點地為甚麼如作賊人常自心虗偶被人按著便愁贓物無地藏去若是良人家男女從他千搖萬撼自然不生虗驚心安如海為甚麼得如此穩當蓋渠從來不竊他人物故比來去古轉遠大人不出法道凌遲大可怖畏無論黑白或於經論上覔得些知見葛藤內惹得些臊氣自謂我已見徹佛祖源底便乃向無佛處稱尊有一等瞎公雞隨聲晝夜忽然撞箇本色人輕輕一拶便七荒八亂理會不下又不能直下生大慚愧悲泣自訟反於本色人分上生大我慢結死冤讐只今之世如此等流十人之中到有五雙老漢所謂作賊人心虗殊不知此等事如來謂之一大事因緣祖師謂之向上事苟非夙具靈骨有段英雄氣宇豈易荷擔近有一等杜撰禿奴拍盲居士以昭昭靈靈日用現成者領會得即謂之徹了何不自家向冷靜處細細檢點一上我之貪瞋癡種子果拔耶未耶果貪瞋癡即戒定慧耶老漢雖不與他共住然其果肯檢點決知他心上亦有不安處在只是被眼前虗名浮利籠了故甘昧心不肯向人露布醜處我且問汝一千七百則葛藤雖是古人殘羮餿如果能則則無疑還有則把未徹耶若有則把未徹且向洞山神鼎頌子裏尋箇轉身去為甚麼如此只為自家面前不解得箇轉身路頭少不得教汝依門傍戶去雖然如是殘羮餿飯飢者亦可點心大衆珍重華嚴經曰如是自性如幻如夢如影如像悉不成就直言諸法如幻學者皆知之惟言自性如幻雖久醉於義海者未始弗疑也又不知痛癢而不疑者則疑之者必非不疑者所能知焉而洞了自性已到不疑之地者此真不疑者也真不疑者佛祖尚畏之況其餘乎圓成匪幻依他無地依他匪幻遍計無從遍計匪幻依他匪伏依他匪幻圓成曷契余以是知理不成就則隨緣之用不廢事不成就則衆生復性不難也豫讀端師子戒壇示沙彌偈不覺長歎久之大都土無肥瘦水無清濁農人勤勞真實做去瘦地亦自有收漁人耐煩守去清水亦自得魚因想海東曉公來中國求法夜宿渴甚顧傍有一泓掬而飲之甘涼異常明日視之乃髑髏坑也正噦間忽自悟曰一心不生萬法無咎遂還日本疏華嚴圓覺等經大行於世又鳩摩羅什五六歲時隨母舉佛鉢竊念曰我身甚小佛鉢甚大不覺失聲下鉢母問其故對曰適我生心鉢有輕重一法既爾萬法皆然夫復何疑今之學者未見知識法師先自疑曰此善知識果能開悟我否此法師果能教我否此戒師果自己持戒清淨否嗚呼君子吹毛求善小人吹毛求疵而求善之心不若求疵之工此等器量做世間好人尚做不得況為如來子乎端師子偈曰登壇受具戒第一莫疑師摘取果子喫莫管樹橫枝拈讀端師子偈吾讀法華經知得六根清淨者則眼見三千大千之色耳聞三千大千之聲鼻嗅三千大千之香舌嘗三千大千之味身覺三千大千之觸意洞三千大千之法若掌中見果也雖然吾知而未得用者六根未清淨耳如一清淨則現前矣何疑哉於戲此用人誰不有以見思覆之塵沙蔽之故不現前如見思斷而塵沙空心如軒轅之鏡十方通徹自證之矣豈待人言之乎東坡觀世音贊曰衆生墮八難身心俱喪失惟有一念在能呼觀世音火坑與刀山猛獸諸毒藥衆苦萃於身呼者常不痛呼者若自痛則必不能呼若其了不痛安用呼菩薩衆生以二故一身受衆苦若能真不二即是觀世音八萬四千人同時俱赴救解曰夫一身之微八難頓集則難存而身心俱喪可知矣然身心俱喪而能呼觀音者身耶心耶是身是心則難存而身心已喪久矣非身非心則知痛而能呼觀世音者果有痛乎果無痛乎有痛則身與心未嘗喪也無痛則身與心未嘗不喪也難者當即身心而推其痛復離身心而推其痛於即離離即之間往返觀察推究一旦察著痛處則果有痛果無痛自知不煩求觀音覔痛所在耳東坡此贊妙密超詣豈魯直少遊輩所能倣佛哉豫觀天童頌洞山病中機緣頌雖妙然不若此贊四稜踏地也頌曰放下臭皮袋拈轉赤肉團當頭鼻孔正直下髑髏乾豫曰髑髏不乾則鼻孔不正鼻孔不正則箭鋒相值之機自然鈍置不少矣又解云自難字至種種觀察皆比量也東坡此贊但於盎生注中頭一難字若不忽略著力觀察則東坡贊自然有入直下髑髏乾即智訖情枯之謂也活人髑髏與死人髑髏初無有異但活人髑髏情識未枯智趣未忘謂之臭髑髏死人髑髏以其情智俱枯古人謂之金剛髑髏即法身之謂也蓋情智既枯則我忘我忘則無物非道故曰道遠乎哉觸事而真聖遠乎哉體之即神者體字即比量也神字即現量也痛咀嚼之韓大伯點雪竇偈曰一兔橫身當古路蒼鷹才見便生擒後來獵犬無靈性空向枯樁舊處尋香巖曰動容揚古路不墮悄然機今有人以一念不生為佛喜怒未發為中此所謂枯樁舊處尋者也能舉一而反諸則明暗動靜通塞恬變合離生滅俱未形時若不是佛是中則一精明分成六和合翻成外説矣故有隔壁聞叉釧聲者曾亦得入即此言之則六塵皆韓大伯之古路也即六塵而不粘六塵者即韓大伯之兔也臨濟用其機而變其名則曰諸人赤肉團上各各有一無位真人於六根門頭放大光明照天照地自汝諸人不能薦得如上諸語皆古德禪老抖擻屎腸為黃口禪雛説老婆禪也如其本分為人露一些子不得何以故佛祖命根斷故況熱腦衆生耶故曰法堂前草深一丈良不我欺拈韓大伯點雪竇公案永嘉證道歌有曰但自懷中解垢衣誰能向外誇精進此兩句歌賺殺天下人不少非永嘉之咎也人自咎耳故看教與參禪雖皆是勝事脫打頭不逢作家教眼却被義理塞殺禪心即被野狐涎塗抹了殊不知凡尚義理古人謂之所知愚凡染野狐涎古人謂之識解依通蓋尚義理情終不枯一不枯一不涉文字義理問答處便茫然不知雌黃如陳摻問雲門曰教意則不問如何是教外別傳意門曰教外別傳則且置如何是教意摻曰黃卷赤軸門曰此是能詮之文如何是教意摻曰口欲談而辭喪心將緣而慮忘門曰口欲談而辭喪為對有言心將緣而慮忘為對妄想如何是教意摻茫然不知答門曰聞尚書善解法華經是否摻曰不敢門曰經云治生産業皆順正法且道今非非想天幾人退位摻愈茫然門訶斥而去以是摻重發心參禪請以雲門作用觀之則永嘉但自懷中解垢衣誰能向外誇精進豈陳尚書獨不解此兩句耶如果解了如何見雲門如木偶人相似蓋此公義理窠臼不先踢翻却被跛足阿師踢翻了直得無坐地處此所謂貪觀江上月失却手中橈即識解依通雖稍活潑初非義理窠臼可以埋沒得渠然謂之識解此是依通之信非道通之信也依通之信説時似悟觸境必迷譬如汞銀觸火不得一觸火便飛去矣道通之信則不然如迦那提婆以舌辨困外道外道弟子恨婆困其師一日婆經行林間外弟子以利刃決提婆腹曰汝以舌困吾師我以刀困汝汝復能神乎提婆春然受之而且種種安慰教誨之提婆腸胃委地弟子驚號而至提婆誨曰彼自壞善根耳與我何預但悲其忿毒所燒終必墮苦我心果不瞋其所害則其墮苦之苦終當代受之更以甘露洗其腸胃我心方安噫婆之照用豈尚義理之講師野狐涎之宗所能較其雌雄者哉又有所謂講道學者更不若講師與野狐禪矣故曰一盲引衆盲引得衆盲入火坑豫故曰永嘉此兩句歌賺殺天下人不少雖然若是作家此兩句歌亦是殺人劍活人劍耳夫華嚴之小根法華之退席一者以為華嚴攝機未盡則謂之未暢本懷一者以為法華之退席即華嚴之小根也惡得獨以華嚴為不圓而法華獨圓乎哉於是兩家之徒宗清涼者遂以法華為未圓宗天台者又以華嚴為未圓吾則紿之曰果以華嚴為攝機未盡爾時佛説大經除諸大菩薩之外猶有八部等衆以宿世曾植圓因故亦得聞毗盧之音敢問復除異類聞經之外更有餘衆生不聞華嚴乎如有之何獨小根不聞經遂謂之攝機不盡耶又以法華之退席為不圓者敢問除退席之下尚有餘衆生不聞法華耶如有之則華嚴之小根未必非圓也聞者無以應吾復諭之曰若知之乎華嚴無小根則圓能縛矣法華無退席則妙能滯矣惟圓而帶小妙而帶愚始見華嚴之圓非圓也法華之妙非妙也故曰證圓覺而住持圓覺者凡夫也欲證圓覺而未及圓覺者如來也知此則知天台清涼矣聞者罔措而退華嚴曰如是自性如幻如化如影如像悉不成就真如之性本自圓成不覺而動隨緣流轉故理不成就依他遍計即無自性故事不成就事理俱不成就所以理障事障皆不煩化而並消事理障消聖凡莫測故本色人拈頭作尾以尾作頭而頭尾端整生殺自在也我讀法華經囑纍品不覺涕泗橫流也何故法華之妙至妙也衆生之粗至粗也以至妙之法欲至粗之衆生各各領解在大菩薩猶難焉故如來囑其弘法曰纍之者誠然也法華云開佛知見其旨本自明白初無玄妙若以玄妙求之則佛知見便不明白了蓋佛意即衆生日用不知之知開佛知見知見既開則眼見色耳聞聲鼻嗅香舌嘗味身覺觸意攀援無往而非佛知見也豫以是知衆生於佛知見中開衆生知見諸佛於衆生知見中開佛知見耳以此觀之諸佛衆生元無定體顧其所開知見何如耳無盡意疑音聲可以耳聞而此菩薩於一切音聲以何因緣獨用眼觀耶佛答無盡意但言一切衆生受諸苦惱時一心稱呼觀世音觀世音即時觀一切稱呼之音聲而衆生皆得解脫無盡意即曉然領解不疑衆生以耳聞音聲則物我亢然故八難交臨衆苦齊劫劫我者謂之能我受其劫謂之所所以根境搖蕩業火焚燒究其所自以耳為聞聲之地音聲為耳識之牽引故曰境有牽心之業用苟能以眼觀聲則根無所待而境無能待作是觀時不惟衆生菩薩窩白盡翻實乃凡聖路窮苦樂根拔然此等作用非知解邊事所以遇緣觸境無分逆順皆我入路之楷梯也阿難以無著名心有四重過當因成假時已説不得無著剎那而相續剎那而相待至於相待假時已離不著三重矣於熾然有待之后而曰無著豈非四重過乎夫待三合而執有鳴五合而執有聞此衆人也廢三而執無鳴廢五而執無聞亦衆人也惟三五合而不執有三五廢而不執無者此非衆人之所知也豫讀東坡法雲寺鐘銘大悟語言三昧陀羅尼蓋一切文字語言皆自心之變也知其自心之變則合三而有鳴合五而有聞廢三而無鳴廢五而無聞譬如畫水成文成文水也不成文亦水也合心也廢亦心也既皆是心豈有心取心乎心舍心乎知其如此可以為詩可以為歌可以為賦可以悲鳴可以歡呼文字如花自心如春春若礙花不名為春花若礙春不名為花惟相資而無礙故即花是春也花可以即春塵亦可以即根矣豈根獨不可以即塵耶根既可相即又獨不可以互用之耶銘曰耳視目可聽鳴寂寂時鳴大圓空中師獨處高廣座臥士無所著人引非引人二俱無所説而説無説法法法雖無盡問則應曰三汝應如是聞不應如是聽又此數句共六十字字若譬花句即春也句若譬花義即春也義若譬花理即春也理若譬花心即春也然坡公此作文嚴義精苟非識妙者直以為紙花耳何春之有蓋坡翁以為吾所以得悟六根互用之義六塵皆道之妙苟微三合之鳴五合之聞推至於三五合而無鳴無聞者終不可得也故鐘以師名酬其德也有師而無座有座而不高廣何以大稱大則無外無外則臥士不可得矣此舉鐘而略撞非略之也實攝之也故撞有士之名而無士之實也如奪情不盡則至理終不精徹以人奪師士矣師士奪而人不奪猶未臻妙又繼而奪其人矣三者互奪則用存而功忘矣夫用存則情見自枯功忘則義路自斷義路斷而情見枯得全我性命之微豈昧三五而執鳴執聞者之所能也豫初曰讀東坡鐘銘而大悟語言三昧陀羅尼者非綺語也非妄語也有能讀豫文而知東坡作銘之意則豫又大圓師之仲弟也拈東坡鐘銘
