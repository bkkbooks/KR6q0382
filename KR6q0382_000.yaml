body:
  text: 紫柏老人集序匡山逸叟憨山釋德清著太虗寥廓長風鼓而萬竅怒號殊音衆響皆一氣之所宣又奚可以大小精粗謂靈根之有間哉惟吾佛以不思議智流出一切音聲陀羅尼故世諦語言皆悉顯示第一義諦若夫塵説剎説熾然説即水流風動皆演圓音況宇泰定而照羣情觸境而發無思而應若谷響者乎是以從上諸祖證無師自然智者即揚眉瞬目怒罵譏訶莫不直示西來大意又豈可以識情語言而擬議其形容哉故達磨西來不立文字而曹溪則有壇經及二派五宗雖直指向上然皆曲為今時或上堂入室示衆舉揚機如雷電凡垂一語必輯為録大槩聊爾門頭若大慧中峯至我明楚石皆其類也蓋借語傳心因言見道言其所絶言耳今去楚石二百餘年有達觀禪師出當禪宗已墜之時蹶起而力振之得無師智秉金剛心其荷負法門之志如孛陵之血戰縱張空拳猶揮駐日雖未犁庭掃穴而一念孤忠與囓雪吞氊者未可以死生優劣議也真末法一大雄猛丈夫哉然師賦性不與世情和合至老見客未效一額手雖未踞華座竪槌拂然足迹所至半天下無論宰官居士望影歸心見形折節者不可億計以自性宗通故隨機之談如千鈞弩發應弦而倒無非指示西來的意稱性衝口曾無刻意為文也一唾便休弟子輩筆而藏之者什一師初往來於金沙曲阿之間與于王賀氏諸君子大有夙緣所聞最多如庵居士于公執侍甚謹得片言如寶隻字不遺凡隨師杖屨者必搜而得之師每至匡廬必主於江州孝廉邢君來慈長松館多有所説師化後併屬弟子仲櫜潤甫結集成帙豫久沈瘴海適為師了末後因緣之雙徑先過金沙之東禪二公以豫與師為法門深契故出其稿稽首請校而梓之豫三讀其言喟然而歎曰嗟乎末法降心力生死之根如一人與萬人敵者豫獨見師其人也覩其發強剛毅勇猛之氣往往獨露於毫端如巨靈揮斤真所謂與煩惱魔欲魔死魔共戰竟能超越死生如脫敝屣可謂戰勝有功者也故其所吐豈可以文字語言音聲色相求之者耶佛説欲為生死根師凡所舉必三致意痛處劄錐直欲勦絶命根即此可當金鎞矣又何庸夫門庭施設哉昔覺範禪師妙悟超絶語工典則其所著述自自之曰文字禪故豫題之曰紫柏老人集蓋非墮於俗數也觀者當具金剛正眼視之於言外則思過半矣時天啓元年歲在辛酉春王上元日書於匡山五乳峰下木石庵中紫柏大師集序莊生曰卜梁倚有聖人之才無其道吾有聖人之道無其才夫聖人矣又何才與道之別曰苟非其人道不虗行才者人也豫嘗披歷代祖圖於少室其人無不魁傑有奇表心竊異之既而遇紫柏大師見其旋尺之面合圍之腰坐若熊蹲行如象步士大夫得晉接者不言而意已消學徒瞻依者未施棒喝而魂慮已懾與向所見圖中諸宿若或睹之蓋真其人哉神廟戊子己丑間大師駐錫吾地與先正陸莊簡公先師馮具區先生深談不二因築精舍舍於稜嚴廢址時灌莾極目而大師説法如雲如雨東南淨信聞風趨向施物填委無何杞梓丹青峩峩暉煥不啻還舊觀而已大師偕高足開公創列規條期為百世之守江以南海以北諸剎不啻纍百而稱清規楚楚遵蹈不踰尺寸者必首稜嚴也大師涉濤江禮育王躋雪棧瞻峨嵋躡冰壑朝五頂足迹遍天下而後之京輦以弘法故示滅圜扉所被顯晦大小鈍敏諸機益廣而語言亦益散落其所説法觸著信口所録以示人拈著信手絶組絍蹊線之迹而波瀾橫溢起沒自在吞天沃日之勢日澎湃於方幅之楮也近代未見其儔求之於古妙喜幻住庶或近之金沙于潤甫大夫赤心自行混俗而扶大教宛古淨名龐蘊之流其於大師參領最深契誼最篤遇所攄撝輒録藏之逮乎歸寂聞有手筆落人家者不遠千里必力致之二十年餘裒然成大帙矣近則謹書精刻以寵同學既而又幡然曰大師生平所棲託注念無如稜嚴所發弘願無如方册法藏為第一事剞劂之役近在雙徑去稜嚴不五六舍是録宜歸稜嚴俾模印以行稍取其直以資刻藏於大師寂光土中必所欣也且弘法維人稜嚴主者白法師為大師克家之子興廢舉墜靡不殫力是録宜并入荷法擔中乃以今上崇禎辛未嘉平月舁板於堂白法師受之馳告於豫豫曰大夫之意良矣嘗試與子爇一片檀詣大師影堂相對翻閲告語之意必有浮於紙墨之上者言誠可味人誠可追也是以吾貴其合且也大師之言行則於法得其綱骨大師之願滿令佛菩薩之言盡行則於法徹其源底不可謂非佛日崦嵫時弩力魯陽之戈也師與吾輩其必勉之無負大夫無負大夫就李竹懶居士李日華沐手撰書大師應機説法隨緣拈舉不假安排俱從第一念中流出惟期與人共明此事原無意於文字語言凡所開示人者即令其人代書書畢隨手携去大師未嘗再一寓目故其中意旨或多重復即纍字疊句亦復不少惜當時未有專掌書記者微言妙義散於四方多矣茲集僅得之吳江周子介九江邢來慈同邑王仲韜三人所録大同小異不肖與二三友人虗心參訂疑者姑闕方敢授梓其他散佚不能一一訪致凡我同學思報法乳之恩普慈航之濟有藏片言半偈不憚遠頒並收集中以續傳燈實法門之一快云時天啓丁卯秋弟子三炬盥手謹識紫柏大師集跋自法席久塵祖燈無𦦨求其擔荷大法振揚宗風摧情魔於百戰枯識海於千流者有明自楚石以後惟有紫柏大師一人而已大師洞徹自心皎皎孤映語言文字從心光中自然溢出一經拈指本妙見前至其慈悲熱腸淋漓痛切無非欲學人積劫無明當下冰銷究此一大事因緣耳噫初祖不立文字直指人心大師不離文字亦指人心其揆一也烺嘗見侍者握管旁立大師衝口而出侍者奮腕疾書猶苦不給一紙既盈復易一紙如泉噴地琅琅不停自非見地圓明了無凝滯曷至此乎噫有文字有未始有文字學者繇文字悟未始有文字則妙膳上味人人充滿如但作文字會也何異指饌説飽豈療枵虗雖然凡心未鐍聖解難窺即請於大師日用著眼集中拈出毗舍浮佛一頌謂包括大藏透徹禪源持此凡十五寒暑而精虔不休自云每觸逆順愛憎之境必以此頌為前茅覆軍殺將亦不知其幾矣噫了徹如師而猶堅鋭猛決若此此所以孤風絶侶佛意祖髓在在逢源也即晚寄圜中灑然夷適死生利害如撼空虗照用之妙前齊古德矣夫人人本有心光不知照用以致墜失而大師慈憐迫切代為指授片語單詞皆拭垢還光之助於此逗得消息方是紫柏兒孫至利根男子略沾涓滴立見風湧雲蒸騰驤變化超然默契逈絶意言即一部語録無隻字可得矣亦菴先生數載討論獨任流布使紫柏心光如日華月彩注射千古先生之光豈不交映互攝融成一片乎弟子賀烺熏沐拜書紫柏老人集目録卷之首像贊塔銘附圜中語録卷一之十法語卷之十一釋心經釋金剛經釋稜嚴經卷之十二釋毗舍浮佛偈釋八大人覺經釋十二因緣八識規矩卷之十三緣起疏卷之十四序記文卷之十五題跋卷之十六拈古卷之十七贊卷之十八頌古卷十九之二十偈卷之二十一雜説字説卷之二十二雜記解易銘傳卷二十三之二十四書卷二十五之二十八詩卷二十九藏本三十卷即此本首卷圜中語也歌大師自題這個阿師心直口快走遍天下圜中自在萬曆壬寅夏日題於赫山會延慶寺之慈標明年癸卯冬果圓寂圜中前知其明驗云弟子三炬盥手拜書紫柏大師像贊法界網裂其維不張適生大師力振其綱踞獅子窟斫栴檀樹奮迅未伸爪牙已露擊塗毒鼓釃甘露漿飲之者醉耳之者狂寂滅性空轟霹𮦷舌奔雷捲電觸者褫魄以大地心竪金剛骨眼裏有筋胸中無物臨濟不死黃蘗猶生誰知大師不受其名大方闊步不存軌則翻身擲過須彌峰一拳槌碎無生國憨山德清贊山陰錢伯子持達觀大師小影索豫為贊時豫正病劇抽思未能信口作禪語貽之呵呵呵這就是達觀昔日鬚鬢猶存今日眉毛不換相對依然慈容悲願人傳此老示寂圜中却在這上頭舒來卷去一從方便欲識師真於此窺他顏面雖然也祇得一半若欲全彰連這焚却方得相見何以故大明國內著不得這漢豫晤師在癸巳歲金陵賀氏園中為駕部郎時乃豫請見固有年矣憶先於比部瞿洞觀太常傅太恆二君共介其徒以往到而復却凡幾度策馬空歸二君遂不復言求見而豫意未已至是晤焉師鬚鬢不剪頂著樵巾體幹豐偉坐立如山晦翁所謂其人皆魁岸雄傑者是已相見慈容滿面權然如故室中有數輩儒衣冠者握筆沈思肅如試舉豫坐定侍者設席豫前具筆伸紙豫問故曰請與諸子同作稜嚴經中某四句講義或偈亦可豫唯然受之不為異隨與大師論他義一二轉未竟師輒呼侍者曰周老先生面前紙筆徹過又論一二轉師曰硬掙也硬掙頃之侍者持客刺來報乃鴻臚覺齋徐公一徒起曰老師今日體倦徐公見可俟他時某請回之便欲趨出師曰不可到即請見徐公向日與豫求見師知不可得每偵豫所至則尾之故今刺得入以豫有人在門刺得至師前以豫有人在室其徒請命以豫在座不然恐師皆無由知矣是日與徐公共午齋而散明日天始辨色街鮮人行乃余衙有叩門者詢之為師二徒余出迓言大師且來謁少選手持拄杖濶步長趨數徒擁掖而至盤桓至暮始別時從行有周叔宗賀知忍餘名氏已忘從行者曰大師從未謁人以是施君異數也余竊歎是時胸中尚未盡穩商量不得徹底嗣後欲載證無緣可恨人言師奇怪余具覩如此奇耶易耶凡初見作難意皆諸徒所為豫以目擊徐公一節可推雖然即師何病世界不寬時人眼孔不大竟莫容此老或以其入都門為病而悲願深遠殆不可測余為錢子題贊詞更為敘相見始末且更噓唏及此云丙午臘八日剡城周汝登伏塊敬書開脫空口東語西話以慈悲法盲拳瞎罵冷面熱腸蓮花一社冷債熱還竹篦草下鳥去遺音香飛落灺真箇達師僧繇難畫余久向紫柏師辛丑入都而師住西山欣然欲以瓣香見之會同學數友皆短師心疑而止後讀其遺言審其生平真證密行深慈高節一時叢林踞師席者誠罕其比然猶惜師不早去終以及禍非明明哲之道及見吳咸熙氏所寄示遺像味其自贊語類讖者豈師固夙知若二祖師子尊者耶常不輕菩薩見人禮拜稱汝等皆當作佛人乃相趂打擲呵詈之袁景倩言一國中有狂泉人飲皆狂獨國王汲井以免而通國狂者覆以王為狂也相與捽縛燒灼不勝苦趍飲其泉狂作國人喜謂王病已也始捨之紫柏視衆人為佛不得不度衆人視紫柏為狂不得不死於乎何足恨哉丁未正月上浣日會稽陶望齡敬題飛揚鬚眉頭顱禿豎眼控拳坦胸腹顛翻神妙智具足天龍人鬼俱降伏聲搖山嶽納空谷拔劒虎丘埋天目八面威風畫一軸六六原來三十六寓生黃汝亨贊高挂兩眸頽然雙頰河漢為口風雷為舌汲汲波波濟度人大扣小扣俱不竭忒慈悲忒豪賢愚終古無休歇那辨侯王與宰官少不省時加棒喝恁般熱腸難打疊這打疊不可説休問紙上人試看徑山碣長水弟子李培敬題存日門庭峻厲沒時棒喝交加一念常觀自在天堂地獄無差人説因緣果報我説本分作家祇有逆來順受從他幻影空花長水姚士慎敬題昔先莊簡法門金湯博求龍象為法津梁既遇吾師曰真法王皈依參請篤老皇皇忠得夤緣巾瓶侍旁昏衢智燈苦海慈航世間父執出世導師近之則畏遠之又思創見則詫即之轉慈揭示道要能覺我迷我於彈指悟昔之非舍海認漚乃今始知因師知佛因佛知儒靈明廓徹乃有階梯師曰咄咄階梯非是腳下承當舉足便至每惟深慈感激涕泗法乳難酬有死無二豈期緣深躬承師逝嗟乎哲人不可思議戒慧之光遇緣益熾遊於福堂作大法施歷諸苦惱意地寂然既展王法曰了夙緣合掌跏趺隻履翩翩六日牢戶露地風塵屹峙如山光溢於顴西原夏瘞淫潦成川傾城漂舍激蕩靡堅意此土封雨齧風穿南遷啓龕載覿師顏相好莊嚴儼若生前聞古賢聖去來如意定慧力故結成舍利入火入水色身不壞不圖愚蒙覩此奇異允若師言驗瞑目地非肉身佛豈能若是陸基忠敬贊紫柏尊者達觀可大師像贊有大醫王治癡暗病入泥入水拍拍成令喚醒夢宅接續慧命為法忘身高提祖印香光居士董其昌贊不妄視眼不壞不妄聽耳不壞不妄言舌不壞不妄動身不壞不弄精魂不揑怪這回方驗真持戒要與人天插箇標何妨地獄還些債咄債已還有甚待端端坐待老憨來打破從前舊皮袋一道神光火電飛風流鐵漢今疏快聞聞居士陳繼儒贊達觀大師塔銘夫大地死生顛瞑長夜以情關固閉識鎖難開有能蹶起一擊而碎之掉臂而獨往者自非雄猛丈夫具超世之量者未易及也歷觀傳燈諸老咸其人哉久不復作頃於達觀禪師見之矣師諱真可字達觀晚號紫柏門人種尊者重法故也其先句曲人父沈連季子世居吳江太湖之攤缺母夢異人授以附葉大鮮桃寤而香滿室遂有娠師生五歲不語時有異僧過其門摩頂而謂其父曰此兒出家當為天人師言訖忽不見師遂能語先時見巨人迹下於庭自是不復見師髫年性雄猛慷慨激烈貌偉不羣弱不好弄生不喜見婦人浴不許先一日姊誤前就浴師大怒自後至親戚婦女無敢近者長志日益大父母不能拘嘗有詩曰屠狗雄心未易消年十七方仗劒遠遊塞上行至蘇州閶門天大雨不前偶值虎丘僧明覺相顧盻覺壯其貌知少年不羣心異之因以傘蔽之遂同歸寺具晚飱歡甚相得聞僧夜誦八十八佛名師心大快悅侵晨入覺室曰吾兩人有大寶何以污在此中耶即解腰纏十餘金授覺令設齋請剃髮遂禮覺為師是夜即兀坐達旦每私語三歎曰視之無肉喫之有味時覺欲化鐵萬斤造大鐘師曰吾助之遂往平湖巨室門外趺坐主人見進食師不食主問何所須師曰化鐵萬斤造大鐘有即受食主人立出鐵萬斤於門外師笑食畢徑載回虎丘歸即閉戶讀書年半不越閫嘗見僧有飲酒茹葷者師曰出家兒如此可殺也時僧甚憚之年二十從講師受具戒嘗至常熟遇養齋翁識為奇器留月餘之嘉興東塔寺見僧書華嚴經乃跪看良久歎曰吾輩能此足矣遂之武塘景德寺掩關三年復回吳門一日辭覺曰吾當去行腳諸方歷參知識究明大事也遂杖䇿去一日聞僧誦張拙見道偈至斷除妄想重增病趍向真如亦是邪師曰錯也當云方無病不是邪僧云你錯他不錯師大疑之每至處書二語於壁間疑至頭面俱腫一日齋次忽悟頭面立消自是凌躒諸方嘗曰使我在臨濟德山座下一掌便醒安用如何如何過匡山窮相宗奧義一日行二十里足痛師以石砥腳底至日行二百里乃止師遊五臺至峭壁空巖有老宿孤坐師作禮因問一念未生時如何宿豎一指又問既生後如何宿展兩手師於言下領旨尋迹之失其處師至京師參遍融大老融問從何來曰江南來又問來此作麼曰習講又問習講作麼曰貫通經旨代佛揚化融曰你須清淨説法師曰只今不染一塵融命褫師直裰施傍僧顧謂師曰脫了一層還一層師笑頷之遂留挂搭時知識嘯巖法主暹理諸大老師皆及門去九年復歸虎丘省覺乃之淞江掩關百日之吳縣適聊城傅君光宅為縣令其子利根命禮師子不懌子一日搦二花問師云是一是二師曰是一子開手曰此花是二師何言一師曰我言其本汝言其末子遂作禮之天池遇管公東溟聞其語深器之師因拈薔薇一蒂二花問公公曰此花同本生也師分為二復問公公無語因罰齋一供遂相與莫逆時上御極三年大千潤公開堂少林師結友巢林戒如輩往參叩及至見上堂講公案以口耳為心印以帕子為真傳師恥之嘆曰西來意固如是邪遂不入衆尋即南還至嘉禾見太宰陸五臺翁心大相契先是有密藏道開者南昌人棄青襟出家披剃於南海聞師風往歸之師知為法器留為侍者凡百悉委之郡城有稜嚴寺為長水疏經處久廢有力者侵為園亭師有詩吊之曰明月一輪簾外冷夜深曾照坐禪人志欲復乃屬太宰為護法開公力主其間太宰公弟雲臺公施建禪堂五楹既成請師命一聯師曰若不究心坐禪徒增業苦如能護念罵佛猶益真修謂當以血書之遂引錐刺臂流血盈碗書之自是接納往來豪者力拒未完局後二十餘年適太守槐亭蔡公竟修復蓋師願力所持也師見象季法道陵遲惟以弘法利生為家務念大藏卷帙重多致遐方僻陬有終不聞法名字者欲刻方册易為流通普使見聞作金剛種子即有謗者罪當自代遂倡緣時與太宰光祖陸公司成夢禎馮公廷尉同亨曾公冏卿汝稷瞿公等議各歡然願贊佐命弟子密藏開公董其事以萬曆己丑創刻於五臺屬弟子如奇綱維之居四年以冰雪苦寒復移於徑山寂照庵工既行開公以病隱去其事仍屬奇協弟子幻豫本公本尋化復請淡居鎧公終其役始司成具區馮公意復化城為貯板所未克初桐城用先吳公為儀曹郎參師入室從容及刻藏事師遽曰君與此法有大因緣師化後吳公出參浙藩進至方伯竟復化城且蠲俸散刻藏數百卷固吳公信力亦師預讖云師先於嘉禾刻藏有成議乃返吳門省前得度師覺公時覺已還俗以醫名師聞之意行度脫時夜覺飯盂忽墮地裂其精誠所感如此乃詐病於小舟中命請覺眕視覺至見師大驚懼師涕泣曰爾何迷至此耶今且奈何覺曰唯命是聽師即命剃髮竟載去覺慚服願執弟子禮親近之師初過吳江沈周二氏聚族而歸之時至曲阿賀孫二氏率族而禮至敬之至金沙于王二氏合族歸禮愈益重師於于園書法華經以報二親顏書經處曰墨光亭今在焉師以刻藏因緣議既成聞妙峰師建鐵塔於蘆芽乃送經安置於塔中且與計藏事未偕復之都門乃訪豫於東海時萬曆丙戌秋七月也是時豫以五臺因緣有聞於內因避名於東海那羅延窟適遇慈聖皇太后為保聖躬延國祚印施大藏十五部皇上頒降海內名山敕僧諷誦首及東海豫以謝恩入長安師正擕開公走海上至膠西值秋水泛漲衆度必不能渡師解衣先涉疾呼衆水已及肩師躍然而前既渡顧謂弟子曰死生關頭須直過為得耳衆心服師時豫在長安適師弟子于君玉立來訪言師已東行計其程旦夕乃入山期也豫聞之亟促裝歸日夜兼程亦犯橫流趕至即墨時師已出山在腳院詰朝將長發是夜一見大歡笑明發請還山留旬日心相印契師即以豫為知言許生平矣師返都門復潭柘古剎乃決䇿西遊峨嵋由三晉歷關中跨棧道至蜀禮普賢大士順流下瞿塘過荊襄登太和至匡廬尋歸宗故址唯古松一株為寺僧售米五斗匠石將伐之適丐者憐而乞米贖之以存寺迹師聞而興感其樹根底為樵者剝斫過半勢將折師砌石填土呪願復生以卜寺重興兆後樹日長寺竟復其願力固如此時江州孝廉邢懋學禮師延居長松館執侍最勤師為説法語集名長松茹退先是鄒給諫爾瞻丁大參勺原素雅重師意留駐錫匡山未果遂行過安慶時有江陰居士趙我聞謁見不可適阮君自華歸心於師因為居士先求得度未許阮君請遊皖公山馬祖庵師喜其境超絶即屬阮宜建梵剎居士懇乞出家遂剃髮於山中詺名曰法鎧是為淡居其庵今蒙敕賜佛光寺師復北遊至石經山晉琬公慮三災壞劫正法浸滅乃石刻藏經安於巖穴師見而感之時琬公塔院被力者侵師志復之啓石室佛座下得函貯佛舍利若干出時光燭巖壑適聖母聞師至命近侍陳儒致齋供特賜紫伽黎師讓之謝曰自慚貧骨難披紫施與高人福更增因請佛舍利入內供三日出帑金重藏於石窟師重二事思得豫作記適豫聞師西遊回即馳至京候於上方兜率院師拉豫遊觀石經遂記之豫回寓慈壽師感遇亦出山見訪同居於西郊園中對談四十晝夜目不交睫信為生平至快事時遍融老已入滅因吊之有嗣德不嗣法之語師在潭柘居常禮佛後方食一日客至喜甚誤先舉一食乃對知事曰今日有犯戒者命爾痛責三十棒輕則倍之知事驚不知為誰頃師授杖知事自伏地於佛前受責如數而股如墨乃云衆生無始習氣如油入牢不可破苟折情不痛未易調伏也師與豫計修我朝傳燈録豫約師往濬曹溪以開法脈師先至匡山以待時癸巳秋七月也越三年乙未豫初以供奉聖母賜大藏經建海印寺成適以別緣觸聖怒詔逮清下獄鞫無他辭送法司擬罪蒙恩免死遣戍雷陽毀其寺時師匡山聞報為豫許誦法華經百部冀祐不死即往探曹溪回將赴都不救豫聞豫將南放遂待於江滸是年十一月方會師於下關旅泊庵師執豫手嘆曰公以死荷負大法古人為法有程嬰公孫杵臼之心我何人哉公不生還吾不有生日豫慰之再三瀕行師囑曰吾他日即先公死後事屬公遂長別豫度嶺之五年庚子上以三殿工下礦稅令中使者駐湖口南康守吳寶秀不奉令劾奏被逮其夫人哀憤繯死師時在匡山聞之曰時事至此倘閹人殺良二千石及其妻其如世道何遂䇿杖越都門吳入獄師至多方調護授吳公毗舍浮佛半偈囑誦滿十萬當出獄吳持至八萬蒙上意解得末減吳歸每念師輒涕下師以豫未歸初服每歎曰法門無人矣若坐視法幢之摧則紹隆三寶者當於何處用心耶老憨不歸則我出世一大負礦稅不止則我救世一大負傳燈未續則我慧命一大負若釋此三負當不復走王舍城矣癸卯秋豫在曹溪飛書屬門人之計偕者招師入山中報書直云捨此一具貧骨居無何忽妖書發震動中外時忌者乘白簡劾師師竟以是罹難先是聖上以輪王乘願力敬重大法書金剛經偶汗下漬紙疑更當易亟遣近侍曹公質於師師以偈進曰御汗一滴萬世津梁無窮法藏從此放光上覽大悅由是注意適見章奏甚憐之在法不能免因逮及旨下云著審而已及金吾訊鞫以三負事對絶無他辭送司寇先是侍御曹公學程以建言逮久在獄與師問道有圜中語録時執政欲死師師聞之曰世法如此久住何為乃索浴罷囑侍者小道人性田曰吾去矣幸謝江南諸護法道人哭師叱之曰爾侍豫二十年仍作這般去就耶乃説偈語在録中言訖端坐安然而逝曹公聞之急趨至撫之曰師去得好師復開目微笑而別時癸卯十二月十七日也師生於癸卯六月十二日世壽六十有一法臘四十有奇噫師生平行履疑信相半即此末後快便一著上下聞之無不歎服於戲師於死生視四大如脫敝屣何法所致哉師常以毗舍浮佛偈示人豫問曰師亦持否師曰吾持二十餘年已熟句半若熟兩句吾於死生無慮矣豈其驗耶師化後待命六日顏色不改及出徒身浮葬慈慧寺外次春夏霖雨及秋陸長公西源欲致師肉身南還啓之安然不動適豫弟子大義即奉師龕至經潞河馬侍御經綸以感師與李卓吾事心最慟因啓龕拂面痛哭之至京口金沙曲阿諸弟子乃奉歸徑山供寂照庵以刻藏因緣且推沈中丞重建大殿乃師遺命以師臨終有偈云怪來雙徑為雙樹貝葉如雲日自屯以是故耳時甲辰秋九月也越十一年乙卯弟子先葬師全身於雙徑山後適朱司成文寧公禮師塔知有水亟囑弟子法鎧啓之果如言復移龕至開山乃與俗弟子繆希雍謀得五峰內大慧塔後開山第二代之左曰文殊臺卜於丙辰十一月十九日茶毗草三日歸靈骨塔於此豫始在行間聞師訃即欲親往吊因循一紀未遂本懷頃從南嶽數千里來無意與期會而預定祭日蓋精神感孚亦奇矣師後事豫幸目擊得以少盡心焉於戲師生平行履豈易及哉始自出家即脅不至席四十餘年性剛猛精進律身至嚴近者不寒而栗常露坐不避風霜幼奉母訓不坐閾則盡命立不近閫秉金剛心獨以荷負大法為懷每見古剎荒廢必志復始從稜嚴終至歸宗雲居等重興梵剎一十五所除刻大藏凡古名尊宿語録若寂音尊者所著諸經論文集皆世所不聞者盡搜出刻行於世晚得蘇長公易解大喜之室中每示弟子必令自參以發其悟直至疑根盡拔而後已然義重君親忠孝之大節入佛殿見萬歲牌必致敬閲曆書必加額始覽師於陽羡偶讀長沙志見忠臣李賁以城垂陷不欲死於賊授部將一劒令斬其全家部將慟哭奉命既推刃因復自殺師至此淚直迸灑弟子有傍侍者不哭師呵曰當推墮汝於崖下其忠義感激類如此師氣雄體豐而面嚴冷其心最慈接人不以常情為法求人如蒼鷹攫兔一見即欲生擒故凡入室不契者心愈慈而恨愈深一棒之下只欲頓斷命根故親近者希淒然暖然師實有焉師性耽山水生平雲行鳥飛一衲無餘無住足地居常悲禪宗凋敝欲求國初來諸尊宿機緣續為傳燈未遂本願賫志而往於戲師豈常人哉即其見地直捷穩密當上追古人其悲願利生弘護三寶是名應身大士豫嘗有書答故人問師何如人豫曰正法可無臨濟德山末法不可無此老也師每慨五家綱宗不振常提此示人豫嘗歎曰綱宗之不振其如慧命何原其曹洞則專主少林溈仰圓相久隱雲門自韓大伯後則難見其人法眼大盛於永明後則流入高麗獨臨濟一派流布寰區至宋大慧中興其道及自國初楚石無念諸老後傳至弘正末有濟關主其門人先師雲谷和尚而典則尚存頃五十年來獅絃絶響近則蒲團未穩正眼未明則妄自尊稱臨濟幾十幾代於戲邪魔亂法可不悲乎豫以師之見地足可遠追臨濟上接大慧之風以前無師派未敢妄推若據堯舜之道傳至孔子孟軻軻死不得其傳至宋二程直續其脈以此證之則師之不忝為轉輪真子矣姑録大略以俟後之明眼宗匠續傳燈者采焉以師未出世故無上堂普説示衆諸語但就參請機緣開示門人緝之有集若干卷梓行於世入室緇白弟子甚多而宰官居士尤衆師生平行履不能具載別有傳乃為之銘銘曰佛未出世祖未西來擊塗毒鼓誰其人哉鷲嶺拈花少室面壁只道快便翻成狼籍黃梅夜半老盧竊逃誰料嶺南有此獦獠南嶽青原擦膿涕漢多少癡人被他誆賺五家手快如撫舜琴南熏倐至辨者知音兒孫惡辣觸者先亡但放一線其家永昌門戶孤單命存一絲有救之者定是嫡兒如漢張良為韓報仇縱然國破宗祧可求是生吾師如石迸笋出則凌霄孰知其本為法力戰通身汗血大似李陵空弮不怯身雖陷虜其心不亡千秋之下畢竟歸王師金剛心盡化為骨逼塞虗空豈在山麓師不知我誰當知師一死一生春在花枝時萬曆四十四年嘉月朔旦前海印住山沙門辱教德清稽首撰祭文維萬曆四十四年歲次丙辰十一月庚子朔越十有九日丙戌前海印沙門辱教德清謹陳香積之供致祭於紫柏尊者達觀大師之靈曰嗚呼惟師之生也不生乘願力而來師之死也不死順解脫而去去來不落常情生死豈同世諦以師之住世也秉金剛心踞堅固地三十餘年家常茶飯脊骨純鋼千七百則陳爛葛藤鼻孔殘涕推倒彌勒釋迦不讓德山臨濟為人極盡慈悲臨機絶無忌諱誓護法若惜眼睛求大事如喪考妣不與世情和合便是真實行履晏坐水月光中獨步空華影裏初訪豫於東海也頓脫形骸既再晤於西山也搜窮骨髓當豫禍之未形也備告之以隱微及豫難之既發也將為我以雪洗且酬夙約於曹溪將扣閽於帝里冒炎蒸於道路兮望影響而進止乃設法以多方冀出豫於九死嗚呼師之為法門也實抱程嬰杵臼之心師之為知己也殆非管鮑陳雷之比豫荷皇仁之薄罰兮師之心猶未已豫被放嶺表兮師佇候於江沚一見歡若更生兮如九原之復起豫與師作永訣兮甘為炎方之厲鬼師囑豫以寧志兮冀幽扄之再啓豫揮涕以臨長路兮師執手含悲而不語維時關山一別兮日月若矢心知師之不我忘兮每叮嚀其無以師以願力所持兮誓不負其本始乃斂太阿之光焰兮不顧放身於塵滓冀和璧之必信兮不惜隋珠之輕抵將扣君門兮九重倐遇飈風兮四起陸海波騰龍蛇披靡玉石俱焚法幢傾圮師登八道之康衢兮忽遇長蛇與封豕皇天實鑒其衷兮唯見逞於庸鄙幸此心之白兮聊以發其蘊底師實曠然何憂何喜逆順隨宜死生遊戲何夙負之相尋兮信前緣之固爾師悲五濁之不堪直一行之可恃乃盥潄以趺坐兮遂寂然而長往矣嗚呼痛哉師既不以禍患攖寧又何以去來為事故撒手便行全無擬議惟師以金剛為心故留不壞之體有豫弟子奉師以南旋兮就雙徑以歸止豫聞訃以摧心兮望長空而殞涕欲親禮於龕室兮奈業繫之羈縻擬生還以慰師靈兮忽星霜之踰紀匪此心之暫安兮第因緣之不我與頃幸遂其本懷兮始得陳辭而致誄嗚呼痛哉師何死兮我何生我不來兮師不寧形骸異兮共此心幽冥隔兮終合并誓同歸兮踐深盟寂光朗兮師安住我頂禮兮展哀慕陳香積兮灑甘露師臨機兮願來赴光明兮照曜翹勤兮延佇哀哉尚饗舉火性火真空性空真火狹路相逢定沒處躲恭唯紫柏尊者達觀大和尚偶來人世誤落塵寰赤力力脫盡娘生布衫光爍爍露出本來面目荷擔正法純鋼煉就肩頭徹底為人生鐵鑄成肝膽死生路上直往直來今事門頭半開半掩六十餘年松風水月襟懷千七百則兔角龜毛拄杖饒他末後風流未免藏頭露尾撇下贓私誰料落在憨山道人手中今日特為人天衆前當陽拈出大衆還見麼以火把畫相云拄杖挑開雙徑雲通身涌出光明藏珍重諸人著眼看這回始信無遮障紫柏大師全身舍利塔頌有序一切宗教不離七佛偈以為根本最初毗舍浮佛偈云假借四大以為身心本無生因境有只這半偈已將三藏十二部五千四十八卷千七百則葛藤滿口道出更無覆藏悟之者號祖師禪證之者即如來果紫柏大師持此半偈普印衆生若干種心四十年脅不至席手不停揮為初學人談法相義為久習輩開般若門為利智根指涅槃心顯法界藏有時雷轟電掣截斷衆流有時帶水拖泥四輪著地隨機赴感未曾一針鋒許出得半偈道場謂法友憨山師道吾持此偈已得句半現前更得半句了了常知自許一生參學事畢後十餘年師以佛知見力慈善根力向刀山劒嶺任運遊戲自在神通戒定餘熏生身不壞可謂空假泯合心境一如用四大分解之塵根演半偈重玄之妙旨毗浮舌相遍覆三千持與持者同時寂滅誰謂師非七佛所遣化人廣瀹覩面緣慳聞名種熟清淨明誨私淑有年甲寅秋仲卒業遺教增上聞思雖漩澓驚濤目不得暇而王印在手斗柄當天行布圓融莫不消歸半偈獨恨未能將此半偈枯禪消歸自己長為窮子辜負婆心聊作頌辭充窣堵波最下劣供七金山下羽毛有同色之奇兩足舌端毒藥化醍醐之味以此善根自熏成種或者他生後世不煩半偈阿師眉毛墮地矣頌曰四大是假亦是真心境不二亦不一兼二為一一亦亡即假悟真真乃遍髮毛爪齒及涕唾暖氣動轉諸浮根我説即是金剛王幻化空身皆實相地水火風和合聚明暗色空相待搖識心吸攬鏡上痕若虧其一必無兩十方三際本虗玄無相無名無有邊一切時處入一塵半偈重重羅帝網紫柏得此三昧門從大涅槃示生死來以口光説半偈風林墻壁皆雷音缶瀉雲興文字禪一一衆生毛孔吼去以身光説半偈常與無常俱戲論了知假合即堅固皮囊劫火恆宴然於去來中逆順行夢入他心令覺夢悲智交參禪教律發揮半偈無有餘巍巍雙徑窣堵波師坐其中熾然説佛偈即師師即偈遍在衆生心想中我從遺編獲髻珠不歷百城持供養傳師半偈即傳衣一切如來同鼻孔萬曆丙辰季秋七日皖舒私淑小子廣瀹優婆塞吳應賓和南謹述紫柏老人圜中語録序圜中語録録紫柏道人居圜語也録語者浙西吳生彥先也彥先儒者何慕為此耶吾儒宗孔孟輒云闢佛老非惡其道之盡非也惡溺於非者相率而至於滅倫畔道也苟可以性靈廓聞識補吾聖教所不及者即伶人𭒀婦之辭昆蟲草木之變無往而非道稗官博士往往不棄至采之聲歌以備覽觀矧吾儒與二氏分馳鼎立於當代哉昔韓昌黎稱一世大儒力排異説原道一篇凜凜乎與日月爭烈及居潮時貽大顛書纍幅至留題留衣又何兩截也彼其所以非之者非其流於邪者也所以是之者是其近於正者也故曰通於儒者始可與談佛老矣紫柏道人字達觀早失恃怙草歲出家不識文字立禪三年苦行持戒一旦頓悟藏典羣書了然領會雲遊遍天下脅不至席者三十年像若彌勒心若寒潭聲若洪鐘口若懸河靜慧玄朗名傾海內薦紳貴倨每折節下之道人內大慈悲外嚴戒律世擬為臨濟尊宿復出云於人無貴賤大小持平等心待之故賤者小者喜其容貴者大者目為傲得其門而入者靡不歸依不得其門而入者間為排詆道人故以此得名亦以此賈禍道人自謂有義命存焉吾不知有名實也吾不知有禍福也此可以槩其生平矣歲庚子玉芝子與南康子同繫福堂間談名理南康子喜誦佛經豫獨不喜誦佛經每嘲云即心是佛耶即口是佛耶南康子未與道人面而心嚴事道人筆札相往來嘗出其觀音贊示豫兩人相賡和道人有當於心也因了戒子寄豫茶貽豫半偈豫酬和之又為豫作石佛渡海記語語皆明心見性又贈茶扇香花四偈各有唱和恨不一見以償夙心無何訛言搆大獄興蔓延善類中外震悚道人亦以罣誤下於理兩人幸相見之晚也道人拷訊時神色自如持議甚正以衰老殘軀備嘗笞楚抵死不屈有烈士風時嚴寒道人且凍餒豫施一盂飯一蒲團一衲衣道人晝夜跏趺不寐環匣纍繫者扣之隨人啓迪無非接引向善不勦空談幻語惑人宜當代賢豪樂與之遊甚廣也癸卯十二月初五日入獄十七日無疾坐化壽止六十一先是道人授彥先偈若預知其將化者又與豫論朝聞道章甚有解脫處化之日説偈若干首至五鼓語人以圓寂人莫解天明戶啓呼薑湯淨口作念佛聲出門就地坐衆驚扶坐榻上閉目不語衆走報道人逝矣豫往視之大呼道人去得好記著麼道人復張目視豫自啓手扶兩足跏坐而逝舁出間地經六晝夜旋風曝日陰翳嚴霜飛沙落垢摧折備至儼然端坐神采煥發現光明狀豫與圜中人靡不目擊歎異焚香頂禮佛聲浩浩及埋瘞土穴中七越月啓骸南遷幻身如生不毀世未曾有此平湖陸西源親歷其事者吁異哉豈其巨靈呵護抑道人自護有神歟江南士人某等嘉其神異治龕藏魄歸葬初修山寺中道人逮繫彥先始終周旋曲至復手録圜中問答語偈以授舊遊者自謂於道人有夙緣乞豫一言敘之豫惟佛氏不立文字此録不足為道人有無生死一大事乃前知其故至滅不亂性留不壞身蹤迹昭然靈異如此此非修持於一世者可得而驟至也又豈末世緇流所能倣佛其萬一也哉玉芝子湘源曹學程撰紫柏老人圜中語録示潭柘寺僧衆水緣濕燥山以高崩此有因所致為福致殃為惡致祥此何因耶因自多生凡夫不覺耳老朽出山山門無恙欲不待請主先往焉彼必以餘事纍汝等姑待之汝輩遇境慎勿驚以因不屬汝輩故也雪寒蔀屋亦不惡鑊湯爐炭苦痛呻吟總是意樂三昧不信請於老朽瞑目地驗之被逮答檀越達朽既被逮已有世智辨聰輩憤然謂余曰和尚厭離塵界宜翛然無纍何載遭白簡猶戀戀京師致今日之苦耶曰檀越以何物為塵界何物為苦乎深山大澤虎豹龍蛇居焉蛇虎未嘗不苦人也然探淵者則得珠鑿山者則獲璧是見珠璧之為利未嘗知有龍蛇虎豹也吾諸大乘沙門以利濟為事方冒難以救援安知塵勞之可出無上大寶失之於窮子方矢浩劫以追求烏知分段之可惜特患衣珠之喻未喻耳不患衣之頻易也朽乘此解脫其軀殼豈但解脫鶻臭弊衣乎內衣之珠不假外得夫何苦哉檀越言苦異乎朽之為苦矣與曹直指夜談曹直指舉蘇長公羅漢贊曰右手持杖左手拊石為手持杖為杖持手宴坐石上安用杖為無用之用世人莫知尊者曰入道之機機則透微微透則手杖皆離故曰離微入道之真機直指曰東坡東坡手杖如何有時用也有時捨作甚麼尊者曰撑天拄地先以欲鈎牽後令入佛智此維摩詰所説也圖難於其易為大於其細此老氏所説也皮毬子以二氏之説觀其所以然不過至人照圓衆人照偏偏則泥圓則通既謂之通矣則事無大小理無淺深聲入而心通矣奚疑之有哉雖然理通始於檢名故名不檢則實不得實不得則義不精義不精則理不易窮理不窮則性命之學安從而入歟故有志於性命之學者倘不知自重而飲食男女之欲亂其真即世間功名事業尚了不來況大於此者乎萬曆庚子師寄圜中南康子吳中石佛贊云獄室名福堂檢名實自詳因苦生覺照覺則物我忘今所説似重拈此義也弟子李麟記示吳彥先觀夫名利之來非無所本也若以四大觀身前境觀心則身與心何殊焦穀芽石女兒哉以衆人不知此觀不醉乎名則醉乎利矣殊不知緣名利而逆觀乎身心緣身心而逆觀乎身心之前者名耶利耶身耶心耶吾不得而知也示郢中仇文學咄咄胡為睡螺螄蚌蛤類一睡一千年不聞佛名字此偈釋迦老子為弟子阿那律陀正聞經時貪睡交眼警其昏惰而説也嗚呼五欲之重莫重於睡故睡重者雖西施唼其唇春雷奮乎地不知聲色為何物夫聲之與色此衆人之常習也及乎睡而聲色當其前有眼不見有耳不聞由是觀之則睡酒之醉人較其餘醉其芘大矣故曰昏魔不斬散魔不召而集蓋昏之與散必根乎念念必根乎感知念根感念本無我我既無我則受感者誰知屬觀無受屬止觀足以鑄昏止足以汰散昏鑄則明散汰則靜明與靜固有之性德也以性變而為情昏散生焉若然者明非固有昏則無源靜非固有散亦無地衆人不知以昏散明靜為兩物所以情之復性卒不易也警大衆皮毬子曰時不可忽一忽時則昧心心昧則何事不昧哉由忽生怠怠習一長則氣為主心為奴矣故臥薪嘗膽非虗設也謂勾踐能之我不能此不知自重耳若知自重則天地萬物皆末也我本也雖然性既變情則自無待而為有待有待則物我亢然順習則喜逆習則瞋此情為政而性隱矣性則智周萬物而不勞形充八極而無纍故能會萬物為一己一己則己外無物物外無己以物外無己故我用即物用也以己外無物故物用即己用也知周不勞形充無纍復何疑耶經又曰若能轉物即同如來由是論之我能轉物謂之如來則我被物轉謂之如去如去即衆人也如來即聖人也聖則無我而靈凡則有我而昧昧則忽時忽時之人憂不深慮不遠不知自重耳人為萬物之靈而不知自重皮毬又何言哉師別號皮毬十一月二十九日被逮別潭柘寺偈寒潭古柘映青蓮野老經行三十年留偈別來衝雪去欲乘爽氣破重玄出潭柘示僧衆偈達觀老漢出山去堂內禪和但放心頭上有天開正眼當機禍福總前因臘月初五日從錦衣衛過邢部偈大賈闖入福堂來多少魚龍換骨胎恐怖海中重睡穩翻身驀地一聲雷聞柝匿王問法忽齊年自謂觀河不見遷我有眼根聽夜柝却沈豐蔀更冷然柝聲未斷鈴聲續誰是聲兮誰是聞却憶法堂鐘鼓候古來魂夢更紛紜同曹侍御諸文學集吳彥先夜談白法剖微塵翠濤生咽唾何妨真與俗兩采夜深賭一見原來是故人同心何必在同身者條擔子誰輕重兩道眉毛綽有神傾蓋白頭匪兩人祇緣岐念總同身兩間擔子誰堪任箇有生來一點神曹和示吳彥先江南知識隔風塵獨影那從暗地親長嘯一聲空界裂誰知針芥在羇人羇人敢必全無罪要識生機即死機破死生原一貫羽還走也足還飛相逢不必問前因藻鏡離塵萬象新花果故園應自好溪聲山色總宜人日高三丈尚憨眠絶勝雲林鼻觀禪却被頭陀間擾醒夢魂無地更留連寄示法密閻羅可是執金吾火鑊冰山事有無試問密郎何所解區區六尺等交蘆色空偈示楊中涓間居徒自伴花眠誰謂花神解説禪空色兩關留不住春風幽鳥領三玄添數珠偈一線穿珠百八偶然一珠墮落何須物外追尋即把覺迷添著臘月十一日司審被杖偈三十竹篦償宿債罪名輕重又何如痛為法界誰能薦一笑相酬有太虗坐來嘗苦虱侵膚支解當年事有無可道竹篦能致痛試將殘䏶送跏趺十四日聞擬罪偈夙業今緣信有機南中蓮社北圜扉別峰倘有人相問師子當年正解衣憶介公誰能念爾衝寒去傀儡提撕豈有神長別莫談身後願好從當下剖微塵憶卓老去年曾哭焚書者今日談經一字空死去不須論好惡寂光三昧許相同十五日法司定罪説偈一笑由來別有因那知大塊不容塵從茲收拾娘生足鐵橛花開不待春十六日臨化説偈事來方見英雄骨達老吳生豈夙緣我自西歸君自北多生晤語更泠然南北經行三十年鈍機仍落箭鋒前此行莫謂無消息雪夜先開火內蓮盡稱達老鼓風波今日風波事若何試向明年看老達風波滿地自哆和潭柘雙青謾説龍相依狴犴更從容主人歸去香雲冷好臥千峰與萬峰幻骨吾知無佛性從來稱石總虗浮夜深寒照吳門月翻笑生公暗點頭幽關寂寂鎖難開那道沙門破雪來飢鼠何妨霑法喜凍膿早許委黃埃夙願平生未易論大千經卷屬重昏怪來雙徑為雙樹貝葉如雲日自屯啓龕須記合龕時痛癢存亡爾即伊不必燕雲重眷戀此身許石肯支離山鬼不必賽水神胡可解枯木冷重雲獨見田侍者人生那忽死死者生之府法門何所聞付諸塗毒鼓讖所知手字致江南諸法屬等各各自宜堅持信心老朽休矣不得載見特此為別付與小道人持執示覽護持三寶稜嚴徑山刻藏事可行則行不可則止癸卯年十二月十六日不少事鉛槧從諸名賢遊即聞紫柏尊者德風籍籍以為肉身大士竟愧火馳方內無從快覩劫外青蓮也壬寅歲彥罹白簡逮繫比部獄明年癸卯冬聖上以姦書震怒大索國中而尊者以弘法來忌亦挂彈章比聞難一衆股栗而師從容笑語如平時乃以佛法開譬僧衆夷然出山赴詔獄無何入西曹彥幸獲歸依焉初聞師嚴冷不易親及見則深慈等悲沁人心髓彥因炷香求心要師為拈毗舍浮佛半偈云假借四大以為身心本無生因境有令久久持誦且為決了其旨曰是身無從合由四大是心無從起因前境試推四大及境更何所從乎凡夫不知性變為情之旨隨情起執生死浩然聖人以理折情性斯復矣性復情空何生死之有哉彥惟時如後夜聞雷顧念古人求法至於立雪斷臂而彥罪纍凡愚沈迷牢戶乃忽聞萬劫出苦之因法乳恩深即捐頂踵不足明報也師既居圜久之彥時時從間同曹直指沈令尹郢中諸文學闡抉儒釋性命之淵奧如河決川委隨宜説偈衝口而成及被訊以衰殘歷諸刑苦凡侍者皆心欲落而師雲間水止了無一事甫入圜輒又渠渠以佛法勸發一衆蓋其定慧精嚴壁立萬仞如此臘月望合爪説偈徐語彥曰道人將去彥愕然曰師不念法道不念衆生耶殷勤啓請而師顧笑曰去得快來得快旋即為吾浙何君説轉生歌而彥以倉卒未之録也越二日既曙圜扉啓師遽出戶仰視曰辰刻矣因呼薑湯淨口遂地坐連稱毗盧遮那佛數聲衆驚扶坐榻上遂瞑直指君聞之倉茫及榻前大呼去得好記著麼師乃更微睇直指君啓手斂足𮧥然而逝即十七日辰刻也隨舁坐露地霜風塵沙種種摧蝕經六晝夜而神采溢發如未度世既出獄以師遺言毋斂僅周以藟梩而土掩於西郊會甲辰京師大水城關皆崩四郊如海諸弟子念師在巨浸中命田侍者鳴諸當事得歸龕陸比部西源於孟秋十三日躬往視事七尺之土未乾疑師且水化及破封而端坐如生不動不變一衆號呼歎未曾有嗟乎此豈非光明碩大超格越量不可思議之肉身大士乎彥遇師晚即於宗乘教理未有證入終日戴天履地而其高厚非所能知然其甘禍患如遊戲等生死於往來其滅度也則併幻身而不壞其一息之存也則困頓刑楚了不入意而勤勤懇懇逢人勸誘必欲出之苦海有如拯溺救焚目不及瞬而手不及援者如是而曰非大修行人非真聖賢則凡古之聖賢皆不足信也師入圜中隨地隨時隨人橫口法施若決藏海滔滔滾滾香象鼷鼠無不滿腹隨人手録各各擕去而彥所見聞者則盡此帙中先以致江南法屬授諸梓而後徐致其餘所恨獨少轉生歌耳嗚呼微言未絶靈光妙音豈違咫尺哉萬曆甲辰中秋朔竺靈居士吳中彥彥先甫和南記
