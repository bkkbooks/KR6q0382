body:
  text: 明憨山德清閲詩五言古宿洪福寺懷古浮生若電露豈有山河壽磨笄高入雲還同天地久其誰張麗筵夜半操銅斗逐鹿不畏險攫金寧顧醜滹沱鎮長流覆宿千峰首骨肉靡暇念侈心若淵藪霸功高幾許直道難箝口野寺秋風清塔鈴解獅吼燈前聞草蟲更復悲蒲柳山居鳥道曲復直迢遞通幽寂枯松學龍舞怪石疑僧立香雲襯足柔清磬聲歷歷老衲笑相迎有意非言説宿可休堂野人無心來寧復有心去來去總無心白雲知所趣幽篁一徑通落葉四簷聚念此夜露寒草蟲鳴不住紺圃即事二首無風水自定水定涵太虗四岸交清陰竹槐何翳如遊鱗戲樹杪天影看却倒去者亦幽人有情難盡道夕陽澄紺圃淺港動蘭棹卜居在野曠寂無塵俗想疏鍾深夜聞六根瀉清響晝讀天竺書幽窗思恍𢟨犬吠桃花陰麥浪人來往最愛晚雨晴空林反照爽芙蓉寺跨雲梁白雲不知畝折竹為輕帚幾度掃復合流泉觸石吼望中峰巒奇欲往未敢走老衲駕津梁去來恐怖否患媒以有身墮體無堅朽達者既知此死生何好醜經殘磬亦歇豈更聞雞狗龍潭靜室睡起帶微昏拭眼出禪戶碧天紅日高雲山光可睹倚欄聽流泉橋上孰為伍岩側立奇石向我石欲舞衲僧傍弗禁於石生忌妬汝本無心物如何解玄路生公昔教汝吾今擬椎破一憎一愛之且道誰福禍了此得佛心未會大莽魯舍下邳弔留侯子房椎秦氣豈止萬丈虹一旦能自下進履圯橋翁翁怒竟弗納復進心如初苟非天地量報韓計即疏佐漢功已成超然掉臂行青山去不返為答赤松盟月夜泊下邳忽聞流水聲尚疑先生在感激無盡情山居潭柘溪山深那聞空谷音凍雲雷忽鳴日月其誰心塔前解放光此照無古今老人不負渠影響渠有餘渠能不負老在處皆迢如白仁岩誰云山路險我覺山路幽空林鳴落木斷壁瀉寒流徑曲難可記雲間時復留樓臺斜礙石松柏老成虬拭蘚讀殘碣遠公豈凡儔五篇悟今古六事羞王侯危峯代主人玉雪泛磁甌蓮漏滴弗涸棋枰局未收悲歌曳杖去日暮不勝秋夜坐上方山即事頭戴古人笠夜禪松露泣怡然醉遐曠想是多生習雲鎖兜率門人來撥雲入瑤梯知幾層攀援鐵繩急舉眸見樓臺重疊峰巒岌磬韻瀉空翠清泉道者汲水窮路亦盡相見惟合十茶罷揮麈尾雄談匪暇給中岩月未沈謝法且長揖貪睡但畏曉那復顧衣濕潭柘山一音堂寄懷靜光滑居士世路多崎嶇悠悠寄巖谷去來惟白雲天地亦茆屋渴有泉可飲𢠢飢松充祿明月上東峰貝葉聊披讀會旨忽喪我虗心而實腹愛生死媒進忘所能豈獨譬若古寶鏡無塵光自復松邊坐良久介爾一成六天水本不遠亦寧非五竺行蹤顧難留薦茗誰擊築邂逅雖可期江山阻人目搖搖莫盡思卷來托茲幅晨起蕭岡納涼煩暑不可滌扶笻傍溪光偶然值幽陰輕風發林芳新荷浮湛露間雲停蕭岡遠山既以淨遠水亦以長眠鷗驚復定吾與我亦忘寂寂花暫落浪浪溜鳴廊雖有合塵心其如法中王為問西來意倒影泛虗堂日暮歸自龍潭利名非煙霞牽人不辭遠泉石非美酒醉我不知返狂笑出重幽殘陽沒松坂長松館夜坐禪庭就樹縛草徑遠塵寰有時鳥相語無人來叩關江聲雜松響飯訖聽潺湲染習漸將洗靈臺似近間許詢解設難支遁答非慳莫問城樓月潯陽照碧灣山居即懷峰泉本嚴好何必修飾之蔬食飲水外白雲可悅怡放言慙末德危行竊與期麋鹿散還聚詩書忘復思相知嫌地遠誰共嚼紫芝仲夏擕覺生受食芙蓉山中間將飯袋子共爾納涼此雲鶴棲高松池魚玩清水有心豈得妙無念墮寂止前識古不貴朴哉智之始歸鴉點暮煙杖屨懷故里覺生訝講絳二韻險絶難賡和豫應聲賦此二首明珠藏老蚌蕩漾吳門港一旦誰剖之圓光照佛項談經不須舌直示但用棒高枕臥頽巖松濤代晝講松窗匪貴絳常以雲為巷雨歇千山寒流泉隨勢降林鴉噪夕陽碧漢浮彩虹村落牛羊歸晚鐘何處撞人生特寄耳埋骨無賢戇題骨香菴隆公靜室畫梅萬木凍欲死枯槎衒春色禪房午夜寒明月挂枝側倣佛暗香浮鼻根不可識支郎定初回瘦影橫癱肋此意向誰言氷魂自相得鹽梅非所望投老終佛國悼無相容公是身如邱井聊以命為綆汲久終必斷世中有誰省輸他達道人念起恆自警生滅本一條見形即知影去來有異同喧寂靡炎冷刁斗聲弗停沙門觀力猛未死恣昏動含識豈超頴遠公之清塵師歿孰為整悼如超往曾見吾影實未得吾心見影雖植因得心道可尋死生非細事神寂昏不侵苟非得道骨安能無浮沈難消是五障易失惟一音新冢遍芳草松風多悲吟誰有堅固經鳴此無生琴哭素菴師棲霞久岑寂泉石漸光霽願力灑心血禪宮始壯麗青山色不老碧水流無滯舌相與德容見聞安可契師來春著物師去猿亦涕愧我徒識師弗堪支傾替東南法梁折苦海浩難濟小子瞻白雲幾回淚沾毳長松館西風吟朝來坐庭除木葉墮不歇未是西風高千林如脫髮林林成比邱遠近坐兀兀無口舌豈勞妙音從手發門人聚白雲聽法誰敢忽以眼為耳根聲塵逈超越長松強出頭夜靜挂明月萬籟寂不喧月明滿禪窟間中度朝暮所見何賞罰燕山送無言道公住持少林寺青山不易老白日何其短葉落黃金臺誰人行急緩四泉清且深五乳秋雲滿取汲豈有心為霖濟枯旱苟非善用之雖正亦復反鉢樹既成抱帝座香未散椎輪久失主賞罰貴明斷祖令試全提波旬應左袒焦螟泊火聚燕秋鵠卵直下不生心聖凡俱納欵芭蕉菴偶成誰謂城市喧我居若空谷晨昏雞犬聲誤聽作岩瀑庭際羅雲石微風撼疏竹故人家務忙誰共法海沐石門寺我愛石門寺臨川清曠處業當水月深道益魚龍助帆影亂幽窗櫓聲搖靜慮南山及峨嵋併換終不與讀法華經一室住峰深樵夫猶莫尋日永間不徹獨轉蓮花經自誦還自聽問渠誰賞音反復細推究本來非二心如何根塵識三者各有因使我疑難解取決白雲岑白雲亦弗答隨時變晴陰梵川水曲午風清輕舟浪花淺主人遊未歸碧草坐來軟有茗向誰啜有心向誰展青春感逝波白日應共勉何必觀滄溟乃稱雲濤緬崑崙與培塿會理非隱顯島嶼壘塊成池塘貴折轉水澄見樹影隔岸雲舒卷中流搆精藍荊棘試初剪魚鳥識香燈兒童慣習善輞川王右丞泉石寄軒冕今有曲阿生梵川託幽選道人偶飯茲細雨濕蒼蘚理棹向何處北園少雞犬過石鐘寺長江水不淺湖口山不深雲石多奇巧疑生丹青心豫偕二三子取次望春林何異畫圖上歡笑發空音假山與真山象始可相尋過匡廬棲賢橋我昔遊峨嵋峨嵋青雲間巴江瀉天上千里一日還今來匡廬陽峰巒潛復翔玉淵溢必泛三峽何鏗鏘行倦坐橋側鳴珮聲琅琅聞遺心獨清觀音舌相長幾人度流水即影見慈光風塵通觀風塵齊水月染淨但唯心試看匣中鏡淡然光靜深一朝縣高臺萬像等照臨好醜纖不昧未嘗煩沈吟豫心得如此寧畏風塵侵棄杖楖栗何所生托根峨嵋石偶然棄此山尊者何得失且以四塵觀推之本無質寧惟此杖哉萬物同一職贈馬子善堤上垂埀柳堤下青青草等間清遊時文章皆極妙不假雕琢工天然而自巧借問此何來胸中無煩惱贈明月寺皎如古寺負靈岩湖山最深處微塵固難近心遠本非預流水解清談白雲好來去經殘坐松下調息澄俗慮明月懸高天空床任箕踞莫憎青白眼身世等飛絮山中即事粥殘無所事䇿杖尋幽去岩下聽流水泠然為誰語天寒茗弗熱霧重晝匪曙此本龍蛇鄉廓然忘怖慮談笑殊未休日暮難久據月上還再來何必生猶豫過天寧寺有序余讀唐李長者決疑論是知無為而成者天也應物而不亂者寧也故古人有以攖寧自號者亦此早春擕二三法侶謁李長者於方山既而還清涼以滹沱冰將泮徘徊未渡少憩天寧遠公禪房賦此年華不可留齒髮豈堪倚既少終必老逝波力難止無生則無死有末必窮始岸柳夢欲醒桃花尚含恥同誰遊寶地啜茗談莊子一嘯出門去千峰興方起方山金剛泉丈夫患軟暖任事不耐長一歃金剛泉形骸頓堅強視生與死等視苦為樂場此觀久成熟身心俱清涼送得心開士遊五臺牢山去五臺相近亦相遠近則在剎那遠則靡涯岸生心禮文殊何啻太虗電轉眼光已沈掌紋不可見秋高風色寒落葉情無限望望孤雲遙令人增眷戀讀經曾敷蓮陸地清馨遍今昔俯仰中千里寧隔線大士笑相迎茗貯玻璃碗鼻風生浪華香光搖臺殿無錯箭鋒機掉頭空絶巘月下讀書天高秋露寒元侶皆寢歇油濁燈頗昏讀書借明月得朋古始初會理心自愜釋卷夜已深清光滿岩穴過龍門靜室羊腸路高低深林祕禪宮既到坐門次重疊皆雲峰刳木三百尺閣石架虗空寒泉委曲瀉點滴落厨中昨見僧頭上水聲來匆匆相看拍手笑王維難形容惟有無心者會旨超塵封春日登清涼昨來進幽谷草木時雨足欣欣向人笑紅黃間紫緑揮戈日難返流泉去甚速正思東家邱川上嗟不復蚤春謁李長者著論處高人李長者風致久欽尚問法蒲衣子從茲乃西往青山不改色白足遞酬唱人代付流水雲巖獻奇狀芙蓉繞禪室貝葉生佛想春雪被四野玄津滌五障華嚴佛始談大論誠快暢恨我生何晚不遑奉巾杖猶欣侍尊者龍象共趨蹡夜寒山路幽再宿解悽愴尚朴崖豫非太古人君是太古石今昔甚懸遠一朝此相識因悲世道衰尚友千古客奈有峨嵋遊匪遑久侍側雲邊言別離杯茗瀉慘惻敢企明月心常相照行識鳳林寺有感昔人依寒巖虎豹常為伍片心委寂寥頽然混沌父古木不知春鳥不驚樵斧一旦陽光回白雲化丹圃我老欲投杖已生峨嵋羽食菜莫嫌菜味淡淡中趣甚長長者可以久久則耐歲霜人謂梁肉美我愛菜根香東坡曾有言大丈夫須嘗淡泊滋高明奢侈汩心光節儉可成家費則近淫荒聽我冷舌言天下亦可康山堂夜坐空堂澄佛火寒月照僧笠俯仰天地間氷壺喻不及微雲淡欲斷野鳥雪枝集回嶺互明滅流泉凍弗泣相將坐達旦行者頻乞入所樂既難齊滄浪豈牛習秋夜宿積善菴洪上人禪房號大宗微雲散空碧片月當天縞獨聽草蛩鳴遺塵契深奧緣粗而得精精化合常道目擊猶千峰語言豈可到虗窗涼初高擁毳坐來好黃葉飄秋風夜中誰復掃潭柘一音堂即事三界如旅泊比邱寧敢著去來類孤雲足迹難可摸樹下只一宿遲回恐生縛雕梁與畫栱眷顧詎非錯末世風俗澆鬚毛徒剃削酣然醉大欲男女飲食樂雖復著袈裟諸方亦行腳研窮本色事癡默熱惱灼一旦死魔至惶惶何所托吳江聖壽寺吾愛吳江山浮杯恣幽尋又愛吳江水臨流間照心城中有古寺銘碣何埋沈偶讀高僧傳赤烏到於今佛燈斷復續棒喝振雷音禪虎瞎堂老昔曾踞此林殘陷新壁每動騷人吟近世微某公幾遭荊棘侵何其棄而去令我彌愴襟山豈貴必高水安貴在深寸虗苟無欲朝市即雲岑曠然離苦地誰解投簪纓名二泉詩有序余遊廣慧寺見一泉湛然明瑩歡喜心生熱惱自消因名之曰歡喜泉復見一泉淙淙然瀉諸龍吻若枯禪大龍神遊覺海慧濤洶湧之中而不撓乎澄潔之性有即動而靜倣佛乎禪定之象名之曰禪悅泉後之高人勝士過廣慧者皆生歡喜入禪悅庶無負名二泉之心乎歡喜泉千峰有流水一見何皎皎歡喜油然生相將山月曉掬之開妙觸直下無不了夜靜鍾磬歇清音瀉叢篠更聞洗鉢殘惹得遊鱗繞禪悅泉商者見利喜農人得雨悅空山萬籟寂老衲默無説所樂雖不同適懷寧優劣寒飈吹微雲凡聖情波徹過某公禪房鑿破千尺氷雲邊結方丈漁樵絶往來天地同俯仰不見喧笑聲但聞流水響山深遊子稀夜靜明月上把袂論素心忘機冥大象為烹虎邱茗已接鶴膝杖何處動疏鍾此時誰撫掌人生若漚泡莫使煩惱長高竪精進幢共超無明網寶珠泉有序嘉靖間有禪者不知何許人雲行鳥飛足迹滿天下而愛杭之徑山山有凌霄峰高出羣巘石少土多可以樹藝然以乏水棲者不能久此禪禱於龍神一旦泉湧成掬更三日泓然厭沃龍象矣萬歷壬辰仲春自杭來五臺言其始末如此遂賦之寒流迸絶頂清冷遠泥濘午夜微雲空氷輪印滄洄誰披破納頭分玉注爐鼎熾炭三沸初浪花明珠並試傾磁甌中一啜禪夢醒芙蓉寺千峰有流水碧沼有明月承坐香雲柔此心何所闕美人秋思深肯向岩隈歇麋鹿去復返孤鴻天際沒滿城夜露寒燈火照佛國鏡裡浮幢新山河壯禪窟重過樓煩寺至人將欲誕寶地湧靈脈飲者無賢愚俱然消諸厄一朝産金芝佛日生大夕千古鳴法雷舌根等堅石樓煩師之里爾我悲陳迹廬嶽秋風高東林正蕭索聰明泉未枯勝井塵土積搔首共躊蹰哀鴻催白髮敢承聖者光分𦦨照蠻貊況復中華生自來霑法澤慚余道力衰匪及為輝赫玄岡山店別寧武諸法侶偶然飯山店法侶勤正念反視身與心豈殊速閃電百年喻朝露日出花即斂寵辱鏡上塵本光謾相染秋風催馬蹄去去情無厭過清涼義冢園示某禪人艷姬遊花林過者誰不讚白骨亂荒草見之誰不嘆從來百年中好醜隨時判嘆者未死時容儀何粲粲讚者埋黃土白骨同一貫佛説女三昧即身成境觀比邱住尸林攝念厭分段如觀一枝花洞悉春無畔過華嚴菴流水青山曲誅茅拭心鏡法界雖四重了之凡可聖風高鐵磬寒月上松窗淨莫謂故紙厚鑽研力須徑一塵忽剖破大藏頓究竟且説春光深杏花正當令浮生能幾何誰悟身為病驅旱魃有序豫道興善寺覩麥苗枯稿知魃鬼為祟遂賦詩驅之期雨足為驗苗麥仰甘泉赤子飢念乳我自清涼來久離熱惱伍行中覩枯稿魃鬼握炭斧喜旱暢淫習羣生失所父民以食為天麥枯將誰怙聖哉大悲覺雲澍滋朽腐遐邇聞雷音妖嫚墜幽苦偶成長年只蕭灑靡事可牽挂山河喻蒼狗生死齊野馬曹劉無幾豪榮枯轉頭罷輸與世外人金剛虗空畫五言律開化寺有感建勝自隋唐燈傳不計霜幢高文字古臥蘚苔蒼雨過金容泣花開鐵釜香登臨曾感慨槐冷鎖斜陽散髮受食芙蓉山中散髮長林下清歌傍碧渠水流天影在風靜竹聲虗路出雲松杪心遊象帝初上方誰送供香飯及池魚客多勝閣寡欲地終偏忘機趣自元帆檣爭碧浪日月走青天耳寄江聲外心遊象帝先人間通覺路登眺石門邊日暮二首風落春時葉階生雨後苔門前雙樹老竹外片帆開高塔㗸沈日祇林隱鏡臺遙看情不盡宿鳥促歸來日莫泊灘頭鄰船燈火浮地高疑傍斗天暗自停舟春暖衣初減江清興更投殊方皆逆旅鄉語信蘇州雪中有懷寂寞空山裡連陰雨雪重鶴愁巢樹折猿慮洞門封草木應難辨山川倣佛同誰能明此意夕霽上方鐘潭柘元日聽泉一年今日始寒谷暖初生松下浮天色雲邊領磬聲翻然辭絶壑此去向滄溟吾道秋風冷波光浴日明山居住在萬峰深遊人何處尋斷崖能障路流水自成吟白髮生空想青山冷世心那知城市裡正晝攫黃金過報恩寺一棹到禪居溪山春雨初宿雲橫古砌遺像臥荒墟斷碣迷唐額空梁得宋書同遊皆法侶誰可振門閭明月池老衲間消遣雲邊斫此泉淺深不可測今古但澄然照影渠看我涵虗地壓天夜寒羣籟寂明月幾虧圓秋夜宿本侍者禪房儂家所住處長日少人蹤水月四時有雲山幾萬重黃猴偷紫芋白鶴立青松夜靜成孤坐燈前孰所從遊張公洞有序暮春與二三子遊張公洞玉女潭舟中披閲支公小品序倦而舒目忽見舟前碧翠浮空波光映几時高論者清難雲搆虗懷者瓶瀉而酬次復舍舟䇿杖尋樵徑而入既至蒼松夾道修篁點黛怪石亂出清泉滴響仙源幽勝應接不暇時有小作雜記其事雖無雞園鹿苑法咏之倡和亦一時之良遇也微波搖樹影風好片帆輕望裏千峰秀行邊一水清高言消永日搜閟托幽情相去桃源近時因法伴登北園雜咏間來無所事觀花適幽情鳥路生明月魚程混太清蒼山常問寺濁世不留名雲外存知己前峰鐘磬聲泊湘中日暮停舟處蒼茫古渡西雲霾江上月雨濕客中衣行侶鄉音異鄰船燈火微故山千里隔迢遞不勝悲巖居即事潛壑堆雲處寒泉不斷流千峰長鎖翠六月只如秋蟻鬬驚天地人空恣馬牛山林與城市心歇便相投留別憨公大道久荒涼離歌東海旁行蹤將萬里津濟正微茫白日肝腸苦青山骨肉香相逢即相別揮淚欲沾裳示于潤父寂寞英雄地浮華計不深好花開萬品古木獨千尋路盡生奇智言窮得自心封侯西海上白骨博黃金過邢匡石居士朝來居士家一路踏煙霞會理花非待開池水有涯石橋當戶險山郭帶江斜飯罷無餘事空窗轉法華同開侍者繆仲淳宿洪福寺有序昔思大禪師登南嶽恍若舊遊因掘地得髑髏及瓦鉢道具遂創招提以三生名之貧衲與二三子過洪福寺四顧躊蹰亦若舊遊第不知前生髑髏何在雖然即非髏髑瓦鉢思大前身為南嶽風月主人猶信也洪福由唐迄我明廢興不知凡幾其寺僧慈峰朝公今復力舉廢墜而貧衲與二三子阻雨得假信宿朝公索詩題石遂賦此以結三生之緣時萬歷丙戌夏六月十有一日也信宿中流寺行藏支許從禪居開水月佛火照魚龍石弔英雄迹雲埋今古蹤廢興無限意問取舊栽松牢山海印寺珠林完舊物天子錫靈文鳥道懸丹嶂僧堂起白雲魚龍階下宿塵世海邊分佛火誰相續心香朝暮熏梵川偶作情縱頭頭礙心空事事如死生雖復大來去總由吾貯水煩滄海關風役太虗諸般皆便用何物可能愚石門舟次石門前代寺澤國隔塵氛四面皆流水孤峰獨出雲寂音陳世界長者列經文舟到黃昏裡鐘聲鼓後聞偶成四首折葦來初地漁人枕浪眠塔鈴間自語僧夢醒忘緣井竈魚龍窟風塵水月天雖非親眼見澄照尚依然住山無甚巧一味朴頭來雨後開新地燈昏剪舊煤照心翻貝葉襯足護蒼苔久斷風塵路何人問大梅草坐白雲寺間中自較量利名非我事歲月讓人忙飯飽松花粉煙浮柏子香流芳如可待公道屬侯王我自別人間空山擬投老松風六月涼潭月千古皎黃獨雨後肥白雲不煩掃來時路正忘欲出問誰好少林晤高竹川襄陽復晤却贈一別幾經霜相逢鬢共蒼行蹤雲聚散此道路低昂多病知禪觀無才損世忙少林今夜月應復照東廊秋日與黑白諸法侶遊衍恩寺秋日來金鼠西風落葉聲堤楊猶帶緑池草尚含青斷碣迷前代空山慨世情同行皆法侶誰解説無生咏風乾坤全賴爾萬物恣翻騰撼樹惟聞響排雲不見形吐吞真有力來去本無情一種呈奇處空山送磬聲臥龍菴寺藏青樹密路轉白雲深山帶前朝色人多上古心浮塵不可見流水自知音滿目東西意題詩期再尋秋夜宿水月菴黃昏泊釣臺坐聽草蟲哀水濶天無辨堂成月自來已醒蕉鹿夢肯使海鷗猜對岸人如粟登臨念自灰登那羅延窟菩薩僧常住皈依上翠微山高疑日近海濶覺天低島嶼屏中國波濤限外夷重來防失路拂石一留題金輪靜室即事縛屋依金剎時聞鐘磬聲種苗非博飯鋤草代經行春水涵天碧雲山當戶青斬蛇誰取性拭眼證無生新秋念開郎客裡逢秋早林間宿雨涼小鮮猶聚樂侍者却甘忘莫謂千山隔須知一脈長狂心終自歇含淚禮香床題張公洞清曉探靈迹行歌入翠微山光開眼界泉響淡塵機去路非難進浮生不可期洞門雲不鑽出處未成迷題玉女潭長松夾道陰幽勝許吾尋樹老寧知歲潭清喻此心同遊俱法侶消歇聽鳴禽杳藹天將酉時聞簫管聲漯陽莊結夏念開侍者間中無箇事鐵鉢貯清泉鏡面浮天色禪心空世緣人生既不久幻影豈常堅相見難相悉開郎尚未旋過多寶寺弔元菴穆居士塵中開覺路訪勝夜登臨貝葉依然在蓮花誰復尋行蹤寄軒冕名姓落珠林一片青天月先生萬古心出佛兒門別潭柘山嘉福住持佐公兼諸法侶靈脈來何遠溪深知幾回雲山常忽斷天日頓重開道大終難隱名高不可埋行當尊貴下空翠湧樓臺贈王太古旅底逢王子風標逈不羣身家流水葉心事遠山雲任俠猶存劍陶情但屬文何如俱屏却世外一期君慰徐覺非暫息還鄉思同來聚雪岑雲山常在目妻子不牽心月下搜禪觀間中學梵音更憐豪縱習鑄作大悲針國山寺訪了虗不遇迢遞來煙寺松門夾道生青山太古色流水自然聲石上癡龍迹林間怖鴿鳴西江相去遠誰慰客中情登天目山頂歷盡巉巖路中峰地忽平捫蘿重涉險坐石看雲生有欲人方忌無心道自成相將登絶頂更覺此身輕馮元甫書室逃塵寧是隱養素在蒼生湖水硯池碧秋山筆架青煙雲通藻思風浪雜書聲永日人稀到惟聞幽鳥鳴舟次石門弔古筠溪任黑風折葦石門通一水中浮玉孤林兩抱峰津梁勞佛臂舟楫濟禪宮歲莫探陳迹悲歌寒霧濃梵川殼居二首水國廠禪庭微舟不可輕波光搖閣影松吹學潮聲魚小知常恐龍癡睡未醒莫言城市近隔岸遠山青間來坐池館乘月弄潺湲鷲嶺浮天上漁舟放樹間鳥喧因論法龍出未歸灣已少尋幽者柴荊不用關螺髻山送傳廣居窈窕不知深誰同此一尋聽雲天地耳抱寂聖賢心漢室青山在韓祠白日陰那堪離別淚春灑海螺岑偕諸居士登墨光亭地僻無鄰並同來日已暝穿雲驚宿鳥帶月到幽亭近水堪資觀虗窗可寫經漁舟催早渡風冷夜波腥喜于中甫再入潭柘喜爾到山中雲門一破封聽泉身世盡坐石意言空明月東生海焚香禮大雄來朝今日路杖屨出千峰秋日登玄墓覽勝擕高侶捫蘿謁梵宮千山飛片雨數載寄孤蹤空翠鳴疏磬波光照遠峰煙霞誰愛客相送有支公過莒父寶願寺有感新秋遊寶地落日照城隈馬迹侵蒼蘚蟬聲泣古槐短師子孔高世鳳毛才此日扶消歇還須玄度來同勉講主過洪山寺舉刀無可欲斷足是何心法雨千山潤慈雲萬里陰清泉還似昔白血到於今古碣迷荒草同誰杖屨尋暮秋宿龍興寺入寺煙霞古金繩鎖梵宮譯經人不見呪水鉢成空漂母河邊草韓侯墓上松夜深誰共坐難聽是秋風示吳康虞此生即曉夢寵辱兩俱非三棹何時息千峰早晚離乾坤鏡裡象身世鼻端泥去去春程遠煙花示密機圓常寺次松窗宗室韻欲濟況無舟名林亦可留樓臺片雨歇河漢淡雲浮水靜月方定心空境自幽慧燈明徹夜日暮不須愁夜讀楞嚴有感軒冕增人相松泉冷世情微官五嶽重大道一毛輕石淨雲生倦窗空月愈明殘經翻未了何處曉鍾聲訪鹿野坪徹空禪師林叟持高節幽居淡世情間朝觀鶴色靜夜聽泉聲行道一身健翻經兩眼明自慚投社晚乞地結松陰清涼有感幽谷深雲裡樓臺知幾重茜裙歌夜月緇衲醉秋風雞犬聲將遍猿猱迹豈同因思張相國一怒淨龍宮燈下懷憨山支郎昔住此氷雪記流年已就屠龍技猶參伏虎禪法雷鳴十地花雨散諸天信宿空心纍焦桐擬徹絃山居喜雪霽一室萬山中何人問遠公雪迷樵子路凍合蟻王宮照性知非染無思始契同朝來饘粥罷海日上東峯一微泉懷法侶路斷千峰際雲門忽破封好山知幾疊幽草自成叢石徑通林杪寒泉出壁中下方諸法侶誰得此相從仲夏偕諸法侶遊上方喜雨二首路向平田始蒼崖似削成有天當絶頂無地可兼程避世雲非淡忘機水自清同來逢好雨鐘磬報新晴結屋近青天居高地自偏鳥鳴階下樹龍出洞中泉山月通宵白松雲拂暑炎遙知城市裡枕簟不成眠五言排律過知郎淡然齋地僻資心靜池空悟世忙回觀兩未有強謂是常光樓閣窗中影松泉鏡裏香雲山終不老水月為誰涼天破魚吹浪書拋客臥床去來情不染喧寂路俱忘莫厭茆齋小風塵別道場
