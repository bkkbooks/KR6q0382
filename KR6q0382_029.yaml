body:
  text: 明憨山德清閲歌皮囊歌這皮囊無好醜空色從來莫能牖自是當人情未消千零百碎分淨垢君不見元沙老髑髏面前金剛倒費盡精神扶不起使人常夜徒悲懊岑大蟲逞家風快言叢障本來空一朝拶著難伸訴業障依然障不通兩禪伯心路直血血刀刀無愧色公案分明請試觀冷灰豆𪹼知恩德透此關便不難掉臂縱橫恣軟頑但得胸中無夙食從教藥病自般般聖凡情頓坐斷不住中流豈兩岸須知死水不藏龍雷電光中看胡亂看胡亂看胡亂末上通身出臭汗生殺交加意氣閒大底輸他本色漢送靜菴知客之燕京造佛像歌有引靜菴上人將鑄銅為像一旦辭豫出山豫問此行奚為曰造佛去豫曰佛如可造空可青黃若知泥佛不度水金佛不度爐乎莫若鑄心為佛大水稽天弗能漂劫火洞然弗能燒顧不偉哉焉用範銅為乎上人曰我聞氷可以為水色可以為空土木銅鐵皆可以目得之色乎非乎若然者心無形段空無邊際即空即心即心即空空兮心兮孰得而思議之範銅為佛有何不可古德有言曰若人識得心大地無寸土寸土尚無指何為銅豫曰善哉子行矣乃作歌以壯之歌曰劫火洞然天地灰毗嵐吼擊三禪隤鑄銅為佛不可壞常光千古破昏埃此行秋深時漸寒歸來應是桃花殘文殊老人頻相喚夢裏春光興易闌君不見鴈塔稜層高入雲龍藏稀奇難可聞等閒莫把年光玩老病休將口舌分呵呵呵會得麼剝皮刺血苦何多豈是古人無所見行邊早晚細思他悼無塵開士沁水諧觀兮不遷遙入潭柘兮獨還白雲忽散兮寧堪不遠悼爾兮義完生為死媒兮奚歡死為生母兮奚難了此而超然兮即羣動而固閒公若有知兮懸解於去來之閒紅禪衣歌與開侍者宛然一片大火聚觸著當下誰不死惟有命根久斷者披之處處為標幟又如初八天上月黑白相參難辨別朽枯髏內解龍吟烏雲重疊清光發莫謂穿舊不復美華林曾示裴相國再來非仗觀世音老僧端取直壁立君不見鳥窠拈起等閒吹侍者當陽便知歸陽天和暖披此坐一切回互不回互曹溪少室有來由不是知音不點頭或五位或三墮總是衆生寒之服殺猪屠戶念彌陀聖凡覿面謾分訴謾分訴銀盆盛雪月藏鷺阿誰於此辨端倪木兒石女堪分付堪分付不是綾不是布燦爛光明處處露披之安坐風雪中不異周圍設罏火設罏火點雪投之可見麼若還不見總顢頇見之無事討事做寄弔陳內翰良軸我登廬山時東林訪君子別後不幾年君子取高第黃粱夢未全忽聞已棄世花開終必落人生終必死花落還復開人死竟不起此情向誰言耒陽有名士以人還自驚無常無彼此縱活一百年不過先後耳君子君子兮望雲空相思聰明泉不枯聲咽何時已觀放花炮歌君不見富貴人所喜貧賤世所厭古往及今來升沈寧有限惟有達道人榮辱俱如幻漢高祖楚霸王爭鋒氣勢何昂藏正眼看來總是空長安彭城俱荒涼亞夫冢蕭何墓荊棘深深眠狐兔山河不改勳業盡奚必從前多勞苦大不若林閒叟寵辱胸中曾不有白雲去住本無心泉石城隍恣遊走或愛靜或任喧超然直下了非關萬籟寥寥夜月寒何妨花炮共相看聲悅耳色供目聲色叢中誰解悟常光生滅兩俱遺千峰寂歷心如谷又不見張相國馮司禮光𦦨輝輝貴無極一朝福盡草頭霜日出何曾睹涓滴古如此今如此相逢誰是奇男子聽炮觀花洞世情掛冠岩穴尋高士薦大機聞塗毒彈指根塵成石火羽化還同氷夾魚陽回大地俱懡㦬學無生即無死生死從來互相起生若無生死亦無孤明歷歷照千古要會得須豪傑一切情頭都斷絶譬如香象脫羈鎖縱橫不受人牽拽人聽炮我亦聽人觀花我亦觀就中別自有玄端妍醜交加慧鑑前片心湛湛喻寒潭寒潭水清徹底富貴貧賤如泡翳碌碌珞珞有何期輸吾枕石和雲睡病中歌有序皮毬道人以四國王相勝負而未調或以火攻或以土遏水風二帥復激而鼓之大戰不休是以陰陽弗和結為寒涎病求醫於盧扁賈術於華陀皆為之縮手且曰此病根於混沌之初發於太極之後證自而相須有識而致之非我曹可以療也皮毬道人側聞而笑之遂發而為歌皮毬道人抱痰火咳嗽寒涎朝暮吐四大相凌未易調一呼一吸無常主達此理真快活謾言天地為棺槨此是莊周夢裡談無生路上渠難摸既無生寧有死一切屈伸皆幻耳乾坤亦是臭皮囊囊中膿滴奚相惜千萬劫如一瞬南嶽關門何太鈍由心造業業生灾勞頓儂家失本分君不見一念不生佛亦幻既生有覺覺生情常寂光中受磨難離圓覺無六道廢六道無三乘增減關頭理不明醫王設藥聊蕩洗皮毬道人一身輕一身輕健如狗衛主譊譊不歇口相逢誰悉片肝腸濕草功勳亦曾有罷罷罷變毛骨曼殊大士騎未足於今只上峨嵋山象王隊裡超拳拲又不見遺二道人最相愛燈前為我償筆債一行兩行寫病單皮毬道人常不壞常不壞太自在房山深處覓春光巨桃易杏誰偷賣孫郎藥貴近來風飄零鮮蕚無人曬身既爾物亦同痰火機關萬法通造化莫瞋漏真訣誰家園裡杏非紅憨郎撓柴歌撓柴好撓柴強古人標格誰敢忘無分老少與賢愚一聲梆響下禪床下禪床看轉變歘忽更頭并換臉人人圍片破簟肩翩翻隨衆出門遠一步高一步低孤懸鳥道路蹺蹊風團冷氣攻心腹日照氷崚滑似泥到雲深稍停息天寒地凍難久立揀得枯株竊喜輕誰知雨打中心濕撞著了重也罷安上肩頭逐步下高坡峻嶺轉折煩幾回蹉腳心驚怕不做過寧知苦往往偷安恣懶惰直待親身經一番從今去後知回互喫熱飯睡暖坑也要回光暗自想大家若不共勤勞安能有此清福享撓柴強撓柴好居山莫要閒炒閙衲僧既欲煉昏沉撓塊柴兒勿生惱與開侍者龍泉侍者名道開白雲飛去又飛回山深迢遞勞去來蕭蕭祖道生塵埃羊蹄馬跡遍蒼苔優曇枯悴不復開幾番搔首憶黃梅輪椎斫出梁棟材竭力晚季支傾頽犒汝特賜茶七杯子房山漫歌重前彭城山上雲彭城山下水聚散及浮沈廢興不可數君不見人生天地能幾何黃河東逝無回波豪華過眼曉天霜誰能百戰爭山河楚漢雄雌一夢勞其餘蹄涔安足多世謂先生見機蚤侯印棄之如腐草超然故託赤松遊到頭那得韓彭惱此據先生迹安知先生心先生在報韓功名非所欣秦亡心事了不去何沈吟又不見功名長生不相遠棄彼取此識亦淺我知先生天機清登仙冲舉皆無戀因登此山作此歌偶將墨跡灑烟蘿先生聞之謂我何男兒意氣情難磨難磨惟是山與水河遷谷變無定軌惟有先生一片心恆與茲山增秀美弔虗白師我正生兮五蘊本空師方滅兮一真無待本空則生而無生無待則滅而非滅生而無生師不異我滅而非滅我不異師師我窮極炎罏雪飛此中有旨誰復提撕我今哭師非悲之悲師其有靈鑒我寸思燕遷壘避佛歌余寓傅侍御之紺圃以時事多感又見其俗尚強喜誇詐殺伐故淹留日深冀以化之一日禮佛聞嗚嗚聲視之則見梁燕巢佛頂者遷壘於偏掖矣余不覺泫然蓋余挂錫幾三月此方疑信朝暮無常燕乃知罪福避佛遷巢則佐我化多矣豈羽蟲之欲纍輕而靈隙猶存不若人心凶昧本心蔽盡歟因悲慨作歌誰謂羽蟲愚羽蟲人不如年年壘巢當正梁今歲自遷偏掖居大為主人供聖像竊恐糞穢罪難除細思想誠可悲飛鳴之類何知機人乃最靈萬物首腥臊唐突入禪期我重此燕異常鳥形雖昧略信三寶倘爾聞經悟自心羽蟲可作慈悲棹慈悲棹紅日落幾回渡頭待行客無明浪裏作津梁始信羽蟲人不若來紺圃讀此歌歌中滋味苦心多莫謂喃喃口海濤急要人人出愛河這段緣非無端只因燕子成此篇由是觀之鳥我師師恩師德敢不傳蘆芽山閲法華論懷開侍者君不見北帝震怒寒飈生蒼雲彤霧馳太清木榻林扉睡起時出門一片瓊瑤明懷美人幽思䇿杖孤遊飄泊子地凍山氷草木強獸踪鳥跡渾莫視明窗下法華論焚香坐閲陶所悶紙勞字故念初澄非思量處牛眠隱寂滅體光明腰三周九喻皆皮毛相逢若問渠頭角萬壑千岩雪徑遙才眨眼即不見行步如風又如電惱殺揚鞭喚不回熊窩豹窟多坑塹荊棘林煩惱域憎愛交加埋自己蘆芽清勝異風塵早晚歸來眠露地歸來兮勿帶伴火宅衆生心路險同床合被尚相猜何況烟霞沒量漢沒量漢兮閒不徹冷看侯王營黑業至死不聞知見香茫茫苦海何時竭又不見生天上猶有墜人閒富貴能幾日春花雖好豈常鮮到頭零落風雨急夫差驕勾踐辱臥薪嘗膽勤報復只今吳越舊山河年年惟見芳草緑爭如七軸妙蓮花深雲淨室頻翻讀頻翻讀兮塵習斷靈山一會曾不散凡聖交參趕閙場拈華微笑頭陀慣如是相無委曲和盤托出寧掩覆自是衆生情見深醍醐上味翻成毒開侍者頗可惱杖屨翩翩何處倒齊魯風高落木寒長更那得黃綿襖好歸來聽此經簷前共看天花落湛緑亭歌有序昔人有以利為病者則重名以藥之病名則藥以重生病生則藥以重忘殊不知利不自利名不自名生不自生忘不自忘皆相待而有也故白黑紅緑初非有色而或者色之豈非忘湛醉緑歟紫柏先生偕二三子問狄生疾於湛緑亭覺非子進曰大師來不一發藥乎先生舍然大笑曰紅緑白黑聲聲色色乃至飲食男女萬物精粗如冥湛而不昧緑孰非良藥覺非曰若然者奚不曰湛六而曰湛緑先生曰書不盡言言不盡意聖人設象以盡意耶夫象者似也故緑即六也九方臯之相馬略其玄黃取其神駿今子膠之乎玄黃則所謂神駿者隱矣歌曰湛兮緑兮雄兮雌兮苟非其人兮豈易同歸介然有知兮則屬妄想槁然無知兮則倫木石復揣摩兮愈得愈失非開朗兮孰能辨析茅山歌送思燈還松陵有序吳江丁生幼業儒屢試不第遂棄去問津無生既而將祝髮其子求父得之雲陽號咷白父曰兒雖家貧饘粥可供何忍棄故土去異鄉丁生舍然大笑曰三界以名言為體名言以因緣變而有浮生於因緣變中變態萬狀子也父也親也疏也榮也辱也死也生也譬如龜毛繩兔角杖繫風挑月豈可以泥哉小子行矣無誤乃翁大事紫柏先生壯丁生之言哀其子之誠孝贈之以茅以吟吳江江上月此夕照茅山茅山山上雲送汝吳江還人生乃小夢逆順徒悲歡試觀心未生何缺復何完茅山雲吳江月父子恩情卒難割卒難割到頭恩愛終有歇君不見五世後慶不賀喪不弔使汝由之不為道霜毛頃刻隨刀空昨夜頭痛長五峰得道歸來撑渡船兼載冤親無我中佛香菴夜坐今夜佛香菴前坐明朝瀨陽江上別今夜月明照坐客來宵月明照行役行踪去來故無定月明在處常相識常相識犬吠雞鳴報消息月明若使堪把玩海上神仙肯蛻骨壽仲堅尋李生佛歌人事卒難遂年光不可留是非橫劫掠使我莫自由豈惟今如此往古恐相侔但若得聞道死生付波流何況榮與辱不殊雲空浮君不見猪揩金山金愈光小人君子各有長小人懷惡則忘善君子懷善惡必忘終來善惡不到處自是君子快活堂一夫快活天下安一夫愁戚天下難丹山碧水益道心金叉換酒王公寒又不見李彌遜李生佛崇學祠前虎渡橋行踪月明猶髣佛山僧本是方外賓竹杖芒鞋何所親却言遠尋李生佛七闔寧復畏嶙峋鳳頭歌并序道人往年乞食京師諸中貴紛然爭飯道人中有年少未冠者諺呼為鳳頭邇來抱病房山而鳳頭者又不遠來飯道人則已冠矣嗚呼梵志白首而歸鄰人謂昔人猶在梵志曉之曰吾猶昔人非昔人也鄰人皆驚愕其言道人感鳳頭不畏巖谷崎嶮敬持主命飯道人於深山遂賦此昔鳳頭今鳳頭誰云今鳳頭是昔鳳頭來者且未至去者不可留來去既非有眼中見鳳頭嗟哉世上人當面昧鳳頭鳳頭復鳳頭橫計如奔流滔滔正莫返無風爭覆舟大覺不忍看垂手援癡牛夜光暗投人按劍誰非讐嗟哉世上人何人識鳳頭題淨業堂徹天師卷經殘老衲無餘事手自窗前拂竹几一卷橫鋪非等閒烟濤空翠何窮止君不見斷岸孤村富花卉容顏零落妬山鬼又不見一片閒雲度碧空舳艫千里疑䘖尾浪巨風高帆互飛黿鼉出沒如螻蟻看來性命微塵輕弄險收成能有幾半峰上石磊磊春去幽枝含蓓蕾倣佛吳姬擬笑時貪觀日暮不知悔前王冢後王墳秋雨蕭蕭欲斷魂相逢莫問雌雄事得失還同谷口雲今與古柳生肘富貴功名非我有任他造物亂翻騰殷勤抱住無生帚鴟與梟鸞與鳳麒麟香象同一甕長松雪重鶴巢傾誰知打破漁人夢烟霞曲隱龍宮鐘梵喧喧震太空聞聲幾箇解入流萬劫根塵當處融運筆端憑覺觀念未生時誰所判和盤托出與人看始是英雄豪傑漢咄咄咄勿漏泄落霞孤鶩兩俱絶水色山光一鏡懸通天別有超情訣靜樂縣萬花山清涼寺歌君不見萬花深處清涼寺山回水繞清佳處昔有幽人此練心黎羮藿食知幾祀一旦荊棘化樓臺青蓮寶座踞如來等閒忽作師子吼魔外妖獸腦裂開哲人既出成草莽狐狼野干鳴如雷琳宮金砌臥牛馬其誰見之弗生哀我愍往者心血枯蒿萊力盡成精廬相去未有五百世寧能忍之不扶持又不見布金太子芳名久給孤長者隨方有讀我歌信我語便是祇園賢檀那慨然出手為之整兒孫管取多魁渠呵呵呵智者誰清凉一念未生時萬花開處六門香若人聞之領大機領大機勿生疑業重終難味厭離厭離二字聖賢命常人聞之等糠粃唯有英雄調不同相逢一見便相期畜生無有厭離心安得為人秉倫為人無有厭離心安得聞道出苦津不厭財被財殺不離色被色縛殺縛由來厭離缺諸君欲邁風塵路洗心厭離是真訣眉山歌君不見眉山高入雲霄際翠靄氤氳三萬里其誰度夏清涼深雪飛六月寒侵肌銀鈎掛懶能拭一任垂垂壯風骨南衡老漢調不同時可入兮時可出顯與晦豈有常譬如一手握復張癡人見之有開合了得寰中總不妨巴江水龍翻石夢裡徒勞分遠邇何處青林鳥忽鳴醒來白象仍師子山中樂聲聞縛大隱何須生執著去住閒雲恣卷舒從人笑我無圭角五羊皮一釣竿無底盤中弄彈丸浮空落地謾留礙宛轉橫斜著眼看秋風高暑氣消棧閣岩巒道路遙翩翩瓶錫漢關險二三法侶俱腰包一箇下一箇上松畔回頭渾畫樣足倦團圞坐樹閒滿前黃葉扶清曠坐復起過幽曲流水泠泠絶塵俗却憶淮陰算計多陳倉刁斗喧空谷出不意備不及席卷中原無許力英雄不見空聞名玄猿月下啼山色今即古古即今行人怕聽斷腸音輸我胸中無所慮萍蹤江海儘浮沈過樓煩寺有感君不見五胡亂華綱紀裂君臣相啖如蛇蝎晉室翻成纍卵危奸雄竊保逞豪傑老與少弗忍道骨肉流離委荒草中國瓜分屬犬羊腥羶滿地將誰告仁與義咸廢棄七經二篇成故紙佳兵尚武殺氣驕直謂山河馬上治佛菩薩閔此輩鑄頑為良慈雨沛谷隱龍飛紹佛圖樓煩豹變昭羣類隨方設化順機宜貴賤從風啓蒙昧姚秦石勒悟初心蒼生塗炭承茲濟又不見勝井金枝秀異常揚光將表醍醐瑞三草二木均受霑鼓聲那入闡提耳投鞭斷流狹長江強梁狼顧恣吞噬出師安公諫再三符堅伏軾佯瞌睡一朝兵散霸業空取笑千古真成戲飄風驟雨刁斗鳴生民無奈樵蘇計廬山高五峰峻翠靄氤氳趺座穩五篇六事邁巢由天子潯陽詔不准貪夫懦夫聞此風孰不剛明消鄙吝利世從來功績高昌黎吉水猶猜忿烏紗巾天在上雌黃人品休鹵莽休鹵莽人禍天刑指諸掌我勸爾慢弄文凋淳損朴文為君是非顛倒誠堪惜鸞鳳驅入鴟梟羣引後生祖輕薄短什豐章播唇舌大方君子自有見肯逐兒童營黑業習鑿齒劉遺民襄陽匡阜挹清芬片言一偈相酬唱流光足啓萬世昏邊風徑侵骨冷杖履翩翩尋勝井白草黃雲古殿寒遠公芳躅蕭條盡蓮華漏石棋枰東林白社空留名自慚小子道業疏坐觀成敗難支撑悲歌涕泗拽杖去滹沱滾滾愁堪聽長歌送廬山黃龍潭湛上人遊學并序古人之志於學也學則必成今人雖志於學迄未有成者豈古今人知覺不同耶蓋古人之學也專專而勤勤而恆恆而思思而明明而行於是六者斯須不敢怠也而其學成矣今子將遊學四方亦能於此六者持之有常則古人不遠聊贈以歌作長途主杖子決戰從來貴𢬵死決學從來貴自強𢬵死臨敵心慷慨慷慨之者敵必亡自強不息學必成寧慮中途無主張所以古人志於學尋常臉上生氷霜美惡境界付虗空不留方寸蔽心光心光不蔽慧自生慧生觸理無不明理明覽教自相契自然吐語佛智冥佛智既冥天有梯知君到此不生迷歸來高隱黃龍潭白足蹈遍萬峰西相逢月下論疇昔始證豫言無不實無不實也是無端太狼藉不是鎗旗惑亂人要衒儂家沒巴鼻登天目徑山作天上富貴人閒慕人閒富貴天上唾從來惟有達道人天上人閒都破栗楖一條橫瘦肩窮山探水不知年兩丸日月誰拋擲滄海桑田幾變遷君不見崑崙腹飛來浙江號天目一枝搖擺向東溟怒馬方馳忽頓伏雙徑縈回雲霧深五峰盤踞星辰簇天所作地所藏待人而興名始揚欽師一受龍神施深湫漲為行道場道成德厚動天子王侯奔走為金湯須信開池莫待月池成水滿月自光又不見幽岩樹歷盡嚴霜春未遇一旦陽和驀地回嬌花嫩蘂紛相附自唐來至於今烟霞朝市幾浮沉何事東風撼塔鈴殘紅流水淡人心龍與蛇無常居山頭老漢八十餘夜叉佛面振家聲正令當陽肯讓渠白兔踪靈雞冢暖足功高報曉勇豈可人為萬物靈逢緣不布菩提種放生池金蓮開異香時復染樓臺微風閒吹石上松定裡初驚聲若雷聲與色休妄測眼聞耳見不可即兩者既然法法同凡夫作佛無多力怪底呆郎業垢昏青天白日生疑惑石解喝螺解活情與無情一機括試將輕線石下牽橫來竪去皆通達螺既死仍復生百沸鍋中別路行若人於此知消息劫火毗嵐一任烹且拈小喻其大了得頭頭本非昧前朝後代祖師禪善解施為何利害趙州狗無佛性相逢舉著誰不病一朝徹底忽掀翻救却瞿曇窮性命一大事饒將相管取懸知弄不上非是欽師惑亂人情斷輸他本色匠子房謀淮陰功楚漢爭雄春夢中飛沙何處鳴刀斗醒來自笑兩成空遮空相元清淨無邊剎海虗明鏡一微涉動太山崩今古紛紛憎愛柄莫若早直下休千頭萬緒付溪流明月溪邊趺坐時雲空臺殿自清秋嗟祖道轉荒涼狐兔成羣白日狂三衣瓦鉢是何物淫坊酒肆較低昂水山勝無過此絶頂才登收衆美浙江濤接海門潮觀音舌相拖牀被大慧老慈悲好白雲却許紅裙掃遊人若怪烟花迷敢保先生未聞道迷在我不在人境緣逆順陷根塵迥脫根塵光獨露閒花野草大家春聊暫遊未能留阿誰追我雙溪頭孤燈達旦話疇昔臨別瓶窑情更綢丈夫腳肯閒踏蓮花藏板期永納分付山靈善護持萬古蒼生無畏塔奴歌并序豫聞萬物浮沉於生死者情為其纍耳故未超情者解奴人而而不自奴何殊東施醜嫫母哉因而信口歌此君不見蕭梁求為佛家奴五體投地拜泥塗至今天下聚口笑誰知就裡存遠圖又不見張子房圯橋進履人呼狂少年不恥拜白頭強秦一旦為之亡死生於人亦大矣若比強秦難此彼不笑留侯笑梁武西施貌惡嫫母美嗟世眼見何短是遠非近徒毀讚塵劫不憂憂頃刻緩者反急急者緩子房亡秦為報韓秦亡心事都已完超然且托赤松遊流水青山天地寬人生大患莫若身老子立言寧不真既悟此身為大患忘身事佛豈凡民勸君夜氣清明時細將兩者較疏親蕭張所存志遠近何殊青天與黃塵衆人見小不見大蟻垤龍峰等一巾又不見眼為色之奴耳為聲之奴鼻為香臭奴舌為鹹酸奴身為觸之奴意為攀緣奴巢許為名高之奴堯舜為天下之奴老子為三寶之奴孔氏為仁義之奴釋迦為衆生之奴達觀老漢為沒巴鼻之奴長亦奴短亦奴美亦奴惡亦奴古亦奴今亦奴大道未判何爾汝凡落朕兆皆為奴嗟哉濁世顛復倒不奴於汝謂我奴譬如魚龍在水中分疆割界嚴異同殊不知離水覓魚龍魚龍何所從又如大地上培塿與崑崙離地辨高低瞎子笑盲人呵呵呵會也麼若知此可來同度苦海波漯陽結夏歌漯陽莊漯陽莊地廣天低野色蒼碧樹塵希晝作陰翠藤月上夜生光憑淨几對明窗飯罷喃喃讀竺章慧風颯爾卷迷雲一輪靈鑒照無方喜長夏荒林僻游子那能覓踪跡鉢水罏香魂夢涼共誰箕踞恣幽適君不見寵辱陌患得患夫驚俗骨華髮蕭蕭孰解休等閒氣斷空悲泣兒與孫縱滿眼黃泉路上苦無眼自家造罪自家當悔恨生前缺營善慈陰槐翠蛟軒培植構來知幾年從聞閣覆垂玉堂飛紅一片浮青天朝與暮勤功課鐵磬聲中亡者度右丞別墅改招提輞川千載王氏做嘆古今錯用心懶積白業積黃金滿頭雪色買難消歌舞樓臺變荊榛吳王墓齊王陵年年歲歲記空名金棺銀槨屬豪客行人弔古枉車停爭似聊城傅居士為爺生子續傳燈房山歌房山奇勝天下寡羣峰梁棟青天瓦四圍翠壁鎖空明就中幽邃難圖寫行鳥路多恐怖挾䇿捫蘿防失誤禪流欲透死生關百尺竿頭須進步𢬵跌殺危機竭虎穴龍宮皆寂滅對境無心方寸閒懸崖跳躑須豪傑閻老子見此輩業鏡分明罪難配從來不落朕兆中鄧公碾折馬駒腿據尊卑明彼此丹霞燒佛亦合死誰知禍著熱心人院主眉須甘墮耳冤不冤屈不屈生殺那論祖與佛驢糞相逢換眼睛夜光翻作路旁物君不見雲深處兜率鐘聲等刀踞白拈老子解回互明暗相參向誰語言不言知不知雲邊老樹礙人枝月夜幾回橫瘦影驅烏錯解作蛇兒行未里頻滴瀝點點有聲何處覓一聲既爾萬聲同眼聽清音太古笛禪家樂調自朴不屬宮商辨清濁去聖遠兮邪見深紛紛魔子寧知覺笛既爾琴亦然子期千古臥黃泉料難拍手喚得起伯牙安忍再整絃高山上有流水一斗之名何代始曾聞大旱為雲霰三草二木生悲喜一六合水可見未合已前浪更險若言龍去水即枯性空真水成虗陷如是觀名正觀魔外從教心膽寒一大既然三大等事事同條莫自瞞頓悟了識轉智六七因中分等地觀門逆順痛自強年光宜惜莫虗棄補處尊相宗祖知足天中施法雨上方臺殿信玲瓏龍象當年成隊伍寒岩下異草青才說興亡不可聽空門尚復有消歇人代安能無朽榮漢高祖楚霸王山河百戰爭雌黃請看而今安在哉龍樓鳳閣草萊荒笑淮陰輸留侯自成自敗誰之由只為當頭一著差滿盤棋子未央收奇男兒不見快開眼却教婦人賣相逢多少稱英雄事到頭來皆納敗春夢曉聞啼鳥古往今來事多少昨夜東風過短墻殘紅滿地誰相眺初立表華嚴老法界精深試尋討前三可以學解知後一從來沒頭腦殃及兒孫卒未休天開林叟分青皂皮毬道人強證明也是自起還自倒房山好任行坐峰巒面面如花朵石磴蒼苔笑馬蹄冷看遊人攀鐵鎖上者上下者下流芳自古不可把老病不與人相期莫待臨時淚空灑因有身招寵辱因有心生好惡苦海茫茫難濟度直將兩者等乾城那怕房山路頭錯兄伯歌羊生虎犬生牛指鹿為馬誰所尤大抵人情反復閒波瀾未必喻能周勢所臨利所在血口論交心尚昧況復相酬杯酒中伊能便肯傾肝肺君不見有形大者惟天地包羅萬有纖不棄暑往寒來興與亡未嘗有心為軌則孔方兄勢耀伯威福年來甚輝赫骨肉相逢狹路中死生榮辱恣所役孔夫子李老君釋迦文乾坤三老最超羣直得於今伎倆窮相看品坐淚紛紛青者黃白者黑直者枉兮枉者直禮樂詩書過耳風五千十二乾蘆蔔孔方伯勢耀兄英雄彼此互崢嶸證今作古古作今仰憑神力無不成自笑從來不安分淡視二兄如土糞同儕盡道且狥時賦受剛褊情不近窮性命直甚錢東拋西擲信前緣寸衷苟有真機在頭上安能無青天雲山中風塵裏出處何曾有定軌士庶公侯一道看境緣逆順何悲喜言之易行之難好惡關頭戰歲寒自心未了強磨礱到底情根未易𢬵破鉢盂折拄杖一息不來都棄放單單剩得臭尸骸從他蛆出爛如醬爛如醬銀槨金棺無兩樣南北山頭多墓田未死誰非勢利匠吾所言大似正歌之恐犯伯兄病伯兄從此肯回光迷雲鑠破呈心鏡心鏡明便自信向來勢利真罪釁即將此念擴充之伯兄直下俱堯舜又不見君子小人豈有常魔佛還同雪與湯雪消湯內重尋雪何殊石女覓爺娘這般話甚易曉未解為緣人欲擾試看一念未生時日用身心奚大小忽頓悟子得母騰騰天性自相厚死生顛沛只如閒一段恩情無左右千古始千古末如我所說理方達若非我說別尋條從教佛也奉一喝道吉水懷鄒郎隔吉水兮望吉山吉山之下誰結菴菴前古道蒼苔滿獨許白雲閒往還山居歌遺兜率寺隆禪人山居春花木氤氳氣象斯幽鳥一聲啼曉夢等閒喚醒本來人山居夏雷雨龍蛇爭變化戶外階前雲水深禪人憨臥長松下山居秋石上裁雲補衲頭一任西風頻落葉園林芋栗已全收山居冬雪覆千峰與萬峰茅屋夜深成獨坐地爐達旦暖烘烘寄憨師觀音歌石頭船艙大幾多我與公坐寬如何一別三年不相見幾曾離得上新河然無船主為把柁普門尋得觀音哥觀音老哥我不異今寄觀音到廣城廣城亦不異船艙我公朝莫富歡情此情情在象帝先千磨萬折觀音憐故特分身作三老長年為公撑此船此船撑到安穩處何怕風波浪潑天浪潑天浪潑天寶船廠裏結因緣我聞南海寶最衆公載衆寶船滿乎船若不滿重相見觀音老哥意何如意何如意何如巨峰海月明如鏡照破支郎不丈夫龐德公歌襄陽龐公少檢束白髮不髠亦不俗世所奔趨我獨棄我已有餘彼不足鹿門有月樹下行虎溪無風舟上宿不識當時捕魚客但愛長康畫金粟杜口如今不復言龐公為人不曲局東西有人問老翁為道明燈照華屋五言七言正兒戲三行五行亦偶耳我性不飲只解醉正如春風弄羣卉四十年來同所事老去何須別愚智古人不住亦不滅我今不作亦不止寄與悠悠世上人浪生浪死一埃塵洗墨無池筆無冢聊以作戲悅吾爾岷江歌藍袍不服服緇袍身處塵喧慕寂寥山水移來杖藤上閒消那得白頭毛頭毛白雪覆層峰趣難得從教熱惱化清涼娑婆不異蓮華國但將憎愛付岷江龍堂寺裏龍初出龍初出千山萬山雲墨黑火星撞見老比丘伎倆難施空自泣古㵎歌直下千峰與萬峰山中一雨瀑千里流來深處湛然滿分出池平映遠空君不見源遠流長出處高終歸大海作波濤此言雖復尋常句得意忘言理本遙又不見言說法身無精粗忘言得意皆真如白雪重疊流水聲側耳聽來有若無自太宰與諸君粗言細語如蟲食木偶爾成文有心無心路既窮流水冷冷出白雲達觀道人健行腳海北天南遍摸索青山飽飯臥松下泉聲咽石催夢覺夢覺眼開天地寬寒暄何處不安樂偶然乞食來荊楚淨業禪房竹几角禪人笑而示此卷兩耳泉聲洗煩濁橫疑身在烟霞中禪房何日誅茅縛溪聲果是廣長舌說法何勞口聒聒髠丁歌恣軟頑恣軟頑去聖遠兮無羞顏髠丁六羣與七羣飽食遊談胡亂攀或攀佛或攀祖佛祖吾曹當踵武羊質虎皮遍諸方為非往往煩官府官不知橫生疑玉石俱焚一同看遂謂緇林無靈芝三家村七里店善惡賢愚皆可驗檢名審實情難瞞善者賜香惡賜劍賞罰明奸莫逃難將黑白昧絲毫空門廣濶人烟衆荊棘梧桐各有條鳳棲棘梟聚梧鳳梟自然精神殊莫因棲止眩毛色梟豈能作鳳鳴乎佛知見貴戒律背則凶兮奉則吉為僧若不斷葷羶如來呼為髠頭卒城市裏山林閒名藍真宇指可頒相將十九廢七八疏山石門徒悲潸推所自廢寺由不因黃冠因髠頭髠頭若使守戒珠福田自然多秋收實相米飯如雪嚼破一顆狂心歇狂心歇處本菩提光還自照無圓缺僧如此孰不敬敬僧檀那心亦正僧俗心光照不窮疏山石門行正令正令行兮神鬼泣當機佛祖難攙柄陳瑩中人中龍天台教觀有門融上藍長老世英勘宗教精深覺範翁登那羅窟有感君不見太朴未鑿混沌始情與無情無彼此瞥然一念是誰生骨肉山河成礙窒那羅窟甚深密底裏空明不可測見說神僧向入中雲邊千古遺包笠聞其風我亦來幽岩感慨增徘徊自慚身見仍還在菩薩有門不為開一直上莫分別凡聖都盧乾屎橛當頭若許著思量石人腦後重加楔由是觀休外參眼聲耳色髑髏寒常光一片色非色乾坤攝取一毛端又不見維摩丈室十笏許百千師座皆容處若言老漢弄神通分明瞌睡成錯去這妙用孰不有吃飯穿衣記得否自是男兒不丈夫超踔金毛變癡狗風吹草本非賊望影狺狺吠不已及乎大盜劫主人煩惱刀鳴遂竄匿業酒醉何日醒碌碌浮華俱酩酊輕裘肥馬送時光愁殺相知多此病且由他各管自沐猴性躁方痛治好惡關頭林木深上下何曾有定止鞭其後即回首叱去呼來不敢扭掌中繩索尚相持禪翁謾笑狂奴醜明道易履道難習水情潭豈易乾不是一番𢬵命做說時似悟用時瞞話到此淚如雨滴滴皆從肝肺出相逢罕遇箇中人愁人莫向愁人語既有苦必有甜陰盡陽回峒口乾閒來暴背解麻納寧知身在重巒閒夜來趣忘人情萬里烟波海月生設使侯王知此境便教敝屣視功名皮囊歌怪哉四大誠吾患害孜孜給其所需念念從其所愛未嘗少頃而哀矜胡乃忘恩之莫大正欲䇿進於清虗反招增損於勤怠正欲忘彼於無何有之鄉不覺遷移於愛憎之態幼而纍父母匡扶長以藉師資教誡晝則役我如馬牛夜則昏我如蟲蠆登山兮氣喘神疲涉水兮足寒腰瘵動時才覺得其所宜轉眼以成無能靜時方欲憩其幾微倐爾千條萬派我之恩德日隆汝之過𠎝日敗從今識破這冤家任我縱橫俱自在或赴火或投崖終不為汝生驚怪或中矢或嬰矛豈復還為汝罣礙但願人人出此情何分九蓮及三界若還一念被他迷管取來生償業債石門多勝閣啜茗問月歌連宵明月在何處明月今宵始見汝我問明月月佯聾清光湛湛嬌不語誰知不語意更深明月無心解相與海角天涯在在逢根塵迥脫月為侶月明若使有盈虧拾得寒山肯輕許李白把酒問月明月明石門翻問豫豫無所答指溪山溪山明月常所處我心即月月即我我兮月兮謾寒暑盧同七碗生清風豫啜三甌問吳楚吳王楚子安在哉章臺餘艎夢空舉雪消巴蜀春水來羅岕龍團試重煮瓦爐湯沸學雷鳴凍壑一聲忘我所臨川文昌橋水月歌君不見文昌橋上月幾回圓兮幾回缺月缺月圓非無心要知黑髮成白髮髮白若使不復黑無拘貴賤終埋骨金棺銀槨與籧篨骨朽到頭總須沒又不見文昌橋下水逝波一去不復返花開花落知幾遭流水送花無近遠近送前川花自沈遠送東溟花始損雖分遠近皆殘紅樹底悲歌何太晚月兮花兮是何物盈虧榮落信還屈扣其兩端情自枯情枯自然智亦訖智訖情枯著眼觀月明流水如湯沸如湯沸文昌橋斷應黼黻黼黻文昌功最高津梁萬古何崎崛何崎崛利害關頭情貴拂情拂理通津梁成頭顱水底休悲文昌橋上月明時法食遍拋無煩乞管教一飽忘百饑髑髏夢覺心非佛遊飛鰲峰悼羅近溪先生雲峰如花公如春春歸花自少精神高山流水初不異風月無邊缺主人主人一去不復返笑豫何事來遊晚梅花落盡浪花浮片帆風飽來迹遠舟停山腳望山頭橋橫半空跨絶巘見說羅公橋上行仰看青天橋上偃身心已視等虗空虗空豈復有增損翻身橋上東復西下方人見驚不穩羅公浩歌行雲停聲滿乾坤誰復隱歌聲全落麻姑泉泉化為酒解愁本愁本莫過利與名利名又以身為鍵身忘患忘神始全神全風塵即閬苑何必雲深覓從姑却被麻姑笑凡混羅公心曲歌中剖摩利支天司北斗一身多臂手縱橫各執法物心豈有有心兩手勞不勝無心千手妙自偶羅公此妙孰能傳能傳問君有受否有受心外則有法根塵亢然神復走身心翻作是非巢利名鳥爭好醜鷦鷯一枝身以安肯學烏雅開惡口惡口不開善口開開言終與理不乖橫說豎說萬竅號天風寧出有心哉無心根塵何彼此如去如來莫亂猜羅公此意得無得暗將無得化春雷春雷出地羣蟄醒醒後三家夢自回君不見儒釋老三家兒孫橫煩惱羅公一笑如春風無明樁子都吹倒旴江三月放桃花兩岸紅顏知多少莫道羅公去不歸雲峰古路無人掃悟道歌并序古人謂悟道難豫甚不然特作歌聊泄微意君不見牛與馬只愛憨眠不愛打草肥水美情更歡蹄角饑焦難可惹水中魚樹上鳥一樣飛潛無大小慕潭擇木最難瞞駭弩驚鈎太分曉又不見上達輕軒冕雲壑松泉苦耽湎空谷幽蘭獨自香終須不逐清風卷惟中人甘縉紳聲色遊觀意氣新瓊林宴罷喝如雷帶酒歸來燭已陳田家苦田家樂苦樂浮沈任豐約最是西風晚稻香濁醪肥鴨對斟酌南枝鵲瀚海羊蘇武當在冷獨嘗馬市開來三十年破膚將軍齒盡黃人與物殊階級喜則揚聲悲則泣莫言人貴物賤微一念未生皆獨立性所變乃為情憎愛交加理不清須知想念即本智覓水離氷佛豈成臨濟棒德山喝馬面牛頭手段辣士庶公侯隻眼看是凡是聖從宰割這些子真妙術掃却迷雲懸慧日大家都在清光中盲者依然黑漆漆再方便開覺路內外推尋心無住無住之心物我同熾然成異因喜怒喜怒起初無性離却前塵沒把柄智者頓達能所空迸出軒轅太古鏡等閒用處辨妍斷送瞿曇窮性命悟道易難在人人而果敢冬可春孟宗哭竹笋為抽蛇奴雖鈍亦登真滿天下老和尚一片舌頭橫贊謗一千七百葛藤窩都將截斷隨風揚喫飯穿衣誰不能死生榮辱奚欣愴荒墳見鬼不生疑便是金毛師子樣棕履歌破棕履聊相贐蹈遍千崖與萬仞試看腳尖未舉時聖凡側耳雷電迅勤警䇿勿懈困好把年光惜分寸塞北邊南往返勞不明大事千生恨又不見老達磨手持隻履過寒𡶊嶺頭相見果是真熊耳開棺事更訛何如老漢這棕鞋浪跡雲山與薜蘿直饒大悲千手眼管教摸索火中波又一事謾再卜來去如毬轉轆轆東村大伯最相知幾回正笑翻成哭妄念起不須覺信步茫茫最真朴若離大地覓腳根何殊離石求其璞誠實語若斟酌失却木梳問鋤钁向上程途有路行賺煞呆郎自擔閣登徑山歌紫柏老紫柏老一枝笻杖探奇奧但除中國未經封勝水佳山無不到惟此山未嘗攀春來絶頂叩禪關五峰盤踞諸天上雙徑瀠回萬壑閒唐國一號初祖芟茅剪棘開茲土燈傳終古慧光寒龍象繩繩爭步武這擔板不可綰是聖是凡一切剗直饒劍刃解翻身早被儂家笑杜撰法王孫喻鸞鳳豈逐山雞閒打閧羊角風高十萬里世閒榮辱誰能控朝出將暮入相一息不來皆莫仗拆天勳業目前雲罪過閻羅肯輕放君不見留侯揮臂入千峰不事君王事赤松不是好花開未遍等閒臺殿起秋風虎丘圖海湧崔嵬高入雲青松白石遠塵紛烟蘿深處前朝寺鐘磬風清時忽聞我曾投䇿禮大覺殿堂金壁光輝發誰將龍腦焚寶爐香雲繚繞沾摩衲今日君家見此圖當年勝事宛如昨人生韶華能幾何常年行樂不為多君不見吳王盛時強已極觀兵中國誰敢逆黃池敗闕歸來遲吳王山川帶羞色英雄夢在瞬息平地宮花變荊棘劍池今已屬遊人惟有魚腸伴枯骨又不見勾踐得意渡錢塘如花吳女滿舟航蛟龍欲得不敢奪越王載之還故鄉只今會稽仍復在竹箭蕭蕭變人代吳王盛越王衰越王盛時吳王敗吳越雌雄夢一場業魂千古償冤債前車既覆後車鑒一念回光復不遠雖然大小不同倫由來有理不隔線我作此歌有深意順逆關頭君却記吳越爭鋒尚已非儂家那復爭閒氣淡泊勤勞是本行精深內典明心志從他面面鼓風波一炷清香答天地消遣春光展此圖虎丘移入書堂裏題某公禪房歌羡公所居兮高曠而遠塵機重岩閴寂兮麋鹿同棲遲白雲抱幽石兮未可以有無知明月留清泉兮豈可以去來期雪竇撫髀兮薦此機者稀余拽杖出山兮孤松芳蘭牽所思牽所思兮在離微離則不可言說求微則不可心想推既不可求推兮天地一指萬物一馬渠即是我我即伊我即伊兮何所思看花歌看花來看花來花開花落樂多回人閒富貴亦如此看花幾箇心花開心花開色本空從來富貴花在風風中艷冶與馨色兔角龜毛豈不同眼見色耳聞聲聲色場頭多愛憎榮即喜兮辱即悲茫茫苦海岸難登看花好看花好寒暑相催人易老從今熱惱化清涼莫使清涼來熱惱花即心意最深相逢幾箇是知音文殊隊裏解翻身塵塵剎剎皆黃金花障眼眼生花分明本是却成差境緣好醜心外無天上人閒一朵花看花去看花去凡聖有無切莫住從來花相權最奇既解放開又揑聚問君把柄憑誰力看花歌意休輕舉贈戴升之君不見戴郎短小膽氣豪不畏岷江濤不畏廬山高慠然駕孤蓬意思何飄飄輕截蛟龍窟閒尋虎豹巢長松之下拜老衲老衲無印佩瘦腰戴郎所為為何事敢挹玄津滋靈苗靈苗一抽千萬丈天風忽起摩重霄見說稻花香十虗金湯大法安辭勞又不見戴郎裘敝黃金盡衆人相逢無不哂誰知屈乃伸之機頭角崢嶸待雷震泥蟠設無冲天志丈夫雖生何異死又不見勾踐報吳痛嘗膽孟明拜賜心不反破釜焚舟決一戰晉人堅守出不敢戴郎別我將十年𩯭毛相見驚蒼然精神不似觀河時負車猶困羊腸巔自慚本是解空叟不覺飲泣獨良久青春古道不再來戴郎此去莫甘朽廬山山色鎮長青岷江江濤鎮長吼焰光一朝燒杏花三尺烏紗也不醜再來五老望番湖莫言心事今朝剖
