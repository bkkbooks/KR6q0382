body:
  text: 明憨山德清閱法語汝見之與虗空者皆徧滿十方界不可揀空出見揀見出空葢空之與見必相待而有者故曰空見不分有空無體有見無覺者空不自有必待色顯故曰有空無體見不自起起藉空塵率爾照境如鏡照像初無分別故曰有見無覺此屬現量微涉覺知則墮比量矣示次公喜怒未形性本圓滿喜怒既形所發不過不乖未發則謂之和微有所偏則謂之不和和則吉祥駢集不和則萬戾勃興吉祥駢集則與佛祖聖賢同一血脈萬戾勃興則與小人種種惡類同一所習所習既深雖以天地為罏陰陽為炭造物為力毗嵐為鼓鞴卒難陶化矣於是大覺借空水以洗之夫眾生所以為偏戾者不過飲食男女耳得其正則為吉祥不得其正則為咎戾咎戾則所召惟苦苦則精神惶怖魂魄顛倒殊不知喜怒未發者與吾佛祖同然故戾於瞋者為脩羅戾於愚者為畜生戾於慳者為餓鬼戾於惡者為地獄惟天之與人吉以十善五戒耳此所謂六道者也然為天不覺亦可以為人為人不覺亦可以為畜若是眾蔽非以空水滌蕩欲復其真未之有也而不覺有三一則見思二則塵沙三則無明凡血氣之屬皆坐此三者所以不得聖道於理不徹於事不融於道不妙徹則無往而不達融則無事而可礙妙則統空有而無累如是現成妙用各各圓滿今吾人日用之中好惡積億人我山高順之則歡然而悅逆之則勃然不快喜怒既生靈臺即昧靈臺既昧見色即受色迷聞聲則被聲惑若香若臭甜苦澀滑好惡影子斯皆由塵發知知迷成戾戾則乖真一塊圓明六識破碎既為識矣計身為我男女相誑飲食相滋情波浩浩漱汩靡常於臭髑髏上妄想穽中作種種惡露天不能葢地不能載幽縶長劫變易形骸升沉萬態苦劇難言若人或遭蚊蠅所唼尚側掉而不安聞是劇苦而心不動者謂之最靈可乎以要言之一切劇苦始於不覺以不覺故於無身中妄執有身於無形中妄見有心既見有身心則堅者不覺是地濕者不覺是水煖者不覺是火動者不覺是風受者不覺因境想不覺因受行不覺因想識不覺因行故堅固執著能所八法於死生榮辱得失關頭小有所犯則心魂皇怖毛豎骨寒此無他病在不解以堅歸地以濕歸水以煖歸火以動歸風以受歸境以想歸受以行歸想以識歸行耳能力歸之則不覺成覺矣然正歸之際且道尋常所謂身心者畢竟何在於此洞達則可轉萬戾而為吉祥化不和而為中和身充八極而無患智周萬物而不勞此觀之門以空為路千里始步空非是道道即家山且道窮子還鄉唱誰家曲調咦剪燈不借傍人力儘有餘光照十虗示元廣空觀說在立則如候大賓在輿則如朝至尊此兩句書如不動舌根囫圇吐出敬容來善則善矣猶未盡美咄一片心光恒不昧虎狼羣裏總春風示吳元石任運徧知光本無待忽起分別能所亢然矣今一切眾生欲復無待之光苟不從有待之中立大志發大心則本光亦不易復何故良以有待之知惟周六尺六尺之外隔一紙則杌然無知矣寧惟六尺之外隔膜而不知即六尺之閒如髮毛爪齒之屬亦割剪而不知也如吾曹求無上道為即用周六尺之知求之耶不用而求之耶若用此求豈周六尺之知能求之哉若不以此求吾曹脫廢此知即等木石求無上道若此可求則一切無情皆能求道矣故曰學道之人不識真只為從前認識神識神即周六尺之知耳如外此而求又坐無情求道之難卜郎痛究之示卜生夫心不以理養則所見弗靈猶魚不以水養則所長非龍至人知此兩者必須交相養而能事始畢故奉塵剎而不厭勤循一真而非醉寂雖然初不以空寂為自己不免受七尺之累不以靈知為自心不免被攀緣之牽空寂故則死生禍福之橫來如雲觸石靈知故則好惡公私之倒置如風遊空果有志於大事此兩者忽而不痛痛而不恒恒而不化則繼往開來聖賢之種子斷矣若然者則天地萬物皆失依怙也豈有是處示法鐘昔毗耶城中有維摩居士以病說法度無量眾今桐廬先生亦以病說法能度無量眾乎若不能度無量眾則為病所轉佛言若能轉物即同如來我則曰若能轉病即同維摩如不能轉則維摩鼻孔在達觀手裏雖然且道此病從堅煖濕動有耶離四者有耶若從堅煖濕動有此病者則堅屬地大濕屬水大煖屬火大動屬風大彼四既各有所屬則此身果有乎果無乎有則病乃有地無則病根何在先生趁此時節須究病根所在則生也好死也好不生不死也不甚奇特即生即死也無不是好事噫身為苦本何須說四大分張病屬誰示項居士東源病中夫鐘不撞鐘撞不自撞人不引人鳴不自鳴聞不自聞是須三合而後鳴五合而有聞此眾人之情也殊不知離三求鳴離五求聞三各無鳴五各無聞各既無鳴無聞豈合三五而有鳴聞哉夫合三五而無鳴聞則鳴鳴聞聞果有鳴聞乎果無鳴聞乎於此洞然了知則妄不待窮而自窮矣真不待契而自契矣妄窮而真契究其功能非大圜為師非撞為士非人能引則吾曹即緣生而入無生功何所自耶然求功於鐘撞苟微其人則鐘之與撞不能自鳴苟微鐘撞則人不能作鐘鳴往復推求求功於鐘撞微人無功求功於人微鐘撞亦無功也惟其能所無功功無有待功既無待謂之無功之功無功之功先聖謂之內紹有功之功謂之外紹也嗚呼昧三則有鳴昧五始有聞如鳴不昧三聞不昧五則鳴鳴聞聞本無能所故無說而說法法豈有盡耶倘逢緣不薦必根境抗然因成失照則不免流入相續相待故曰汝應如是聞不應如是聽然坡公身為宰官而說法自在若夜光宛轉橫斜於金盤之中而衝突自如竟不可以四隅測也渠不得事不成就三昧理不成就三昧則不免口縫纔開事理鈍置或者誚東坡於文字禪說法多理障吾知其未夢見坡公在也釋東坡法雲寺鐘銘示元一夫鐘懸而無撞撞有而無人則鐘與撞不能相鳴必三合而鐘始鳴故鐘未鳴時聞不自聞必資鳴而後聞鳴與聞并前之三者非五合而後有聞則缺一不能聞可知矣五合而後聞聞果有聞耶無聞耶如有聞聞應有五如無聞則何殊木偶哉惟聞而無聞則無所不聞無所不聞則聞無所在聞無所在則眼與鼻舌身皆可聞也豈耳獨能聞耶若然者則正聞時聞本無聞聞既無聞謂鳴有無者非也嗚呼眾人擾擾束耳能聞則大圜谹然臥士擊撞謂之無聞可乎然無人引之功則兩者無用雖藉人引若微兩者人亦何功互而推之皆非有功非有功故無所不功如是則大圜廣長舌相徧覆十虗說無盡法然非以眼聞之誰領玄旨又臥士與人即舌耶非舌耶即舌則舌不撞舌非舌則舌不能徧古德有言曰喚作竹篦則觸不喚作竹篦則背今窮舌相於是則舌相又翻成竹篦子矣由是而觀則不免礙塞天下人去也故問關吏可否者未過關者也如慣過關者自能掉臂而行肯復更問耶如未過關謂聞非聽謂聽非聞何異宰割虗空爭其多寡而擇其肥瘦耶示元一四方上下謂之六合眼耳鼻舌身意謂之六根以為方決不可易根決不可紊則謂之眾人是不知方生於無方根生於無根設知之則方之與根果可易耶果不可紊耶雖然惟聖人在方而不為方之易寄根而不為根之移故能顛倒上下反覆見聞指地為天指天為地以耳見色以眼聞聲無為不可也示觀宗生滅滅已寂滅為樂此半偈者乃我大雄氏雙林示滅時作也自古諸師解有多種有藏教生滅寂滅有通教生滅寂滅有別教生滅寂滅有圓教生滅寂滅藏教必以撥生滅之波取止水寂滅為樂通教以即波是水為樂別教以波可會水水還成波不波不水為樂圓教以一波無水不波一水無波不水以不波不水無往不波不水為樂也者於此既然舉一物會通萬法皆具四教之旨顧其人善通不善通善用不善用何如耳達觀道人則不然別有出身之路請有緣者火速薦取如何是生滅滅已吾指解伸如何是寂滅為樂吾指解屈伸兮屈兮即吾指兮離吾指兮非即非離兮是即是離兮眼中有筋骨裏有骨快性男子向此咬嚼得破則三世諸佛與此人作奴兒婢子去歷代祖師為此人為牛為馬去若咬嚼不破正好向達觀栗楖棒下討分曉去珍重珍重示知忍此身本是血肉筋骨及涕涶津液煖氣動轉之風攢凄假合便有此相若能將此相識得破了便得真身真身之好不生不死清淨乾潔不同肉身有生有死有病有苦有勤有懶種種之苦都是此不淨血肉之身所招來常當行住坐臥諦觀審察身內五臟之上五臟之下五臟之中一一逐臟推尋肝在何處肺在何處腸在何處肚在何處腸中所藏何物肚中所藏何物著實看得分明想得分明了又當觀察從足至膝是幾節骨從膝至上又幾節骨從胸前至頭頂上種種觀察何者為胸膈何者為咽喉何者為頭頭中又有何物觀來觀去察上察下一一如看掌文如鏡照面了了分明自然眾苦漸息執著漸消此皆觀身妙觀也故曰觀身厭有形也此身是箇苦種癡人執著智者實厭諦信諦信不可忽不可忽若忽了不依我作工夫用力觀察現在諸病相尋死去人身難得至祝至祝上來都是觀身觀不是觀心觀若說觀心觀之功德比之觀身觀其功德勝萬倍現前晨朝起來管種種事忙忙不得停歇心中猶豫煩惱不知一箇時辰起了幾番夜來夢中胡夢亂夢悲歡離合與日裏一樣不差是故令人精神枯耗疲倦了也若能識破此心從何處生查得他明白一切苦根拔斷無疑最初觀起先觀此分別好惡之心夢想顛倒從境生耶從自生耶若從境生我無知覺不生若從自生境不觸我不生此心又以受蘊為根因有受蘊便有想蘊因有想蘊便有行蘊因有行蘊便有識蘊此名四蘊蘊者積聚義然此四蘊窮破了受蘊三蘊自然不生何為受蘊領納前境曰受境有六種眼以色為境耳以聲為境鼻以香臭為境舌以滋味為境身以觸塵為境意以五塵影子為境故受有六受對六塵而言也窮破一受諸受遂消故曰以四大觀身即得真身以四蘊觀心即得真心真身無死生真心無好惡雖曰無好惡不同木石一向無知即如明鏡物來自照好醜雖分本無照心能作此觀非但現在福壽安樂成佛成祖亦不難也我說不虗猛生信心我說若虗我舌當爛汝不信心汝苦當受一切聖凡證明此語可畏可畏示某居士夫殺盜淫妄飲酒食肉之習初無自性以無自性不能自覺要待逢緣始覺無性一覺無性則能履憎愛之場觸生死之境此覺不昧如定風珠一投大海波浪漸停所謂五習不遠而復凡為佛子者初心受戒貴先知此知此則名性戒不知則名事戒性之與事若氷水本無異同融則名水凝則名氷是故先知性戒則一切事戒無事而非性即如知氷為水則無氷而非水耳智潭智潭汝發此心誠為希有此點初心如初三之月終至圓滿雖然如是智潭若未知性戒且守事戒事戒積久熏炙覺性終有開悟之日事戒者有根本事戒沙彌事戒比丘事戒智潭汝當先受根本五戒培後戒之基根本五戒者一不殺生云云授智潭戒初春正光居士送𪹼竹供養三寶因著淨人試火者三一一皆響如破熱之雷忽憶佛令羅睺羅擊鐘鐘則有聲不擊則無聲此葢常情之所計也若以眼聽之則擊時未嘗有聲不擊時未嘗無聲例𪹼竹放與不放聲與不聲俱兩頭語耳如坐斷兩頭中閒亦安可得目前大眾以此聽𪹼竹之聲則此聲即達觀老漢廣長舌相也雖然可與知言者道不知言者管取未夢見在燒𪹼竹示眾若睡了不作夢時果乃無我則主出入息者阿誰若謂有我我在何處不解作夢卒然不知下落痛當屏息萬緣一念萬年萬年一念討箇下落方好商略此事如若乘興而來興盡而去欲以有思惟心卜度此事縱有一知半解總是以網張風徒勞無獲道人念公遠來且見懷有日所以不敢忽公好心特俟人靜身自問公公當念老病不與之期時光不可把玩得功名時不異夢中簪花失功名時不異夢中所簪之花為風雨摧謝慨花易謝而醒醒後逆思夢中簪花夢中花謝及至覺來簪者誰乎謝者誰乎醒來知簪知謝者又誰乎以至推未有我時我忽何來既有我時我不能轉物終被物轉畢竟病根在什麼處若檢得病根出簪花也好花謝也好開眼妄想也好合眼做夢也好不做夢也好見道人也好不見道人也好贊道人也好謗道人也好設檢不出儒也沒分老也沒分佛也沒分此是真實語如黑業濃覆便信不及若黑業輕見此語聞此語孰不感痛示馬新甫千經萬論說離身心故覺有身心即是無明不見有身心即是大智慧噫無明智慧初非兩事但順情時身心現前情消時身心廓落身心現前生死煩惱不待而來身心不見涅槃菩提非求即證示懷慈生人之大累莫過乎身心所以聖人先治自己身心之後然後開物成務辟如甕外運甕不惟一甕可運雖百千萬甕可以命人運之有餘力矣何煩自運哉眾人異此辟如身困甕中而欲運甕雖一甕決難運之況多甕哉又治身治心先務窮身心之始終然後能治之如不窮其始終而妄治之終不能也然身粗而易窮心精而難窮故先窮其易者作離身之觀稍稍成熟然後窮其精者則心亦不難窮矣身者何義身以聚為義心者何義心以附麗為義故曰離者麗也由是而觀先須聚五行四大身然後成境未當前則心不能獨立必境有以觸然後心有以附麗毗舍浮佛偈曰假借四大以為身心本無生因境有與夫聚而後有身附麗而後有心若合符契但眾人不以文字語言會其妙反被文字語言障礙所以通者成塞塞者不能通也如善會之何塞非通何通非妙智燈來前吾語汝汝當精窮身心始終之所以然所以然得則治身治心若屈無名之指也但患不肯屈苟肯屈之孰不能乎智燈勉之自今而後凡遇榮辱風波牢把柁柄堅然自持莫為前境所轉則身存而無死生之累心有而無好惡之偏慎之體之則千萬甕可運也示智燈饑火所燒可以食救欲火所燒難以色拔良以食飽則不饑色無飽理故也此兩者雖難易不同然皆同出於愚癡故曰愚癡不破飽復還饑欲終難飽由是而觀一切罪業必以愚癡為母一切福慧皆出於自心明了明了自心又以般若為母今有人於此視母為路人自以為不愚者得非愚癡中之倍人乎有能碎千金之璧而不能不失聲於破釜者有心無心之別也故曰慷慨殺身易從容就義難慷慨非有心乎從容非近無心乎仲尼曰原始要終故知生死之說夫禍福莫烈於死生如知其說則禍福乃細故耳何謂原始知生之所以然也何謂要終知死之所以然也知生之所以然則生何所忻知死之所以然則死何所戚雖然眾人之情有我而昧昧以性成堅逾須彌苟不得其道破其堅執亦未易也予讀金剛般若波羅蜜經至如來問須菩提曰若善男子善女人以三千大千世界碎為微塵於意云何是微塵眾寧為多否須菩提曰甚多予不覺置卷熱淚橫流夫何故慙我自無始以來堅執一合相計為實有勞彼至人婆心委曲以三千大千世界可碎開我迷雲奪我執恡不異殘氷蕩漾於春海片雪飛觸於紅爐此恩此德深大難酬我既知一合置於三千大千世界之中有若無也況世界亦可碎乎如來言世界微塵所成即仲尼原始也言世界可碎即仲尼要終也以黑白之徒習儒不閒儒習佛不閑佛致不遑會通焉嗚呼惜哉夫千金璧可碎破釜不能不失聲情也知大千可碎微塵可合而成世界理也情則有我而昧理則無我而靈老人願聖香自今而去痛以無我而靈者為前茅庶不負如來聖人深慈慨切聖香痛勉之夫惡無大小善無淺深而有心為之則罪大功微何哉良以無知為惡雖有丘山之罪而君子察其無知猶乃恕之故物莫不善於有心有心為善則有執有執則有邊際唯無心者為善始福等虗空耳由是而觀有心為善尚不可況有心為惡乎易戒有心老亦戒有心然觀其象而察其爻亦未始無心也老亦不敢為天下先而不敢者寧非有心乎故有心無心唯聖人善用之無入而不可也自非聖人不唯有心有過即無心亦未嘗無過若然者則初心之人如何作功能辨此者可以讀易老夫梧葉落而知秋葭灰動而知春梧葉葭灰非可見者乎春與秋非不可見者乎然微可見之物則不可見者終不見之矣苟聖人不以可見之情見不可見之性則性終不可見也夫性不可見則我固有之全失固有之全失則我欲立於大全之中而運其末亦終不可得而易之道亦幾乎息矣易息而謂天地萬物存則天地萬物皆易外有也雖至愚不信予以是知性有性之體性有性之用性有性之相何謂體用所從出也何謂用相所從出也何謂相昭然而可接者也如善惡苦樂之情此相也苦樂之情未接靈然而不昧者此用也外相與用而昭然與靈然者皆無所自矣此體也昔人以性無善惡情有善惡殊不知性無性而具善惡之用用無性而著善惡之相若赤子墮井而不忍之心生此善之情也此情將生未生之閒非吉凶有無可能彷彿者乃不知其為心而遂認心以為性所以性命之學於是乎晦而不明也即易之卦爻有謂卦寓性爻寓情此亦認心為性者也夫卦六十有四而吉凶之情具而未著也具故非無也未著故非有也非無故則不可謂之性非有故則不可謂之情既不可謂之性與情謂之心非乎故六十四卦心之所寓也三百八十四爻情之唐肆也故內外之情吉凶之機雖錯變無常然不出乎封之內外爻之奇偶也內近親外近疎吉近善凶近惡親疎具而無我心也善惡具而有狀情也夫心與情易之道窮於是矣而心之前有所謂性者則非卦爻所能彷彿者也然離卦爻而求之則又離波求水也然如之何曰非予所知也知之者非知之者也是何故良以性不知性如眼不見眼故也宗教雖分派然不越乎佛語與佛心傳佛心者謂之宗主傳佛語者謂之教主若傳佛心有背佛語非真宗也若傳佛語不明佛心非真教也故曰依經解義三世佛冤離經一字即同魔說知身可愛之知知身不可得之知前知因身可得而立後知因身不可得而立前知如前步後知如後步前步若不起後步安得移前步續後步步步似不斷前知續後知知知似不滅初心作觀者此知不可忽痛究知知源源得知自歇知歇照萬物不勞無不徹只此不勞者亦名般若德此德常現前逆順湯潑雪入死併出生自在不思議此後未及言能到終自知舌板搖脚跟無上法輪轉顧生寶而藏之俟汝受用得來方可示物示聖堅男子家不知自重自大則靡所不至矣不自重則物重而身輕不自大則物大而我小重者大者我則篾有輕者小者却受不辭夫至重至大者無擇老幼賢愚誰不具足特以微名小利浮榮輕爵賺誤了也人人本來心光照窮三際示馬子善解等火觀等薪薪無火而不化火無薪而不傳是以大心凡夫即熱惱心頓開圓解之火即生滅之心漸副解火如凡夫初入信乃至十信生滅功完始登初住辦不生滅行至八住始得無功用行斯意昧久他種安知生鐵男兒欲究明此事無擇智愚但辦肯心直下即得噫當昧爽之際交生滅之時頭面忽呈動睛已失故曰彩雲影裡神仙現手把紅羅扇遮面急須著眼看神仙莫看神仙手中扇心光本湛妙物無累橫生知見失彼精明是以眼識黏色耳識黏聲鼻識黏香舌識黏味身識黏觸意識黏法奔境流逸竟各忘返殊不知五識一覺唯六熾知六若不熾彼覺何咎故曰初居圓成現量之中浮塵未起後落明了意根之地外狀潛形故全覺斯缺能悟潛起痛於境緣逆順之際是非榮辱之場歷然挺然觀一切得失如雲觸石如風過樹了無窒礙始不負為男子漢出家標格設負之生不若死也全其體之則缺者全矣缺者全即屙屎放溺皆佛事也寧獨拈香撥火為佛事哉示全禪人韓信白起今昔孰不以大將稱之然但能戰人不能戰己戰人易耳戰己實難戰人如以手捉物戰己如以眼觀眼想此等境界如何下得手想久得入一旦十八界魔兵蕩除五蘊巢踢翻一安永安長劫作個無事人去如此豪傑將韓白較之奚啻醯鷄之匹大鵬也本白本白精進度日十八界未空五蘊濃厚膏肓之疾未瘳死生之夢未醒敢因循而偷活哉示狄明叔男子立志必操從苦起業就艱難鴆毒浮華驪珠澹泊歷風霜而不變累歲月而恒新擴襟抱於愛憎之關蓄精神於榮落之際尊知而履韜璧而光尚友千古之先定理一心之內崑崙可拔拳石難傾汝果能之不負此晤若夫蔽日月之光於覆盆之下窮風雲之思於閨閣之閒而能揚音於丹桂之叢奮翮於黃埃之上安可得哉示于潤甫夫眾人知貴生而不知所以養生之道故為生之所累至人知養生之道本於無生故能視生無生無生而生生無物累也嗟呼目為色之所累耳為聲之所累至於心為七情五欲之所累猶曰我平生快樂無累殊不知無累者累之久矣葢眾人欲重神昏坐過而不知焉辟如醉夫臥於泥淖之中人曉之曰此泥淖非可臥之所也醉者瞪目而怒曰我生平不解飲酒汝奚誣我今天下俱抱醉夫之疾安得有不醉者而與之言哉教理行果此四者乃黑白凡夫之模範也如黑白凡夫不以四者為模範未有不遭邪小所網者邪則外道是小則二乘是教乃圓教理乃圓理行乃圓行果乃圓果如四韋陀五明典籍是外道教如阿含等教是二乘教如華嚴法華圓覺楞嚴等教是終教頓教圓教是故於邪小發心是邪小種子於圓教發心是成佛種子又佛性有三有緣因佛性有了因佛性有正因佛性正因佛性我雖固有必待了因佛性開之了因雖能開正因佛性又必待緣因佛性熏發之夫緣因佛性者非他物也即圓教所詮之理此圓理在凡夫分上謂之無明如以圓教理火熏發之則此無明以理火能熏炙之力而凡夫無明於不知不覺之中轉而為無塵智謂之了因佛性無塵智真積功終謂之金剛無礙智金剛無礙智謂之如理智非如量智也以如量智能開物成務接引初機以如理智非理外之智智本無功非智外之理契而無能故智與理理如春水智如遊魚水無養魚之矜魚無樂水之趣魚水相忘而養而遊自然與萬物共也初心凡夫如金銀銅鐵教理行果如大冶洪爐金銀銅鐵融而化之倘不假模範欲其成佛祖聖賢之像終不可得也故教必有師開理則圓理圓則行不偏行不偏必正果大備然華嚴文富法華幽䆳楞嚴微密圓覺簡備此四法寶當各寫一鬮澡身漱口置鬮佛菩薩像前嚴整衣冠至心禱祝弟子某如往昔親近佛菩薩因緣何經因緣熟信手拈之拈得何鬮即鬮得經盡形壽受持不敢懈怠如受持經後佛知見稍開決不敢獨善一己誓必如一燈之明傳千萬明千萬明傳之於無盡此初心凡夫依教理行果之模範如鼻祖西來直指人心見性成佛則教理行果之窩臼早破這缺齒老胡踢翻了也且問雷雨居士教理行果窩臼既被老胡踢翻了也雷雨於尋常日用之際又將誰家窩臼棲泊宋別駕朱炎一日問講僧義江曰此身死後心在何處江反問曰此身未死心在何處炎猛然有省呈偈曰四大不須身後覺六根還向用時空難將語默呈師也只在尋常語嘿中江首肯之雷雨於吳門天池山初晤時亦首問雷雨日用能分別心畢竟在何處屢問屢拶雷雨竟無有答詰朝遂別於天池只今天池風月依舊而問拶話頭不知得依舊否如得依舊豈有真積力久而疑團不迸破者哉又雷雨二次書來有王制臺求開示之囑制臺於理水未深不便裁書請益雖然書雖未裁而制臺菩提之心早發於語言文字之先矣此語言文字之先之心即鼻祖東來直指之心也如於此能直下信而不疑用處廓達則天地萬物皆在制臺掌握之中何況西蜀一省不霑制臺沛然之法利乎宋朱炎呈偈後不久立化於多人之中啟無量黑白信心雷雨居士能不忘吳門天池風月則峨嵋風月又豈在天池之上哉古德曰若人識得心大地無寸土達觀則曰若人識得心心外無風月修山主曰風動心搖樹雲生性起塵若明今日事暗却本來人達觀又曰修山主但見錐頭利不見鑿頭方達觀但見鑿頭方不見錐頭利敢問王制臺與成都使君且道修山主與達觀孰雌孰雄若辨得出則教理行果窩臼不踢翻也不妨倘辨不出即踢翻教理行果窩臼管取此身直得無棲泊處偈曰峨嵋風月與天池幾處歡歌幾處悲心外了知無別法境緣逆順盡吾師寄示雷雨居士兼轉王制臺偶與宇泰言及禪門宗綱因舉機不昧終始如王太傅勘朗上座又如僧問青林展轉接拍冷然恰好朗公不得明昭謙代轉不免機昧終始去也其臨機之際賓主酬酢如兩鏡交光瀰滿清淨中不容他如涉一毫擬議即片雲點太清矣這箇境界不可作人我會不可作有心無心會觸著即應豈念慮可及靈然接拍豈木女同倫此非見地乾淨保任圓熟權衡在手殺活自由的漢子管取張良智巧淮陰作略直得鄉關萬里把柄已在別人手裏殺活憑他脚跟波波地隨人轉去如此之流近來覓一箇半箇尚不可得何況真沒力量漢愈加愁人且道如何得懽喜去蕭蕭夜雨蒙頭坐淚洒春風不盡哀漫山徧野野狐精到處逢人瞎眼睛實法與人誠漏逗無規說法轉悲零晏坐示仲來迦葉菩薩問佛云一切眾生見妍是妍見醜是醜諸佛亦見妍醜了然不昧如何眾生即是妄想諸佛便不是妄想佛告迦葉云一切諸佛但有世流布想於中不生執著一切眾生於流布想中妄生執著所以被妍醜轉却諸佛如鏡照物影像交羅有何妨礙此是教中糟粕衲僧門下即不然驢胎馬腹教誰去不是觀音即普賢信得及入地獄有分信不及入魔隊有分若要兩家坐斷做箇出脫漢子去朝朝夜夜夜夜朝朝若此身心著何處行藏曾不離刀山示仲來世閒有兩種親眷一種濃厚滋養道種一種濃厚增長惡習若是有智慧人惡習親眷亦滋養得道種如力量不甚大必須生處要熟熟處要生這裡見不真行不力千生萬劫受他累墜即如女色一端父母婚配本欲紹祖先血脉名教良規世閒豈可少得有等人兒女既有淫慾不斷籍此為樂迷戀沒世終無醒日堂堂男子被這臭溺孔斷送一生一慾迷心萬理斯蔽子本從父母生一聽婦女之言父母之言永不入耳君臣分上往往有犯此過兄弟朋友不言可知色慾迷人如此惡毒傾覆大倫不惟增長惡習纏綿靈識何日得脫古德有言寧近毒蛇莫親女色毒蛇害人不過此身女色繫縛塵沙劫波尚難解脫惟有法屬之親轉多轉益滋養道種終當得果明師良友不言世務但究真宗以般若靈津迭相澆灌耳根薰蒸了因正因漸著孜孜永久一念相應大事了畢生死高超塵網頓脫如華鱗入海永無羅網之患法友眷屬利益如此世人不以為重生死眷屬受害如此世人皆以為重如真學道人於此不可不具眼不可不知好惡若不知好惡不是地獄種子定是魔家眷屬如此等流夢見猶驚況聚首促膝而論道哉仲來此理亦當謹慎自己無過亦可將此化人較之粧佛造殿濟貧拔苦功德愈多何者法屬興隆正教得行正教得行魔風殄息菩提種子徧塵彌剎如春迴大地百物遂生當來成佛眷屬參隨弘大法化必今日培植者噫用力少而收功多丈夫不可不取示仲來聖人本無常心眾生本無常習是以蚖蛇蝮蝎無非大士之分身菩薩如來無非眾生之本色聖人若有常心何殊木石眾生若有常習則佛祖永無相續是故觀音神頭鬼臉凡形聖容百千方便泛用隨宜一一皆菩薩悲田所出譬夫片月在空影臨萬水豈思量分別可測哉悟此則菩薩隨處出現矣俗諦中人入吾法中如人溺大海露髮髻子善知識提擕如援髮髻子相似須自家盡命掙著不然是自要沈沒千佛出世也難救取示眾我聞如來三十二相凡一一福皆自受用惟白毫相光此福不受慈惠兒孫享用無盡是故檀越滴水根線臨當受時觀此白毫圓照法界無論聖凡影現光中由是施者及其受者俱現光內了無能所三輪體空不昧物我如是作觀一切有為皆成無為受白衲禮佛夫佛法本平常而世以奇特求之故往往不得佛心也故曰平常心是道此平常心凡有血氣之屬皆本有之豈待佛菩薩傳而後有哉若必待佛菩薩傳而後有則世人日用境緣逆順好惡多端以非為是以是為非熾然而分別不歇者此又何心哉此即平常心也但眾生不善用之而現三毒奇險之心也如善用之則眾生三毒奇險之心即是諸佛平常之心也雖然眾生奇險習熟脫聞平常心是道之說自然承當不下葢其平常習生故也是故必須待佛菩薩以寶几珍御之風鼓吹而化其下劣之心則荷擔之心生矣此一心生又追惟往時下劣之心鄙而惡之於平常心則生大驚異以為聞所未聞得所未得故沒量大人知其如此復以狸奴白牯之風鼓吹而化其驚異之心至此則聖凡情盡平常心開開而用之謂之大機機之為言葢取照不昧用用不昧照耳夫照不昧用則謂之真照用不昧照則謂之大用故臨濟曰沿流不止問如何真照無邊說似他離相離名人不稟吹毛用了急須磨吹毛用了急須磨者變而不窮之謂也一微涉動則吉凶橫生能洞照微先則禍福𪹼落但眾生迷染成性卒難回機機苟能回習染漸釋如習染終不能解則過現諸佛又從何來過現聖人得道有據則習染雖久必有除因知有除因而甘隨習染者此一種人自有閻羅老子不放過渠在不勞旁人代渠擔憂葢此一微不出四運故以四運觀之微本不有何況有動何謂四運未微欲微正微微已是也一微若實有者豈假四運而名微哉雖然四運觀微微實不有則涉動之時於可意境便覺懽悅於不可意境便不耐煩此懽喜與不耐煩果體四運而觀有此兩者果不能觀有此兩者如果體而觀有此兩者是兩者習熟此觀習生故也如此觀力強兩者力弱則得力不得力觀者自知勝負故曰解不難而行難行不難而克終難克終不難而忘又難故惟忘而能用者則觸途成觀矣又道前道中道後有兩順一逆真妄工夫不可不知者何謂妄順清淨本然而忽生山河大地是何謂妙順泝而上之緣情復性是何謂逆性復而悲同體駕慈航而拯濟萬有是此兩順一逆東方出聖人西方出聖人上古出聖人現在出聖人倘滅視而不信者皆天魔外道非聖人也夫業未嘗不真心亦未嘗不真業之真即心之真心之真即業之真真外無業與心心業之外亦無有真即此觀之一切眾生於顛倒七趣之中本皆現證者也以眾生日用而不知於現證中橫生分別故現證者日用而不知也殊不知於日用不知之中實未嘗不現證者矣如心不知身則身本法身身不知心心即本智法身如鏡本智如光光依鏡有光還照鏡本無所能何事非真今有人謂心不知業則業無待業不知心則心亦無待便謂罪福皆空我不可得殊不知罪福皆空待罪福未空者之影耳我不可得亦待我必可得之影耳是皆嗜欲情熟研真理生說時似悟對境還迷者也如法華之妙法法即一切萬法妙即了達萬法之外初無別真故曰借婆衫子拜婆年又曰妄想無性將甚知業業亦無性將甚知心心不知業能存而無我業不知心所存而本虗無我而虗所能不昧知而能行日用無生知而不能行日用愛憎日用無生陰陽雖巧不得加陶鑄之功於我矣日用愛憎根境雖無性則無往而不搖我精精搖則六合六合則一失一失則頭迷頭迷則心粗故曰心粗亂撞頭又仲尼心不死日用自然活顏回心死活不得故便不能不言而信不比而周無器而民蹈乎前葢回日用之際回必知民民亦知回以兩相知故能所橫生活者死矣故曰有我我在天地中無我天地在我中我乃生於可欲故有欲者不能不生生既生矣不能不死天下有欲長生者端以生為福死為禍故曰禍福莫烈於死生葢不知功德天與黑暗女我能一心不生彼將不待遣而俱逃矣然後同天下吉凶而吉凶莫能累也如是者謂之正因反是者謂之邪因又橫計心外有法不能會萬物歸己謂之外道以此觀之外心則無生無生則無滅如生生滅滅動動靜靜通通塞塞恬恬變變離離合合暗暗明明本一精明映彼六者流而不返近取諸心則為生滅遠取諸物則為明暗晝夜古今寒暑之多也而天機深者悟一塵泝而上之則餘黏齊拔矣故曰緣見因明暗成無見不明自發則諸暗相永不能昏此指眼根脫黏而入也至於意根則緣知因法無法無知不法自知則諸滅相永不能惑嗚呼使貪長生者洞悟此旨則痛悔向之所為首越而之燕也百尺竿頭蹈大木而驚悸大地之上履寸板而坦然此何故哉竿本不虗地本不實一切眾生於無虗實中橫計虗實故皮毬子曰有一事則有一義義宜也如地宜堅水宜濕火宜熱風宜動如堅者濕濕者熱熱者動則非義矣理則不然堅可以為濕濕可以為熱熱可以為動動復可以為熱熱為濕濕為堅葢宜者可以不宜不宜者可以宜譬如輪之始終豈果有端哉故地水火風又名曰四輪然輪雖不可以始終窮外鐵則輪何所有義理辨夢悟醒迷聖凡途隔究其所自不過未達本源故曰達本忘情知心體合即此而觀情未忘時不必以情忘情何以故情終不忘故如一達本情不待忘而自忘矣如體未合亦不必求合何謂體合無思契同也若然者知心即達本達本即知心明矣是故達本知心之人雖同眾人紛然於夢境然其達境無性知心無外愈夢而愈覺一旦夢緣𪹼斷覺影亦空故不同於醒迷之曹如本未達心未知雖其人忠信廉潔如伯夷叔齊其情執堅固過於須彌之難破也此難破之執謂之一合相此一合相是一切眾生之痛瘡疤雖父母妻子稍觸其疤則無明之發烈如猛焰況他人乎聖人知此相之難破以為須彌雖則堅固勝一切然以三千大千世界較之則須彌又太倉稊米耳故聖人一碎三千大千世界以為微塵使眾生知三千大千世界堅固於須彌者尚可碎而為微塵眾況我蕞爾之軀塊然之相豈能久留而不可壞哉且此世界不能自有其體必合微塵眾而成微塵眾亦無自體必碎世界而有故以世界觀微塵眾則微塵眾不可得以微塵眾觀世界則世界不可得世界與微塵眾既互觀而不可得則一切聖凡依正二報且道畢竟安著何處偈曰兔子懷胎產六龍不惟為雨更為風臨機縱奪能翻弄一片春光萬卉融
