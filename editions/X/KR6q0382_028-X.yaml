body:
  text: 明憨山德清閱詩七言絕登吳江華巖寺塔漢武何須問劫灰只今滄海舊塵埃塔燈誰點吳江上直得魚龍睡眼開空堂夜坐趺坐空堂如水清靈機歷歷自超情百年三萬六千日安得須臾此地行詠于三公觀察十郎竹秋風疎影搖窻冷夜月清香引坐深更愛諸君能抱節不因霜露失初心弔鶴林寺松從來說法有松濤老衲無煩舌相勞誰料一朝都伐盡幾回歸鶴夜尋巢寄吳江諸法侶吳江明月舊時同萬里迢迢向蜀中寄語長橋流水道莫催塵世白毛翁寄仲湻去去峨眉萬里餘掉頭東海意何如但將親骨埋平地到處青山好著書贈姚國賓柱史歸來一篋霜其誰問疾到東昌汾河片影巢陵月千里關山不盡光悼大千老師八功德水最清涼飲者能消熱惱狂不二樓高雲散盡十千龍象益悲傷靈巖喜汪將軍傅侍御至却掃風塵進白雲空山流水靜中聞九重天上人多少遍數那能及二君佛香院佛香院裏過清明門外垂垂柳正青怪底曉鶯啼不斷廣長舌相蕩風輕宿東臺絕頂風高白日寒雲山重疊檻前看夜深徙倚南樓柱喜見滄溟湧玉團題玉女潭仙肌香潔本無塵未必臨潭浴此身自是山公嫌寂寞裝成幽勝引遊人弔玄晏桃紅李白春光好誰料東風夜半狂玄晏先生非寂寞菜根滋味古今長過玄晏草堂春鳥啼來花已深草堂可得靜居心逝川既去不復返幾度臨風淚滿襟示姜士華火宅焦煩豈久居𩯭毛成雪費驅除故山相去無多遠車大蓮華衣裡珠示端雍花落花開幾度春此身如夢亦如塵曉來聚散東風急紅點蒼苔色不新示傅公肅四首江上芙蓉向曉風霧華初染色偏濃人閒樂事真堪笑歌管樓臺寫鏡中白髮從來不怕人侯王頭上曉霜新還家莫道關山遠一念回光凍地春日月升沈不解停𩯭毛鏡裡雪花明何如掉臂風塵外閒伴樵漁過此生逝水滔滔日夜鳴浮生誰復解心驚青山常在人頻老紫陌絃歌不可聽示韓生螺髻山中雪色寒綉衣雲外有彈冠韓生也解聞鐘磬消盡聲塵領八還寄鐵菴居士天雄山色武夷同負約尋來入夢中怪底維摩常抱疾八行無鴈有誰通遊海門二首嶽宗朝會古來聞此日尋源到海門寄語行邊碣石上圖南還有北溟鯤青山結伴好忘機春水桃花一色緋鵬翼自憐風力細毆魚先向海東歸避暑蕭岡利名不識有何親累殺世閒多少人在處松泉堪避暑肯將白足走風塵偶成八首烟波堆裏道場開車馬終難踐碧苔清梵竹籬關不住磬聲飛出水雲來山頭百畆鉢盂田聞道英檀據有年此日雲居得新主彫胡食盡好垂憐襄江一水曲何多兩岸桃花色未酡莫道春寒楊柳怯乘風也解弄烟波建昌山水勝臨川縱使王維畫不全風大觀成君試看直將吹放小西天祖庭秋晚覺花空祗樹蕭條鎻梵宮幽鳥似憐無縫塔幾回腸斷呌西風四顧乾坤一洞然長江萬里片帆懸潯陽此去無多路五老雲開翠潑天野水去來六七里小舟黑白兩三人雨餘自是烟波潤歸去清歌月色新朝來金鳳賣紅香朵朵含羞挹露光色更空生空更色謾誇飛燕體輕揚聞磬長堤短岸絕烟波彷彿龍宮隱薜蘿風煖磬聲飛欲斷遺聞誰解聽漁歌夏日曲阿梵川偶成三伏乾坤一甑同靜思水壑駕寒松凍雲便覺生毛孔不若長齋繡佛容泛舟梵川二首綠楊堤畔微風起紅掌爭驚碧玉盤誰棹小舟橫水口清香拂拂帶輕寒不抹胭脂趣已幽自憐顏色照池頭須知此外無空相蜀錦何妨隔水浮春日重遊光德菴流水桃花大士家道人曾此泛星槎白牛塘上閒吹笛歸去兒童日已斜慈壽訪勞盛主人不遇千巖披月到風塵一訪那羅洞裡人莫道過門余不入香雲騰處示全身過玉河觀音寺一徑秋雲到薜蘿隋唐陳迹問烟波重來誰起祥公定馬上行吟五噫歌客東雲居寺即事軒冕松雲調不同那堪簫鼓襍疎鐘一聲長嘯出山去野鶴從來無定蹤顯靈宮聞邢煉師語有感仙源密邇蕋珠宮雲盡天壇月正中松露鶴翻曾濕袖相逢莫笑野烟濃過西雲居寺有感萬里峨嵋去復來古無字洗蒼苔琬公慧命誰將續淚洒青山染刼灰南嶽觀音沼流泉豈是世中聲妄想紛飛聽不成試把耳根暫拈却雲邊別有路通明鏡虗鏡裡虗空花上春未生心處却投真若教蜂蝶紛紛集只恐東風解作瞋望普說殿廣長舌相覆虗空佛與眾生吞吐中隔壁釧聲生殺柄清涼熱惱辨雌雄尊者堂雙松盤據萬峰腰靜夜微風學怒濤龍象百千相次禮捲簾喜見鳳頭高戒壇偶成黃金不記築為臺死馬能牽樂毅來絕壑築壇傳佛戒大雄家具凍雲雷結冬永慈寺贈蘆芽主人妙公莫測深林虎豹居道高何事費驅除危峰環列聽禪觀流水瀠洄學梵書悼壽禪堂師宿草平興共度關只今靈骨葬空山瓣香飛奠秋風裡流水聲中塔影寒芙蓉閣偶成白犢溪頭過小舟布帆風急浪花浮烟深不識歸何處時聽歌聲到畫樓約王泰宇登茅山因未返賦此處處東風弄柳條行蹤猶未上三茅華陽洞口春將老愁殺遊人歸路遙吳中夜泊涼生蘋藻動秋風萬里無雲一鏡空今夜孤舟繫何處吳江清淺月明中吳氏廢園二首汾陽門第晉風流縹緲湖山感勝遊今日松蘿誰是主斷雲殘月鎻江樓築成金屋貯嬋娟草魘花迷知幾年愁見向來歌舞地古槐疎柳起寒烟寓匡山黃龍潭寄賓陽老禪一菴高結翠微閒千尺飛泉萬仞山月夜為誰歌白雪遙聞清響落松關山中老人青山回合路紆盤流水松風六月寒九十老翁忘晝夜醒時只把夢時看葛洪山訪澤上人路當斷㵎倚寒松重疊峯巒擁梵宮未過竹橋清磬歇老禪扶杖笑相逢西沼晚泊扁舟日暮泊孤村何物吹空天上雲臥看月明照清淺是誰遙指水晶紋憶山居勞勞白足走風塵纔別青山秋復春重疊雲深巖畔屋寂寥空鎻久無人訪鄭春寰不遇湖州城裡風光別一半人家烟浪中惆悵仙公醉何處柴門岑寂水雲封贈天竺僧十萬程途數載通沙頭彈舌授降龍五天到日頭應白月落斜西半夜鐘大方禪伯上山白雲一片解深藏家醜雖多慎播揚松谷老禪真面目太行山色自蒼蒼與鄒南臯居士孤松高倚大江頭日夕波濤蕩去舟野鶴幾回翔欲下風枝縹緲未能留過向城廣福寺萬簇雲山擁佛宮璇題藻井草萊封夕陽墟落向城北幾度鐘聲送晚風潭柘懷繆仲淳谷口龍泉一片雲去來誰復見離羣夜深唯有滄溟月無限清光不可分懷燕京諸居士羣籟消沈片月西阿誰寫出未生時長安不在春光外夢裡浮華幾箇知別開侍者日光寺前日已西空山搖落語離違行塵𡋯𡋯兩條路頭上青天不可移咏石乳泉石乳高懸不記秋半空珞珞瀉寒流遙知此去歸滄海大作雲濤浴巨舟志夢獨惜無人萬斛舟風波恍惚卒難留誰知岸上持竿者幾度斜陽淚濕裘示諸沙彌赤心片片為諸人痛棒難禁滿腹瞋只恐出門三十里恨心竟作水中塵囑蘆溝橋資福寺住持本公十年𢬵命死挨排逆順相逢莫動懷待過隆冬春自到千紅萬紫一齊開山居二首獨自經行未欲眠夜涼明月照松泉好茶一碗昏方歇踏破虗空別有天白雲無心道人心流水無迹道人迹心迹兩忘齊有無白雲流水誰復識別陸太宰有序余童時知太宰名既脫白始識於嘉善之大勝寺今逆推之凡易二十二寒暑矣余嘗見太宰出處無常得失參互不可以凡情測也如維摩以臥疾為廣長舌說不二法門夫疾與不疾為二死與生為二榮與辱為二老與少為二凡與聖為二了知疾即不疾死即不死榮即不榮老即不老凡即不凡是謂不二法門苟能入之雖火聚刀山皆清涼慈忍地惟太宰久入是法門故能於生死榮辱出處之際縱橫自在耳余少太宰二十二年辱太宰不以齒少貧病託於道義之分今將別而之晉陽披晤未期感而賦此春過丈室維摩疾夏到維摩丈室安此別不知何處去浮生開口笑多難謝太初靜主惠楞嚴集註萬疊寒雲抱寂寥日高猶自懶伸腰楞嚴十軸誰相送一炷名香笑裡刀自肯寮自訟莫嫌奇特障靈泉大用臨機不現前媿我毒心行未徹賺他男女落廉纖般若泉獨坐苔龕萬慮空瀖然一脉瀉層峰從教龍象如雲集供佛澆花用不窮月夜登海藏樓懷江南諸法侶頭上青天四面山一樓高聳翠微閒空窗最愛無雲夜溢目清光只獨看睡起示道開粥罷正憐方夢醒日高猶自打鼾眠開郎已解隨慵懶伸脚無端裩布穿自肯寮年來足跡遍江山五頂清涼未欲還却笑今朝心自肯河沙龍象任躋攀為新剃可禪人字止臺有序昔人有言曰知人者智自知者明馬大師住山時獵人石鞏逐鹿過其前問曰鹿何之大師曰汝一箭射幾鹿鞏曰一鹿大師曰吾則不然鞏曰師射幾鹿曰一羣鞏聞而駭之大師乘其駭而啟廸之曰汝能射鹿何不自射鞏遂反弓自射曰直無下手處大師曰這漢千刼無明當下氷消去也若然者信知人易而自知難人能自知如己眼見眼苟非就中人則石鞏之無下手處寧易言哉禪人名常可余字之曰止臺以渠剃染清涼誠無忘文殊老漢并其受業和尚之德耳雖然止臺能自知則臺可止臺可止斯恩不負人壽幾何老而知反脫不能於空閒寂寞之濵氷枯雪老之地以終其志非夫也止臺勉之世上稀逢七十人羨君老大出風塵慧刀舉處情根斷去住無忘五頂春再遊潭柘寺峨嵋萬里去重來法雨香雲遍九垓誰料昔年荊棘地空山已復湧樓臺雲盡見石門山此中山水如西子手抱琵琶面半遮若使風流潭看見今朝雲盡孰驚嗟悼栗菴居士武夷不改舊山青十卷楞嚴講未成慚媿自言還自食但將一頌寄延陵悼王方麓先生前生曾道是華嚴習氣臨終果現前釋尾儒頭難辨別還同竹篦勘癡禪旴江舟中望從姑山學得長生固是奇身存影逐有誰知何如只學無生好我既無生死自離曾為紫栢巢中鷇和好音聲總不如今日一編重舉似血痕沾洒透珊瑚滿腹春工著處栽含毫聊當一枝開是誰管領無絃曲雙徑迢迢庾嶺梅丁卯秋日閱刻紫柏集弟子元廣分預其役每見當時拈似處失聲而泣因成二絕句漫綴於末不自計其詞之工拙也歌願僧歌君不見大塊內大塊外凡屬有形皆聚沫風卷滄溟徹底枯皮既不存毛奚賴今與古知幾代搜剔興亡多感慨鏡裏豪華草上霜日出浮光竟安在大道喪仁義起愚智遑遑分彼此七雄五伯殺氣驕楚狂悲鳳譏孔子李伯陽爾胡為去華取實亦支離欲返真淳盤古心時人未必解相隨窮百家討眾論傍門駢戶增迷悶精閑文武戰功名究竟空餘千載恨自秦來不可說力并山河流杵血雖然美惡不同觀到頭名分慙先列千算計萬思量古往今來夢一場寒暑相推毛易白爭如削髮禮空王空王業貴人紹生死中流施櫓棹有緣拍手便登船一念不生等麤妙死井水豈藏龍巨靈一撥泥沙通百千三昧總心源橫拈竪弄振家風有等人眼睜睜欲心如火覓長生誰知生是死之媒媒在終難藥物成縱成得必有壞有壞修之非所解少年自笑學飛昇一段風騷幾為賣多算勝少算敗算來算去為僧快五蘊身心水即波聖凡坐斷無罣礙一瓶一鉢海山寬雲行鳥飛恣歌唄願為僧願為僧世世生生繼祖燈四弘為轂法為輪碾斷眾生愛與憎杜鴻漸王欽若生願為僧死負約不榮國相貴為僧達者自知解與縛青山曲碧水灣松竹風來益道顏相逢若問為僧事須信為僧非等閒喚鳥歌道人天放度浮生城市山林信脚行除却著衣并喫飯眼前無事可留情雲邊松松下石枕錫橫眠消白日從他花鳥報年光鼻息如雷睡正密忽醒來持鐵鉢狂謌出谷真快活望烟乞食向前村一飽那分精與糲風塵中境界別憎愛紛紛難了絕輸與心空及第人遇緣好醜何煩熱知不知漫自癡蕭梁陳迹草萋萋兩輪日月如丸擲竹馬兒童𩯭已絲貧與賤富與貴冷眼看來無面背狂奴自是賣高名平等光中生忌諱簑衣不著著羊裘七里灘頭成浪費這段光見不見日用堂堂同掣電直饒師曠與離婁竭盡聦明隔一線訪道易悟道難相逢幾個委心肝些兒拂意便生瞋神珠肯把與君看得此珠大事了我本不生誰復老流水聲中唱哩囉斜陽影裡喚歸鳥罷罷罷及早休千峰古木足清幽莫待飛高勌始下羽毛零落道難修弔開先湖月鑑公種樹歌君不見開先老僧號湖月羅公見之不敢忽贈之湖月非無取清明在躬體外拙湖上山月邊窟朝暮往來行不歇見人斫樹即哀號跪拜其前求莫伐毫末全抱霄壤然損我一枝我髮君欲伐者便一時老僧視之如斫骨願君頓發菩提心留與禪林壯門闕夏月遊人夾道涼冬來風雪難埋沒更有神飈天外來樹響泉聲當面咄男兒咄面解翻身凡聖情塵彈指劂示覺皤居士歌去年花落開今年今年花落開明年花開花落知幾回有誰能究未生前未生前痛究竟死生憎愛登時淨覺花開遍菩提樹香滿十虗耳根領病病歌五行四大是何物解寒熱兮解生克風寒水濕互交馳情根未拔遭渠惑遭渠惑幾度尋渠渾不得一片虗明礙口門千言萬語吐不出馬駒兒日面佛月面佛洞山暗裏同軌則看他有分有誰知拈轉頑心赤骨立赤骨立從教五眼難窺識却許狸奴白牯流寒熱罏中閒跳躑君不見桃花紅李花白纔得春光便增色昨夜東風過短墻朝來滿地空狼藉眼前榮能有幾二鼠侵藤墜復起等閒鏡裏𩯭毛斑報道當人死消息死消息我若無生媒不入這些病痛向誰言多少男兒甘自忽甘自忽鐵面閻君解羅織三途一報刼五千出得頭來終費力又不見高張富貴震天地頭白黃金買不去南山北嶺塚纍纍見說蓬蒿穿眼裡憨憨子能病病夢中拾箇破沙盆醒來却是談禪柄曲折松枝隨手應天風偏向手中吹霹𮦷一聲頭却聳桃花歌君不見桃花開桃花落開時何芳穠落時何寂寞誰知本無殊人情有豐約南青阡東紫陌無限桃紅與李白玉樓人醉喚不醒夢裏南柯郡政積不知何處曉鶯啼醒來紅日懸天碧追思枕上榮辱事兔角龜毛爭仲伯古與今休與戚動靜一條橫喧寂堯舜巢由鏡裏花春深風雨閒吹笛牧童豈有悲歡心有心聽之心如摘桃花開桃花落開落恣無常道人臥巖壑壑之上巖之東偏多翠栢與蒼松長風忽然遊太虗雲濤滾滾鳴千峰耳根無何聲洗脫我乃喪我我無踪無踪是我我是誰斜陽西去自鳴鐘鐘中皷聲如可襍曉來何以破昏蒙桃花落桃花紅分別情空代謝同我是如來真骨肉肯將妄語誑寰中示如印觀身歌君不見如花女子誰不戀只緣面嫩怕風吹幾回躲避桃花畔又不見吳王樓船載西施蕩漾中流衒顏色一朝越兵過行春等閒笑裡姑蘇失這肉塊害殺人古今無限沒風塵老僧有箇降魔術不是英雄不解識常將此心觀此身此身畢竟是何物今日觀明日察內外搜求沒搭殺皮褁肉肉包骨橫筋竪絡互相織三焦五臟細復推蟯蛔以為極樂國膿為漿糞為食終日醺醺自為得一朝報盡幻軀燒總隨烟焰風飄失能觀者是我心所觀者是我身能所何曾有䟽親譬如吳越各江山癡人無智認為一觀之久觀力漸熟成抖擻一道神光照廁坑蛆蟲滾滾希延壽臭穢中不堪處爭名奪利誰思止萬兩黃金買粉頭直謂風流長不死悲哉業鬼與婬妖不道東風夜半生猶謂春光常若此紙襖歌君不見天上六銖衣人閒宮錦袍纖柔交錯固無比爭若溪籐道味高西風起誰不怕𪷤𪷤侵人如箭射寂寞千巖披坐時恣爾寒雲覆房瓦夜將半窗月白侍者莫能辨青赤誤認霜猨擾余禪驀地當頭打一䇿曲兮曲直兮直凡聖情忘難可測化母機梭織不成那堪羅綺較顏色行著輕坐著𤏙坐臥相應便舒卷八風一任作風濤道人豈改菩薩面挂松枝晒屋角穿窬見之亦不捉隆冬獨壯老僧懷一片虗明謾描邈又不見紙衣道者亦奇特生死去來何自在却被曹山痛斥之念異便與玄體昧中峰老亦紙襖橫拈竪弄無不好即衣說法聲如雷自是聾人耳昏耗比年來俗愈薄狐兔成羣亂穿鑿柳絮蘆花翳眼睛解脫光明甘束縛紫栢生見弗忍逆即逆兮順即順夜叉菩薩面無常刼化癡郎悟心印也不管你青州衫重七斤也不管你溪籐襖無四兩一條性命等微塵賞即罰兮罰即賞悼徐文卿太僕避暑何須萬峰去虗堂寂寂多山趣飄風驟雨須臾過屋脊瓦溝流泉注萬壑千岩孰卷來等閒却向城中開秋雷轟轟鳴法皷無限勞生夢裡回君不見開門綠自到望處紅如妝即色知非相風塵蓮蕚香不數日徐彥文匆匆束裝朝聖君訃音一旦聞意外空解未深淚繽紛前船便是後船眼莫道他死我不管驀地臨到我頭上電光石火徒悲歎隨順無明起諸有英雄百戰爭好醜若不隨順諸有離佛手何曾異我手觀牡丹念來慈未花主人何處去正花猶自不歸來倘然一夜風雨生可憐艶冶點蒼苔君不見富貴貧賤本一條花開花落徒嘈嘈槎芽未發試著眼搖落孤根煖獨饒鞭鏡歌君不見桃李華鮮且軟紅白枝枝風未捲公子停鞭勒馬看等閒一片飄清淺河邊水去不返可惜朱顏日漸損從教把鏡玩髑髏笑殺癡心生繾綣又不見潘安宋玉貌最美一息不來成棄委青銅知道落誰家不照兒郎照婆子山居歌達觀顛達觀顛眾人所愛渠弗憐閙裏抽身委躁君疎狂一味樂林泉撩起行未甚錯鼻孔孤危不受索世路崎嶇行道難算來肥遁是高著大率進莫若退行藏慎密終無累糞衣懷寶寧負癡人不知我我則貴住深山敢偷安火種刀耕度歲寒飯訖虗窗禮佛書幾回明月借光看置殘卷雙足斂水韻松聲耳不攬一塊圓明忽現前瞥爾生心即不見眼中釘腦後楔不是輪扁難出脫相應約莫徐疾閒放過依然成兩橛無手人解行拳輕輕擊破趙州關五家祖印落掌握生殺縱橫豈等閒羅緱嶺石孤硬鳥道懸空常寂靜萬壑千巖一線通龍泉幽䆳多潭洞可棲身可滌心覺路蕭蕭缺嗣音狐兔成羣白日嘷夕陽碧殿下秋陰君不見屈步蟲即屈即伸難大用蒼虬一蟄邁三冬出水雲雷自相送烟霞趣莫謾舉古往今來挹巢許衡山懶瓚枕流眠丹詔連徵不解起這家風勿外通若將此意透王公管取當頭失高貴涕唾功名學苦空梵川問月擕麟郎覺生吾問天邊月可曾有離別燕山與吳門幾見月圓缺或復海上生有時林閒沒光輝在隱顯肯為迷雲汩君不見長安道傍蕭寺中焚香露坐月當空昨宵十八高人聚風月無邊爾復從又不見不傳之妙亂拋擲滿地珍珠誰拾得此情難借虗空喻摧破虗空須著力清涼寺雙栢歌君不見古清涼伯仲干霄知幾霜窗前倐忽神飈生翠濤吼喚寒焦腸此時趣誰領略積刼情塵俱廓落堂堂一片舊靈臺塞破虗空無處著好家風謾從聾浮生如夢夢如空今昔豪華鏡裏狂勸君莫負主人公淮陰功留侯䇿究竟都來閒費力三月桃花雨後看殘紅滿地悲狼籍大將軍五大夫榮名無故落江湖爭似清源堤下柏難兄難弟世中無又不見鸞鳳高去去來來愛此巢香葉玲瓏韻獨奇靜聽瀑水滌心苗俗漸薄真可哀幾人癡想製棺材金郛玉廓終須壞木板安能保久埋勿短見取勢便呼奴喝隷逞好漢直謂青天亦可欺青天較汝更會算大張羅任他鑽到頭一一結公案何如當年即回光留取清陰後人感示張春堂丹衷雲外尋知己赤脚塵中覓信心二十年來霜雪苦寸腸愁絕為誰吟為誰吟吳門風月最知音知音不在念生後一道神光貫古今聞我行惠雙履萬里烟雲生足底烟雲總是相知心去去懷君寧有己寧有己瞥爾生情早不親願君護念常如死死人坐斷攀緣時槁木寒灰未足比猛然大地回春光頭頭處處皆芳紫信手拈來總藥經問君何處留經註唯願龍神常護持普與眾生作良劑姜節婦歌項羽強猛誰敢並恣暴縱火燒咸陽烟𦦨亘天三百日視之談笑略不傷想必肚腸生鐵鑄又同木石無情思及別虞姬便動情歌罷傷心淚如雨又不見漢高大度天下聞抱病呻吟欲斷魂戚姬難舍死不顧撫床相視淚紛紛這兩漢氣吞當世真罕見羅絡英雄如小兒使貴即貴賤即賤觸著虞姬與戚姬不殊生鐵遭火煆方圓曲直任鉗鎚又如籧篨任舒卷楚覇王漢高祖大度強猛何足數愛欲關頭皆受降臨死戀戀猶相顧反不如嘉禾城東姜氏女亡夫節抱金石固彈指高樓五十年不異覊旅寓旦暮又如枯木倚寒岩春光荏苒心如死唯有清貞不變常遺風永永鎮頹世遊善卷洞性僻平生愛泉石天下山川遍曾歷搜奇討異幾經秋佛窟仙源靡不識靡不識善卷幽靈更殊特香藹崆峒別一天雕巖刻岫綴雲烟石田丹竈尚依然仙人一去不復還人物森森儼若生遊人把翫何多情造物變幻固難測以道究之亦可得自是遊人不悟心却於心外生情執生情執隨境遷流何日息此心明曠本無涯昧之無故生欣戚臨泉坐石便歡然把酒高歌自比仙須臾興盡復塵勞一段幽懷變縈纏何如直悟本有心信手握土總成金大地都來一隻眼不知何處可安針若有一針可容得此心之外必有物有物安能無愛憎愛憎既起迷真識吾之愛山水從來不斷此踏遍名山不著塵看盡江山又何色撩天鼻孔任昂藏去住無非無有鄉不知誰薦此中旨國山寺裏禮空王空王禮畢出法堂千峰迴合已殘陽扁舟縹緲向何處夜泊烟波萬里長汝堅歌贈項子有形堅久惟天地水火風災終飄沒此乃如來真實言不是等閒相誑惑天地閒事雖多升沈光景暗消磨一一已過不復計榮辱牽人情不枯情不枯逢春歡喜遇秋悲古往今來皆若斯不思天地不長久但見所欲皆可守天地數窮尚傾頹須臾榮辱我何有春花雖媚終必凋容顏雖好終必憔君不見偷桃曼倩頭解白寒暑催年不可逃可逃惟有一著子天地有壞他不死不在深雲遠壑求不離現前日用處穿衣喫飯莫放過生心早是路頭錯一路光明變識情改頭換面由渠作瞥然悟識情即是金剛座一切萬物屬生滅惟有此座常堅固不是英靈大丈夫阿誰占之得安妥得安妥汝字汝堅不虗度我歌信口不思量傍人讀之笑我狂惟有汝堅信不疑晨昏吟咏遣時光遣時光春花爛熳香何處不用鼻嘗用口嘗白衲歌為馮開之作此色不異奔茶棃來往風塵不染泥願君此心如此色一點孤明常歷歷又同日月破幽霄昇沉宇宙無踪蹟此衣披之不顛倒願君此身常皎皎朔風吹雪天不寒又作蒼生黃綿襖此衣又同青山雲卷舒自在為甘霖一切枯槁被恩澤無情亦生懽喜心與君聚首不甚久知君心地少塵垢臨別遺君此衲頭願君精神常抖擻耳根如鐵捲不轉相逢依舊春風臉黑白叢中標格奇魔外望之心膽戰我去矣君須記雲影天光總我情閒朝靜夜休相憶休相憶絕情識一點孤明常歷歷此色不異奔茶棃願君此心如此色呵呵呵咄咄咄到頭光景何消息白白白黑黑黑君之脉懶瓚歌贈曾金簡我聞君家住衡岳出入常隨猿與鶴消閒更解弄潺湲絕勝風塵爭奕博又聞衡岳有懶瓚只會穿衣并喫飯眾生苦海正浮沉隈藏岩畔渾不管丈夫兒既出世不為眾生作何事焦芽敗種非大根唯堪打殺餧狗子普天之下皆王土汝獨潛心恣懶惰假使天下都學汝眾生淪墜復誰度懶病不除害非淺此風從今不可扇君不見天子懶惰社稷亡丈夫懶惰家不昌農夫懶惰致餓死蠶婦懶惰蠶必僵汝這漢沒思算專以習懶為慣便懶病既成無藥醫平生一事無所辦汝不聞如來呵懶為毒蛇昏蔽靈臺苦無涯頭出頭沒生死中幾能得覩優曇花君既歸懶瓚想必舊相知為我殷勤致此說從今勿以懶為辭聞此說仍不改猶復松蘿貪自在與我一拳打殺伊敢保長刼無罪債只恐君力量小反被懶瓚到打倒一塲敗闕天下聞惹得兒孫聚口笑子房山歌彭城山上雲彭城山下水聚散及浮沉人代迭終始君不見人生大塊能幾何黃河東逝無回波豪華過眼曉天霜誰能百戰爭山河楚漢雌雄一夢勞其餘蹄涔安足多世謂先生見幾蚤侯印棄之如腐草超然故托赤松遊到頭那得韓彭惱此據先生跡安知先生心先生在報韓功名非所忻秦亡心事了不去何沉吟又不見功名長生不相遠棄彼取此識亦淺我知先生天機深刀圭羽翰都非戀因登古寺賦此歌偶將墨跡洒烟蘿先生莫笑太多事男兒志氣情難磨難磨若是蒼蒼𡾊河遷谷變無定軌惟有先生一片心恒與茲山增秀美龍蛇歌君不見龍與蛇本無常龍若有欲即為蛇蛇能無欲鱗蟲王世人所欲固雖多飲食男女為六疴若以飲食較男女男女又為欲之戈漢高祖之大度楚覇王之強悍一火咸陽心不悲虞姬別時情何軟淮陰功高尚忍誅戚姬臨決苦躊蹰能將欲海輕掀倒自古人閒幾丈夫西施不知是何物傾城傾國無多力當時若使留於越越覇諸侯亦未必又不見五百仙人善馭雲去來空際盡超羣纔聽宮女一聲曲神力俱遭欲火焚蘇子卿持漢節吞氈噉雪命欲絕死生朝夕不可保胡婦生兒猶所悅欲之難斷有若是難斷能斷須男子男子斷欲尚多難婦人失節何足耻言雖反意甚切字字分明心吐血是男是女能斷欲誠為世上真豪傑扶人倫整世道苟非豪傑寧堪造饒有周公伊尹才未能斷欲終顛倒大可笑大可笑好漢多迷尿屎竅臭皮袋上巧莊嚴相看莫不稱為妙殊不知四大合成身四蘊攢為心若以四四觀身心何處尋煩惱海豈有邊龍蛇出沒足雲烟人欲關頭雷雨深等閒換骨阿誰先舊路嶺龍泉寺普同塔歌君不見隆興東龍泉西稜層窣堵倚雲霓山高靈骨鱗蟲長地發琳瑯鸞鳳棲老別傳願行堅峨嵋補怛咸周旋戒珠圓潔光飲日興福十萬并八千了此心非一生十方三世時精誠誰料髑髏無著處清涼山裏伴緇英金閣嶺亦曾住再來矢願立標幟可憐一片好心腸深郎徒剖驢肝肺照法師涅槃義皮肉相連無斷際生公盡道是前身來往白雲知幾祀臨終時顯大機講堂端坐稱阿彌十氣未殘神獨逝蓮花國裡誕嬰兒義禪客實難得天生一段混沌質無論早晚話頭勤採藥林閒忽禪寂紅日暮不知歸虎豹羣中身正遺兒孫滿望阿爹還燈燭相尋鳥道迷古㵎邊定松烟癡兒一見呌蒼天如何連日不歸家却向深林伴虎眠既喚醒忘所證猶道須臾無片頃爾曹無故惱老僧好塲瞌睡多破靜這三老誰解表輸與皮毬閒炒鬧家醜翻騰無剩留浩浩聲光千古調齊一變至於魯魯一變至於道從粗至精成風教花落花開不記春年年黑白來祭掃此道塲初起難數番血戰清寒巖鎗疤刀口誰知痛會首當年命幾𢬵助戰者老與少僧俗橫死真可悼而今大眾得安然饑餐渴飲皆溫飽如是恩莫忘却舉首虗空有菩薩行藏好歹渠盡知勸君莫為沒傝我作歌意甚美但恐吾曹忘所始始忘本折枝葉衰前人辛苦成何事話到此肝膽裂知恩報恩須豪傑春來寺外桃花開前後殘紅亡者血弔子陵嚴先生并序自洗飲風微至馬上得天下之雄而功利智勇波震塵飛君臣交猜朝富貴夕誅夷然趨之者猶如夜蛾之投𦦨哀哉及先生足加帝腹恥纓紼而激清颷延至李膺范滂之徒不以死生易義槩桐江一絲之餘烈也今幸過祠下因寄短章一弔先生吟曰三召兮不能榮先生一退兮不能高先生榮高既外兮則先生不可得而名唯山高水長兮一瞻先生之眉宇悵然而行銅犢歌憨公遺在龍門者扶桑之西黑水之東勞盛凌厲海色朧奇岩異壑曲㵎巨峰烟雲深處驚濤振空中有美人寂默禪宮予曾扣關如桴擊鐘不慮而酬即問而通見斯蒼犢背負仙翁展卷勿收意托冲融神遊混茫之初跡符既判之後長者緒言久承下風覩物思人真懷忡忡上方山夜坐懷孫仲來明月在青天流泉在碧山素輝與寒響靜聽有無閒我有所思兮美人紛未還時陰固難待奄忽𩯭毛斑結屋松蘿深況連清溪灣輕舟飄白波漁父多軟頑既去仍復來華鱗得非艱欣然換濁酒一醉忘萬般拍手喚不醒遊魂江海閒風濤未可測彼岸宜早攀警世嗟哉世閒人所計何其短但欲遂目前終古竟不管形骸有敗壞真光常自在不滅必受生生必酬業債今生弗如意前因所招待貴賤雖有殊業鏡寧假借形端影必佳面惡形必怪少年如春花既鮮豈不萎常將萎事看安俟零落悟哀靈岩寺僧歌莫謂出家好山居絕閒擾年來苦更多開口向誰道山地枯山田瘦枯瘦豐收能幾斗往來賓客強支持分外徵求何所有況復三年兩度荒每日吞饑如餓狗說到此淚如雨莫若離山托鉢去翻思佛祖舊叢林難將一旦委荒楚君不見靈岩寺大小禪房皆廢棄老僧乞食未歸來白骨不知葬何地流泉聲難可聽誰謂靈岩四絕英松風今作斷腸吟木偶聞之亦淚零悼棲霞素菴節公并引師之所得以無得為得所以處失而未始失也以其未始失故凡莊嚴淨土崇麗緇林者觸願而成雖雲山可磨岷江可竭師之德容充如也一旦棄我而逝寧無悲乎故以辭悼之辭曰師來兮以慈悲為釣師逝兮而性命合妙青山兮師骨流水兮師笑余痛哀兮垂照法梁折兮孰肖鄙詞瓣香兮一弔登方山歌君不見晉陽方山李長者愛虎䭾經不用馬大賢村頭高山奴一見至人便能下嗟哉世道衰斯文竟成假空聞冠葢名已乏舊風雅馬家古佛堂土室久荒涼長者去不返佛日誰洗光慚小子生何晚雙林那堪紹緇袞見賢思齊非憚勞尋山問水叩玄閫我曾聞華嚴經十方如來之典刑四重法界難思議孰能揮毫無留停譬百川爭赴海萬里雲濤煥文彩又如春光在萬物洪纖濃淡皆自在理法界喻夫水水結為氷事相似互成互奪等屈伸千舒萬卷不離指最難悟後一種事事無拘非襍氄輸與文殊阿逸多當陽頌出價增重懷州牛嘉州象張三吃草李四脹更兼空手把鋤頭明暗相參呈伎倆日用中露形容含毫臨紙何匆匇星霜五易論告成世傳天女俱騰空又聞長者初來時囊挈經書歷險危風霜一夕震林谷老松拔去泉如飴至今巖僧仰饑渴聖師厚德寧忘之達觀憨出苔龕蚤春結伴下寒嵐芒鞵踏破幾層雪神福山原試一參廣眉朗目躡上峰丹唇紫臉髯不同身長七尺有二寸天開法海真英雄殷勤再拜不忍別行行回首烟雲重式廬歌有序我聞太極老人乍夢之後而兩儀始行自是特立環立於大塊閒者惟山焉耳震旦中祖崐崘高三峨尊五嶽奇傑牢盛神異蓬萊今有易崐崘退三峨隱五嶽進匡廬而獨式焉者葢匡廬之山清深憨秀故也清則離垢獨立深則幽討莫測憨則近厚秀則遠媚若人取之有以哉憨憨子聞而為之歌曰清兮本無染兮深兮難討測兮憨兮且有容兮秀兮遠媚兮奚獨全此四德兮予其望之厚兮澄公泉歌君不見高山岩曲有流水烟鎻雲藏人不白足窮幽偶識之倚杖徘徊不忍去泉泉泉何其玄儼若欲語聲弗全又不見伯夷清巢父潔若喻此泉難我愜澄公講餘來彈舌蒼虬作雨潤枯渴令人長憶胥靡君泥塗板築龍蛇穴江水歌江水忽起兮江水忽伏兮起兮伏兮是誰所使兮心水本澄忽然怒生怒既為媒兮所謂喜者不煩介紹自然而相賡是事甚易知兮柰何觸事而迷起伏無媒風哥作戲蓬蓬然而來寂寂然而去來兮去兮其誰之命說者曰有陰陽而後有動靜風兮風兮陰陽未判兮廓然昭徹兮此為渾沌之老敢問此老之先曰太極無極耳嘻無極之先孰名無極或曰無極之後名德始興憨憨子抱膝而歌曰名兮實兮相互而窮兮所謂無極也者太虗塗彩耳喜兮怒兮一心未生兮果異果同兮喜怒既發兮有待無待兮知有無者果然真兮果然妄兮有能析兮則江水之起伏富兮貴兮貧兮賤兮皆春風中小兒騎竹馬耳知此則風之所始在我而不在物矣昔人有偈曰大地山河是阿誰了無一法可思惟燈前喜怒自起倒敢問西隣知不知咄夜來處處鳴鐘皷敲破髑髏人不知燕山送雷雨居士奉使入楚君不見湘水湘山天下希烟濤空翠交相輝片帆杳然向深處掉首方悲人世非賈傅韓生曾去來滿前幽勝成思歸好山好水不解賞此道遙知未入微又不見懶瓚憨眠石枕頭禪心如水清無休千峰但覺芋火煖那知世上有王侯君承王命辭燕山拂拂秋風兩𩯭斑岷江洞庭遠更闊虎兕魚龍日夕環覺有心見有身無端明鏡忽生塵騰今耀古光自在相逢幾箇用天真莫道此言淡無味無味之中無限春朱陵高久寂寥回鴈峰前荊棘饒狐兔成羣笑復哀驅除剪拂金湯勞臨行更勸一杯茗兩行熱淚沾緇袍再過澹菴居士園有感勺水何必滄海水愛石何必太山石此石此水意甚深白雲碧草誰復識誰復識誰復識見說先生手自壘一花一木皆自植吾雖無心來此中恍若先生共相揖
