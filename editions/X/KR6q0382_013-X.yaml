body:
  text: 明憨山德清閱緣起刻藏緣起嘉隆閒袁汾湖以大法垂秋僧曹無遠慮不思唐宋之世大藏經板海內不下二十餘副自元迄明南都藏板印造者多已糢糊不甚清白矣且歲久腐朽燕京板雖完壯字畫清白顯朗以在禁中印造苟非奏請不敢擅便又世故無常治亂豈可逆定不若易梵筴為方冊則印造之者價不高而書不重價不高則易印造書不重則易廣布縱經世亂必焚毀不盡使法寶常存慧命堅固譬夫廣種薄收雖遭饑饉不至餓死時法本禪人實聞此言但本公自顧力弱不能圖之然此志耿耿在肝膈閒無須臾敢忘者也至於萬曆七年予來自嵩少掛錫清風涇上去大雲寺不甚遠寺有雲谷老宿乃空門白眉也時本谷為雲谷侍者予訪雲谷於大雲復值本公在焉既而及刻藏之舉以為非三萬金未能完此眾生以財為命豈易乞哉大都常人之情有傷其命雖父母兄弟妻子之閒有不悅者以世外之人乞人性命誰願之哉予曰小子何不見大若是乎但恐辦心不真真則何慮無成且堂堂大明反不若宋元之盛哉宋板藏經亦有書刻者元板亦不下十餘副子急圖之毋自歉老漢雖不敏敢為刻藏之旗鼓旗所以一人之目鼓所以一人之耳目一則明耳一則聰聰之與明眾生之所本有者特無大法以熏開其心故雖有而不能用子謂眾生財與命同以故難乞殊不知以財為重者誠聰明未啟耳如聰明一啟即知此身幻化非堅此心起滅不常矣既知此矣即乞其頭亦歡然願施者況身外阿堵物耶於是法本輩化弱為強轉狹為廣視刻藏之舉若壯士屈伸臂耳了無難色然猶未舉行也及密藏開公問法於老漢因而囑以刻藏之事開公曰易梵筴為方冊則不尊重無乃不可乎予破之曰金玉尊重則不可以資生米麥雖不如金玉之尊重然可以養生使梵筴雖尊重而不解其意則尊之何益使方冊雖不尊重以價輕易造流之必溥于普萬普之中豈無一二人解其義趣者乎我又聞之我法如塗毒鼓於眾人中擊之發聲無論有心無心聞之者命根皆斷若然者不惟尊重供養者有大功德即毀之謗之之徒終必獲益且娑㜑度生以折門為先攝門次之縱使輕賤方冊之輩先墮地獄受大極苦苦則反本反本即知墜地獄之因知因則改過改過則易輕賤為尊重是以攝之不可則折之以折之之故則見有地獄既見地獄則痛想天堂矣由信天堂而信佛故尊重與輕賤乃翻手覆手耳老漢但願一切眾生輕賤佛法墮地獄中因地獄苦發菩提心若然者易梵筴為方冊則廣長舌相猶殊勝萬萬倍矣子何不智若此乎於是道開聞予言泣涕俱下跪而發誓曰謹奉和尚命若有人舍三萬金刻此藏板者道開願以頭目腦髓供養是人自今而後藏板不完開心不死由是觀之則法本道開不才老漢及現前一切刻藏施主皆袁汾湖之化身也募寫大士緣起夫聖人無常身以眾生身為身如片月在空影臨萬水有見不見則水有清濁非無月也我觀音大士以聞思修入三摩地初於聞中入流忘所獲二殊勝成三十二應使一切眾生心水清淨者隨緣而得見月焉由是論之則菩薩眾生初非有別以聞思修薰之即得入流忘所圓通妙應以貪瞋癡熏之即順無明流墮諸趣以故菩薩憫其同體即所自驗方救療羣有駕大慈悲分身散影隨類利益滇南清上人一日病幾死夢觀世音勸其念自性佛遂瘳由是發心圖大士萬身普施供養報菩薩恩信入意地情見乎辭余見其涕淚俱出而作是言因嘅焉為之述此夫清禪人以篤疾為水得覩菩薩清涼之月達觀道人聞其言即直下不疑則以不疑為水亦復見之願諸淨信各各若我直下不疑則菩薩清涼之月在在而見雖然眾生業重不疑為難且向第二門頭往生極樂共覩彌陀聞無上法音又普門中最方便處也銕鉢緣起大哉佛鉢其來遠矣過去諸佛不可數極現在諸佛皆親執持未來諸佛非鉢不食佛尚寶惜況比丘乎去佛既遠戒法凋零凡沙門釋子住家者多乞食者少而乞食者復率操瓢不知持鉢所在名藍真宇聚徒講演安禪集眾千指萬指未見有鉢食者夫鉢者聖人應量之器量我量物如函受葢如黃鍾之律應氣不爽故即飲食而調心心調而物化物化而善廣遠則兼利界外近則澤布寰中故曰一夫全德道洽大千也然則鉢者利己利物大法所係豈細物哉乃今忝為佛子者食非鉢食飲非鉢飲蹈蓮花面之迹壞菩提身之根飾偽以亂真馮虗以搆偽邪風競扇純正遭讒於是幻子愷公痛正像之風移慨教流之日薄遂披尋律藏精考鉢儀以為泥古則不近人情狥情則乖於古式瓦鉢則危脆易損金銀則侈奢非法惟銕鉢堅朴難毀易辦而末法比丘心行麤浮時又艱險故獨宜焉嗚呼羅睺洗鉢鉢碎為五自茲律分五部宗尚不一戒珠失掌比丘不持戒律比丘尼等不行八敬持應量器遊行酒肆或入婬舍種種家醜如來懸知葢嘗閔痛其陵夷迄今戒壇生草衣鉢蕭然且不知鉢為何物矣嗟乎既為佛子當報佛恩報佛恩中復有緩急自非英衲孰識時宜愷公以法器莫重於鉢發心造銕鉢五百口隨緣乞之儻仗我皇靈鉢功就緒則上祈聖算下祝民康惟願正法昌隆魔風殄息繩繩法器萬古無殘棲霞寺定慧堂飯僧緣起佛法者心學也然紹隆佛法者僧也故薄僧者非薄佛薄自心也夫自心者聖賢由之而生天地由之而建光明廣大靈妙圓通不死不生無今無古昭然於日用之閒即之而不可入離之而不可遺在眼而見在心而知境未對時圓滿獨立百工得之而技精聖人得之而道備不難而易見觸事而冥契而人薄之故日用而不知焉昔達觀穎禪師行脚時至吳中日勢稍晚投宿律居主者弗納師責而數之曰如來有言汝曹不聞之乎在家僧不喜客僧來者我法當滅由是觀之穎公有道之士一宿不留何怒至此葢非自安實痛佛法之衰心學之不明故也予以是知飯僧一事功德最大大以資培佛種小則廣植福因今棲霞禪堂主者雲峰徧上人有志飯僧惟是連歲薦饑力不稱願雲堂如舊青烟寂寞來者悽然余目覩其事心甚哀之既而為其倡百人之緣一人歲施米十斗十年為限無論豐荒緣不可斷嗚呼去聖時遙世道交喪識慮非遠所重者不重所輕者率重焉夫至重者自心也開明自心者佛學也傳佛學者僧也僧來而不喜薄自心也人為萬物之靈乃不知重心學其可乎哉因書以告四眾云積慶菴緣起寒山子詩曰庭際何所有白雲抱幽石世之高明者無論今昔皆味之而不能忘豈不以其天趣自然即物而無累者乎萬曆歲癸巳中秋達觀道人以問疾毗耶維舟當湖既而太宰陸居士疾少差亦放舟顧道人於案山之陽案山距積慶不十里許太宰公季子適與毛修之相視而笑曰案山水富而竹貧積慶水貧而竹富安得有神通者掬當湖之水注積慶老禪鉢中移積慶之竹於五老峯下顧不美哉予聞之曰道人受性慵懶亦無奇特神通不暇掬當湖之浪亦不暇移積慶之篁何不放舟積慶飽其空翠歸宿案山不亦可乎既至積慶則苔徑幽然修篁澄碧椽敗屋老菴宇蕭條道人謂二三子曰道遠乎哉觸事而真聖遠乎哉體之即神故曰仁者見之以為仁智者見之以為智夫厭喧趨寂者覩白雲幽石而通玄醉榮刺空者聞花館笙歌而忘倦惟得自心者喧兮寂兮榮兮辱兮無往而非心兮葢獨立則無待無待則無外無外則無分別無分別則無我所若然者積慶之廢興成敗譬夫水之興波波之復水耳雖然道人願諸賢豪君子舍夢中財嚴空中境即相冥真從緣得旨則積慶瓦礫荊榛琅玕古木皆諸君廣長舌相也敢不勤之時一蘆運禪人揖其祖曰大師深慈為此菴施筆頭三昧增光存歿寧弗拜謝徑山佛殿緣起雙徑冠世絕境也自崑崙南來翱翔萬里越天目而逶迤隱隱隆隆雄雌萬狀勢方奔舞直趨東溟而雙溪一阻則英靈秀傑之氣回而氤氳盤薄怒拔於五峰之閒世為龍象窟宅自唐國一欽祖開山乃至宋大慧杲禪師傳心如貫珠燈燈相續以迄於今則去聖彌遠世與道喪僧不能轉俗更為俗轉矣夫經曰若能轉物即同如來今不能轉俗章為俗轉豈非現成肉佛自作眾生嗚呼一心不生凡聖路斷一微涉動染淨俄分即此而觀眾生諸佛初無差別了悟者夢覺都除未了悟者不惟於無夢中作夢更於大夢中強為己覺殊可歎耳昔佛經行時俄指曰此地可建一梵剎帝釋信手拈一莖草插已曰建剎竟比幻居講主作徑山僧引進導師不遠千里來曲阿見老漢曰徑山眾上人某曾引渠䟦涉燕山請開藏主并祈旁鼓修殿嚴像藏主已諾會病未至蒙大師代以幻余本公今復遷化則向來所舉似同說夢故某與眾僧不憚勞勤今更強顏來禮和尚所願不惜彈指震大法雷破眾生痴夢成就如上勝事老漢曰公等此來既不為自求專為祖道今老漢有一轉語舉似公等公等答得相應即夢中說覺覺中說夢恣我舌端無不可者試問帝釋插草建梵剎耶不建梵剎耶建則琳宮寶坊了不現前不建則佛與帝釋兩皆脫空時諸上人俱以默答老漢亦以默領唯喝石崖旁觀不禁向老漢曰和尚不必拋擲古今廣打葛籐國一大慧鼻孔要與和尚不別道開法本雖皆夢中承當和尚大須覺中著到管取徑山大雄寶殿剎那成就諸祖殘棋移星換斗唯時王內翰于比部只解順水推船不能逆風把柁攛掇喝石生兒并諸現前黑白大眾擎跽而請唯願和尚發大慈悲勿孤負喝石亦令某等各各願滿噫雙徑五峰江海秀瀨陽江澈影重重相逢莫問誰家曲管取聲聲落眼中湖州府弁山圓證寺募四萬八千彌陀緣起夫四十八願者乃西方極樂世界阿彌陀如來因中為法藏比丘時對世自在王佛所發之願也若以有思惟心測度之即一願功德尚難信受況四十八願若廣大無極迂濶無稽者寧不為之驚怪哉殊不知於理推之虗空之無際天地之高厚萬物之廣多聖乎凡乎有知乎無知乎皆不越我自心者也故曰空生大覺中如海一漚發有漏微塵國皆依空所生漚滅空本無況復諸三有以此觀之則法藏所發之願如來印證之辭證之於理即之於事皎如日星夫何疑又眾生習俗庸鄙識不高明計六尺之軀為身方寸之影為心無論貴賤榮辱逆順窮神殫慮勞骨弊形奇智異謀嚴飾萬態自生至死無須臾自在者不過未能窺破身心耳是以大覺愍而哀之發廣大之願示無邊之勝照廓其心境使一切眾生肅清慧日獲無身之身無心之心無身之身形充八極無心之心照窮萬有悲夫人為萬物之靈於此大身廣心冥然莫悟局執於臭軀殻上甘陷於妄想夢中初不自覺反乃驚怪於法藏比丘者人果靈乎不靈乎余萬曆庚寅歲結夏於留都攝山棲霞寺以七月旬有二日有斷手僧如林者來山白余曰我斷隻手不為名聞不為衣食我聞阿彌陀如來有四十八願願依數請四十八員真實持戒求生西方禪僧僧各頂戴旃檀彌陀靈相於晝夜六時精修淨業無限年月以畢生為期柰何事大力寡無以感人故斷隻手以表寸赤願乞一大檀越捨千金為我開疏惟願大德決我凡心余聞其言愀然久之乃謂之曰斷手不難捨財難耳若不聞眾生捨財如割身肉乎苟手斷心偽願豈易尅哉且連歲海內饑饉不勝有能慨然施千金者恐無是處不若遵彌陀本願化四萬八千人人各乞銀一錢積少成多以集事不亦可乎雖然諸佛不可思議眾生亦不可思議余非具他心聖人安敢妄言請以初願及次願拈鬮於佛佛許可者即奉行之斷手僧謹置鬮於如來慈鏡光中泣涕以禱信手拈之即得次願遂索余言掇敘發心大槩徧告十方媿余不能文不敢贅言於願尾堅辭弗獲免又雲臺居士余之故人斷手僧又居士往所信者故書此以慰存沒云雖然佛事人情初非有二顧其用心何如耳若如法藏用心即人情不異佛事也若眾生用心即佛事不異人情也余慨如林上人朴實真率能不惜形軀斷手自盟於四十八願願四萬八千人尅彌陀之果視余一瓶一鉢獨善其身何啻蹄涔匹乎滄海上人慎而行之天必祐之今太宰公已為四萬八千彌陀之領袖則見賢思齊者必雲然而和之矣尅願奚難哉吳江聖壽寺緣起即花尋春者春未必在花即水尋魚者魚未必在水雖然離花而覔春外水而求魚又豈可得哉故道不在迹道豈能自彰教不在人教豈能自弘如來之道猶春也天下名藍真宇種種教迹則花也吳江聖壽寺肇迹吳赤烏年閒今數百千載猶嵬然獨存於荒廢之餘趙宗伯聞而惜之適與道人及此因緣為之創五百人緣集茲勝事葢憐花存春之意也若夫教海濤生魚龍聽法又道人末後句耳迎無量壽佛立像緣起釋迦文佛成道已思惟所親未度而度眾生非師範人天之則遂昇忉利為母說法以優闐王想佛成渴命三十二匠往地居天刻佛三十二相請歸優闐國供養此像教之始也萬曆庚子冬有始光居士自閩之杭訪雲栖袾大師因見大師所供無量壽佛立像殊勝精神慈注瞻禮之閒使眾生染習於不知不覺之頃忽生淨想居士默謂曰吾安得如此像供之家菴以酬夙願訊之則刻匠已死大師望居士眉宇之色欲像之心有不能割者謂居士曰此像亦易得匠者云亡貧衲為居士別覔一匠刻之保任不減先刻者居士遂五體投地捐貲付托於師約明年四月迎像不幸袾大師蹈湯火之災像不如約屆期居士果遣手足來迎大師謂眾當即以山中原像應其請像可再雕言不可食既而某迎像出山適當道蝟集買舟不得偶有一船泊於江滸迎像者問舟子曰舟可載人否曰否曰船不載人欲載何者舟子曰余以待佛迎像者異之謂舟子曰專欲汝舟載佛耳舟子欣然許諾舁像舟中禮供甚䖍云此佛前一夕已徵余兩人夢矣至姑蘇又將易舟所易舟子夜復夢金人來舟中像至宛如夢中所見無不驚異葢與前舟夫婦所得夢景正相符耳還家安立淨室觀者雲集奇哉斯像謂之木佛耶善使人夢謂之肉佛耶諦視之揣摩之則木佛也嗚呼木佛善使人夢世則疑之肉佛說法世則不疑如以唯心觀之木佛肉佛兩者未嘗非心也以未嘗非心之印印世之疑與信果有疑信耶果無疑信耶天機深者於此印了知不疑則大之天地多之萬物及於虗空皆納於立像一毛孔隙毛孔不窄天地萬物不多於不窄不多之中六塵內遂舉一塵問天下黑白此塵謂自生耶他生耶共生耶無因生耶黑白中有能轉此語者渠臭皮囊不異立像供之無倦募書金字華嚴經緣起余聞華嚴大部有一四天下微塵數品三千大千世界微塵數偈每慮其廣大眾多不能於此生窮之矣及讀唐譯華嚴經偶得一偈不勝踊躍慶幸偈曰毗盧遮那佛願力周法界一切國土中恒轉無上輪此偈總二十字而大部華嚴包括無餘毗盧遮那此言光明徧照一切處願力周法界盖法界有十謂佛法界菩薩法界緣覺法界聲聞法界天法界修羅法界人法界畜生法界餓鬼法界地獄法界是也然地獄以十惡五逆為花餓鬼以慳吝刻剝為花畜生以愚癡亂倫為花人以根本戒為花修羅以十善好鬬為花天以未到定十善為花聲聞以四諦析色為花緣覺以十二因緣還滅為花菩薩以三學六度為花佛以萬德周圓為花嗚呼東方出聖人焉西方出聖人焉上古出聖人焉後千百世出聖人焉凡所作為未有無花而有果者也我無十惡五逆則地獄誰入我無慳吝刻剝則餓鬼誰受我無愚癡亂倫之行則畜生誰作我有五常始得為人我行十善而好勝則不免為修羅我能修定廣行十善則當生天我修四諦析色明空必得聲聞我作還滅之觀終登緣覺我行六度長劫無疲定成菩薩我三惑永斷萬德周圓必圓證妙覺此名實之徵也如我一念不生則十界無地凡焉聖焉鏡中眉空中花耳雖然參須實參悟須實悟則華嚴四法界不在八十一卷而在我日用也如參悟未能且從八十一卷語言文字檢名審實實審則義精亦非分外四法界者理法界事法界事理無礙法界事事無礙法界是也理法界則水外無波事法界則波外無水事理無礙法界則波水無礙事事無礙法界則波波無礙以水言之則謂之理以波言之則謂之事以波水言之則謂之事理以波波言之則謂之事事是故善用其心者即一塵而入四法界如因一枝花得無邊春耳況此經八十一卷言言皆枝字字皆花有智男子或因一枝一花而得無盡春光則荊棘蓬蒿未始非春也荊棘蓬蒿六凡之譬也如花如枝四聖之譬也荊州府江陵縣承天寺有了初善禪人以為古人剝皮為紙析骨為筆刺血為墨而流通此經欲凡有知覺者即文字語言而入華嚴法界善雖不能流通此經願以莊嚴此經為佛事藉此少報四重之恩不亦可乎於是發心募眾共書金字華嚴經一部併綸觀一卷如勝事夢感願凡書一字一言一葉一卷乃至十卷八十一卷者皆仗此因緣如因一花而得無邊之春因一言一字而盡入華嚴法界此禪人發心莊嚴此經之願也索予數語為前茅予願凡諸黑白賢豪皆當見作隨喜然眾生舍財如割身肉苟無卓見隨喜之緣亦不易結禪人當作剝皮析骨刺血之想則一錢半錢不可誤用況多錢者乎善禪勉之山東東昌府鐵塔隆興寺化緣文東昌東郭二里許有寺曰隆興肇自洪武初乃祝聖道場也地勢幽朗高林垂陰古塔昂霄鐘梵流響或悲風塵而登臨者頓覺煩襟洗然徘徊卒不忍去良以如來說法權實迭唱或以香飯為階梯放光為舟楫寄文字以傳心施棒喝而啟悟乃至樓臺礙日覺路鋪金通而會之無非廣長舌之波瀾也大凡人情無常善惡從境故以善境誘之則善心生惡境熏炙則惡念起聖人有見於此弗吝弘慈分身散影應質垂軀飾以奇特莊嚴廣以無邊妙剎使夫眾生磕著撞著觸處善境冥移其習密化其惡所謂鑄頑成仁陶癡為慧者也或者不達此意以浪費民財短之是數二五而不知十也夫行一善則息一惡息一惡則省一刑一刑省於家十刑省於里萬刑省於國謂之無補於治道可乎隆興大殿及支官旁宇廊廡且以年深日久風霜蟲剝摧頹極甚若不修整非惟祝聖失古即廣長舌壞說法器殘而雷音亦無聞矣寺僧覺蓮課公大慨於茲乃謀諸侍御傅居士并一切黑白賢豪誓續舊緒余甚敬其識卓見殊以故綴數語代為十方白云棱伽山寺大藏閣緣起眾生不悟言說法身而為文字所轉如悟言說法身則不必離言說而求法身也古有鳥官聞羽蟲之音知其好惡吉凶焉由是而觀則言說法身亦不外鳥音有也眉山曰溪聲便是廣長舌山色無非清淨身則言說法身與色相法身無別也豈惟色相哉鼻之所臭舌之所嘗身之所觸意之所知謂之臭味法身觸法法身亦不悖初言說法身也故靈雲見桃花而悟道樓子聽曲聲而明心良有以乎然文字般若又言說法身廣長舌相也娑婆眾生心量狹小習尚卑微苟不以廣長舌相吐大雷音震其常情則生死之夢終不醒矣又諸施之中法施為上財施次之然微財施則法施難廣是以能割所有身命之財流通佛法者其功與法施等也某人立心造大藏一部施石湖棱伽山僧某禪人搆閣供養永為人天眼目施者受者必皆無我所心而能成此言說法身之功德也豈可以算數知哉末法眾生福薄凡集勝事多難少易某其勉之棱嚴寺五十三參長生緣起𭬥李棱嚴以嘉靖時倭奴之變寺因火之於是清涼寶地翻成熱惱之場曠古名林遂為游晏之所識者慨焉萬曆閒有豫章密藏開公乞食城中以為長水靈迹豈當久委草莾乃不辭寒暑而舊物始復雖正殿緩之未建然有靜室可以藏經板有雲堂可以安法侶有香厨可以供饘粥晨昏禪誦異口同音擊磬鳴鐘祝延聖壽願吾君明齊日月筭等山河五穀豐登蒼生樂業此林下道人寸志也嗚呼一旦既廢熱惱之場復為清涼福地游晏之所今為更始名藍微開郎則曠古祝聖之壇幾為有力皮矣雖然法界門中無孤單法設微鶴林蕖上人佐之寧即功成速若是乎至於諸大金湯不避嫌疑不顧毀譽併心護持始終如一雖給孤復生龐老再來不是過也余固不敏感金湯護持之念開郎寉林寒暑之勤倡善財五十三參之緣究五十三善知識無論黑白男女但聞緣發心見作隨喜者請一人施米千升永充棱嚴十方聖凡長生供養庶幾無負吾君資生之恩如來法乳之惠金湯護持之力二上人復之勞也䟽刻大藏經䟽大覺示生順機緣而應質聖人制誥愍同體以垂慈大夢雷霆幽霄日月揭萬古之昏葢活羣靈之慧根半字滿字宛轉剖本有之光大身小身方便現圓迴之相道高則聲聞自遠義備則圓照無虧理不乖事開凡聖之正因色不異空杜魔外之邪見滋多生之淨種破五使之疑情曰深曰淺總就路以還家若見若聞俱立地而成佛是以補天地之玄化廣君親之至仁挽回薄俗之風啟迪高明之習舍乎大藏別覔真乘何啻饑寒棄捐梁纊或以釋迦非我國之人而不從其法抑不思文王亦西夷之產奚以被其風渴不辨泉饑無擇飯迷方固當問路愈病必事求毉乃智者之所尊不智者之所棄從長為善舍短稱賢泥塗可以致雲霄行潦可以通滄海故刺血為墨者非無知而作剝皮代紙者心有見而然在昔固有英賢當世豈無豪傑是非曲直義理淺深譬夫九天之上而日星皎如萬鏡之中而燈珠燦爾然非韓愈歐陽修之排斥曷致契嵩洪覺範之發揮陽擠陰助權抑實揚天風起而雲翳消時雨降而枯槁茂爰自運有通塞法以升沉玄奘求經於印度必也唐文皇之朝懷璉鳴佛於洛陽宜乎宋仁宗之世況我太祖高皇帝成祖文皇帝於通訓則頒金湯之詔在會典則列墻塹之條故曰化頑凶而益王綱利善良而資帝道義林幽䆳俗世罕聞王臣無愛無憎黎庶宜崇宜正捧王言之煥朗識聖鑒之淵微豈不以功高世憲道格殊方者哉用是吾道開法本不揆下愚遠追德意誓刻經律論之全藏願報佛法僧之至恩力微而滿願為艱事勝而資檀須普或十函五函量緣而襄刻或一部兩部隨意而樂成大地慈雲普天甘露一字之功贊揚之莫盡半偈之益思議之難窮乃知常啼東請善財南詢皆重法以輕生亦知恩而報德直以身為如來之牀座豈若手持菩薩之慧燈眾生造罪愚昧先之大士利生智光始也萬行波騰離般若則終歸苦業六通雲變舍漚和則俱墮徧空慈母周旋百至未喻佛子之用心良友曲照多方庶象至人之護念流通大藏希覯勝因或貴或賤共成堅固之緣無親無䟽咸作難遭之想終期克濟永用宣流廣諸祖道影䟽華鐘匪叩則音響不流寶炬未然則寒光匿耀故歸依佛祖藉有刑儀即像道存雲傳貴廣願身星布影徧寰區譬一鐘聲多人夢破如分燈𦦨大夜常明矣洪武閒黑白中好道者繪華梵諸祖道影自大迦葉尊者而下至國初耆宿百二十尊藏諸留都之南牛首山其精神慈注風度高簡非靈臺空清妙思通幽者未易著筆也萬曆己丑開待者省余於金壇于觀察北園且西發清涼道出石頭余曰牛首諸祖道影往曾於祖堂塵𡋯中檢得六尊若雲開月露光華照人咨詢其餘寺僧曰均藏牛首余懷此六寒暑矣弗能忘汝無却勞披暑一行或可理也對曰謹奉和尚命隨䇿杖往果得靈相會太宰陸公見之喟然歎曰是當儼臨人天光映羣品柰何歲月浸久凋殘若是聖人未滅度時吾輩業重垢深不遑近事茲覩道影何啻親承得丹青家妙契其真者臨寫十部散布十方永作供養分輝迸耀普照昏衢顧不大哉開待者韙太宰議慨然任之太宰首臨一部金沙善雲居士於九部中隨寫一部餘尚未得其人開待者跪而請曰願和尚䟽是因緣令諸善信生大法喜合併勝心成此希有余曰善夫由心生形由形生影而善反者由影得形由形得心由心得道若然者則百二十紙和尚不動舌根為天下人漏洩家風不少也又夫有自心則有虗空有虗空則有天地有天地則有山水有山水則有道場有道場則有諸祖有諸祖則有道影是以由道影而識諸祖由諸祖而辨道場由道場而知天地由天地而測虗空由虗空以悟自心者可謂尋流而得源矣若然者則大如天地襍如萬物皆諸祖道影也豈待索於僧繇道玄之筆端然後謂道影乎哉雖然凡心鄙劣未能觸途成觀須憑勝相故阿難白佛我見如來三十二相勝妙殊絕形體映徹猶如瑠璃常自思惟此相非是欲愛所生何以故欲氣粗濁腥臊交遘膿血襍亂不能發生勝淨妙明紫金光聚是以渴仰從佛剃落以此觀之阿難佛弟尚觀勝相發心況凡劣者乎故諸祖道影不可不廣也雖華梵殊土其天容道貌精光炳爍使人瞻之塵習頓空即相會心千古旦暮與諸祖周旋於大光明藏中微道影孰能至此留都牛首山藏諸祖道影一百二十尊以歲久紙故色勞將至零落於是某人誓願廣圖祖影徧流天下惟善男信女覩影開悟共證自心云常熟慧日寺西方殿造像䟽聖人無常心以眾生心為心大覺無常善以眾生善為善眾生既有此心即具此善如心本不有善本不具雖聖人設教大覺垂形何異乎誇錦繡鼓琴瑟於聾瞽人之前哉是以聖人設教不可不周大覺垂形不可不廣也然教有淺深形有大小千變萬化染淨無常要而言之不過開眾生本有之心熏發本具之善而已常熟縣郭中慧日寺西方殿既萬鼎新而像設未備果林禪人發心造阿彌陀佛像輔以觀音勢至二大士像意在為緣廣普像雖三座願結萬人之緣人乞三分以訖其事有願獨造者禪人正色告之曰真松最初一念意在緣普雖屬大檀盛心不敢奉命紫栢道人聞而嘉之遂述此以告有緣者流芳不可把翫老病不與人期逢緣勇猛見作隨喜慨然樂助結淨土緣培成佛種豈惟不負禪人最初一念亦人人本分事也此片勇猛隨喜之心本非天降亦非地生先天地而非無後天地而非有故曰有物先天地無名本寂寥能為萬象始不逐四時凋阿彌陀佛此云無量壽佛佛有事佛有理佛理佛聖凡平等愚智本具不因成佛而增不因為凡而減惟有事佛必假緣熏而顯事佛既顯理佛即圓事理無虧是謂究竟故曰佛種從緣起所以聖人設教貴乎必周必廣者以眾生染淨無常熏發成種故也果林禪人方將以彌陀之願觀音之慈勢至之悲普熏一切有緣如一燈光傳百千燈以至無盡所謂萬人緣者乃無盡燈之嚆矢耳重建嘉興棱嚴寺佛殿疏首棱嚴此言一切事究竟堅固一切事者略則五蘊六入廣則十二處十八界也初長水禪師讀首棱嚴經至清淨本然云何忽生山河大地處疑而不解及參瑯琊覺曰清淨本然云何忽生山河大地覺曰清淨本然云何忽生山河大地璿師於是疑情頓釋歸檇李疏此經譬夫禹之治水循其性而疏之古今稱絕唱焉茲寺自宋迄本朝時雖代謝慧炬常然像設莊嚴香臺靜宇昭映日月而諸方龍象道長水者必懷香入郭探尋靈跡戀弗忍去葢璿師行化之地精神所存故也嘉靖閒寺廢僧徒散逸珠林寶地掬為丘墟余過而哀之無何豫章開郎擁錫東來遂有復之舉既而諸縉紳先生高其義羣然和之誠通造物枯木為之重榮甘泉為之再湧於是禪室粗備香燈續明唯大雄寶殿尚有待焉敢告四方賢豪見善隨喜勝因宜培嗚呼璿師因讀棱嚴而生疑因疑而參瑯琊頓悟清淨本然之心遂為百世心宗之祖然璿師所悟之心豈外諸君子日用昭昭靈靈者乎特迷悟一閒耳故迷之則清淨本然遂為五蘊六入十二處十八界悟之則五蘊六入十二處十八界未始不清淨本然也由是觀之則一切事究竟堅固一切事不究竟堅固苟非其人道不虗行然則諸君子凡有樹於棱嚴者如富者施財貧者施力辯者施言藝者施伎有力者之金湯孰非究竟堅固者哉懺薦牛麂疏夫忽生之前我尚不有喚誰作業有業有酬是以造善則升造惡則墜墜極思本本於惡因翻然改圖惟善是務墜因始杜福報油然人天途開鬼獄緣薄墜者日升升者日多多寡相資升墜無已某披搜聖斷罪福昭如凡有所辜敢不懺薦萬曆甲午八月之初掛搭匡廬忽搆瘧疾寒熱交楚神識煎惶將百日有餘幻質憔悴氣力衰微畏寒服皮兼飲牛乳皮則九麂牛乳百斤服飲之餘竊生慚愧濫充佛子道業不修慧不勝痴致此重罰猶借毛族身分資生苟不仗佛慈口讀內典心生恐怖罪花難凋福果非香於是始服麂皮即發願心一皮轉妙法蓮花經一部九皮九轉酬乳惟三願彼牛麂乘此法力解脫毛羣生人天界英特超朗福慧並深不忘宿命常思德本委肝棄腦竭生盡誠痛念我恩忘我資己護持佛法昭廓人天扶升抑墜虗空有盡彼願無窮福慧為航廣載一切凡有知者彼岸咸登某今幸身體康強精力如舊若忘初願有如梵川於是洒掃館室張掛如來儀容然燈燒香朝暮勸劬無敢懈疲口讀妙法心注妙義身體蓮花三業清淨懺摩牛麂傍生罪戾如湯消氷現業往因應念化成無上知覺生生世世我為其師牛麂為子現人天身摧邪輔正轉大法輪震大法雷十方三世微塵剎海凡有情處願力悉充如空充滿雖有聖智於色邊際揀毛許色相決不可得故色充滿即是空充滿又如氷多水多泥多象大水深濕深我發是願牛麂如船我如明月船載明月歸宿無得不勝慚悚仰干三寶證明謹疏本空上人住西菴飯僧疏夫公私無常心忘己為人則謂之公忘人為己則謂之私公則無為而不大私則無為而不小故以廣心施一針則福德難量以狹心施千金其福德亦有限也由是觀之則作福聚德豈惟富貴者能之而貧賤者不能耶顧其施心廣狹何如耳通江橋西百步許有華嚴菴者乃太宰陸公司宼王公捐俸買廢菴而延本空上人飯僧之所也五臺弇州二公現宰官身猶為客比丘計若此況吾曹乎佛言住家比丘見客比丘來不喜者是我法滅之兆夫喜與不喜公私判然我曹苟有把茆葢頭痛以佛誡警心則法將滅而復昌熾可期也本空勉諸代大眾止雨祈晴疏伏聞一心不生萬法無咎三言感格五福咸臻茲者淫雨連綿田疇漸沒百穀將腐黎民絕再生之望一人憂惶溥海增有死之悲溝壑幾填之時性命未殘之際痛省水澇之災目外無眚光輝之錫心上有徵故眾生不貪水澇無源眾生不瞋亢旱無本情遷而後有凶吉心動而後屬陰陽今某等抉眚有方塞源有土仰仗佛法僧三寶威神之力君親師三敬精到之誠合捐淨資營辦微供然香諷經禮懺兼洗人我之愆尊卑之罪伏願上天俯察赦難解之刑賜易求之福天風忽起羣陰掃盡而無遺皜日頓生萬物均輝而共戴再願聖主算餘天地臣佐福等山河自然風不鳴條雨不破塊合境之內比閭之閒無擇長幼共享安康募寫十六開士道影疏夫形之與影未始不相因而有也亦未始不相因而無也然則有無之初有不相因而有有不相因而無者存焉明矣世人徒役於有無形影之閒流而忘反以真為假以假為真眾患生焉聖人悲之即真假而設方便以為從有形可以入無形由有無可以入非有非無入而全之則向之所謂存焉者昭然在目也雖然形近乎有影近乎無近則易入是故聖人形化而影留使天下後世即影得形即形得心即心復性亦猶從有入無從無入不無者也今有人誓寫十六開士道影三十餘堂徧散寰內名剎供養之如片月在天影臨萬水或因此而得復性則生是心者豈非大慈乎哉說者以為影不若形形不若心心不似性何不即以性示安事影為是不知由粗可以得精由精可以入妙若然者則粗為入妙之嚆矢明矣達觀道人聞而悅之乃張大其說以廣勸知其道者共成勝事云耳盧溝橋資福菴募資常住地䟽盧溝橋東資福菴菴中守心老禪鑿土得泉泉鳴如雷眾人皆驚不移時鳴止唯寒流湛然來源莫測其深淺老禪汲之普施四方往來渴乏者然綆短井深慮不能久遂斫木為輪合輪為轂利有用無以人役畜輪名般若泉名福海人畜俱名菩薩老禪意者以菩薩運般若輪汲福海水周濟十方無論貴賤人畜有心無心凡沾涓滴者皆得發明自心同登彼岸托蓮華中親近彌陀達觀道人聞而悅之悅而隨喜之喟然歎曰大哉是輪軋軋福海上下無常虗而不屈守心老禪以無盡願力持之運而不窮則其功德豈可心思口議者歟於是為之倡一百七十人緣買地四百餘畝用資常住使般若之輪福海之水潤沾一切終古無息伏願見者聞者於此因緣生大歡喜生大感激慨然破慳貪囊施如意珠共成勝事顧不美哉方山李長者像前自卜出處疏伏聞佛祖聖賢凡出出處處必隨宜而然若不隨宜則機不逗物於教於法於自於他皆無利益某自惟發身於荒寒絕俗於倉卒乘虗入實弄假成真此心此跡一切顛末人雖不知自決了了且佛祖智鑒前無量劫後無量劫現前無量事如秋潭無波湛徹三際微雲度空纖影弗昧自然某平生好醜皆在照中然而某見地雖則無疑而現行思惑逢緣觸境智劣識強每墮愆失自惟出處未即判然何者顧在身命易捨於教無益於法無補如是則出不如處也又念祖道荒凉陵遲不忍受其恩而不能捐軀報德寸心難安如是則處不如出也於是於某年日月躬詣長者尊像前焚香疏意拈鬮決之伏惟長者不吝慈悲為教為法為某判然一決出處敢不奉命不勝惶悚以聞喜禪人然指修檀溪寺䟽吾悲世之人知有昨日知有今日又知有明日若以三世詰之則曰不知也殊不知過去世即昨日現在世即今日未來世即明日故曰昨日今日與明日是名小三世過去現在與未來是明大三日可見今生富貴者必從前所修而來現在貧賤者必從前所不修而召然有前修而富貴不能榮者前不修而貧賤不能累者此乃富貴貧賤初無增減者也此兩者知其修而不知其不能修者是謂福人知其不能修者而初無所修是謂智人惟佛與諸大菩薩始二嚴俱備檀溪寺昔道安祖師率襄人修智福之所邇來凋落不堪有真喜禪人雖有志修建顧福德涼薄無以感人乃以指為燭燃而供佛且誓曰喜若心真勝事必克喜心不真勝事難成吾聞襄之僧徒僉曰喜禪人然指修寺非為衣食勝事無終神其無靈予四月二十四日再遊檀溪適值喜禪人察其眉宇知其心真遂書此仰白十方云施堅固子及頂骨莊嚴佛像䟽恭聞七寶布施滿四方空福德無邊終歸生滅全身頓捐等一芥子慧光圓極始契真常是故雪山菩薩不以微軀慳惜得法於形骸之餘善財童子不以百城迢遙滿心於烟水之聚倘非憂深慮遠願終難克必須誠竭思窮道則易成然婬機不斷血肉化腥臊之物欲習頓枯皮膚成香潔之珠心有粗精塗分香臭苟悟一念未生之始聖凡誰名痛觀四微初借之時男女始兆故萬寶之海惟舍利為君堅固為輔良以無生未達緣生夢癡若了緣生腥臊不朽天地毀而堅固無損出界空而舍利常光比丘可九頓首於釋迦如來及文殊普賢十八阿羅漢像設靈焰之中布施堅固子三十顆頂骨三十圓永安於主伴五腑之虗所願弟子可生生世世在在處處升沉交加之際凡聖互聚之場見思未斷常以比丘身承事三寶如影隨形如光隨鏡影逢陰滅光受塵封吾此願心精持堅密非同光影滅處愈彰封時愈照幸而見思惑斷一切襍身隨類弘法無敢疲厭更願施我堅固者施我頂骨者我所積福慧皆迴向施者并一切眾生福等佛福慧等佛慧我願始滿我聞無論僧俗凡修福慧福慧十分國王得四分修者得六分何以故皇帝為世主故作福慧者若不仰仗世主寵靈護持之德欲作一毛頭福慧終不可得是故修福慧者無忘君恩親恩師恩施者恩善友恩如忽略忘恩者寧惟作福慧難成即人身易失壽命不長百凶交聚萬吉自消我故追思種種之恩五內如焚一心悲痛代發種種願心伏乞十方常住三寶釋迦如來十二部經憍陳如尊者一切聖凡護法靈聰共垂證盟又願發願之後當今聖主堯風永扇舜日長明四海清平萬民樂業生身父母光生於朽骨悟達於遊魂可再九頓首不勝慚痛謹疏度麂疏伏聞如來明誨比丘不得服絲綿絹帛靴履裘膬茲可久瘧之餘精氣少損形骸羸弱動止畏寒苟不以皮革藩屏則江風夜露恐難支禦於是賈麂皮若干張緝下衣一條聊防先患雖則律有開遮持犯之欵然內心終不自安切念麂類生前黑業牽連死後慈門無路命殘箭網皮碎刀針今既用其氣分將來瓜葛難辭若不預期超拔作緣未必無階所以用一皮為其口誦妙法蓮華經一部伏願仗如來之慈力妙法之威神麂等開迷雲於剎那梯覺路於般若自知作佛如鑿井見泥發願度生即窮子得寶祈雨疏恭聞聖人無常心眾生無常習顧在感應奚若則機教生焉譬如醫無常醫病無常病醫病相扣而精粗始辨故病以寒者治之以寒藥病以熱者治之以熱藥如眾生有無量病佛為醫王亦有無量藥世有亢旱之憂如來則不恡實力之應又此實力者非但如來獨有亦有天實力地實力聖實力凡實力龍王實力龍王眷屬實力併一切鬼神餘部等實力所以雨不求則不降眾生不感諸佛不應然諸佛中有大悲雲生如來者深愍眾生亢旱之苦禾苗不秀則穀飯無本穀飯無本則眾生生機絕矣於是大悲雲生如來發願救之故凡有亢旱之處稱此如來名則如來大自在實力三昧之用率諸聖凡種種齊施實力轉枯槁而為滋茂即亢陽而為甘霖伏願大悲雲生如來不違本誓俯應羣機三草二木一切百穀普救焦枯並得秀實謹疏
