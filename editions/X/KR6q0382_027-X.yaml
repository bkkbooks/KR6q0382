body:
  text: 明憨山德清閱詩七言絕龍華坐雪呈瑞菴禎公地從朝市入空山玉屑霏霏萬井寒茗碗爐香圍磨坐六龍無首臥澄潭曉過天然老禪別室老禪睡未足恬然憨臥賦此贈之海天紅日照東窻床枕高眠一切忘客到是誰魂夢裡蓮遊賞興偏長真州別丁南羽吳康虞世夢由來水上漚顛毛誰解鏡中秋相逢相別休相負門外長江日夜流贈潭柘龍泉寺柘林藏主布衲蕭蕭抱寂寥遍探龍藏答清朝山深自是桃花晚紅白枝枝祖意饒贈正菴靜主誦蓮華經昔日匡廬曾見來黃龍潭上暫徘徊於今又遇燕山裏車大蓮華舌底開擬登峨嵋丹霄高入翠峰孤聞道從來徧吉居萬里翩翩追白象平羗曉渡浪花疎贈靜淵秀公孤鸞寂寂久棲桐凡鳥雄雌鬧棘叢羊角風高三萬里等閒清韻徹丹空龍泉念仲淳曉露風高便結霜氷凌入夏襲衣裳人閒暑氣渾無有五頂經行少繆郎示白侶六月耘田水似湯農人肩背盡生瘡僧倫飯訖無情思揮麈雲閒倚竹窻西臺掛月峰地入寒空天倒垂芙蓉萬朵麗招提君王翠輦曾留此松下千官月正西清涼有感因悲熱惱入清涼白髮頭陀紛黛香應是秋深霜露冷白雲明月共繩床其二翠卷輕烟紫陌中東風一夜掃殘紅相逢盡道春歸去誰料寒岩春更濃開侍者自清涼迎至彭城以此示之白日青天爾到來翻疑是夢復驚猜須知人世如朝露曼室光中住一回其二寒雲重疊萬峰深誰把明珠慰遠心只恐支郎情未瞥夢中按劍是知音題蘆芽山萬佛崖一片蒼崖古佛胎殷勤鑿出萬如來寒泉晝夜無休歇鼻口同聲喚蚤回寄陸太宰黃塵未已復青山階下流泉去不還到海從教為巨浪輸他幽石抱雲閒陸太宰以寶帶施清涼賦此贈之一語參差寶帶輸等閒笑倒老文殊金湯吾道山河舊八覺聊將抵鉢盂雙峰寺古殿蕭蕭門徑開雙峰如劍列香臺夜深流水酬孤調雲外禪人一愴懷龍泉寺啜茶一帶秋泉斷復流向陽迴壑廠珠樓是誰小歇雲邊石劫外龍團啜七甌懷諸法侶望裏雲山知幾重更聞流水與松風那堪人代攀緣苦南北車塵夢未空示大道禪人大道阿誰行不得那知障礙自身心若將兩者推無地到處白雲流水聲同朱彥吉登玄墓法堂口占翠微縹緲紫雲樓萬里湖山一目收擕手偶經禪誦處範峰落葉不勝愁訪湛堂禪丈五臺銅瓦殿方丈蕭蕭倚鷲峰顯通久寂講經鐘更憐銅瓦風霜老祇恐重來不易逢過抱雲堂懷印郎搗雪敲氷不怯寒凍雲深處幾盤桓夜來獨對前峰月試問華亭可一般清涼山懷陸太宰重疊寒雲住底人世閒無路可相親期君不至長嘯去楊柳桃花處處春弔無邊師紛紛桃李鎻寒雲桂折秋風不忍聞莫使餘香飄㵎底暗隨流水出前村臥病長松館有懷白雲端老有宋僧中龍也觀其圓通座上一喝包腰而去人天百萬追之不返耿光照映千古臥病潯陽去能仁不遠未皇參禮靈踪先賦此以舒積懷城市何人問白雲長松月夜獨思君五陵公子機鋒別接得貧儒自絕羣萬杉寺為訪超公入遠峰慶雲散盡萬杉空曾聞聖主親題墨一片樓臺紫翠中過萬壽龍巖卜宅重巖計不疎象先有路莫躊躇泉聲岳色是何物纔復生心蚤失虗寓皖太平寺示濯凡居士科頭三拜是何心不見翻成見更深山色江聲君舌相隔垣猶復領清音詠畫水望裏滄溟湧火珠驚濤何處覓龍魚玉樓但覺寒生粟却喚兒童燒地罏雙劍峰雌雄誰把插丹霄時有光芒拂斗梢若使老僧拈起用世情斬斷沒絲毫辭賜紫以讓憨公三十年來江海遊尋常片衲度春秋自慚貧骨難披紫轉施高人福更優過天花傅母塚鳳凰城畔問仙居水遶天花十里餘生氣若教乘鎻骨海鷗亦復解詩書于峰聞道于峰有深處于峰行盡更難尋桃花片片隨流水只是不聞幽鳥音送孫仲來赴館新安夫士之為龍為蛇何常顧其志如何耳所志在道德則必先以悟心為主所志在功名則必先以精藝為梯兩者見定神識內凝放心自住何往而不可哉今子當溽暑涉崎嶇赴新安而不能一日千里一夕十年則其志安在子其勉之夏日蒸泉處處湯千峰夾道暑偏藏憐君此去魚投沸但念無生當處涼觀北園假山樹高山矮世閒希抑樹扶山癡上癡高者自高矮者矮就中亦自有天機過梅圃訪見素居士不遇主人不遇竹先逢曲徑微風響自空若使有心聽此調耳根瞎却眼根聾偶成美酒醉人醒不貪利名人醉死猶甘浮生果使如春夢枕上歸來肯自慚冬夜泊漏澤寺寄梅禪人黃昏停棹問尸林月滿寒空秀水深說法不須煩舌相耳根豈解領玄音重遊漏澤寺重來豈是倣仙遊最愛春波浴白鷗自笑黑衣非宰相却從覺苑覓封侯漏澤寺聞鐘何處烟霞鳴曉鐘道人行色又匆匆片帆風飽吳江近歌吹樓船調不同于圃偶感波臣曾不著袈裟解乞園亭作歇家直得主人窮計較籧篨千片代籬笆唐山寺禮禪月大師天台深處覓高人幾度登臨無一身却上唐山寺裡看池清影現妙通神其二浙江靜夜月中峰總是吾師管子龍畫出如來無量相人閒無水不遺踪還度赤津嶺懷湯義仍踏入千峰去復來唐山古道足蒼苔紅魚早晚遲龍藏須信湯休願不灰夜坐偶成每憐世上少人閒笑口頻開復更難睡起披衣誰共坐蟲琴蛙皷月明閒悼如印昔年共看雲閒月今夜月明照曲阿誰道此回竟長別燕山月色滿松蘿曲阿夜坐懷休郎道成無事業青山誰復憐君去不還湖口江頭月明夜炎蒸迢遞苦應難過斷崖塔院行到山窮水盡頭斷崖壁立使人愁誰知別有通天路任爾猿猱不可遊禮高峰塔三十餘年抱死關那來魂夢落青山臨行白骨無藏處擲向金毛舌上安示某居士不向君心覓我心茫茫滄海定難尋魚龍若使聞消息無限風波總陸沉池上觀荷三首紅白蓮花知幾多應齋尊者弄清波臨風欲語誰相委茂叔當年愛長哥樹密無心遮日色風微有意緩花香當波更許科頭坐不盡蕭疎孰主張六月樹陰坐一息更有荷風水面來試問長安陌上客蔗漿未必冷人懷感夢苦海寬深浮復沈所天淪溺最傷心幾回欲拯愁無力躑躅灘頭淚滿襟曇華峰此華不開聖人隱一旦復開聖人出拂拂天風生太虗香光無際奉佛日弔吳江某禪師孤城一片太湖東誰料吳江出此雄坐斷聖凡無走路兒孫千古泣途窮懶去岩走遍天下不肯住朅來此岩懶復去禪餘拳枕臥蒼苔就裏有心向誰語最勝泉從來大旱了無竭為雨為雲散自歇山下爭如山上泉出處孤高難勝越謁五臺大賢村蘇子廟古廟蕭蕭鎻萬峰寒雲踏遍覓遺踪殷勤再拜不忍別自笑參寥是舊容日暮龍潭即事巖端待月一天靜石上聽泉萬慮空笑問同來二三子是誰行樂有無中飛雲泉蒼岩一隙瀉寒流欲究根源志未酬莫使天風飄出去混同大海作潮頭過楞嚴廢寺三首萬花叢裏畫樓新玉女憑闌天上春明月一輪簾外冷夜深曾照坐禪人曾見名園全盛時春遊公子醉芳菲於今鹿苑花無主惟有杜䳌枝上啼當年遊此花無限今日重來不見花想是支郎厭華麗不教留住在烟霞楚江舟中感度門講主舉楞伽大綱荊南喜見度門公字字談心不放空試問楞伽在何處頭頭物物是孤峰因麟郎說七里灘景物偶成布帆風急碧溪遙兩岸泉聲聽不勞試問此時人在否青山迴合一鴻毛季夏從清涼山過練陽登望湖亭山下湖光山上松是誰高枕臥虗空大風拂拂來何處魂夢還疑氷壑中梵川螺館天地分明是一螺何殊此舘在烟波閒來折葦登臨者獨立蒼茫自詠歌過奔牛弔蘇長公懷中日月隱何方聞道奔牛坐化場剩語殘言誰檢得江山千古藉輝光長松館遇雪樹樹有花皆一色枝枝無葉但多光朝來莫道人踪絕亦有東隣送炭忙有感二首滾滾雲濤不轉頭使君因建鎻江樓緋衣未必長為主塔頂何人一啟眸香城開士舊名林流水松濤演梵音端為此山形勝好等閒昧却大夫心弔妙峰覺講主金翅盤空萬里風有門入妙古人同朱陵止觀橋頭月不挂天台挂別峰襍吟𩯭毛種種日維新逝水滔滔更愴神獨有月明流不去蓬窻此夜照幽人勸大川李善友求生淨土熱惱清涼本不差何妨荊棘與蓮花相逢幾箇知歸者薄暮鐘聲送落霞悼鵬郎瘦骨稜層上五臺頓除鬚髮斷塵埃出山不見入山去惱殺文殊淚滿腮潭柘山一音堂謝諸法侶夢裏青山夢裏身那堪去住別疎親何須醒後觀憎愛始信龜毛第七塵遺聞堂喜晴夜來風雨滿岩阿樹杪泉聲百道多無限好山雲蔽盡那知今夕更嵯峨過弘恩寺門外千峰寺裏燈一光三世照金繩老禪飯訖無餘事靜聽松濤沒愛憎過昭慶寺迴合青山鎻梵宮階前階後象王踪懸知超世非無本法雨香雲不記重大悲閣別陸太宰馳驛還家聖主光憑虗一嘯萬機忘手中有眼應知響耳處聞聲豈妙常其二金身七尺有餘高柱石乾坤不計勞自是君王憐朽骨放歸雲外聽松濤過潼關黃騾初不異青牛關吏何須作路讐西向秦關同此去神珠大夜向誰投彭城洪福寺月下懷仲淳盤馬山前月正明烟波渺渺片帆輕清光不減金臺夜禪室南冠少繆生登戲馬臺掀髯一笑火咸陽衣錦長歌歸故鄉莫問當年橫槊地蕭蕭秋草帶寒霜送仲淳奔喪南還風樹蕭蕭千里歸兩行血淚染麻衣送君有意難為語那可燕山聞子規夏日遊清泉寺寺裏清泉戶外山波光空翠盡生寒獨憐大士翻經館狐兔黃昏自往還彭城題蘇公黃樓一片孤城捍怒濤幾回隍壑舞黿蛟祖龍曾此求周鼎不及黃樓意自高題福岩師子峰千日萬日爾不吼我來便作無畏聲風雷夜半震岩谷深林百獸無不驚同諸法子金山看月青山兩岸鎻金鰲石上觀濤月正高雲外片帆飛不住分明鏡裏渡鴻毛同諸法子過廣陵宿上方寺敘別月下尋幽叩梵宮老禪猶在夢魂中溪山莫問來朝路夾岸桃花色不同題上方寺觀音池大士無端錯用心不觀色相却觀音寒流若使離聲入千尺雲濤覓一針讀桃源記夾岸桃花知幾深漁郎何事解相尋此回出去輕饒舌負殺丁寧一片心晉王義之曬書堂竹帛古人心血在肯教魚蠧更生塵自知南渡無歸日獻與如來轉法輪示徐符卿孺東予告還山滄浪辛苦幾經秋一片丹衷竟未酬偶向雙林尋白足談空猶自夢春疇夜泊義興城下烟濤空翠雨濛濛一片孤城山水中我欲尋幽向深處黃昏停棹但聞鐘哀路南塘先生示路抱赤貧寒徹骨更連喪開士聞之亦感傷江上麥舟誰肯棄兒孫珞珞產南塘聞秦直指禁令野禪若使是妖僧敢惜殘年瀆聖明便請一刀彰國憲何妨痛處了無生中秋泊蘇長公祠下維舟祠下露沾巾雪漲銅棺月色新歌笑不須刀布換閒中開口許何人壽雙山先生軒冕松雲路不同雙山高出大夫松天風一陣來何處吹走雲濤響碧空過漏澤園髑髏此地莫言多法界都來毗富羅更看陌頭誰氏塚幾回歡笑幾悲歌題金沙寺岳武穆王陰中有陪僧寮謁金仙之句將軍何事謁金仙弘忍精忠本一源不具殺人真手段安能截斷世閒纏長者菴定起微雲淨盡天如洗定起經行月色中無限風光向誰道菴前菴後碧山重長者菴讀決疑論善財童子不辭勞五十三參粉寂寥不是當年李長者瞿曇安得有皮毛示大賢村諸善友世人都怨日閒忙夢裡波波醒後忘何者真兮何者偽大家為我細推祥早春謁方山李長者還清涼招陸太宰特賦此二絕飯喫黃精衣著麻長菘七碗勝芽茶相知若問山中事定起巖前掃落花其二五峰氷雪古來深春滿乾坤冷莫禁曼室老人虗別室遙知端不負登臨謁方山李長者還定襄道中有序余慕唐李長者有年數矣而以參學未暇一訪遺踪萬歷壬辰發春三日自清涼山擕開江彩三子特禮覲之既而揮鞭還清涼春雪繽紛千山裹玉逆思長者音容笑貌恨不與之同生得事巾拂感而賦此十年如渴仰高風神福山原訪道踪春雪紛紛遍南北杖藜何處倚寒松過聖壽寺三首郭外青山兩岸斜禪房寂寂鎻烟霞佛前燈火誰相剔分得清光照萬家看花若使待花紅無限春光逐晚風著眼直須天地外持竿寰海辨魚龍柳條何事漏春光蜂蝶紛紛過短墻只恐東風妬花笑馬蹄千里踏紅香送魏覺樗富陽江畔別君時此別蘭谿月尚微明月無心能兩照錢塘渡口使人思過七里灘富春山水杳無窮誰著羊裘隱此中若使劉郎不相喚後人何處覓遺踪北園見紫薇花有感未見花時已落花雨前雨後兩無差紛紛蜂蝶來還去一段春光被眼遮秋夜半室崖聞法雲菴居士讀經片雨初收生夜涼半峰趺坐石為床忽聞松下讀經響清磬敲殘斜月光題廟壁師遊衡山過此廟遇廟傾邦人伐廟樹修葺因題此邑侯見詩遂止不伐且勒詩於石修廟還災廟裏松廟成松去鶴巢空無如留却青松在逮得長生老化龍夜坐後夜空山坐入禪那知明月照寒泉無端失伴猿相喚瞥地身心又宛然示覺迷居士𩯭毛如雪骨如蒿若問長生路轉遙淫殺且將根蒂斷蟠桃只在自心苗慰傅居士重疊青山古樹多一菴高結在松蘿通幽別有池邊路居士空床獨抱疴禮香山臥如來兩脚長伸只管眠那知苦海浪滔天相參莫問雙林夢幾度春深啼杜䳌來隱標當年三士隱修禪鶴在松梢龍在淵我老一來尋勝跡莫愁破竈不生烟登說法臺鳳頭老漢一登臺萬壑千巖笑面開說法若教煩舌相雨花惹得帝天來題戒壇九松五岳三山曾遍遊此中松樹更無儔馬鞍雲盡葢壇出風月龍蛇舞不休大賢村長者菴懷江南諸法侶階前屋後盡青山苔徑蕭蕭遠市寰來往風塵頭共白爭如雲外聽潺湲燕京別文卿中甫之峨嵋三義廟前楊柳青垂垂無語不勝情從來木帝難為主莫厭閒中風雨聲夢端師子夢中曾見端師子瀟洒風流自不羣一片皮兒蒙却首等閒哮吼萬重雲潭柘懷繆仲淳谷水龍泉一片雲去來誰解見離羣夜深唯有滄溟月無限清光不可分燒𪹼竹有序魏中光居士於萬歷十四年冬參予於潭柘山嘉福寺明年仲春仍送別於此中光好燒𪹼竹聞予不喜遂止予謂中光曰潭柘陰氣久積法輪弗轉正當以爆竹聲震散之中光大喜燒竹達旦日輪重轉和氣翕集中光其有所助歟因感而賦此𪹼竹聲中一別來桃花谷口幾回開堯天佛日重光處莫把浮生送酒杯碧雲寺禪房見迎春花一段風情自不同道人瞥見萬緣空最是松泉明月夜清香浮遍梵王宮長松館君家幾個長松樹引得天風作海濤熱惱從教千萬斛此中一坐自然消懷弇山居士太室歸來事事幽散花天女豈全牛雲邊水木同誰賞隱几無心對海鷗悼無盡禪伯坐破蒲團知幾枚世緣見說久成灰春深岩畔花狼籍百鳥空啼喚不回上方別守愚座主紹宗天恩開士之峨眉大家都是異鄉人相送殷勤骨肉親回首白雲重疊處巴江行色洞中春梵川西爽樓雨中即事屈曲池塘楊柳風浮空漚閣雨烟中誰將半偈拴心馬夜聚魚龍水月宮曲阿梵川即懷流金爍石雪漫漫豈但危峰與峻巒秦道巴江千萬曲蘆芽雲樹帶氷看示王中貴江南江北盡叢林惟有龍神願最深身命肯將拋此地盲龜植木芥投針與大光禪人瓶錫飄然歷萬山境風逆順片心閒若將水月同行跡刻畫虗空作道顏舟行即事兩岸好山青不了一溪流水碧無窮布帆風急浪花白飛入千峰與萬峰寄嘉禾李培秀才武塘一別幾經秋萬里雲山兩地愁惟有吳門江上月清光不逐水東流洗硯池洗硯洗頭試問津波光瀲灔墨花春一心清白居雲屋人世於今有幾人法華寮玩月有感寂寞空山夜氣澄長天那得片雲生不知身在清光裏猶乞傍人指月明遊太湖平生那得此遊奇夾岸風高落木稀一水征帆千萬片青天鏡裏浪花飛贈一光趙居士驀路相逢喚喫茶杖頭有眼辨龍蛇誰知邂逅秋風後南國疎梅又著花登牛首文殊樓高樓憶昔撫長松塔勢稜稜雲壑中閒笑一聲天地外行踪髣髴在虗空偕魏李沈三子登釣臺雲外釣臺高若許桐江萬古一絲垂水寒夜靜魚龍睡誰聽先生歌紫芝華嚴嶺丹楹畫棟鎻凡峰絕巘盤迴有路通一部襍花乖古調龍蛇曾此領真風悼石頭洪濟寺守心禪伯夕陽歸鳥向江濵猛浪聲中共息身大樹無何風折倒一回過此一沾巾讖禪客寶塔凌空眾鳥喧那來英物解飛翻一雙鐵翮天生就夢裡曾驚燕魂靈岩過傅居士舊遊處嗜酒狂歌問狗屠禪房白日醉呼盧溪山不改前來路香飯空庭讀佛書題用師靜室龍供泉把茅誰縛萬峰頭絕壑寒泉日夜流一自用師歸去後老龍玉髓竟還收登伏虎崖豈是來尋伏虎踪為看巖底列羣峰笑將四大分千影處處山頭有凍膿歡喜泉鳥道盤迴知幾重寒泉潤吻想龍宮呼童試斫雲邊石止渴梅林亦有功過活埋菴十首山林清淨本無塵那得泥灰埋此身莫如老死娘胎裏省却寰中觸惱人試看父母未生前可有形骸倚樹邊自是堂頭無出豁腥臊炙地更薰天髑髏究竟本來空空可埋藏空有蹤未審吾師作何見無端捕形與關風逼塞虗空不厭高何須掘土葬山腰應知世眼無多大肯把皮囊刺爾曹大患從來為有身不如埋却免生塵青山白石為棺槨作箇閒中活死人生死何曾是兩條活埋未必掩腥臊從教逼塞虗空去萬戶千門處處高鼻孔撩天不可藏被人牽拽轉慌忙何如未死先埋却也勝林梢掛角羊埋身未必勝埋心直下無生絕古今岩谷市朝皆大隱吾師何事遁雲深埋身何必在青山但自無心萬境閒怪底老禪太多事白雲深處立重關自古名高累不輕飲牛終是上流清吾師未死先埋却又向巢由頂上行弔月公杉經殘手自植雲邊摩拂風霜知幾年毫末眼看成合抱越王慢道破吳賢過曇陽館聞道曇陽已得仙盡看白日上雲天是誰却恨相從晚華髮蕭蕭讀老篇有感二十年來勘此心無分淨穢任浮沈相逢謾道輕繩墨除却青松孰賞音簡魁禪客師事曇陽一從別後感同袍少室論真爾獨高不謂年來愛翀舉却將解脫博逍遙答禪客藜杖春風入閣來此中心事謾相猜誰家樓上如花女倦倚欄杆手托腮貽南竺僧葛鑁聞道慈心及昆蟲降龍曾不假神通相逢莫問途中事𦵇嶺春深雪未融佛手崖茫茫三界總成迷孔老雖能力尚微不是瞿曇舒大手眾生淪墜孰提擕趙州關蜀道雖難尚可行趙州關險不堪登分明舉目真如院多少英靈度未能過懸珠塔清谿委曲抱樓臺金地空閒絕點埃聞道當湖舊林鳥無枝可宿亦飛來龍光寺諸文學開講見招有答雨過空林生午涼衣冠高論洗心堂遙知此道今收住不屬禪家棒喝旁擬偕開公之匡廬度夏千尋絕壑夾龍潭旁有長松片石寒避暑開先誰是伴臥看飛瀑瀉雲端供花誰把金刀費剪裁殷勤雙手獻如來雖然不藉春風力紅白枝枝次第開偶成二首野牛鼻孔本撩天去住從來不受穿水草鮮明隨分足行期早晚漫相憐松毛著火𦦨初騰逐逐趨光競北行未及更深烟盡散歸來都怨筮無靈贈某禪人斷指利斧輕將斷指頭百花林裡萬緣休只今舉似湘江上鮮血翻成碧水流宿文殊寺懷鳳林禪伯別諸法侶覆宿風高白草淒孤桐空在鳳先飛月光如水清人夢杯茗相看動所思感懷𩯭毛歷歷幾經霜越鳥燕鴻倍感傷行盡江湖三十載買船無限客如常欲過麟郎別墅先此示之連日天陰今日晴杖藜躍躍南園行主人池上笑相待茗碗相看香浪生同王方老過子成別業因悼子成夕陽烟水對荒墳亦有人來掃白雲今日倚欄同啜茗蕭蕭落木不堪聞別如曉莫道來朝各一天溪山雖異月無偏若能心水常如鏡處處清光在眼前訪萬延老禪三箇柴頭品字燒支郎擁毳暖偏饒千岩雪覆人蹤絕唯有梅花慰寂寥華亭浩寺微笑堂澤畔桃花歲歲紅幾回帶醉笑春風年來莫問靈山會夜半吟殘曉寺鐘僧買蟹供檀越聞而有感汝輩橫行已積年成羣白日海沙田今朝捉去為媒妁百沸湯中謾呌天喜遇王居士見說終南幾萬峰春來一雨瀑千重茆茨欲結最深處可有陽坡著凍膿偶成故山初不改蒼茫萬隴縈迴得氣龐自笑草萊埋不盡空中頭角尚昂藏冬日上歌風臺峨嵋應拄萬重天歷盡氷霜到絕巔憎愛當頭風過樹象王行處自超然難勝泉修羅愛酒海為器釀乃不成遂大怒豈若此泉清且甘一歃令人忘眾苦太古峰前懷許使君相對頹然幽思生鹿泉此去隔雲層更聞白佛山中事蒼石誰留不朽名蕭岡納涼二首納涼觸處藕花風望裏青山知幾重怪底蕭岡秋色早炎蒸不到綠陰濃五老峰頭結夏難日閒無暑夜愁寒城居六月心遊此鑠石流金總是閒懷楊慈湖先生三首曾讀先生所著書明星朗月照禪居夜來頭面渾呈露知我慈湖浪裏魚其二那個男兒不丈夫念頭纔起便糢糊試看白日青天上雲翳從來一點無其三慈湖今日尚長清誰謂先生有死生何處風來波浪起依然不斷講經聲秋日偶成少年走馬過邯鄲俠客聞風毛骨寒飯罷日長無箇事斷雲自剪補衣殘春遊隔岸桃花血染紅誰家犬吠水聲中不因雨過春江濶一扣柴扉問小空開先瀑布黃岩老衲經行倦瞌睡觸翻淨瓶水化作長虹千萬丈潺湲今古鳴不止送懷慈之南海每聞南海風波濶未得身心空莫遊浪翫小舟如芥子財童雲裡為擔憂過趙州柏林寺花木蕭蕭春色微庭前柏子舊來機只今誰復重拈出無限人天領旨歸題畫千松斷磵絕飛梁松下何人問老龐花落不隨流水出那知深處有春光廬山夜坐雲吞瀑布有無閒錦閣歸來日已闌法侶二三談坐穩磬聲流水共潺湲月下偶成靜夜無雲月正中清光何處不相同江南江北閒臺殿幾箇心聞曉寺鐘宿靈隱山房有感長松九里接飛來碧岫雲濤吼法雷猨鳥無端驚斧鑿一回登此一傷懷登丹陽玄覧亭松矮看山松色蒙待成千尺自疎通南湖西嶺清秋夜月下看來更不同示吳元石孤光一片本圓明纔復心生便隔程紙上相尋尤可笑畫龍安得解通靈醒夢夢裡悲歡知是虗醒中境界豈真乎常將醒夢細推勘逆順關頭便自如示密藏潛行密用道階梯纔露聰明早自欺醒處未能違現行夢中安得不昏迷咏懷年來心事隨流水一到滄溟不復還剩得靈臺無所著境風順逆鎮常閒憶孫仲來隨余過祖堂尋懶融尊者䇿杖同誰問竹房千山空翠染衣裳獻花鳥去無消息却使延陵道更香玉板橋留度門一片寒瓊跨碧流行人到此忽驚秋莫教飛出人閒去為雨為雲不轉頭承天寺懷古風塵何處問羅家八德池頭見覺花庭下叢蘭今寂寞更生留得破迷邪峨眉送人遊清涼氷雪風塵路不同出門拄杖便成龍朝來何處桃花浪片片香雲接五峰過十八灘二首孤蓬終日翠微閒纔過前灘復一灘直入深山更深處曹溪猶在嶺西南兩岸青山月滿川篙師貪睡不行船此時意味清如許法句難將口吻宣草寺別顧南宮馬嘶楊柳春風煖人對曇花慧月涼此別不知何處見片帆縹緲渡滄浪住山厚篾三條束肚皮住山誰飽復誰饑幾回獨自隨荒隴不學曹溪滾是非吳城舟中黃梅未已復紅梅湞水歌殘吉水來若使東林堪卓錫聰明泉冷滌紛埃過關挑雲橫雪嶺南來流水青山幾日回關吏何須扣疲馬囊中無物惹塵埃偶成長松之下坐片刻直抵紅塵三百日豈知一念未生前空虗懸塊蒼苔石題楞伽山海圖陜代峰泉曾見來這回所見更奇哉雲濤空翠皆無盡一任人閒辨劫灰夜泊星子朱堤浪剗南康城脚時往來舟檝命如絲新安不產朱夫子誰向湖邊築此堤過南雄遺貴善人南來豈止千重嶺終日烟霞伴客行湞水西流誰解道廣長舌相說無生登二祖說法臺鼻祖當年此說經尋常花雨慧風清只今臺殿蕭蕭裏惟有封龍不改青挽守心禪人十年辛苦在叢林六月葵花一片心雲過龍泉秋雨歇寒流多是斷腸音秋夜宿本侍者禪房秋初久雨忽新晴雲屋寥寥片月明爽氣逼人眠不去經行誰共聽泉聲夢覺偶成夢歷峰泉興正濃萬松失在一聲鍾覺來空翠猶堪掬纔復生心趣便窮題好堅木圖壽王司宼牛羊不敢臥其陰出地高升壓眾林堅直不隨秋氣改無情豈肯負初心秋日過多寶寺懷陳平江侯穆文簡公魚龍不改舊波濤多寶撑雲壯寂寥陳穆遺踪何處覓斷殘碣草蕭蕭哀福聖寺古栢香葉玲瓏翠作陰幾回風度瀉清音簷前寶地依然在無復朝來報曉禽夜登中臺師子峰頭縱大觀翻身直上碧雲端一聲長嘯乾坤外五頂風生月影寒喜姚侍御問法烏臺白足笑曾登柱史焚香問大乘佛性自來無貴賤有心男子即通靈過鶴林古竹院二首深雲徧種碧琅玕小結茆茨亦可安一任流金并鑠石老禪擁毳尚憎寒其二青山有竹千萬竿聽雨時來一倚闌驀地耳根尋不見主人喝下破癡頑入湘陰自古巴江學字流湘潭水出更深幽三十六灣來似去不知誰是共行舟咏懷葢世功名豈足談時人所貴我如閒誰知別有登科處不在文章紙墨閒陽羨舟中即事來往風塵兩𩯭彫青山冷笑世人勞平生碌碌成何事一片年光夢裡消示僧衣中難著是袈裟龍袞貂裘未必佳若使為僧心不了何須祝髮住烟霞過大庾嶺二首空拳出嶺一樵夫得鉢歸來上祖圖鼻孔大頭還向下支那翻作葛藤窠紅梅林下黃梅鉢夜半誰持過嶺南無限好山青不語箇中一句若為參贈本來和尚前後千峰去復來幾回蠟屐破蒼苔只今懶向諸方走飯罷和雲臥石臺過張文學茂木竹林流水讀書堂更愛清風送午涼喜怒未萌誰是主香雲片片度長廊哭千松座主茫茫宇宙總他鄉像季驚摧正法幢南望江梅愁不盡千松深處落寒香望鞋山無勞針線自成鞋萬古驚濤不可埋世上有人能著得輸他沒量道人來悼穆元菴怪底元菴老覺翁春光漏盡樹頭空慚余一片紅蓮舌無地輕搖此辯鋒九江舟行春風楊柳問前途南北關山萬里孤一片月明照江水此時心事有中無
