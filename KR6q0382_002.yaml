body:
  text: 明憨山德清閲法語夫聖凡雖多途要而言之總不出乎四諦也諦謂審實不謬故聖人言苦必苦言集必集言道必道言滅必滅又四諦有生滅四諦有無生四諦有無量四諦有無作四諦故聲聞四諦與緣覺四諦皆苦集在前滅道在後蓋聲聞緣覺志在二乘惟獨善其身無有兼善之願故也惟無量四諦與無作四諦雖別圓固殊而並有兼善之願故謂之弘誓即此觀之聲聞與緣覺有諦而無誓明矣故曰有誓名大乘闕誓名二乘何謂無量四諦以空假中三觀歷別而修先以空觀破見思惑次以假觀破塵沙惑末後以中觀破根本無明見思破則獲般若德塵沙破則獲解脫德根本無明破則獲法身德此三德者天然之性德也在凡不少在聖不多故曰性相近也自性變而為情則粗順之門開矣粗順之門開則近者習遠矣習遠而不返則淪墜受苦無休歇矣故曰習相遠也於是先覺者憂之務使遠者習近即於粗順門中始開逆門逆也者蓋泝而上之之謂也上而底極所謂聖人與衆人無多少者我得全之矣我全而人不全聖人則又不忍故乘其全遍遊於萬化之中開物成務俾未識全者皆得其全故逆門之後有妙順焉然妙順惟別教菩薩與圓教菩薩有之聲聞與緣覺則有逆而無妙順矣蓋其闕四弘誓不發同體之悲故也何謂同體之悲謂我逆於粗順之中受無量苦於無量苦中苦極思本思本則近覺近覺則易熏發是時也先覺者知我可熏發矣遂量我何因緣而可熏發即以何因緣而熏發之如箭鋒相值同時巧力不得預莫知然而自符契之噫此非檢名審實精義入神者則能熏所熏安得能所忘而無思契同哉雖然伍員勾踐復粗順之讐耻並能焦身苦思二十餘年而遂其欲今我等於出世法中求無上道出無量苦果能焦身苦思千日之勤則我所欲者必遂而無疑也何以故蓋伍員與勾踐率情圖事於性非近所以須苦久而遂其欲也我等志在復性求出情之法勤繼性之善於性有孝子之道焉所以千日之功可博彼二十餘年之苦功耳此乃自然之理必然之勢我復何疑茲以四弘誓後出四諦之精粗與敘三德二順一逆之槩者恐汝等發心不辨藏通別圓淺深之教則發心無主主宗也微宗則歸宿無本要知宗本大藏中有天台四教儀約有萬字若求而得之必誓讀而成誦誦而稍通其大意則四教淺深發心宗本又在我而不在書也馬忘繩與規矩而中繩與規矩者馬終不敗焉如未忘繩與規矩而馳馬未有不敗者也故足忘屨始適腰忘帶始適未始不適者忘而適始適即此觀之身忘則心用周心忘則未始不周者周萬物而未嘗勞也以其未嘗勞而能勞萬物不勞於萬物耳故曰惟忘忘而忘無所忘者惟未窮而知變者能之鄂州沙門明秀所節徑山節要果明白精到然其所作偈曰動靜參機要安排路更差今離情見處別有好生涯豫不知情見果是何物而欲離之耶殊不知擬欲離情見者是情見耶非情見耶是情見次離即初離非情見離次離無非情見之情見噫節要果精到矣寧知節要精到處乃是徑山茶飯非秀公之飲食也秀公速道速道如道不來非秀公節徑山乃徑山節秀公耳緣生無生之旨稍通於文字般若者率皆能言之殊不知知緣生無生特畫餅充饑耳曷能劫生死賊哉惟知而能行行而能戰戰而能勝勝則證之矣嗚呼證而不能忘則大用不彰大用不彰則帶果行因之妙與夫普賢常然之行幾乎息矣豫以是知明道易而用道難決非虗語吾曹當勉之性如水情如氷氷有質礙而水融通融通則本無能所質礙則根塵亢然此義有知有覺知則意雖了然觸事仍迷覺則觸事會理情塵自空迷則情之纍也覺則性之契也纍則二契則一二則有待一則無生無生乃性之常也有待乃性之變也常則無我而靈變則有情而昧故昧中之知知不勝昧所以道不敵習靈則習不勝覺所以不假修持而坐進菩提反是雖舍身命等如恆沙祇增有為業耳良以覺近現量知近比量是以覺之與知成功殊也所中有能所則不成能中有所能亦不成以所中無能能即是所能中無所所即是能此蓋能所不相遇故也如相遇則能與所兩俱不成矣兩俱不成非是佛法性昧智故兩俱成就智雖不昧性斷血脉亦非佛法如不斷血脉而智又不昧惟親證者然後知耳夫眼夢色耳夢聲鼻夢香舌夢味身夢觸意夢法而一身之微六根皆夢脫無有覺之者則一夢永夢矣於是我大悲菩薩教之以眼觀音以耳聽色以鼻嘗味以舌嗅香以身攀緣以意覺觸是以六夢忽醒覆盆頓曉也即此觀之以順流用六根則六塵皆夢媒以逆流用六根則六塵皆覺雷如二十五圓通以六根六塵六識與夫地水火風空見識迭互為雷震驚夢者邇來世道交喪以雷為夢以夢為雷莫知孰為覺者孰為夢者既夢覺不辨不至於玉石俱焚不止也夫道學雖弊則勝俗學多矣禪學雖弊則勝道學多矣今有以道學為名利之淵藪互而排之以禪學為逋逃之淵藪亦互而排之殊不知風俗無常以道學之風鼓之則成道學之俗以禪學之風鼓之亦成禪學之俗道學與禪學之俗成自然高明者日多而污暗者日少即或假道學禪學以為污暗者有之此亦嘉禾中稊稗耳必禾多而稗少也若惡少稗而欲盡去多禾豈仁人之用心哉道學禪學我大覺老人於靈山會上說妙法蓮華經總二十八品雖鋪張重疊法喻兼明不過即粗會妙而已至於較六根功德之優劣又粲然若日星如眼鼻身三根惟八百功德耳舌意三根則千二百功德也據實言之舌根較之鼻身功德亦惟八百然其敷演妙法則功高諸根矣所以如來加之四百功德者蓋賞之也倘不能說法而妄言綺語不真語不實語兩舌惡罵則其罪罰亦過諸根也故曰君子居其室一言善則千里應之一言不善亦千里應之又曰言語福禍之階也榮辱之主敢不慎乎又眼耳兩根皆離中取境鼻舌身三根合中取境意根但司前五根落謝影子耳五塵實境並前五識所司也然楞嚴會上如來敕文殊選圓通之根彼二十四聖並揀而不取獨取耳根正當堪忍之機所以長觀音而後諸聖蓋因緣時節也豈諸聖果有慚德哉昔有禪師問僧曰聞隔壁墮叉釧聲即為破戒子作麼持戒對曰好箇入路禪師曰汝向後可為千五百善知識粥飯主去在若然則普賢菩薩心聞洞十方又豈有愧於此僧耶蓋當此方之機普賢不若觀世音餘方則觀世音又不若普賢之當機未可知也良以聖人說法如投夜光之珠於金盤之中而其橫斜宛轉衝突自在雖聖如迦文亦不自知也雖然更有一問心聞洞十方時為方在心外故能聞耶為方在心內故能聞耶在外能聞在內能聞以理推之皆無是處惟親聞而實證者所知也故窮理盡性之學舍我如來則六根優劣事圓理徹孰能究之乎小子何幸入如來家培無上種稍不思報佛深恩非人矣子其痛勉之示洞聞長風游太虗萬竅競怒號衆人聞以耳菩薩用眼觀是聲果有常圓通門難開嗟乎聲來耳邊來時孰主耳往聲處能聞何物往來究之根塵之性有則能所難遺無則枯若槁木兩路既窮中豈孤立故曰智入三世而無來往此本光之常也識涉三世此本光之變也本光變而根塵封癡癡衆生睡夢濃黃昏禮佛誰擊磬聲入耳中空不空空則無聞不空障聞響重為說圓通聲既如是色不異香味觸法玄乎哉知之一字衆妙門知見立知禍大矣率情率性霄壤隔相逢幾人辨端的兩者從來一而二用處在人悟與迷悟則喜怒唯率性率性能通天下情情通開物而成務譬如一指間屈信不能率性而率情迷中倍人可憐生以己通人分別起逆順關頭多愛憎故曰至道無難唯嫌揀擇但莫愛憎洞然明白又曰率性之謂道率情之謂倒噫聖人豈無情哉唯其通而不昧情而無纍情故無所不達無纍故初無愛憎所以一切大菩薩饑饉之歲身化為魚米肉山疾疫世身化為一切藥草此情耶非情耶無情則同木石有情則不異衆生故能以眼聞聲者聖人也以耳聞聲者衆人也仲尼六十而耳順說者以為聲入心通道人常病之夫何故耳順則聲無順逆皆率性之媒率性則無我無我則無內外內外既無則出入者其誰乎嘻不出不入畫眉混沌況出出入入哉覺情覺情覺則性明無分憎與愛觸處本光靈自覺更覺他相逢蓋始傾目擊不存存別後更惺惺毗舍浮佛此言自在覺蓋此佛於身與心皆覺了解脫故身解脫則無生死之礙心解脫則無煩惱之礙解脫即自在義也而一切衆生不能覺了身之與心所以不能解脫生死煩惱之礙若能覺破身心執受衆生與佛無殊若不能覺破身心執受即諸佛亦安得自在哉且道如何覺破身當細細觀察我身之皮肉筋骨凡堅之類初從何有我身之涕唾津液血尿凡濕之類初從何有我身之溫暖凡熱之類初從何有我身之四肢百骸八萬四千毛孔運而無滯血脉周流能運能動者初從何有身觀既熟次當觀心我現前分別之心因他而有耶因自而有耶因他而有未觸境時愛憎不起因自而有若無境觸心無愛憎於自於他反復推究謂因他生謂因自生以理折之自他之情枯極無地自他之情既枯將何物共而生心耶共而生心之情既枯豈無因而能生心耶若無因能生何火中無水石不生草鹽中無淡兔何無角龜何無毛耶龍樹曰諸法不自生亦不從他生不共不無因是故說無生龍樹之偈又毗浮佛偈之注腳也釋毗舍浮佛偈吾嘗靜而思之天下未始有吉凶也吉凶之生生於毀譽耳故毀我者則人凶而我吉譽我者則人吉而我凶又毀譽生於好惡好惡又生於未始好惡者吾故曰天下未始有吉凶也雖然吾嘗以未始有好惡者觀天下之吉凶皆龜毛兔角也若以吉凶觀未始有吉凶者則未始有吉凶者無往而非吉凶也若然者吉凶初無所從顧我所觀何如耳故箭穿石虎魚躍氷河若不以未始有吉凶者感氷與石則氷魚與石虎豈能隨我而變之哉如君子不宿怒於心正此道也但衆人昧理而縱情始乃物我亢然耳且凡好惡不能自生必因前境而生既因前境而生則我現前之好惡本前境之好惡與我初無有涉也譬如親疏之人我心坦然或親疏忽至則我好惡之情油然而生不能自禁矣謂此情我心固有因境牽而始彰則我真心生尚不有安得有我有我則有待有待則可說心與境相牽而生此情謂我心無生而能生此情者得非無因生乎自生他生共生以理折之俱不能生況無因生乎昔人有言曰暫時不在即同死人蓋言理昧而情馳也曹溪亦曰若真修道人不見世閒過吾以是知見世間有過者則我心未忘所以物敢待我如我無心則物亦隨無心而化矣豈煩重加排遣然後消哉汝曹能以此觀觀逆順境緣則境緣真吾大師也敢忤逆大師乎示弟子夫衆生事若有常則佛事亦有常衆生事既無常所以佛事亦無常也如衆生有饑饉之病佛則以香飯為藥或衆生犯寒凍之病佛則以絮裘為藥衆生有以黑暗為病佛則以光明為藥故衆生犯病無量而佛施藥亦無量耳如靈山會上佛放眉閒白毫相光照東方萬八千土玄沙備公亡僧偈則曰萬里神光腦後相臨濟則曰汝等諸人赤肉團上各各有一無位真人於六根門頭放大光明由是觀之則此光出沒初無常處法華云佛放眉閒白毫相光照東方萬八千土則此光似有常處矣何者光照東方而餘方不照故也雖然光照東方而不照餘方者非不照餘方也蓋如來之意舉一方而欲九方反也或謂臨濟無位真人光無常所玄沙法華光有前後豫應之曰經既舉一方而九方反則眉閒之光未始不圓照十方也眉閒之光子謂之前光腦後之光子謂之後光乃子妄生穿鑿非佛祖之光有前後也但佛祖之意衆生苟從一光而入則圓照十方之光明未始異也如大海一滴之濕未嘗異海之味如一塵入正受諸塵三昧起況一方從光入而諸方不為三昧乎豫故曰衆生事無常佛事亦無常衆生病不一佛藥亦不一曉禪人倘從此入則東光之名豈但一方而已哉禪人勉之示東光夫達磨之始來也一槩斥相泯心不立文字義學窠臼徹底翻空彼義稍精而信力深者競大駭之遂誣祖為妖僧百計欲害之祖經六毒忍死而得可祖即順世而西歸矣夫義未精信力深必以佛語為垛根一旦聞斥相泯心不立文字之聲刺然入其耳則其驚駭而誣祖此自然之情也若義精而已得受用者則以為我祖何來之晚耶亦理之自然也若夫少疑而老信以至朝入暮出者此又矮人觀場隨聲悲歡者復何怪哉然相果應斥心果當泯文字果宜屏黜者如是則心外有法矣豫聞得心者有言曰若人識得心大地無寸土即此觀之則心之與相及語言文字果有乎哉果無乎哉蓋鼻祖意在奪情而不奪法也情奪而法存是法即鼻祖所傳之心也是故凡夫計諸法為有二乘計諸法為無外道計諸法亦有亦無非有非無皆情也非理也於是真常光中四謗之坑設矣倘不得祖東來彼張目而墮坑者豈少哉初祖果以心相語言文字必屏黜而後得心則楞伽跋陀羅寶經祖何未嘗釋卷且密以此經授可大師可授璨璨授信信授忍忍授曹溪大鑒鑒復精而深之其偈曰大圓鏡智性清淨平等性智心無病妙觀察智見非功成所作智同圓鏡五八六七果因轉但有名言無實性若於轉處不留情繁興永處那伽定蓋楞伽以八識二無我五法三自性轉識成智為宗彼不達此義者以為得心之後再無一事矣殊不知道可頓悟情須漸除而鼻祖所傳之心道也楞伽所謂轉識成智之法治情之具也倘聞道而不治情此果真聞道者乎此必魔外也我如來法中無有是事所以知鼻祖憂深慮遠既傳其心矣復密授此經為治情之具故自甘退屈之溺我慢貢高之刺不待扶植而強力拔而除也豫初亦不達法相以為達磨西來一字無豈有轉八識成四智之落索耶及閲六祖壇經知有此偈卒不大解存注久之則轉識成智之柄在豫而不在曹溪也蓋識雖有八能檢名審義義精而入神入神以致用者皆第六識之事也即七識雖號因中轉亦坐轉非行轉也豈五八獨坐轉耶所謂行轉者權在六識以此識三量俱通心所總攝故也又轉識成智轉心所而不轉心王如八識心所有五前五識具三十四心所第七識但十八心所耳獨第六識五十一心所備統而無遺也所以轉識之柄必在此識故此識熾然分別我我所法即緣生之前茅也熾然分別無我我所法即入無生之利器也又轉識成智根稍利者於逆境不難轉惟觸順境則受境轉而不能措手腳矣或根鈍者於逆境初不易轉如能𢬵命挨久轉得後觸順境轉之不難也若大利根人於逆順境緣如湯潑雪無往而不自得耳老龐曰日用事無別惟吾自偶諧頭頭非取舍處處勿張乖此便是大利根樣子也邇來黑白之徒器識浮淺成羣逐隊噇飽飯裹暖衣以為佛法雖有宗教之別不過如來與祖師發明衆生本有而已忽有人把住拶曰君本有果發明未發明耶即怒曰這箇魔王偏解無事生事則達磨所傳之心及楞伽治情之具豫知其必曰此亦駕空鑿虗耳我窺破久矣又何煩勘我哉果如是而五家綱宗之說彼聞而不信不亦宜乎四微合而地大成三微合而水大成二微合而火大成一微立而風大成四大合而世界成故得般若菩薩能碎世界而為微塵復能合微塵而為世界若屈伸一指了無異同之見異同之見不生則何往而非入法界之門故曰一念不生全體現六根才動被雲遮由是而觀則異同之見是六根才動之機非一念不生全體境界也但凡夫不了世界初本微塵合成及碎世界而為微塵又不了微塵初本世界碎成所以見世界便生一合相執見微塵便生多散相執成法界門終不能入如見世界而不生一合相執見微塵而不生多散相執則迎賓待客俯仰周旋喫飯穿衣屙屎放尿無往而非法界也若法界入法界法界見法界法界示法界法界悟法界總是名有多一而實無多一也如實有多一則多多一一者豈能多一哉若人有三歸而無五戒則因正而福不全有五戒而無三歸則有人天之福而無出世之因故異類有聞法之流人天有不信之黨惟三歸五戒全有者乃感人天身而諦信正法又有半歸半戒者所以有半疑半信之流此四者謂之四料簡凡歸依佛教者若未明四料簡此等衆生凡種福慧之因決不正當今汝等既各發心歸依佛法僧三寶及受根本五戒此非細故乃千生萬劫邪正之關頭偏圓之根本故不可不嚴審精察堪忍衆生之機苟不以聞思修三慧熏發之則其佛知見終不能開矣或謂德山臨濟之徒未聞其以聞思修三慧使人開佛知見也若其所用棒如雨點喝如雷霆使當機者於一念不生未入陰界之地神而明之而已若必以三慧熏發之而當機然後開佛知見者恐三慧於未入陰界之初無地可著耳此乃知其終而不知其始者也昔汾陽昭禪師有問鳥窠之侍者何以見鳥窠吹布毛而即大悟耶昭以偈應之曰侍者初心發勝緣尋師訪友為參禪鳥窠知是根機熟吹毛當下得心安如以汾陽此偈觀之則此侍者於多劫之中不以百千諸佛所藉聞思修三慧熏發之久未必一吹布毛而狂心頓歇也且久則熟熟則化於將化之時乘其化而發之譬如箭鋒相值豈巧力之所能預哉夫巧力不能預之地不惟聞思修無所著處即雲門乾屎橛與圓通死猫頭亦無著處也豫故曰彼知其終而未知其始者也如知之則不疑臨濟德山之棒喝與夫聞思修三慧有所相懸者也又聞而不思亦有開佛知見者此神而明之者也非思而明之也蓋思而明之屬比量聞而明之屬現量又現量之聞非心聞也乃神聞耳然初心有神聞而明之者乃百千萬人中亦不多得也惟以三慧熏發之者則百千萬中多多愈善也故法華曰若人稱六十二億恆河沙菩薩名號不若稱觀世音菩薩一人之名號謂是故也又達耳謂之聞注心謂之思思明而能力行之謂之修豫願吾曹聞而能思聞則有終也思而能修修而能入則二者皆有終矣反是則聞思修三慧雖我觀世音菩薩終日夜逐一耳提面命亦何益之有哉如以臨濟德山之大機大用混我聞思修三慧此所謂自不能始而責人於終者也此非狂而喪心豈有如是之妄人乎若以身受戒身乃四大成四大有歸復則受戒者誰若以心受戒心乃四蘊成三陰本受來受從前塵有前塵達本空則受曾無得受既不可得彼三成兔角諦推心受戒如石女生子若以合而受身心既不立將何為物合吾以是知以身心受戒者不得戒本戒本不得終難永持何以故非性戒故性戒須貴悟明非藉相受汝既受吾戒吾戒即性戒性戒為諸戒中王大經論中廣明斯旨梵網經中亦貴明此但季世比丘皆為魔氣所熏痛諱舉此吾雖不敏以力任是事常以此獲謗流俗逆思達磨六毒南嶽思八九毒況余小子以道以德較彼二祖何啻天淵敢不消歸自己乎聖人以為書不盡言言不盡意故設象以寓其意使學者玩象積久智訖情枯意得而象忘則書與言不能盡者我得之矣一得永得千古無疑死生迭更是非交錯而我所得者光潔堅固了無污染損壞也所謂象者如龍象乾馬象坤如大鵬象止觀如童男童女表真諦如長者優婆夷表俗諦故表即象也象即表也象則託物寓意表則借事顯理故意得則無象非意理顯則無事非理無象非意我不欲忘象而象自忘無事非理我無心會理而理自冥象忘則意難獨存理冥豈事能礙者乎夫事不能礙理則觀精而止深觀精而止深則意不存而象無待無待則無外所以天地雖大萬物雖衆虗空雖無邊畔然皆不能逃我無外之用者也是故我欲天地萬物作虗空我欲虗空作天地萬物譬如一指屈信我欲信即信我欲屈即屈我欲不屈不信即不屈不信我欲即信即屈即屈即信而信屈不相遇信屈即不相遇至於千變萬化卷虗空入萬物粉萬物為虗空如己指屈信初無難也而衆人執虗空無形執天地萬物有形所以有形者不能作無形無形者不能作有形苟能於無形有形之執以觀精察察此執情為從自生為從他生若謂自生則非他不自若謂他生則非自不他非他不自則自無自體非自不他則他無他體自他之體各各觀察察精理開理開情釋情釋執空執空心淨心淨用圓所以我欲有形則虗空受役我欲無形則有形奉命推其所以然之說始因觀而入止終則即止而用觀因觀而入止功在玩象而得意即止用觀功在意忘而象無待故也故學者有志於道則止之與觀苟不精研玩象則意不得意不得則象不忘象不忘則意在意在則止不深止不深則不能即萬化而寂寥此意甚遠非身心可到惟即身心而忘身心者似可倣佛示學者精研止觀夫衆生執受皆本無常但隨所觀時復現行故以八萬四千毛孔觀一身則一身執受直下𪹼落以一身觀八萬四千毛孔則八萬四千毛孔執受亦當處銷融此就正報而觀也若以衆多微塵觀三千大千世界則三千大千世界執受亦𪹼落無存以三千大千世界觀衆多微塵則衆多微塵執受亦銷融無得此就依報而觀也若以法界緣起而觀依正二報則依正二報皆稱法界性而交徹冲虗所謂依正執受與夫根本無明皆即大智大則無外智則常靈無外則無我常靈則隨宜故毗盧遮那如來順本垂教為三塗衆生而說人天乘為人天而說聲聞乘為聲聞而說緣覺乘為緣覺而說菩薩乘菩薩乘性本無生智願無盡然非無所依者也唯華嚴大經直轉根本法輪凡有所依倚者皆圓攝頓融總入法界令其徹底無依動寂任智不落情量即於生死煩惱海中稱性治染染盡淨除聖凡坐斷文殊為牛普賢作馬大行常然事事無礙而後已此名佛知見此名最上乘此名塗毒鼓此名金剛子耳其聲則命根立斷吞入腹直至毗盧而屙出即此觀之善觀依正二報者則執受皆智而不善觀者則本智皆執受耳豫讀天闕山人棗柏論約語及山人題約語後語乃知山人以天台匡廬竹林方廣譬毗盧境界以人間世譬衆生境界山人以為毗盧境界與衆生境界初無常規苟達緣起無性則染淨無非智光以此智光洞照法界則法界初亦無性豈但緣起無性而已然達緣起無性則入事不成就三昧達法界無性則入理不成就三昧唯圓達二性無性則事理不成就三昧如月在秋水春在花枝豈待眼孔定動然後見哉賢哉山人其知此者乎讀天闕山人棗柏論凡見心外有法者皆謂之外塵邪執如聞佛說法不悟佛意亦外塵邪執也況餘聲色乎然凡夫發菩提心初不以外塵邪執為弄引則意言之境無由得入意言之境不入則唯識與法界皆無入路矣又凡夫被外塵所轉了不知塵本無體自心所變反執塵為實有塵復生心則遍計熾然心復生塵則意言境起菩薩了知一切境界意言變起意言無體不出唯識唯識無體不出法界故以法界觀唯識唯識即法界也以唯識觀意言意言即唯識也以意言觀外塵邪執外塵邪執即意言也所以能物轉不為轉物耳如博陵王問牛頭融曰境緣色發時不言緣色起云何得知緣乃欲息其起博陵以謂意言之境緣前五塵起不言我緣前塵起前塵亦不言我能發意言之境不言即不知也謂有知則能言無知則不能言故能所皆無知無知則無我無我即無自性也能所既皆無自性則境與色孰為能緣孰為所緣此非緣生即無生乎緣生既即無生又教誰知緣必欲令其息耶故牛頭即躡博陵意緒答曰境色初發時此即緣生也色境二性空此即無生也本無知緣者心量與知同能所本皆無生教誰知緣既無知緣者則心與量與知皆無生也蓋不照本則能所摐然照本則根塵寂滅故曰照本發非發爾時起自息抱暗生覺緣心時緣不逐謂覺因暗生覺生暗謝暗謝覺湛心無所緣所緣既無湛亦無寄未生前本無色心養育惟廓然無念凡色心養育想受皆言念生生實無生故曰起發未曾起是時不惟衆生無地佛亦難泊此蓋以理折情融事為理也飄風不終朝驟雨不終日飄風驟雨天地為之尚不能保其終且久況天地之下者乎然天地之道未窮而密變故萬物雖處乎變化之域而萬物不知也如一歲之道冬未窮而變春春未窮而變夏夏未窮而變秋秋未窮而變冬冬終也終窮也昔人有海日生殘夜江春入舊年之句此亦未窮而知變者也如一身之道生未窮而變少少未窮而變壯壯未窮而變老老未窮而知死知死則死不能窮我矣死不能窮我則生豈能悅我哉夫死既不能窮生亦不能悅而我以生死為舟航遊於禍福之海適當飄風驟雨之驚是能驚衆人耳焉能驚我乎夫三皇以道化天下道未窮而變德五帝以德治天下德未窮而變仁義三王以仁義治天下而不知變故窮於仁義也仁義窮則五伯乘其隙而以智力劫天下有不可言者矣是故有身有家國者不知此則身不能修家不能齊國能不治也然未窮而知變者其惟聖人乎夫幽明之故鬼神之說死生之道皆變後事也而世人輒懵然如滇之民談含元殿裡事至於鬼神尤深疑之顧第弗究心耳誠由鬼神以究極於性情由性情以究極於魂魄夫既究極於魂魄知以理治情之為魂恣情滅性而成魄則幽明死生一切瞭然矣雖然死生本乎有身幽明鬼神本乎有心衆人惟昧其本故莫烈於生死亦安焉玩之以苦為樂是以大覺老人哀而拯之教以四大推身四蘊推心推之既久身窮心了則身本無身心本無心無身之身則大苦永超無心之心則靡幽不燭故龍勝於此又特地一槌其偈曰若使先有生後有老死者不老死有生生不有老死誠如其言則是窮身四合之後覔心四蘊之先猶若環輪孰為終始其於毗舍浮佛可謂各夢同牀而所謂幽明鬼神死生皆作廣長舌相矣今此偈總二十八字前半偈中有箇入頭便能於好惡交加之際是非逆順之場心心無間痛念無生無生習熟緣生漸疏易粗為精身心不能籠合下見大自在覺矣夫雲有聚散水有升沈日月交遷時序代謝好惡相凌興廢相禪千態萬狀變化無端究其所以然之說則彼種種奇特變幻神智莫測者不異夢中所見推夢之所自則由晝想所成推晝想之所自則耳目無待聲色無根所謂當處出生隨處滅盡聖人豈欺我哉乃衆人聞生則喜聞死則悲又有失常者聞死則喜聞生則悲是皆蔽於情未達於理故也至人設教難以盡同達本忘情則千途一致余讀龍勝大士死生偈頓見周易原始反終之旨偈曰若使先有生後有老死者不老死有生生不有老死若使有老死而後有生者是則為無因不生有老死偈旨皎如日星不待窮搜竭思然使衆人道其所以然往往瞪目如見父諱推其所蔽特不能原始反終耳苟能之則知始不本於終始何所始終不本與始終何所終始何所始未嘗始始也終何所終未嘗終終也始終不惑則喜怒好惡吉凶禍福死生成敗果有所以然者為之耶果無所以然者為之耶至是則所稱極天下之難明者譬如明鏡湛水見我鬚眉又何蔽耶夫無欲則無生無生則不煩所資故有生必有所自資生亦有所本是以孝親忠君之途闢矣如達身為患資為患媒而以四大觀身則患本可拔也苟拔患本資生奚藉以是之故親雖至慈君雖至嚴皆謝而不顧慈始弘焉嚴始重焉雖然情為化母羣有皆子能即子得母即母而得母之父則弘慈重嚴亦非反常之道也夫至愚之人使其蹈湯火則畏燒煮雖強驅之而不肯入五欲湯火燒煮衆生法身慧命非止一朝一夕而人甘心蹈之竟弗畏者豈其喪心病狂哉蓋計臭皮囊為淨器計無明心為命根不能以四大觀身四蘊觀心故也今人於眠臥之際枕子稍不安穩則不能睡必安之而後適死生於人亦大矣人皆公然自安略不為之計何哉逆究常光初無聖凡之地以其有覺無外自作夢緣緣實無從無待成待始乎三細終乎六粗粗細有常衆生豈有覺路常光不變昏動之機何生故曰起惟法起滅惟法滅起滅雖殊法本無二譬如泡生於水泡外無水水生於泡水外無泡又如風中鼓槖光裡揀明誰為能揀誰為所揀孰為內風孰為外風孰為是水孰為非水故名此法真不思議夫不思議者非不可思議以不思議之外別無法思議不思議故然一切衆生善思不思議法者即能一塵入正受諸塵三昧起故曰非不思議也由是觀之凡作佛事以無利之利為利利莫大焉以有利之利為利利莫微渺何以故無利之利稱性而發有利之利因情而施稱性而發妙契無生因情而施醉夢緣生妙契無生雖微細之施福等虗空醉夢緣生總施國城妻子得益甚小良以無生則無待緣生則有住無待則無外有住則有所無外則更無有能壞無外者有所則有能若壞其所能亦隨壞故住色生心者終受色壞不住色生心者色不能劫然無壞之妙可以神會難以事求有住之情可以圖度易以算料昔有一僧造大銅鍾若干斤出門偶值貧婆問僧何往僧曰乞銅造鍾去貧婆信手施破錢一文僧強受而嫌其薄即投之寺河既而僧乞銅數滿鍾鑄七火而當鍾要處即有一孔僧怒曰我鑄鍾心亦誠矣七火而鍾孔生如再鑄而孔不滿我必投身洋銅與之俱化亦甘心焉時有異人曉僧曰鍾不圓滿無他故以公昧却最初檀越信心之施故也僧熟思良久曰我知之矣我初乞銅值貧婆施錢一文時我嫌微投之寺河於是遂斷河吸水水涸得破錢擲向所鑄七火銅內一火而鍾圓矣悲哉無心之施則與不思議合刻畫而捨則與無明為前茅比徑山刻大藏有計利而不計法者則以為與和尚刻莫若自刻費少而易成且得我利者皆我眷屬僮僕有計法而不計利者則以為我但施錢與和尚刻藏渠真實為我刻經我將無作有必所甘焉且佛語無妄我必賴刻藏因緣借緣生而植無生之因終當出苦顧不偉哉或謂計利者不若計法者達觀道人則不然計法固勝於計利者然皆出有心豈若貧婆聞僧乞錢之聲未竟信手將一破錢施與謂之有心貧婆初不作較量功德多少念謂之無心則木偶人不解布施靈山會上我大覺老人拈花示衆惟飲光破顏微笑達觀道人向無公道處作公道斷以為貧婆與頭陀當并案結欵如是則計法計利者自知負墮也金湯大法不越乎折攝二門折則佛祖猶有所訶斥況其他哉惟攝一門網羅怯弱之機盡矣雖然若未得佛祖之心則佛祖亦不易罵如德山以大藏為拭瘡紙布裩和尚以文殊普賢置裩當之間不聞諸方具眼尊宿訶之者脫未得佛祖之心孰同肯首邇來大人不現魔外充斥無論黑白微有知解便謂已了於古德機緣之中綱宗不別明暗猶豫得為虗名甘昧自心強橫批判逞一時之情結長劫之業此所謂因地不真果招迂曲譬如紙花終難結果吾知其這點虗名終須亦自打潑了不若自附怯弱隊裡雖未得佛祖心且信佛祖語精嚴奉行敢保萬無一失如未能爬莫學走多少穩當𭺗未能而強走吾知其墮坑落塹終有日在黃龍心始了此事故其筆頭三昧生殺縱橫折攝自在貪之與瞋固俱是毒然莫若癡之毒尤甚夫何故吾心不癡則貪與瞋無所從起及貪瞋既起癡而不覺貪則如海吞流嗔則如火燒山造無量黑業受苦長劫難以芥石喻之既究苦之所以然則離癡無貪與嗔苦自何來然癡生由乎不覺不覺復由乎覺覺既本覺緣何生癡耶以其覺外無覺能覺本覺故本覺亦不能自覺本覺若能自覺謂之始覺則可謂之本覺則覺外有覺矣而本覺之義安在哉以此觀之唯本覺不能自覺所以癡生癡生起貪與瞋而貪瞋之極苦報必酷酷則難堪難堪必究苦毒之所自來始了知貪之與瞋初本乎癡癡復本乎本覺本覺則無所本本無中邊安有內外靈然而無我無我則誰受其毒靈然則癡本自無既悟此理以理治情情窮復本本復而哀諸未復者乃乘智願之輪究轉一切碾斷癡根同登無上然後乃快此聖人之心也故曰淨法界身本無出沒大悲願力示現受生夫念息塵忘故忘而無功塵忘念息故息而無力無功無力故道成無作無作之作違順解脫違順解脫根塵熾然而無待以熾然故則淨佛國土成就衆生故一針一線之施功雖細而不昧以無待故故細而不昧之功功齊等空之福即此觀之能所未忘則根塵乃鬼獄之師根境脫落則能所乃無生之導何以故稱性而修我不欲忘而能所自忘因情著力我欲忘而根塵愈結所以得其旨也熱惱凡夫不異道中之聖失其旨也離欲聖者取笑道前之輩是故有志於出世者必先知而後行則功不虗棄不知而行雖舍身命等恆河沙數終成業苦者也即用而酬數外無知故離數無知離知無數數未嘗數故何數非知知未嘗知故何知非數如是了知自然能所不立而用不昧故曰即用而酬初無聖凡用處無疑雖涉死生好惡之場知本不纍纍則非用也故宗門貴用處不昧不昧即照到耳約教而酬雖等覺亦有所知愚兩種不能破盡至妙覺則無愚可破矣此論說到不拘用到也若伶利作家待渠問時伸一指反問渠知此指否彼曰知則曰識得一萬事畢更問甚齊頭數不齊頭數渠若不薦我且出身去也右紫柏老人說老婆禪誑嚇禪雛不知是甚麼心行疑則參取法無可喻法若可喻法亦喻也惟聖人知法不可喻而種種喻之者不過一時方便耳若喻以空空雖無際而不能出生一切若喻以地地雖能出生而有邊畔若喻以水水雖融通而有枯竭若喻以風風雖鼓舞萬物而有息滅若喻以火火雖明能破暗不可攖觸觸而附物則生離物即滅若喻以樹樹雖能種種花果而離地則根無所托若喻以蓮花雖花果同時而離水不有若喻以薝蔔薝蔔雖香秋風忽生香亦隨盡若喻以摩牟夜光兩者雖蓋世奇寶而不若法之虗徹靈通也至於喻以龍喻以師子喻以大人喻以王喻父喻母喻大喻小喻長喻廣喻方喻圓喻曲喻直喻動喻靜喻屈喻伸喻待喻無待要而言之百喻千喻法不可喻也余故曰喻者聖人一時應物之方便耳是以執喻而難法不知法者也夫根之與塵初非兩物衆人不了橫計成迷如以慧眼觀之見雖非樹離見無樹樹雖非見離樹無見以離見無樹故樹有而非存以離樹無見故見有而無我樹有非存雖萬象縱橫而無物當情見有無我即熾然分別而無我當物根之與塵往復觀察兩無所當而衆人於兩無所當之場境分好醜心存愛憎萬死不知得非開眼作夢者哉夫淫習不難克難在知淫之所以然所以然明則能尋流而得源矣流譬心也水喻性也水本靜而流動能了動外無靜則心可以復性也心既可以復性率性而治習猶殘雪撲紅爐之焰習豈能久停者哉雖然復性不易苟非達心無體全性為心其孰能之夫惡無大小善無淺深而有心為之則罪大功微何哉良以無知為惡雖有丘山之罪而君子察其無知猶乃恕之故物莫不善於有心有心為善則有執有執則有邊際唯無心為善者始福等虗空耳由是而觀有心為善尚不可況有心為惡乎易戒有心老亦戒有心然觀其象而察其爻亦未始無心也老亦不敢為天下先而不敢者寧非有心乎故有心無心唯聖人善用之無入而不可也自非聖人不唯有心有過即無心亦未嘗無過若然者則初心之人如何作功能辨此者可以讀易老豫受性疏放懶於拘檢雖為比丘忽略繩墨本圖有益乃反致損如內典之於外書滿字之於半字凡百安置必有倫次以不知故每犯顛錯及閲大藏經始痛悔而改之永不敢以外書加於內典之上以半字越於滿字之先何者經云不辨半滿忽略內外凡所生處於般若種永不清楚及遭面貌不端嚴報萬歷壬辰於龍泉寺燈下偶見案上衆書堆疊不辨內外甚驚怖之夫苟欲拔苦非般若為迅航迷津曷渡非智慧為燈燭重昏寧曉故有志求無上菩提者脫般若種子不清如蒸沙為飯縱經纍劫即名熱沙終不成飯因書此以自警云迦旃延有慧辨善說法要於大衆中以解行稱第一常宴坐樹下有外道問曰以我觀世人但有此世更無他世可得然乎迦旃延曰今此日月為天為人為此世為他世耶若無他世則無日月矣外道俯首如是轉折幾十而外道情枯智訖遂歸依之或者問佛迦旃延富樓那皆有慧辨何故佛曰渠二人多生修無我觀故曰修無我觀何以得慧辨佛曰汝不見鐘鼓乎本無心念而隨扣隨應以其內本空故也問者始解念佛求生淨土之義義在平生持念至於臨命終時一心不亂但知娑婆是極苦之場淨土是極樂之地譬如魚鳥身在籠檻之內心飛籠檻之外念佛人以娑婆為籠檻以淨土為空水厭慕純熟故捨命時心中娑婆之欲了無芥許所以無論其罪業之輕重直往無疑耳倘平生念佛雖久及至捨命娑婆欲習不忘淨土觀想不一如此等人亦謂念佛可以帶業往生淨土以義裁之往生必難故廬山先造法性論次開白蓮社非無以也蓋法性不明則情關不破情關不破則身心執受終不能消釋以執受未消釋故於飲食男女之欲根斷不能拔所以口念彌陀神馳欲境如先以破身心之方教之漸習而熟則能了知身與心皆非吾有此解若成則身心執受雖未頓破然較之常人高明遠矣破身心之方莫若毗舍浮佛傳心前半偈最為捷要或先持千萬過五百萬過三百萬過持數完滿徐為持偈者開解之自然身心橫計便大輕了此計既輕即以持偈之心持阿彌陀佛專想西方至捨命時則娑婆欲念不待著力然後始空何以故乘解專想故古德曰先了身心非有此智既開專心念佛求生淨土九人念佛我敢保他無一人不生淨土者此義亦本廬山先造法性論開衆生知解次建白蓮社成衆生之行而來也豫聞觀世音菩薩初因古觀音佛而發心曰我若成佛等觀音如來以聞思修三慧自入教他入由聞而思由思而精由精而遺聞聞遺則所忘所忘則聞盡以如是三昧熏以悲智治往劫之染習陶鑄衆生之黑業一切衆中亦如我等此願不成誓不成佛然於六根之中菩薩惟用耳根開圓通之門者其本願應娑婆之機又此以音聞為教體所以餘方諸大菩薩數等微塵非有慚德迦文揀而退之而獨進觀世音者以諸大菩薩應當餘方惟觀音大士獨當應此方故也即此觀之則感應之道若針芥函蓋毫釐有差便不恰好矣雖神通智巧於恰好中莫能作小方便如方便可作則諸大菩薩豈無神通智巧哉豫少時似與觀世音有大因緣不然豫初不知大悲菩薩為何神豫將祝髮忽生變心自思曰我不祝髮亦可修行何必祝之須頭光然後能修哉衆助緣者聞豫言皆為之變色率多不樂時豫偶睡睡中見一老僧立於東南空中遙指西南一無所言豫因指掉頭則見西南有一舟滿載黑白異口同音念南無阿彌陀佛佛聲入耳五內清涼悅豫難狀急走欲登其舟然竟不及而夢醒謂助緣者言夢中之異僉曰公既發心祝髮中道而輒變公與觀世音菩薩有大因緣菩薩因現比丘身而為公說法豫曰了無一言但手指而已何曾說法衆中有曰菩薩以指為舌說法已竟公自不解耳豫聞此音而祝髮之心始判然無惑既祝髮之後以豫多生習染兼受性精悍雖為比丘於如來繩墨之度不無忽略此豈獨自心了了亦難逃大悲他心道眼之所照燭也嗚呼豫祝髮將三十餘年於萬歷戊戌三月初二日停舟於襄河之岸適有二三鄰船皆進武當香者自暮達旦焚香誦經似若不輟且皆異口同音呼南無無量壽佛聲入睡耳豫不覺寸衷刺然此我三十年前將祝髮時所夢之境也又觀世音菩薩乃阿彌陀佛輔弼之臣今彼衆朝玄武而稱無量壽佛者則玄武即觀世音之化身應此方之機未可知也又是夜豫合眼頃夢一僧持三軸像設欲豫觀看及展而視之則呂純陽與觀世音菩薩像也絹皆新筆氣亦新非妙手不能寫豫意得古者始妙此僧曰我有古觀音一幅汝可供養豫即展視之果絹舊像亦似舊且有一童子喃喃而謂豫曰此菩薩靈感異常當受之豫夢醒追感往曾朝武當中道大病至襄陽病愈甚偕行者僉曰子不能上山矣豫強起露坐忽有清風一觸頭面頓覺病稍愈胸次亦暢然因而偕衆上山惟行路時了然無病及至旅邸則病復重衆曰於此且止俟病好再上山未晚也豫聞而不然明日復強起至好漢坡則病全愈矣於是進黃金殿禮玄帝聖容且私感謝帝之靈祐使我大病頓瘳還至淨樂宮對帝像立誓曰我若不祝髮為僧學無上道則長劫當墮阿鼻地獄異哉臨祝髮則觀音現比丘身而度我朝武當則觀音現玄帝身而靈祐我愧豫小子業重垢深天機魯鈍道不勝習識不知微忝為比丘三十餘年大悲重恩君親厚德皆未能酬纖毫於萬一而菩薩猶孩而不舍復於夢現比丘身授菩薩像於小子小子夢醒而痛感乃忘其鄙陋序祝髮之顛末始始終終若一鏡現三世去來之像絲毫無昧亦欲世之人知玄帝實大悲之化身也且見小子發心之因實亦帝之所發起也然圓淨陳居士之德助我猶不淺者我若得道首先以菩薩聞思修三昧度之則觀音之照燭乃無愧焉
