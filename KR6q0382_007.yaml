body:
  text: 明憨山德清閲法語地水火風空見識與覺聞知名為十大究其所自則十大不離阿賴耶識而有也阿賴耶此言含藏蓋此識能含藏覺義不覺義與見相二分若地水火風空五大乃因此識相分而建立也見識覺聞知五大亦因此識見分而建立也又此識本自無體體本不動智而有也何以故以不動智智本無性無性之義古今難明此義唯棗柏大士於華嚴論發泄殆盡矣然學者心識粗浮論雖曾閲了知此義者不殊麟角焉豫雖不敏試且解之蓋此智智外無智了知此智有性無性又智不知智有性無性於此不了即名無明無明即屬生滅無明無性即屬不生滅以生滅與不生滅似一非一似二非二此二和合而成阿賴耶識此識覺義即屬不生滅氣分攝此識不覺義即屬生滅氣分攝又覺與不覺初無別故以本智無待無外故要須本智隨緣於緣生中樂極苦生苦極思本思極心開方始知我此極苦本極樂來極樂本有待來有待則物我亢然相搖而成苦樂今我悟有待初本無待於無待中求樂尚不可得安得有苦回觀物我相搖之夢譬如醒中笑夢顛倒雖夢熟餘習未能頓除以我所悟無待無物無我廓然而靈者治夢餘習譬如春陽之照殘雪雪豈能久留哉即此觀之八識不覺義具於待先故曰本淨本不覺由茲妄念起此識覺義開於有待之中故曰能迷非所迷安得常相似既不相似則不免樂極苦生苦極方求出苦之智出苦智入直下了知有待如氷無待如水雖質礙融通似不相即而離水無氷離氷無水故氷現前時水無涓滴水現前時氷無毫毛自是以此了知周旋五位盤根錯節置身心於死生禍福之中𢬵性命於逆順境風之際橫磨豎煉豎煉橫磨磨煉既久行不負知身心𪹼落生死門開乘悲智輪浮沈於十方三世展轉於三世十方若一闡提不乘此輪者我不得佛又此識見分第七識計而為內自我七識又為六識後半細相分之源故引滿二業雖隔生不昧也故六識頌曰引滿能招業力牽蓋七識為源耳若動身發語獨為最又此六識粗相分也若前五識皆八識相分相分即氣分也非相分之相分也此種種識妙達法界緣起無性俱不動智也雖然先起信發心難證發心易蓋先起信發心貴在緣知證發心但在現知故也吾嘗因照鏡見己之影吾作何狀影亦作何狀既而究能作吾狀者畢竟是何物吾瞋狀即瞋吾喜狀即喜始求之於六根再求之於九竅至於五臟六腑八萬四千毛孔長求短求內求外求精粗皆狀惟能狀狀者具六根九竅於遍身毛孔根有根虗竅有竅虗毛孔有毛孔之虗狀即是色虗即是空若能狀狀者屬於空色便與空色為一則空色不知空色何以故一不知一故也一若知一一是所知知即是能此成二矣一義何在吾種種求能狀狀者始悟其初不屬空色耳渠既不屬空色豈可以內外古今遠近求之哉雖然能求之能若不廓落則此能雖精於空色而實粗於能求之前者故曰若以知知寂此非無緣知若以自知知亦非無緣知亦不知知寂亦不自知知即此觀之則能求之前者斷不可以智識窮功力到惟契無生者自知也昔有一僧平生為常住務擔閣了修行一日鬼使催捕僧曰煩鬼使奏聞閻羅乞假七日修行雖死無恨鬼使曰奏淮則七日後來不準即至矣僧修行七日後鬼使復來勾當前案則覓僧不可得矣噫死生亦大矣此僧七日精進雖酷烈如閻羅王尚奈何伊不得況陰陽造物能陶鑄耶汝等既發心持偈若精進之心不如此僧決斷縱持七百日無益也中印聖人其名曰佛其所設教凡攝衆人必先三歸然後授與五戒三歸者謂歸佛法僧是也五戒者即不殺不盜不邪淫不妄語不飲酒是也其意以為不歸佛則出世無主不歸法則開悟無門不歸僧則教授無師故三者闕一不可如三歸雖備若不嚴持五戒則樹德無基不殺即孔之仁不盜即孔之義不邪淫即孔之禮不妄語即孔之信不飲酒即孔之智此五者凡學出世法者既授之後無有破犯則謂之優婆塞蓋有實然後有名也又歸依佛佛者覺也歸依法法者範也歸依僧僧者和也覺而不範如但知土可以為器若不經模則器終不成如範而不和如有模而不解調治則器成不美是故世出世法聖人設教不同然三歸與三綱五戒與五常初無別也近世有等妄庸之徒假佛門為逋逃之藪其初入門既非真心則既入之後靡所不為一旦惡滿事敗陷於王難波及無過之僧及真心齋戒者上之人又不察其真偽凡見髠其首者即謂之僧殊不知首髠而非僧者衆矣故執政者又不可不精辨其真偽也倘一忽之則銜冤者雖百千萬世終不免雪之然後其冤始解耳汝既歸依佛法僧三寶又從性天老師授持五戒若不知好惡少有破犯則韋馱尊天現在戮害汝身死後復誅汝神此真實語情不敢私私則在上在下罪不容赦示禪人三皈五戒毗盧遮那佛此言光明遍照一切處吾於此未嘗不痛心也何故既言光明遍照一切處則凡血氣之屬屙屎放尿一動一靜無一剎那頃不在此光之中如何十惡熏之則地獄相現乃至緣因佛性熏之則現如來之身且道現地獄相時如來之身畢竟在恁麼處現紫金聚時地獄相何在於此揀得出見得透則雖蚤虱臭蟲螻蟻之屬其威神光明不讓毗盧遮那如來一毛頭許今若虗發大誓願轉根本法輪於一微塵中此一微塵如可剖破塵無頭腦如不可剖則根本法輪轉亦未易大凡學出世法先要洞明自心然後昭廓心境窮內外典籍而大其波瀾則化風自遠矣人天自嚮矣然欲洞明自心貴在情死蓋情不死性不活則於博地凡夫欲其直下轉識成智心徑圓通安有是處吾與汝先授五根本戒者亦願汝根門潔白攀緣自斷情亦漸死耳設情不死夾帶修行謂之野干種何哉以其自生至死若靜若動若穢若潔若精進若懶墮無非情故故曰萬物浮沈於生死者情為其纍焉且道情死一句子又作麼生舉揚是佛是魔皆蠱毒非魔非佛總冤讐直饒棒下番身漢未入黎奴白牯流古德曰若人識得心大地無寸土我則曰若人識得大地身心不可得顧朗驅烏曰古德説得是我説得是汝莫瞞心試説看朗曰皆説得是又問朗曰汝曾讀楞嚴經不曰讀曰汝讀楞嚴經記得佛告阿難我常説言汝身汝心皆是妙明真精妙心中所現物云何汝等迷失本妙圓妙明心寶明妙性聚緣內搖趣外奔逸昏擾擾相以為心性一迷為心決定惑為色身之內不知色身外洎山河虗空大地咸是妙明真心中物譬如澄清百千大海棄之唯認一浮漚體目為全潮窮盡瀛渤朗曰記得曰汝再試説看我與佛及大德三樣説畢竟那箇説得好朗曰檢別不得曰汝這儱侗蠓蟲作這個解管取他生異世改頭換面償他信施始得何以故只解順水推船不能逆風把舵故故曰若能轉物即同如來如佛解祖解與極玄極妙古德謂之閨閣中物如打疊不淨早晚上床下地終不免礙人腳手在示正朗稜稜鴈塔標雲外混混龍泉續洞宗二檜芬芳五燈圓照此等家聲寂寥久矣皮毬道人每念及此未始不痛心扼腕冀大振祖道且嘗慕申包胥為人彼覆我存赤心耿耿無須臾斷蓋疾惡習重來自多生或謂佛祖聖賢盡虗空為量遍法界垂慈何示人不廣乃爾道人笑而應之曰若豈不聞生處要熟熟處要生夫疾惡不重即向善不真向善不真則觸境逢緣利害相關處腳跟便立不定故五持與五犯當知犯持之際申包胥哭秦庭光景若不現前決定敗績矣人天小善持志不真尚不能成就況出世無上菩提乎萬歷丙戌春皮毬道人由路南達燕山距都城八十里為古潭柘幽勝絶天下瓶錫因留之隆冬未已春風忽動千山暖回萬壑氷消則峨嵋之興油然而生諸檀越有相慕而不捨者躡迹重雲大開祖帳悲歌薦茗感慨竹風皮毬亦悵然囑曰若等果向善心真秉持初志堅克有終豈獨人天小果決定成就出世心燈定當續焰雖然不談六經安知王道不讀佛書豈知佛心柳宗元信不我欺或者聞言進曰靈光獨耀迥脫根塵體露真常不拘文字道人之言甚哉其膠柱鼓瑟也且言説害道障蔽自心有不可勝言者今之緇素不求之經而求之疏不求之疏而求之鈔不求之鈔而求之音義少林實宗風所繫比來委靡更不堪觀大都以祕要為直指以評唱為資托以頌古為過路以機緣為剩語是嘈嘈之徒號稱參禪者不求之機緣而求之頌古不求之頌古而求之評唱不求之評唱而求之祕要嗚呼語言之為害一至於此而道人復示人以語言文字豈非救火而油之也皮毬道人又笑而應之曰豈語言之為害哉特求之者不善耳三藏十二部千七百則葛藤皆佛祖深遠廣大之心參禪者求之於機緣習教者求之於佛語則語言文字乃入道之階梯破暗之燈燭今乃宗教陵遲祖道蕭瑟咎在棄本逐末重輕輕重如習教以佛經為本明宗以機緣為本弘闡宗教以道德為本以戒行輔之以學問大之視浮名為遊塵視金帛如糞土秉志堅貞憎愛關頭死生以之管取宗雷大震教雨滂沱昏者醒而稿者潤不爾躆法王之座披如來之衣傳我佛之言者所謂狐嘷耳焉足為法門輕重一時開侍者暨慧輪中光覺天浴慈田湛鎮潔明宗俱列祖帳之前共獻此茗受者進者皆非小緣人人當生悲感之心誓期出世無以富貴為懷決以道德為本學問資之自然此別之後有志者必遂若等不見潭柘之祖塔乎銘琅琅餘光烈烈使我讀之而殞淚拜之而毛骨寒彼其未得道前皆臭凡夫耳既得道已師範人天流芳千古如此之名名終不朽如此之功功蓋天地上之人天下之螻蟻皆受其恩澤較淮陰夷吾彼皆生死之因此乃無墜之本奇男子必以吾言為不謬且道萬里長途臨行一句作麼生雞園競秀春風暖柱杖橫擔日月行龍泉別衆示言無廣略義無淺深顧其人得旨行持何如耳是以善星比丘雖聰慧過人不特博通大藏亦無書不窺以心術不佳遂招生陷之報如摩訶比丘蛇奴乞士唯持摩訶般若一句苕二字尚記不全皆生身得果以其天資淳朴一念萬年神凝方寸用志不分所致也曇衡梅禪人一朝辭紫柏道人於清涼山中將由燕京而圖南乞一言以為資糧道人囑之曰若所持誦禪宗永嘉集言略義要此永嘉大師已驗之方依之行持必然出苦道人何言而禪人猶低首長跽不起復次囑之曰衆生日用無往而非昏動菩薩日用無往而非止觀諸佛日用無往而非定慧謂之三耶則外昏動本無止觀外止觀本無定慧謂之一耶則昏動不即止觀止觀不即定慧果一之耶果三之耶若於一三之間未能判然了徹豈唯永嘉集不能資汝出苦一大藏教亦皆長物矣何況非法又巖頭奯老一日有僧問曰起滅不停時如何奯老喝曰是誰起滅其僧得旨而退今時有一般野狐魔屬便道我會也起滅者是某甲本來佛性嗚呼哀哉如此妄會一人傳十十人傳百百人傳萬吹遍世間滅佛種族滿眼皆是禪人來前設於巖頭句下未能徹去且依永嘉大師此集行持終不誤汝勉之勉之夫鉢之為器翼三寶備六德何以明其翼三寶蓋微此則僧無所資僧無所資則慧命斷慧命斷則佛種滅矣彼其能清能容能儉能廣能尊能古則六德之謂也古由佛授尊由天獻廣則普利一切儉則過中不食容則施受精粗而福利平等清則舉世不忍以葷投之如是而吾曹敢不寶重哉嗚呼去佛日遠魔外充斥髠其顱而毀其容偽其僧而真其俗至於祖宗標格法道綱常破壞殆盡反以操瓢為便捷而安之若鉢則視為滯貨皆棄而不持矣既作佛子凡百所行須遵佛敕故特為提三輔而申六德使吾曹即名制器即器昭義得義崇古振頽波而回末俗斥偽衆而集真流共扶慈化并報佛恩茲囑萬佛菴陳寶林居士歸而制之或萬或千儘自心力承荷無忽此風一扇能克終始吾眉山轉麈當有可觀也示陳寶林離重雲而孤明獨露映湛水而素影全彰此等解會總是撥波尋水外塵覓地是以古人誚之諸方所示佛性皆半生半滅的老僧這裡方是全不生滅或者詰之則曰彼皆以色身有壞法身常存豈非半生半滅乎老僧這裡即臭肉團便是金剛不壞之身故與諸方不同據皮毬道人觀之則這老僧也未夢見金剛不壞身在且道如何是金剛不壞身咄日月升沈施大照舉眸休自昧清暉示顯光居士能急於收放心而不能知心之所在心果能收乎於此不能審究下落則心終不能知矣不先知其心而欲收之吾不知其所收者果有心可收耶無心可收耶吾以是知不先知心所在而能收之者盡世未有其方如雞犬既放之將欲收之不先知雞犬所在雖千呼萬呼終難收也大抵役名昧義之習不破而精義入神之路塞矣且心不可以有無求又豈可以內外推乎如我現前六尺之軀刺頭則頭知刺足則足知刺胸背則胸背知至於一身八萬四千毛孔設有八萬四千針一時刺之而一時皆知若離毛孔一紙之厚雖有千刺萬刺不知矣此知果是我心此心知周六尺而已六尺之外都無所知若然者離身無知之義明矣倘此身一朝腐爛則此知果隨而腐耶果不隨而腐耶如隨而腐則身有相而可腐心本無相所以有無不能盡之豈果隨身而腐耶死既不隨身而腐豈未死但能周六尺餘無所知者以理折之終難大通昔人有言曰不惟真心不倚形而立即妄心亦難必其倚形而立何以故求之內外無所故豈有內外無所之物倚形而立哉吾以此又知收放心之要要在先悟妄心無體則所誘我者自不能為待也噫物我無歸誰為放者誰為收者收收放放放放收收於此豁然譬如牧牛而得其鼻繩矣牽之東臯亦可牽之南畝亦可牽久而純則不收不放亦可放放收收亦可二生既有志於學問不能此而能他得非惑乎又此既明儒亦可釋亦可老亦可如此不明儒非真儒老非真老佛豈真佛二生勉之示毛吳二生學道無他要要在偷心不生偷心不生則古德機緣言句中磕著撞著時以宿善根力大都悟入終易如偷心不死又無痛切精進之力復遭差別因緣阻亂之是皆多生惡習所致所謂偷心者不惟凡情即聖情不盡亦謂偷心汝忽觸病緣善用之即入道緣不善用即差別緣哀汝道緣多障附此勵汝示沈季玉夫寒往則暑來夜往則晝來開往則合來而寒往則暑來以一歲言之也夜往則晝來即一日言之也開往則合來就一瞬言之也衆人以一歲為長以一日為短以一瞬為短中之短也殊不知由瞬而日由日而歲由歲而成古今皆念後事也如一念不生前後際斷長短路窮則所謂歲之與日日之與瞬皆睡中語耳豈大覺之境哉是哉有大夢而後有大覺夫覺則不睡不睡則無夢而衆人眼睡於色耳睡於聲鼻睡香臭舌睡味身睡觸意睡法塵一睡永睡長劫不覺根塵抗然識搖其中開眼合眼雖有寤寐而實皆睡也惟達者覺由塵發知因根有相知初無知相本無相故抗然之根塵不待觀空而自泯故曰狂心頓歇即是菩提菩提此言覺也嗚呼本是一精明分成六和合積執成堅各各不化以睡為惺以苦為樂顛倒夢想苟不鳴以大覺之雷則睡者終不惺矣且惺也者待睡而稱未睡之初惺在何處謂惺在塵是塵非惺謂惺在根根既是惺孰為其根謂惺在惺惺不惺惺江生來前吾語汝推惺於三知惺所在則寒來暑往暑往寒來皆汝眼開合又喚誰為睡乎誰為惺乎雖然轉得睡者然後可使惺耳倘轉睡未能則惺使江生去也江生勉之示江生睡惺夫木具火性然不能自焚必須假鑽燧而煙始生然煙雖非火乃火之前茅也如鑽燧不休火必繼煙而至矣火則木盡成灰嗟乎木始由土而生終還於土此理勢然也衆生佛性木中火性也諸佛教典鑽燧之具也具有而不得其人則火終不發火發而木然衆生因佛教典熏發觀照之火焚五蘊木終歸性土此蓋即情而復性之譬也去佛世遠祖亦不出時劫轉濁故修行人最初立念雖為生死到頭敗闕者多大抵病在何處不在聲色貨利不在七情六欲只在當人一箇臭軀殼子打不破一點妄想心不透便被生死魔所役從無始來天身人身畜鬼之身羽毛鱗甲之身於苦海中改頭換面升沈無有暫止且道這生死魔及天畜等身人與之耶自招之耶總來不出一點攀緣心這點攀緣心看來無許大黃面老子因地中捨金論王頭不可勝數即至將證果時更受種種惡逆之境十生九死𢬵命挨排飢寒不顧利害不管但知此點攀緣心不了禍媒不淺務必透方了不知此點攀緣心是何物件非惟黃面老子併精著彩不顧危亡然後降伏得下自古及今豪傑不少扶王佐伯成功業於涕唾之間百世芳名血食未有能透此點攀緣心者既不透豈能降伏得下故般若會中須菩提人天衆前發個問端云何降伏其心云何應住為問住則且止畢竟此心如何降伏這點機關不在於佛不在於祖不在於知識法師可以傳授與你佛祖知識只好與你作箇傍敲助緣若要透此心悟徹了當譬如壯士屈臂惟在自己不假他力縱有大藏聖教亦不過是傍敲説話孟修若真要了此生死於此決當發一段𢬵身捨命的志氣此心不悟穿衣即是披毛皮吃飯即是吃尿屎要悟此心不知自責便被懈怠昏沈魔所蔽終不能到古人悟處如乾峰示衆云法身有三種病二種光一一透得方可説修行雲門出曰為什麼菴內人不知菴外事乾峰也只得呵呵大笑而已敢問孟修雲門話頭是何旨意乾峰笑處有何利害於此二老口角頭知些好惡所謂降伏其心辟如順風揚塵有何難哉於此放過不求了徹則前所謂苦海之中改頭換面升沈不止羽毛鱗甲請孟修一一從頭做將去石崖云三塗一報五千劫出得頭來是幾時示康孟修楞嚴會上佛告阿難一切衆生從無始來生死相續皆由不知常住真心性淨明體用諸妄想此想不真故有輪轉諸仁者此一段經有兩種血脈一是四聖血脈一是六凡血脈遮箇關頭辨析不真管取十人舉心動足五雙錯了常住真心性淨明體此便是四聖血脈此想不真故有輪轉此便是六凡血脈四聖者佛菩薩聲聞緣覺是也六凡者天修羅人傍生餓鬼地獄是也此十者又謂之十法界言法界者法則共合界則各別此皆總是衆生最初發心不等感果亦異若是箇大闡提漢子直下一念不生轉身就父大事因緣千了萬當舉箇佛字早是染污且道十法界者向恁處著落貧道此等説話也是鉢盂添柄嚼飯喂人噦心不少雖然未是箇闡提漢子也須循規蹈矩做來亦無大錯故末法修行者切須明此兩種血脈始有商量好惡分不然盡是説鬼話的人頭牛耳貧道與仁者聚首此地莫非前劫因緣非今情識諸仁者自今而去必當以四聖為血脈莫以六凡為眷屬要以四聖為血脈必要發四聖的心腸且道四聖的心腸如何發起一念剖析得空此聲聞血脈也即念體空此緣覺血脈也即念即空即空即念空念歷落此菩薩血脈也且道佛之血脈如何接得驢胎馬腹尋常事寶座蓮花有甚奇諸仁者一念析空方接聲聞血脈不知諸仁者逢緣遇境逆順關頭一念析得空否一念若空則心與空相應心既與空相應説恁麼軀殼子到此時節又喚恁麼作愛憎諸仁者此箇境界不過聲聞血脈尚愛憎超然何況緣覺菩薩佛耶貧道也有幾句間淡話聊與諸仁者解登山之勞衆生習氣卑劣但提著六凡血脈分上事即如膠如漆藹然莫之親而親之精神爽利言談有味如飲醇醪每提起四聖血脈分上事不是昏沈便是散亂方便勉強勸他多念一聲佛多拜一拜佛多看兩行經多奉事兩箇知識善友其精神不期倦怠而自倦怠方寸中又若芒刺便身覺不自在心覺不悅樂此無他不過出世心輕塵勞業重耳今諸仁者皆是傑然漢子豈尋常可比雖然自是而後法脈中宜各殷重莫因六根門頭憎愛影子傷了血脈源頭若不幸有此皆是人頭牛耳又何足道貧道説此語十方諸佛併殿上釋迦佛國山寺裏護法伽藍及三洲感應韋馱菩薩天眼遙見天耳遙聞他心證知諸仁者不是等間事若忽略了不惟現在遭大患苦向後地獄不免在且道一念未生地獄天堂是有是無有則墮增益謗無則墮損減謗亦有亦無非有非無總墮謗數此不管你張三李四照律問罪將去那管你承當不承當若要出此謗類須會得水急偏留月山高不礙雲示丁南羽繆仲純吳康虞于中甫豫章黃山谷嘗嘆息學者鶩流忽源故以機緣則驚奇而趨之曰諸祖西來意舍此無從入矣以七佛偈則忽略而不究殊不知舍七佛偈則禪無源矣禪之流又惡自來哉七佛偈似可以義解諸祖機緣似難乎義解以為義可解者終不能超情識義不可解者非情識可入參而悟之則一悟永悟始千了百當耳是不知七佛偈亦有義解不得入處諸祖機緣亦有可以義解者大槩學禪之法法本無定譬如大將用兵有時以正勝敵有時以奇勝敵有時以奇正兼用勝敵有時奇正俱不用勝敵而學者必謂西來意在諸祖機緣而不在七佛偈何異用兵者必謂奇可勝敵而正不可勝敵得非癡乎若七佛偈學者果能精而究之方知禪不外偈矣於諸祖機緣參而不悟則恐又不若持偈矣千經萬論別無一事不過説離身心耳如學者身心執受之障不能離於七佛偈祖機緣不能悟入總謂之葉公畫龍倘真龍現前吾知其必投筆怖走矣故吾勸出家在家有志於斷生死割煩惱者於毗舍浮佛偈能信持之持久熏熟則身心執受之障終有消釋時在又身執受消時涅槃現前心執受消時菩提現前此二者教中謂之二轉依果蓋轉生死而依涅槃轉煩惱而依菩提也噫生死既轉而成涅槃煩惱既轉而成菩提到此時節則我更有何事我既無事可乘悲智輪運彼一切有事者都還無事之鄉此不惟山谷居士之願亦諸佛菩薩之本願也又老氏曰吾有大患為吾有身及吾無身吾有何患又曰介然有知行於大道唯施是畏又顏子心齊坐忘則曰墮肢體黜聰明墮肢體得非老氏以身為患之意黜聰明得非老氏以心為畏之意哉三教聖人皆教衆生説離身心寧唯釋氏乎毗舍浮佛此言自在覺蓋身心未離則何往非礙身心一離則何往非自在歟七佛偈示衆恭聞過去諸佛諸菩薩現在諸佛諸菩薩未來諸佛諸菩薩皆以六種攝十方三世一切衆生無有遺漏未聞煉頂燒臂髮熏鼻眠針臥棘而能攝受衆生如妙法蓮華經有然臂焚身之説楞嚴有然指懺罪之條法華則以象寓意意得而象忘實不在然臂燒身也楞嚴然指實懺己罪非籍此以鼓惑愚夫愚婦者何名六攝一頓攝謂諸佛菩薩從初發心於一切衆生作父母想隨力所能直以一切樂事饒益而攝取之是名頓攝二增上攝增上猶增勝也謂諸佛菩薩既已發心若於父母起尊重心種種方便勸修善法隨時供養知恩報恩若於妻子眷屬教修善法令其勝進或諸佛菩薩化身為明王聖帝即攝受人民如法正化不加非罰以財以法而為饒益隨其力能教諸人民令修善法是名增上攝三取攝謂諸佛菩薩常以二種攝取衆生一者常以舍心以財饒益一切衆生令其離於貧窮二者常以慈悲心以法饒益一切衆生拔惡邪見教修正法是名取攝惡謂十惡身三口四意三是名十惡邪謂髮熏鼻眠針臥棘煉頂燒臂牛狗等戒是名邪見四久攝謂諸佛菩薩攝取衆生多歷時數久久教化乃得成熟是名久攝五不久攝謂諸佛菩薩攝取衆生教化不久即得成熟是名不久攝如善財龍女廣額屠兒是也六後攝謂諸佛菩薩於前五攝之後攝取衆生於此生內即能成熟是名後攝又名最後攝無論出家在家凡有志於出生死苦海者如上六攝應當一一查考明白依而行之自然佛知見藉此而開觀行藉此而成如不遵諸佛菩薩遺教所知所行直饒你舍恆河沙身命歷種種難行苦行皆為魔業何以故佛知見不開故佛行不成就故佛之與魔譬如氷水不氷即水不水即氷故曰毫釐有差天地懸隔又煉頂燒臂博米飯僧固是好事然不若以四大觀身四蘊觀心身心觀熟轉生死為涅槃轉煩惱為菩提較飯有僧名而無僧實之僧勝劣曉如黑白佛言為佛弟子不解佛語不行佛行謂之髠頭俗人故飯髠頭俗人與飯常人乞兒等若然者未知轉生死為涅槃轉煩惱為菩提妄以苦身為行鼓惑愚癡衆生此非魔外而何哉六種攝示出家在家人衆生靈知固有而不能用者第未知有耳如一知有日用便能惟吾自偶諧矣大抵知有的人知身身化知心心化所以處身心而解脫有餘也故曰知有有壞知無無敗有無既爾則罪福吉凶獨有性乎凡學佛性宗通而相宗不通常迷於相似般若路頭二宗通而禪宗不通如葉公畫龍形容龍之態狀宛若真者然終不能致雷雨耳於相似般若路頭不辨清楚不免牽諸外典附會佛書且性宗一味虗豁靈徹塵勞中人少挹波瀾懷抱便覺超放即如讀莊子一般令人心魂遊揚濁世之表於此虗豁快活處受用了若以為極則永不求進凡見善知識敲打處便以為生事此病不消到底成天然外道去也於治習路頭罔然不辨好惡者良以相宗不通八識混淆不知何識是現量何識是比量何識是非量何識兼帶三量轉何識為智日用逆順境上何識作觀既不知轉識成智階梯饒你於性宗七通八達只是畫餅充飢安能得飽於禪宗未能究竟則雲門打殺佛喂狗子南泉斬貓兒等機緣縱十地菩薩聞此等差事亦不免生大疑怖震旦國中自昔以來每有竊謂佛經皆是抽繹莊老六經自成一家如此等人若使其於相宗中討箇分曉何至失言如此取後人之笑即如義學之徒或於禪宗生謗立言排斥總是為慮不遠執泥心重於情識上通不去故墮此失且如現前一身於相宗究竟不清斷不知此身下落便識他不破識他不破便被他瞞飲食男女境上自然作不得主便見可欲既見可欲此心便亂心亂身惑縱使活佛終日耳提面命也化你不得蓋此心此身都成了箇欲塊有何虗處可受醍醐要識破此身亦不甚難生前眼不攬色耳不攬聲鼻不攬香臭舌不攬醎淡身不攬觸則意根上便無待根既無待境寧有待境識無待當下寂滅寂滅現前一切順逆因緣頓化為常光由是推之現前一身不過生前五塵落謝之影子橫計不消成此肉塊耳噫生前有五塵影子識不破乃結成現前肉塊子如現前肉塊子再識不破則肉塊陸續展轉無窮去也故不管你利根鈍根於三界二十五有之中要求箇出頭分最初便把肉塊子得粉碎始得肉塊子既能破有生之患根株拔矣此根既一切無纍既得無纍凡咳唾掉臂皆清淨梵行也以此梵行之光照彼魔外自然膽喪魂驚歸依之不暇矣雖然要破肉塊子也是難事苟於出世之心見未定而惑不決豈易為哉又相宗之書無有通變師承學一分加一分繫縛故於性宗禪宗上和會不來若於相宗精了即一切外書亦總是佛法故古人云若人識得心大地無寸土寸土尚無外書非心而何我每常見此等病人多故不惜勞擾牽枝引蔓如此示門人藏教利用急於陶凡通教利用急於陶滅色明空之劣習別教急於轉通人之狹識圓教全始全終吾如來初之本致也通人以狹言者其斷惑止於見思惟巧勝乎滅色耳別教功用殊特非通之例蓋斷無明十二品也圓教則圓斷之矣凡內書讀之不以六即雙融了了不昧其濫魔外無疑也將此細議則不遷論旨可過半矣示聞郎諸大衆今日是臘月三十夜梅花色上添新歲爆竹聲中減舊年請各屏息緣心諦聽慈雲説兩句淡話大凡人生死不切只被箇富貴貧賤忙迫間散障了他富貴最極人中不過輪王天上不過摩醯首羅及至福盡五衰相現眷屬厭離威德不振死魔現前他豈不要強作箇主宰多享幾日癡福其如無常沒情直下請行到此時際與庸人何異慈雲見眼前齊頭整腦伶牙利齒談吐便便的漢子專心致志莫不以功名富貴為極則眠思夢想必欲滿願方休他輪王摩醯首羅到頭也只是這等榜樣何苦并盡精神波波逐逐斷送了一生又有一等富貴籠他不得的以間散為懷陶情高尚殊不知天上人間最間散者莫過神仙乘風往返瞬息萬里意有所向莫不遂心一旦報謝淪墜生死從前神通變幻種種逍遙一無所仗隨業受苦與豬狗同倫償也業債大衆上來富貴間散撞了箇大年三十夜也都結梢如此貧賤忙迫又何足道此是三界裏苦樂榜樣又不知三界外亦有苦樂大衆肯信否若説不信諸佛誠言安敢不信聲聞斷見思惑盡永脫分段穢軀六通縱任無為山壁由之直度改身換質稱念即成豈不樂也然還有塵沙無明及根本無明在難免變易生死於佛性上未得洞然徹了酣飲寂滅濁酒觸事面墻如枯樁死漢相似豈不是苦此是三界外的苦樂障蔽了佛性不得受用真寂滅三昧何況三界裏頭腥臊危脆之身結業顛狂之想戀此涕唾富貴果是皮裏有血眼裏有筋的漢子聞此淡話豈不面熱痛省尋箇出脫這圈的活路大衆有一段極平常極奇特的事只自不知如何是極平常人皆固有本自現成只為情封識鎖不得受用如何是極奇特不離此臭穢之軀即就煩惱業窟裏發一段堅固信心勇猛精進利害毀譽略不顧著辦了此段志氣然後見真善知識將此懷抱直心告訴他必不辜你此點真誠必指你箇尋活路的方法直下信受其言不得揣摩不得賣聰明杜撰即如初生嬰兒惟乳是念不知母之妍醜貴賤參禪的漢子也要如是蓋人不本色心不純粹決做此等事不得果辦了此等肚腸繫住本參話頭不論日月孜孜綿密迥迥現前一片觸不碎的境界情關坐斷意識不行到此光景胸中覔一點憎愛了不可得何況軀殼上的死生這箇時節并著精彩𢬵命直前以悟為期你真心不退十方諸佛與權位天龍八部必慈憫冥加忽然透徹大事了當殺活自由不妨就富貴以弘化示高尚以振俗若必以富貴間散為障道此又無繩自縛死結不少果到此地位即不離臭皮袋便是肉身菩薩與衆生抽釘拔楔點凡成聖縱步於毗盧頂上鼓化於今事門頭叱吒死參禪豪傑之偷心棒喝敲落無明漢子的習氣若也如是不惟自了亦且為人豈不特奇乎大衆如何是本參話頭趙州問投子大死的人却活如何子云不許夜行投明須到且道是何道理有會得的出來吐露看若都不薦各各自便偈曰一念無明昧己靈昏昏埋沒幾千生臭尸殼上分妍醜虗幻門頭起愛憎深溺邪途誰解險飄流苦海不知醒莫言此是間饒舌大要諸人出火坑除夜示衆夫五欲覆盆心光不明有能揭之千古長旦不亦快哉故全生之德莫若襲明之功也蓋日沈則月襲其明月沒則燈襲之如日月燈三者照不及處苟微不明自發之光則諸暗相永昏我矣是故宗譜之設貴在襲明自飲光至於震旦鼻祖皆以不傳之妙拋擲乎衣鉢偈頌之間使天資高者即妙襲明明明無盡又譬諸無盡燈然唯濟北一枝光茂特盛似他宗莫及也雖然雲門洞山溈仰法眼之門出人亦皆奇偉又非後世黃口禪雛得而皂白者也五戒精持須明三聚五戒者不殺不盜不淫不妄不酒是也三聚者一攝律儀戒律即法律是禁止之義儀即儀式是軌範之義持此戒者一者不得為利養故自讚毀他二者不得故慳不施前人三者不得瞋心打罵衆生四者不得毀謗大乘經典持此四法無惡不離故名攝律儀戒二攝善法戒者謂身口意所作善法及聞思修三慧六度萬行無不聚攝故名攝善法戒三攝衆生戒者謂能攝受一切衆生能攝之行即是慈悲喜捨慈名愛念能與衆生樂故悲名憐愍能拔衆生苦故喜名喜慶慶一切衆生離苦得樂故捨名無憎無愛常念衆生同得無憎無愛故以此等法攝諸衆生故名攝衆生戒夫五戒三聚精博無遺精則五為諸戒之本故名此五為根本戒博則無善不攝故名此三為三聚戒是故持五而不持三但紹人天難繼佛祖然戒殺而不能放生戒盜而不能布施戒淫而不能教人持戒戒妄語而不能愛語説法戒酒而不能勸人戒飲此名下品五戒反是名中品五戒如能五戒三聚兼持無犯名上品五戒嗚呼一念不生五戒三聚凡聖圓滿一念既生五戒三聚在道前或不聞名字或聞名字不知義趣或知義趣以染業障重不能持守惟道中道後道有淺深或滿持或分持教有明文茲不煩舉又初心之人謂之毛道凡夫設觸境風逆順心識飄忽如墮鴻毛於康莊微風歘起飄忽無定故有志出苦持五戒者若不發重大惡誓痛制心識偶觸境風現行力故染流易墮淨岸難登故古人自知染習濃厚於戒戒之下一一發大重誓扶持戒心使無飄忽今可既知浮榮危脆見幾而作挂冠祝髮自外及庶自庶求真生生世世不受雜身常為男子六根完具福慧隨願永作比丘斷見思後分身散影淨佛國土成就衆生如是戒願豈可易發自受戒後苟不以惡誓怖心願繩束縛戒實難持願實難發故戒急願緩戒屬生滅戒急願急戒本無生滅如能持無生滅戒則五戒三聚自然於境風逆順之中任運無犯倘慮三聚廣博難持五須精持三聚漸持如五不精持戒神瞋怒一戒五神五戒二十五神如影隨形護持戒人剎那不離如持戒不精神亦無時不怒兩順一逆迷悟綱宗綱宗不明解行失凖唐宣宗大中五年召京兆薦福寺弘辨入見上問曰何為頓見何名漸修對曰頓名自性與佛同儔然有無始染習故假漸修對治令順性起用如人吃飯不因一口便飽帝悅賜號圓智禪師此兩順一逆綱宗之所券也大抵衆生本無有苦受以性變為情昏動乃作萬法生焉昏動既作明靜失真明靜既失昏動日深昏動既深靡所不至故瞥起一念念不在上品十惡則在中品慳吝十惡不在中品慳吝十惡則在下品愚癡十惡不在下品愚癡十惡則在五戒滿缺之間不在五戒滿缺之間則在猜忌修十善之域不在猜忌修十善之域則在純修十善之天此六者雖升沈不同苦樂各交皆性變為情而有也夫性初本妙變而為粗故名下凡粗必流至於濁濁必受苦苦極必思本如人臨死生之際不號呼父母必哀天叩地諸佛菩薩乘其思本之時遂以緣因佛性熏之熏熟則解解則能了知根塵無性孰為物我此無物我者在堯不加多在紂不加少堯能以解治染習所以人欲日消天理日全如陽回大地消得一分氷則一分水現前消得十分氷則十分水現前水既現前氷不可得此名一逆水性融通在方而方在圓而圓可以為六合之靈潤可以為三冬之霜雪在天為雨在地為泉在流為江在貯為湖在納為海名雖多種實則惟濕而已以其在方圓之器而器不能留礙如妙覺聖人分身散影遍入諸趣開迷成覺鑄苦為樂務莫不濟然未嘗有纍此名妙順又名順性起用然順性起用中有逆而未全者有逆而將全者有逆而已全者如已全不能忘之則順性之用必不能稱性惟稱性之用方能妙物無纍往大通智勝佛十劫坐道場不得成佛道適坐此座即佛法現前以其忘而能起稱性之用耳此一逆之中有聲聞緣覺菩薩佛四法界不等蓋聲聞厭苦集為染欣滅道為淨緣覺厭流轉為苦欣還滅為樂菩薩雖圓別殊種皆以六度十波羅蜜淨佛國土成就衆生佛則不然頓明自性雖臊臭凡夫能於境緣逆順之衝一味率性應之如龍用水如虎用風謂之有心耶龍虎念未起時而風雲自生謂之無心耶脫微龍虎則風雲不起老龐曰日用事無別惟吾自偶諧頭頭非取捨處處沒張乖朱紫誰為號丘山絶點埃神通并妙用運水與搬柴雲門問大衆曰柴搬人人搬柴耶小壽禪師以擔柴出市薪忽墮地即大悟偈曰撲地非他物縱橫不是塵山河及大地全露法王身又陸亘大夫謂南泉曰肇法師甚奇怪解道天地同根萬物一體南泉指庭前牡丹花云人見此一株花如夢相似嗚呼葉公畫龍非不專真龍現前即投筆怖走若紫柏見南泉恁麼道打一摑云和尚腦後數行白髮曾見麼法樹來前紫柏受性不耐落索為樹郎略拈兩順一逆綱宗兼提古德機緣一兩則又自弄家風代陸亘轉一上語者不過愍樹郎不遠登山辭別壽母若不以本分事慰樹郎母子之心得非兒女態乎雖然本分事非徹骨英雄亦不易承當姑以三歸培母子出世之因五戒資人天之種三歸者謂歸依佛則不迷歸依法則不飢歸依僧食必正故曰非正命食不足以資法身慧命五戒者不殺則壽不盜則泰不淫則潔不妄則信不酒則智此五者有上中下焉上者治心中者束身下者戒雖曾受實或負名樹郎當斟酌上中下戒謹自擇之示朱虬菴夫衆人為欲噉惟聖人能噉欲為欲噉則迷己而逐物能噉欲則無物不轉故曰若能轉欲即同如來衆人一涉欲境但知有境而不知有己惟聖人即欲無欲故能妙萬物而無纍也世間法精神不極我所不化終不能入其閫域況出世間法乎大都世間法帶情而入亦可得其精出世間法苟不超情而入直饒你苦心到驢年終無有入處故曰離心意識參若不離心意識凡所參者皆心意識也古人謂之用賊作家非但家破禍終不免憨憨子曰吾讀棗柏論乃知清涼之疏華嚴也雖精且深然不若李方山之發揮無蹊徑可尋而天機深者以不可尋為前茅研窮不已忽焉而入則笑歌於彌勒樓閣之中遨遊於無量剎海之上得事事無礙者如普菴肅英邵武輩自唐迄明亦不乏人也但於遭際有通塞故其所得者有隱顯於時焉如船子不得夾山則終陸沈於煙波中已夫華嚴法華吾大雄氏始終本懷也彼大經疏則有清涼論則有方山唯法華也既為華嚴之終若不假手於天台則玄義之作其孰能之有宋寂音尊者作論論法華則以文字而拋擲不傳之妙於三周九喻之間譬如夜光之珠宛轉橫斜衝突於金盤之內不可得而測其方向也所可必者知其不出盤耳盤喻文字珠喻不傳之妙也或曰妙不可傳既不可傳孰知其妙既知妙而不可以文字語言得之則文字語言獨外乎妙哉如文字語言既在妙外則文字語言不可得而傳妙可傳也妙既可傳而文字語言不可傳者則粗者愈精精者愈粗矣子為我即之憨憨子應曰精謂理也粗謂事也理猶水也事猶波也如必以為文字語言非妙妙非文字語言是離波求水也離水求波也子悟波水之喻則精粗不待吾再告而知矣天台建六即六波也即水也有迷波者謂波非水也有迷水者謂水非波也謂波非水則凡夫甘陷無分之阱終迷而不出矣謂水非波則淺悟之徒不免坐於忽聖之坑也此吾天台六即所以建也六即者理即名字即觀行即相似即分證即究竟即是也夫理即也者謂聖凡共有也名字即謂其聞名知義也觀行即謂其能依解起行也相似即謂其依行得相似理水也分證即謂其能入初住得與真法流水即也自是由等覺而成妙覺謂之究竟即也是以知即外六則即無所得知六外即則六亦無所得能如是知者乃謂之圓解也依圓解起行始謂之圓行行既圓則所證獨不圓乎嗚呼藏通別皆金口所流出也不名之圓教惟華嚴法華諸最上乘經謂之圓教蓋根器異也如華嚴時非鹿苑時也乃至非法華時也豈如來聖人有異心異言哉如六即之建五位之設總謂理可頓悟事須漸除故不假五位陶鑄無始習染至盡則果體終不可證也陶鑄習染若不先頓悟圓旨則行屬有為非圓行也唯六即即波外無水也唯即即六水外無波也然華嚴法華皆以象寓意能得意而忘象者指波為水可也指理為事可也指精為粗可也指粗為精可也脫泥象而不得其意雖清涼方山石門復出吾未如之何已夫繩之為網則水陸之命有所逸者未可知也以錢為網則水陸之味窮矣夫味離舌無有舌離身無有身離心無有故至淫者化為婦人至暴者化為猛虎蓋其心既變其形不得不變也此非心能生身乎人苟能因味得舌因舌得身因身得心因心得性性得則孰為物孰為我故曰血氣之屬必有知凡有知者必同體又曰性相近也世儒不知性橫謂我性與物性不同遂因味失舌因舌失身因身失心因心昧性昧性則無往而非情所以被形用而不能用形耳既為形用不過窮口腹之欲安知所謂性哉劉生倘薦此則戒殺不難矣勸劉生戒殺
