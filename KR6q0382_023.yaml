body:
  text: 明憨山德清閲書復王宇望叔姪書經之事本老漢私恩豈可纍弟子古有僧或荷母而行旁人憐其勞頓欲代荷之其僧拜而辭曰吾母寧敢勞君由是言之弟子圖治經壇設遲速亦奚罪且接歲薦飢人力疲極雖素稱阿堵翁者為之艱難而況王生家向清寒首出延陵者哉日附件淳此簡情真而言朴亦老漢見汝叔姪於北園請書經之心情真色悚誠可裂石所以久淹留都未他遊者恐負叔姪初心也或者解傳溢言聽復不察比來此流觸處洋洋汩人耳目使聞見倒置爭鬪橫起情少弗合視如胡越情少苟合胡越同心是皆我刺堅固佛手難拔矣可笑老漢不識時務將一片熱心出乎委曲強欲拔之刺不能拔反受刺刺此非人過過在老漢修行無力天猶不佑也自今而後惟圖自治弗敢照人若起照人之念即我失照失照不照謂之即昧昧而不反更復尤人罪莫大焉賢叔姪并痛感吾言日用之中精進學喫欺覺得喫欺有歡喜處便是學佛靈效若書經日期俟晤再定與王宇泰所受三戒命根金湯凡百行止切切護念如或放逸其畏非言可喻想此箇光景日用宇泰不忘也且凡夫情習濃厚卒難即除當如螻蟻過須彌力雖微弱必期逾頂而後已須彌之高螻蟻之微以常情觀之過也必難矣據其初志則螻蟻與我何別惟吾宇泰常以螻蟻為師志必須逾頂可也然衆生情習積劫熏久高厚煩惱之山又過於須彌遠矣與王後石驀地相逢雅同舊識非頂門具眼病犯煙霞者寧有此哉顯親別後抱寂芙蓉高誼如雲攸攸在望不遑過我豈暑妬青山耶聞上人來金壇一詢起居知令孫女已遊九原矣云先生追傷成疾世外野人亦覺愴如雖然死生者造物之蘧廬也死者既歸嬉笑家山先生皇皇未已何啻求馬於唐肆哉且有先生而有令郎有令郎而有令孫女先生能善返之則令孫女猶在在而求之所謂頭上尋頭也聞上人風便謹奉解憂散一劑敢乞服之答王方麓公睡眼乍開日高三丈餘睡未盡拭眼讀手偈旨趣清遠滌除睡魔何啻天外長風杯中春茗也但一微涉動起滅萬端喜怒戰酣苟不以一微之前者督之則血流漂杵長劫無已耳故所諭誠盡善矣然道待器言靜待動言是皆一微待中境界苟不以一微之前者吸之不過能觀者一微萬起萬滅者特一微待也故曰達本忘情知心體合此古人萬古不欺之言也本即一微之前者此尚不可以有無求況可以起滅觀之哉又心不知心如己眼不見己眼作麼生知既不可知則古人又道知心體始合貧道辱方老過獎屢矣無以報德敢以諭次直心請餘則披晤再請教不盡與王方麓公夫有身必有心有心必有知故掐胸則胸知掐背則背知掐首則首知掐足則足知如離身一紙掐則不知矣今此身從頂至足特不過五尺耳此知即五尺則有知離五尺則無知又爪髮鬚眉皆五尺之分皆掐而不知由是而觀則此知但能周五尺此知果是我心我心何小哉此知非我心則離此知別無有心且自古及今建大勳勞慮周萬物果周五尺之知之能耶或離此知別有所能者耶嗚呼此知甚微孰肯審而究之如究之得其所以然則中庸之未發大學之在明明德一以心言一以性言此聖賢之深慈也若未發可以五尺拘已發亦可以五尺拘未發非已發可知何以故已發之知但周五尺豈周五尺者能知未發哉貧道與方老或披晤或促膝談笑之間若皆處乎無我人之鄉苟非兩下超情安有此等光景今方老年高貧道鬢毛亦頒白矣恐此一別不知再晤何期所以深坐而不忍即去茲以周五尺之知請教方老願方老不負貧道狗馬之心儻一檢之或有小補未可知焉與陸五臺公病中昨日見門下頺然抱疾而臥及客至復能強起支應噫門下今日之事可謂急矣安有間精神周給人情哉直當痛念無常視自身為罪藪知自心為惡源苟罪藪未空惡源未竭外則形骸為桎梏內則識火焦靈根一刻萬劫且念佛持呪并參機緣既言皆不得力則臨行一著有何憑據貧道雖不敏實為門下大痛豈門下思此寧弗自痛如果不痛或再來菩薩則非鄙人可思議矣若非菩薩安得不謂之癡憨乎昔龐蘊初見石頭便能頓融前境前境既融則何物為吾敵敵既不立則能有之根曷可獨存根既不存則身尚不有誰為桎梏蘊次見馬祖則命根俱斷聖情氷釋況凡情耶凡情既洗識火潛消則靈根密固誰為焦爍若然者則罪藪未始非功德之林惡源未始非菩提之路惟善用其心者逆順皆為解脫之門貧道誠不作諂語願門下照其迫切之心深自痛焉復敬郎夫樹高必招風名高必招忌非但人間世如此即出世法中亦所不免者故明教嵩大慧杲皆見道明白問學淵博行不負解出言成章心光耿潔近則可以照一時遠則可以光萬古然明教大慧俱不免貶辱況其他乎本朝隆慶間如遍融法界二師操履光耿亦不下古人而皆遭細人之讒至於抵獄既而讒口卷舌心事頓明初雖受誣於一時終大取信於天下無擇智愚聞二師之風者莫不引領願見如肉佛然比勞盛亦遭誣陷吾曹有不知大體者亦隨腳跟乘風鼓謗流言充斥扇惑清聽殊不知松柏不歷風霜黃金不經罏冶道人不涉逆境孰辨真偽嗟哉髠奴徒捐髮鬚不諳大體滅華倡胡浮雲散盡明月還孤光徹寰宇汝面泥塗辱書答此可諦躊蹰情申理白邪正皎如古人有語誣人自誣事未定而先見情難辨而理區千載晨昏何疑之有謝于見素公惠麈尾結夏曲阿影棲於圃食殘蕭散稍復經行匪涉神奇咸投妙會清池白月洞剖禪心沃野嘉禾滋培佛種卷風塵於觀力廓泉石於情根魚躍波鳴蟬啼樹響即喧領寂冥妙關粗併有無而通幽齊遐邇以開務辰丁賤誕天賜清涼法侶雲臻時逢雨足既除煩暑坐榻生寒主人儼臨高賓翔集惠我麈尾舉揚真風豈惟動識雷驚應使無情夢破顧慚薄劣敢弗銘懷寄趙定宇石頭一別南北殊蹤心境依然初非損昔想吉人多福動履勝常胸中之天身外之纍信莫能翳問音久寂積抱常懸與丁勺原滁陽一別嗣後絶音時復逆思宛然一夢黑頭俄白悲境奪歡日勝日輸苟不以自重為主則眩我者多矣奇男子家如知名重而不知身重知身重而不知心重知心重而不知性重是不知類也貧道雖不敏每愛足下倜儻殊衆骨氣清深動止嚴謹惜乎於此道不甚留意比因來慈道者過江西勒此聊敘疏濶來慈於此道操詣清深行履光耿極可與語者南臯近有書見招但貧道病瘧未愈不遑赴耳湯若士尊公近清勝否聞佳郎秀爽特羣圓通大士一幅附贈倘令郎夙昔曾親承大士未可知也春深時序清和教子著書是天下極樂事且得重而遺輕蒼蒼或厚待足下足下當歡喜承接不宣外附法華合論一部此書能啓迪本光譬如長風驅雲天月自顯塵心濃者亦不易讀答請主法事比遣果清問訊足下而足下所答書意況不甚清朗想二郎之母病重擾之耶大都死生榮辱皆命所定夫命業也業不離心故外心與業而論病本者非也古人有言曰三界塵勞如海濶無古無今閙聒聒都向自己心念生一念不生即解脫此語極真但衆生不知自心是何物在何處所以治心無效耳治心既無效即古人言上生疑疑生則不信於古人分上且疑而不信況今人哉又百千中誰有治心之志男子尚甘昏昏而待盡況女人輩乎承大令郎見招為母作佛事佛事作而無效奚若不作雖然效不效誠不在佛顧其作者發心淺深如何耳如病苦有十分非二十分深心作此斷無有效果以深心作之病苦不消無有是處若令郎發心果如道人意敢弗赴之道人如孤雲野鶴去來凡百現成但慮作之無效反退病者與賢子心耳答竺生得書讀之亦甚憮然言實出於赤懷而憤之氣卒不能自勝此所謂志雖有而理不察故也如能察理則得喪榮辱皆我自致雖天地之大造物之神亦不能陶鑄我自致之情此情必須自鑄且道自鑄之方從何鑄起凡向日所不能克者痛當克去所不能全者痛當全去然不耐心而究理則心昏而神濁情豈易鑄哉思之答于中甫十二月初四興勤持手書至資福購燈讀之凄然痛人都下風習險詖誠如所言於世間法則公道誰亮於出世間法則得少為足且頭緒不甚清楚道人見此光景亦不喜淹留第以既為佛子當報佛恩如報佛之志方自見定而於禍福死生又生心計較則定志何在所以風波迭經總視覺後之夢行住任緣初不預料也但念汝連年境風浩然於不堪忍處強力支持一切拂逆讒謗翻成受益之地餘喘幸存此又令道人凄然中生歡喜耳法朗尊公臨逝光景斷非此生習氣乃前生夙習也果如是則道人與汝等亦有助不淺卓頭陀胸次灑然本必無根根在見地不虗不審法朗見卓受益何如渠舍宅為寺言不可輕發蓋風不可輕起以風無形而能鼓物故也言如風可聽而不可見所以與風同勢聞之心遠遠則難挽如不言而事成活機在我言則死已二天厚其人衆患煅之天薄其人衆幸誘之汝連年親涉衆患天實厚汝而煅之儻不能歡喜領受便是薄福種子也直以忍辱為海割舍為刀斬我相根株汪洋包納則將來受用未易量矣三德卿不意至此殊令人哽噎幸汝周旋其兒子輩此又老人合爪痛感麟郎者也骨藏何所知忍能念之否幸致老人意光公急究相宗勿癡度時陰比見學佛緇白骨節不甚硬稍觸逆境即如野狐變人作怪一聞犬聲故體頓復犬始知其是狐敢恣口咬之儻人形尚存犬決不咬惟卓吾非狐變之人也故不煩犬咬遂爾自刎然卓吾非不知道但不能用道耳知即照用即行老朽更不如卓吾在四凡讀汝來書則句意自然可悲可喜以下字不癡故能令人遙中若汝觸不可意事如裁書下字法則不可意事之機即天機之資也儻知而未能却順逆之境風得無增吾憂乎奇男子須割愛愛不割則墮軟暖魔網矣與李次公世間人自有法度出世人亦自有法度世間人禮義不可苟出世人照用不可昧禮義但人界照用統九道如忽九道而從人界不免觸不可意自然以平時所見治之終不得力蓋平時所見者不是自家固有但從本子上拾來耳孔聽來非是寒泉湧地明珠萬斛倒噴潑日之勢安能却迷事無明乎故曰境大般若大如般若威神頓損殊為笑具與元鑑少年為客以技博供供養父母是須筆筆寫著古人真處自然即技入道儻謂技道有別此所謂把髻投衙者也思之答馮開之數千里外忽辱手書展讀再四如面玉容何樂如之且云般若緣深天去其疾豈胸中無秋江者而能道哉咄青山白雲一切不放過時光此又貧道萬萬所延頸也與方幼輿邇來祖風凋弊法道荒涼無分黑白凡在此門孰不以為生死為言及問死生所以十箇到有五雙罔措此皆最初發心不真實見地不透徹所以一逢逼拶自然手腳忙亂且道真實心如何發善財初見文殊即獲根本智然後遍參知識雖則門頭次第不同要且換他鼻孔不得何以故有本者如是耳今時人雖説發心學佛大都如瞎公雞相似他也不知天明不明但聽得他雞鳴亦隨胡呌一上撞著個孟嘗門下會假雞鳴的賊冷地呌一聲亦即隨他鳴去學佛的人見地不透徹見人嘴皮動他心上理知間解即搬出許多來殊不知總是意根上的影子此點影子熟睡的人熟睡去了或被跌的人跌悶去了或臨卒然利害關頭意識照管不到處都總用不著這三箇境界較之臨命終時孰險孰夷想其輕重好惡幼輿必定辨得出既辨得出必知活時此點影子尚支吾不來臨命終時豈有交涉又有一等人以反聞聞自性做工夫是必不聞聲塵將聞聲塵的機來反照自性積習日久或見個空清境界便謂真得我且問他聲塵畢竟是性內的性外的若在性內則聲塵亦性何必去聲塵而反聞則謂之聞自性若在性外性非有外謂性外有聲塵決無是處又有一等於耳根門頭靈靈應物的謂之真性殊不知此是由塵發知應境影子前境遷謝此亦隨沒以此當本來面目此所謂喚奴作郎皆非佛旨若要真實會得耳根圓通的消息我拈個榜樣你看古德問僧隔壁聞叉釧聲即為破戒且道作麼生持其僧云好個入路幼輿會得這僧入路處麼若會得方見善財見文殊的境界方可參天下善知識若會不得也須猛著精彩向這僧入路處討個分曉無常迅速時不待人珍重與塗毒居士我今止有報佛恩一事𢬵却身命一切利害毀譽非我所知我逆逆順順淺淺深深非汝輩所知二俗諦中人入吾法中如人溺大海露髮髻子善知識提擕如援髮髻子相似須是自家盡命掙著不然是自要沉沒千佛出世也難救取寄沈德輿達觀自匡廬下江南二三年往來吳越間初心竊謂宗門寥落法道陵遲假我門庭熾然以魔習為傳以訛繼訛真偽不辨天下遂謂宗門光景不過如此而不求真悟至於少林奉朝廷欽依以傳宗為名而崇尚曹洞臨濟溈仰法眼雲門五家綱宗亦不辨端倪不知設此胡為則宗風掃地可知矣巖頭奯云但識取綱宗本無實法若然者則綱宗乃宗門之命脈而有志於斯道者豈可忽諸達觀以此未嘗不痛心疾首撫膺流涕然知我此懷者幾人哉所以下匡廬持僧寶傳林間録智證傳三書雖亡者糟粕而五家典刑綱宗係焉以故急為梓行意在廣傳今天下豈無豪傑挺生遇此書頓斷命根洞豁綱宗荷擔法道不顧危亡必有以宗風中興為志者出焉則我寂音尊者千古之下若旦暮遇之也達觀於居士中時時舉揚而薦此者希惟汝雖不能始終徹然然亦知好惡承順觸犯奈汝勝習微弱善根雖有實不能如好堅木出地頃刻千尺垂陰如蓋作衆生疲熱避涼處此皆是往因願力輕鮮感報不宏故也自今切不可埋沒此生直於逆順關頭利害之際如風過樹如雲行空即常光時時現前如投夜明珠於金盤之中宛轉橫斜莫測方向特不出盤耳從上祖師以綱宗為盤以見地受用為珠有珠無盤則非人天眼目有盤無珠則自沉情海虗張綱宗擬欲度人則龍天不祐佛祖所厭福日消而罪日長慧雲散而情風熾一旦業報盡來請隨無常殺鬼受指揮去那時始悔心地未徹妄拈綱宗之所致也悔之何及此等忌諱諒汝必知今書此遺汝雖達觀隔遠展之示有志於宗乘者則達觀未嘗不在也比日舟過吳江汝曾索開示當謹受持不可錯舉若要相應我語不許夜行投明須到於此不能透徹吾此葛藤何異説夢與平廓莊周有言魚相忘於江湖人相忘於道術夫人不以此而稱相知者妄也不侫與座下周旋甚久受座下益甚深今座下行思無以報敢割肝膽吐一言願座下采聽座下素研精教乘而宗乘亦未始不留心不無領會處然命根情窟未能翻空截斷者其過安在古人云一則不透則千則不透千則不透則一則不透座下得無坐此乎哉惟座下於五燈中留神一上或有一機半緣與座下相仇讐卒不能消釋者決不可放過挨排久之而一朝𪹼然拶破則向所謂仇讐者翻為骨肉矣答汪仲淹辱惠書讀至比來業重災生處達觀亦不覺為仲淹愴然久之遂亦為仲淹喜大抵人苦不能自反既不能自反不但達觀救不得直教諸佛亦無下手處仲淹獨能自反則苦根將矣惟仲淹一反永覺於愛憎關頭死生境上挺然獨立𢬵命捱將去了不失腳正當苦時即推苦根為自心生耶為從業生耶為心業共生耶為離心業生耶若從心生非業則心本無病若從業生非心則業本無主若心業共生初於自他兩者推之既無生處又將何物而共生耶若離心業而無端生更無謂矣仲淹果能觸境諦察深推於四生中何生中生是苦根一旦推功極處苦根披露到此地位仲淹方體得古人道老僧自有安間法八苦熬煎也不妨仲淹若不能擔當做得去則所問若宗若教何日暮途遠尚有間工夫及此耶雖然達觀一則古人葛藤聊為仲淹病苦中作個消間的方子一日洞山不安僧問和尚病還有不病者麼山云有僧云不病者還看和尚否山云老僧看他有分僧云和尚看他如何山云則不見有病達觀將此問仲淹病時亦有人看仲淹否仲淹亦能看渠否於此句中若仲淹罔措不薦則病熟命光遷謝之時敢保至愛的代你不得在江山修阻雲月長新南羽康虞信來復此以為山中音耗耳與陸太宰大法丁艱殘燈幾滅僅憑墻塹保障緇林是以安禪無狼虎之驚集講有龍象之慶然則百尺竿頭非進步之階千峯頂上豈窮年之地檀越位高爵厚任重心勞雖則帝渥靡涯懸恐精神有限事繁食簡德茂年尊莫教眼下蹉跎直向胸前便判鳥未倦而知返雲將歸而始間不失早見之明全收自知之譽功留三寶蔭庇諸方此世外野人延頸檀越者也答李虹霄讀手疏服筆力雄健辭旨精朗但神迹之論尚墮於常習世謂迹粗神密殊不知迹是何物神又何物苟神迹果殊聖人曷能會萬物歸於己哉是以移舊染擴本光必理行事行如車並輪如鳥雙翅始能運遠騰空今公獨抱理行弗重事行何異鳥之折翅車之廢輪又執事習氣偏用事行則有益偏用理行則無益大都事行難逃於實迹理行則易資乎空談貧道探討此道頗有年矣少見不真決不敢橫斷惟高明思之與雷雨居士人有小技謗階自設況吾爾抱出世之道而陵厲塵奴則其不悅自引也又何介哉二人若不生病則空談可當修行人若不有好惡境界則真心學好無可辨驗汝生得這點病便覺受他不得根在何處只為生病日子少無病日子多故耳勿厭此語當味之與鄒南臯公燕山無量寺風月不減西江仲淳近當行蹤飄泊之際足下能不忘燕山之舊一旦為渠東道則西江風月乃無量之故物也牢山亦自燕山來縲絏隆冬將有萬里之行究其所自因弘法被譴亦可哀已然觀其眉宇自有一段不可言處使人意消心化今渠道吉水足下當一晤之鐵佛菴有佛名而無佛實如南臯即佛不必別鑄雖然也須大經罏甀一上始不負名此貧道犬馬心也聞仲淳堪輿役忙峰頭澗畔葛藤無量倘失腳絆倒足下不垂手扶持之更待阿誰昔溈山勘仰山曰當此境界鐵佛也須汗出夫此汗出境界從上聖賢苟不以了知為前茅隨順心體為急務此汗亦未易出與李君實節推易傳有宋刻無一字訛者惜未得也聞屠田叔有之田叔亦曾親老漢瓶錫今在福建如得渠的本證抄本之訛剔蕪沒之垢俾列聖不傳之妙即文字而傳傳之者始知無所得也知無所得則一切衆生可以交神之道見之見之者乃痛民飢即我飢民寒即我寒如未見之不過率情之痛非率性之痛情屬生滅性無生滅故以有生滅者痛民終有倦時惟無倦者見之不見之在李郎而不在老人也與湯義仍浮生幾何而新故代謝年齒兼往那堪躊躇靜觀前念後念一起一滅如環無端善用其心則粗者漸妙不善用其心則妙者漸粗妙者漸粗粗將不妙於不妙處了不覺知是身存而心死矣所以古德云乍時不到便同死人夫身在而心死則不當存者我反存之不當死者我反死之老氏曰我有大患為我有身又曰介然有知惟施是畏即此觀之大患當除而我不能除真心本妙情生即癡癡則近死近死而不覺心幾頑矣況復昭廓其癡馳而不返則種種不妙不召而至焉至人知其如此惟施是畏顏子隳肢體得非除大患乎黜聰明得非空癡心乎大患除而癡心空則我固有法身本妙真心亦不待召而至矣曹溪聞應無所住而生其心則根塵逈脫妙心昭然故溈山曰靈光獨露逈脫根塵體露真常不拘文字至此則粗者復妙矣遠者習近矣人為萬物之靈於此不急而他急此所謂不知類者也寸虗受性高明嗜欲淺而天機深真求道利器第向來於此路頭生疏不熟或言及此未見渴仰此點消息乃羽毛鱗甲之媒三塗四生之引故曰一微涉動境成此頽山勢此半偈三假全備三假者因成假相續假相待假是也如上根利器才入因成覺不隨流謂之不遠復如天機稍淺流入相續慚愧知返謂之流復於相續中尚不驚覺勢必流入於相待矣既流入於相待則以習遠為重反以習近為輕夫近者性也遠者情也昧性而恣情謂之輕道如唐德宗不能自反迷而不悟終致大盜以亂天下此遠公所謂成此頽山勢者也又因成是何義蓋妄心不能獨立必因附前境而生故智鑑曰能由境能此能乃妄心之始我相之根我相乃不善之前茅仲尼曰顏氏之子有不善未嘗不知知之未嘗復行果如此謂之不遠復無祗悔不亦宜乎毗舍浮佛此言自在覺其傳法偈曰假借四大以為身心本無生因境有前境若無心亦無罪福如幻起亦滅昔有貴人以上妙素帛求黃魯直書平時得意之詩魯直曰庭堅亦凡夫耳詩縱得意亦不妙遂書此偈遺之且屬之曰七佛偈乃禪宗之源今天下黑白譁然望流迷源庭堅旁觀不禁書之贈公願公由讀而誦由誦而持由持而入由入而化則自在覺在公日用而不在此偈也山谷楚人寸虗亦楚人茲以楚人引楚人則似易倘吳人引楚人則楚人以謂吳人似不知楚人也若相續假以因成錯過本來面目便將錯就錯不惟不知因成之前心本獨立初非附麗即其照無中邊之光初不夢見彼照而應物偶然忘照流入因成以不知是因成復流入相續相續流入相待相待是何義謂物我對待亢然角立也嗚呼相待不覺則三毒五陰亦不明而迷矣故知能由境能則能非我有能非我有豈境我得有哉此理皎如日星理明則情消情消則性復性復則奇男子能事畢矣雖死何憾焉仲尼曰朝聞道夕死可矣為是故也如生死代謝寒暑迭遷有物流動人之常情衆人迷常而不知返道終不聞矣故曰反常合道夫道乃聖人之常情乃衆人之常聖人就衆人而言故曰反常合道耳據實言之衆人之常豈果真常耶野人追維往遊西山雲峰寺得寸虗於璧上此初遇也至石頭晤於南臯齋中此二遇也辱寸虗冒風雨而枉顧棲霞此三遇也及寸虗上疏後客瘴海野人每有徐聞時寸虛方謫徐聞尉之心然有心而未遂至買舟絶錢塘道龍遊訪寸虗於遂昌遂昌唐山寺冠世絶境泉潔峰頭月印波心紅魚誤認為餌虗白吐吞吐吞既久化而為丹衆魚得以龍焉故曰龍乃魚中之仙唐山禪月舊宅微寸虗方便接引則達道人此生幾不知有唐山矣然此遇四遇也今臨川之遇大出意外何殊雲水相逢兩皆無心清曠自足此五遇也野人久慕疏山石門並龍象禪窟冒雨犯風直抵石門黎明入寺然寺有名無實故址雖存草萊荊棘狐蛇淵藪四顧不堪故不遑拋瓣香熏圓明而行圓明山谷最敬之每歎東坡不遑一面然圓明敬東坡不在山谷之下今石門狼狽至於此使東坡山谷有靈亦其所不堪者也大都真人大士之遺迹乃衆生開佛知見之旗鼓也蓋旗能一目鼓能一耳耳目既一目即耳可也耳即目可也目可以為耳則旗非目境耳可以為目則鼓非耳境旗鼓固非耳目之境而耳目之用不廢此謂六根互用也然以一精明為君六和合為臣臣奉君命無往不一無往不一謂之獨往獨來獨往獨來此即妙萬物而無纍者也此意悼西兒名序中亦稍泄之嗚呼野人與寸虗必大有宿因故野人不能以最上等人望寸虗謂之瞞心溈山曰但不瞞心心自靈聖且寸虗賦性精奇必自宿植若非宿植則世緣必濃世緣一濃靈根必昧年來世緣逆多順少此造物不忍精奇之物沉霾欲海暗相接引必欲接引寸虗了此大事野人二遇於石頭時曾與寸虗約曰十年後定當打破寸虗館也楞嚴曰空生大覺中如海一漚發即此觀之有形最大者天地無形最大者虗空天地生於空中如片雲點太清虗空生於大覺中如一漚生大海往以寸虗號足下者蓋衆人以六尺為身方寸為心方寸為心則心之狹小可知矣然衆人不能虗重以日夜而實之為貴寸虗稍能虗之且畏實而常不自安近野人望寸虗以四大觀身則六尺可遺以前塵緣影觀心則寸虗可遺六尺與寸虗既皆遺之則太虗即寸虗之身與心也至此以明為相以勇為將破其釜而焚其舟示將相於必死𢬵命與五陰魔血戰一場忽然報捷此野人深有望於寸虗者也願寸虗不以野人道淺學少略其玄黃而取其神駿神駿者即野人望寸虗之癡心也又野人今將升寸虗為廣虗升廣虗為覺虗願廣虗不當自降吳臨川野人往字以始光蓋取佛放眉間白毫相光照東方萬八千土東為動方能以眉光照之則不必釋動以求靜動本靜耳蓋方有十舉東一方則餘九方不待舉而可知矣方有十而知則一知即能由境能之能方即境也境有動靜能無動靜能若是動則不知動能若是靜則不知靜惟能非動非靜所以能知動靜耳肇公曰知有有壞知無無敗野人則曰知動動壞知靜靜敗動靜壞敗有無都遣則始光大而為圓光矣此圓光在堯不加多在紂不加少然光有邪正善用則謂之妙光不善用則謂之黏安發光如吳臨川已知野人動靜廣虗當以此書附達之如是則不惟野人不負五遇之緣亦廣虗不負五遇之緣也二屢承公不見則已見則必勸僕須披髮入山始妙僕雖感公教愛然謂公知僕則似未盡也大抵僕輩披髮入山易與世浮沉難公以易者愛僕不以難者愛僕此公以姑息愛我不以大德愛我昔二祖與世浮沉或有嘲之者祖曰我自調心非關汝事此等境界卒難與世法中人道者惟公體之幸甚又年來有等闡提忌僕眼明多知凡所作為彼謂終瞞僕不得殊不知僕眼亦不甚明智亦不甚深此輩窺僕不破徒橫生疑忌耳如其一窺破之縱使有人教其疑忌僕彼亦自然不生疑忌矣但破以未窺破浪作此伎倆也且僕一祝髮後斷髮如斷頭豈有斷頭之人怕人疑忌耶答吳臨川始光居士五金八石世以為寶始光獨不寶之不以剩語為笑具而復珍之且願淘其粗存其精此心何心哉然不知粗者既去果復有精者存乎呵呵二喜哥受性靈奇終非火宅種草緣盡長逝當觀往因永嘉曰大千沙界海中漚一切聖賢如電拂況凡夫與喜哥乎此理也非情也道人願始光力以理折情毋以情昧理且喜哥形有聚散有死生不可拘束而去來自由隨業咸報者安知今日去速之機非異日來速之機乎但再願始光於世緣牽絆交加處踢倒情樁究徹理海而於理海智願感格佛天於佛天慈嚴光裏流出一兩個有福慧兒子慰汝喜哥之痛亦補喜哥金湯之職又即喜哥復來未可知也思之道人於此月十九始聞喜哥長往之音亦不覺悲楚難禁時臺泉卓塵與二三法侶亦嗚咽不勝然喜哥以死説法維摩以病説法雖古今老少不同以理推之了無二也不知喜哥老子聞喜哥説法否若聞則悲鳴不廢而情弗傷理當前死生順逆皆吾導師耳道人恐始光父子情重緩以理照或以情延怨天尤人所以先附手字於沸湯釜底急為抽薪也三匡山大佛初生汝心今幸成之當正信堅固勿流異趣且白面郎君驀地為民父母日用之知人畜所係率性則仁明勇觸處現成率情則牛頭馬面百千畜習亦觸事現成噫清淨光中無故起念危乎岌哉果非虗語吳郎吳郎咄與李君實達道人自楞嚴東靜室始識賢父子信知賢父子與道人有菩提緣者於是即囑君實撰護法疏焚於韋馱之前而君實直下無疑又承賢父子追道人於王江涇值驟雨淋漓而賢父子曾無懈心此非有卓倫之見者斷不能也茲幸奉命出典潯陽潯陽乃古禪窟比來緇曹無論主者客者多飽食橫眠遊談無根之徒似不少也嗟乎因時布政之弊生則仁信之治救焉仁信之治弊生則智勇之治救焉智勇之治弊生則莫得而救者若干年矣至漢明兆夢摩竺西來則以一出世之法救莫救之弊此理勢然也蓋世法變極不以出世法救之則變終莫止出世法變極脫不以世法救之則其變亦終不止故迦文老子將涅槃時付囑國王大臣金湯正法即此意也然孔釋之徒世不多憂深慮遠之人所以二氏不得相資而救弊則必相毀而弊愈生焉道人初自吳門來南康止開先而未入潯陽者此意非淺淺以為君實素頗卓倫焚疏之舉斷非常人所能為竊謂臺老之後有趙公定宇繼二公者必君實矣君實自今而後於相傳溢言之際或於書柬之間大須要審察諦觀此書柬言雖粗率然察其心為我真而無他腸者此書柬言雖甘然察其心未必真為我而口為者於此兩者若瞞不過此便是佛心也又人情雖變態百出能以理折情精而衡之則真偽似不可逃焉又真心為人必先以德業偽心為人必先以姑息德業順性姑息順情順性則照用齊到所以染習消而不自知順情則照用俱昧所以染習不培而日深矣噫嘻三界之內非情重衆生決不生之故色界無色界雖勝於鬼獄四空四禪雖勝於無色四王忉利雖勝於四禪據實觀之而勝者必情重於劣者以勝者恆處順境故劣者恆處逆境故逆境則苦極苦極則思本思本則近覺近覺則苦樂之根了而不昧於了而不昧之時忽推苦樂之前苦樂之根畢竟根於何處推久誠積誠積心開則知向來極苦極樂斷非此外有耳自是便解將苦樂之前者於境緣逆順之衝橫拈竪弄弄得熟了則入地獄也是好事生天堂亦不作希奇想也然後痛念我同體之流苦海日深火宅煙濃燒然三界流蕩七趣強發四弘誓願願克方休四弘誓願不難發惟強之一字最難荷擔耳若能直下荷擔得這箇強字牢靠則世出世間法縱不憂深遠慮亦無往而不克矣道人於這強字著實勉力荷擔每滑肩不少矣此蓋衆生習熟佛祖習生衆生習熟則我根難我根難拔則此肩便不是金剛肩矣所以被利害得失轉却了苟能衆生習生佛祖習熟不但肩是金剛肩即戲罵譏訶皆金剛雷也此雷出地何蟄夢之不破何擔之不可肩耶此等言句説易行難故溈山訶仰山曰寂子汝莫口解脫又佛法不以禪定為要惟以智進為本故曰智進全名餘度皆字見徹不疑是智用不疑者而能治惡習是進又近日世態於至親骨肉中倘觸了他毫不顧惜直欲陷死我便快此言不信佛法者即信佛法人偶有無心之失觸了他情所護處他且把佛法拋在一邊百種生計害人我有日在我佛所謂末法鬬爭堅固是也夫鬬爭已是不好了更加堅固之力持鬬爭之心則此鬬爭不入阿鼻不已此亦理勢然也道人願君實將智進兩者強於此等境界大昭廓王江涇遭雨時心韋馱前焚疏時心更以護法為己任則報君報親靡不盡矣君實勉之餘不盡
