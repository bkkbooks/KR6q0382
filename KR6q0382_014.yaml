body:
  text: 明憨山德清閲金剛經白文序此經東來熾於唐迄於歷代芒寒色正皎如日月逮我明揚光續𦦨雖不乏人而金剛正眼若墮雲霧蓋常思其故學問尚理謂之所知愚所知愚不破則自心不得現前自心不得現前則心隨境轉糾纏莫解以有所住見求無所住心離經分析蕭統孤涎沁於識海而經曷由明乎欲經之明莫若直求佛心欲求佛心莫若持誦本文冥寞於離微玄妙之外堅精於死生順逆之關心心不斷如酵之於酪如麵蘖之於酒亦非有心亦非無心緣緣之中有忽然而成者故大鑑本新州賣柴漢耳非積文字義理之素偶然弛擔聞經心開因造黃梅取祖印而佩之號於萬世曰六祖夫非歷劫聞熏緣緣成熟之明驗耶昔龐蘊一日仰臥讀此經丹霞訶之曰非慢法乎蘊於左足加右足而已余讀傳燈録至此未嘗不流涕交扼腕而痛不已也今刪分數刻經本文如來之旨雲廓天布凡有知識者死生受持操大鑑之券以展龐公之用則酪出乳中決矣石門文字禪序夫自晉宋齊梁學道者爭以金屑翳眼而初祖東來應病投劑直指人心不立文字後之承虗接響不識藥忌者遂一切峻其垣而築文字於禪之外由是分疆列界剖判虗空學禪者不務精義學文字者不務了心夫義不精則心了而不光大精義而不了心則文字終不入神故寶覺欲以無學之學朝宗百川而無盡歎民公南海波斯因風到岸標榜具存儀刑不遠嗚呼可以思矣蓋禪如春也文字則花也春在於花全花是春花在於春全春是花而曰禪與文字有二乎哉故德山臨濟棒喝交馳未嘗非文字也清涼天台疏經造論未嘗非禪也而曰禪與文字有二乎哉逮於晚近更相笑而更相非嚴於水火矣宋寂音尊者憂之因名其所著曰文字禪夫齊秦搆難而按以周天子之命令遂投戈臥鼓而順於大化則文字禪之為也蓋此老子向春臺擷衆芳諦知春花之際無地寄眼故橫心所見橫口所言鬪千紅萬紫於三寸枯管之下於此把住水泄不通即於此放行波瀾浩渺乃至逗物而吟逢緣而咏並入編中夫何所謂禪與文字者夫是之謂文字禪而禪與文字有二乎哉噫此一枝花自瞿曇拈後數千餘年擲在糞掃堆頭而寂音再一拈似即今流布踈影撩人暗香浮鼻其誰為破顏者重刻智證傳序大法之衰由吾儕綱宗不明以故祖令不行而魔外充斥即三尺豎子掠取古德剩句不知好惡計為己悟僭竊公行可歎也有宋覺範禪師於是乎懼乃離合宗教引事比類折衷五家宗旨至發其所祕犯其所忌而不惜昔人比之貫高程嬰公孫杵臼之用心噫亦可悲矣書以智證名非智不足以辨邪正非證不足以行賞罰蓋照用全方能荷大法也充覺範之心即天下有一人焉能讀此書直究綱宗行祖令斯不負著書之意即未能洞明此書而能廣其傳於天下以待夫一人焉能洞明之者縱未能即酬覺範之志亦覺範所與也覺範所著有僧寶傳林閒録與是書相表裏業已有善刻金沙于中甫比部復捐資刻是書三集並行於世亦法門一快事也有志於宗門者珍重流通是所望云麟禪人刺血跪書華嚴經序吾雜華通法界之經也直指毗盧果海性德圓融無礙廣大自在微細嚴以示衆生日用現證平等心地法門欲因之以廓塵習昭真境不離當處頓得無量受用耳觀夫佛等衆生等剎土塵毛染淨等劫念往來三際等迷悟因果理事等法爾如然居然自在惟其所以不等者良由吾人自昧於一念之差究竟有天淵之隔所以情生智隔想變體殊故曰奇哉奇哉一切衆生具有如來智慧德相但以妄想顛倒執著而不證得若離妄想執著則自然業智當下現前如一微塵具含大千經卷智人明見剖而出之則利用無窮由是觀之無論衆生心具不具只在當人眼明不明耳豈更有他哉是以文殊舉之以為智普賢操之以為行善財挾之以發心彌勒帶之而趣果四十二位之各證五十三人之全提月滿三觀星羅十門行布圓融事理無礙以極塵毛涉入依正互嚴種種言詮重重法象火聚刀山之解脫臥棘牛狗之堅持乃至異類潛行分身散影無非游刃微塵之利具也由具利則塵易破塵破則經卷出經卷出則德性彰德性彰則果海足果海足則無不足其猶融會萬派吐納百川故德用無邊惟心現量恆沙佛土即目非遙不涉途程而頓證者只在當人一念回光返照之力耳斯則六千道成於言下猶是鈍根三喚普賢於目前豈為智眼信乎聾瞽封蔀識情非上根圓器其孰倣佛之故曰衆生日用而不知苟知之則根塵識界草芥塵毛通為法界之真經屈伸俯仰咳唾掉臂總是普賢之妙行以如是經海墨積書而不盡以如是行日用現行而有餘如是則非智眼莫能見非大力莫能荷今麟禪人用瀝血跪書此經是明見而後書之耶抑因書而後明見耶猶然書之欲見而未及見耶若明見而後書則不待操觚全經已具如臨寶鏡又豈淋漓翰墨區區於簡牘文字之閒耶若因書而後明見則現前日用妙用全彰似懸珠網又豈昏沉業識茫茫於水月空華之界耶若書之欲見而未及見則析骨為筆剝皮為紙刺血為墨徒點染太虗揮灑金屑豈不重增迷悶枉歷辛勤耶雖然一枝葉落而天下秋回寸管灰飛而大地春起是則書與不書全經自在見與不見明昧一如悲夫夜壑藏舟力者負之而不覺覺則透出毗盧全彰法界昭昭然毫端眉睫之閒物物頭頭而與普賢交臂也此其麟乎休師有言華嚴性海與我同遊者捨子其誰歟否則暫閉閣門試請回途重參曼室大士子行矣無忘所屬小板法華經序此經不屬刻未刻亦不不屬刻未刻所以衆生與諸佛未嘗須臾離此經也然諸佛證而忘之忘而用之故日用觸事而真真則神神則不可測故曰此經非思量分別之所能解唐修雅法師謂此經佛之意祖之髓衆生之心由是觀之則修雅之言又可比丘之左券也雖然衆生日用而不知又豈能證而忘之忘而用之哉故不知此經者不可不知證此經者不可不忘之故曰情存一念悟寧越昔時迷檇李鮑勝友昆季發心刻小字梵策妙法華經與佛頂首棱嚴經法華根於無量義處束為六萬餘言六萬餘言束為二十八品二十八品束為七軸七軸束為如是妙法四字而已四字束為衆生日用現前一念一念束至於無念無念即無量義處也此無量義處則十方三世聖凡依正精粗好醜報復因果皆無量義處大圓鏡之影像也鮑勝友昆季所刻二經筆畫精爽流布稀奇負笈擔囊行腳甚便於鑑照真不可思議功德耳鶴林蕖公屬比丘跋之比丘素不能言姑書鮑勝友昆季刻二經緣起遺之然二經刻未刻二勝友於境風逆順之頃未嘗不流布也小板棱嚴經序首棱嚴此言一切事究竟堅固一切事究竟堅固即法華觸事而真也第名異而實同故未得堅固定者往往被名言所轉耳棱嚴七處徵心與八還辨見佛與阿難主賓酬酢往復奇險雖蘇秦張儀之辨設登棱嚴會上知其必舌卷而神喪矣蓋蘇張能馳騁有心有見之域一涉無心無見之場其舌之卷神之喪不亦宜乎嗚呼無心則無不知無見則無不視於無不知之知無不視之視會一切聖凡好醜之事則何事不堅固哉鮑勝友昆季倘能悟此則棱嚴與法華字字皆實相頂佛也重壽投子青和尚頌古集序洞上家風曹山三墮日出連山月圓當戶縱橫生殺明暗相參無縫布衫木人服得半穿皮履石女拖來汝若下劣寶几珍御汝若驚異白牯狸奴至於雲攢頂急佛眼難窺劫外靈枝烏雞失曉此非賣油翁的骨兒孫管取未夢見在嘻此一段家風寂寥掃地久矣歲戊戌一陽初復連山之日重放光明當戶之月倍加精彩吳臨川謂天地君親師皆罔極之恩一官盡瘁萬不酬一莫若舉揚洞上家風君臣五位曹山三墮使下劣者覩寶几而情消驚異者觸狸奴而心歇輝佛日固皇圖莫是過也雖然曹洞家風綿密精深若非真參實悟掉臂祖關者往往心粗膽大死在句下故賣油翁頌藥山與雲巖遊山腰閒刀響因緣曰大鵬無伴過天池師子將兒絶後隨崑崙觸犯歸行路一吼吞雲萬象馳看此翁作略如此濟上謂之全機大用全機大用即兩個泥牛鬪入海之機也不是家裡人切不可向癡兒前說夢臨川受性踈朴甘淡泊如魚甘水昔舒王見蔣山元問向上事元曰公有障道者三近道者一賞舒王平生甘淡泊如頭陀耳遠公五論序夫論以不敬王者名果不敬乎蓋將折衷於至理而特申其情耳其情既伸則知方內方外並行而不悖矣豈唯不悖哉將使方內有資方外弘通之益而方外有啓方內無生之明有啓無生之明乃凡有所知者皆沾其靈照有資弘通之益方外之賓雖跡絶於物苟欲行道必乘王者之運其化始廣也是故經世能以出世為宗謂之豪傑而聖賢出世能以經世為用謂之聖賢而豪傑若然者方內方外猶波與水耳今有人於斯謂必撥波而飲水其渴始解外水而能波其源始澄雖三尺童子必聚口而笑況上智乎茲論五篇大略階淺及深緣微而著在家奉法以體極為尊順化為宅所以重君親也方外之士必以求宗而超化超化則不貴厚生為益求宗則以息患為功以至形神殊致形則有聚有散神則無滅無生是以為善必召餘慶為惡必有餘殃辟夫昨日敬客今日客敬我昨日辱人今日人辱我如我前生為善今日得樂前生為惡今日罹殃推而廣之一生既爾則千生萬生以至無盡生靡不皆然也嗚呼孔子作春秋托名於褒貶使後世亂臣賊子懼誅而不敢肆橫夫名者賓也借名而討罪天下尚誡而生恐我樓煩大師特伸亮到之心精剖無生之旨使夫高識之流即緣生而達無生籍無生而廣治道小人知為惡有報則其遷善之心不待刑後而始生君子知為善無罪能為之弗已則善化而造微微則妙妙則不可以有心求不可以無心入有無既不能倣佛其樊豈可以心思口議哉以此觀之東魯之於樓煩名實可辨矣然此論不行世久矣豫甚慨之如日月在天浮雲蔽之使天下不覩其光輝如摩尼在祕使饑寒者莫得濟其欲於是授梓弘通凡有緣者如渴飲海雖小腹與大腹固不同量恣其各得所飽也重刻應庵和尚語録序臨濟正宗大於楊岐會盛於五祖演至於圓悟嫡嗣曰虎丘隆而隆之嫡嗣應庵和尚是也豫讀和尚住處州妙嚴禪院語乃知此老有心開飯店爭奈米不賤饑者怕來喫飽者又生厭若有人於潭柘句中理會得即要見應庵亦不難若也理會未得見潭柘尚難況見應庵者哉記造栴檀輪記俟刻方冊大藏經成豫願造栴檀輪𫎓之輪之上下列四聖六凡輪之最下謂之心海蓋四聖六凡雖升沈有異而離心別無建立故曰離圓覺無六道舍圓覺無三乘圓覺即自心之別名也大藏經五千餘卷雖淺深弗等圓別逈殊至於權權實實千變萬化不過發明我之本有心源耳若然則心海之大此輪之妙轉而弗停流而無止正如夜光之寶宛轉於金盤之中未嘗息焉但衆生見有身故即生死浩然執有心故即愛憎橫起是以心海之大迷而成小此輪之妙轉而為粗若復大藏流充寰宇使凡有心識者藉佛靈寵於一言半句之下心海開通即粗為妙則刻經之功造輪之勝又豈凡夫淺見薄識所能思議者乎老漢雖不敏願心既發輪影已成由影而形將遍塵剎由一佛境至於百千佛境由百千佛境至於無量佛境此心此願亦隨諸佛境昭廓我既昭廓願一切衆生如我無異雖然唯不能始終之為難即刻經之際若觸可意不可意事此皆十方諸佛護念汝之深慈也無得錯會微笑庵記夫微笑者金剛王寶劍也是凡是聖嬰其鋒芒命根立斷故我大覺老人拈花於靈山會上能破顏而微笑者飲光一人而已至於風穴上堂拈飲光微笑勘諸大衆惟念法華接拍成令耳萬曆丁酉於吳江觀音大士像前偶閲大寶積經兜率天授記品觸著我釋迦如來微笑光劍是時也但覺根外無境境外無根根境各不相到直得一切凡聖窩窟不踢自翻然知根境不相到者復是何物嗚呼眼不見眼鼻不嗅鼻花不拈花香不聞香請試道看如道不得則達觀道人且不妨移名換字去也徑山寂照之傍有大白寮取棱嚴大白傘蓋意也恐後人妄會為老氏大白若辱故用微笑易之凡我法屬若知易名之意管取立地凡聖情盡笑光劍新無擇有心無心百尺竿頭進步不進步吹毛劍上舍命不舍命道人但管盡法不管無民如是則此微笑光劍又為塗毒鼓也咦大衆火速掩耳留取窮性命下五峰出雙徑震大法雷施大法雨也不是分外事各各珍重長松館記長松館在潯陽城中其地有隱然隆然之勢館去廬嶽不遠故山嵐潭霧每輕籠遲回而不滅滅而忽明明滅無常焉昔山谷謂招隱風槩湖光山色朝莫萬態能陰而善晴若有鬼神假之作奇供以徼福於有道之士今是館之嵐霧陰晴於前後左右之松似亦不遜招隱也顧豫非有道者耳往年抱瘧松雲閒來慈偕其弟匡石多方調治豫性不耐服藥復恣情所爽口者故瘧鬼得肆焉既而豫瘧稍瘳遂有曹溪之役曹溪還復償牢山之盟奄忽三易寒暑至戊戌結夏襄之隆東華嚴寺時廬嶽黃龍潭名修潔者齎來慈書至則匡石已有淨土之遊矣嘆息久之於是復還潯陽一悼匡石淹留纍日復坐長松軒下經行庭除見山嵐潭霧變態恍惚不覺追惟過現交遊聚散之情與夫死生之變並不可以思惟心定其凶吉若嵐霧之幻化可見而不可執捉者也夫名與利衆人之所爭者也身與心衆人之所執者也然有變化密移之君握其機權而我人閒世無論智愚貴賤皆不敢不遵其命者也惟未窮而知變者能棄衆人之所爭空衆人之所執則密移之君始不得逞其權耳即過現之機局既然則六合之內六合之外種種升沈情狀何異乎館之前後左右山嵐潭霧去來之無常哉歸宗堅固子記歲戊戌汪大參靜峰授實齊居士堅固子一顆己亥春饒州阮司丞遣皖山馬祖庵主圓通齎沉香龕一座供養紫柏紫柏以授實齊居士貯大參所授堅固子鎮撫歸宗居士曰汪大參無心於沉香龕阮司丞亦無心於堅固子兩無心而適相受如磁石針自然相吸願乞一言記之紫柏曰夫堅固不自堅固香龕不自香龕我謂之堅固則堅固現前我謂之香龕則香龕本具如謂堅固與香龕是兩物則分別未忘又謂堅固與香龕皆非心外之物則能以理融事未能觸事而真苟能觸事而真十方三世皆堅固子也盡空法界皆沉香龕也汪大參與阮司丞作如是施則一施一切施實齊居士作如是受則一受一切受一施一切施施本無施一受一切受受本無受施本無施施無有窮受本無受受無有盡如是施何異虗空生風如是受何異鏡光納影所以劫石消而施受皆無盡藏也居士知此則金輪與法輪日用齊轉豈惟堅固子與沉香龕善能說偈哉松風水月瓦礫荊棘無非歸宗廣長舌相也檀溪寺菩提燈記我聞世出世閒有五種廣大音聲能為五乘之雷隨宜而震驚之皆從如來功德法力中流出也如罰十惡賞十善此震驚人天乘之雷也如達諸行無常是生滅法涅槃寂靜無為安樂此震驚聲聞乘之雷也如悟不由他狹視聲聞獨覺得道此震驚緣覺乘之雷也如叱咤二乘廣修六度不斷菩薩行不舍菩提心處無量生死而不疲厭此震驚菩薩乘之雷也如云此是第一乘勝乘最勝乘上乘無上乘此震驚大心衆生之雷也此五乘雷又名五菩提燈蓋雷能發聰燈能開明聰發則聞遺而聽無遠近明開則見徹而視無中邊矣若然者則一微之內十虗之外而無遺聰遺明焉惟聰無遺耳可以觀色惟明無遺眼可以聞聲故曰寄根明發則明不循根明不循根豈惟眼可觀聲亦可聞香亦可嘗味亦可覺觸亦可知法即我身八萬四千毛孔亦可以見色聞聲也噫一根而具六根之用非至明至勇而返流全一者其孰能之萬曆戊戌新秋日有宰官菩薩金牛居士王爾康遊檀溪寺瞻穀隱之遺蹤不堪其岑寂時有寒泉古柏獨守檀溪之句始蠲俸銀一兩囑寺僧真喜佃地一畝稍資佛前燈火之明倘有同志者十人則佃地有十畝之資明不廣且遠哉或又因明而延聰有施鐘鼓而作佛事者未可知也涅槃有塗毒鼓句棱嚴有擊鐘驗常之辭此又五種廣大音聲之注腳也顧其人所聞所見何如耳如以人天眼耳聞見之則謂之人天菩提燈人天鐘鼓聲乃至大心衆生眼耳聞見之則謂之大心衆生菩提燈菩提鐘鼓聲又曰心外無法如當機薦此則近取諸身遠取諸物何法非菩提燈非菩提鐘鼓聲哉紫柏道人聞居士之橫口如此陰不悅其鬚髮未除而攙我談柄聊記此以為他日索柄之媒云房山縣天開骨香庵記夫聖人無常身以衆生身為身辟如月無常影以百川澄湛而影現焉萬曆壬申五月十九日涿鹿山雲居東觀音寺住持明亮等以修補石經山雷音窟中三世佛座下地面石石下有一石函函面鐫曰大隋大業十二年歲次丙子四月丁巳朔八日甲子於此函內安置佛舍利三粒願住持永劫明亮等見之且驚且喜遂揭視之內有小銅函銅函內有小金函金函內有小金瓶如胡豆許內祕舍利果三粒小大有差一大逾粟一如粟一細逾粟而銅函外皆靈骨附焉嗚呼自隋迄明逮逾千載而舍利靈骨俱時復現豈偶然哉將非積年水旱弗調邊塞多虞佛祖悲憫示此希有為和風甘雨殄滅腥醜之徵乎將非大明主化瞋習為慈波乎抑聖母崇信三尊所致乎豫聞石經山自北齊慧思尊者鐫大藏於石以壽佛慧命隋靜琬繼之至元慧月終焉琬公圓寂靈骨一分塔於靈居寺背一分藏雷音窟中今者舍利靈骨是必琬公門弟子之所藏也子問開侍者曰佛身充滿法界乎對曰佛與衆生本無差別寧不充滿豫又問曰佛身既充滿舍利亦充滿乎開方沉吟豫振聲喝曰汝不聞昔有中貴登浙江阿育王山未進三門問笑翁曰舍利安在笑翁指松枝松枝遂放光汝若知此則舍利充滿與不充滿自知下落余又何言雖然洪鐘虗受靡扣不應幽谷無私有聲斯響故聖無常身月無常影水清則影現機感則聖應是室之建有年數矣而未得名俟舍利靈骨併光照臨始得名焉豫與二三子皆得信宿舍利光中又得忍菴慈公昆季為香飯主人何幸如之夫衆生骨臭諸佛骨香而果香臭有常凡豈成聖垢豈能淨豫以骨香名此菴者了知一切衆生初無常性以其隨順無明而六道星陳若不隨順誰骨非香願登菴思名得名思意得意忘思思忘忘忘若然者豈惟是室為骨香哉四方上下無往而非骨香也陸太宰手印記昔有一王生而勤善至老無懈但臨命終時偶觸逆境瞋心一生因此命盡即墮蠎身以善根力故身雖墮蟒自知是蟒求脫無由竊以為幸得一比丘為我說三歸五戒蟒身可脫也時有一比丘至蟒處不知蟒蟠林中忽聞有呼比丘者比丘異之此深山曠野樹林叢雜何人呼我躊蹰四顧又呼曰比丘我是某王以臨終生瞋今墮蟒身願大德說三歸五戒度我脫苦比丘曰某王生而勤善至老無懈死必生天豈墮蟒身耶蟒曰以我臨終瞋熾瞋主善伴伴必隨主故墮蟒身以生平勤善力故所以若聞三歸五戒蟒身可脫於是比丘遂為說三歸五戒訖蟒果死奇哉念力變通無常生而勤善死動瞋心故善不善新瞋受報及聞歸戒以新善熏力故善隨續瞋消蟒死而生天奇哉念力何其神乎即此而觀可知念無大小若因善生心雖事大而難成必當深思遠慮千萬方便委曲為之若因惡生心事雖微細必當直下克去所欲勿使成之自然此世他生人閒天上受報光大德冠常倫凡所欲為靡不克願何以故最初善念力故故曰善不可不勤惡不可不克當湖陸太宰生平信佛至於護法之際毀譽超然若信佛者即憎為愛若不信者即愛為憎但知護法事重而親疏榮辱了不關心故其當大病之中眉宇廓清神不為撓其未病時以左手為淨凡污染處決不用之惟用右手而已及病勢疑危不知日出為朝日入為暮凡歷旬日則左手第二指與大拇指相掐堅然若天生而不可解者苟非念力精虔死生不入其胸孰能臻於此嗚呼左手果淨右手果不淨則一身兩手而淨穢亢然不同界以跡觀之果如是也以理推之又大不然手無淨穢淨穢唯心豈有一人而二心乎一人既無二心則心淨無穢不淨果無穢不淨寧獨左手謂之淨將恐右手向謂不淨者未有不淨者也何以故一心既淨即從足至頂從邊至中以至八萬四千毛孔無不淨者故曰心淨則佛土淨此聖人之言也我則曰心淨則毛孔皆淨毛孔既皆淨安得山河國土不皆淨乎若然者太宰此印果死而不解其往生佛土必矣雖然可與智者道難為衆人言也經龕畫八部神記萬曆辛卯余寫法華棱嚴二經畢龕上當繪八部真形藉其威神以禦不祥使護持二經在在無恙而檇李棱嚴寺昱公適以華嚴變相來豫觀之甚喜遂屬鄣山丁生雲鵬臨摹登龕布置精妙玲瓏莊嚴殊為希有夫華嚴變相雖聖凡不同其主伴森然威儀具足至於即事表法玄旨幽朗如月在秋水不假言語使見者各各顯了不惑其中八部如阿修羅此言非天迦樓羅此言金翅鳥緊那羅此言疑人摩睺羅伽此言大蟒夜叉此言苦活毗樓博叉此言種種色莊嚴眼根鳩槃茶此言魘魅鬼乾達婆此言尋香各有其王統無量眷屬敬受佛敕隨處護法本有常光生佛不二隨緣熏炙現相不同故衆生一念起處各有所因如修羅多瞋諂詐迦樓羅吞噉資生緊那羅奏樂得食摩睺羅伽守護伽藍夜叉惱他活己毗樓博叉主領龍衆鳩槃茶食噉精氣魘魅衆生乾達婆尋香奏樂如是種種感報不同亦顧其初心何如耳今一切黑白日用治習之際起念不一試一一觀察此阿修羅業耶此迦樓羅業耶乃至乾達婆業耶照其惡念起處以知見之火精進之風忍辱之冶持戒之椎禪定之炭布施之水種種淬煉使一切染習之銅頓鎔無跡則孰非如來種族耶如是則八部靈聰各以見光為廣長舌相況其秉佛護法肝腦塗地者哉圖而供養之宜矣趙少宰施大悲菩薩記夫一心不生手眼無量介然念起手眼用分無量則手可見色眼可捉物用分則手惟能捉眼惟能見以此觀之菩薩衆生手眼平等是以兩目兩臂者能一心不生則圓用無虧千手千眼者介然念起則根塵互限譬如空谷無心千呼千應萬呼萬應然呼者至勞應者無疲空谷虗而匪靈者尚萬應而不窮吾人靈而不虗者呼則有盡況虗而至靈妙萬物而獨立者乎其手眼無量諸根互用奚足疑哉乃有疑而未信者蓋執六尺為軀方寸為心故也殊不知見小者必失大見狹者必失廣大莫大於無身廣莫廣於無心故曰非無身之至無以示無量百千寶目妙臂非無量百千寶目妙臂無以示無身之至也故無思者可以契同契同者可以圓用圓用則熾然分別而不乖同體如用未至圓雖身如槁木心如死灰皆非真忘也惟真忘者猶龍焉彈指之頃現身無常大則可以橫塞虗空細則可以芥子為宮龍乃有欲之物業力凡用尚難思議況無欲者乎虞山趙少宰以白銅鑄大悲菩薩像手眼姿態妙絶天下達觀道人一見而悅之赩現眉宇少宰曰師悅之乎對曰悅且謂少宰曰悅名固同悅心大別悅為菩薩悅利益衆生是為出世之悅也悅功名悅爵位是為世閒之悅也貧道固不敏公能以寶像施我不敏範而師之則所惠大矣敢不銘德少宰曰師還天目願以此像施於青山白雲之閒不亦偉乎此像藉名山福地可以久安又得師為之主則天目有主菩薩有所不之願也既而道人下天目聞菩薩猶未至潛豈少宰以空谷之心而應我吾以呼者之心以俟是像也歟雖然我以法界為天目虗空為大悲若然者像不出虞山未始不在天目也菩薩雖在虞山道人未始不在大慈悲父提照燭之中也恐忘所施後遂無聞負少宰之心施昧道人之初願故記禮五祖文蓋聞過去佛不得無生之心不得成無上覺道現在佛不得過去佛心不得成無上覺道未來佛不得現在佛心亦不得成無上覺道由是而觀我釋迦老人若不得迦葉佛心則不得有心成佛慈氏不得迦文之心亦不得有心成佛雖然迦文既不得有心成佛則靈山會上拈花示衆惟飲光微笑領旨是果有心乎哉無心乎哉於此簡別得出前則飲光兄之後則慈氏不敢弟之設簡別不出計有則常刺入心計無則斷刺入心斷常坑嶮自古自今遭其翳眼而墮者不知其幾矣是以諸佛菩薩興大慈悲示大手眼一實多名無量方便當其隨宜出世曰佛曰祖曰菩薩曰比丘曰居士譬如一味多食一莖多器識得破者即名得實識不破者忘實遺名曰佛曰祖曰菩薩等皆名也非實也所謂實者古德於無根舌頭直吐消息曰大衆要識本心否汝等各各現前靈光獨耀逈脫根塵體露真常不拘文字薦取則當下緣心頓歇脫復生心即鄉關萬里某以是知百丈不得馬祖之心則不能揚眉吐氣馬祖不得讓祖之心則不免家門枯淡乃知我震旦鼻祖不得多羅之心則神光立雪斷臂而求不知將何分付昔然燈佛授迦文之記迦文以無得為得名得阿耨多羅三藐三菩提龍湖聞禪師初參其師曰無上妙道可得聞乎其師曰莫謗他好聞曰從上以來光震華梵豈是虗設其師曰是實事聞公即穎然大悟而去曹溪呈我五祖大師偈曰本來無一物何處惹塵埃若然者則某懸懸二十年若渴鹿思泉冀一接足則不勝有心矣有心則有我有我則有物有物則與曹溪本來無物之旨大煞違背矣雖然見義不為非勇也某固不肖忝為大師遠孫寧甘望崖退屈哉且道不退屈一句作麼生敢道大師不得我心則無以接曹溪曹溪不得我心則無以光茂兒孫直饒威音王佛設不得我心縱使百劫坐道場管取佛法不現前在若也我不得東村王大伯心即不能為一切聖凡之巴鼻不惟不能為一切聖凡之巴鼻亦不能接引端敬二子發菩提心及一切助緣隨喜若霖等可吐此心於祖前實不敢以緣勝生勝情緣劣生劣情二情坐斷本心自露惟願以此剖獻慈光之中伏願哀憐攝受禮石門圓明禪師文萬曆二十六年十二月十九日豫自廬山歸宗寺挈開先壽公與吳門朗驅烏來臨川於二十九日黃昏舟次筠溪石門寺西南隅者蓋取坤土表信故也夫信之為物也大故出世法與世法微信則皆不成就如出世法備殫五位則以信為始世法經綸五常則以信為終故信始終萬法者也夫出世法中自飲光微笑以來能以語言文字揚其笑者惟馬鳴龍樹而已然二尊者皆産於梵不産於華産於華能以語言文字大飲光之笑者惟谷隱東林與石門而已石門即圓明圓明即寂音寂音諱洪字覺範生五十六年而卒著書百餘部如尊頂法論法華髻珠論僧寶傳林閒録及智證傳石門文字禪此皆豫所經目者也其餘渴慕而未及見焉石門十四歲講唯識論有聲十九參雲菴文禪師畢大事門嘗曰吾見雲菴之後不惟死生禍福皆我道具即語言文字三昧千萬言可以立就又拈棱伽經曰以自心執著心似外境轉彼所見非有是故說惟心豫即師所拈觀之但了心外無法則前境頓融法外無心則我相自化噫前境融而我相化始能自信黃面瞿曇借我舌根說法於二千年前孔老借我舌根述春秋刪詩書作六篇鳴道德顏隳肢體則我殼漏子與妄想心已忘於春秋時矣故飲光一笑落萬古於聲中顏回一坐坐斷語言文字之路於身心之外若然者則飲光何長顏回何短故短佛而長孔老短孔老而長佛者皆道聽塗說非三氏的骨兒孫也夫信有依通之信有智通之信故出世法中自飲光乃至曹溪而下於依通之信智通之信苟非鵝王水乳豈易擇哉是以石門於篆面鞭背謫戌瘴海之時搜剔五家綱宗精深整理成禪宗標格防閒魔外於像季之秋此心何心乎即仲尼述春秋之心也故師曰知我者其惟此書乎罪我者其惟此書乎所謂五家者即臨濟曹洞雲門僞仰法眼是也嗚呼豫生於五百年後師著書於五百年前豫因師之書而始知宗門有綱宗之說既而寒忘衣饑忘食窺索久之則綱宗肯綮照用生殺之機亦稍盡崖略矣綱宗崖略不但宗門為然即教家亦有綱宗如天台清涼慈恩於佛所說法各有所判如天台有化儀化法四教之說清涼有小始終頓圓五教之說泝而上之五天則有清光戒賢此皆産於梵者也若谷隱凡佛所說經率以三分判之所謂序正流通也戒賢即唐奘師得法師也戒賢傳彌勒之宗其宗謂之法相宗若天台清涼西土馬鳴龍樹皆謂之法性宗法相如波法性如水後世學者各專其門互相排斥故波之與水不能通而為一此曹皆以情學法者也非以理學法者也殊不知凡聖精粗情有而理無者也凡耳精粗所不能盡者理有而情無者也至於甚者斥達磨所傳之宗謂邪禪其說曰自飲光以至二十四祖師子尊者為異見王斬之安有所謂二十五祖與夫達磨者乎彼不知神光學窮內外立雪齊腰斷左臂置於鼻祖之前而乞安心使達磨果非聖人則神光之臂亦不易斷光能以理自勝外形骸而求法豈獨善其身者能為之乎蓋其志在兼善萬世者也及光得粲則光為二祖粲為三祖三祖有信心銘其言簡其理精此非洞了心外無法法外無心孰能臻於是粲授此銘於四祖信信授此銘於五祖忍忍授此銘於六祖能六祖本嶺南新州賣柴漢初不識文字語言一日擔柴入市有賈買柴適誦金剛經祖聞應無所住而生其心誦聲未已祖即大悟及賈償柴直祖問曰汝所讀者何書賈曰金剛經曰此經何從來賈曰蘄州黃梅五祖處得來祖咨嗟久之且曰奈我有老母在無人養耳若得十金安母則黃梅可往也賈聞而異之隨施十金與祖安母祖至黃梅忍大師知其根性猛利故當衆蓋覆之至祖得衣鉢而南遁後大闡達磨之宗長飲光之笑豫以是知馬鳴龍樹谷隱東林與圓明大師皆即文字語言而傳心曹溪則即心而傳文字語言即文字語言而傳心如波即水也即心而傳文字語言如水即波也波即水所謂極數而窮靈水即波所謂窮靈而極數極數而窮靈則法相法性之波也窮靈而極數則法性法相之水也故石門以文字禪名其書文字波也禪水也如必欲離文字而求禪渴不飲波必欲撥波而覓水即至昏昧寧至此乎故曰性宗通而相宗不通事終不圓相宗通而性宗不通理終不徹事不圓則不能入事不成就三昧理不徹則不能入理不成就三昧縱性相俱通而不通禪宗機終不活機不活則理事不成就三昧雖入而不能用也若夫圓明大師則又出入乎性相之樊掉臂於禪宗之域即出世法而融攝世法以世法而波瀾乎出世之法如春著花如花承春穠鮮秀麗又如月在秋水豈煩指點而得其清明者哉某本殺豬屠狗之夫唯知飲酒噉肉恃醉使氣而已安知所謂佛知見耶不謂吳門楓橋雨中承輪道人一傘之接雨漸而為甘露甘露漸而續石門之血脉石門之血脉幸而續之則飲光之笑聲或將傳於龍華會上未可知也雖然不肖何人敢大言如此苟無自信於心初不假於外者何不憚大川峻嶺即窮冬而登石門此心之痛惟佛與孔老必皆俯而慈攝者也偈曰心外無法聖凡生殺情枯智訖天機始活稽首石門心法洞達飲光之笑長而不歇天風怒號萬竅皆悅笑不在口聲豈有滅太虗為大地為舌不肖所悟圓明之訣法乳恩深敢畏風雪天寒地凍寒極暖發千紅萬紫如來所說但自忘懷無往不潔以潔開物物皆解脫以是報恩何恩弗答祭法通寺遍融老師文豫受性豪放習亦粗戇一言不合不覺眥裂火迸自吳門遇覺公棄書劍從剃染而舊習亦為稍更然於宗教未有開悟一日讀唐張拙偈至斷除妄想重增病趣向真如亦是邪句舍然大笑曰謬矣何不道斷除妄想方除病趣向真如不是邪時旁僧謂豫曰公以為張拙偈錯耶若張拙錯或錯一字何下句亦錯豫聞之不解遂疑悶經歲弗能已一日忽醒曰渠本不錯乃我錯耳既而自設問答如何是斷除妄想重增病曰披蓑衣救火如何是趣向真如亦是邪曰罪不重科從此於禪家機緣語句頗究心焉而於教乘汗漫猶未及也及讀天台智者觀心頌始於教有入時豫有偈曰念有一切有念無一切無有無惟一念念沒有無無洎萬曆元年北遊燕京謁暹法師於張家灣謁禮法師於千佛寺又訪寶講主於西方庵末後參遍老於法通寺遍問汝是甚麼人對曰江南寒貧晚士曰來京城作甚麼對曰習講問習講作甚麼曰貫通經旨代佛揚化遍曰汝當清淨說法對曰即今不染一塵遍下炕搊豫衣曰汝道不染一塵這好直裰向甚麼處來適旁有僧侍遍曰直裰當施此僧遂施之遍見豫內尚有衣大笑曰脫去一層還有一層自是豫往來遍老之門觀其動履冥啓豫多矣又有普照師者臥法通遍室亦契愛豫嗚呼遍老照師豫違茲範奄忽十九寒暑法堂塵積黃葉萋萋聊具瓣香以表素思遍老有靈伏惟享之豫聞世諦有父則有子嗣微嗣則人類絶然有宗嗣焉有恩嗣焉而出世法中則有戒嗣焉有法嗣焉豫於遍老之門未敢言嗣若所謂德則此老啓迪不淺焉敢忘之茲敘脫白顛末宗教所自於弔辭者蓋實有報德之思焉悼廬山黃龍徹空堂師文凡寄形於大塊閒者無論智愚前乎千百世後乎千百世羣羣而生逐逐而死豈可以數計哉唯有道者雖物生亦生物死亦死然生不以形勞神死不以神計形不以形勞神則同生於萬物紛擾之中而其神常靜不以神計形則神離形時譬夫人將澡沐脫故弊衣耳我堂師默持金剛般若經三十餘年南北馳驅開山創業於天地之陽人勞師亦勞人息師亦息其中人情百端世事變幻若寵若驚或榮或辱此卷金剛經未始須臾放下以故即世時以持經力形不纍神且得慈聖皇太后頒大藏經以光其既寂云雖然衲子家平生於空閒寂寞之濵抱赤獨立天不可得而清我地不可得而濁我前千百世不可得而弊我後千百世不可得而新我又不以天下共譽可得而光我天下共毀可得而掩我況於外榮乎某甲與堂師為道義交比自峨嵋順流東歸道出潯陽遙見匡廬不覺潸然淚墮余昔與師共樂於此今五峯蒼然龍潭湛爾而師已逝矣嗚呼孰知逝而不逝者師乎師乎鑒我之寸赤乎持此經以保厥後乎贈少宗天恩二開士禮補陀還燕文燕之房山縣上方兜率寺隆澤二開士慕補陀有年矣既包腰下黃金臺由潞河之彭城折蘆渡江浮淮絶海出沒於風濤百險一朝登補陀若窮子還故山積懷欽渴唯慈父是覲安知有身心哉於是觀音大聖為之現身不亦宜乎或聞而駭且疑之彼二上人者蘊何德業菩薩特為之現身耶是不知萬物一物萬神一神以身心未忘力不能會真始有凡聖之隔苟能會真菩薩與衆生未始不神交也故嘗聞之能敬重自己佛性則一切凡聖皆可以交神之道見之然則二開士親覩我大聖之容如子見父本家常事奚駭之有雖然道德之變如江湖之日趨下也天下不貴性觀唯貴情觀如咸體咸爻初本一卦即體觀之其神未始不全也以爻觀之則不勝其紛紛矣噫安得人之忘身心而親覲大聖於日用之閒哉
