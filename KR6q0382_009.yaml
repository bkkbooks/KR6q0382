body:
  text: 明憨山德清閲法語長松茹退序憨憨子不知何許人其應物之際多出入乎孔老之樊然終以釋氏為歇心之地其所著書曰茹退者乃自貶非暴耀也夫何故立言不難難於明理明理不難難於治情能以理治情則理愈明理愈明則光大故其所立之言天下則之鬼神尊而訶護之憨憨子自知不能以理治情以飲食不節而致病病生復不畏死猶妄著書譬如牛馬不能力耕致遠枉費水草之餘唯所退者存焉耳名其書曰茹退不亦宜乎雖然迫而後應與夫不扣而自鳴者不可同日語也潯陽有匡石子者謂憨憨子曰石兄來慈搆長松館於此有年數矣徒廠然於青松白雲之間且岷江濤生聲雜鐘梵境不可謂不幽也然未得高人勝士擊無生之磬震緣生之夢則夢者終不覺矣豈至人之存心乎哉憨憨子愀然久之曰敢不唯命乃長長松為牛馬焉長松茹退諸法無生何謂也心不自心由塵發知塵不自塵由心立塵由塵發知知果有哉由心立塵塵果有哉心塵既無誰為共者若謂無因烏有是處吾以是知山河大地本皆無生謂有生者情計耳非理也故曰以理治情如春消冰千年暗室一燈能明一燈之明微吹能冥明暗果有常哉如明暗有常則能見明暗者非常矣知此者可以反晝為夜反夜為晝而能晝能夜者初無晝夜也明暗無代謝謂有代謝者隨分別始至也如分別不生明暗何在悲夫明則能見暗則不能見是謂塵使識若識能使塵則明暗在此而不在彼矣故曰若能轉物即同如來火性無我寄於諸緣外諸緣而覓火性何異離波覓水者哉火性既如此彼六大獨不然乎噫道遠乎哉觸事而真聖遠乎哉體之即神今觸事不能真體之不能神蓋分別性未亡也無塵智亦未明也明暗生晝夜晝夜生寒暑寒暑生古今脫離吾現前一念彼皆如石女生兒故曰十世古今始終不離於當念又曰覓心了不可得雖然了不可得而有如無可得則不可得者曷能獨存哉如來藏中不許有識此古人之言也吾則不然衆人心中不許有如來藏夫何故凡聖皆獨立故譬如一指屈伸正屈時伸何所有正伸時屈何所有一現前一不現前固不同而全露指體本無優劣故曰師子遊行不帶伴侶空外無色色外無空空兮色兮根情而有外情而觀則空色奚寄故曰情為化母萬物皆子母亡子隨乃自然之勢也或曰有可情化空豈能化憨憨子曰空待色有色化空殞此理之必然者也子何獨疑道不生虗則有形者何所置之人心不虗則無窮之善自何出焉故曰虗則能容能容則大大則無外無外則獨立而獨立者在堯不加多在紂不加少然堯得之紂失之也性變而為情情變而為物有能泝而上之何物非性五行相生復能相克天下好生而惡克殊不知外生無克外克無生故達者知生生克聞死不惑知克生生聞生不盈出者有隱者之心處者有出者之情皆惑也夫出而不決為忠不徹處而不果是謂大惑噫大惑不除雖處於幽巖深壑之間何異市朝見水不能渡者以其無筏見空不能蹈者以其無翼然筏與翼皆屬於木木生於土由是而觀是見土不能渡不能蹈也古之人有知於此者故能不筏而浮滄海不翼而履太空我不待我而待於物物不待物而待於我兩者相待而物我亢然故廣土地者見物而忘我略榮名者見我而忘物一忘一不忘何異俱不忘唯俱忘者可以役物我鳥能飛魚能遊然微空水則翼不可展尾不能動故野馬奔於遠郊長風遊於太虗苟無肆足之地容怒之天則殆而已矣故君子之處小人若不能使之各得其所用而不棄則君子聞道奚益於世待欲熾始乃治之何異一杯之水救積薪之火也唯為之於未有所謂未昏而我本明未動而我本靜慎之可耳如明極則照生靜窮即動起照為昏媒起為動引故聖人預知此乃設止觀之藥治昏動之病一朝病除藥廢則向我本明本靜者又不名明靜乃曰定慧者蓋不欲忘其復性之功也飲食男女衆人皆欲欲而能反者終至於無欲嘻唯無欲者可以勞天下可以安天下身非我有有之者愚也破愚莫若智智不徒生必生於好學學而能辨之非智安至此故曰學非是道然足以破愚愚破智開始可入道矣能病病者病奚從生以不能病病我故病焉然病之大者莫若生心心生則靡所不至矣豈唯病哉故曰眼病乎色耳病乎聲心病乎我唯忘我者病無所病可以藥天下之病松本無聲風入濤生銅本非鏡鏡成生明無情者有情之待也無聲者亦有聲之待也不明待明明即不明聲即無聲情即無情故曰有待無待者皆無自體唯自心建故達心無我者雖處吉凶之域而吉凶不可得而惑無物不神不神有心心有而能無者無豈能醉哉無不能醉有不能昧可以顛倒天地有無萬物神耶非神耶刻木為魚魚腹空虗以物擊之聲出於無無能出聲無果無乎聲從無出聲果有乎噫舉一類諸何物能愚有形至大者莫若天地無形至大者莫若虗空有道者知彼二者皆自心影響故見空不空見形非形龍為鱗蟲之長孰不賓焉然長而有欲則人可以豢之豢之者犬豕也今龍亦可豢之豈真龍也哉介然有知唯施是畏此老氏之言耳曹溪大鑑則曰對境心數起菩提作麼長則又若有知不乖無知也老乎曹乎同乎異乎吾不得而知付之副墨之子俟來者辨之今有百人焉異口而同音使聽之者疑若一人焉嗟夫口異者情之所感也音同者性之所出也敢問性對曰音之前心之初唯無思者可以契同耳世人見畫鳥以為非真見飛鳥則以為真鳥也殊不知人借五行為身析而觀之身則不有何況有人人既不有則畫鳥飛鳥獨能有哉故曰真待假有假忘真隨忘若然者何真何假芻狗未陳錦繡飾焉既祭牧竪踐焉夫芻之為狗芻不增多狗復為芻芻不減少由是而觀狗徒有名實唯芻也或者見芻則以為薪見狗則以為畜狗能防盜薪能傳火盜能殺人火能燒山一相因萬相因以至無窮竟不可以知識知故曰一波才動萬波隨學所以破愚也今有人於此不以學破愚而以學周欲即此而觀則聖人設教本在藥衆人之病今藥生病則聖人之技窮矣故曰醍醐成毒藥也豆在瓶中春至則能萌芽人在欲中覺生則能夢除故曰有大覺而後知有大夢也夫大夢者併夢覺而言也夢覺則夢除覺覺則覺除覺夢俱除始名大覺焉莊周夢為蝴蝶蝶夢為莊周此就有心而言也吾則曰我夢為山河山河夢為我此該有心無心而言也噫能有心能該有心無心者果夢耶果不夢耶萬物本間閙之者人耳人而不閙天下何事故垂衣裳而天下治者非出有心也一盆之水一拳之石足以盡泰山滄海也夫何故大不自大待小而大小不自小待大而小待小而大則天地可以置於芥子矣待大而小則毛孔可以容乎虗空矣虗空無形毛能容之況天地萬物者乎故曰毫釐非細間關其內虗空非大廣容無外種松所以棲鶴也養鶴所以代風也故列子泠然乘風而遊於八荒之外返而失其故居猶謂在八荒之外也故曰道非有無豈可以方所求之哉道非遠近豈可以去來疑之哉唯不求不疑者非上智則下愚矣心有真心妄心真心照境而無生妄心則因境牽起者也真心物我一貫聖不能多凡不能少妄心則境有多種或以有為境或以無為境或以諸子各偏所見為境故曰心本無生因境有六合之外六合之內羅籠盡矣又老氏以身為大患身無患無而不言所以然之旨曰假借四大以為身則無身之所以然明矣夫心本不勞形纍之勞身遺則心無能勞之者心果有乎昔人有言全神者心將遺之況於身乎故曰有心則罪福有主心忘主無雖有罪福孰主之哉我心未起義路莫造故窮天下之辨盡天下之義皆謂之以網張風翦龜之毛也雖然善行者無足迹善言者無舌力如是言如是行謂之不言而言不行而行不言而言者言滿天下本無言不行而行者行遍天下本無行故曰不行而至不言而信也衆人以為高不過乎天厚不過乎地故曰天高地厚無能匹者殊不知天地雖高厚亦有形之大者夫有形離無形形何所從無形離有形無形誰明明也者有無一致之謂也勇而不義謂之暴仁而不明謂之倒倒也者以小傷大之謂也唯仁不仁乃合乎道月在秋水春著花容雖至愚者亦未有見之而不悅也殊不知外我一心則水無所清月無所明春無所呈花無所榮知此者可與言即物會心之大略也生公聚石為徒與之談涅槃大意羣石皆點首而肯之夫石本無心豈有耳哉無心無耳於意則肯首於聲則能受肯之受之心耶耳耶見欲忘身者乃欲重於身也見身忘欲者乃身重於欲也欲重之人雖多才奚為唯聖人因其欲而用之終使之無欲焉重身之人固能忘欲身為欲本心則主之而不能忘心則身亦欲也故曰唯忘心者則身無所勞蛇可以為龍衆人可以為聖今衆人滿天下而登聖者何稀焉噫風行於上俗成於下顧其鼓舞者何如耳如鼓舞者不得其人雖聖人滿天下有若無也稚子弄影不知為影所弄此談子之言也吾則曰影弄稚子不知為稚子所弄談言可以義求吾言難以理通談兮吾兮孰先孰後孰智孰愚吾不得而辨且付之無辨子焉吾讀莊子乃知周非老氏之徒也吾讀孟子乃知軻非仲尼之徒也夫何故老氏不辨周善辨仲尼言性活軻言性死辨則失真死則不靈失真不靈賢者之大疵也羊不知驢驢不知馬馬不知龍謂驢不能百里謂馬不能千里謂龍不能蜿蜒九霄是皆以己盡人者也夫人可以己盡則道可以力得矣何君至尊臣不得而獻之父至慈子不得而傳之耶故曰人不可以己盡道不可以力得唯舍己盡人者無情不盡無道不得也日高則羣陰自滅雲厚則杲日失明今有人於此不以無生之水沃貪欲之火而爍靈焚和終無息矣晝想之夜夢之想想夢夢積歲成劫萬古一息或謂之延或謂之促延兮促兮有兮無兮唯離念者乃知此也岷山而至石頭從高而下也岷山如在天石頭如在淵天上有水魚龍藏焉淵中有陸人物寓焉在上者不以陸低而設底脫之防在下者亦不以水高而憂衝洗之患者命也業也故曰知見每欲留於世間業運屢常遷於國土男見女喜悅女見男亦喜悅男女雖別而喜悅未嘗不一也噫喜悅之初有不纍於喜悅者存焉人能知此則喜悅乃思無邪也儉可以積福亦可以積禍吾同衆人之儉儉非吾儉福必積矣如儉人而不儉己禍必積焉故曰同人之儉者人雖餓死而不怨儉人而不儉己者雖溫飽而不懷也少而不老老而不病病而不死則生者無媒矣生而不少少而不老老而不病則死者亦無媒矣噫死為生媒生為死媒譬如環輪端從何起故曰生本無生死本無死或者橫生橫死耳吳人嗜鱸魚蓴菜燕人嗜駝乳牛乳蓴菜驢魚牛乳駝乳味雖不同嗜無兩種鱸魚蓴菜衆人以為鮮駝乳牛乳衆人以為羶噫如舌根不搖識不嘗味天雨甘露地産甘肥孰知嗜哉公之私之皆自心出公則天下喜之私則天下怒之喜則福生怒則禍生知福生於公而不能以公滅私者欲醉其心也制欲不難唯自重難人而能自重雖高爵厚祿不能動之果能昭廓不動至於動而無欲則幾於聖矣古有節婦謂餓死猶勝生失節失節生猶死遂餓而死是以天下仰其遺烈如月在寒空也皎如青天忽爾生雲吾清淨心中念生忽然念自生耶固有生之者乎生而能返出而能歸者也生而不返流浪他鄉竛竮辛苦朝之莫之弗得暫安如長風驅雲雲雖無心茫茫不能已者風使之然也故曰境風浩浩凋殘功德之林心火炎炎燒斷覺山之路山上有天誰得見之飲食之於人也所以資其生耳今有人於此不以飲食資生反乃傷之者蓋不節之過也飲食而能節之小則可以資一身一家大則可以資天下故曰智者能調五臟充而用之能調天下非誇也昔之人有力拔山者氣吞天下者人在地上口在人面而能拔山山地也口亦地也謂之地拔地地吞天下於理則無悖反是雖有其辭乃過壯之耳天下以美婦人譬好花以好花譬美婦人殊不知以人譬花以花譬人而能譬譬者非花非人也故曰境緣無好醜好醜起於心胡馬依北風越鳥巢南枝南人解乘舟北人解乘馬人物雖殊便常則一也故使農人揖讓於明堂之上置縉紳於耕鋤之間久習雖亦安之終非其常也是以聖人不以反常教天下但以中庸教之者率其常而已矣常則久久則遠遠生大大無不盡何必反常桃李芳濃遊蜂不待召而聚花落亦不待遣而散殊不知花有榮悴而樹無代謝夫樹無代謝則今日之零落安知不為異日芳濃之本與昔人有方受相印而貴震天下即題詩於館壁間曰霜松雪竹鐘山寺投老歸歟寄此生噫大悲菩薩手眼何多果乃一些瞞他不得良有以夫開眼見山水合眼夢山水開眼所見世以為真合眼所見世以為不真殊不知真與不真離心無塵塵尚非有況山水乎哉聞鐘聲而能卜陰晴者耳聰英於人者也過萬馬一見而不忘其毛色者目明雄於人者也故世皆以為極聰明之人也雖然合聰不聰合明不明聰之與明果聰明歟果不聰明歟昔人有言曰世人之耳非不聰耳聰特向經中聾世人之目非不明目明特向經中盲若然者彼能卜陰晴之聰辨馬色之明豈真聰明也耶孟軻言性善荀況言性惡楊雄言性善惡混夫言善言惡者是析一而為二也言善惡混者是併二而為一也噫性也者非一非二而一而二孰能析之孰能併之吾以是知析之者併之者皆畫蛇添足者也吾讀墨子然後知其非大悖於孔子者也吾讀楊子亦知其非吝一毛而不拔者也今曰墨子悖孔氏楊朱吝一毛是皆不讀楊墨書者也楊墨骨已朽而不朽者寓於書然不讀其書而隨人口吻以妄排之假使楊墨不死聞其排語寧不捧腹而絶倒歟十習六交惡情所積果熟徵報所以酬因也若夫十號具足萬德周隆亦善情所積果熟酬因也然惡積則受苦善積則受樂如一心不生萬法何咎人而知此則將善不敢恃況敢為惡而甘受苦哉故曰善雖是美惡固非善善不藉惡則為善無資矣惡不藉善則為善無師矣今有人於此必欲逐盡小人然後天下始可治者豈聖人之心也耶火勝水水必成湯水勝火火必成涼是故易之泰卦貴權在君子亦使小人各得其所也然聖人不病於臨而病於大壯者至泰且固守而不敢進噫非憂深慮遠者孰能知此吾讀易然後知六十四卦本無常性故曰周流六虗上下無常所以性之情之惡之好之凶之吉之循環無端變化無窮矣中庸之未發即易之未畫發而皆中節即易之已畫或曰中或曰和或曰道或曰易中也者未發不昧已發之謂也和也者已發不乖未發之謂也先天謂之道後天謂之易故曰形而上者謂之道形而下者謂之器器成則易行乎其中矣外器而求易猶外卦而求爻也寧有是處深山大澤龍蛇生焉茂族巨姓善惡出焉苟不得有福慧者為之長折攝於未有則滅族殺身之禍將必不可免矣故曰一微涉動境成此頺山勢則未至時不知是福禍至而追思無禍之日真大福也豈待必得萬鍾然後為福哉勤於善者不知善之所積甘於惡者亦不知惡之所積善之所積以其不知福莫大焉惡之所積亦以其不知禍莫大焉良以不知生於所忽禍之始也知而勤之福之梯也故曰忽則昧心知則不昧人之心慮整之則熱惱將自洗落而漸入清涼之域忽而不能整則衆苦不召而至矣至則難遣曷若整之於未至用力少而收功多耶故曰諸天正樂修羅方瞋是皆心慮弗整被其所覆也覆則本心隱蔽非明而勇者心慮豈易整之哉轉識成智非解圓而精於止觀者未之能也夫佛性有三緣因了因正因是也緣因不明了因不生了因不生正因難冥冥也者所以復之也今有人於此欲復其性而忽了因欲發了因而忽緣因譬如不穀而欲苗不苗而欲安有是理乎文始雖言轉識成智而不言轉識成智之所以然所以然不明是有名無實也或曰敢問轉識成智之所以然對曰若能探釋氏唯識之書乎若能悉緣因了因正因之旨乎曰未也將能之矣噫若果能之則轉識成智之所以然乃在子而不在文始也文始轉識成智之説但言其成不言其所以成所以成之説不明則義由何精凡義精乃可以入神致用耳雖然義有多塗豈易言哉性變而為識識有多種曰含藏曰傳送曰分別曰見色聞聲嗅香嘗味覺觸知法總謂之八識唯含藏前五果轉非因轉也六之與七乃因轉非果轉也然彼七識皆坐轉非行轉也行轉也者唯分別事識之能事也夫何故以其量備心所備故也合理之謂比謂比度而知知而不謬於聖經合轍故曰比量不合則非量矣現量也者初無分別照境無思也是以有志於轉識成智者苟非精辨事識則轉識成智所以然之説終不明矣吾故曰文始言其成不言其所以成也吾讀文始雖愛其文章精潔光而且曠也精則不雜潔則清而無塵俗習光乎其𦦨不可掩曠乃包博沖遠非淺識者可窺也雖然精之潔之光之曠之其粗也不可精不可潔不可光不可曠者豈精精潔潔光焉曠焉而能暴之哉吾以是知不能暴者精而至於密者也故其言曰聖智造迷鬼神不識不可為不可致不可測不可分強曰天曰命曰神曰玄合曰道者亦密之之謂也飢飽無常法故飽可以治飢飢亦治飽非但飢飽可以相治生能治死死能治生死若不可治則生生之道息矣生若不可治則生者不死矣今乃生必有死此天下之共見者也吾以是知生本無生死本無死而謂禍福莫烈乎死生者安知此乎般若總八部雄文六百餘卷若天風海濤音出自然文成無心可謂出聖之智母陶凡之紅爐也而弘法大士乃束八部雄文成心經字無三百而顯密要領罄備之矣或者再束心經歸一句使反約精求者習化心通則我法二空無勞舉足彼岸先登矣雖然二空之解未精而入神致用之機豈易發哉初心學者當先求精我空之解曰我之有我根於五蘊若離五蘊我本無我且彼聚而成我耶散而成我耶聚而成我聚必有散我豈真我散而成我我則有五聚散求之我終無我是謂我空彼五者初唯識變而有識如幻夢精而觀之識化法無是謂法空二解既成依解起行當於憎愛榮辱之地死生聚散之場力而行之則又不在解而在行也吾讀稜嚴始悟聖人會物歸己之旨而古人有先得此者則曰若人識得心大地無寸土又曰我今見樹樹不見我我見何見稜嚴文字之妙委曲精盡勝妙獨出此眉山之言也口腹纍人陽物多事至於滅身敗國亡家者豈少哉然得其機而制之不難不得其機而強制之非惟無益亦足致狂夫機者何噫心未生時心將生時心正生時心生已時機乎機乎果在誰乎知此則口腹絶長蛇封豕之技陽物無星火燒山之猛矣老氏宗自然夫自然也者即無為之異稱也無為即不煩造作之謂也若然者則聖人設教將教誰乎何者以善既自然惡亦自然則無往而非自然果如此則衆人之希賢賢希聖始從勉然而終至於自然之説老氏大悖也故老氏但言其終而略其始之説行則薰惡為善之教將戰而不能全勝矣夫始終一條也故衆人希賢賢希聖此盡其始也聖希天盡其終也盡始也者以理治情之謂也盡終也者復其性也性復則向謂一條者昭然在前矣夫復何事至此則知自然俱掉棒打月耳終天下之道術者其釋氏乎六合之外昔人存而不論六合之內論而不議非不可論恐駭六合之內非不可議恐乖五常之意今釋氏遠窮六合之外判然有歸近徹六合之內畫然無混使高明者有超世之舉安常者無過望之爭是故析三界而為九地會四聖而共一乘六合之外唯不受後有者居之六合之內皆有情之窟宅也能依者名之正報所依者謂之依報聖也凡也非無因而感皆因其最初發心為之地有以緣生為歸宿者有以無生為歸宿者唯佛一人即緣生而能無生即無生而不昧緣生遮之照之存之泯之譬如夜珠在盤宛轉橫斜衝突自在不可得而思議焉故其遠窮近徹如見掌心文理鏡中眉目也吾故曰終天下之道術者其釋氏乎憨憨子正沐時以背示匡石子曰若見廣長舌相乎曰不見噫見生不見善反不見豈惟背有舌眼有耳將毛與髮無往而非見矣一條也者初本不遠在吾日用中耳日用而不知者外物纍之也殊不知物不自物待我而物我若能忘我物豈能獨立乎故曰唯忘我者不惟物不能纍物且為之轉也一盆之水奚異滄海謂之盆謂之海者情而已矣如情忘則海尚不有何況於盆是時也昭然現前者盆乎海乎通紅而告我者熾炭也飄白而告我者飛雪也紅白雖殊告我則一耳色為五塵之先先者能告則餘者寧弗告哉雖然具有目目耳耳以至意意者亦惡能領旨乎緣明有見是謂衆人不緣明能見是謂聖人然而鴟梟夜撮蚤虱察秋毫晝則瞋目而不見丘山因暗有見明成無見又虎狼貓犬晝夜俱見則與不緣明之見何別嘻虎狼有待則見而聖人有待亦見無待亦見故曰聖人處明暗之域開物成務明暗不能纍焉呼聖人聖人應呼衆人衆人應説者以聖人之應謂之唯衆人之應謂之阿夫唯與阿皆應而有不同者情也同者性也性與情相去不遠故曰性相近也習相遠也既近可以習遠遠者獨不可習近乎吾以是知性本無常情亦無常性若有常情何所生情若有常性何所光光則圓圓則明明即覺也圭山曰統衆德而大備爍羣昏而獨照故名圓覺水有蛟龍山有虎豹樵者不敢入焉漁者不敢浴焉以其有物故也知其有物而避之不若忘我忘我物亦忘之故古之人能與蛇虎為伍而兩相忘者豈有他道哉風雨霧一耶三耶謂之一則風本非雨雨本非霧霧非兩者謂之三非霧則風雨無本故曰霧醒成風不醒成雨三即一兮一即三兮三即一三何所有一即三一亦本無知此者可與言一心三觀之理也鑿地可以得泉披雲可以見天地也雲也情之譬也泉也天也性之喻也今有人於此欲堅於地濃於雲且恣而弗制不唯傷生終必滅性也孟軻排楊墨廓孔氏世皆以為實然是豈知孟子者歟如知之則知孟子非排楊墨乃排附楊墨而塞孔道者也雖然孔氏不易廓而能廓之者吾讀仲尼以降諸書唯文中子或可續孔脈乎外通或有能續之者吾不得而知也人身生蟣虱則怒其咂我輒捫死之殊不思大道為身蟣虱天地天地為身蟣虱萬物人乃萬物中之一物耳人能推其所自則知離大道無天地外天地無萬物而所為人者特靈焉而已即形骸而觀之蟣虱與人何異以為秒而捫之非忘其所自者孰能忍乎古皇徵慶喜曰汝心果在內耶對曰心在身中曰果在中者汝能見五臟六腑乎曰不見愀然乃再徵之曰汝處室中見室中之物乎曰見今汝言心在身中而不能見身中之物法喻相悖於理非通也喜窮於內必奔於外殊不知內為外待外為潛根待潛根為明暗待反觀見內為中間待中間為隨所合處待隨所合處為一切無著待則遍計橫執緣待而立七處也天機深者了內窮即外窮虧一喪兩則餘處寧煩排遣然後省哉八者可還皆前塵耳唯能見八者不可還見精也即此而觀則見精本妙萬物而無纍明矣今有人於此緣明則見不緣明則不見此果見精之咎乎噫明了不起五根本妙故眼可以聞聲耳可以見色也如喜怒有常既喜則終不能怒既怒則終不能喜以其無常所以正喜時忽聞不可意事隨勃然而怒正怒時忽聞可意事隨欣然而喜故曰喜不自喜物役而喜怒不自怒物役而怒嗚呼物奴我主我不能喜怒物役之而喜怒何異奴之役主而人為萬物之靈竟不能役物終為物役可不悲哉吾身至微盈不六尺六尺在大化之間何異大海一漚然是身所託者猶多焉蓋以至微之身毛孔有八萬四千一毛孔中一蟲主之吾飢彼亦飢吾飽彼亦飽吾為善彼皆蒙福吾為惡彼皆嬰禍故有志於養生者生不可輕如果重生先養其主主者誰主乎生者也噫能主乎生者果有生乎是以唯無我者可以養生主生既無我生果生乎知此者可與言養生之道也智者老人以七喻譬五欲之無益於人也故其言曰五欲者得之轉劇如火益薪其𦦨轉熾五欲無樂如狗嚙枯骨五欲增諍如鳥競肉五欲燒人如逆風執炬五欲害人如踐毒蛇五欲無實如夢所得無欲不久假借須臾如擊石火學人思之亦如怨賊嗚呼一微涉動五欲生焉五欲害人七喻作焉能善觀一微者則於因成假中了知五欲初無所從也夫何故未生五欲正生五欲五欲生已四運精而推之則一微非有唯一微之前者固自若也魚在水中不知水人在心中不知心如魚能知水人能知心魚果魚乎人果人乎是以滴水可為六合之雲微塵可容萬方之剎者非龍非聖人孰能之哉吾以是知為龍不難魚知水難為聖人不難人悟心難故曰日用而不知者衆人也天地可謂大矣而不能置於虗空之外虗空可謂無盡矣而不能置於吾心之外故以心觀物物無大小以物纍心心不能覺惟能覺者始知心外無物也故曰諸法無法體我説唯是心不見於無心而起於分別積字成句積句成章積章成篇積篇成部部所以能詮所以然之説也所以然之説不明則字字句句章章篇篇如蟲蝕木偶爾成文蟲豈有心乃蝕之乎蟲既無心寧有義寓於文哉義也者心之變也如喜怒未發但謂之中已發則曰仁曰義曰禮曰智曰信仁有仁之宜義有義之宜禮智信亦各有其宜如春宜溫夏宜熱秋宜涼冬宜寒冬而不寒則謂之不宜也是故會衆義整而不紊謂之理由理而行無往不達謂之道由道而造乎歸宿之地謂之德德也者如得字成句得句成章得章成篇所以成部也吾讀洪範乃知箕子聖人也聖人而不在位紂在位商亡可知已箕謂五福六極唯敬天愛民者天以五福應之反是則以六極應之由是而觀則報復之理因果之條釋氏未東之日而中國有欲治天下者未始不嚴於此也今謂因果之談報復之唱乃釋氏鼓惑愚者之技豈君子所當道哉噫是説也不唯得罪於釋氏亦箕子所當惡也畫屏花鳥非不悅目也如欲使之香使之鳴雖聖如神禹吾知其不能也今有人於此智不能周一身力不能縛一雞衣之冠之而周旋揖讓非不悅目也然使之為上治民何異使畫花香畫鳥鳴乎水在釜中非火不能熱也種在土中非春不能生也愚在心中非學不能破也今天下學非不學也所學在於周欲而不為破愚是以世喪道道喪世世道交喪之風扇之未已也噫扇之未已則將有不可勝言者至矣伊蘭之臭天下之至臭也而得旃檀熏之則可以為香今謂下愚者終不可教何異伊蘭終不可使之香也如伊蘭得旃檀而熏之亦可以為香則下愚何獨不可教之但教而無倦為難果能教而不倦則金石可貫人雖至愚知覺固有即其固有熏之以教誨之香久而至於熟則其至愚之臭亦熏而成香矣故曰教而無倦惟聖人能之夜夢地裂將欲逃之逃前恐前裂逃後恐後裂逃左右恐左右裂是時也計無所出猶逃心不能已恐怖萬出既春雪撲窗春夢頓覺則床前後床左右地本如故裂何曾裂橫謂裂者乃遍計耳如故者依他也噫遍計雖忘依他不忘猶夢覺覺存覺為夢本夢本不忘豈真覺也耶本惟一觸了觸非性則謂之妙觸受觸所轉乃觸而已妙則失焉故曰妙觸宣明若然者則廣長舌相不在口而搖於身矣寧惟身哉待身者觸觸既為入妙之階則聲聲色色皆廣長舌相也雖然苟非聽之於踵則音豈易領哉豎而趍者謂之人能豎者亦可以橫非有豎而非豎者惡能豎豎橫橫有知此者可與言性之似也力不足生畏理不明生疑是故大言而欺人者畏人者也觸事生疑無事謂事者乃不明所致也心既不明則中無主中無主謂我能見能聞聰明特羣非愚而自欺者惡至此歟孟軻見王公大人則藐之藐之也者有心乎無心乎如有心非能藐人乃自藐也如我無心奚用藐為彼王公大人一觸無心之人將忘勢之不暇何待藐之然後使之服耶故曰飄瓦撲人人不怒虗舟觸人人亦不怒知其無心故也君子懷道而遊於諸侯之門苟不以虗心應之則無所不至矣惠不可妄受受則當思惠之所自來愛我而來耶哀我而來耶愛出於敬哀出於憐敬則我何德之有而當其敬憐則既為男子豎趍於天地之間使人憐我我不能憐人豈丈夫也哉故曰幣厚言甘道人所畏牡丹諺謂之花王蓋尊其艷麗之富耳殊不知青松托根於白石之上當風霜𪷤洌之時為雲濤於萬木之叢使聽者低回而不能去以為海潮初鳴夫松鳴使塵心蕩然雷鳴能使羣蟄頓醒鐘磬鳴能生人道心以此言之則牡丹之艷麗惡能有青松徑節之風哉梅以香欺雪雪以白欺梅兩者各恃其所長而相欺互不能降故酣戰不已噫天風忽起雪捲花飛則向之所恃者安在故曰恃長而欺人者不能終海有大魚背負萬山山有大獸尾占千里衆人聞而不信茲請實之微四塵則大地不有微三塵則大水不有微兩塵則大火不有微一塵則大風不有然地以水浮水以火浮火以風浮風以空浮空以心浮夫心也者萬物一體物我同根者也以此而言則焦螟可以負太山螻蟻可以抗雷雨魚大而背負萬山獸大而尾拖千里夫復何疑衆人愛富貴而惡貧賤所以富貴貧賤之纍至於死猶不覺也殊不知富貴貧賤本是一條而一條之上強愛之強惡之豈理也哉故曰理有情無者聖人得之衆人失之噫得之者雖死生在前直使為一條況富貴貧賤乎死生根於有我有我根於無我若然者則有我乃無我之枝條也而善反者即枝條而求根本譬如甕中捉鱉囊中探物耳奚難之有雖然衆人有我習熟無我習生熟而能生生而能熟非大明至勇者豈易之哉有我無我譬一指屈伸屈伸無常指無隱顯今有人於此見屈伸而忘指體則在堯而不能加在紂不能損者終失之矣聖人衆人本唯一光然聖人不假日月燈之明直用本光自照所以處昏暗之中而昏暗不能昧也衆人則不然本光固有而不能用反緣日月燈之明方始得見此明一謝則暗相現前是時也伸己指而不能見況見天地萬物者哉滄海無際氷凝千尺一夕陽回氷生微響則氷復為水可立待也吾觀復卦一陽生於五陰之下陽似不能勝陰然機在陽而不在陰則陰不勝陽多矣如初發心大士即成正覺蓋衆人生於五欲火中一旦心發清涼非至明大勇者孰能臻此故因該果海譬層氷之初泮則知復水不久焉果徹因源蓋氷離水無體故也噫氷水似殊故質礙之與融通大相懸絶然離氷無水離水無氷知此者可與言雜花之大意矣老氏以為五音可以聾耳五色可以瞽目介然有知可以惑我無知殊不知耳目無所有有因身有知亦無所有有因境有嗚呼身心既有則死生榮辱好惡是非靡所不至矣是以大覺夫子教天下以四大觀身四蘊觀心而八者現前則身心並無所有身心既無則所謂死生榮辱好惡是非譬如片雪飛於紅爐之上惡得有哉然身心之執雖解而八者猶未滌除復教之以四塵觀四大前境觀分別心如天機深者即了悟外四塵則四大無所有外四大四塵亦無所有外前境則分別心亦無所有外分別心則前境亦無所有能所互洗物我蕩然是時也無身之身無心之心昭然在前矣始知形充八極大患莫能纍焉智周萬物熱惱莫能焚焉駕四弘之輪乘十願之馬飛行無際碾窮色空盡使博地含靈頓躋覺地乃大士之能事也心本無我而靈故不可以有我求之亦不可以無我求之以有我求之渠既無我豈不乖渠耶以無我求之渠既靈然豈不乖渠耶既不可以有我求復不可以無我求則我終不可得渠耶果如此不唯衆人絶希聖之階即聖人繼往開來之功可得而泯已但渠非有無可求要在從緣會得故曰從緣薦得永無退失緣也者如衆人以十惡五逆之緣熏之則渠發現阿鼻之相乃至以人緣熏之聲聞大士之緣熏之則九界發現之相皎如日星唯佛一人若不以無作之緣熏之則渠且不能發現殊絶之妙相焉由是而觀九界之相既循緣業發現今有人於此能循緣業沂而上之則彼無我而靈者不待召而至矣宗儒者病佛老宗老者病儒釋宗佛者病孔病李既咸謂之病知有病而不能治非愚則妄也或曰敢請治病之方曰學儒而能得孔氏之心學佛而能得釋氏之心學老而能得老氏之心則病自愈是方之良蒙服之而有徵者也吾子能直下信而試之始知蒙不欺吾子也且儒也釋也老也皆名焉而已非實也實也者心也心也者所以能儒能佛能老者也噫能儒能佛能老者果儒釋老各有之耶共有之耶又已發未發緣生無生有名無名同歟不同歟知此乃可與言三家一道也而有不同者名也非心也今有人於此能讀四庫書而約者不明書多奚為夫約者心也心為萬化之主反不能自信乃勤朽骨糟粕惑矣或曰敢問心所曰在眼能見在耳能聞如生心動念即情也非心也噫惟明心者可與復性矣古有道戰德戰仁義戰智勇戰道戰無心德戰懷恩仁義戰乃所以安天下之生也智勇戰乃所以強遂其志也或有沒巴鼻戰者不得無心而敵敵則敗不得有心而敵敵則敗畏敗而不敢敵者亦敗噫惟雲門德山善戰之帥也義井筆録師説你的性剛一日遇諸般事如何忍得過去復問如何方忍得師説看得自家大自然忍得去復問如何看得自家大便忍得去師説天地大便能包容得萬物虗空大便包得天地我本來真心大便包得虗空師又説大端人不能容物無他為物障礙但自昧了真心便自小了稜嚴曰空生大覺中如海一漚發有漏微塵國皆依空所生漚滅空本無況復諸三有大覺真心本非有無可以形容得才昧此心便有虗空世界矣是故聖人處於死生禍福之域而死生禍福不能纍者無別奇特不過不昧心而已然此心雖在日用之中衆人不知不知即是無明無明者謂真心本有而反不知昧心而有虗空世界却膠固不舍三界裡頭總是一塊情大家在情裏要説超情之言如達磨遭六毒南嶽思禪師遭十餘毒蓋二老説話沒偷心便惹得許多好供養偷心情也無偷心性也處於情中而率性用事自古及今未始不遭魔外所害也然向後去害大則光愈大故君子常喫虧常得便宜師喚復你豎起拳來復豎拳師問你這拳是誰豎起復對是心豎起師問假若是沒了此手你的心何在復罔措師説你要在這裏自家查考看查考不出真是苦復求之不解請師開示師曰人都愚在這裏終日將個燈點到這裏又去人家裏討火去不能忘利者必不能任怨要想此身從何而有此身從何而去知其從何而有則知其從何而去易曰羣龍無首吉此象也如玩象得意則活者在我活者既在我則死者亦活矣至此則孰為意孰為象故曰若人識得心大地無寸土我則曰若人識得意意外本無象無象則無物無意則無我無物無我君子何怕多存物存我君子多不好宋之君子甚多只是各有其首首者我相也如各無意無必無固無我即王安石與諸攻安石者皆君子也要心器利無如甘淡泊要身器利無如間勞勤身在心裏所以運得身動心在身裏便運不動矣何以故如風箏在風裏所以風吹得風箏起如風在風箏裏則箏大風小小不能吹大也心是箇非裏非外的所以能裏能外他若是有裏外與裏外何異既與裏外無異自然裏外不能運裏外如裏外能運裏外金可博金水可洗水矣心有知覺氣無知覺四大是一氣之變一氣是四大之復故莊子曰氣聚則生氣散則死生生死死不過氣之聚散耳達人知其如此所以方生方死之間未嘗喜生畏死也不然則此五尺之軀便能拘限得這無邊無際之靈明矣如人以手運筆筆始能畫達者由畫推至於筆由筆推至於手由手推至於心由心推至於無我而靈者無我則無外外者內之待也我既無外內亦窮矣內窮則外不能獨立內外之情既枯則無內無外而能內能外者現前矣圓覺曰一切衆生皆證圓覺其此謂乎心不自有因境而有此六塵緣影之心也如此心不能查考徹了則本有靈明之心終不現前譬如浮雲未淨青天不露又世人論身時却雜心説論心時却雜身説所以身心頭腦終是不清楚如身心頭腦清楚了則會生死身為法身會煩惱心為菩提心不異屈伸己指耳人是有形之鬼鬼是無形之人謂人鬼有兩心無是理只是有形無形差別耳學人先要斷淫欲斷淫欲之道亦無多岐但能識破自身則眼前雖有西施之容子都之貌自然忘之矣然識破是明能忘是勇如明而不勇則多生染習如油入欲使之出亦不易易且道身如何識破得他先當推我未生之前是身果有耶果無耶有則何勞父母交姤而生無則既本原無如何無中忽有此身如是推究推究不已則此身一旦洞然識破了自身既識破了則他身不待破而破矣自他之身既破且道將何物為能所淫欲之具哉若如此推究未能識破自身當次觀父母交姤時母心先動耶父心先動耶父母心一齊動耶父母心不動耶父母心不動兩俱無心無心則無我無我誰生淫欲父母心齊動齊則一一則亦無能所淫心亦不能動父母先後淫心動先不是後後不是先本不相待淫心亦無動此以理推也非情計也又父母交姤時我無淫心身因亦無我有淫心父母不交姤身緣亦無須因與緣三者合方有身如三者合而果有身者則父分多少母分多少我分多少如是往復多少推之推來推去推去推來推到情枯智訖處則是身是有是無不待問人而自知矣知則明明則不惑不惑則西施子都皆我得無欲之前茅也又無我而靈者性也有我而昧者情也性變而為情性無邊際情亦無邊際情復而全性情無邊際性亦無邊際如水廣氷多氷厚水深也學問不多頭腦不過窮靈極數而已窮靈則無我而靈者全矣極數則有我而昧者不能昧我矣以數不能昧我所以一為多多多多為一在我而不在數也如形骸假五行而成非數乎如心形骸成而不生形骸敗而不死可以為數之主數乃心之奴也衆人則不然主反為奴奴反為主或者謂禪家但知性而不知命道家但知命而不知性此説非通也靈性也數命也未有能窮靈而不能極數者未有能極數而不能窮靈者設有窮靈而不能極數小乘是也極數而不能窮靈地仙是也如曰有物先天地無名本寂寥能為萬象主不逐四時凋能為萬象主者非靈乎萬象非數乎又有心統性情之説世皆知有此説知其義者寡矣夫情波也心流也性源也外流無波舍流則源亦難尋然此説不明在於審情與心心與性忽之故也應物而無纍者謂之心應物而有纍者謂之情性則應物不應物常虗而靈者是也由是觀之情即心也以其應物有纍但可名情不可名心心即情也以其應物無纍但可名心不可名情然外性無應與不應纍與不纍耳若然者情亦性也心亦性也性亦心也性亦情也有三名而無三實此乃假言語而形容之至其真處大非言語可以形容倣佛也故曰參須實參悟須實悟涅槃經有王者庫內之刀是刀光潔明淨不惟削鐵如泥亦可以照人妍醜削鐵如泥非利乎照人妍醜非明乎利而明非天下至寶乎我心決斷是非利於庫刀照物妍醜明如秦鏡如見可欲則利者不利明者不明矣故大丈夫常要胸中無物眼前無欲胸中無物則心可以包太虗眼前無欲則眼可以窮象先雖然知則易行則難復探䇿得五數師曰夫五者無我之數也無我而數數而無我得非窮靈而極數極數而窮靈哉何者如四方才定則中央定中央定則四方定未始有先中央而後有四方先四方而後有中央者也由是觀之不惟中央無我四方亦無我但衆人昏而不察理蔽於情謂四方自四方中央自中央殊不知外四方而求中央外中央而求四方得非索龜之毛求兔之角耶又身如中央地水火風如四方故金木水火若有我則不必攬土而成體土若有我亦不能為四行之資所以土不自土四行借而成體四行不自四行為土所寄如身不自身可以復還四大四大不自四大可以假借成身中央不自中央須假借四方而為中央四方不自四方須資中央而為四方噫知此説者則一理散為萬事萬事會歸一理譬如鏡中見眉目掌中視文理復何疑乎夫中四無我理也無我而中中四四事也所以然者外事無理外理無事猶外氷無水外水無氷也故曰若人識得心大地無寸土紫柏則不然若人會得理萬物一任閙我偏得清間逆順無煩惱如二四六八十此倚數也非本數也地水火風毫釐混不得似乎有我然合四者而為身則四者又無我故知身若有我亦不能復還四大身若終不能復還四大者則人有生無死矣又堅濕暖動如四方中央如身故外四方則中央不有外中央則四方亦不有外堅濕暖動則身決不有外身則堅濕暖動亦不有學者於飲食男女之場勝負不決猛作此觀自然理水日深人欲日淺矣有我而昧者舍得盡則無我而靈者方得全復問三世一身有是事乎師曰有良以身一而世三如人行路路有千里而行惟一人謂路千里而人亦有千此愚癡之説也然此身非形骸生死聚散之身也乃法身也夫法身著千古一瞬萬劫一息豈但三世一身而已乎老人告汝曰三世一身此密示未嘗死之機也不可忽之痛當自重設遇扶顛伏猛之事直肩負荷勿得支吾兩人靜坐心皆清明清則無擾明則不昧無擾而不昧豈有待之心乎適然喜境現前則喜心生不喜境現前則不喜心生如喜心是我固有之心則不喜境現前他只是喜豈能成不喜心那三祖曰能由境能境由能境欲知兩段元是一空人要在是非患難裏滾得過是非患難裏滾不過則好人何來故真金須火煆好人須境煉顏子隳肢體外形骸也黜聰明空妄心也妄心空則真心露形骸外則法身全離乃心之象也如玩象而得意則虗而明者在我而不在文字語言若一切文字語言都從虗明流出自然文天而機妙也唐李長者每以南無釋曩謨義文字之師往往笑之以為長者不辨華梵殊不知長者獨得華嚴事事無礙法界之旨既曰事事無礙即以梵語釋華言亦可華言釋梵語亦可以世間書釋出世間書亦可以出世間書釋世間書亦可以惡言明善言亦可以善言明惡言亦可言明則意得意得則至虗而明者常為其君一切染淨善惡華梵是非好惡皆臣妾也皆語言三昧也嗚呼心本虗而明世忽之而不究皆我現前身與心礙而不虗昧而不明反執吝而不肯釋殊不知礙而昧者能釋之則虗而明者不待索而至矣由是觀之玩象得意之説苟非嗜欲淺而天機深者象亦不易玩意亦不易得復勉之壇經曹溪六祖所説也曹溪初不知文字語言然聞金剛經而豁然大悟遂造黃梅得衣鉢而歸嶺南傳心宗於曹溪寶林寺自是天下稱曹溪焉其所説壇經至於性相二宗經之緯之錯綜萬態若老於文字語言三昧者也此乃悟自心虗明之耳人為萬物靈知有此而不痛求而求他謂萬物靈可乎大丈夫得其機而已矣機無多少以用之不同故似有多少耳然象先之機即象後之機象後之機即象先之機謂之一機則象先不是象後謂之多機則象後之機外象先之機而機無別機以乘時應物故有象先象後之異也
