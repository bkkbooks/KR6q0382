body:
  text: 明憨山德清閱佛贊釋迦佛贊稽首無等尊本光何起滅在乎用不用凡聖始分轍不用但熱惱用之皆神力妙容三十二一一吉祥備功成賢劫時非三亦非五累足青蓮花慈風扇萬物此花觸風欹髻珠亦如墮彷彿欹墮間有意難為語當處念不生法身𪹼然露若作如是觀供者真佛子釋迦文佛贊妙容處處皆充滿譬若春光在萬物眾生日用苦不知忽知福慧本具足佛身非身盈八極吾人計身拘六尺佛心無心通一切吾人生心一切礙了得身心等兔角威光熾盛星中月見者聞者皆清涼況復聞見皆寂滅稽首牟尼無上尊惟願慈波恒澤物阿彌陀佛贊大道非一亦非二佛國如何有多種究竟願力初不同所以感報乃如是此去西方十萬億化主號曰阿彌陀往因發願四十八是故殊勝超一切生其國者皆不退我若發願祖無量我即彌陀真骨肉彌陀之身壽無數萬斛芥子不可喻悲智不從心外生自強勇猛亦心力如是觀察了無疑我即彌陀最初師弟子既出苦海已師長豈墮於生死入山佛像贊南面之樂視同敝屣苟非至明見彼知此幽石白雲瑤宮金几誰雌誰雄慈父蒿矢雪山苦行佛像贊眼不見眼心不明心眼若見眼眼非我眼心若明心心非我心誰云六載苦行殷勤明星出時一覩悟道道若可悟亦可修證修證非道三學六度方便劬勞熏炙隨順轉識成智智成識空空即萬法萬法即空異相非礙拈頭作尾以脚為手似乃顛倒不壞本相橫計不了見手見脚事事執著如眼見眼如心見心如是見者大海撈針萬劫千生勞筋苦骨役心疲志曾有何益瞿曇方便謂言成佛佛若可成斷非真佛釋迦佛雪山像贊并序有生最苦者惟生死耳生死本乎情愛情愛不斷萬劫千生酬償業債我不重汝苦行雪山覩星悟道但服汝一切情愛一刀截斷此非大英雄漢子安能把手心頭便判是故稽首贊之本自尊貴作下賤相堆危岩畔宛死模樣人鳥絕踪雪覆千嶂寥兮寂兮那來情想為什麼活馬將他死馬毉咦不是一番寒徹骨怎得梅花撲鼻香釋迦佛出山像贊袞衣何似鹿裘安雪覆千峰獨耐看不是明星驚夢眼肯來苦海弄波瀾一覩明星眼便花逢人到處撒泥沙六年苦行成何事惹得諸方口業加慈慧寺毗盧佛贊稽首無上毗盧佛光明熾然徧一切隨其分量各得之聖凡受用皆圓滿蟣蝨未始終於小修羅亦非必於大祇因瞥爾情生時如行巨海限牛跡是故世雄設方便範銅示此希有身譬如雲淨中秋月眾星圍繞增殊勝見者聞者益清涼熱惱頓入不思議廬嶽毗盧佛贊稽首無上真金色相好圓滿非有無江濤湖風廣長舌一切見聞難思議匡廬震旦勝道場今復駐此光明尊譬如寶盤得摩尼宛轉橫斜恒不息癡人若以方隅觀何異層氷覓火𦦨智者日用心湛然是故白毫常普照無量壽佛贊有生必有滅有壽必有數佛以無量稱必有其所以此去極樂國西方路甚遠但念佛號者必當生其土釋尊金口宣決定無虗謬生從不生有不生者非數非數為數本是為萬物祖此祖人皆有不悟乃不睹如頓見自心生滅不可得依此發誓願如阿彌陀佛佛佛願相紹光光照不絕是佛現前時狐疑湯潑雪吳中泛海石佛贊并序寄圜中曹直指夫像設之始莫始於優填王金像與旃檀像像設之靈奇則莫靈奇於阿育王銅像與吳中石像夫金佛不度罏木佛不度火則石佛不度水明矣而吳中石佛乃出沒大海浮沈驚濤螺髮繩衣跏趺於碧琉璃上現大希奇魚龍悲仰濟海入吳而獨應朱氏父子之請由是觀之石佛既以度水則金佛度罏木佛亦度火矣予是以知無物非心無像非真心能所卷舒精粗莫測惟照用俱全者則黃土與松枝皆隨感放光況我維衛迦葉二如來於無量劫與吳人有大因緣特此顯現令無量眾生起靈應想想則思思則悟悟則通通則近取諸身遠取諸物皆自心也然四方黑白不道於吳者無緣瞻仰予甚慨之乃屬丁南羽氏繪像以傳秋空之月無擇蹄涔二如來自茲處處示現矣贊曰金佛不度罏木佛不度火石佛能度水多生願力故普願見聞者福慧如春花不假安排力花花妙自佳因影得佛心佛心無中外應用雖不竭迷之苦甚大維衛迦葉佛酬願顯靈奇水陸作佛事由之不許知凡有供養者地獄化佛會佛會五陰空罪福亦不昧獄室名福堂檢名寔自詳因苦生覺照覺則物我忘堯春無中邊舜德寧促延朝暮禮二像披雲覩青天魚龍仰光彩虎兕融瞋顛吳水與燕山十五月皆圓彌勒化身贊河目海口心同太虗長風遊之其地有餘我心如此何物能轉布袋之中聖凡難辨彌勒佛贊世人多愁尊者多笑愁笑有常用無麤妙坦懷垂腹布袋生殺揑聚放開聖凡失著善雲堂彌勒佛贊天容道貌妙難思待到龍華見已遲逈脫根塵渾獨露頓空人我便相知面門生笑猶非妙肩背流春始是奇一禮一瞻增福慧常親寧不獲菩提護國寺自來佛贊并序夫泥牛耕月木馬嘶風眾人聞而駭之茲像非金非石眾品合成解附荊楚之舟密換蠻夷之骨達者知而易感常徒昧而難懷然其銷我爭於真慈廓清涼於熱惱雖不處王侯之位而德貫象帝之先梵名佛陀此言覺者覺則無物非心不覺則何心非物何物非心一莖草可以為丈六金身何心非物丈六金身可以為一莖草噫苟非其人道不虗行贊曰江清先得月緣熟佛自來我若心水淨豁然佛眼開自心垢未空怒佛無靈通病者飲蔗漿橫疑黃連同一朝疾病除菜汁甜何如禱佛佛不應佛安有親疎但將我心審果乃誠未誠若使心誠徹無靈佛不情彌勒佛贊一切煩惱懽喜本若無煩惱懽喜離是知懽喜無煩惱終必懽喜無所資我今稽首彌勒尊笑口常開等海門見聞隨喜消人我通身毛孔皆生春此春不向無心生智願成熟度有情我若無情笑破口敢問心生懽喜否請觀木人鳥不怕風吹手動渠不走尊者懽笑誰不喜喜者大都此喜此若知此喜此外無管教喜懼自然墮布袋開來寶不多相逢任取博凍餓枯木彌勒佛贊生鐵鑄就黃金打成刻彫玉石慈氏五形何如枯木不煩彫刻德相圓滿笑容可即木不解笑笑則非木以木求笑笑如龜毛以笑求木木如兔角有名無實無實無理理路不通千尋峭壁苟能攀攬莫是彌勒彌勒佛手執布袋贊閉口舌頭隱開口舌根露不開不閉時問在恁麼處汝若知得了布袋付與汝汝若未知得手揑終不與石佛贊無際雲濤以為槎並乘光照吳朱家屢經兵火初無恙見聞之者開心花心花開處香十虗光無中邊本來如若人有緣一稽首剎那三障頓消除障銷石佛解說法兩口一舌覆塵剎眾生屙屎與放尿舌上周旋誰覺著誰覺著誰覺著眼不見眼見生殺聖凡一例聽指揮廣額屠兒真猛烈無邊苦海成智海一指屈伸情易決深郎持此往峨嵋魚龍處處生欣悅狹路相逢劉薩訶一切罪根方始拔彌勒佛贊胸中有些事肚皮大而窄此心等虗空胸部窄而廣往來牛馬羣出入聖凡隊何殊風度松寧異月穿水久行忽然坐仰目視霄漢既不慚高鳥豈有遊魚羨毗盧佛及文殊普賢二菩薩十八應真贊毗盧佛毗盧之光日用照彰以我未了法身似藏了知成熟萬行功忘就位其誰喚奴作郎文殊菩薩眾生未達觸處惟情達則情枯詎多愛憎金毛獅子跳躑靡停以此為坐不行而行普賢菩薩萬別千差行無正邪入眾生見敷大悲花象占十虗蹴蹂三車屠兒廣額是子恩家第一賓度羅䟦囉墮闍尊者左手虎口啣藤一枝藤疑屈伸指若無知稽首尊者幽宵慧燈親承佛記照彼愛憎第二迦諾迦伐蹉尊者雙手奉杖外心手無屈伸手指早是為渠渠若不薦我無奈何且收一足再放為他第三迦諾迦䟦黎墮闍尊者拂栽右手左手空閒閉兌通離心無往還以慈為人人忽我真當面蹉過再來難親第四蘇頻陀尊者撫膝左手有何所思握拳右手不見所持撫握雖二人無二知口開非笑眼豁眉垂第五諾矩羅尊者我問耆年癢何因緣為生於中為起於邊邊則同外癢非中先諦觀審察童子超然第六䟦陀羅尊者手雖掐珠心不在茲眼視他處了然無疑大顛舉似韓愈罔知首座叩齒雷同逐之第七迦理迦尊者面圓眉長神異難量眉作願繩繩牽法航度諸有緣出此鑊湯月面日面圓缺無常第八伐闍羅弗多尊者肩露臂交袈裟擁腰看經跣足風致逍遙眼目人天人天皆疑是何尊者蹴踏威儀第九戒博迦尊者雲山蒼蒼以石為床趺坐右握指何仰揚林泉無暑持扇思涼疑獨眼龍機鋒暗藏第十半託迦尊者頂縮眼瞠注心讀經梵音嘹亮不許耳聽字布白氎雁飛秋空橫斜斷續影亂慧風第十一羅怙羅尊者咬牙恨誰恨世人癡橫計身心不知捨離劍眉橫空眼露殺機以殺濟生聖人深慈第十二那伽犀那尊者身棲雲外目視人間見彼好醜冷笑銷閒笑恐頷墮擎拳撑持小心太甚至人之癡第十三因揭陀尊者奉經遺杖奉杖遺經舍一取一心終不停兼珠與身四者等一一則無外梵聲泠泠第十四伐那婆斯尊者出入息空山無異同見山禮足山多笑容謂我在定定無邊中無邊中處定慧雙融第十五阿氏多尊者頭如擁腫抱膝軒渠鼻曲眼斜眉垂心虗心虗無我豈有愛憎凡百笑言眾生慧燈第十六注茶半託迦尊者樹老藤枯心同太虗我忘我所樹即自余左指伸屈為誰說禪廣長舌相聲出右邊第十七慶友尊者松雲是身身是松雲耳目雖存本無見聞交手奉杯儼如忘懷楊枝浸水不洒同儕第十八賓頭盧尊者衣不覆肩足慵約鞋雙眸上視日月光霾杖在右手功難左無心非有二用豈差殊李次公畫接引佛薦見素居士別號善雲佛身何在在在而圓日用不見封埋塵緣忽然垂手欲接其誰居士善雲此心了知生前有德死後畫佛筆筆蓮花香風拂拂娑婆極樂染淨無常循業發現實難思量彌陀之願四十有八願願逗機當心一札善雲善雲豈闕見聞好擲黃冠頓超仙羣歸無量壽長揖死生車大蓮花何妨經行生為死母憎死愛生不若無生無生常生觀音為友勢至為朋七趣周旋應知重輕於此模糊辜負李生調獅圖贊并引獅子一吼百獸腦裂此猛之至也獅子一躍百獸皆悅此和之至也惟猛不和殺物無辜至人知其如此故調而和之為百獸師寬猛中節威而能和如冬之日暖然而春故易曰無妄之藥不可試也法窟爪牙晴空霹𮦷一鳴一躑若欣若戚我本無心天機淺深同條生殺明白浮沈結角羅紋交加難辨銅睛鐵眼蚤被眨轉掃象圖贊并引夫根本差別兩智一心悟證淺深致有先後見性則莫大乎根本治情則莫要乎差別故古人有同條生不同條死之典刑明暗相參之權變雖然聖人設象要在盡意得意忘象則象為筌諦得心忘情則得無所得矣十惡五逆窮之有性千魔萬恠孰返其正合下了知崐崘非堅色空無地白象現前習垢有餘是須掃除長松之下盆水涵虗主伴交映聖凡參差森羅海印在我雄雌菩薩贊文殊師利菩薩贊千岩萬壑皆層氷一切眾生渾凍殺昨夜梅花放嶺頭紛紛蜂蝶承春色巴蜀雪消流水急無限魚龍生欣悅大智現前春光回觸著身心等氷釋此光曾為七佛師復為迦文之長子無名可呼稱文殊善財最初先見之一見百城烟水邊境界逆順不倒顛歸來雙手一物無清涼老漢重摩頂普賢菩薩贊稽首徧吉大尊者在在佛土為願王普率羣生歸智海波濤浩渺不可測巍巍白象塞虗空譬如鉢中盛滿飯飯滿豈復容纖物象塞虗空坐何處菩薩到此不停思如鐘受擊聲答我萬行門中饒伎倆願王不動恒自在雪覆寒岩法界幽瑯瑯貝葉彈舌轉清音不許瞿曇聞牛頭馬面偏知己禮北臺大文殊菩薩贊稽首文殊智中尊不離萬法得根本譬如金師不廢器廢器獨露金之體善財一見難再逢遙伸金臂摩其頂此頂無分聖與凡清淨顯露不可見不可見處見妙相亦如出水妙蓮華妙容縹渺香雲中一切見者皆懽喜寶瓶藉此獸中王欣然荷負恬於几翻惜人為萬物靈相參若個生悲戀有心來此禮菩薩解聞師吼輸英傑積劫情根當下消龍蛇混雜常自在妙觀察智誰為母烟水百城老人祖率懷仰承菩薩力吐此微詞贊功德菩薩功德贊可盡何異晴空轟霹𮦷巍巍妙首妙吉祥惟願智光常照我浮雲飛盡空無際叶斗峰頭月孤冷盡在清光妙湛中瞥爾生心隔千里提珠菩薩贊珠雖成串不撥不轉得意毫微璇璣電卷春秋幾何提示無多耳處聞聲退之淆訛大悲菩薩贊螃蠏蜈蚣足多眼少橫行直走心事豈了眾人雙手目亦惟兩多藝多才皆出妄想物我雖殊有待之用同異未忘共而弗共我觀大悲由聞而覺聲無逆順一聞脫殻殻乃謂塵塵銷根初非先後寧有本末任運而周多臂多頭頭臂具眼如清在秋無論智愚聞見皆驚封我常執疑彼聖明四十八臂一十一首臂有承捉首無左右承則象智捉則象悲悲智交運照無所遺無待之光熱惱清涼一指屈信蜜無中旁念彼眾生即蛆螃蠏一切有知三毒難解稱大悲名見大悲相罄咳之間悟入無上無量壽聖大悲之君君臣願力共拯迷羣如臂使指了無彼此正中無邪妙物無累無累之慈惠物所思若求男女男女大師因愛生信因信心通心通愛拔菩薩神功觀音菩薩贊稽首大悲觀世音有大方便拔眾苦若人多於淫欲心常念恭敬便離欲此言初聞不覺妙久而味之妙無極自是眾生心識粗不知菩薩救苦益淫業乃非一朝習元從無始至今日一稱名號欲頓離眾生乍聞誰復信不信以其根未熟根熟自然疑不起治淫觀門既如是治瞋觀門亦復爾若人多於瞋恚心當究瞋心自何始不知其始欲滅瞋辟如斷流不塞源源若不流塞豈止未得其始瞋安息我願普念觀音者於凡逆順憎愛中發憤自強挨拶去一朝戰勝萬無異若作是念名正念不作是念邪念耳豈有人為萬物靈不行正念行邪念讀普門品毒藥不可食惡人不可親食毒命必夭親惡善必損是故佛菩薩種種設方便以毒攻其毒毒亦不殺人以惡攻其惡惡亦不害物若作如是用善惡無常性毒若非妙藥聖人物有棄是以知觀音善解此三昧能於普門道救一切眾生受惠必報德眾生常情見以情報菩薩掉棒打空月空月若知痛菩薩乃受供讀本草眾生無苦不呼名菩薩不應誰復救救苦慈威苦感生苦是眾生大悲父若謂菩薩願力深一切世間苦皆度作是觀者非善觀善觀聖凡苦為本若人頓了苦性空菩薩爾時乃始現現時電火喻莫齊分別音聲皆可見初針至後針線線曾不斷由引乃成滿滿豈有成耶滿既非功立引亦何初始若能如是觀繡者不可得諸人善思念菩薩即現前綉像寒谿古岸細柳疎篁裙帶微飄岩花泛香隻籃雙鯉人在舟藏無擇知愚一瞻容光刀山火聚毒藥沸湯凡百諸苦洒然都忘眾生熱惱本自清涼即覺橫夢認奴作郎勞彼至人大慈多方以魚為鼓聲震八荒縱爾闡提聞腥亦喪魚籃三災九橫八難二求罪福無常圓通自在罪若有主福不可修福若常恒罪不可洗兩俱無力悲智圓成如見一花春非有際雲巒海岸朽宅青蓮烟波渺瀰菩薩欲語海湖春山方青桃花正開天男大士掛坐岩臺花枝鸚鵡側窺童子唱酬本調誰領斯旨脚底有耳耳中有眼觀一切音理豐言簡天男無際海濤中雲山忽簇簇魚龍及蝦蟹猿狖并麋鹿朝暮聽潮音共沾慈悲福人為萬物靈睹此應痛哭異類尚歸依汝曹徒碌碌浮生若漚泡交臂顏已禿童子不畏險衝波頻仰伏剎那根塵空妙相春可掬著眼嵐霧合陰森惟紫竹吳郎寄逸想大地梅花馥梅花道人畫像眾生有苦菩薩救菩薩最初苦誰拔若使更有所拔者痛思拔拔何窮已忽然智訖情枯時海月雲山菩薩語猛獸刀林及火坑驚雷雹電慈悲鼓此聲寧分聖與凡一歷耳根無不死是故觀音度眾生空華落影春光始海月眼耳鼻舌身此五本來妙瞥爾明了起五根如膠盆一切好惡聲觀音以目聽有時則不然耳聞不異眾由聞達無聞同入普門海眼耳俱一境惟根不相等所證了無別歸源浪分轍有能則有所所忘能亦滅能既隨所盡忘功不屬能能盡所隨化功亦不屬所究竟兩無功悲智妙莫測二輪碾大夜譬若杲日出手尚多無數慈威寧有常眼不局面上掌中亦放光例以毛髮推手眼復過是世見大悲驚驚則駭而惑誰知即惑者與菩薩無二大悲我聞菩薩心即是眾生性眾生與菩薩兩杓同一柄若說菩薩度眾生總是當人顛倒病若說眾生憶菩薩亦如斬頭求活命且道如何即得藥病俱除血脉不斷觀音應現比丘身補怛岩前行正令比丘真觀聖凡情頓斷大智現前菩薩露悲觀慈觀利澤深三草二木皆蒙潤如是功德難思議一切眾生願瞻仰眾生眾苦本無盡菩薩願力豈有窮無窮願力度無盡譬如環輪尋始終眾生正當苦迫時竭誠一念呼菩薩菩薩聞呼以眼觀呼者眾苦即時脫若人知痛知不痛不痛即是觀音力一根入流諸塵消八難滿證圓通覺寶輪天風海濤不與耳交能用眼觀眾苦氷消三十二應十四無畏并二隨順一心不生無德不備稍涉情塵鏡上有痕能所角立橫見疎親以心取心陸地平沈水豈溺人人自溺津自是是水水不消瞋八難之中風火殆險無形割物假物逞威苟外薪空兩者勢窮風火既爾水力亦同天機深者知此萬了未能神會寧免顛倒吾言甚平奇討難曉達本忘枝合下自了苦是導師勿得憎之離苦覓樂有師無資襲明功墜並昧斯義縞縞白衣月豈在指觀濤白衣以手指月提籃示人踏入風塵此一尾魚明暗交陳馬郎瞥地牙齒生津鎻骨挑後出水方新魚籃稽首大悲觀世音所求云何而得道惟願菩薩開示我使我彈指獲圓通圓通儻獲誓度眾凡屬血氣有知者一一領之入普門菩薩以身為廣舌開示現前所求者汝若真欲得我心我心只在汝日用在眼數與色塵合乃至在意與法和汝能了色并餘塵塵為復從何處生若知塵塵所生處六根自無樁立地根塵廓落一精明逈逈孤光埋不住一切眾苦解脫師以眼聞聲山說法善財何處覓觀音當問初求觀音人是人身外尋菩薩好堅一株成兩橛曇郎化身端郎供曇端俱從我口出我若不得菩薩心安能為渠通消息菩薩若不得我教淪墜愛河終不了只今危坐石龕中松韻泉聲粉枯寂枯木花開香異常鼻根難嗅耳根識石龕觀音菩薩能救苦未成菩薩苦誰救往反推之救苦功始終不見有功者若人欲識觀世音能解此贊即菩薩眾生自然不須救管取即如湯潑雪不以耳當而以眼當一切音聲若存若亡六根秀茂片石昂藏是誰鼻孔大士眼眶六根清淨稽首大悲觀世音隱勝現此稚子相周瞻七丈有餘許狹習眾生猶生懼所懼謂其身高大不信世中有是人吾因若輩說此偈使其當處懼情消頓了吾身大逾彼請觀菩薩觀觀者若有大小詎能觀以能觀無大小故是則能照大小境即如觀空亦此觀縱觀天地亦復然至於以觀觀芥子總是能觀之所了能觀果小弗能大安可復觀天與地能觀果大不能小亦復不能觀芥子吾以妙觀察智尋能觀畢竟非大小能觀既其非大小虗空天地莫可比是三大者尚乃爾何況七丈稚子相哀哉癡兒不自觀逐境分別生恐懼若人於偈能返研管取大笑諦信自現七丈稚子相眾生有苦觀音救觀音救苦自無苦若自有苦能救人自古至今無此理譬如薪火煎冷水水熱火本不曾濕眾生墮落險難中恐怖悲號求出離誰知自己悲號者一切眾苦不能縛眾苦能縛悲號者水亦可熱火可濕若人遇苦作此觀鑊湯鑪炭常安樂救苦普門不遠日用之中好惡顏色觀音之容能專此觀物我本同火聚刀山春波和融纔關思惟菩薩潛踪仰冀捄苦首西面東善財不禁直得隱空眾人聖人初非兩心以不善用致有升沈水若外月清而匪徹月若外水澈而有闕互弗相外能光能潔眾人昧之萬苦萃身達身無待待者皆神以目觀聲拯諸迷淪水月奇峰翠竹菩薩之眉眉解說法孰能聞之直以眼觀對境心安刀山火聚不異琅玕外勁中虗靈而我無開彼七趣悲拔三途以智為日霜雪消除我覓罪相女子之鬍六根互用何往不洞洞在何處在我毛孔一孔一身菩薩微塵散滿十虗月印萬津善財欲捉鸚鵡笑人榮辱得喪孰假孰真蜜有中邊背岩無春竹林水外無心觀者何物心物苟辨水觀乃得得此觀時無擇色空十方三世汪洋冲融凡聖垢除始圓妙容三塗八難無量劇苦恒作是觀刀山樂土若作他觀樂土刀山冲融性水苦海波瀾魚龍擾擾五欲是躭愛源冀枯須待驢年菩薩悲之以身為船往來欲海結清淨緣眼聞濤聲主客同玄水觀雲濤無際中片月何圓滿菩薩月中坐恐怖久已斷魚龍仰眉宇出沒無定時常念觀世音濤聲入路奇隔壁墮釵釧相逢誰解薦薦得魚即龍防渠作雷電電比石火忙生心早失光楊枝插淨瓶風蕩學低昂團蒲吉祥草坐到何年了眾生界未空我亦和泥倒聲若用耳聞眼根渾錯照水月稽首大悲觀世音一切苦聲惟眼聞刀山火聚成解脫是時何處覓迷雲長江浪高如雪山我若無心水本閒眾河流急喻閃電就中有路透長安長安風月雖然好頭上𦦨光燒杏早不藉三春出地雷眾生蟄夢終不了南無最勝觀自在苦厄山中作良導我聞觀世音初亦是眾生因遇觀音佛教眼觀聲音菩薩領教已音聲用眼觀生心觀不就幾回多愁顏愁苦觀不徹觀久心忽裂心裂知自遺知遺見亦脫知見雙忘時眼觀音聲決向時無量苦今成悲智路路由普門入回互不回互隔壁墮釵響入路知幾個觀聲善根深見渠悅我心我見觀音聲朝暮常照臨因聲薦此意便能投鉢針菩薩眾生初無異同其心善用先得圓通我用不疑太虗長風游行自在何物成封用稍不善疑情橫現死生榮辱魔面佛面菩薩哀之抉我障翳頓還本明光洞三際過現未來氷河蓮開臂交徐行足不染埃水變琉璃魚龍皆驚浮沈無所有眼如盲聲若眼觀琉璃豈非善財氣急自恨鈍機春在桃花紅如血染春在菩薩慈悲無倦左肘倚石右手屈指伸者惟二二三之中屈伸無住若以住求是謂死句活句在何桃花婆娑花解說法法遍恒河聞者以眼頓出愛波七稱觀音三稱四弘信手拈來普字分明指上有眼眼界觀聲自親而疏眾苦消停性能如是緣生無生刀山劒樹苦痛難承夜閒摸枕大悲現形交臂失之跣足徒行善財捕影鸚鵡飛鳴在而不見楊枝礙睛謂此非實普陀是真隔垣釵墮入借聲塵聲可說法色為大師我無隱乎爾欠諦思三十二應雌黃慈威德山托鉢杲日流輝眼界聞鐘眾苦息機雨餘芳草綠編草成綠玉趺坐玉溫潤萬慮不煩濯此心空潭清垢淨忘邊幅見者意自消饒舌非我事萬象解高論聽者根豈具惟不具根者善聽萬象說熾然常不停眼根為媒妁接引苦眾生普門作安歇淨瓶與楊枝當面徒排設熱惱清涼初無有常用之何如遂見短長菩薩知此所觀異人聲聞於眼人則耳塵於眼聞音法無淺深情關坐斷凡聖平沈以此為門門包虗空有形無形陶鑄此中造化辭巧陰陽難工一毛多身萬竅號風聲作佛事大悲之宗智悲為航願力無窮樹葉為席妙容盤膝屈信在心豈在形跡碧草蒙茸秋光何密眾生眼毒菩薩眼慈慈毒相反難為相知毒盈惡極惡極罪深萬苦交至始呼觀音觀音能捄理折難通眼界司聲千災頓融眾生知此菩薩一同眾生無明菩薩圓通兩者諦觀本非異同三塗八難眾苦靡窮毒藥刀山生心成封拈來便用用處渠逢渠若是我馬將喚龍于茲薦取悲智冲融不涉安排自然適中重巖流水舌相覆空說法無盡眼聞耳聾萬般煩惱六月松風睡著善財面西背東悲智之用眾生本全以我所故圓而不圓以苦為師苦極深思思之積久心開神怡寄根明發用無順違夜光在盤自在而馳生心卜度火燒汝眉菩薩哀之方便備施百千三昧應身無疲片月在空萬影臨池本無前後豈有參差刀山火聚解脫之機但覺畏怯線刺牛皮輕風生微波異草生巖阿菩薩自在坐心念眾生多瘦竹五六根瓶中楊柳疎大地本清涼將何熱惱除天風生海角翠篠摩空虗楊枝亦解舞瓶水知湛如女人欲成男先將婬機枯婬枯心清淨定作大丈夫童真剖恩愛盡形守戒珠參禪與學道魔外難擾渠忽開佛知見以眼聞笙竽分付董道人精進長髭鬚何必待來生然後出迷塗六根不圓通情念不能空情忘念滅時六根元互用一作多佛事多是一根功八萬四千毛個個無優劣誰謂耳聞聲誰道眼見色聖凡無寸地何母子先後一念不生時本光常獨露圓通在蝮蝎普門屬蛇虎大士無功德何讚復何毀以手為目以珠為聲虗空鯁骨雜相無生泉石清幽寄此玉顏半跏而坐屈伸本閒鸚鵡覔食善財躲頑呼之不來不呼即還持珠以濤為槎並泛海涯有力爭請唯然朱家魚龍哀鳴水族失爺既為人有吾曹咨嗟人憐黿鼉禱佛冥加凡彼濕生心開覺花人心佛心達本無差魚龍知此咨嗟徒譁心佛眾生玉本無瑕吳門緣熟通玄地嘉兩鉢雖破二尊靈遐見聞之輩數若河沙若毀若譽毒鼓誰撾有心無心鼓實爪牙癡子不解打草驚蛇蛇忽換骨風雨橫斜閃電光中雷師開遮石像鼻孔或隆或窐雪浪山崩楮上行艖水陸無虞聖凡一車運重致遠手抱琵琶有聲無聲趙州賜茶纔涉唇吻波浪如麻吳中二石佛稽首大悲觀世音於音聲中作佛事一切眾生受難時號呼痛切即赴救譬如淨月在天際凡有水處皆遍入水即眾生痛切心月即菩薩方便力刀山劍樹與鑊湯黑風鬼國漂墮處眾生命根將欲斷菩薩委曲為之續或遭饑饉寒病疫子母不顧皆離析菩薩身化衣食藥令人歡喜復完聚眾生設受愚癡苦文字語言覩不悟菩薩冥以甘露水蕩除昏翳忽通達世出世法觀掌果了了分明永不惑菩薩威神感即應究竟俱我自心力我心痛切若不真有苦菩薩救不得十四無畏及二隨三十二應眾功德若離我之痛切心向外馳求寧有濟我又諦觀此痛切極力推求不見有求之於苦苦無從苦若有所豈能滅我今號呼菩薩時一切苦處成懽悅是知苦樂總無常眾生不了生順逆寵辱紛紛夢正濃幾度號呼喚不醒惟愿菩薩愍我愚冥熏加被喚即悟悟後身心空裡花愛憎生死龜毛拂如是了知圓通失菩薩無地可站立無奈去作馬郎婦以欲鈎牽度眾苦譬如以毒攻毒疾疾除毒亦了無所何妨鬼臉與神頭順行逆行普利益我因房山一斗泉得覩菩薩相好身又於慈壽石上乞食曾禮菩薩相菩薩手提新篾籃籃裡魚兒若活狀蓮華艶冶襯光儀令人瞻之生佛想旃檀龍腦朝暮燒香烟靄靄籠樓臺供養富貴最無比善財龍女常懽喜惟有鸚鵡心不足猶道枯淡難棲泊誰知上方兜率寺岩龕亦有觀世音烟霞香火甚蕭索超然不厭於寂寞魚籃觀音菩薩未得道涉世寧自在一旦悟自心解脫非障礙非身無盡身慈嚴相非一無心周萬物精照靡不徹身心本三昧眾生甘下劣無苦中見苦非樂中求樂是謂顛倒想難入圓通覺驚濤撼岱嶽巨舟不敢渡菩薩何所能蓮華瓣襯足去來若鴻毛飄然離恐怖蛟龍與黿鼉一切諸水族覩影生慈心劍輪忽停住南無觀世音智願廣無盡我既歸命禮願一切如我本來一精明迷成六和合譬如水結氷窒礙非通達文殊選當機菩薩聖中首聞聲聲即心心不見心故心若能自見眼亦可觀眼如是頓了知眾苦皆解脫開物成務聖人之能或經或權緣生無生威中有慈不與威相遇慈中有威不與慈相值如山出雲如月臨水如春著花三者同現不遇乃成不值乃靈惟成與靈力在無功大悲千手手手有目較此妙相手眼何寡寡為多母多為寡子多寡不到智者自了了則不疑此相即我我能疑我入道之式五色令人目盲五音令人耳聾竹石而閒棲身世有無中則色之與聲皆可入圓通究其所以然眼觀音之功是故三塗八難眾苦雲從凡逆之與順如清風之度松智海欲海初無有常心兮善用欲海發光倘不善用罏炭鑊湯以蓮為舟普門浮游即呼而應未分馬牛馬窺鞭影馳不待再牛拽大車所往自在魚龍鳥獸水陸之儔海印三昧靡影不収手中楊枝時蘸雲濤熱惱沾者百苦頓消以海為盞魚龍在掌眼觀龍鳴晴空雷響心火既熾境風扇之凋殘本妙八難險奇度一食頃如千百劫相驚寵辱成熟黑業勞彼慈母奔波成勞等觀大地如一子驕求不得苦急於燒眉人間乏嗣天上共悲救苦尋聲了聲之前普門月滿我願亦圓求女得女求男得男自心現量菩薩之貪若問幾許手中數珠童男童女轉處自如吾嘗觸逆境熱惱燒肝肺吾嘗遇順境喜悅發毛孔本來一吾耳苦樂何多種世以苦為苦不以樂為惡誰知苦不了皆因樂為妁此妁弗能遣苦根安可拔縱使苦樂盡平受亦是刺是故觀世音哀眾生三者寔為諸惡源眾苦之所集於是設方便教汝眼聞聲入流成正覺獲三十二應得十四無畏上下二隨順廣菩薩悲智且吾正苦時猛獸與刀劍一時俱歷受楚痛莫能堪號呼吾菩薩忽想吾果痛呼者復是誰正痛又能呼痛呼兩不涉不涉而妄呼何異夢蛇咬方蛇夢咬時怖畏不勝急忽聞鼠翻盆蛇我奚得失佛香庵旃檀觀音像贊并序析旃檀則無片不香分滄海則無滴不濕旃檀滄海以心為母故得心者可以為諸聖祖大地母馮生既逝以情觀之似水競東而不能返矣吾聞萬物一物萬人一人所以聖人知此而迭用之若然者此像既生馮生果真逝乎贊曰馮生果死此像不存此像既存馮生奚往如眼觀聲清機歷掌馮生有靈莫忽吾想吳道子觀音變相贊并序凡畫之妙不難於可見而妙惟不可見而妙著焉為難耳故妙而可見者易以平出難以側形唯遠視而彷彿側出則非畫者逸想幻出焉能不即而親墨渝而神哉故曰妙萬物而無累謂之神神之所存雖至朽之物其生機觸心似不可掩此不可掩者寓萬物而靈隨寓為君君之所在何物非臣歲丁酉余於董內翰家瞻吳道子所畫觀音變相三十二身其精神態度萬變錯出譬如夜光之珠在金盤之中流轉自在率不可以有思惟心而計其所向也或無心而非木偶有思而非著想者其可以知此哉贊曰逸想所寄非麤非精觀音其師寫我虗靈筆筆畫著緣生無生一身眾妙萬鏡一燈可悅難即欲離反冥窮其所以淵默雷霆不貴耳聞惟宜目聆普門窈窕意路難登菩薩哀之分光散形為渠紹介招手呼名慈母聲咽兒終不應念茲心痛徒自涕零髑髏觀音贊觀音菩薩閒不徹盡日觀身與夜接觀去觀來見髑髏枯然只在我眉睫此時西施來作禮菩薩淫心了不起莫教出觀遭野狐眼中見渠生懽喜咄是男是女皆如此何必生心更愛憎准提菩薩贊一心不生萬用皆備手臂錯執超然無累眾生熱惱用處弗齊以呪鑄習蓮敷欲泥唐貫休畫十八羅漢贊第一十方一珠三世一線尊者有心撥之豈轉大顛春秋韓愈綢繆咨問幾何立僧代酬第二背倚枯槎安知歲華半邊鼻孔落在誰家出賣日月破除大夜戀幽之鬼紛然驚詫第三師觀一切如母視子子感母恩脫懷美拳拳握策兩指矗天蝸牛生角雙塔燈懸第四握中何物佛祖不識左手倚膝口開可測默如雷轟聲在未聲若以耳聽離婁失明第五心外無法雲山此心是身果有定則難尋瞑目巖室即身非身有緣見者其孰弗神第六忽然想逢誤獨眼龍扇上青山流泉何窮屈伸五指二三無定恣口雌黃千峰鐘磬第七紺目澄碧萬象莫逃併握支頦恐難堅牢喉深如谷開口便淺不過三寸閉藏孰辨第八視身如雲雲豈異身鉢水楊枝眾生之春老松糾盤風雨所在無限龍蛇恣其變態第九飲之餘消閒梵書橫眸數墨自卷自舒白㲲鳥跡鴻飛雪嶺隨風斷續野水留影第十肘閣雲石手還在空袒肩持杖眼視飛鴻謂彼神用其誰不備有無非酒飲者皆醉第十一此木童子有身無手藉師成功師手我有用處隨宜癢非在皮待𭺗而除問孰了知第十二以眉說法口吻俱閒舒卷自在長短之間偶將為繩束縛虗空安置芥子江山無窮第十三口閉不開誰知齒缺舌根輕搖一任賞罰抱膝而坐屹如枯株欲昏未昏以此自娛第十四一掌五指屈伸無常如風玩柳枝豈主張謂屈謂伸始終環輪勞勤夢想尊者爾瞋第十五大悲菩薩手眼百千用既皆備照何不圓經珠與杖并治妄想念若未起一虧喪兩第十六指麾佛魔把柄在我雷厲風飛縱操皆可驢駝馬載並足還錢予奪生心虗空有邊第十七兩眉如風兩目如海經在面前宛然有待一毛山河劫歷難窮謂遠謂近瓶之貯空第十八微塵既剖經始現前文句無多歷觀窮年了知在我不在于經兩者有常牛皮見星又十八羅漢贊第一枯槎生花非耳不見額鼻俱聳春光何限屈伸有常機絕抑揚三直兩曲臂肱堂堂第二頭疑恠石髮如飄柳一手持珠以珠代口莫驚濶頷具體而閒顛倒佛頭依稀德山第三衣卸肩出碧眸注經此經甚深大夢雷霆文字非實實非文字獨垂一足兩手自恣第四視經垂頭肩背吞耳泉出地中湛然存紙嶺南老盧柴擔暫停待查龍藏無所住心第五兩手支頷恐其墮地口開齒露眼迸心睡心睡身忘石無施剛石忘我足沒入何妨第六一心不生我即龕巖波浪衣紋泉鳴翠巉眼雖不開光照六合明暗兩忘見精非雜第七以杖倚額額為杖架一肩孤聳並足酬價杖額不同主賓何功唯肩與足空磕虗空第八琉璃與鉢內外洞然目注其中五臺現前白雲卷舒百狀千態故埋松根逞其自在第九斂肩抱膝果何所思我所思者心精思遺思遺而坐寬窄皆可石本無相吹毛莫躲第十腕為杖主手復持珠更恐心放托經自娛秋空雁鳴梵字參差以此贊佛耆年了知第十一怒髮衝冠惟思不然刈茅非钁一怒盡蠲三屈兩伸卷舒一手瞋為佛事誠不請友第十二腦後無際枕馮高岩手中所握扇塵同函雲沸無心偶遮半面其誰作禮直不我見第十三面圓如楪五官併分彊割界漂杵流血眾部之君眉應不羣坐妨曲折行則拖雲第十四背若果有痒𭺗難除果然無背𭺗痒非虗往復觀察情枯智訖池成月來眼底見佛第十五眉揚目朗彈指肅然即此為舌法沾人天誰為虎子牙爪鋒利具而不張野干爭避第十六肩長無用聊可倚杖膝亦空閒承經何恙莫嫌眉長飄拂岩龕不碍眼光湛如寒潭第十七抱杖伸指非三惟兩以靴藏足靴脫足爽風致疎閒巢由之閒髮鬚若存鼻孔蚤露第十八衣不掩胸心同虗空握拳誰擊開口漏風謂手按膝膝無我人謂膝承手手原屬身
