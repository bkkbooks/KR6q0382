body:
  text: 明憨山德清閲法語問汝一歲之前多少歲數汝答一歲之前父母陰陽交會如未交會又問汝父母兩家念頭不動則陰陽交會境界又在何處若曉得父母念頭未起時則汝之歲數多少必定知得下落如這一點不曉得便是買檀香雕佛佛中不解放光若透徹了這一點即狗糞雕佛也解放光破汝覆盆之暗且人生幾何苦多樂少生死不明一息不來驢胎馬腹又恁麼撞去了可不哀哉古德云三塗一報五千劫得出頭來是幾時我則曰出得頭來休要問五千劫裏細尋思示鍾生師問子今現在之身惡得而有對曰假借四大而有問曰四大未聚之先子身惡在對曰身本無有問曰四大既散之後子身惡在對曰亦無有師舍然大笑曰子求身於四大未聚之先既散之後皆無有獨現身假借四大而有以理推之得非兩頭無而中閒有乎兩頭既無中閒獨有恐無是事子當熟推之先有中閒而有兩頭耶先有兩頭而有中閒耶倘推之精熟觀智剖開子然後再來為子痛究子心又復何在如究身未精即乃究心心終不精故曰審名以精義精義以入神入神以致用此東方聖人西方聖人必由道也故顏子則隳肢體黜聰明老氏則曰吾有大患為吾有身若吾無身何患之有又曰介然有之行於大道唯施是畏老氏亦東方聖人也若究其所歸本與儒同宗昔人曰老氏之學源易謙卦也雖然窮生死之故究性靈之極設不學佛終難徹了何以故蓋窮靈極數之學苟非滿證自心事理無礙者終未易明也事則屬數理則本靈窮其理而遺其數則謂之乾慧極其數而昧其理則謂之忽本若夫瑜伽唯識乃極數之書也華嚴楞嚴窮理之經也數理俱精如不透禪宗乃葉公畫龍耳豈能興雲作電哉故學究身心者身不精則有生死榮辱之纍心不精則有好惡是非之攻故曰究性與命自身心始如忽身心而不究雖讀五車三藏終與身心何益哉示阮堅之聖凡無門門啓迷悟迷悟無本本於自心自心不明以耳聞聲則信以眼觀聲則疑矣雖然以耳聞聲則好惡皎然以眼觀聲則好惡何存於此了知毫無疑惑方信不惟大士能以眼觀音人皆可以眼觀音也嗚呼前境不化而融能根不解而脫此邊解也如聞與脫功若不昧則境與根未始非本也功若可昧則又聖凡不辨始覺無功矣安有是處哉示李聖奉婆伽婆入於神通大光明藏不二隨順現諸淨土與大菩薩摩訶薩十萬人俱其名曰文殊普賢普眼金剛藏彌勒清淨慧威德自在辨音淨諸業障普覺圓覺賢善首法菩薩等共入神通大光明藏嗚呼是大光明藏豈婆伽婆與諸大菩薩獨有之而一切衆生果無分耶雖然一切衆生迷無我靈知而認攀緣有我之知為自心是以貧女宅中之寶藏窮子衣裡之明珠現有而不能用一切衆生皆證圓覺此我婆伽婆之語也昔人以具易證真淨文禪師呼為𦏛臭奴以文字義理障自本心佛語猶疑而不信妄改聖經則其所悟可知已故曰不涉情解當處現前凡聖路斷則所謂婆伽婆與諸大菩薩爾時向甚處安著用光曾參道人於長松蘭若且自願持大方廣圓覺了義經始而讀讀而成誦既成誦已則持之不假卷帙用光能泝而上之初則假卷帙再而棄卷帙成誦誦而能持持而能精精而能入則所謂神通大光明藏者與婆伽婆諸大菩薩磕頭撞腦時果有分別耶如簡擇得出則不妨他日流水野雲桃源城市驀然撞著始能商量賢善首老漢流通之句時光能幾聲色關頭神通光藏脫被埋沒則生不若不生也用光勉之體之示邢用光夫華嚴大典雖文豐義博實雄他經然其大義不過四分四法界而已一念不生謂之理法界一念既生謂之事法界未生不礙已生已生不礙未生謂之事理無礙法界如拈來便用不涉情解當處現成不可以理求之亦不可以事盡之權謂之事事無礙法界行者能信此解此行此證此總謂之四分也又事理無礙法界自大典東來幾千載而黑白諸豪傑莫不以為此經是根本法輪皆研精殫思疏之論之至於事事無礙法界則如子聞父名終不敢稱謂縱有強發揮者亦不過以理融事事始無礙若然則大雄氏於事理無礙之外設此法界豈不徒然也耶又帝心之與善慧或曰懷州牛喫禾益州馬腹脹天下覔醫人灸豬左膊上等語乃不過旁敲耳夫帝心善慧皆文殊彌勒再來彼二大菩薩於事事無礙法界亦惟旁敲不敢正言今子書是經於青山白雲之間可謂大有勝緣也者知子前三法界可以智識通之末後一界子若不離智識而求之則終不入矣且離智識而可求之則土木偶人亦可求之矣何待子求子若求而未通未通之處正好猛著精彩𢬵命求之如命根忽斷則子所書之經譬如塗毒鼓擊之發聲有心無心聞者皆不旋踵而死死後復活再來印可未晚也示麟禪人活人之身固仁矣尤莫若活人之心為不可思議也活人之身以藥活人之心以法藥則有無難必法則自心即是初非有無可限者也又心不活心如水不洗水何以活之能悟此即佛醫耳如有疑即不可放下疑極更疑疑若忽破方可論醫示陳醫生夫饑寒之於榮辱貧賤之於死生天下莫不以為患嗚呼知其為患而不知患之所自是之謂迷迷則不覺不覺則不能返既不返則自生至死莫非背本而行殊不知一生背本乃至於無量生如能直下返照達本忘情情忘則煩惱根拔煩惱根前所云患之所自得矣得而治之則皮煩惱立地根抽始得治肉煩惱骨煩惱嘻皮煩惱抽則六通縱任無為山壁由之直度此謂枝末無明盡也枝末無明盡其靈用尚乃如斯況骨肉煩惱盡乎此三煩惱世人名尚不知惡知其義義既不知惡知其理理既不知惡知其道而所謂德者尤不知矣夫名者義之筌也義者魚也義有衆多會而通之之謂理理而行之之謂道行而功忘之謂德今欲治身心而名義不辨毋乃徒役其名徒役其名計治而有效不亦癡乎即如有身則有飢寒之迫次之榮辱再次之莫大乎死生又有心則有好惡順我則喜逆我則瞋自是而後則有不可勝言者矣故我大覺聖人示之以毗舍浮佛偈如讀而成誦誦而推義推義會理理會可行行則有證示賓上人夫貧者思富富者思貴貴者思安逸安逸者思不死殊不知從思有生從生有富貴貧賤勞逸以至萬有諸苦不可勝窮也故欲濟苦海者必以無思為舟楫而彼岸始登焉然思不能自無必假聞道以無之道不能自聞又必假緣因為之汲引乃可聞耳夫緣因者誠諸佛之母衆生之資以相好為緣因者如觀德人之容而鄙吝自消之類是也以音聲為緣因者如一言之下心地開通之類是也又以聖教為緣因大善知識為緣因善友法侶為緣因以逆境為緣因以順境為緣因或以精進勇猛剝皮為紙析骨為筆刺血為墨寫大乘聖典為緣因故曰佛種從緣起如是種種緣因雖皆聞道之助唯最後刺血為墨書經緣因最為超勝但衆生身相執重蚊蠅微而唼之尚不勝怒而拂焉使之不去不已況以利針刺指血流心驚而能挺然忍痛得終勝緣苟非素常信心堅篤識見超群者豈易為之唐貫休尊者題楚雲禪師血書法華云剔皮刺血誠何苦為寫靈山九部文十指瀝乾成七軸後來求法更無君法燈當痛歌此詩數十遍則身執自輕矣身執既輕此經不過五千餘字書之奚難哉示法燈居士刺血書金剛經夫吾曹於日用之中不以吾我我所之光照破交錯憎愛之境雖處幽閒寂寞之濵無異乎馬足車塵之地也故曰但自忘懷無往不妙碧雲寺語如奇等豫讀東吳支謙所譯阿彌陀經始知諸佛頂光有小大不同有七丈頂光一里頂光百里頂光乃至千萬里頂光唯阿彌陀佛頂光殊勝無量攝山栖霞寺寺背有千佛嶺嶺有巖龕如蜂房蟻穴高低曲折纍然布列其佛身量亦有大小差別先是齊徵君明僧紹請法度禪師講無量壽佛經感天雨四花夢覩佛容於是徵君據夢所見覺後令鑿山成像若干尊功未半而徵君逝矣其子某臨沂令繼父志完之自齊迄元將千載其間寺之興廢佛之成毀皆因緣會遇耳金兀术屯兵攝嶺將戰禱佛冥祐及戰敗績怒令諸將曰佛既不福我祐賊佛即賊也當毀之雪憤以故巖龕像設無擇大小並遭損或身首殘缺以至耳目口鼻臂腕錯壞見者悲之豫雖不敏敢籍如來寵靈并素菴禪伯蒼方丈之獎愛願修補之禪伯之孫名海印者實聞豫言即願捐軀圖之嗚呼徵君之奉佛兀术之毀佛奉佛心也毀佛亦心也用之善則光流萬世反是則惡塞虗空虗空有壞惡名乃滅慎之哉且心外無佛佛外無心心佛情消常光獨露肯心自許矣此光有七丈至有千萬丈及無量國土者非諸佛道別是皆因中所願不同也海印來前豫東西南北之人去往無常姑書此以遺若其勉之書示海印一蝨在耳鳴若雷震一蚤在懷攢唼不寧況乃四大毒蛇盤紏一身人不知怖非喪心病狂土木形骸者孰能堪之至於四蛇相鬬力有強弱勢有輕重火蛇乘勝則心骨蒸燒風蛇敗績則四肢不舉土蛇質重水蛇性寒一有中我寒痛酸麻精神恍惚若楚萬狀雖名曰人與鬼無異病後思之可懼可驚是以毗耶城中淨名居士示疾說法指四蛇為大患呼五欲為鴆毒彈偏斥小歎大褒圓會粗入妙百千伎倆淨佛國土成就衆生若然者病與不病顧其人用心何如耳善用其心大患鴆毒即廣長舌相喚何物作病文子不遠數千里抵燕京一旦遘疾將若不起仰籍三寶光被得再生之路病雖漸愈而長途南還秋高木落悲風慘悽行者依依此時能思病中苦惱較今者秋容溢目杖履飄然不急於此中求個無疾病方子作箇自在無患人前愧淨名老漢多矣文子來前吾問你正病時有不病者麼文子不能答道人叱咤曰隔江見影橫趨去先後無心分別他文子薦得四大毒蛇未始非四等慈也示寂言文子淨法界身本無生死瞥爾情動十界昭然由粗而精由苦而樂則地獄界因十惡所感餓鬼界因慳妬所感畜生界因癡淫所感人界因持五戒所感修羅界因修善兼嗔詐所感天界因十善所感此六界謂之六凡聲聞界因四諦所感緣覺界因修十二因緣還滅所感菩薩界因修六度所感佛界因修無上菩提所感此四界謂之四聖若由精而粗由樂而苦則不能入佛界者在菩薩界不能入菩薩界者墮緣覺界不能入緣覺界者陷聲聞界不能入聲聞界者墮天界不能入天界者墮修羅界修羅界不能回心則墮畜生餓鬼及地獄界人界不回心亦墮畜生餓鬼及地獄三界嗚呼一心未生凡聖皆不可得唯淨法界身圓滿無缺一心既生則聖凡判然毫不可昧是以修行之者以十界鏡心凡念頭起處當知自己所入所墮之界如掌中見紋理條然明白如於十惡境上生心即知是地獄界因於慳妬境上生心即知是餓鬼界因於癡淫境上生心即知是畜生界因於五戒境上生心即知是人界因於嗔詐善境上生心即知是修羅界因於十善境上生心即知是天界因於四諦境上生心即知是聲聞界因於十二因緣境上生心即知是緣覺界因於六度境上生心即知是菩薩界因於無上菩提境上生心即知是佛界因然而地獄苦有輕重餓鬼飢有淺深畜生癡淫有厚薄人道有富貴貧賤修羅有強弱天人有優劣聲聞緣覺有巧拙菩薩佛有差級是皆衆生日用業力所感如鏡照面好醜宛然然地獄衆生欣慕餓鬼餓鬼欣慕畜生畜生欣慕人道人道欣慕天人天人欣慕聲聞聲聞欣慕緣覺緣覺欣慕菩薩菩薩欣慕諸佛何啻泥蟠之龍之慕雲霄蹄涔之蟲之慕滄海哉乃有一種癡人厭浮生有限壽樂不常欣慕仙道以圖長壽享樂永久殊不知地獄衆生一念能發無上菩提之心乃至直超菩薩境界況天之與人修羅之與仙乎如在人道中不能發無上之心培佛種子則不若地獄中能一念發菩提心衆生遠矣且地獄之苦不為極苦女身之苦最為極苦雖貴為天子之母自謂受福無上殊不知訪道名山參禪佛海不若貧賤男子多矣何者女人障礙無量嫌疑多種一動一靜一出一入凡百所為受人禁縛不得如意貧賤男子則不然但發肯心訪道名山亦由我參禪師海亦由我遊行千萬里亦由我深山靜坐亦由我高聲念佛亦由我歡喜樂道大笑幾聲亦由我縱橫自在去來隨意以此言之則極貴女人不如貧賤男子明矣然要脫女身亦不難但能信得善知識言語透徹反邪歸正旁門小道一頓併掃朝去暮來歡喜煩惱忙閒動靜昏沉散亂種種關頭毫不放過惟以毗舍浮佛頌為根本話頭於一切逆順境上綿綿不斷歷歷不昧持誦將去如是做工夫做得三年五年若無效驗當來若不脫女身不惟我之舌根當破則十方諸佛廣長舌根亦當破也我發此誠實語汝等不能信受不能以十界照心警䇿日用墮大地獄現在招苦總怨不得善知識咄三塗一報五千劫出得頭來是幾時示法燈夫一心不生有無莫待況有聞見者乎雖然一心既生矣六根已備矣舍是而有入者未之有焉所至人說法或以舌根演之耳根入之或以身根啓之眼根入之以至鼻與諸根循環而闡其微無常而納其妙若然者則凡悲歌感慨唾罵譏訶棘林瓊樹衣冠禮樂鼓吹笙簧飲食男女是非好惡戈矛交加鼓而進之金而退之寂寞雲林喧囂市井皆如來廣長舌相也有入無入顧其聽者何如耳萬曆歲在癸巳春三月十有一日夕陽在峯爐煙凝翠虗堂若鏡心眸澄渟時開郎趨入肅拜而立齊頭有身根說法眼根聽受舌根說法耳根見納之語豫不覺舍然大喜曰吾子可謂知言矣因援筆書此以廣其義焉示道開聖人設律所以防奸邪祖制綱宗所以防魔外是以是凡是聖若不打這箇圈裡過得縱有些微見地皆非正因故巖頭奯禪師曰但了綱宗本無實法年來去佛遙遠真子簡出在處逐隊成群胡吼亂吼若遇箇作家拈大明律一條據贓問罪直饒你古佛再來也須納欵況小根魔子者哉雖然如是且道末後又作如何話會天上樂有盡人閒苦不窮百年如曉夢莫待醒來空老漢挂搭清涼山中一日浣禪人白曰浣患熱病幾三月時浣母視病勞頓不堪怨而祝曰這廝何不早死於是浣知母慈不及佛慈多矣老漢不覺愴然久之乃謂浣郎曰汝知言矣然而猶未盡善也佛慈之於衆生雖天覆地載空包萬有亦難喻之況情愛之父母乎父母觸惱至極則怨心猶生衆生觸腦如來遠經塵劫猶且姿曲方便慈護之不暇不至成佛終不已也由是觀之佛慈母慈豈可同年而語哉示浣禪人萬曆辛卯仲秋三日達觀老漢被業風吹到一處名曰華嚴菴菴前有流水菴背有青山青山與流水廣長舌相寒時老漢問浣禪人曰此菴名甚麼對曰華嚴菴老漢從容就上一拶我聞華嚴有四法界一曰理法界二曰事法界三曰事理無礙法界四曰事事無礙法界且道理法界現前時事法界在甚麼處事法界現前時理法界在甚麼處事理無礙法界現前時事事無礙法界在甚麼處若謂理法界即事法界事法界即理法界此便抹略前兩重法界了也只成得個事理無礙法界若謂事理無礙法界即事事無礙法界則是釋迦老人開事事無礙法界成個有名無實去又四法界中前三法界特為後一法界作前茅耳是以前三法界饒你透徹了了第四重若過不得不免逢緣觸境種種嬰障礙去此種種障礙亦非天降亦非地湧亦非人與亦非境礙其病根只在事事無礙法界關棙子卒未能掉臂過得此個關棙子非但今時學人透不過去昔有一座主內外淹博於黃面老子所說一大藏教無不指掌明徹於孔老百家亦無不詣極自謂經世出世無不了當且有一條好熱肚腸病天台賢首慈恩三宗及外教侮慢佛法互相冰炭擬作一書折衷三宗墻塹內典適有一禪人問曰我聞座主欲折衷三宗不知座主是誰家兒孫座主曰本宗賢首禪人曰杜順是華嚴第幾祖座主曰是第三祖禪人曰此老有個頌子曰懷州牛吃禾益州馬腹脹天下覔醫人灸猪左膊上敢問座主如何理會座主舌大而不能答禪人曰此是你本宗關棙尚透不過敢折衷他宗乎由是座主發憤參方去達觀老漢即今為現前大衆再下個注腳使人人管取當下了徹雙林傅大士乃彌勒菩薩化身渠亦有個頌子曰空手把鋤頭步行騎水牛人從橋上過橋流水不流若謂傅大士頌子與杜順老漢是同則彌勒菩薩乃慈恩之始祖也杜順亦文殊菩薩化身乃華嚴第三祖也而慈恩本宗相宗華嚴本宗性宗性之與相從來冰炭不相入者如何說同若謂是異相宗如波性宗如水波不離水而有水不離波而顯如何異說又臨濟有個四料揀一曰奪人不奪境二曰奪境不奪人三曰人境俱奪四曰人境俱不奪汝大衆且道四料揀與四法界是同是異謂同則饒你華嚴四法界重重了徹於臨濟四料揀中又透不過謂異則臨濟所傳佛心也華嚴四法界所詮佛語也豈佛心與佛語自相違背者乎老漢生平不耐扯葛藤今日則為現前大衆於華嚴四法界中如盲人摸象相似乃老婆徹困如此雖然永嘉大師有言嗟末法惡時世衆生薄福難調治聞說如來頓教門恨不滅除令瓦碎嗚呼聖人慈悲之心豈啻天覆地載而已豈啻慈父慈母而已但衆生不悟自心故不知佛心既不知佛心安知佛語宜乎於四法界中撞頭搕腦左滯右礙過在未明自心耳且道如何是自心懷州牛吃禾益州馬腹脹天下覔醫人灸猪左膊上咄莫道是兩重公案疑則痛參去示浣上人夫慈惠之與謙謹含渾之與精勤深靜之與光明而殘刻之與我慢褊急之與因循輕浮之與昏庸此六者之與彼六者果一物乎果多物乎嗚呼善惡無常粗妙如幻唯了悟自心者能力行善用之雖殘刻亦慈惠也如存我未忘之徒雖慈惠亦殘刻也以此觀之慈惠之與殘刻果一物乎哉果二物乎哉顧其人用之粗妙何如耳故曰善造道者不煩千日之功靡不臻其妙詎不信夫示開侍者師問本公居常人謂色身有壞法身不壞且道夢時法身在否本曰在師曰夢時身與醒時身同否曰同曰醒時身有壞否曰有壞曰夢時身有壞否曰不壞曰醒時身既有壞則夢時身應同有壞夢時身既不壞則醒時身應同不壞弗爾即不可言同如何甄別師問本公凡作一字少一畫可成字否本曰不成曰有義否曰字既不成安得有義曰畫全成字否曰成曰有義否曰有義師曰且如身字有幾畫本曰六畫曰義在那一畫本無語少頃進曰義在六畫師曰均等六畫不均等六畫以成其義曰均等曰總均別均若總均則義總在初畫餘五無義別均則畫畫有義散則不成本無語二段俱示本禪人飲食男女人之大欲故能制大欲者則可與言無上覺道也夫欲之難制甚於毒龍猛虎於是覺帝顧命之際阿難請問佛滅度後四衆人等以何為師如來勑曰我滅度後凡我弟子以波羅提木叉為汝大師能若是如我住世無異由是觀之則波羅提木叉既為佛子敢弗欽承邇來去佛時遙豈惟山陬海隅僧徒不遵戒法即名山寶地不知波羅提木叉是何骨董嗚呼自心清淨戒根本潔自心空寂定水本澄自心明徹慧光圓滿一念之忽無端強照所謂本具戒定慧迷而為貪瞋癡矣自是從生至死從死至生死死生生纏綿業網升沉靡常或鱗甲羽毛天冠人服苦樂萬種皆曰無明故曰隨順無明墮諸有若不隨順諸有斷若然者無明智慧辟若一指之屈伸耳豫奪皆由自心焉用他力顧其人自肯不自肯何如耳果自肯發心雖至愚之人渴而知飲饑而知食男而知女女而知男既辦肯心即將此知知身非有知心惟名身心解脫則逆順境緣千差萬別皆發揮我自心之光也到此時節智慧尚無地可寄況愚癡乎豫以是知人無愚智但在發心不發心耳故智慧之人肯心未發亦與牛馬無異現前大衆已往所作從此無論既經拈鬮以來斷須共遵佛勑杜絶女人無令入寺女人既不入寺自然德香清遠泉石生光亡者得生善處生者俱獲禎祥少違佛勑死者愈墮生者滅亡現前大衆各各要知好惡必以波羅提木叉為汝大師無得怠慢無貽後痛示覺山寺僧衆四明天童滅翁文禮禪師往淨慈參混源不契謁育王佛照光禪師照問恁麼來者那個是汝主人公師豁然領旨異日照再問是風動是幡動這僧如何師曰物見主眼卓竪又問不是風動不是幡動甚處見祖師師曰揭却腦蓋照喜其俊邁後松源唱道饒之薦福室中問僧不是風動不是幡動僧擬議即棒出師聞之頓忘前解往參焉蒙印可師上堂舉棱嚴經云諸可還者自然非汝不汝還者非汝而誰頌云不汝還者復是誰殘紅留在釣魚磯日斜風定無人掃燕子銜將水際飛嗚呼汝看這滅翁老子六歲即知有此事見佛照發之見松源了之及出世為人一機一境片言隻語生殺自在魔佛膽落辟如淮陰出師霍光立朝節制典刑閉門造車出門合轍故曰參須實參悟須實悟用須實用汝三人既皆割斷世緣同心行腳老漢雖不敏有幾句淡話布施汝等前途作個主杖子也須知好惡始得用去第一句斷得盡第二句做得徹第三句隨分過能於第一句中荐得不唯可與佛祖為師要見滅翁老子面目亦不難第二句荐得管取汝等天上人閒受大快樂去第三句荐得又不若即就目前隨緣度日亦好何必水雲萬里討甚勞頓雖然古德有言汝有主杖子與汝主杖子汝無主杖子奪汝主杖子且道為甚麼如此咄妙德菴中辭我去兩行熱淚為誰流此三則機緣皆是古人了大事之籧廬也雖然行在中途卒風暴雨忽然到來亦可以作個躲避苫架免得淋頭澆面去汝三人既取斷得盡第一句則念佛持呪誦經總屬第二句中不知一切果斷盡了我問汝等茫茫行腳畢竟以何為主杖子辟如樵夫入山不持斧子漁翁入海不持網子將甚麼斫柴將甚麼捕魚汝等黑樓莾撞如此竟不自知可笑可痛老漢憫汝等愚癡忽略特著當家的持三則機緣授汝等前途作個主杖子大須要知好惡如旃檀不知其香狗糞不知其臭逆境不知忍辱順境不知厭離忠言不知為我阿諛不知害我如是行腳縱行到頭白老死有甚利益由是觀之莫若不出門好雖然男兒自有沖天志肯落尋常流輩中畢竟此三則機緣不透生不如死夫心術無常聖凡緣起一切惟其所憑憑諸淨則人法夢空根塵迥脫自心完朗反是則三塗橫闢萬有沉淪衆苦交纏絆縛終古抱靈男子可不慎哉茲陸生痛染習難除乘勝道場恭伏三寶光中刺指血書戒文可謂嚴以自治慎其所憑者也將由凡入聖博度有情道人血願陸生無忘示陸季臯吾聞古皇先生有言曰大凡物有纍則力寡如目纍於色耳纍於聲鼻纍於香舌纍於味身纍於觸意纍於攀緣六塵封蔀一心光蔽矣是以地大四塵所成則能載有情水大三塵所成則能載地大火大二塵所成則能載水大風大一塵所成則能載火大由是觀之一塵不立則其力大不可思議焉吾人封蔀六塵而不知覺終古若長夜固有慧力而不知用寧不痛哉示楚光禪人夫道心唯微人心唯危微之乘危危之傾微苟無志以持之則微者幾不復矣雖然微果非危乎危果非微乎微乎危乎危乎微乎今有人於此苟有志於道德功名之域不能尊其所謂微者寧惟所願弗克將靡所不至焉噫萬類紛紜唯人最靈不能重此而重彼非夫也勉馬大之夫火非膏不延膏非薪不熾或者以火辟神以膏辟精以薪辟形故精竭形腐則神不留矣若然者火未嘗不在微膏與薪則相不可顯故曰相火者火之皮膚也若所謂性火者豈可以耳目聞見之所既哉第貴神而明之耳古人以衣惡衣食惡食則謂之能甘淡泊大率惡衣不過槲麻之類惡食不過糟糠之食吾雖不德夏則喜著槲麻冬則樂服布裘食則糟糠菜根豆查靡所不甘至於斷食或一日兩日或三日習以為常略不經意嗚呼吾雖如是不知後之居喜福者果能踐吾之志否如能之則叢林自然秀茂鸞鳳自然翔集法道自然興隆山門自然無事噫青山流水可以怡耳目貝葉蘇燈可以澄身心天子不得而臣之諸侯不得而友之一介匹夫而能臻此者皆佛光所被也可不自重乎示喜福寺衆自佛法東來天下但知有佛而後有法有法而後有僧殊不知過去諸佛現在諸佛未來諸佛及十二部經皆以僧為本源也故曰僧者佛法所從出而本源不清則佛之與法有若無也乃僧之本源則又基於性事二戒性戒者洞明自性決了無疑即名性戒事戒者初則根本五戒中則沙彌十戒後則比丘二百五十戒五戒者不殺不盜不淫不妄語不飲酒十戒者五戒後續增不香油塗身不坐高廣大牀不故往聽音樂不手捉金銀生像等不過中食二百五十戒者茲不暇述是名事戒邇來世道交喪凡為僧者事戒茫然不知況望其洞明性戒乎涿州石經山為天下法海自隋琬祖以來龍像蹴踏振揚宗教代不乏人逮我明珠林鞠為草莾金碧化為泥塗究其病源在吾曹性戒不明事戒不持故耳老漢實於此山有大宿因感慨今昔不能坐視於是命諸檀越贖琬公塔院已贖自隋以來高僧骨塔二百餘座已復思業既失而歸復復而無所守不若不復乃集東雲居西雲居兩寺住持并執事僧等撞大鍾撾法鼓稟報十方諸佛釋迦如來一切賢聖僧思大尊者琬公尊者諸護法靈聰本寺護伽藍神等授以毗舍浮佛傳法頌開性戒之本源也次告以根本五戒者培事戒之鎡基也爾等自今而後各宜懺悔前愆改往修來於毗舍浮佛頌始而能讀讀而成誦誦而無閒忙閒則性戒有日明於根本五戒勉強受持能千日不犯則盡形壽可持矣噫仰佛寵靈及大善知識委曲提拔性戒事戒果能如車兩輪如鳥雙翅保重不失則運遠騰空有何難哉咄八十翁翁上場來決不是小兒戲爾等也須知好惡則佛本源枯而復榮涸而復溢端在是矣示東西雲居寺僧衆汝欲他行實為好事反求古之成大器於當世者無一人不從行腳中來也若不遍遊知識之門歷煉鉗鎚之下而欲成器者未之有也雖然未必常行而不住亦未必常住而不行但當行則行當住則住其當行者或飽食閒居恣情肆欲不行而住其可乎其當住者或逢辣手師承真正道友不住而行其可乎據汝所見以為世緣擾擾不與佛法相應擬舍而他求殊不知佛法與世緣皆為餘事於自己分上了不相干不若向擾擾處回頭轉腦看畢竟是甚麼不得作世緣支撑亦不得作佛法會取久而恍然自省則其工愈倍矣如或雖欲行腳求心不息緣念紛然今日某州明日某縣奔南走北目盻心馳至於白首終無成就直須按下雲頭捨著性命歷艱經險面皮若生鐵鑄成遇樂逢歡心志似純鋼打就心不到境境不到心如是則有少許行腳分耳示慈航運侍者夫利較名則名高於利名較身則身復親於名身較心則心又密乎身心較性性則復為彼種種本故曰窮理盡性嗟乎性若可盡則欲盡者果何物哉其所欲者又果何物哉如金剛與泥人揩背而痛癢甚奇但未有知之者殊為土地恨也示陸季高夫玄黃無咎咎生於情情若不生觸目皆道故情有理無者聖人空之理有情無者衆人惑焉古德云一心不生萬物無咎又曰自心取自心非幻成幻法由是而觀則得心者千差皆如膠境者一真紛擾嗚呼森羅萬象一法之所印所謂一法者果即心而有耶果離心而有耶果非即非離而有耶學者於此苟能諦審觀察觀久緣熱𪹼然心開則離亦如即亦如非即非離亦如若然者無往而非如矣豈可以萬盡之哉萬如當痛持戒珠無為五色糞之所埋沒勉之勉之示萬如禪人夫情未變之初謂之心心之前謂之性性體本具明靜二德以性體無外不能自覺故強照生強照生則明靜之德變而為昏動矣昏動既作則萬法生焉而變化莫窮也故名無知覺者謂之依報謂之器界有知覺者謂之正報謂之衆生此自本而末也又謂之順流謂其流逸前塵陷於根界夫根塵既備有待鏗然似不可解矣蓋由昏動昧之動散也故又謂之昏散嗚呼昏散果何物哉置我於生死浩然之中顛連長劫痛苦歷窮竟不能擺脫消解使我現前日用之際如處覆盆之下如蕩飄風之中無須臾明靜者非天地非鬼神為之祟究其所以必使我當明反昏當靜反動人號萬物之靈而昏散之權在彼而不在此所以無我而靈者埋沒不振本明不明本靜不靜皆昏散主之也有志於收放心者苟不能主昏散而受昏散主則收放之功終難建矣故曰欲收放心先究昏散之所以然昏散之所以然既明則昏散之權在此而不在彼然昏散之所以然亦不易明如能明之則由情而復心用心而復性如掌中見紋理鏡中見眉目自此乘明治情譬如挾天子而令諸侯孰敢抗命故曰率性治情非見性者不能又曰聞道易明道難又曰大事未明如喪考妣大事已明如喪考妣真萬古之名言也苟非喪心病狂者誰不信入依此而行功不虗棄終歸無所得則昏散名定慧不名明靜者聖人蓋欲不忘復性之功也此謂之逆流蓋逆無明流而入法性海故曰隨順無明起諸有若不隨順諸有離此理昭著雖至愚者舉逆順梗槩示之亦必了然況智者乎又常居飲食後不覺昏沉要睡此斷不可縱情必當以散動倒治之則醒醒後雖熟睡可也其治散亂法亦同良以衆生日用不昏即散不散即昏昏昏散散散散昏昏自無始以來勞敝我如此又一切病患皆生於昏散故善治昏散者百病輕減亦不易老究其所以不過要昏散之權不屬昏散而必屬我要醒則醒昏之不得要睡則睡散之不得始試之於飲食前後終徵不於即昏即散而明止觀由止觀而治昏散昏散復本則所謂明靜之德不待召而至也如問性體待汝鑄昏散成定慧後再為汝道未晚也示陸季臯龍乃鱗蟲之長其亦有君臣男女雖深雲重嶂之中而出沒往來大都無常是故吾輩居此當一切起居屙屎放尿赤體不淨之言宜一一戒之則護衛信心自然之理其必不愆者也反是則能久處而無魔事未之有也嘻住茲幽勝受此清祉真片時直抵百年可不自重自大哉潭柘示法侶近日人命干連今日舍利臨筵且道誰福誰罪開沉吟師咄曰黑暗女功德天善用之福無邊西雲居示道開風鼓萬物泉行地中樹動即知有風物潤即知有水豈必待眼見風與泉然後知哉人心固有之光初無內外匪屬生滅無我而靈眼資之而見色耳藉之而聞聲鼻假之而識香臭舌借之而味不昧身意二根憑之而始有覺與知也濟上曰汝等諸人各各有無位真人在六根門頭放大光明照天照地總不薦取而取我求實一何愚癡長沙曰學道之人不識真祇為從前認識神濟上則以六根門頭昭昭靈靈者即是佛性無煩別求長沙又以六根門頭昭昭靈靈者指為識神佛性則無我而靈識神則有我而昧濟上乃法海老龍宗門匠石豈不辨佛性與識神耶長沙仰山畏其機峻呼為岑大蟲豈亦不能辨識神與佛性耶此兩重關去聖時遠無論黑白菽麥不知每認識神為佛性斥佛性為識神是此非彼是彼非此即號稱大善知識與老道學者佛性識神尚辨不出況矮人與瞎公雞乎萬佛也不識好惡一味信口亂統不遑顧人喜與不喜但願綱宗明白眼目人天雖殺身可也巖頭曰但了綱宗本無實法奯公法窟爪牙也不以佛性識神提撕直以綱宗為己任學者可以思矣蓋綱宗曉了魔外防間不費金湯祖庭自固矣所謂實法者說理說事說事理無礙說事事無礙說鼻祖東來斥相泯心直指人心見性成佛說三藏十二部說一千七百則機緣皆實法也故曰一大藏教是拭瘡瘤紙一千七百則機緣是亂葛藤雖然如綱宗了然則彼種種皆我固有之光也何以故心外無法故古德曰心明則始見性光由是觀之見色則以眼為眼見性則以心為眼心見性時如風游太虗如泉潤大地謂之有能所亦不可謂之無能所亦不可何者以風與太虗不可捉摸故潤與土揀擇不出故然非無風與太虗非無泉與土也始光既發心求無上菩提設綱宗不明看教則受教瞞參宗則受宗瞞教與宗並是出世清淨之法猶皆瞞得始光況飲食男女聲色貨利榮辱場中千奇萬怪不能瞞始光耶且道如何是綱宗即臨濟雲門溈山法眼與洞上密印諸方納子者也綱宗如大將兵符兵符在握則兵多多愈善兵符釋手則一兵不受命矣故綱宗一明即諸佛諸祖或生或殺機握在我況人天魔外耶教家綱宗如不明理事皆不成就三昧則文字語言與種種義理都謂之所知愚禪家綱宗不明則不能鉗鎚學人死其偷心偷心不死古人謂之鶻臭布衫始光須知佛祖旋陀羅尼智非黑白淺識闒茸所堪留神惟大心衆生可以擔荷旋陀羅尼即宗教綱宗別名耳始光如旋陀羅尼不知則心不明且被情奪將恁麼當眼見性乎性亦不難見難在於不能自重能自重凡所施為自然不敢苟且比來黑白雖號稱談禪講道咸不能憂深慮遠總來苟且圖個口解脫便了所以識神佛性九箇到有十箇辨別不出識神佛性既辨別不出則率性與率情所以然之說渠安能明了率性則無往不妙率情則無往不粗何以故率性則無往而非無我而靈者用事故率情則無往而非有我而昧者用事故又率性若未見性安能率之如人渴不見水又飲何水惟見性者然後能率性能率性則無始以來一切染習種子現行無擇境緣順逆自然任運而消故曰見性人習氣不消而消不修而修古德曰識得主杖子與汝主杖子一任挑雲掛月撥草瞻風識不得主杖子奪取汝主杖子直教汝扶籬摸壁去此即率性與率情樣子也亦綱宗中不得不料簡者脫不料簡則佛魔不辨矣又率性不昧則始受用得本有光明受用得本有光明謂之密以此密能料簡防間魔外謂之印曹溪因惠明問曰此外有密意否曹溪曰密在汝邊若始光問萬佛此外有密意否萬佛則曰玄沙破砂盆是密意臨濟乾屎橛是密意雪峯滾毬是密意曹山木蛇是密意溈山水牯牛是密意耽章和尚墮字是密意始光若謂破砂盆等是無義路句此乃近時魔外見解如此若謂別有義路且道畢竟如何是他義路如於此透不過去則樹動不識風地潤不識泉可知矣風與泉佛性之譬也動與潤識神之譬也譬喻乃象之小者也始光如能玩象得意則識神與佛性一任安名賞號了無過咎如意未得則句不活句不活則不能洗光佛日且道佛日懸在何處咄除却覆盆求燭照斬頭覓活太癡生示始光
