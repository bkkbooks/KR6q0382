body:
  text: 明憨山德清閲唐貫休畫十六應真贊第一賓度羅跋囉墮闍尊者一手持杖而手屈二指膝上閣經而不觀杖穿虎口餘指閒屈以此為人喚渠何物頭顱異常隆而復𮃹巖底雙眸光芒難遮第二迦諾迦伐蹉尊者雙手結印而杖倚肩形如枯木忽開面門須眉之閒眼挂鼻掀楖栗一條拳拳握牢有心無心筆墨難描第三迦諾迦跋黎墮闍尊者骨瘦稜層目瞪而眉橫如劍右手執拂左手按膝骨齊枯柴物我忘懷眼露眉橫見人活埋右手握拂抑揚雌雄聳肩並足龍象之宗第四蘇頻陀尊者趺坐石上右手握拳左手按膝眉長覆面一手握拳一手閣膝纍足而坐萬古一日面部少寬頭多峰巒若問法義兩眉覆顴第五諾矩羅尊者雙手執木童子𭺗癢俄覺背癢手𭺗不能用木童子一𭺗癢停未癢癢無既癢𭺗除敢問尊者此癢何如第六跋陀羅尊者匾腦豐瞪目上視手掐數珠春秋幾何晝夜百八珠轉如輪聖凡生殺腦額缺肥偏頗所希眼光射空鳥駭停飛第七迦理迦尊者宴坐石上眉長繞身面不盈楪五官分職聲色香味各有法則身無一尋眉長丈餘以此為舌隨時卷舒第八伐闍羅弗多尊者露肩交手注目視經貝多展石橫眸讀之交臂露肩心有所思空山無人老樹為伴風弄新條如柔如斷第九戒博迦尊者側坐正見半面一手執扇拂一手屈三指在手握扇右手握拳衆人之見我則不然以扇握手拳亦何有作是觀者雲山我肘第十半託迦尊者雙手持經縮頸聳肩注目視之肩高枕骨目迸天裂經轉雙瞳清機漏泄風月無主煩茲耆年是龍是蛇逐句試宣第十一羅怙羅尊者撑眉怒目手有所指怒則不喜雙目如劍眸子流火晴空電閃凡有邪思指之即空本光獨露如日在中第十二那伽犀那尊者擎拳拄頷開口露舌見喉而大笑目動眉搖開口見舌以誠悟物擎拳曲折背後雲山流泉潺潺不以耳聞我心始閒第十三因揭陀尊者杖藜倚肩左手托經垂頭而注視右手掐珠降伏其心使心不閒珠輪指上經置掌間猶恐其放杖倚腹肩以經視眼心遊象先第十四伐那婆斯尊者六用不行入定岩谷心如死灰形如槁木神妙萬物蒼巖骨肉鐵磬誰鳴空谷傳聲呼之不聞不呼眼瞪第十五阿氏多尊者雙手抱膝而開口仰視齒牙畢露脫去數枚抱膝何勞頭顱岧嶤才開口縫舌相可描以眼說法開合無常明暗代謝奚纍此光第十六注茶半託迦尊者倚枯槎而書空腰插棕扇一握上畫日月古樹苔垂指頻屈伸請問大士為我為人棕扇一柄匪搖風生無邊熱惱披拂頓清達磨贊航海東來唱傳佛心斷臂求之了不可得一場懡㦬阿誰受屈五乳峰前太煞狼籍皮肉骨髓腥氛逆鼻只今聞著還云不識旃檀乾闥婆神王贊無生路絶有生門開聖人之權變化莫猜現容威猛慈母之痛凡有赤子愛如麟鳳龍樹尊者道影贊稽首龍樹尊無端現月輪若無那提婆敗闕不堪聞且道遮老漢末後轉身一句子作麼生咄外道五千成佛去自家端只陷泥犂康居國會尊者像贊并序嘗聞孫權初見會公疑其形服及求舍利有遂建浮圖嗚呼人心多疑皆生於有欲有欲則計利害利害未決疑從是起殊不知一心不生凡聖平等本光圓滿利害奚從衆生昧此聖人悲之不遠千萬里抱夜光而投人人猶按劍痛哉身非我有心亦無常身心之外更復何當三稱如來血淚沾裳終古之痛為誰著忙知公者希公德難量舍利昭靈示現無方嗟豫小子濫墮僧行中秋之夜一接容光慈嚴流注沃我焦腸此情此恩芥劫難忘康居國會尊者像贊寄憨公并序三國為英雄之聚亦刀兵之聚慈悲般若無有入處而康祖一錫浮江三稱如來兩目流血舍利投瓶光燦六合澤綿千古是時也吳之君臣莫不為之動心變色即事徵理知有佛而不疑六度既譯安般門開無擇黑白得法眼淨與夫禪思入微者不可計算皆我祖為之嚆矢也茲憨山清大師因弘法戍瘴海善以慈心三昧普使朽骨生春聖華居士聞風感慕特寫祖影寄上曹溪以為大師影響嗚呼曹溪肉佛所現自唐及宋飲曹溪而得道者代不乏人邇來曹溪涸矣搖林蕭然又藉憨師以謫戍為波瀾而曹源復活康祖分身髑髏眼開恆沙難喻豈可以有思惟心測其功德淺深者哉達觀道人不解逆風把柁但解順水推船為之贊曰康祖來吳清公謫髑髏大師金剛眼突瘴海之慘骨刺魂驚大師得戍彌感聖明曹溪蠱毒飲者皆喪大師飲之銷盡諸障指撮舍利康祖之貪貪不為我此心何慚弘法得罪命如單絲千里瘴嶺芒鞋踏遍雷道岧嶤颶風正高鉢瓶孤逝舌相昭昭南魍魎白日鼓掌我若無心菩薩影響有心應之康祖愚癡章甫之國其誰不疑石頭之別肝膈氷冷丁生吹火寫康祖影緣影得心心忘性冥大用無常鐘以眼聽根塵主客收放夢醒掌擎瑤塔牢山之頂潭柘山嘉福寺觀音殿足跡贊并序夫差雪恥而破越勾踐嘗膽而亡吳伍員覆楚申包胥哭秦庭以復楚皆苦心志勞筋骨積歲月忘寒暑而後其願始克今此道人以有情之踵磨無情之穿跡成雙趺宛然使後之見者毛髮俱豎涕淚交下懈怠之習精進之光雲迸日露以夫差等四子心力所積較此道人足力淺深其何如哉余感而贊之不惟見賢思齊願人人因贊生奮因奮生恆因恆生克贊曰頂禮道人雙足跡身毛不覺忽俱豎無始懈怠習頓除覺天雲迸精進日逆想斯人初未逝朝暮殷勤禮大士心注聖容口稱名形骸屈伸安可計積日成月月成時積時成歲歲成劫如是積漸難盡言水滴石穿心力至辟如千里始初步又如合抱生毫末以踵磨漸易易精進猶未已穿大地承足底地穿有時人不見我獨了了無疑異因之耿耿生悲泣願我從今頂禮後精進為足踐覺地境緣逆順湯潑雪又如利刀破新竹迎刃而解觸熱消在在處處常自在又願見聞此跡者剎那懈怠皆氷釋自贊以石為屋初無成敗風塵負情水月償債寂寞心珠虗空眼界田衣拱默纍足揑怪咦是教是宗俱不會象先富貴有誰爭或言汝廓落吾笑汝褊窄見善便歡喜見惡即不樂善惡未忘懷安可入無著又言汝了了自了復度衆信汝如活佛朝夕生殷重吾知汝見思尚在法空未登帶情說法誑諸聾盲吾聞知人者智自知者明汝於兩者何者為衡咦帶情說法情何物明暗相參作者知汝若是我世出世閒種種好醜一點也瞞你不得我若是汝一切逆順關頭死生路口如風過樹如雲觸石雖然如此也未必是老漢本色事若舉本色管取凡聖魂消毒鼓無聲在有人不知汝腳根立處橫搜豎覓究竟汝生緣何處但向伊道自笑行蹤如野鶴前岡飛倦有長松渠是我兮我何所存我是渠兮渠何所留生心揀別兮血脉斷流不揀別兮儱侗宗猷枯木開花兮頑石點頭當家種草兮皮裏春秋咦相逢莫道無機智多少魚龍銀海中汝這漢閒多管見人便勸學菩提更解談長與說短松江月誰能識今宵皎皎懸空碧無限魚龍吸影忙江濤滾滾渾泥出阿庵努眼石灰湯水晶庵內離婁窟個中夢春浪急蠱毒之家水莫喫知不知命根斷命根斷時何處立翻得身來夢已醒黃金總是虗空骨牛首峰頭獻花岩畔不憚烟霞訪老儂因緣往日曾相結浮玉雲金鰲月廣長舌相分明說江北江南春本同桃紅李白顏分別且道分別個甚麼誰家竈裡火無烟一任旁吹閒不徹問渠何處人南北恣超放有時觀驚濤或復嘯層嶂山水癖最深膏肓莫可況天子不得臣諸侯不得黨死生視一條榮辱豈二想更有一般拙輕重不自量直饒佛與祖也要稱斤兩境風逆順時行藏任跌宕虗舟橫急湍魚龍憑覆仰虎兕固知暴錫環振偏響忌諱吉亦凶憨癡衰亦旺首尾俱坐斷中心拄子喪善善而惡惡譽譽而謗謗觸途皆有入生心蚤成障憶昔登葛洪反䇿天水漲河梁羅黑白掉頭明月上陳侯即普賢清光本一樣永寧暮鐘動幾回思鐵杖高踪不可追令人殊悵怏朗空不遠來碧雲索爾像信口敘疇昔持歸常供養諸方禪和子誰不有生緣惟汝初不語水中涵碧天無風浪自寂有影色本然若謂是僧兮依希具髭髯若謂是俗兮眼空鼻祖禪若謂不可名假號何駢駢慣用明暗鎚鎚破無底船且道船底破時向什麼處安身立命落得智香薰法界吳江烟水本依然陰陰紫柏覆枯禪一道神光照大千世上難逢開口笑雲邊常得枕流眠汝即吾兮片月在天影臨千㵎吾即汝兮智訖情枯泥牛作吼且道誰家曲調咄海山雲盡花巖出光德庵前春水深汝即我兮全無覺知我即汝兮妄想紛飛合則非一離則愈疑縱有龍樹之明鶖子之智亦難辨伊伊賦性豪縱腸肚儱侗繩墨不拘利害如夢頗具英雄之心而無功名之志所以難留於塵樊只宜放浪於泉石更有一種傲性自謂佛祖是鈍根才料黧奴白牯堪與交遊有時引教證宗引宗印教有時荊棘瓦礫般般是寶有時珊瑚瑪瑙不值糞草一片舌頭褒貶無定是非亂統有恩處不異冤仇無情處慣肯淹留最是喜怒不常如嬰兒模樣我看你對人不設機關觸著胡談漢談惹得別人憎愛自猶如癡如憨紅禪衣一領披之喜歡若被一箇青眼郎君破我看你不值一錢呵呵呵誰薦此權衡在手任抑揚要人活兮死即死朝供養暮供養喜怒無常情識浪但能直下死偷心此是老儂真妙相紫羅袍舊袈裟兩種看來何者佳旃檀狗糞分明在凡聖關頭路不賒如此會無向背流水青山渾不昧只此不昧火中蓮香光戒月無瑕纇血書金剛經贊稽首金剛經般若最堅利一切有為法無能越此者若人見一字或復聞一句乃至四句等功德難思議墨書不若銀銀書不若金金書不若血娑婆震旦國有大精進女視身等漚泡知心本幻化一念堅固信歷刺十指血書此無上寶願彼見聞者頓空身心執持此金剛劍斷一切憎愛如是妙利益不求人之福回向般若海澡我五漏身獲淨七寶體童真割世染早遇明眼師悟心為佛子弘彼妙法華聲震微塵剎無心及有心非緣培聖種況我血書經果報寧虗誑憍陳如比丘贊瑤宮金闕視等微塵不以富貴而勤此身雲山蒼蒼借石為床心如虗空僧中之王田衣被物鼻孔昂藏荷擔大法苦海津梁頭顱圓滿螺髮久除欲覓一莖雪觸紅爐稽首陳如比丘之祖續佛心燈光傳終古此光非月月有圓缺不圓缺者苾芻當說說而不聞自沒迷雲煩他木石饒舌驚羣驚而忽省楊枝救病瓶解參禪奉如來命泉響千峰眼觀正令竹杖贊此君何來愜我素懷拄有撑無峨眉五臺手如持杖杖不持手直下便見兩頭莫走寒山拾得贊兄持數珠弟握掃帚若問雌雄泥牛哮吼山林市城共覓無生取像會意撥粗得精頌古楞嚴經佛告阿難吾不見時何不見吾不見之處若見不見自然非彼不見之相若不見吾不見之地自然非物云何非汝湛堂準禪師頌曰老胡徹底老婆心為阿難陀意轉深韓幹馬嘶芳草渡戴嵩牛臥緑楊陰頌曰蒼龍慣喜臥重泉頷下驪珠愈燦然借問有誰能抉得化為日月照山川南泉因東西兩堂各爭猫兒師遇之白衆曰道得即救取猫兒道不得即斬却也衆無對師便斬之趙州自外歸師舉前語示之州乃脫草履安頭上而出師曰汝適來若在即救得猫兒也頌曰設使南泉不舉刀草鞋何地賣風騷相逢若問兩堂客鼻直橫眉總姓猫猫兒未必直千金惹得堂頭亦動心信手一刀成兩段草鞋帶去血淋淋黃蘗云汝等盡是噇酒糟漢還知大唐國內無禪師麼時有僧問諸方聚衆為什麼却道無禪師師曰不道無禪祇是無師頌曰年去年來噇酒糟迷花醉柳浪滔滔雙眸驢糞換將去含笑臨行奉一斝德山一日飯遲托鉢下堂時雪峰作頭見便云這老漢鐘未鳴鼓未響托鉢向什麼處去師便歸方丈峰舉似巖頭頭曰大小德山未會末後句師聞令侍者喚來問汝不肯老僧那頭密啓其意師乃休去至明日升堂果與尋常不同頭至僧堂前撫掌大笑曰且喜老漢會末後句雖然如是只得三年師果三年而歿頌曰瞽叟掘井迫舜入象却忙忙填土石悲哉舜兮何時出度門未必是真賊又鐘鳴喫家常事老漢偏渠托鉢先不是雪峰親勘破巖頭管取亦茫然又垂垂白髮出堂來一鉢高擎果異哉不是巖頭親點破至今眼睡未曾開吉州禾山無殷禪師示衆曰習學謂之聞絶學謂之鄰過此二者謂之真過有僧問如何是真過師曰禾山解打鼓曰如何是真諦曰禾山解打鼓又問即心即佛則不問如何是非心非佛師曰禾山解打鼓曰如何是向上事師曰禾山解打鼓頌曰崑崙為竿兮長江絲泰山為餌兮釣鯨鯢咄怪底桃花風雨急魚龍總為浪頭迷白雲守端禪師往參楊岐岐一日忽問受業師為誰師曰茶陵郁和尚岐曰吾聞伊過橋遭攧有省作偈甚奇能記否師誦曰我有明珠一顆久被塵勞關鎖今朝塵盡光生照破山河萬朵岐笑而趨起師愕然通夕不𥧌黎明咨詢之適歲暮岐曰汝見昨日打歐儺者麼曰見岐曰汝一籌不及渠師復駭曰意旨如何岐曰渠愛人笑汝怕人笑師大悟頌曰從來伯樂九方臯帶顧駑駘價倍高怕笑只因心有負一籌不及野狐曹又江上貪觀浪勢高被人奪却手中橈孤舟風蕩渾無主一笑分明殺活刀頌雪峰汝虎光還自照心無恐汝虎誰知光正圓最苦者僧成異類人身一失幾時全頌隔壁聞叉釧聲耳外有聲無是事除聲有耳事還無燈前往復觀聲耳五色糞中得一珠頌五蘊山前一段空有我時時背主公我無何處不相逢刀山火聚閒遊戲不負山前一段空僧問趙州萬法歸一一歸何處州云我在青州做領布衫重七斤頌曰七斤衫子製青州半月沉江魚憚鈎怪底蒼龍終是別一歸何處解遨遊臨濟尋常上堂曰汝等諸人赤肉團上有一無位真人常在面門出入照天照地自汝諸人未能薦得頌曰無位真人乾屎橛一名兩實使人猜他家自有通人在豈似韓盧逐塊來浮山法遠禪師暮年休於會聖巖敘佛祖奧義作九帶曰佛正法眼帶佛法藏帶理貫帶事貫帶理事縱橫帶屈曲垂帶妙叶兼帶金針雙鎖帶平懷常實帶學者既已傳誦師曰若據圓極法門本具十數今此九帶已為諸人說了更有一帶還見得麼若也見得親切分明却請出來對衆說看說得分明許汝通前九帶圓明道眼若見不親切說不相應唯依吾語而為己解則名謗法諸人到此如何衆無語師叱之而去頌曰沒坐地沒坐地五位九帶君須記夜來風雨桃花落處處相逢何處避長水問琅琊云清淨本然云何忽生山河大地琅琊亦曰清淨本然云何忽生山河大地頌曰嬰兒失怙久飄零驀路相逢喚一聲知得阿娘腸斷處從教鐵漢淚須傾陸亘大夫舉肇論向南泉曰肇公所謂萬物一體天地同根也甚奇特泉指庭前牡丹曰大夫時人見此一枝花如夢相似頌曰龍出援毫豈是真行雲施雨更謾人夢中說夢知音少花落庭前已過春圓覺經居一切時不起妄念於諸妄心亦不息滅住妄想境不加了知於無了知不辨真實頌曰自家痛癢自家𭺗𭺗重傷他莫怨嗟翠竹黃花隨處有江南江北路非賖巖頭全奯禪師值沙汰於鄂渚湖邊作渡子兩岸各掛一板有人過渡打板一下師曰阿誰或曰要過那邊去師乃舞棹迎之一日因一婆抱一孩兒來乃曰呈橈舞棹即不問且道婆手中兒甚處得來師便打婆曰婆生七子六箇不遇知音祇者一箇也不消得便拋向水中頌曰臭口才開驀一橈老婆無計血腥臊便將赤子拋寒浪惹得魚龍四海囂世尊一日升座大衆才集定文殊白槌云諦觀法王法法王法如是世尊便下坐頌曰瞿曇上座無奇特下座須知便不同就裏相逢能委悉靈山誰是作家翁又聖凡雲集非無事有事如何口不開上座定知還下座文殊椎破使人猜又虎踞深林不見蹤爪牙才露失威風獵人弓矢尋常在弦響須臾命已終又聖凡雲集事非常據座緣何不舉揚賴有文殊解收拾上來下去兩頭光秀州華亭船子德誠禪師印心於藥山與道吾雲巖為交洎離藥山謂同志曰豫率性疏野惟好山水他後知我所止遇伶俐座主指一人來遂分擕至華亭泛一小舟隨緣度日吾後到京口遇夾山上堂僧問如何是法身曰法身無相曰如何是法眼曰法眼無瑕吾失笑山下座請問某甲抵對這僧話必有不是致令失笑望不吝慈悲吾曰和尚一等是出世未有師在山曰甚處不是曰某甲終不說請往華亭船子處去山曰此人如何曰此人上無片瓦下無卓錐若去須易服而往山乃散衆直造華亭船子才見即問大德住甚麼寺山曰寺即不住住即不似師曰不似似箇甚麼山曰不是目前法師曰甚處學得來山曰非耳目之所到師曰一句合頭語萬劫繫驢橛師又問垂絲千尺意在深潭離鈎三寸子何不道山擬開口師便打山豁然大悟乃點頭三下師曰竿頭絲線從君弄不犯清波意自殊山遂問拋綸擲釣師意如何師曰絲懸淥水浮定有無之意山曰語帶玄而無路舌頭談而不談師曰釣盡江波錦鱗始遇山乃掩耳師曰如是如是遂囑曰汝向去直須藏身處沒踪跡沒蹤跡處莫藏身吾三十年在藥山祇明斯事汝今已得他後莫住城隍聚落但向深山裏钁頭邊覓取一箇半箇接續無令斷絶山乃辭行頻頻回顧師遂喚闍黎山乃回首師竪起橈子曰汝將謂別有乃覆船入水而逝頌曰父子冤讐結最深覆舟自盡孰知音朱涇水月渾如舊幾度空過未了心又一副肝腸剖不留夾山猶自暗回頭風恬浪靜船翻處蘋蓼蕭蕭萬古愁又贈君十五棒恨爾不知心昨夜華亭月朱涇何淺深初祖菩提達磨大師初過震旦至金陵見梁武帝帝問曰如何是聖諦第一義師曰廓然無聖曰對朕者誰師曰不識帝不領悟師遂折蘆渡江至魏後武帝舉問志公公曰陛下識此人否曰不識志曰此是觀音大士傳佛心印曰當遣使詔之曰莫道陛下詔盍國人去他亦不回頌曰蕭公豈是等閒人一見當頭便撒塵直得老胡無措手折蘆火速渡江津文殊師利在靈山會上諸佛集處見一女子近佛坐入於三昧文殊白佛云何此女得近佛坐佛云汝但覺此女令從三昧起汝自問之文殊繞女子三匝鳴指一下乃至托上梵天盡其神力而不能出佛云假使百千文殊亦出此女定不得下方過二十四恆沙國土有罔明菩薩能出此女定須臾罔明至佛所佛敕出此女定罔明即於女子前鳴指一下女子於是從定而出頌曰入定從他近佛休陸行車馬水操舟罔明逞俊輕彈指也是無愁惹得愁雪峰因三聖問透網金鱗以何為食師曰待汝出網來向汝道聖曰一千五百人善知識話頭也不識師曰老僧住持事繁頌曰一戰那分雌與雄重新戈甲再交鋒瞎驢鱉鼻相強弱畢竟誰家落下風德山因臨濟侍次師曰今日困濟曰這老賊寐語作甚麼師擬拈棒濟掀倒禪床頌曰兵家勝負是尋常未戰人人手腳忙不識眼前誰可將旌旗擬展早先降湖州吳山端禪師抵鄣南見上方超和尚有一尼師來參師云待來日五更三點入來師侵早紅粉搽面而坐尼入見驚而遂悟超和尚有頌曰堪笑吳山老禿奴巧粧紅粉接師姑茫茫宇宙人無數那箇男兒是丈夫頌曰驀地牸牛見牯牛牯牛産犢牸牛羞從來蹄角分明在今日溪山得自由又五更三點入房中一見紅粧計已窮蜂蝶紛紛過墻去林花夜雨早先空又五更三點急忙來驀面相逢伎倆灰堂上師姑堂下漢者場屈事惹人猜又女人剃頭拜尼僧尼僧笑汝不知汝可憐特地作人情到底臨時無用處又比丘尼接比丘尼橐鼓春風不可思甜有中邊寧是蜜分明說破許誰知頌摩登伽女經怪底瞿曇老滑頭臨機縱奪有誰儔無端賺殺鄰家女嫁與祇園少比丘洪州百丈山懷海大智禪師每上堂有一老人常隨衆聽法衆退唯老人不退師問汝何人也曰吾非人也於過去迦葉佛時曾住此山因學人問大修行人還落因果也無某甲對曰不落因果遂五百生墮野狐身今請和尚代一轉語貴脫野狐身師曰汝問乃問大修行人還落因果也無師曰不昧因果老於言下大悟作禮曰某甲已脫野狐身住在山後敢乞依亡僧事例師令維那白椎告衆食後送亡僧衆驚異食後師領衆至山後巖下以杖挑出一死野狐乃依法火葬師至晚上堂舉前因緣黃蘗便問古人錯祗對一轉語五百生墮野狐身轉轉不錯合作箇什麼師曰近前來與汝道蘗近前與師一掌師拍手笑曰將謂鬍鬚赤更有赤鬚鬍頌曰前百丈後百丈白雲青山無兩樣夜行荒冢不生疑野狐倒跨金毛上又不笑金毛笑野狐野狐伎倆金毛無鬼臉神頭翻大智杖頭挑出看燒渠釋迦牟尼世尊初降生一手指天一手指地周行七步目顧四方云天上天下唯吾獨尊後雲門云我當時若見一棒打殺與狗子喫貴圖天下太平琅琊覺云可謂將此深心奉塵剎是則名為報佛恩頌曰才出娘胎便惑人指天指地眼中塵相逢莫與雲門道萬紫千紅別有春又未出胞胎事已多那堪笑裏弄干戈指天指地誇尊大誰料雲門不放過又出得娘胎便不同人閒天上獨稱雄桃花若使隨流水誤引漁郎到洞中又出得娘胎氣便高指天指地駭兒曹雲門以棒為滄海惡水年年此日澆又韶陽度量不多寬一見渠儂眼便酸啞喫黃連心內苦同行誰識舌中甜師讀楞嚴至七處徵心八還辨見處置卷而歎曰本是泥裏土塊何乃衆生顛倒支支離離鼓粥飯氣頌曰七處徵心心徵心八還辨見見辨見從教猛風蕩釣舟一任吹去水清淺法華經觀世音菩薩普門品即時觀其音聲皆得解脫頌曰率然之怒劍斬木木斷頭落山河匪隔蔡母嚙指順即心痛往反不同血脉非斷衆生號呼菩薩心戚慈眼視之衆生苦息致知格物誰知物格格物情通物格情塞通有解路臭肉蠅集塞無滋味咬嚼莫測於莫測處聚精并力冷灰豆𪹼靈機無極觀彼音聲彼即解脫於未觀時萬苦交迫苦若有常解脫何得既得解脫苦本無骨解脫有筋開物無門水無筋骨能勝大舟水若無有徐鉉愕然張豐失色不見龍潭龍豈有值於剎那頃電光霹𮦷如是號呼眼根得入普門廣大凡無救者入則安適棲賢舜禪師初自洞山如武昌行乞先至一居士家居士高行為郡所敬意所與奪莫不從之故諸方乞士至必首謁之舜老夫方年少不知其飽參頗易之居士曰老漢有一問上人語相契即開疏如不契即請却還新豐問古鏡已磨時如何對曰照天照地未磨時如何曰黑如漆居士曰却請還山舜即馳歸舉似聰禪師聰為代語舜即趨問曰古鏡未磨時如何聰曰此去漢陽不遠磨後如何曰黃鶴樓前鸚鵡洲舜於言下大悟頌曰古鏡休將勘我曹漢陽此去路非遙叢林淡泊先開疏箇箇兒孫出俊髦文殊問庵遮提女云生以何為義女云生以不生生為生義殊云如何是生以不生生為生義女云若能明知地水火風四緣未嘗自得有所和合而能隨其所宜是為生義殊又問死以何為義女云死以不死死為死義殊云如何是死以不死死為死義女云若能明知地水火風四緣未嘗自得有所離散而能隨其所宜是為死義頌曰了四初非有非有恰隨宜只此隨宜時是名為生義不了初非有染應非隨宜迷悟雖無常盤珠毫弗昧迦葉因阿難問世尊傳金襴外別傳何物迦葉召阿難難應諾迦葉曰倒却門前剎竿著頌曰金襴之外有何傳喚應教他倒剎竿少實多虗非得已飲光猶缺自翻船世尊初於臘月八日明星出時忽云奇哉一切衆生具有如來智慧德相但以妄想執著不能證得頌曰三七思惟著甚忙癡兒火宅正相狂況兼門狹難回避老漢多番欲斷腸頌童子聞韶而出高山流水少知音犬吠雞鳴調更深試向聲前聊聽取恐將別有定盤針六祖壇經有僧舉臥輪禪師偈曰臥輪有伎倆能斷百思想對境心不起菩提日日長祖聞之曰此偈未明心地若依而行之是加繫縛因示一偈曰慧能沒伎倆不斷百思想對境心數起菩提作麼長頌曰明鏡不照像謂光日日長此見問如何捕風與捉響明鏡照萬像妍𡟎了不妄此見問如何鏡光可有長金剛般若經何以故若世界實有者則是一合相如來說非一合相是名一合相須菩提一合相者則是不可說但凡夫之人貪著其事頌曰微塵世界本無差自是衆生眼見花試聽江聲歸海上就中何地著龍蛇溈山問香巖曰我不問汝經論義理種種知見汝但向父母未生前道取一句香巖曰和尚替我道溈山曰道得即是我三昧於汝何益於是香巖泣辭溈山曰畫餅不可充饑今生不復學識且作箇長行粥飯僧遂去止南陽庵以休息焉久之一日糞除瓦礫擊竹笑曰溈山大慈恩踰父母當時若為我說却何處有今日頌曰父母未生頭角露溈山今日禮香巖莫嫌此語無分曉萬里雲空月滿天三祖信心銘云境由能境能由境能欲知兩段元是一空頌曰若人忽睡問床有無床若不睡是人即醒床醒人覺理致昭灼本法如是生心即錯僧問首山念禪師如何是佛答曰新婦騎驢阿家牽僧曰未審意旨如何曰百歲翁翁失却父僧曰百歲翁翁豈有父耶首山曰汝會也又曰此是獨坐無尊卑從上無一法與人頌曰婢子奴兒久服勞主人何事反相高無端惹得鄰家笑失禮從來乃自招趙州一日問投子大死的人活後如何子云不許夜行投明須到頌曰年老成精久自誇從來慣打不防家誰知更有白拈賊就裏何曾放過他僧問趙州玄之又玄如何州云汝玄來多少時耶僧云玄之久矣州云若不遇老僧幾乎玄殺頌曰孟三娘子十分嬌腳小才行頭便搖嫁與前村王大伯不教刺繡著燒窑丹霞從石頭歸再往江西謁馬祖未參禮便入僧堂內騎聖僧頸而坐時大衆驚愕遽報馬祖祖躬入堂視之曰我子天然師即下地禮拜曰謝師賜法號因名天然祖問從甚處來師曰石頭祖曰石頭路滑還躂倒汝麼師曰若躂倒即不來也頌曰撥草瞻風去復還石頭豈是趙州關無因開眼閒遭跌話傳來笑不殘杭州無著文喜禪師因參仰山頓了心契令充典座文殊嘗現於粥鑊上師以攪粥篦便打曰文殊自文殊文喜自文喜文殊乃說偈曰苦瓠連根苦甜瓜徹蒂甜修行三大劫却被老僧嫌頌曰喫茶說話意何親誰道文殊是主人別後幾回倍酬唱再來翻作眼中塵城東有一老母與佛同生而不欲見佛每見佛來即便回避雖然如此回顧東西總皆是佛遂以手掩面於十指掌中亦總是佛頌曰自家歡喜自家瞋業火燒心莫怪人若要瞿曇不相見黃金鼻孔可藏身窮子得親頌戰鼓聲中父母失散二十餘年好惡無常此情不昧無故一朝杏花樓上淺斟低唱異姓骨肉歡呼縱樂忽人報言父母及門初失散境不思而現凡我佛子迷根本智漂流識海如失父母竛竮孤露剎那念之智日頓朗一切逆順譬如一毛投大火聚擬欲拈出喪身失命把髻投衙自起自倒忽然酒醒起倒非酒二鬼爭尸頌二鬼爭尸事不同誰能繫取嶺頭風夜來借宿寒山寺醒後方知拔續空頌張天覺見雲庵楊岐一笑端公罔措真淨一怒無盡失利法窟牙爪喜怒無常辟如神龍忽舒忽縮一切有心於舒縮時謂龍舒縮如是見者龍去久矣頌三毒四倒亦皆清淨漢家功業起淮陰不有蕭何月下尋未必此人終得用相逢誰復是知音法身頌紫薇花醉罵荷花輸却荷花不理他惱殺紫薇誰抵命風吹楊柳亂如麻慧忠國師一日喚侍者侍者應諾如是三召皆應諾師曰將謂吾辜負汝却是汝辜負吾後有僧問玄沙國師喚侍者意作麼生玄沙云却是侍者會雲居錫云且道侍者會不會若道會國師又道汝辜負吾若道不會玄沙又道却是侍者會且作麼生商量玄覺徵問僧什麼是侍者會處僧云若不會爭解恁麼應玄覺云汝少會在又云若於這裏商量得去便見玄沙僧問法眼國師喚侍者意作麼生法眼云且去別時來雲居錫云法眼恁麼道為復明國師意不明國師意僧問趙州國師喚侍者意作麼生趙州云如人暗中書字字雖不成文彩已彰頌曰侍者解應不解會諸方解會不解應夜光宛轉金盤中當面阿誰拏得定趙州關頌蜀道雖難尚可行趙州關險不堪登分明舉目真如院多少英靈度未能嵩嶽破竈墮和尚因嵩山塢有廟甚靈殿中惟安一竈遠近不輟祭祀烹殺物命甚多師以杖敲竈三下云咄此竈只是泥瓦合成聖從何來靈從何起恁麼烹宰物命又打三下竈乃傾破墮落須臾有青衣峩冠設拜曰我本此廟竈神久受業報今蒙師說無生法得脫此處生天特來致謝師曰是汝本有此性非吾強言神再拜而沒後僧問師某甲久侍左右未蒙方便竈神得何宗旨便乃生天師曰我只向伊道是泥瓦合成別無有道理為伊僧佇思師曰會麼曰不會師曰本有之性為什麼不會僧作禮師曰墮也墮也破也破也後有僧舉白安國師國師嘆曰此子會盡物我一如頌曰佛竈衆生竈杖敲一時墮寶几嚙狸奴聖凡巢穴固又竈不附我我自附竈賴師敲醒不復顛倒竈雖已墮天豈非竈此墮彼成一絲白皂用處無疑天竈神竈我臂屈伸臂竈墮了禮佛不墮誰起誰倒起倒自在自在萬妙一竈所墮嶽帝冷笑潮州靈山大顛寶通禪師韓文公一日相訪問師春秋多少師提起數珠曰會麼曰不會師曰晝夜一百八公不曉遂回次日再來至門前見首座舉前話問意旨如何座叩齒三下及見師理前問師亦叩齒三下公曰元來佛法無兩般師曰是何道理曰適來問首座亦如是師乃召首座是汝如此對否曰是師便打趂出院頌曰數珠百八記春秋首座承風馬學牛三十藤條驅出院韓公有事掛心頭又大顛伎倆苦無多却被韓公活網羅算計總來難擺脫潮陽瞎棒肯遭何杭州龍興宗靖禪師初參雪峰密承宗印嘗於衆堂中袒一膊釘簾雪峰覩而記曰汝向後住持有千僧其中無一人衲子也師悔過辭歸故里住六通院錢王命居龍興寺有衆千餘唯三學講誦之徒果如雪峰所讖袒膊雖然是好心未央宮裏斬淮陰年年歲歲花開日長使英雄淚滿襟頌輪王髻珠夜明久向髻中藏欲愛乾枯戰自強報捷歸來親頂受放光豈但照東方頌百丈懷海禪師寧作心師不師於心好惡關頭那管他呼來喝去亂如麻奴兒婢子家家有用處無疑我是爺雙峰古禪師嘗受雙峰印記後到石霜霜欲詰其所悟而未得其便師因辭石霜霜將拂子送出門首召云古侍者師回首霜云擬著即差是著即乖不擬不是亦莫作箇會除非知有莫能知之好去好去師應諾即前邁尋屬雙峰歸寂師乃繼續住持頌曰洛陽公子醉豪華不看青山只看花松寺若能留得住老僧那肯惜杯茶廬山歸宗智常禪師一日剗草次有講僧來參忽見一蛇過師以鋤斷之僧曰久向歸宗元來是箇粗行沙門師曰你粗我粗曰如何是粗師豎起鋤頭曰如何是細師作斬蛇勢曰與麼則依而行之曰依而行之且置甚處見我斬蛇僧無對頌曰驀路相逢便一刀一條帶作兩三條住山束肚無煩篾毒氣從今當下消又斷處是性動處情蛇兒擔荷大英靈十方諸佛渠兒孫說與傍人誰肯聽袁州楊岐方會禪師僧問如何是佛師曰三腳驢子弄蹄行曰莫只這便是師曰湖南長老頌曰楊岐弄蹄驢弄蹄石女生兒知不知一日追風千萬里歸來一日尚嫌遲僧問興化獎曰多子塔前共談何事獎曰一人傳虗萬人傳實頌曰塔前多子共談玄側耳聽來眼得傳萬實千真渠不薦騎驢新婦阿家牽
