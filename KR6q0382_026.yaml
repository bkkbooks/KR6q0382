body:
  text: 明憨山德清閲詩七言古釣竿峰漢家失鹿爭相逐江上一絲山水足夢裡龍蛇戰正酣羊裘之外何所欲釣竿偶擲化危峰掛月撑雲曾不曲君不見渭水垂綸一釣閒享年八百資亭毒先生一釣成何事萬古令人仰高躅夜宿旴江太平橋南昨夜太平橋北宿今宵太平橋南眠橋南橋北只一水一水何曾有兩船若得詰朝天氣好從姑山上訪神仙神仙初亦是凡女欲海情枯斷愛纏一斷愛纏蛇為龍飛行自在獨超然野鶴千峰道人天邊鶴三年狀頭籠中天邊野鶴自在飛籠中飽甘束約松雲軒冕病不同幾人知病能服藥自笑少學屠龍術伎成無用渾棄却瓶錫袈裟到處遊楊枝漱口朝自嚼苦中有味頗清涼龍肝鳳肺輸寂寞梵川問月擕麟郎覺生吾問天邊月可曾有離別燕山與吳門幾見月圓缺或復海上生有時林閒沒光輝在隱顯肯為迷雲汩君不見長安道傍蕭寺中焚香露坐月當空昨宵十八高人聚雲月無邊爾復從又不見不傳之妙亂拋擲滿地珍珠誰拾得此情難借空虗喻摧破空虗須著力送栗菴居士來南閩道人自慚情未空憐君遠行心忡忡漳州一去四千里崎嶇不知經幾重分水嶺頭縣鳥道僮僕相呼晚與早何處寒雲猿狖啼日月不催雙𩯭老梁山見說多霜松松根抱石苔色濃幽期無負有如河無豫掃髮千岩中趙州柏林寺壁閒畫水畫水何曾有水相有相焉能畫水狀靈臺無物湛然清信手風生掃成浪視之滾滾聽無聲日日波濤千萬丈此中未必無魚龍頭角潛藏待雷響君不明畫水之時念不生念生畫之終不成譬如陽春回大地紅白枝枝豈有情送鶴林寺海祥禪人還南千年常住一朝僧汝師獨為常住死蚊蠓雖微尚貪生人而安能不愛此吾悲死者賦此詩莫言朽骨無所知幾回竹院月明夜幽魂嗚咽聲噫噫名藍未復心豈忘心不忘兮道在場最憐秋風苦雨歇汝師來往山之岡靈峰觀泉山水無心衒靈奇遊人分別生幽思幽思之初未分別山水靈奇誰得知就裡亦自有佳處有心不是無心時我遊靈峰峰不語淵默雷聲耳欲遺鰲頭戴我欲飛去拄杖挑雲何所之山居莫謂雲林是化城相逢幾箇世緣輕青山不解隨人老白髮偏知逐歲生萬境本空心作障一真無待道方成長安若問開先勝飯罷閒聽瀑布聲仲夏同諸法侶禮多寶寺五百羅漢適有禪人跪讀法華經於像前靜而聽之若流泉寒瀉聲聲入耳靈臺澄徹樂而賦此白日來參伏虎禪衲衣誰共染香烟風塵有路通心地水月無人問性天空想玄菴翻貝葉遙知雷雨護金田冷冷松下聽寒浪萬劫情根一灑然咏懷小小狂歌混狗屠翻然一旦醉醍醐胸中日月光無盡身外風塵患已祛虎豹由來山寺犬王侯誰悟利名奴閒朝何事堪消遣飯罷看雲獨倚梧天啓禪房石磴盤𢌞不記重亂峯深處隱禪宮泉從刳木雲閒落僧住高岩眼界空欲了殘經還待月偶成半偈暫吟風歸來不覺烟霞晚谷口初聞定夜鍾感懷二首山重重兮水重重迷悟須知路不同寞寂場中蟣似虎長安道上馬如龍白雲自解歸青嶂明月誰將掛碧空若使貴人能不死從教桃李笑春風風塵那得此中幽萬壑千岩鎖一邱白髮不栽偏易長紅顏欲駐却難留飛禽有跡空中覓老衲無心物外遊試問故人槐國夢五更霜冷解惺不琉璃燈誰把氷輪擲下方老禪拈取掛虗堂升沈雖復憑他力內外從來本自光未點金容猶冷淡才燃寶座愈輝煌莫將龍燭堪相比不照人王照法王過楞伽州遺麟郎孤巖面面生雲烟無限魚龍鬧水天欲遣百非煩問答那消一句蕩中邊不須設險人難到但若無求地自偏大慧日長何所事經殘抱膝看鷗眠詠開先寺瀑布遺仲堅行腳作探竿影草隱隱隆隆天上來白雲重疊不能霾剪裁無地容刀尺慣便乘風作雨雷到海終須涵日月出山豈肯染塵埃杖頭挑向諸方去席卷魚龍擔取回聽松水光山色世情空偶聽松風更不同無夢却遊天地外有身豈落死生中名高自古生心纍道在何妨徹骨窮頴上棄瓢嫌聒耳寧知聲是大悲翁舟次石門東岸訪寂音靈蹟兼懷廬山歸宗常禪師行盡溪山興未窮扁舟聊繫石門東金輪雨露承千古玉歷春風自九重𩯭髮不愁連夜白身心已悟本來空何妨城市山林處瓶錫飄飄訪臥龍山水縈𢌞妙莫窮烟濤空翠著禪宮石門有路憑舟楫金地無人候飯鐘雨助溪聲吞寂寞雲拖海色淬虗空重來一上楞伽閣徙倚長歌望祝融偶成閲世歸來隱半峰茅茨小結虎溪東了知我相無安處直得緣心當下空花落花開成敗夢漚生漚滅是非蹤相逢若問平生事坦腹高歌大塊中墨光亭選得幽居傍顧龍竹牀苔徑少人蹤閒朝有鶴松梢立靜夜無雲月正中夢裡山河乘想起眼前榮辱即緣空名香自爇書經罷猶見陶泓墨氣濃遺聞堂夜坐來往風塵老客顏朅來高臥萬峰閒從教世路千重樂那得禪心一片閒空翠有情留白足炎蒸無夢到青山蔗漿一任能驅暑石上聽泉未可攀登嶽陽樓懷呂仙翁見說先生醉此樓任教呼馬亦呼牛無緣濁世誰青眼得意滄波有白鷗一劒寒光天闕冷半瓢明月洞庭秋君山笑我登臨晚知爾還同旦暮遊早渡嘉陵江登錦屏山日上長巒渡彩虹隔江烟樹古蠶叢危峰欲墮松根抱浩露初殘花影空山水不殊前代色衣冠猶帶野人風白鷗訝我登臨晚來去飛鳴錦浪中冬夜墨香菴懷方麓先生卜宅江村遠市塵相尋朝暮但耕人水邊習坐鏡中影月下經行夢裡身黃葉不須童子掃白鷗偏與野僧親著書日久知成癖好到禪房一養神新秋行踪誰料去還留洞壑俄驚夏已秋佛性喜隨雲自在禪心懶與水爭流身貧方外吾常分病少閒中福最優桐葉儘教飛萬片道人無事可生愁過慈壽寺有感惱亂禪心魔是詩怪將歲月廢浮辭念頭未起光無量情識生時苦不知抱甕灌園休道拙攻城雲棧謾為奇何如石室披衣坐方寸澄來別有機紺圃即事柴門不遣白雲封來去何須問主翁方寸高明千古鏡萬緣空寂一聲鍾涼生肝肺蓮花漏香泛簾櫳貝葉風鐵鉢願傾三昧水散成甘露灑寰中聞秋聲有感住住行行鳥莫猜因貪幽勝重徘徊烟霞自古非人世石瀨偏能洗客懷階下雲峰知幾疊岩頭秋色怪先來舟藏石壑誰相負靜夜深觀念是媒季春過竹院訪見素居士萬竿竹影掃波光野曠風微麥浪香我輩自來多懶癖主人疏朗更相忘閣中棋局敲殘月池上峰巒接半堂鷗鳥不知塵世事飛來飛去看人忙過陽羡蜀山弔蘇長公來自黃州老此身青山流水隔風塵心同日月難逃謗名滿乾坤不救貧遷謫幾番生似夢文章終古氣如春清秋何處堪悲弔蜀阜荒祠一愴神山居相逢多勸罷仙遊行腳終難可到頭片月在天光不斷千峰當戶翠常浮消閒石上題黃葉解渴雲邊飲碧流潦倒那堪聞此語感懷方且暫淹留往曹溪暫憩長松館幽居卜得在城中竹浪松雲草徑通習靜何須違萬化隨緣應不昧雙空燈前誰是青衫客月下時聞白社鍾路債今猶償未了曹溪禮鉢看降龍過陶居士精舍不遇高臥青山絶世埃柴門終日閉蒼苔雲連樹色室中暗竹引泉聲空裏來凡鳥不題遴佛地主人何處醉仙臺相逢未及探高論閒對玄猿一悵懷初冬有感炎威未已又寒來催得頭毛雪作堆樂事盡從忙裏錯憂懷應向靜中開死生若使饒尊貴道德應看等土埃情理皎然如黑白窮通壽夭不須猜石門夜泛撥草瞻風豈偶然百城迢遞舊因緣中流水月深還淺兩岸雲山斷復連諸子競誇天上坐片帆疑在鏡中懸石門鍾鼓相將動耳聽何如眼聽玄示王宇望壯志稜稜𩯭未蒼男兒莫負好時光清晨一念埋靈種白晝諸塵化德香世樂從來刀上蜜浮生迅速草頭霜超凡有路非天外日用明明不覆藏夜坐聞于繆二生論友道殺命仇讐恨未深相知辜負最難禁堅持劫外精勤願常省燈前感慨心世諦業緣非骨肉慈門靈種是真因此番失却菩提子苦海茫茫不易尋唐奉常凝菴見訪次及楞嚴豫喝之以為禪者多不遜不揖而去賦此嘲之雲林何事遠相尋破我蒼苔豈賞音蕉鹿夜來非好夢火牛古始救重侵多緣薄世尊危爵未必高言止衆心既見不煩增傲想王生一叱直千金謝劉司丞但當淨意等虗空何必頻來訪遠公王事若將家事做世心便與道心同須知一死難高下自古浮雲易始終每笑閒身無所用縱觀山水走西東宿方山昭化寺有序夫靈而最良者人也毒而最猛者虎也人遇至人大笑之虎見長者而馴伏人乎虎乎虎乎人乎必有知言者豫聞長者之風有年矣快瞻遺像賦此千峰寂歷路迢遙長者苔龕乳虎號背嶺霜崖雲尚凍向陽林壑雪初消齒光法海澄松月舌相天風吼夜濤一自妙嚴投筆後雜華誰復繼揮毫同傅侍御汪將軍禮方山大像從來天地是岩龕妙相巍巍獨面南萬古燈傳憑日月一毛散影遍江山獻花野鳥飛空下出水蒼龍聽法酣回首白雲封絶頂證明功德共誰參述懷江湖浪跡幾經霜不學禪狂學楚狂白髮有讐催我老青山無事笑人忙情消豈是將空遣習斷還須作觀忘杖屨飄然隨所住攀緣淡處即家鄉偶成遠來水面覓遺踪道學西天龍樹同揮斥古今眠坐外雌黃凡聖笑談中書成紙價一時重理徹文章萬世雄更有一般蕭灑處死生無夢入心中山中偶感住來曾不見風塵野鹿常容伴法身碧海偏閒雲外客青山冷笑世中人六龍朽索終難遠二鼠枯藤斷易鄰若使王侯知此事掛冠未必待清晨秋日同澄公開侍者宿南臺丹梯宛轉路迢遙興亟寧知杖屨勞明月滿臺淆雪色白雲橫谷誤江濤金壜端許藏真骨寶偈能將化毒蛟吾道只今寥落甚為誰流涕濕緇袍睡起讀圓覺經翛然草榻伴雲眠夢覺簷頭月正圓起念除瞋瞋轉熾生心捐妄妄尤添有無不立非為妙人法雙忘亦未元至道空虗誰敢擬思量已墮二三邊奉答萬思默學憲潦倒無心作解嘲乾坤誰復可論交澄潭信是蒼龍窟華屋終非野鶴巢飯罷祇堪閒坐臥詩成何必苦推敲遙知大范耽光景靜裏清虗恐未拋墨香菴即事示元廣二首雨過何人䇿短笻道生擁毳自從容碧空無際雲初斷明月常來水不窮問法應須超意路尋香終是落行蹤吾家別有通元處牢繫泥牛嶺上松道在隨緣可遣情呼牛呼馬總閒名梅須遇雪方爭白竹為當風始見清鏡上無塵光自滿雲邊有路鹿常行相逢若問山前寺流水泠泠雜磬聲墨香菴示廣郎二首村前村後盡烟波年去年來足稻禾苔徑寂寥人不到霜天清曠月先過三茅遙隔長相憶半偈初成獨自哦最愛無生琴調別顧龍山上磬聲多野外蕭蕭風雨天支郎入夜未成眠人生若使還無老月闕何須惡不圓業在好山甘作客道成隨事斷攀緣窮靈未必非狂慧寧及香床未到禪閒中感懷示廣郎火宅炎災唇吻乾蔗漿滿鉢有誰餐隨流得妙從今入對境無心自古難水底搖紅花兩岸風前舞翠竹千竿年光若使常留在北闕何人肯掛冠日暮瀟湘舟中萬里歸來杖屨輕附舟又得坐經行櫓聲帆影供詩料水色山光副客情弔古烟波殊有恨忘機鷗鳥自無驚黃昏停泊知何處雲外遙天月正明結夏金壇之北園兼懷侯鐵菴納涼何必獨夫容水木清幽趣亦同世上共高肥馬價林閒單放病僧慵苔痕鶴過偶成字月影魚吞不解空更憶淡虗亭上夢寒雲片片嶺頭逢吉安舟中望白鷺書院樓臺一片水中央白鷺蕭蕭知幾霜兩岸青山雖不語千秋黃髮仰遺芳烟騰梵宇燒龍腦波撼書燈過客航莫道登臨終有日芒鞋踏遍使君腸咏懷少年屠狗混春秋誰料披緇作比邱俠習自慚忘未盡真修方喜進無休安禪雲石為床坐說法松風代舌頭唯剩閒身何所事山川重疊恣遨遊喜王生元廣問法四圍松竹護禪關布衲蕭蕭遠市闤清磬一聲塵夢斷白雲幾片道心閒天邊高鳥應須慕階下蒼苔不可刪金地夜來誰問法共分燈火照癡山仲冬懷覺休暑往寒來老易驚乾坤誰復慰衷情花非得露終無色松必因風始有聲任道自來千古重離家常若一毛輕相逢欲問黃河水少小曾經幾度清大覺寺訪桂峰禪師行盡溪山到梵居空林落葉遍階除閒消歲月燒龍腦功蓋吾曹賞髻珠鴻信梁閒懸貝葉鴉籌水上看芙蕖尋常飯訖無餘事自掬寒泉洗鉢盂訪袁坤儀有感擬採蘋花屢此遊桃源忽爾又清秋空巖蕭瑟松杉老澤國蒼茫蘭杜幽紫塞斷鴻雲外夢青山片雨客中愁維舟欲覓無風樹黃葉飛飛卒未休喜于中甫過龍泉瓶錫聊將寄此山千峰迢遞問巖龕長松影裡塵喧寂流水聲中月色寒靈骨不從身外覓神珠共向掌中看相逢有日休相負自古朝花露易殘山中偶成因厭風塵此閉關寸心清冷喻寒潭芟松放月墻頭上引水移天屋角閒惟有禪書消白日更無人跡到青山相知莫笑謀生拙浩蕩乾坤幾箇閒瀑布二首誰家千尺素絲抽高掛雲端永不收已悟源頭來處遠肯將根腳混常流從他妙手應難剪許我閒心分自投此去定當歸大海待看波浪潑天浮欲投滄海作波瀾豈憚千重鳥道難響奪磬聲雙劍冷光吞月色一罏寒銀河倒瀉青天外玉樹孤懸碧嶂閒幾度天風吹不斷為留雲壑伴僧閒秋日禮清涼塔人代風烟知幾霜石函靈骨自珍藏珠林倒影天垂蓋寶塔鳴空地擁幢澤被乾坤歸夢杳春回岩谷煉泥香重來盡敬增悲慨落木秋高舊影堂山中雜咏二首大乘何必斷攀緣小隱還須遠市廛習定水邊觀皓月消閒樹裡看青天心中有欲山非靜世上無求地自偏怪底相知歸計緩巢陵寂寞鎖重烟野曠風高一壯觀為誰談笑斗牛閒憑欄自覺青天近下界寧知白日間嶽色橫空簾外墮海濤喧闥坐中寒登臨未盡狂奴興茗碗悲歌行路難山居咏懷二首補袖閒中拾斷麻肯將泉石易浮華光生甕牗東山月香散經壇上界花夢裡英雄勞白起古來驕主笑夫差隆冬富貴欺高國自鑿池氷自煮茶茫茫苦海正波濤莫若逃禪計最高世路已驚心不死功名猶夢𩯭先凋因甘白粥忘枯淡却怪蒼苔分寂寥樂極只緣貧到骨巢由未許讓前茅贈永慶寺秀峰法師塵機少小便知休瓶鉢蕭然隱伏牛明月有光難自晦白雲無纍易相留狂猿不可驚禪虎攫獸何曾異海鷗說法年來煩水石斷崖瀑布為誰流招隱死生兩字事非輕怪底癡人不自驚萬里黃金窮口腹滿頭白髮戰功名閻公豈貴屠龍技田子何須學狗鳴早晚歸來雲外寺夜深松火閲傳燈雪中登蘆芽有序豫寓吳中楞嚴忽夢登一山疊嶂重巒萬松映雪覺而舉似開侍者且曰吾今號松雪矣開曰願以雪松字開跽而請甚堅遂許之茲登蘆芽訪妙師適逢大雪宛然當年夢境也感而賦此數年杖錫走江湖一旦蓬蒿化淨居虎踞岩頭關世路泉飛樹杪入天厨每因煮茗煩燒葉猶愛看山懶讀書夢境曾來同鉢食只今松雪竟何如與蘆芽主人談世故有感雲屋寥寥氷雪重燈前杯茗論英雄情關未破寧無失世路相遭豈易公共飲每憐愁不共同床未必夢相同年來多少傷心事總付瞿曇妙觀中寄袁了凡居士水齊華嶽山人辟穀方先生獨得已休糧懸知天上增仙藉豈戀人閒轉燭光玉液常吞肝肺潤金丹能轉𩯭毛蒼青山不遠終相見知己新添一少郎龍嘴有序日光之前有嶺稜稜垂於澗旁勢若虬然曰龍嘴嘴上茅菴初結喜其清曠且有二禪者轉經於此一雜華一蓮華豫由梵仙而下適聞音響泠泠賦此鳥道盤回不易登此中清矌愜幽情陰籠翠嶺春雲度影落空潭海月生山菜儘堪供瓦鉢道人偏喜聽蓮經泠泠滴向焦腸裡寶所休將喻化城曲阿書經即事敝廬故有不誅茅況隔青山遠市朝野衲披雲常自到主人護法豈知勞孤燈花落搖紅影萬竹風生涌翠濤若使貴人能駐景巢由豈肯臥蓬蒿秋夜石經山禮琬公靈骨有序凡血氣必有知有知則有欲有欲則有生有生則有死唯至人能以無生治人欲欲空則知不廢而妙用無方矣隋琬公閲南嶽思大師發願文知末法運窮三災倐起一切法藏皆當盡滅喟然歎曰有天地不可無日月有作息不可無衣食有人生不可無佛法然日能照晝不能照夜月能照夜不能照晝衣能遮人之寒不能使時不寒食能濟人之饑不能使年不饑惟佛法之妙不惟使天地終古長旦羣有死生無患以至鑄凡為聖即暗為明達生無生以大願力兼萬有而普濟之則廣大殊勝豈可思議者哉乃刊石為經續佛法壽延及慈氏行恐古今代謝巖壑變遷以佛舍利并己骸骨藏諸石窟填撫茲山矢大法藏永劫無毀豫感公之憂深而慮遠也含涕賦此月夜青山謁琬公石堂無語對千峰蓮花片片皆心血貝葉行行奪化工靈骨可埋名不朽法身非相用常通那堪更向蒼崖上鑿室藏經示不窮問竹亭即事䇿杖深林問此君空亭誰復謝塵紛青山不禁長年住流水何須獨自聞𩯭髮如霜難遣黑利名非酒大家昏輸他定起千峰裡倒握琅玕掃白雲五言絶蕭岡望方茅諸山有濤可傾耳何必千尺松偶此藉芳草春山當遠空咏雪出谷幽雲細成花大地陰盡翻桃李夢潔白本來心禮拜石慢幢高須彌能折必自重安得離欲尊頻來此獻供洗衣泉松邊剪碧霞偶爾成袈裟披久亦何染閒將飄浪花觀流石路在層峰外扶笻向深壑跏趺水聲中靜看飛寒瀑同遊法侶散坐松岡叔宗忽浮小舟入柳陰宛然有孤鴈沒空之致賦此春水望無際乘舟向何處杳然花柳陰日暮忘歸去樹禪空山木上座坐石不知年歲月無心記風柯舌相全鐵袈裟天造福田衣何年施禪伯厭重拋雲邊風吹與日炙爾菴雜咏竹靜雨初歇風和鳥健鳴書殘成獨睡無夢繞江城芭蕉菴月臺疑近壑鱗石欲生雲誰謂塵囂裡幽居讀梵文楞伽洲斷㵎蒼山裂飛梁老樹眠朝來扶杖處雲度水中天題畫水曲山頻合春寒花倦開旴江來復去人在畫圖回題竹塢石室何處無青山片心灰冷難片心灰冷易智拔萬重關講經臺尊者身相空舌根何所寄松風與流水說盡無生義初祖亭面壁不說法此心誰復傳神光三拜後震旦五燈懸錢資蕩三首青山點樹杪斜日照溪灣試問錢資蕩滄波長夜寒望裏水高船却疑空墮天既到平如掌人聲鏡裏傳見水心即了逢山眼便開生平窮伎倆此外復何懷利刀利刀日切泥鋒芒漸鈍置若向沙石礪斬鐵如斫水夜坐夜坐空階寂清言絶妄梯回看雲樹杪不覺月沈西雲墮石飛回因閲世墮此不知春擬欲挑將去恐驚林下人望玉臺即懷一峰秀雲外玉立望不厭坐此未須臾六虗方寸贍題萬玉菴誰將崑崙峰一斧千百塊散灑天目閒古今無謝代說法石清清㵎水邊冷冷奇石下大哉衆中尊為說無生話單傳崖少林曾斷臂五乳血腥高末後誰三拜中雲雪並腰示匡石居士拈書相示處石火電光遲才擬生心答松風知未知山中咏松絶頂凌峰寂長年不改青幾回良月夜倚杖聽濤聲天啓石行到深雲裏沉冥孰可識不見太古人只見太古石崑石崑崙太崔巍飛劒斬其頂置之几席閒烟雲朝夕瞑過嚴灘帆飽客舟輕由來飲德名難逢今夜月見月見先生獅吼臺飛者不敢飛走者不敢走箕踞寥廓中靜聽獅子吼歡喜泉愛為煩惱根愛盡煩惱空方寸同此水誰無歡喜容清深崖萬物始乎水六情始乎動一心苟不生清深在日用甘露泉寒流我慣枕消渴非口飲雖弗愛長生心地清涼甚朗公石朗公初不死謂死不知朗試看朗公岩頺然誰觀想托鉢峰誰伸黃金手笑托碧玉鉢歡喜施將來福源永無竭本湛泉石縫瀉流水見之心湛然是誰掬嗽齒吸盡空中天韋陀峰我笑叉頭石爭如韋䭾峰儼然大悲側草木增威風重遊黃花洞棄馬陟危峰盤回知幾重蒼岩開石室共聽雜華鐘贈龍泉關劉善友之峨眉五峰與三峨相去路無多想念才生處蒲衣笑薜蘿爾菴雜咏鶴解聽僧語魚爭候梵音海門明月上何處讀書聲冷巖源從雲外來豈止千萬折憨臥冷巖上一嘯驚天闕緑瓊行倦逢緑瓊欣然欲一坐縱橫紫翠虬噴薄晴雲破湖心寺懷堅光趙居士海上明月生太空浮雲橫清光照衡門須待天風鳴辭淡然居士齊白雲本無心有期則有跡何如無期好隨風靡不適登虎邱我愛虎邱雲去來初無心遊人嘆霸業削璧多微吟其二我愛虎邱月清光鎮澄徹悲欣幾萬重普照無分別其三我愛虎邱石談經解點頭生公去不返長抱白雲幽偶成胸次千竿竹眉邊萬頃梧清音常染耳遺聽即鳶魚其二願留犬馬骨努力報慈恩猶若湘江水滋乾更潤坤贈海通居士殘臘逢高閣溪山烟霧深當勤持半偈終出海通心玄帝閣望石門寺懷湯遂昌紅魚飛碧嶺白鳥點青林楚越皆初地相逢孰賞音開先龍潭地裂潭初就天開瀑始懸老龍如不在何物起雲烟元素菴坐柏酒客窺簾下雲禪坐柏根不因摩詰手誰復寫元真貯碧軒萬竹凝空翠方池貯碧流小橋通別圃抱石白雲幽讀茅山志夜讀茅山傳無生有幾人都來長視者花落一年春佛香子曰觀此詩意若使無生則不有死如既生矣欲鑄生不死恐無此理若欲長生先須忘生良以生忘則死媒絶矣如能無生則忘生之說又在下風耳或萬年為一年或萬年為一日或三百六十日為一年或以頃刻為長劫此皆念後事也如能泝而上之則念且不有所謂年月日劫豈非計龜之生毛乎
