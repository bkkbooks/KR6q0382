body:
  text: 明憨山德清閲書與黃慎軒近得王宇泰書知慎軒已出長安想還家有日茲有臺泉上人保持華梵諸祖道影安置峨眉普賢光中永遠供養道影乃新安丁南羽雲鵬手寫而精神慈注風致靜深實希有勝事也欲作一記此必出公手方愜道人意徐彥文遂作九原之客令人心痛碧雲無恙燕山如昔死者不知何往生者不知何事每念至此悲喜交集不知慎軒會道人意否中甫尊公忠厚邁俗斷息時初無昏亂其平生雖不能作清淨行想得忠厚之力有此效驗夫忠厚則不欺不欺則自無偷心偷心少則日用瞞心處不必提撕自少矣故曰但不瞞心心自靈聖忠厚之力尚如此況開佛知見以知見治習者乎慎軒前書來以為佛知解作障於日用中不得力果如此則臨濟曰但得知見正當便可橫行天下若臨濟是則慎軒非矣若慎軒是則臨濟却成不是又有一喻慎軒當熟思之有一武人與賊戰不勝退而私忿曰我武藝太多所以不能勝賊如我無武藝則不受武藝障礙可勝賊矣道人知公讀至此必捧腹絶倒也宋大慧禪師每謂士大夫曰聰明固是好事亦是不好事聰明非佛知見則八難中一大難也良以聰明屬非量非量者於理不相應之謂也佛知見上則屬現量次則屬比量現量者不思而得不勉而中之謂也比量者雖出思惟比度而知於佛祖聖斷量中相契不妄以之治習終入現量古人謂之流注真如此非宗教精深者不能辨之道人往往見士大夫語及流注真如便掉頭不顧殊不知流注真如即臨濟洞山俱不敢忽故曰以有言露箇無言的又曰動容揚古路不墮悄然機又曰但了綱宗本無實法近見董思白拶及此事渠於不知不覺中佛法習氣漸覺生疏橫口褒貶古德機緣判寂音決非悟道之僧道人從容謂渠曰汝信大慧杲禪師悟道否渠曰是一定大悟徹的又問曰寂音乃大慧平生所最仰者脫寂音果見地不真大慧難道作人情仰畏他耶思白俯首無語又有一種人見地萬不如蘇長公握一根毛錐子東刺西擉謂東坡這裏又説道理便擉一擉這裡却不涉理路便圈幾圈殊不知東坡於普賢毛孔中鼻笑如雷曰我不恁麼汝却恁麼我恁麼汝却不恁麼長公是慎軒鄉老慎軒肯為此老一雪否即流注真如也不甚惡所刻大智度論必大放般若光在道人念公忠厚無大偷心所以因囑護持諸祖道影忉怛至此倘公不以道人癡野見笑為法自重幸甚與于中甫謝孝還家當發心作喫臭醋郎遊方僧習痛須漸消去老漢教汝兩者汝若不能勉強力行汝便當除却于字始憑汝可也汝頂著于字又不能喫臭醋不能消遊方僧習支持得于家門裡事要家門妥帖無有是處且古人處順境時長便謂佛菩薩不來護念我矣即此觀之良以不可意事重疊加來使當事者苦楚之極不得不憂深慮遠耳憂深慮遠所應之事必有義者多恣情忽略感激中出來所應之事必無義者多凡有義事自然不覺不知屬醒悟門收凡無義事則屬散亂門收南嶽思大師於一佛性中開違順二門順門即醒悟門也違門即散亂門也又違順二門非南嶽新設實本馬鳴起信論中真如生滅二門來今天下學禪習講求生淨土兼所謂講道學者此四種人難道無有一人真心學好者但俱不肯憂深慮遠所以禪非達磨之禪講非如來之義求生淨土以為愛根不拔泛然亦可生者講道學初不究仲尼之本懷蹈襲程朱爛餿氣話以為旗鼓欲一天下人之耳目見學老學佛者如仇讐相似殊不知孔老與佛果三人耶果一人耶此等斷案孔老俱通而未精深佛典者且謾度量於三家頭腦俱不曾一摸便談儒談老談佛逞一隊瞎驢隨處鼓揚醋臭倘然狹路相逢若生不耐煩心應酬他便是不能喫酸臭醋樣子即遊方僧習氣終不會消老漢受性才聞酸臭之名魂驚萬里即遊方僧習氣老漢初出家時較汝更甚年來痛念佛恩難報痛恨自己受性剛烈徐以佛祖知見治之不免酸臭醋也緩緩喫將去剛烈習也痛克將去汝若如此兩者不能痛行則汝結果可知也老漢吐此語時方口痛又在行促之中而忍痛不得不喋喋者不知汝讀老漢此語時動甚念頭這裡倘忽略了則狗馬不若矣麟郎麟郎痛念吾囑與王宇泰所天皆在高年而令兄與令弟並受性疏曠不能奉湯藥光公苟不任此孰能任之此事理然也老漢但念光公晚得一子則事有繼倘事親而無繼不惟家門之光無有傳者即心燈之光後𦦨難續矣此苦不獨人間有之天上亦有之故曰人間有絶嗣之痛天上有無子之悲或光公若能準之因果直下不疑反以無纍為作觀之資則無子之苦乃光公大師也苦何有哉但恐識得破忍不過終被習繩所牽觸世態炎涼處又不知不覺忽生無量感慨矣正當感慨時拭回鼻孔向父母未生前尋些水草喫則感慨之情又光公無生之紹介也此五轉汝能次第置於日用中橫來竪去恆作是念曰此我本師不遠數千里之外重疊風波遣人持來者於我求名耶求利耶要我好耶不要我好耶真心為我耶假心為我耶此六耶字汝能不忽仔細咀嚼之或於汝憎愛關頭作個道場亦是本色不為分外光公勉之答于潤甫十林詣燕得手書徐讀次掩卷思之乃覺渡江五易寒暑矣汝自覺悠悠送日於正法中不殊聾盲人無可舉似此果出誠痛惕然不歇憤然勇進則惡無大小罪無重輕皆導師與不請友也若志稍懈力稍緩則暫時洗然有清涼處未必非三障嚆矢耳三炬真能頓豁情塵心味老朽剩語將往日無可舉似者審誰使之於無可舉似中一旦無明障心於不知不覺時恬然造惡惡既造成終難省報無明障心即煩惱障恬然造惡即業障終難省報即報障此三障造就如源與流流與波名雖有三而濕則一矣老人問三炬一是恁麼若識得渠即徐察渠之前所造三障是苦耶樂耶於苦樂根源果徹底不疑則三障便是三炬本來面目老朽不惜忉怛追究汝一之前者倘不知重輕直下翻身不得怎生是好要於三寶中身捨命護法如過楞嚴頂禮聖像見朽草破席覆之不覺遍體芒刺汗發淫顙者此片念力能消十惡五逆之罪雖千萬金之施不若此念力功德不可情智測度也但此念力能始而終之則本郎與開郎雖死生有先後而其心事亦了矣刻藏事體終有荷之者勿慮即康直指疏乃三伏天松風潭月能不清涼老朽肝肺乎為仲淳致聲無縈懷老朽年在耳順未能聲入心通愈自扼腕奚煩遠念惟念汝兄弟中我相勝負如攫金人只見其金不見其主大須恕之寫至此老朽固乃解空之凍膿亦於不知不覺中思汝等父母在時光景淚欲迸流強止不能蓋父母汝等之本也俱肯念本則分別之情忘情忘則無我之天不煩舉目而昭然在上也即汝三兄雖向稱于氏之賢者渠失照較汝更多老朽既為汝提明白此後牢持恕字若逆境順境憤力挨熟得則向後受用不淺炬郎炬郎毋以老朽之言為迂濶痛力勗之二大丈夫處於大塊間本分事元無多端不過經世出世而已若於經世無心縱得富貴亦何用之若用之於飲食男女乃造罪也非用之也若於出世留心苟不能檢攝身心究竟性命之學則大道終不聞矣噫人為萬物靈果於經世出世兩無所就又甘與愚癡人競無明更錯矣思之思之有省則宜收拾世故自別有受用地幸莫忽與陸太宰去歲聞門下一切屏置唯勤念佛此暮年本色然得勝淨之緣資之則念頭易得綿密而勝淨之緣莫過乎佛緣法緣僧緣也佛像在前經卷列之更得僧徒一二人朝夕親炙自然勝淨之緣殊勝矣但僧徒之中求人卒未易得即貧道亦東西南北之人曷能恆為淨助故請丹青丁生寫此跋陀羅尊者道影意在代貧道助門下念佛也願門下以眼根聽其説法當下萬緣坐斷念頭現前此貧道所深望門下者也年光飄忽剎那不住況頭白老翁乎永嘉曰日夜精勤恐緣差故況不精勤乎噫緣之差別惑亂正念雖有見透者每遭其埋沒況見未透者乎願門下莫為鄙人語不近情而忽之幸甚復董元宰緣起無生之旨祖佛骨髓而像季黑白千萬人中求一二信者不可得今足下於此獨能信入非夙具靈種緣因熏發那來現行暫露何快如之來書謂初頗暢快茲又不活潑若將失去病在何處此既現行暫露熏力稍微自然隱沒不必生疑惟宗門語句不可草草若以足下信入者擬通其關棙所謂魯君以己養養鳥也昔兜率悅問張無盡宗門葛藤有少疑否無盡曰惟德山托鉢因緣未了兜率厲聲曰此既有疑其餘安得無疑徑入方丈不顧無盡由是發憤參究然後大徹今足下十有二三不透則去無盡尚遠極當發憤此生決了不得自留疑情遺誤來世來示又謂念念起處索頭在手敢問足下為念起處本即無生為了念本空乃契無生若念起本即無生則知無生者念耶非念耶若了念乃契無生則了者謂有念了耶謂無念了耶有念則早乖無生無念則無生誰契於此透脫無疑席幾草菴借宿猶非寶所第來示所謂如何踐履如何保持待力之充及涉境試驗云云自知時節矣豈待貧道饒舌貧道不惜口業如此總是鉢盂添柄惟足下或宗乘中或教乘中大著精神作個仇讐務必摟破其窠窟搗其棲泊再共商量未晚與丁勺原凡榮辱得喪皆念後事也向煩潯陽邢來慈持八行詣足下良欲足下緣得喪而求念緣念而求念之未始念之未始既得然後可以駕未始之航來往於榮辱得喪死生之津博運羣有安置彼岸不意足下報章未久則聖天子之椎輪又至矣此實天以厚足下非薄足下也惟足下力承之且雲外散人於世實泊然一無所求而拳拳為足下如此者寧無微意願足下以瘴鄉為苑囿刁斗為遊觀加攝自重散人脫有曹溪之遊再詢起止不悉答陳五嶽辱問無垢之義鄙人魯鈍寧足以酬然無垢之説多矣不審居士所問者何種也夫夷齊以不食周粟為無垢魯仲連以解人危周人急而不愛爵祿為無垢顏氏子以簞瓢陋巷超然自樂為無垢此皆世中之無垢也至於聲聞以有身為患觀空為無垢緣覺則以達患初無為無垢菩薩則見患即心萬境皆真為無垢一切如來則以不可得為無垢惟我初祖達磨而下諸禪老以乾屎橛為無垢此又世外之無垢也如以世中無垢為得意則足下自能發揮無煩貧道若以出世無垢為悅心則是菴以聲聞居之菴即乖空以緣覺居之菴初非有以菩薩居之菴即自心以如來居之菴不可得或曰如來之不可得得非與聲聞緣覺之空同乎對曰如來之不可得雖一切大菩薩莫能窺其涯際即如來自亦不可知豈聲聞緣覺所能測哉以如來所到境界一切聖凡莫有容心之地故以不可得名之耳乃遂以小乘之空濫茲雖三尺驅烏聞之莫不捧腹者也此無垢大意敢粗陳之至菴之巔末在高明自定倘披晤有期再容請教與雷雨居士病體稍愈即當默誦八識頌此頌乃相宗綱骨相宗乃性宗五藏如五藏相克不明則一身便調養不來至轉識成智之旨若相宗恍惚斷不能精了此既不精了即高論元微刳真剔祕若觸境鬬機照用便提不出來矣且吾此到巢陵非是小緣但衆生泛常之見觀之竟不生大奇特想世故非堅人情翻覆橫計無常染習難滌宜須痛迸心魂志凌金石少有出頭分瞥爾因循知苦未有盡日時在與于中甫大都學道人能未窮知變則變不能驚窮不能困噫此三昧非見幾而作者孰能用之與趙乾所禍福莫烈乎死生故至貧賤之人聞得生則喜若登天聞得死則悲若入淵然皆情也如能率性觀死生榮辱之境不惟死生榮辱之境不得奪我之志且彼境密為我不請友也故大丈夫平居無大苦迫楚之時理不可不窮性不可不盡耳如此一著子忽略放過於平居時猛涉不可意事交錯在前則我之志管取全被境奪矣即李卓吾雖不能從容脫去而以速死為快竟舉刀自刎權應怒者之忿亦奇矣今直心之事終不至喪身失命極處不過放歸田里而已又造物以逆境成就我未可知也由是而觀則竭計酷謀排陷我之輩恐造物使之然此等意思若以衆人之心領會便錯過矣直以佛祖聖賢之心虗懷平氣勉強領會一有肯首處則無我而靈者頭面露焉如此際不信聖賢而信衆人則我終莫聞道也人忝物靈道不聞可乎願熟思之適得手示讀之亦不覺傷心然立意擺布人者第恐氣力不猛計謀不深一味欲直心生無隙地死有餘波此自古至今衆人之常態如是故君子涉此境界倘感激心生弗堪受之痛當自訟者以君子見過之生於自心故訟極得力時方見過不生於人心再乞痛思之二古今禍福皆初無常直以天理與人情折斷臧否無不驗者若以天理折斷人情則公道明設以人情折斷天理則私忿重方私忿重時則中外防間布置彼之用心未必不周密於私忿周密之中而忿者且衆決死生之機何如此非人力可以陰挽也然直心必無傷命之理自然老蒼亦不忍事後或徵耳三凡禍福人我之根根於已發若以未發照察之則禍福人我之根本無有地也已發情也未發性也故以情觀禍福人我之事則有我而昧者愈重矣重則厚厚則深深則畜畜則決難輕泄故報復人我百千萬劫卒不能了此必然之事而愚人不曉此理於人我禍福之根不但不能拔反著力栽種之恨未能深殊可痛也故佛祖聖賢要人聞道見性別無他意不過要拔斷衆人之情根而已情根一拔則向之禍福人我之事皆漸漸化為妙用矣以妙用慧眼觀衆人禍福人我爭競殊不足怪也直心於今日人我場中若不能開心洞肺受野朽之教則汝墜墮但可流涕也思之思之又功名富貴根於身此身極壽長不過百年而百年中享富貴快樂又被愁多喜少占大半去了故百年中享富貴快樂亦不多時何苦為不多時禍福人我之情便甘把本性昧却至人以本性觀是非榮辱不異太虗中微雲散聚耳奚暇介懷哉汝於今日多故之際野朽不惜口業種種開解直心情抱如於野朽口業中錯過這些慈悲熱腸則直心受苦時劫正方長在咄大丈夫情性關頭若認得真了則今日與直心爭競害直心者皆我善知識也苟有此見何妨惡衣惡食了我生死大事去豈弗樂乎汝名法復正為今日耳四天力地力佛力法力僧力皆外力也惟自心之力乃內力外力是助內力是正如正力不猛助力雖多終不能化凶為吉故曰先天而天不違又曰自心之力可以顛倒天地設信此不過別尋外助斷無是處野朽凡遇禍害更無他術但直信自心之外安有禍害一涉禍害皆自心所造還須自心受毒此理甚平法復思之思之五別來甚久思念甚深不知近來一切境界或有意或無心種種交衝能以觀音大士大悲大智鑄逆順為自受用三昧否此三昧初貴知得透次貴行得堅再次必期證而後已又再次證而能忘忘而用始全矣大丈夫何暇論儒論釋論老是皆古人已用過了不殊已陳芻狗耳豈有間精神理會他雖然若自家本有無生之心倘未知得透則儒釋老白文要緊經書又不可不痛留神會之貧道每於好山水行坐時未始不觸勝思廣虗也又思初與南臯勺原寸虗聚首石頭光景邈不可得比趙乾所亦嘗披晤但渠氣勝於理則不免逆順境風搖蕩亦可憫然忠直不減古人也六持忠而遭黜命也惟知命故恬黜而無悶如黜而懷悶則向之所謂忠者果忠乎若人之不忠我必知之此智也非明也惟我之不忠於自心了了不昧此明也非智也今直心之忠與不忠惟天知之亦惟直心自知之耳且人將欲置直心於死地幸得為白衣郎此莫大之福也又何悶之有大丈夫屢遭黜辱不必為介願直心以大丈夫自任終必相見有期去年有書寄海若書中已言直心終必遭黜倘晤海若取書徵之由是而觀為白衣郎不在今日也直心直心休再沉吟萬緣歇却樂最甚深以此送行大地黃金七自正月二十日得手書搖心頓歇未得手書前以傳溢紛然雖有定見亦不覺稍受搖眩此人情之常也但直心向後於筆札不必與人極力辨清濁是非辨則失其大大失則局量便小了且清濁是非自直心離長安後未嘗不漸皎然明白也比來亦有人為直心扼腕者惟直心直置身心於無何有之鄉飢來喫飯困來眠便了倘豪逸習病發作一味看得自大了則我相不異乎無何有鄉矣且道這個時節豪逸習病置之何地幸無忽此此是奇男子家常茶飯外此別求皆即外道直心果能見此透徹觸境用得則向之與直心為怨府者皆直心入道之資也何怨府之有哉湯若士近有音耗否渠比來亦有思之者老子曰寵辱若驚以老子之意觀寵辱驚則等也然此等字非隳體黜聰者斷未易知也直心如知之再出頭來於世出世法中方許橫衝竪撞做得去也西風正高空林落葉更深夜靜故人之思何如哉莫憎人海風波惡心外何曾有浪頭豪習登時消不去禪書飯飽細鑽求八大都人情時事於可意不可意之間必有業使之然業即命也倘信情而不信命則感激百出矣故至人知人情時事變幻奪人之志所以必先於窮理理窮則見定見定則人情時事之變幻不能奪其志矣志既有定所謂生死榮辱交錯於前雖未能無心應之而持吾志順理制情力用不怯則情自消而理日開理日開性必徹徹盡也故曰窮理盡性此一路話頭向曾數提直心直心以為別有口訣不傳將此淡話塞人公置之而弗究及觸不可意事即不堪人作賤便欲𢬵命與人決個雌雄豈大君子之所為哉故曰有我我在天地中無我天地在我中直心若不能諦信無我而靈之理力制有我而昧者則昧終不旦矣思之至此際野朽猶提此淡話恐淡中有不淡者存焉與周金吾居士三請謁矣可謂勤至然覿吾相不若得吾心且道如何是吾心馬嘶楊柳春風暖人對曇花慧月涼能薦此再晤不暮寄繆仲淳男子出世一番畢竟何事要緊即拜懺一節若任情識支吾不若不拜既拜𢬵窮性命剜心剖膽哀號像前惡習偏處直下挽回既回片刻不可間斷才間斷即如水銀詐死復活要在順逆火中橫煆竪煆死到真處方可與沈及菴佛祖有言一切衆生因想念而度生死亦因想念而受生死今人未登極果即謂想念當屏絶是乃不明想念即賊即子之故譬利劒握之劫人即賊用握之救人即道用即此想念用之籌算佛法想來想去念去念來莫知其然衆生想念化成佛知見矣到此地位方可説自在現成話或未到此當堅固想念不可少懈殺法答某司寇辱手示知愛女新亡榮遷多擾適當炎暑情緒難堪雲外鄙人無能一代勞痛徒為長歎而已雖然貧道又竊為門下賀夫萬苦所集皆從愛生愛者既亡則苦本已拔且死者不愛生者而長逝矣而生者猶愛而哭之哭之能使其復生則宜哭哭之未必能復生者哭之奚益昔有士人子死痛傷不止因自疑傷痛妨道乃問妙喜曰子死而痛傷太過不妨道乎妙喜曰子死不痛豺狼也以妙喜言較貧道今日之語吾語似近不情若實究竟或有理焉惟門下體之北轉行止想自有定衡然貧道又有説焉官當司寇者握死生之柄能忍哀一行𢬵一條老性命救得幾人不當死者亦不可思議功德也且能治獄以情則神人悅服神人悅服則陰陽和順陰陽和順則年穀豐年穀豐則民樂生之心重民樂生之心重則刑教易施苟刑教可行則於治道有補大矣奚必濡滯哉某久託道中敢以此奉勸或當與不當亦其曝背心也答某居士得手書讀之兩過而居士所疑所見無不了了所謂我若無心餘者俱了嘻此心豈易無哉縱能當下即無亦非此中正事又云了得煩惱即菩提決乃疑此復為居士生大恐怖昔法眼益公事長慶久甚次見地藏老深始徹頭耳長慶高弟昭公昉公皆不平法眼率衆徵之曰公燒誰家香益公曰地藏汝何辜負先師眼曰吾不會長慶萬象之中獨露身句昭曰汝問我我為汝決破眼問曰獨露身是撥萬象不撥萬象昉曰不撥益公申兩指曰兩個我問居士既是不撥恁麼却成兩個若曰生心於不撥上墮情了故成兩個如此見識要摸法眼鼻孔所謂冠章甫而化越矣安得恰好昉公不撥一場懡㦬則居士煩惱即菩提與不撥便矣不知居士又作何出身之計跳過懡㦬場去若人果真知生死極大此事必須了當且把尋常大家到得的解會一坐坐斷吞一個無味丸子不管味不味悟不悟日嚼不破加之月嚼月嚼不破加之年嚼年嚼不破便𢬵此生不了他生難道不破則此中可來入得保社若無個等志氣個等耐煩切不要提起雖然是裏既不能措腳亦當於精要內典中著精神搜索一上則解路自精粗浮習氣自然蕩也粗習既蕩則靈根藉般若津之澆溉自然茂秀始可於作家手裡討個實果子終須不難筆舌卒難盡意倘披晤有期重新拈起亦不為纏擾蓋做了此等蟲豸我也須耐煩也若不耐煩不惟堂前草深一丈管取達觀窮性命了在汝等業鬼手中與馮開之云何忽生之前初無生佛寧有人我奈何忽生之後凡夫根識庸常才染人天小樂便移多生本願本願既移豈惟小樂難長享用只恐牛頭阿旁操鑊湯爐炭之具俟渠久矣夫本願者既稱佛子苟不以開佛知見為己任則莫若深雲重壑悠悠自得也何煩投足風塵惹黃頭蠻子恣白眼也耶此言吾曹出處之分蓋如此若在家菩薩則不然有親則以親為事有君則以君為重倘其本願不忘即假君親為金湯蒿矢委曲多方護持真乘置得失於情波之外化利害於願海之中心如虗空骨等金剛千磨萬折堅強不摧如是則增一倍護法之心消無量罪長無量福何以故本願不傾善根冥長故也故以六凡較之惡多善少於善少之世不幸不逢正像又值末法稍有靈根者徐而察之管取身毛皆竪在降是更有何言客歲初晤先生於吉祥再晤靜海別後道人抱病潯陽百餘日再閲歲之曹溪禮六祖復買舟東還忽勞盛事生義當北上為白其冤上諸公書已仍復南返適又值先生至此似乎彼此本願因緣力故於無期會中宛如期會道人不以開佛知見為家務便是忘本願自斷善根榜樣先生不以金湯大法為椎輪便是牛頭阿旁作戲具的樣子吾言不妄先生當痛念本願毋忽二前狀因文字冗鄙敘事揚塵不惟不能發先德之幽光反足掩亂本色如得其菩薩心者於冗處清之鄙處文之敘事揚塵處直吹之以天風灑之以靈雨發幽光於掩亂之中全本色於散漫之後使我龍首尊者重現色身三昧於千古再覆廣長舌相於十虗則大明無乏高僧之𦦨而覺苑有傳心燈之光矣貧道往復思惟雖能言者代不缺人至於剔冗化鄙善鼓天風海濤清灑朽骨全本色剖幽光非先生之筆將文則失實實則無文而理事軌逸矣惟先生念我戒壇佛祖慧命所係即為我抖擻根塵堅智願力大舞筆頭三昧成就孚翁普現色身利無方幸甚與阮三城老漢向來不解生病忽爾病生遇一切熱時若火輪洞劫寒時無異寒氷地獄寒熱交作時其苦復烈於單寒單熱時使老漢一片情識卒支持不下始返病不無端而生生必有自大都推病由業推業由心推心由不心者既推至於斯則能推之者觸不心而歇所寒寒熱熱者隨歇而歇惟初不寒熱者固自若也此等言句向不曾受病者漏之何異木札鐵丁辱汝遠訊從實復此與王宇泰中甫人來得手書甚慰懸想但書中云參禪不易若只將心等悟縱任貪嗔廢漸修之功豈不兩成耽誤只得隨緣制伏蓋言前薦得屈我宗風是教將心等悟縱任習氣貧道曩與宇泰舉揚時未始有此不知宇泰何處得此知見若真心要出生死與人商量不得須要自家討個分曉貧道雖宗門種草若論見地未始不以教乘為據證釋迦因中未值然燈苦修多劫終非佛因值然燈後一稱南無佛皆已成佛道此理顯白易了見地一端諸佛稱之為大事因緣今人隨情起見或專求生淨土或持呪課經謂之借緣熏煉消融習氣殊不知見地不透徹淨土豈能親切持呪課經何異澆水增氷總皆結業毫無所益古德云悟明後方修行然悟明之説種種不同有解悟有修悟有證悟解悟者從經教熏聞力久心漸開通又謂之依通識解修悟者宿有聞熏曾少開解但未得實受用今生出頭來或假修習忽然疑情頓斷受用現前證悟者根器猛利不移剎那習隨悟消立地成佛今宇泰即未能修悟證悟亦當閲熟一部教乘以求解悟其間習氣以熏力故不求損減而自損減然此亦必以證悟為心奈功不勇猛流至於此取法乎上僅得乎中可也使但只隨緣制伏而絶無求悟之心則習氣終不可除而佛道終不可成矣何以故種麻端的不生禾故取法乎下非其因故答樂子晉辱手書讀之何志大而憂深哉使吾神愴不已法道凋衰吾曹妄庸誠如所言顧惟魯鈍道不勝習才識亦復不甚遠濫混緇林無補其教人患不自知能自知則餘想自歇矣魯鈍雖不敏年來亦頗自知短有餘而長不足世好諛而我好直誰能容我人不容我而我不自知持方投圓寧不倒置哉且粗豪如舊憨放不移知我者以為渠胸中無他不足較不知我者以為狂傲無稽恨不即阽之死亡為快以故魯鈍只宜佯狂詐風不拘山林城市飽食橫眠苟延此生耳但有負高誼慚愧何如尊慈齒長而子晉為客有年甘旨不能遂而相知中亦不能及時周旋多口抱餓於故山之墟而一身羈紲數千里之外凡相知者豈有聞之而不急見之而不痛哉由是觀之則向所稱相知於子晉者果相知乎故曰相知不易易不相知耳雖然有深知子晉者而力又不給而力給者未必相知信乎子晉命之窮也密藏間於禪誦之隙為老漢舉似之青山白雲亦為之變色況有情者乎又子晉慨世法出世法交喪不堪憤欲剃染然剃染一事如見不徹持不固亦非易者痛思之孫武有言曰少算不如多算況無算乎想子晉言必不苟發預非多算安能便爾耶昔崔趙公問徑山欽禪師弟子出得家否欽正色曰出家乃大丈夫事非將相所能為豫初讀此以為老欽恃高尚而忽榮名及親驗之乃知此老以真實心吐真實語果不我欺夫情根積固豈崑崙須彌之可並識浪奔騰豈滄海岷江之可齊將相雖非人傑不可為然夾情做事而少有才識者人可為之惟出家一路乘短生而欲拔長劫之情根倚螳螂之臂而欲戽竭滄岷之水靜而思之始知可否矣顧子晉直以我言為贅疣大笑而割之我亦無憾清涼大雅非他名山可並倘能稍撥塵事一登何快如之且有法門一兩事急欲面商之潭柘機緣具堅默書中不備與吳臨川始光居士性宗不精則不免墮事障裷䙡相宗不精則不免墮理障裷䙡禪宗不了則不免墮葉公畫龍裷䙡近世黑白並乏憂深慮遠之心所以性不性相不相禪不禪且性相禪三宗各有綱宗如天台八教賢首五教皆毫不可紊者也豈禪宗獨無綱宗乎禪宗若無綱宗則岩頭奯但了綱宗本無實法之語得非孟浪耶奯公宗門龍象寧肯草草特後人心識粗浮根器薄劣了不知古德之典刑作家之大全耳如知之脫不面熱余知其心死而不復活者也二到家果能打屏人事專力淨業乃第一義第恐淨業理未徹必受多生染種現行困折行終難副言也大抵有志淨業切勿厭煩厭煩則性相見地終不高明率此不高明見地專力淨業而能困折染種現行資發淨種功能無有是處往蘇秦欲恃口辨得官及裘敝金盡抱餓還家方悟始以厭煩出終以厭煩歸蓋厭煩則不能憂深慮遠不能憂深慮遠則讀書必不能得立言人之意立言人之意既不得雖詩書滿腹口若懸河終糟粕耳糟粕可以得官官果能治世哉不過循時具位而已故秦憤餓復還探家所藏之書至於懸梁刺股輟睡忘食稍得書意再出方遂其欲彼功名尚如此況求出世法乎以此言之則見地不高明淨業亦未易修也思之又淨業一途近時僧俗逋逃藪也三猊當大痛省老朽忉怛如此非無見耳三臨汝別來奄忽近歲舟中光景獨影昭然信乎一微包裹十世若必然者達與臨川未始暌違也雖然兩順一逆之關未能掉臂則性變為情情復成性所以然之説斷不可不痛究之且黑白親近知識賴有此段瓜葛耳否則方外之賓絶物則高染物乃卑此亦自然之勢也四此方真教體清淨在音聞音聞即文字三昧也此三昧又名文字般若又名緣因佛性如刻藏之舉正所謂緣因佛性耳蓋衆生所習無常以緣因衆生性熏之則衆生知見發現以緣因佛性熏之則佛知見發現能熏如風所熏如谷此娑婆世界非以文字三昧鼓舞佛法法安可行五臨行匆遽中而事無不周用情可知此非夙植靈根兼有深心視名聞為唾涕者不能也第勞纍始光於小善細緣亦心所不忍耳意在小善不忽為大於其細也法華云以衆生有種種欲佛以種種因緣譬喻利導之亦此意耳由是言之但患衆生無種種欲心如有欲心則氷外無水之義立矣此義一立又患氷少水不多也幸深思之近來黑白或有不知此義者善雖不擇勤而行之乃人天果報及魔外因緣耳小乘則視衆善為勞纍棄之若火灰恐其燒子故也是以善無大小直以唯心觀之則德行未嘗不神矣果如此則勞纍亦何獨不神哉別汪居士林下野人受性狷介嗇於希世行止疏慵徒益英俊之笑談蔑補聖流之玄化雖托於孤清之館寧忘乎寂寞之濵暫謝白雲終慚丹嶂將回瓶錫敢報軒車乞惟遂其猿猱之情亮其犬馬之暗得還初地永祝遐齡與婁生別後寒暑屢遷去者不可追矣每一念此則婁生未始不在眼中婁生婁生娑婆缺陷世界耳缺則終難如意陷則終難出離難得如意何往而非苦難得出離何往而非牽墜哉故衆人於缺陷之坑作得意想作得離觀譬如執捉虗空祇益自勞也惟達者知身非我有心逐境生於是死生不排而空好惡不遣而化所謂缺陷之坑頓成極樂之然明而不能勇則身心二執亦不易排遣者古人於氷崚上走劒刃上行亦為死生之關未易打破愛憎之坑未易出離故有此喻也於此兩者未能解脫則談玄説妙溈山謂之口解脫苟非入水長人難見婁生能痛不負道人慈念管取缺陷坑中如意珠放光有日在道人乞食江陵邂逅貴縣某上人空谷足音也上人東歸附此鞭後寄顧汝平大凡百工技藝有志成其術苟自心不死而能詣其精處無有是理何以故蓋心死則一切舊染失其檮杌而本心自全精神不勝用矣然可死之心必因前塵而有既因前塵而有如能達塵無地則心不死未之有也又達塵無地者關子有似達塵有真遠塵凡似達塵之知見謂之藥汞銀見火即飛去矣曷能終吾事汝自今去必要到真達塵境界則功名性命當必克願汝痛無負達道人慈念與馬君侯夫雨有天雨人雨不禱而雨者天雨也禱而雨者人雨也此古人成訓而人之禱天在德不在爵又非奇術可能也誠而已矣大藏之中有請雨經三帙乃大覺聖人慈悲真誠濟旱之良方也明公既以蒼生為念誠發於中則精徹天地雨可必致然須擇請戒行高僧設壇淨地依科奉行請雨之法必得雨以為期隆興寺僧能課頗亦真誠行著鄉黨當敦請主壇加以僧官能錫輔弼奔走建壇之後再得一禪僧夜夜放焰口斛食一筵亦得雨為限良以亢旱所自必由乎所屈屈而不伸則抱而怨生怨生則悖戾之氣作下有所感上必應之若不仰仗大覺慈光實力神呪并守土諸侯卑躬虔禱則屈不可伸怨不可解雨烏可得哉怨有多種難卒備言即人情而推之可以意悉惟明公大虗己靈臺照野人之衷曲凡壇中一切費用資具項件但憑主壇者所須在處公所當供養大悲雲生如來聖位至於命各州縣禁屠又皆明公指揮之下也且禁屠大都有名無實童蒙孺子尚不可欺以不實況上天之高明哉此又當榜以哀慘告示遍曉州邑至緊至緊
