body:
  text: 明憨山德清閲偈燈光偈燈初未有光我點光始生光若在燈者無光燈不明有人知此意無火夜能行弗信問觀音觀音笑不停生日偈自知今日出娘胎今日緣何娘不來來去覔娘無所得蓮花國裏一枝開生無生偈欲曉未生時先須忘已生已生若不忘未生終不知示于中甫千妖百怪總相知心外何曾有一絲達本忘情生滅事他家種草認為癡夜行偈星夜經行時前後步互起前步若至地後步不能起後步若至地前步亦不起前後不至地乃能起不已即此諦觀之足何嘗至地足既不至地空水亦可履空水既可履神通孰不具示弟子并序法華經云佛種從緣起是故説無生夫無生即非墮常無滅即非墮斷斷常不墮何事非真故妙法者即觸事之粗也嗟乎粗妙豈有常哉顧其人所明如何耳是知凡緣所起因地不真果終紆曲比來去佛甚遠龍象蕭條黑白之徒邪正不知菽麥無辨合掌禮佛心在狐狸剃頭為僧志存俗諦以至千態萬狀不可名言皆由最初剃染之時因地不真耳余每念此雖浪迹江湖將四十年初未嘗輕為人祝髮命名非無慈心也良恐以小慈傷大慈耳某來吾語汝汝痛體之凡百脫白離俗者最初當審其因地發心真正倘無委曲相決當披剃或吾遠近無定音問不接即懸老人禪影剃染授名亦不須執滯直宜圓成其勝因勝因即佛種也因不勝即魔種也魔佛難辨某其慎之偈曰好因緣是惡因緣真實難瞞頭上天分付春潮帶雨客歸來快上渡頭船夢覺偈夢中知夢將入覺中覺中知夢將證我空我既空矣孰為雌雄宿石鍾寺并序乙未三月紫柏道人有曹溪之役偕二三子信宿湖口石鐘寺寺據山水之勝才一登之萬有盡洗夫浮生聚散不殊漚花惟達人真觀視聚為散視散為聚怨歌不廢而思本無邪二三子因請留一偈以作廣長舌相之前茅偈曰湖口山上石豈惟千萬片征航肯暫收法句皆題遍片石一伽陀瞿曇開笑面遊人聽好音獨許眼根便萬竅忽怒號長波吼江甸我將生心會眉宇已閃電夙慕石鐘寺寺逢僧未見轉經了不難彈指知幾轉千里步初始行行敢辭倦獻栴檀偈獻者是香香外無人能所路斷是香誰受受者不可何況獻者如是觀香香即導師徵受香者奚如枯木以是之故香總無邊等十方空釋廣百論眼中有色識死人應見物識中有色眼識去眼色隨死人如見物何名為死人識去眼色隨根境同時去據事觀不然能所反復推生者不見色何況乃死乎理極情自忘情忘識即智以智觀根塵譬如水洗水擇仙偈身見難消金石輕何須更願學長生試觀父母情非有始見幽宵照世燈贈周叔夜偈處處春風處處花問君何地是根芽簷前松曲數椽朽脫却袈裟更起家觀轂偈并序老子曰三十輻共一轂當其無有車之用又曰有之以為利無之以為用豫曰非但埏埴戶牗輻轂然也即自身徐察之耳有輪廓而輪廓有竅虗通耳始有用乃至眼鼻口等獨不然乎雖至愚舉一根以例之則餘者自曉了矣偈曰觀轂知一身觀身知天地是觀善昭廓至理靡弗了至理本心有日用欠深視故用而不覺是謂衆人耳直下洞了此孰非大覺尊大覺吾尚得何況世中貴究昏偈譬如人醒時倐爾昏住起此昏從醒有是則不名醒離醒有此昏一人寧有二往返細研之昏根植何地於此忽然透疑情直下釋旃檀幢偈并序去冬牢山主人謂余真州吳生出所供旃檀幢竪不盈尺割面為門啓門而視中等虗空千佛忽現主伴重重如絫黍聚立而眉繞須彌目湛大海無不畢著巧奪鬼工見者驚絶殆不可以智識測非目力能窮也此夕吳生省余梵川燈前復及是幢且詫曰安得天劃神鏤而於不盈尺具一世界耶余喟然歎曰吳生吳生安知生不生如知生不生則芥子可藏虗空牛毛可納滄海而況是幢乎且蟭螟以蚊睫為世界蝸牛以濡沫為濤瀾此皆以小為大也大獨不可小哉故曰以小為大小非大外以大為小大非小外小非大外則何小非大大非小外則何大非小何大非小則一豆之中間關莫窮何小非大則八荒之表密邇非遠良以大小生乎情見情忘則何為而不可耶文子薦此則牢山之無風起波若之承虗接響將非螻蟻拳宮之夢哉偈曰木不盈尺所藏無量凡聖雌雄不可情想如心未生量包虗空微塵剎土像現鏡中一念既起即落邊際知周五尺棄海認滴小大劍立鋒芒難犯苟非忘我心碎形段文子勗之無往不吉我語尋常遵之獲益刻畫之功施之三寶苟善用心何技非寶孫仲來書經薦母偈此法極微妙亦復極堅固微妙者資父堅固者資母孝子未投毫亡者生善處況乃字積句句續積成部各各自心力存亡皆獨露日用而不知摸鼻疑是鼓𭺗癢偈南泉庭前花紫柏背上𭺗兩者並舉似雌雄看作家蝨偈成堆蟣蝨有誰知也解申頭與展眉若把法身輕抖擻總教枯殼逐風飛禮諸祖道影偈衆人昏昏見影謂假見形謂真智人不然知形生影知影生心心無生滅安有古今以無古今生尚不有況乎有滅不生非常不滅非斷作如是説能如是察影影形形智德無闕香供偈心外無香香外無心譬如身手身外有手決非己手手外有身決非己身身手不疑香心了然以此供祖祖必欣受受非事理成就孰住惟其無住施者之福寧有邊際以此薦親親無不超以此祝君君無不福衆人半目睹香非心聖人眼妙見香非香惟吾曹溪香心無常兩者不就成就一切用為毒鼓聞者耳失失耳用眼墻壁觀樹香之所作無可不可為人之師為地獄主香乎香乎栴檀非名孝心為指並熱千古端雍知此不枉為子熏續無窮煙靄其後禮六祖法供偈師本賣柴漢天機何其深一聞金剛句直下悟自心既悟自心已胸中復何事迢遙向黃梅槽廠充賤役用石墜腰間八月齊食頃米熟機相投夜半入祖室密傳聲如雷聖凡若鼎沸師聽不以耳直用眼觀取衆人則不然廢耳聲不領是故應有住能所角然立惟應無所住生心境無咎無咎無不心何物更為待分別雖熾然譬馬見自影了知身出故時見不驚異若見餘物影馬驚何足疑惟不見餘物驚疑從何起自心取自心佛亦不印可離心求法者曹溪水不濕大哉至人慮必以誠為本誠則偷心死心死性自靈靈則無不照理事皆不成即此不成就能成就一切譬如隆冬時萬木凍欲折陽春一夕回光輝無不露是謂誠生明非照光圓滿吾師得祖心祖心不欠少師心不增多得心本無得無得而心傳永作世間眼重昏須臾旦吾曾讀壇經得師心自知亦無得而得用處習為障心明力不逮於是恆痛泣仰憑冥熏慈既失復乃得今獻法供偈剖折微知見於法苟不昧乞垂慈印可白茫遇虺并序吾禮曹溪至白茫將買舟北還沿岸登舟見一虺毒焰熾然怒目呥舌不覺失嘆嗚呼云何忽生之前本然無二忽生之後乃萬其趣是誰負汝汝恨不釋積而成毒形隨心變受此毒狀無擇智愚見汝必殺吾觀汝性與佛無異視汝如佛偶因不覺暫時迷墮一朝知毒毒本無根根於無性無性無我無我無人喚誰負汝人既無負汝恨何懷雖然一迷永迷迷而求覺苟不籍佛祖寵靈慈悲熏炙方便旁擊則寐者終難寤矣今有人於此有少忤懷遂抱恨不解積而成怨怨必終報報則必復如我輩人見此雄虺痛當自反反而有終必證圓通大悲為侶度諸愚蒙反而中止非虺不已智者思之寧不毛竪偈曰祖師之鄉産此雄虺見人不嚙嚙則必死慈悲薰蒸翻為毒具不善用心乃至此耳如善用之一切毒具博施之資吾禮曹溪行至白茫見此毒物內心自慌我若懷毒心毒形彰自然之理何必商量籍祖慈力小毒必損大毒敢藏言而不行必受其殃示弟子目前一切境皆自心建立離心覔一毫譬如兔有角人不悟自心見境乃分別遂被好醜轉長劫無時止或報人天身或受羽毛等強弱互相噉如己口嚙指又如善畫者畫出如花女容顏世希有忽然生癡心乃謂是實女相思病至死不悟自心出醫王何自來咄哉呵病者自畫自生著何異口嚙口病者聞斯語知離心無法非但此畫女凡聖法皆爾一旦癡計消畫師本如故偈搜剔春光不見根雲來雲去石無痕夢中行盡風波路醒後漁舟泊故村又落花芳草恣尋幽夜靜明籹獨倚樓自是老婆心不死男兒何處不風流又桃源仙子昔曾逢別後重來訪舊蹤滿院好花零落盡却於樹底覔殘紅又觀橋即我橋誰坐達境惟心境自空片月在天光不斷夜涼長嘯水聲中示病僧我無病時初不檢情一旦抱疾宛延難屏火燒我骨冷刺我心種種苦楚日將漸深非天地與非鬼神使皆我自作作空病止此真實語諦聽逆思忽得病本了然何疑吳江華嚴寺浮圖然燈偈示法麟并序緣見因明暗成無見不明自發則諸暗相永不能昏此楞嚴會上如來之語也此語自古及今於中發明本光者豈少哉然而有不發明者何故病在能信佛語而不能信自心故也是以一切血氣之屬若不緣明橫謂不見殊不知知不見者果見耶果不見耶見則見本無欠不見則誰知不見由是而觀則本具常光包空裹有未始欠缺在眼名見在耳名聞在鼻名臭在舌名嘗在身名覺在心名知堯舜不能加桀紂不能損然非逈脫根塵者亦未易薦取之今有人於此憂是光物物本有奈何日用而不知於是寄有象之明階入無見之頂吳江華嚴寺有大浮圖空洞特立於江之上凡邑之善信有志於背暗投明者皆割其所愛易油然燈使光徹上下飛而宿者潛而止者同悟本光紫柏道人聞而悅之綴以偈曰本光誰不具具而不能知以故名衆生一朝知本具衆生即如來六尺勿謂短有佛時時現百尺勿謂長燈滅光不見法麟能知此燈傳定無盡觸塵偈未打打已如有疼兩頭無有中間生一切凡夫作此見是故輪回不暫停若人靜心痛觀察未打打已痛何在兩頭不疼謂中疼以理觀察難解釋究竟此疼了不疑正疼疼了果非有登耶舍塔未聞耶舍塔本無嶮不嶮既聞耶舍塔心中忽嶮生已登耶舍塔與初未聞冥正登嶮太甚自決不能登是時究始末果嶮果是平與智燈犀牛昨日與君看頭角渾然不見還本欲無言安可得誰憐田地草蔓蔓紙花偈人言此花假我謂此花真紅白香欲浮作者之精神於此觀天地離心無纖塵況居天地者謾誇造物新智者見之智仁者見之仁通塞本無竅萬事存乎人讀觀心論念有一切有念無一切無有無惟一念念沒有無無示元復百千無量苦苦本於三毒三毒乃有名名曰貪嗔癡我常受其賊憤欲搜其窟試覔於身初身初不可得再覔於心始心始不可得次覔中與外空洞無物我及觸逆順時現行關好惡隱然若有物藏於有無處秉理痛折之其勇不可敵若不𢬵性命與其死捱逼有隙取敗績無隙我即勝勝時觀敗際總是兩頭失兩失求其中龜毛縛西風此觀頗有志成熟猶未能所以憎愛間違時常失候我今吐實語信我者取則亦如我𢬵命力敵終不負示于潤父鬚枯神索胸中不樂此不樂者本無依託推之於境境非能捉境何所縛推之於能能非境牽能何所著於此兩者究而得宗事會於真川歸於壑事會於真何事非能能不害能仔細斟酌水歸於壑何滴不諾於此頓了苦樂皆樂深慈曉汝丑午匪覺元廣代木童子偈試問木童子𭺗癢有心否有心難隨師安能與師遘是時非有無寧復墮來去廣子無心來吾適背困倦借代木童子信手捶不已若説是有意直下情不生用處應不纍請問誰鼻孔彌勒大頭垂釋迦山根直吾本人非人渠亦子非子拳拳不落空倦處斬然暢此暢曹山墮凡聖絶心路人子若有功此墮皆可測汝若不能薦童子木笑汝皮斗偈形骸如皮斗心識若巨燭光焰本無際皮斗不明忽然揭皮斗光即滿天地此據橫計言皮斗燭不同了達橫計空説甚皮斗異示唐凝庵并序凝庵詣清涼參師師問曰曾看稜嚴否曰看師曰稜嚴云緣見因明暗成無見不明自發則諸暗相永不能昏如何理會答曰見暗之見即是見明之見師曰明中則萬境昭然暗中則一物不見如何喚得見暗之見即是見明之見唐沈吟次師命侍者滅燈以掌張其面唐不知師震威一喝因示以偈回合羣峰裏其誰踏入來過橋雲不礙尋我鹿猶猜一喝鳴千古多生住五臺吹燈休按劍直下夜光開示馮驥子有一物甚奇特可蛇可龍能風雨有人拈起猶不識能識之則可得處處常有鬼神護不護佛語不真實又非銅又非鐵看來不如乾屎橛雲門盡力道不全瞿曇到此難饒舌惟有得此如意者任伊橫説與豎説滅燈示六根互用拄杖飛來一陳風燭光觸滅暗塵封誰知別有通天路一道神光照不窮示林白一切世間音若以耳聞之能所角然立憎愛迭浮沈自心永埋沒如以眼觀之寂滅頓現前所謂能所者譬如虗空骨癡狗情瞥生垂涎橫咀嚼菩薩哀此流分身三十二凡有見聞者隨類得悟入丙申三月將結夏示朗麟二三子并序浮生閃電聚首難逢苟不究竟向上機緣則結夏之所何適而不可哉奚必遠峰泉而傍城隍耶故説偈見志透則自應同結夏若還不透夏難同一枝藤杖橫肩上又入千峰與萬峰聲聽偈聲聽是一何異木石聲聽非一誰主誰客主客不辨情終不息長淪聲波復性何日偈富貴夢不破貧賤根未斷兩者念後事念前仔細看聖凡尚難留生死何欣厭憎愛交加時是誰解敬慢於此薦弗能坐禪非善幹縛脫分別起嫫母賣笑面佛香庵觀月偈一片清天絶點雲繁星不見見冰輪郎君若問蟾宮信報道寒香馬鼻聞其二此身自笑是虗舟好惡從他一任浮縱使風高翻却了主人嬴得浴清流其三智光力大不思議世界須臾散作泥是事若還君未信夢中榮辱醒中非聞豬聲業識茫茫不解休愚癡為水夢為舟無明風猛搖心海浪大帆開未易收其二收帆何必更商量歇却狂心萬事康自是衆生心不歇歇心便是法中王佛香庵即事偶成觀宗父設齋特地太多事萬物有通情恐將情折理此情化未能難入至人域我若以情觀空山富寂寞白足肯輕移深雲睡正著略情平等觀法身何彼此委曲隨波浪拔爾出生死竟不以此察盤桓損無益醒夢偈夢中地上走忽然地成水又謂水中遊忽然水枯竭謂我空中浮忽然空消殞謂我無承載恐怖求處所怖極忽然醒醒後觀種種不異兔之角醒中觸憎愛好惡迭相攻攻戰情忽破當處無我所醒夢念後事即念得無念醒夢大導師我故稽首敬衆人不稽首不知醒夢恩夫醒夢者識一識永不得萬古處幽夕覆盆非故鄉迷暗豈眷屬何為戀不舍勞彼至人咄再過金壇東禪寺寺前寺後行一回門外門內秋雲堆馬面牛頭手握蛇會當以眼聽春雷示法鐘雲門老祖師忽問搬柴人畢竟柴搬汝畢竟汝搬柴吾今問其子畢竟子走地畢竟地走子雲門鼻孔垂紫柏鼻不反古今同一條莫謂有生死地走痛究竟心開情自釋情釋地與子離即用不虧大千不為廣芥子不為窄虗空納一毛一毛包大地如是不思議於子本來具日用暫不知知得笑不住蘭溪示魏覺樗初畫若有畫次畫則不就次畫若成就初畫未嘗畫初畫未嘗畫縱使無量畫畫果成畫不若人知此意是則庖犧氏離此覔庖犧何異我覔我示元廣見海不能渡疑水惟信土信水與土等驚濤穩可步吾語最真實元廣生恐怖恐怖不生見用處獨回護此根從何來以疑未斷故示楊生此經能背汝非汝經不背汝能背此經無經將何背經汝痛心究畢竟誰能背若謂汝是能無經汝無對經先汝在後云何認汝能若謂經是所無汝經不立由汝而立經謂經所非理兩者往復觀根塵當處剖日用塵寰終日覺忙忙那事原來總不妨舉步倘能離背向更無岐路泣亡羊拈花因見一花故乃入無邊空一花既如是好醜無不同以此觀世界雪點紅罏中以此觀身心兔角杖打風能得此三昧度世力豈窮愚人反此故頭頭行不通誰悟不通者當處元虗融沐浴偈稽首沐浴諸佛子赤身入水見長短溫然清泠宣妙觸香水海中同受用見有身相即鑊湯不見身相亦燒煮願諸佛子作是觀沛然涓滴皆般若施者受者功不虗是名沐浴妙三昧麈尾偈吾當手捉白麈尾日用用之不復思一夕獨坐忽思之麈尾是所手是能所忘能亦不成捉雖復手在無所用既而再思使手者手即是所使者能手忘能使亦無用若人常思無用者思熟無用用無盡果能妙達此境界無煩悟道出生死斷淫偈佛無不喜惟不喜淫佛若喜淫水中用塵塵以水洗塵從水生水不洗水塵豈能清兩者匪惑淫火自停示學人等間鼓此兩片皮汝即以我為説法北俱盧洲舌廣長溪聲山色分明語此即解聽彼不聽棄彼取此乃心病心病不空聽法難北俱盧洲路不遙如何有耳聽不入徒自千難與萬艱兩片之皮嘵嘵時便謂聲聲我解知離皮之外謂著耳面面相窺總若癡勸爾向後欲聽法北俱盧洲領妙機讀信心銘吾讀信心銘口倦默然坐坐時聞簫鼓音響直貫耳復作如是思耳若無虗空此聲何自入以耳例諸根根根虗空等根既等虗空空非有邊際以空等耳根根根周法界不壞亦不雜見聞嗅嘗觸及以意思想六用皆不昧不昧而等空能所無分別苟非大智人照必勞心力勞心失本明佛眼光即失分別墮能所慧命早夭折忽達兩無功血脈斷而續一佛續百佛百佛續萬佛萬佛續無盡無盡皆骨肉常作如是觀弘願與慈悲無煩外薰炙神力不思議舫粟偈達觀道人窮伎倆喜怒無常招譽謗順則歡喜逆則惱從來自狹而至廣試將老漢為毒鼓逆順聞聲命根喪但恐譽謗不甚多多多愈善度無量無量衆生辟如粟達觀老漢還同舫以舫載粟無多寡粒粒教他登彼岸智人以此而觀之譽謗真實大方便毒鼓化作度人具苦海灘頭濟衆難濟難之人疏亦親豈有智人惡親屬惡親必定是愚夫愚夫謗毀當哀憫哀憫之心聞惡聲即如赤子罵父母父母聞之憐愈深寧暇生心怒赤子若人聞謗意不平當學達觀作此觀謗者聞之不生怒譽者紛紛何足羡喜怒須知不獨立相待而起成憎愛若虧其一兩亦空廓達常光無內外既無內外遠近遺遠近既遺古今喪古今既喪誰老少無生無死真菩薩吾勸世人誦我偈勝閲大藏經千轉豈惟功德不可思凍膿直作金剛聚金剛聚兮金剛聚揑不成團打不碎有緣得而善用之子子孫孫常富貴弘法偈夢中見海不能度孤立海岸日將暮退則還家路已遠進之無地足難措萬種倣徨進退難正難之時誰打鼓鼓聲未歇夢早醒開眼何曾有惱苦又醒中見海不能度回首西山紅日暮進前驚濤怕殺人退後已失還家路千難萬難在此時不知阿誰能救苦能救苦能救苦諦觀身心誰福禍禍福從來各有門一心不生孰為主憎愛場中辨偽真死生路上分頭緒以水洗水金博金日用分明善回互善回互善回互等間不犯他苗稼塞破虗空老水牯和蘇長公書焦山綸長老壁附長公偈蘇偈曰法師住焦山而實未嘗住我來輒問法法師了無語法師非無語不知所答故君看頭與足本自安冠屨譬如長𩮻人不以長為苦一旦或人問每睡無所措歸來視上下一夜著無處展轉遂達晨意欲盡鑷去此言雖鄙淺亦固有深趣持此問法師法師一笑許蘇子恁麼來法師恁麼住兩名白拈賊無舌能解語此意本平常遊人自多故譬如風狂子顛倒冠與屨既以苦為樂亦將樂為苦夢中苦樂事試問誰安措長𩮻我自裁我裁我解處無端我疑我石火電光去我若不疑我從他趣非趣忽逢明眼人未語心先許看桃花偈舊樹新花開共看此花不異去年顏誰知花笑人分別榮落頻經樹本間讀普門品偈并序衆生三毒習以成性如油入欲壓而出之雖神禹莫能也今此經云若有衆生多於淫欲常念恭敬觀世音菩薩便得離欲等既曰常念又曰便離則其辭勢義理卒難消會細而味之常念則無間斷由無間斷始乃便得離欲若然者運東溟之水救束薪之火理必然也雖然恭敬而常苟非大明至勇者其誰能之且恭敬與懈慢勢不兩立苟見理未定染習力猛理不勝習十戰九敗如猩猩指酒而怒罵於怒罵中冥遭習轉不覺不知去而復返酒香染神神醉氣疲罵力忽成軟暖以口吸酒是時也不知有利安知有害不知有死安知有身余故曰能常念恭敬觀世音菩薩者復三毒而鑄三德非大明至勇孰能臻此偈曰恭敬受持此經現前此經現前觀音説法眼聽始玄不以眼聽却將耳聞玄妙之聲成愚癡雲雲埋慧日長處覆盆讀此經者恭敬為本無擇長幼佛性爾審作如是觀韋天護念若己頭目愛惜無倦心塵無性偈心不自心因塵而心塵不自塵因心而塵因塵而心喚誰作心因心而塵指何是塵兩者既悟萬法通真送悟慈省親偈此身敢問自何來四大分明土一堆就裡有恩忘不得西風落木渡江淮示禪人流水松風總舌頭真言萬古轉無休若將兩耳終難聽合調還須死髑髏示申知離雄心偈并序夫雄心者有不雄者為其母今有人於此不得其母而欲強制其子是謂子制子子終不服惟得母者可以制子也故曰銅山崩雒鐘應母囓指而子心痛皆以母召子也子孰不應永嘉云不離當處常湛然子耶母耶知此者是謂得母雄心若可銷聲伎片掌應須置岱嵩欲海萬尋終莫測愛源一滴竟何窮書經薦父母入蘆山塔偈我父生時我逃逝痛慚不得奉甘旨我父死時我未歸一抔之土孰掩骨此慚此恨何時消日增月纍丘山積丘山劫壞終有崩劫壞山崩恨無盡今仗佛光書此經字字功德難思議南無妙法蓮華經經中之王我自性以此功德報亡父黑業頓謝生佛國見佛聞法證實相如戰有功得髻珠願我亡父持此寶遍照十方𦦨無際我本母生不及養寸心耿耿石難化期酬至德無所從慶我離塵為佛子深思婦人淫業重堅固難拔等須彌須彌可傾淫難斷津梁苦海須聖力佛説諸經度衆生皆先戒殺後淫欲先淫後殺惟稜嚴是故報母應仗此南無無上稜嚴呪消母淫業如天風片晌之間不可得戒珠清淨光無缺見佛聞法得自心一切萬法悉堅固我發此願等法性見者聞者皆出苦何況書經報父母若無利益我不實惟願二經入此塔塔亦永永無圮壞風鈴宣説諸呪心有心無心俱悟入又願因緣若至時放大光明照法界觸此光者生孝心因此孝心得菩提一燈傳至百千燈百千燈傳永無盡我願如是佛證知法僧人天并八部二經會上發心者佛前立誓説諸呪願護此經如護眼在在處處恆不離我今哀求説呪者護我書經亦如是我若成佛報汝恩如我今日報父母碎甲偈并序天折地裂物莫不驚髮脫爪枯而人不覺設或覺之則與天折地裂驚無不同者此義甚微徐而思之思而知之知無不覺覺無不驚驚則不忽不忽則復復則天本不裂地本不折髮本不脫爪本不枯偈曰機無精粗見者用之才欲生心機則成疑疑復不覺天裂寧知粗者如此細者轉迷根塵廓落碎甲導師豆佛禪師起龕偈百戰爭山河埋骨只數步千斛豆念佛佛夢今朝破凡聖情枯時根塵瞥然墮起龕佛威神虗空合掌賀髑髏何處埋法身忽猛露豆佛若有靈當面肯錯過雖然如是且道起龕佛事畢還有出身路否咦從來心外無毫髮掘土埋人心用心豆佛禪師懸真偈大地山河是阿誰了無一法可思惟登時豆佛全身顯面面相看幾箇知咦雲山頭角露流水解談經豆佛禪師停龕偈安樂巖前路不差紛紛黑白閙煙霞須知今日停龕處雨霽叢林報覺芽豆佛禪師撒沙藏龕偈一把吉祥沙安樂潭中撒藏龕千萬年兒孫常秀發沐浴畢偈入水出水中邊何在才稍停思滿身白癩示安公偈安公患足疾紫柏施爪甲適然𭺗癢處根塵頓廓落是時問病足利口請置閣此意頗平常智者摸不著問本亭偈寄昆巖鄭居士清淨本然問本然琅琊長水舊機緣五峰雙澗亭中客七塔一池為我嚴空谷偈萬人呼空谷空谷一齊應人谷若知萬兩者皆有病病在心生時早出人谷境寵辱若萬人驚若空有應瞥爾生欣戚驚亦早越境我以比量智人谷理自定寵辱不重辨驚理人谷境粥偈一碗道心粥勝飲人參湯米豈有兩般須知在心腸細人不惜福徒自日損傷智者慚愧重心田種日香示匡石居士分明大地本無塵水火何曾有異真燈下研窮悵然去朝中還是夜來人弔沈母偈地水火風處處有遇緣假合成身首達人了此遺生死是名真得無量壽尊堂報盡還其本地水火風不可混以情觀之有死生以理推之無加損山高水深不改常桃紅梅白皆配色一度花開一度春年年昆季增悲泣次邸店偈此邸喻三界嘉賓若驟雨忽散而忽聚得示無生旨其奈翳眼人當面不遑視有問臺山路出門驀直去斷峰偈古今不可得孰覔前後際生佛不可得孰立真俗諦為有下劣故寶几與珍御為有驚異故黧奴與白牯皆隨衆顛倒曰此緇此素素因緇得名緇非素無謂究竟緇素間了無真實義前後並真俗言際亦如是窮際際不有斷將安所寄直下心言絶眨眼涉思慮木人拍手萬峰頭石女崖前笑相示僧祖宗一片間田地無奈兒孫懶不耕日久歲深荒沒盡苟非的骨謾翻騰憩古岩偈人生誰百年轉眼即來世浮榮鏡中花苦海無邊際楚漢競雌雄只今成何事奚若守心城護此光明地劫燒渠不然煩濁渠不穢靈機統六門出入泄真意勸君觀岩石龕內佛是你苟非大丈夫未易承當去示于中甫直下寸絲渾不挂熱屎潑人誰不怕披毛戴角解翻身跛跛活卓卓觀射偈空含箭迹箭穿空空箭難分體異同若謂空中無箭道分明箭過於空中空玄含箭難觀迹箭妙穿空不見蹤假使箭空微有礙如何彼此得圓融沐浴碧雲禪房覩羅什道影一光東照法被支那雖義有淺深乘分大小皆金口所宣也至於譯經者流無慮百餘家若夫文質精到逗機不爽無越什師豫素欽渴慈雨竊恨不得並世而生一奉瓶錫萬曆歲在癸巳春信宿碧雲寺辱雲莊禪丈為豫設浴既而慶覩什師道影於其禪室再拜稽首而説偈言稽首羅什師文字般若海澡沐如來言鮮潔流法界愧我生末世不遑奉瓶錫徒瞻尊者影痛生殷重想冥藉慈悲力拔我出愚垢澡沐知見水潤此實相印不待鑿乾土坐飽般若漿無擇聲與色及以牛馬音戲笑與唾罵土石諸荊棘皆語言三昧雲莊聚寶山松下迸玉髓汲引繞階砌流入香積厨轉冷為溫泉雜以諸藥草乘熱貯木盆直作香水壑愍我行腳倦衣弊風塵集拋擲清泠中沒頭兼浸足辟如春波裏殘冰蕩能幾妙觸宣明時根塵不可得伸手摸虗空虗空寧有骨却被什師見吟吟笑不止咄哉呼稚子莫以眼觀眼眼若能自觀終非是己眼眼雖不自觀己眼非不有子能如是解盆即廣長舌出沒舌相端不被舌相礙是謂如來使亦名觀自在若人擬澡沐先當知此偈不知而費水功罪誰復據
