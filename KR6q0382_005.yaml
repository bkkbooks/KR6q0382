body:
  text: 明憨山德清閱法語原夫無事生事薄福所致薄福所從從於般若不明故曰愚癡者招畜生報畜生則去餓鬼不遠餓鬼去地獄不遠此從高而下也若從下而高則由地獄升至餓鬼由餓鬼升至畜生由畜生升至貧賤人由貧賤人升至富貴人由富貴人升至學般若人以此而觀從高而下不過隨順愚癡從下而高不過隨順般若而般若愚癡初非兩物譬如波之與水耳比來清平世界忽搆此大謗大疑大危雖復邪黨橫駕由理而推亦是我曹日常世出世路頭交遊不甚清楚皆坐庸常坑中憂不深慮不遠憂不深慮不遠自甘坐於庸常坑中究竟所以根不重般若之故是以無端招此疑危今既推根究本知其所由若不等一痛切捐頭目腦髓莊嚴般若境緣順逆煆煉般若捨身受身於出世常為佛種前茅於世中常為忠孝前茅如是痛悔如是立志是為正觀若不如是即是邪黨非佛眷屬非忠孝種子又莊嚴般若之中唯刻藏一事最為肯䏿有識無識直下易見者無俟吾言示弟子梁元帝在會稽年始十二便能好學時又患疥手不得拳膝不得屈閉齋張葛幃避蠅獨坐銀甌貯山陰甜酒時復進之以自寬率意自讀史書一日二十卷既未師受或不識一字或不解一語要自重之不知厭倦義陽朱詹世居江陵後出楊都好學家貧無貲累日不㸑乃時吞紙以實腹寒無氊被抱犬而臥犬亦飢虗起行盜食詹呼之不至哀號動隣猶不廢業卒成學士官至鎮南錄事參軍為孝元所禮嗚呼一則帝胄之尊童稚之逸尚能如此況於士庶冀以自達者哉一則貧困到骨猶吞紙實腹竟不廢業今吾曹藉大覺老人之靈寵家山徧十方衣食可終老不以寸陰自惜而飽食橫眠遊談無根以消白日較諸梁元帝朱鎮南猶斥鷃之匹大鵬也且彼世間之學一期報受不啻漚華空影能精勤克勵置形骸於度外寶學問若珠璣必冀成名而後已吾曹變形毀服割情絕俗為求無上菩提一生不克則再生再生不克必至於無盡生克則始已而志不逮梁朱譬如求石女生兒層冰中覓火𦦨安可得哉邇來去古逾遠風俗愈薄出家兒成羣逐隊游州獵縣上則以為山水可以益道心終年貪觀無厭中則持半扇破瓢披一領重衲以為如是則謂之修行矣下則猶有不可勝言者所謂禪之與講不知是何等味又有一種野狐魔子記得一兩端因果便謂我通講矣學得幾句沒把柄話便謂我解禪矣逆而推之法門之弊一至於此者大抵為師者最初一念斷不真實為生死出家為弟子者最初出家一念亦必不真上下既皆不真豈有不真之師而能教真弟子哉豈有不真弟子而能親近真正之師哉用是觀之祖道下衰固其所也若幸童真出家即居名山又得親近諸大耆宿於清涼山朝薰夕炙等閒吒叱鞭朴之閒轉常情為智光移染習為淨習所讀者皆佛祖靈篇若不能外形骸以道自勝積微成著受滴為海徹己躬大事大報佛恩則生一日不如蚤死一日也讀顏氏家訓示修聞天上五衰未足為苦人間八難亦未足為苦至於幸而為人乃受女身是則為苦故諸佛菩薩以女身為鴆毒坑為惡蛇窟鴆毒坑邊不幸失脚慧命立斷惡蛇窟中不幸共宿毒氣入心雖有盧扁亦難救療是以古德有言曰寧為貧賤男子莫作富貴女人何以故女身為天下猜疑之本毀謗之媒故名山道場村墟精舍或安禪講佛子所聚法雷震天慧日光耀諸佛慈念鬼神護持貧賤乞兒往來求食無有阻礙凡諸見者生憐愍心起周濟念如有女人暫入道場一切見者聞者不推其來意如何即皆生疑卜度人既生疑因疑起謗因謗集禍道場以此光輝頓滅法雷以此消聲僧眾以此人不敬仰譬如毒果一枝三蒂滋藉而成由是觀之則貧賤男子勝於富貴女人萬倍無可疑者故女人學道先須審察自己若身若心有何心行今受此身此身何故致人疑謗於此兩者推究明白即知前生心多欲念今受此身此身既因欲念而有欲念如花此身如果若欲無果先斷其花雖然眾生業重習深知而故犯以故鴆毒坑中終難出離惡蛇窟內甘自長眠豈但女人不能翻身奮出堂堂男子猶且視之若登春臺不思厭離若真心學道欲出生死者聞我所言必痛哭流涕莫能自已如聞之若不聞吾知其驢胎馬腹鳩鴿鳥斷一肩荷負有在然雖如此我豈忍坐觀成敗亦不免發一片好心為汝作一種出苦方便諸方便中惟有觀身一著最要緊先觀我身皮肉筋骨因何而有涕唾血脉凡諸濕者因何而有凡諸煖氣因何而有凡諸動轉因何而有於此觀察生路漸熟熟路漸生一旦了知我身堅者感地而有濕者感水而有煖者感火而有動者感風而有一一次第還其所感則所謂鴆毒坑惡蛇窟畢竟安置何處於此透脫不妨以五色糞為廣長舌說法度生有何不可難道男子个个三頭六臂而女人必不若耶某奉讀此言當痛哭流涕精進做去若不爾者學仁代汝求語亦有干係我尋常開示女人絕少因學仁哀求多次書此遺汝轉授行持凡欲出離生死先須知苦苦若不知不免認苦為樂既認苦為樂矣則終莫返一迷永迷出離何期何以故葢不知苦是第一重迷認苦為樂是第二重迷因樂不返是第三重迷故從迷積迷迷終不解然女人之苦較乎男子苦更重大若要次第剖析其苦雖以大地為舌虗空為口亦不能盡是以女人而不先知苦痛拔苦根則枝枝葉葉長到何時而枯且道如何是苦根苦不遠祇汝現前此身便是如直下識破此身則一切不如意事觸將來便不須大排遣自然燒心之火不撲而滅矣二段俱示女人大鑑悟後即曰本來無一物何處惹塵埃牛頭悟後則曰河沙妙德總在心源百千三昧不離當處二大老皆千古宗師也一則如此一則如彼同耶異耶同則兩言若反異則既皆悟心之大老豈不同也哉而黃蘗又曰如兩頭捉汝不著則可以免苦樂形相也如黃蘗所言則兼遮二大老之言而言也以情而觀三老之言似難消會以理通之未始不符契焉夫如來藏性或以空言則一塵不立或以不空言則無法不具或即空有而言則曰空不空如來藏也大都稱謂雖則種種實而言之即人各本來面目也以此面目可空可有可空不空所以受名別耳然此面目凡夫迷之瞥然而成三惑聖人悟之頓然證三如來藏也夫三惑者所謂見思塵沙根本無明是也以見思故則障空如來藏焉以塵沙惑故則障不空如來藏焉以根本無明故則障空不空如來藏焉余友念公其高足名曰性藏或以蘊真字之者葢不知此性有三藏也如以蘊真之義配於三藏可當不空如來藏耳而空如來藏空不空如來藏皆遺之矣余以是知字性藏者不知性者也或曰大鑑亦言本來無一物此豈舉一而遺二耶予應之曰大鑑指一隅而欲人以三隅反也予改以順南字之以含藏識中有覺義及不覺義故如人三觀圓修則見思斷塵沙破而根本無明由是終也故斷破則與藏識覺義冥順不違違則不覺矣不覺所謂違門也順無明而逆覺義故曰違門南則虗明之位也喻心覺也藏子果能遵我言而躬踐之即三如來藏者可坐證也示性藏白刃撼胸則目不顧流矢葢勢有緩急也如榮辱之與生死事非兩人而緩急先後當諦審所宜直下便判則諸俗套不煩洗滌而自除矣示弟子執古以御有心妙以了色者良以心術無常憑之有地故滯有則觸處成乖憑靈則圓照無礙照身則四大所輳照心亦四蘊所成了其所輳身執自消自消之照將之照心四蘊無常無常無主無主無樹一任寒暄本無榮落既觀達此旨逢緣觸境順逆關頭秉志堅精𢬵命赤身捱得過便是功夫功夫漸熟會色即心色既是心心不防心孤明獨立觸有成功開物成務即智運悲不沈枯寂即悲運智不染塵紛如是行持由微而著則五十五位真菩提路非四禪四空可匹也示王仲𡒩顏平原死不忘君生平所養張睢陽生猶罵賊死到不改所以握拳透爪嚙齒空齦固其所也吾曹參禪不透葢無二公志耳如有其志悟道一生可辦示弟子心術無常操之由人是故以道德操心者不知有功利以功利操心者不知有仁義推其所始雖道德功利發軫不同然皆不外自心但志之所存有殊耳道德操心則劫奪毀辱無非階地功利操心則榮名尊寵總是驚媒驚媒汩心神魂常擾況遭劫奪毀辱之際而有所得也故學道之人於境緣不可意處最為大幸於大幸中不生覺照逐境漂流謂之昧心昧心之人雖日與聖賢同席款接何異盲人頭戴杲日計為大夜者哉大都但莫瞞心心自靈聖以靈聖之心處不可意境時如殘雪逢春自然融化豈待轟雷裂地然後消釋乎詩曰他山之石可以攻玉若以玉攻玉成器殊難良以兩俱溫潤砥礪無功故處可意境時心境相忘忘則失照雖有嚴師良友痛加明誨翻滋狎習狎習既成譬猶嬌兒不畏父母心既無畏敬從何生無敬無畏益從何得故曰逆境面前鎗順境腦後箭面前鎗易躲腦後箭難防且世道轉衰師友之風頹然不振久矣所謂嚴師良友者豈易遘哉能以不可意境為師友堦地則何往而非嚴師良友也情識浮沈乃致四大增損能智光獨露虗恬迴遡縱有宿滯無有鼓者焉能作害並示中甫病中男子家頸腰有鐵非道義所鑄豈易屈伸既屈其身心光不剖如雲覆月幽蔽精神於是非曲直之閒好惡升沉之地弗能挺然獨立知而甘昧一息不來杳成千古滯魄悠悠出期希有可不哀哉何不踢翻窩臼頓斷情根若利若害若逆若順惟心光炳露等視浮雲一朝願克笑傲家山顧不樂乎示賀知忍聖凡無窮依正無盡升沈萬變情與無情卒不可以智識知算數了然皆以名言為體也夫何故葢有名必有義有言必有意所以聞水火之名則濕之與煖不待召而至矣聞毀譽之言則喜之與怒亦不待召而至矣知兩者之如此則凡凡聖聖正正依依實外名言而不可得也噫名言不知果何物哉而依正聖凡皆以之為體故居其室出一言善則千里應之出一言不善亦千里應之由是而觀凡立名立言苟不端正其原見理之澈莫若不立無遺禍也故曰名言也者迷悟之紹介也可不慎乎或者以趙州無字為話頭歷年既久自以為生死順逆念即話頭話頭即念無往而非一片或者又聞而舍然大笑曰彼若果能話頭一念打成一片面目自然殊乎常人眉宇閒光霽若清風朗月使牛馬雞犬觸而悅之況人乃萬物之靈者乎此等語當與愚者道不可與智者言大抵參禪之訣心地果然順逆成片則悟在旦夕之閒矣今人看古人機緣猶泥人摸象手無知覺安知象之肥瘦哉嗚呼此等人以名聞供養為膏肓之疾以生死大事付之馬足閒者也楞嚴經曰大妄語成墮無閒地獄非此謂乎示弟子凡人子報親之德生供三牲死獻萬肉不過特重其黑業耳柰世俗冥盲卒難諭之正理且順其俗習快其眼前聖賢知其習不易化權與之浮沈陰以理折其情密為調攝功久力充則習自化彼受調者亦忘其所以然矣故禮五易而同俗人之慶不賀喪不弔此聖人之苦腸也雖然苟不以無上慈光燭其幽爽則滯者終付之於無拔矣又豈人子人臣之本心哉夫欲燭其幽爽莫若為人子者淨自三業為亡者持毗舍浮佛偈最為簡益示弟子夫禮者身之也而不端其餘雖多惡足道哉自大覺應世迦葉而降雖宗教支分而禮則一耳大人俱沒典刑廢弛凡後塵之徒莫識大體不以端榦資本惟競浮華所謂榦者摧折盡矣汝等念報佛恩束力於茲凡見晚進未識大體者切慈勤獎勸之使其榦端則本華根固則本壯毋愛人以姑息宜愛人以大德是以遠別近聚晨昏相見務要行列弗苟長幼有倫先後據禮勿得恣情老漢浪跡江湖足音半寰中矣在在頗多感觸故草是語出家者既然在家者寧獨略是乎哉密藏侍吾至勤但觸名分紀綱猶多汗漫況其他耶仲尼曰必也正名乎葢名不正則分不定分不定則禮不可立人而忽禮尚弗敢況為佛弟子而不端此則剃染奚為示黑白諸弟子元石問曰陸老先生當今大居士也精勤大道已非朝夕今以年老抱疾而曰念佛持呪并參祖師機緣俱不得力則一生辛勤幾於虗費其所以不得者何故弟子於此深懷疑悶乞師開示以為將來修習佛乘之鑑子發此問不惟直陳自疑亦開獎黑白深矣夫禍福莫烈於死生真偽難逃於所忽此老金湯法門有年數矣凡觸利害關頭不以世情生顧忌惟知護念大法苟非內有定見重以多生願力冥顯相資孰能臻此哉且好名之心賢者不能卒忘今抱疾頹然而臥卒然而問忽然而答譬如晴空霹𮦷旱地雷鳴可與智者道難與眾人言子當默而痛思必自知此老用處子不聞青山白雲漱石枕流二三十年抱寂枯坐設偷心未空皆為大障我如是而問彼如是而答有偷心耶無偷心耶有則決不能如是而答無則實念佛持呪參禪三者俱未得力願子再深思之或恐自見答吳元石身有大身有小身心亦爾以大身為身者則能挈天地整萬物以小身為身者能則周旋一家不能則一身尚不遑理況功名事業哉然則大身吾固有之或者迷而莫覺小身乃四大之假合假合則非本有既非本有翻堅然執之而不化是以見有可欲即大心昧矣大身失矣夫大心者智周萬物而不勞妙洞象先而非始葢有始則有生有生則有滅惟無始則無生無生則無滅光貫十虗靈達三際處方寸而包空彌太虗而入芥故曰談禪而言空者乃談者之陋也雖然較以五尺為軀方寸為心認一漚而背全潮高培塿而忘泰岱者則勝多矣余生余生痛惜時陰即夜繼晝勒勤補鈍緣文字之堦級究佛祖之心髓理精慧開以特厚為炭扇以慚愧之風信火熾然勇而能恒則鑄小心為大心化小身為大身譬如投片雪於紅罏擲殘冰於春海復何難哉示余生佛法雖大大於眾生之心若離眾生之心則大無本由是觀之則大乃眾生自大耳故發大人心者為大人不發大人心者便落小人中矣今汝發此大心惟貴恒之故曰立心不恒凶恒則吉不可量示元信中國微言不越乎六經西來大法寧出乎三藏至於莊老之書亦不可不讀者此古人博達君子之所務也是以白首窮經然燈精法代不闕人雖求之於紙墨十年之功不若求之於心性一朝可敵也王安石謁周茂叔一謁不見再謁亦不見安石怒曰我自求之六經亦可得之何必卑卑求人乎自是讀書徹旦少睡即嚼石蓮以破昏及其學問大成至於入參大政自謂孔孟不足多致君堯舜不足難慨然以經世自負一切賢才程能獻䇿皆不合意唯恣執拗俱逐之究其初心志非不大學非不博心非不遠卒於壞宋元氣而自招不美之名大都學問雖淵博於心法不曾妙悟一番譬如學大匠者規矩方圓曲直非不了了而疾徐之節未應手故不免傷手之患耳規矩方圓法也疾徐之妙心也執法而不妙悟自心能成大器未之有也無論若儒若道若釋先妙悟自心而博達羣書謂之推門落臼自然之妙用之出世則謂之最上乘以之經世則謂之王道此真學真才也再次由博而約博則學耳約即心也此又其次也至於讀書雖多臨機無用如葉公畫龍望之非不頭角宛然遇亢旱欲其雷雨無有是處故先約而後博禪門諸祖十中七八先博而後約自古及今一切座主十中一二耳佛者既然儒老之徒大抵亦皆如此於約言之此心愛人即仁施仁得宜即義於義合節即禮於禮通變無滯即智於智誠恪克敏即信以此觀之五者妙用本在吾心而不在於書也且道一心不生僧耶老耶儒耶於此直下廓然無疑在儒謂之真儒在老謂之真道在佛謂之真僧不然則皆聖人出而大盜生贓物現在據欵結案罪難免誅誰敢拍大嬭誑嚇小兒故學問量人根器斤斧隨機十人十成反是成希矣汝自今而後當先熟永嘉集勿讀註次則讀肇論再次則讀圓覺已上既熟當熟四書白文及老子道德經則六經三藏若博若約工夫成熟自知好惡矣或曰王安石乃宋之大儒韓生乃刀筆庸吏以此教之未必能克始克終我未敢保余則應之曰我聞師子捉香象全力捉兔亦爾或曰先曰量根器以教人則成者多不成者少以前語照之無乃自背乎余曰背不背量不量亦自有妙處非子所知勉韓生大凡男子家出世一番斷不可與草木同腐與畜生同養必須垂芳千古光照大夜若因循度日無所長進豈惟草木畜生已乎大不如遠矣草木可以充薪㸑畜生可以供庖膳由是觀之人為萬物之靈飽食煖衣垂死而無所成就則不如草木畜生明矣汝初見我於燕山無梁寺今日又遇於茲則汝善根靈種殊不淺也然汝父母愛之太過汝又賦性精悍且多聰明若克明心法薰炙聖學則後之望汝作大法城塹或未可知自今而後變習氣須從憎愛關頭𢬵命做去惡其人必須知其美愛其人必須知其過此三個須字能負荷擔得長久世出世事畢矣永嘉集天下奇書文簡旨豐熟此則大學中庸骨髓無勞敲打自然得矣世人以為教迹不同妄生分別見小而不大識近而不遠執粗不詣精所以心法微耳此書既熟當熟七經白文一切對句自今亦不必屑屑待諸書貫通之後方始聚精會神一兩三月天機所動自然水到渠成如此發軫必出人頭地反是逗落俗格挽之卒難可畏可畏茲焚香燒燭於大聖人之前以此囑汝汝須珍重囑傅爾庚香滿金罏花滿瓶此一句具無邊三昧故陸亘大夫取正於南泉曰肇論甚奇天地同根物我一體南泉對曰庭前一枝花人雖見如夢相似大夫罔措天花道人偈曰香滿金罏花滿瓶余乃順水推舟亦曰此一句子具無邊三昧妙喜有言若是真將軍何須武庫中取刀殺人赤手空拳可以却敵余今即此一瓶花一罏香布一個漫天大陣以虗空為鼓以妙高為枹撾而進之管取是聖是凡剎那敗績故曰權衡在手生殺自由噫道遠乎哉觸事而真聖遠乎哉體之即神既曰觸事而真無相者虗空有相者天地大塊之閒殊形異狀有情無情若愛若憎世出世法道雖不同總謂之事所謂真者在七經百氏之書未始不具至於般若靈篇華嚴上典相為表裏古人有言禮樂前驅真道後啟即此言之會萬物歸己者書無內外理無精粗都來一片心光曾無別物此片心光在大學即謂之明德在中庸即謂之天命在論語謂之仁謂之孝謂之政種種名目標榜不同而仲尼所答弟子所問問者器有方圓答者水本無常水若有常安能順器方圓聖人有心安能應事種種恰好大道無情運行日月雲雨無情普滋萬物此心孟子用之祖述周孔集義成浩此氣在春秋則折衷是非在周易為太極為八卦在書為允執其中在禮經條貫品節皎如日星在詩情動於中天機觸發歌咏不足則舞蹈之此心在樂為韶為濩昔孔子在齊見牧牛童子視端而目正喟然嘆曰此必聽韶樂而出者也丘驅之晚矣且道韶之妙何如乃令牧牛童子聲入耳根神凝方寸天花道人當下知此則四海雲濤千山松韻未嘗非韶樂也此樂在法華謂之實相在華嚴謂之四法界在楞嚴謂之大定在圓覺謂之大光明藏在般若謂之文字謂之觀照亦謂之實相在悟謂之禪在制謂之律在辯謂之論天魔不能沮風火不能壞貫萬古而長存故曰經或曰汝這老漢舌頭雌黃不准將佛法世法攪做一團使後人標無所宗派無所辨不亦過乎余應之曰若人識得心大地無寸土有土有人有人有法有法有內外有聖有凡有世出世一寸土不可得則一切何存說甚攪做一團不一團自是癡人不了自心情見不破妄生分別在儒被儒縛在老被老殺在佛被佛累譬如穿一身紬絹從荊棘林過相似拈得這刺那刺又入拈得那刺這刺又入刺刺牽制竟不能掉臂而行你這尿牀鬼子自家絆倒在荊棘中𭺗不起來反來攀條引例要我同受此苦我非呆子肯聽你言作顛倒去古人有云依文解義三世佛冤離經一字即是魔說是以佛祖真子乘願而來可儒可佛至於種種異道隨類利生如水銀墮地顆顆成圓興穆興穆汝若悟此便曉得香滿金罏花滿瓶此一句具百千三昧也若未悟得不免波外求水離色求空空之與色本無二致情生智隔橫計不同如水與波豈兩物哉以風激之名為波少頃風息名為水風喻妄情波喻妄色水喻妄空既皆曰妄何必生疑且此水天人湛為琉璃魚龍認為窟宅餓鬼怖為猛火人閒世謂之波流若謂一物四執不同若謂四相一尚不有安得有四空即是色空不可得色即是空色不可得空色不得誰辨空色有所有能所忘能息若有辨者所忘能立所忘能立虗空可以有骨兔角可以為杖龜毛可以繫風余共天花道人昆季等慧炬光中饒舌至此噫聊城月即燕山月光照天池色不同再聽香花童子偈塵勞即是法王宮示興穆離一念之前者則剎那不可得離剎那則十世古今不可得是以微塵頓剖大經現前大經也者豈惟釋迦如來之根本法輪亦是過未諸佛根本法輪此輪吉水曾乾亨不知何處持來施與廬岳黃龍寺心悟禪人悟復施與潯陽邢楙學達觀道人聞而異之遂命悟即持此輪現與楙學且囑之曰此輪若不有方山長者轉運發揮則大經微塵豈易剖哉嗚呼華梵緇素自漢明迄蕭梁隋唐之世特羣類登覺苑而稱雄者代不乏人惟是根本法輪以無師智自然智根本智差別智四智縱橫首尾鈎鎖即近示遠即大示微果樣高懸普使初心曉達取法啟圓因期圓果而因果不能籠是以大心凡夫一蹴龍門頓入智海手把猪頭戒珠光淨違順莫測魔外聞之而心驚二乘觸之而習化舍我長者其孰能之今長者棲神之地造輪之龕荊棘叢生狐干喧擾安得如宋丞相商英張公者乘順輪為我光復之則某心死矣三敬無忘斯囑囑邢楙學能所兩義出苦要門入苦嶮路皆此也以能所角物我恣情識則為阿鼻前茅以能所宛轉觀身身為所觀心為能觀所觀者若無能觀為之主宰惟血肉匡殻耳烏有所謂知覺哉既無知覺於我何有咄以智治國國之賊示弟子汝生前以耳見我相貌即今汝以眼聽我說法聲音此汝多生善根所致遭此清勝因緣汝若當下會得我一句兩句豈惟覓女身相不可得保汝神超淨土不難若會不得此段風光汝當用心諦聽女身過患之苦天上人閒五衰之苦地獄之苦飢寒凍餓之苦求不得苦脫不得苦苦雖無量不能盡說要而言之諸苦之中女身最苦未知人事時雖苦未深重纔知人事時折旋俯仰進退屈伸一動一止忌諱千端回互萬種高不得下不得輕不得重不得舉步少高坐處少低言語聲重莫非都是回互自家一段本來真實光明都被這些忌諱蒙蔽了我如此開示汝只要你舉一而知十因有言得無言之意汝若果知苦意即曉得千條毒蛇纏身不甚為苦無如被這肉塊子假模樣籠羈係無片刻露光明處汝曉得我開示汝意頭必然悲徹心魂發大誓願汝若再受女身寧受碎尸分骨之刑斷不再受此女身何以故碎身分骨之苦不過一兩箇時辰挨過了便罷此肉塊子帶累牽纏積情縛愛從無始劫來牽制於今猶不痛醒假如現前子死身喪這一條情根綿綿愈固千劫萬劫只是割不斷這割不斷處苦根深厚稍無福力不知又落在那一類中醉無明酒遊恩愛園眠臥火坑鐵牀豈有了日我此等語無半箇字是假的若半箇字假我舌根當破諸佛菩薩亦是說謊的了你仔細思量諸佛菩薩肯說謊麼我為甚以舌根自誓恐汝信不及汝若信得及咄五漏身中荊棘種彈指蓮開極樂池雖然如是去路尚遙看汝丈夫徐琰分上贈汝一千般若金銀定使汝頭出頭沒無有乏少之苦示亡靈白氏夫禍福莫烈於死生而世不患之葢以飲食男女之欲醉之耳如稍省之雖至愚亦患之況智者乎雖然有其病必有治病之方方得而能力治之則患不難也敢問其方紫栢道人舍然笑而應之曰假借四大以為身四句偈此古佛之遺方也若能誦千萬徧則死生之根不待而自斷矣示張才茂未生已生是異是同異則未生已生定不相即同則未生已生初非兩事如何有常無常會而難通果定不相即則未生離已生而得名已生亦離未生而有號同而究之異而推之常無常義終無歸宿謂之有名無實豈有真勝義諦有名而無實乎問懷慈常無常義簡則近無易則在平心無事而神棲於平雖萬怪叢輳千險迭至直以空平應之超然有餘矣忽細故掛心神泊感慨即鴻毛飛前橫以為大鵬垂天耳又烏足應他事哉故曰能平險阻能知險阻有以乎示元信黃帝有二十五子或有姓而無名或有名而無姓或無名姓以山川封地而姓名之皆以奇功茂勳而定氏族即我釋迦牟尼如來降生中天竺國敝屣萬乘而苦行六年得無上覺道自是世有佛焉及說法度生世有法焉迨憍陳如等剃染之後世有僧焉然僧之種族有剎帝利種有婆羅門種有首陀種有旃陀羅種惟我世尊本剎帝利種姓釋迦嗣佛而後無貴賤凡剃染出家者皆以釋為姓如四河入海同名為海耳至梁大通年閒達磨航海東來為震旦鼻祖既而宗出五派派各其源有號臨濟宗者曹洞宗者溈仰宗者雲門宗者法眼宗者若智慧清淨道德圓明真如性海寂照普通總十六字天下謂之臨濟宗派予慮十六字歷世易窮從真字左駢岔十五字曰真法元在解契恒靈大吼雷音慈門師子右駢岔十九字曰真三聖秀昌原遠茂勝光日月昭萬古嘉福佛運長自今而後既橫抽兩枝凡我弟子應宗嗣之不遵者不孝法脈宗脈說示弟子根塵識三者全謂之人或謂之餘於是三者能洞然窺破則當處不見有全人矣凡一切榮辱死生皆刃也欲使刃之不傷莫若不見全牛為嚆矢耳葢刃不傷牛亦不傷牛若不傷而牛本不全則刃之游亦寓言也嗟乎以神為刃游於象先太虗不到之地亦可以宰制矣況有形者哉示元復牽近縛滯近塞縛則纏綿難解塞則壅遏不通是皆無生之理不明緣生境界成熟也殊不知無生緣生初無兩條在眾人則謂之緣生在聖人則謂之無生緣生則身心鏗然無生則性天廓徹即此而觀外身心而窮性天管取終古不旦故曰牽滯不難破難在於窮理理窮則無往而非高明矣高明則自然事到即了仲尼曰顏氏之子有不善未嘗不知知之未嘗復行此無他良以清明在躬志氣如神觸處無昧耳大都牽滯習重病欠明勇明則觀照精密勇則不墮現行鑄情而復性子其勉之再示元復大凡學道人一切都不障礙只是柰何自家身心不下却難果然真正男子直下究竟此箇身心是我的身心如何却柰何他不下畢竟要見障礙在何處這些子實能得破十方諸佛底鼻孔即是民部底鼻孔儻卒未能薦得聽貧道醉夢中說一上葛藤與民部聽去此身此心若要將就柰何他當觀何由而有此身何由而有此心葢此身不過四大假合此心不過四蘊湊成地水火風謂之四大受想行識謂之四蘊即就民部皮肉筋骨種種窒礙的便是地大痰唾血脈津液便利便是水大徧體煖熱之氣便是火大動轉助民部趨走運用者便是風大或謂舉動運轉皆是心力與風大何與殊不知中風的人要舉手舉不得要移足移不得難道他豈無心力如何手足宛然竟不依他使喚葢闕風緣故也此四件合則有身不合則此身何在民部於此切須諦觀我身之四大與外之四大是同是別外四大者脚下踐履的謂之地大眼前九江流的水便是水大日常竈裏燒的燈上點的及一切日色暖氣便是火大長江送客帆飽如飛林木動搖浮萍聚散便是風大此與民部別則民部此身又從何來葢我之四大必感外四大而成此四大開而言之謂之五行合而言之謂之四大自古至今並無一人不感五行而生者豈民部獨離四大而有此身耶此與民部同則內四大即是外四大若即是外四大者豈有有智之人認踐履之土九江之水竈中之火樹頭之風為自己身耶雖至愚之人愚不到此況民部高明者乎於此粗粗會得身相即輕身相既輕便把死生窠窟子踢翻了也死生尚不能動其餘榮辱愛憎又安能動得此是學道人世諦中討便宜的方子果然依得何累可干惟四蘊道理較之四大推察審究抑亦微矣民部於此遇境逢緣時憎愛念起諦觀此念從何所起若從我起未逢緣時如何不起若從境有無我亦不能起兩端合而能起者先推於我起不可得於境起不可得豈有兩不可得合而能起耶這裏民部瞥然省得雖不謂之了當生死海中救得一半四蘊者何領衲前境謂之受前境者何前所謂逢緣遇境時此境便是前境此受離前境亦無所得受既不有想又何來想既不有行亦何來行既不有識又何來葢是因受所以有想籌量卜度謂之想想善惡未定忽遷於善忽遷於惡往返不定未能決了謂之行行遷流也忽爾判然決了是善是惡毫無所疑謂之識雖四者用處不同究其所由必因受有想因想有行因行有識此非強配乃自然之勢自然之理也貧道上來胡言亂語不過教家糟粕未是衲僧活計即如古德問僧即心是佛乃是頭上安頭離心是佛乃是斬頭覓活民部於此討得个分曉不要取信於人自家直下透得自然無纖毫疑的影子此是衲僧的活計猶不是衲僧的巴鼻且道如何是衲僧的巴鼻五老峯前雲去來等閒觸著民部鼻示于民部法名之重重於大寶大寶不過一期之極貴法名則由名得義由義會理由理行道無阻矣以無阻之梯便能直登道岸得登道岸始謂之德故德者得也嗚呼道德無古今而包古今所以得之者雖匹夫非窮也不幸而失之即王天下非通也況官乃中人之籧廬乎又法名法親與俗名俗親斷不可同日語者以俗名俗親形壽盡更生別姓豈可以今世之名姓拘之耶故得宿命通者長劫一刻也而一刻之中罪福形影昭然在目若弗更生耳三定毋自棄勉之示三定鐵鉢雖堅彈之則鍠然有聲清亮幽遠達耳心空萬歷癸未與汝雲閒南禪寺相別去歲於清涼山坂忽得汝書開而讀之知汝於此箇門頭得一隙之明矣我甚喜歡南禪親近我者頗亦不少而寥寥五七年閒無一人寄音言此觀旨戊子孟夏汝又無心同堅默大變之際請益聊城傅居士紺圃齋中逆而思之今昔光景如懸寸鏡影像了然且四月朔日復汝落草之辰參陪諸上善人香燈光中同音異口勤禮水懺洗滌前生之垢浣潔此世之塵轉罪為福轉愚為慧大是好事亦當自知慚愧無負己靈努力精進必以悟為期了達自心作箇末法中李龍眠以筆頭三昧發揮自心光明莊嚴三寶報佛深恩大抵根無利鈍發心真而精進猛即得道快當如發心不真力行不猛雖天資高邁聞見博極亦徒增知見培植我相根耳反不若老實頭人多矣汝奔走四方孤縱萬里弔影旅邸不過以父母在堂妻屬在下衣食之費大不可緩者將一片精神不辭飄泊博些供給以充甘旨亦是為人子大關頭處切勿嬾惰負青春辜白日使父母生憂妻屬擔慮此點念頭便是自心慈悲三昧如來放光照世也此光不昧雖出魔入佛皆汝道場行履處亦當衣食供養父母豐潔為盡心又當勸父母生大信心於佛法中立決定信以娑婆為毒瘴之鄉極樂為安樂之窩盻時盻日惟望一旦生彼國土親近彌陀奉侍九品菩薩汝能如此供養父母雖曾參之孝不可異同言也汝不見堅默一歲之閒兩子繼歿妻室續亡遑遑道途持四喪南歸即聊城傅氏愛女亦繼堅默乃正而亡金沙文卿皆我法門骨肉俱遭此傷心不如意事以俗情言之固可痛恨以法眼觀之安知諸亡者非菩薩示此無常光景使汝曹生恐怖心悟世非堅或未可測此段因緣汝還家日近當白於父母使其亦生恐怖於西方生決定信心何異戰陣而撾鼓鼓所以壯兵氣旗所以一眾目即如無常為旗鼓一眾生信心一般上根之人見幾而作不俟終日聞聲便悟見色即明亦是拍盲榜樣豈待搖脣鼓舌說文字禪乃開悟哉峩眉山行期迫矣想盤桓不甚久也我初彈鐵鉢作聲時即壯行色法炮耳汝輩聲達耳根竟不省悟則眉山歸日長進不長進未可定如聞如聞當自克責勿逐流俗珍重示皆聞吾以興嚴命汝其意甚遠不可忽而不深思之嚴之義極廣聊舉二三示汝嚴心以悟嚴身以德嚴身心以問學三者苟不廢我言凡百所當嚴者得其綱矣我書此戒汝推汝父教爾庚而來汝今雖則年少未知所以至於長大終必知也噫種樹方高寸年多成茂陰示興嚴眾生橫計封蔽本心是故於全體作用中疑而不能用也余以一指屈而問如聞曰見麼曰見此外見麼曰不知余喟然歎嗟久而示之曰我此指一屈一切聖凡一切依正無有一法可伸者豈惟此屈如是法法皆然如一念生則盡虗空界俱生無有芥子許空隙可容滅者滅亦如是故維摩謂彌勒曰一切眾生皆如又文殊對維摩曰居士我不來相而來若初有來今則不能見居士矣由是言之則不來非來來非不來明矣惟諦了自心者情見漸破於此法門通得一法而法法皆了矣示如聞從古至今大都學道不成者往往柰何自家身心不下是故生死愛憎交加紛擾靈臺渾濁片餉不得清寧總不如生死何招愛憎何成雖復奔波湖海尋真覓訣為治身心或從眼中看得來的耳中聞得來的攢頭相授依憑扭揑又有靜中得少光景即為究竟長年終日弄鬼眼睛鼓粥飯氣自家身心毫釐竟治不得設臨顛沛流離之際逆順是非之場依舊生死浩然憎愛滿腔紛飛搖蕩方寸中如著芒刺相似此葢不知自身自心來源既不知身心來源即此身心障礙不淺如是不唧溜做去豈惟大道終難悟徹了當日用中敢保從生至死未夢見安閒在何則不知身源則見有身見有身故則受身累不知心源則見有心見有心故則受心勞肇祖云勞勤莫先於有智大患莫若於有身豈欺我哉且道身心來源處現前此個軀殻子不過四大合現前分別了了此點妄心不過四蘊攢就眾生顛倒妄以此身為身此心為心塵沙劫波淪墜不已改頭換面如火傅薪蔓延無歇大丈夫真心學道何不猛著精彩拍胸自判發一片決定心志直下以四大推身四蘊推心逢緣觸境從朝至暮綿然無閒歡喜也如是推煩惱也如是推推來推去工夫純熟一旦身心廓落蕩然虗明到此境界畢竟喚甚麼作身心喚甚麼作生死愛憎德修果然擔荷得真做得不惟成佛有分學仙有路管取參禪門中亦推爾不出德修聞此語不免疑他成佛成仙到參禪門中皆是末事殊不知禪門向上巴鼻諸佛猶未夢見在且道如何是向上巴鼻十方諸佛在何處盡在驢胎馬腹中示胡德修一切眾生見身可得是謂愚癡認知覺為心是謂愚癡且道愚癡現前般若在什麼處仰勞大眾助稱摩訶般若波羅蜜多繞靈三匝且道般若現前愚癡又在什麼處少江若於此聲中了得過去心不可得現在未來心不可得咦門前流水長無盡無限魚龍唱鷓鴣弔沈少江居士孔子沒發揮孔子者孟子一人而已夫何故葢孟子得孔子之心也孔子之心當如何求求諸孟子而已欲求孟子之心者求諸己而已自心既得孔孟之心得矣自心如何求當於日用中求也日用閒人欲雖眾不出逆順昏昧放逸而已何謂逆凡不可意處皆謂之逆順則反是何謂昏昧觸道義事聞道義言不聳然奮為因循廢棄皆謂之昏昧何謂放逸讀聖賢書全不體認做去見善人君子略不收斂情馳欲境神思飛揚不生自返之心皆謂之放逸汝等於此四種關頭挺然精進做去即經綸宇宙整頓蒼生收功當世垂芳千古尚且不難況目前一第哉然求此放心貴在知心起處起於道義竭力充之起於不道義竭力制之制之之要又在先悟自心自心不悟雖強制之終難拔根根既不拔工夫稍懈則人欲之芽勃然難遏矣必於穿衣喫飯處飲食男女處迎賓待客處屙屎放尿處百凡所為務審此心為生於我耶生於物耶若生於我生於身中耶生於身外耶生於身中如何不見五藏生於身外則與自己了無交涉如他人喫飯我必不飽也若生於物無我應之心本自無若無我應而物能生心則擊鍾磬於木偶人傍胡不見其生心耶心雖變幻不測出入無時然不出物我之閒若離物我求心即如潑波覓水也若即物我是心又成認賊為子也離不是心即不是心畢竟如何是心於此參之真積力久一旦豁然而悟則孟子求放心效驗不待求於孟子矣求放心說示弟子
