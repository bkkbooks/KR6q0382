body:
  text: 明憨山德清閱解經心經說般若波羅蜜多此言智慧到彼岸非愚痴者所能到般若有三種如實相觀照文字是也實相般若即人人本有的心觀照般若即心上光明能悟達則心光發朗凡吐一言一句長篇短什足為萬古燈明用除痴暗故稱文字般若心此經大部之綱骨如人一身雖有五臟百骸惟心為主經訓常又訓路常則天魔外道不能沮壞路則凡聖皆所共由觀自在菩薩行深般若波羅蜜多時照見五蘊皆空度一切苦厄觀自在即觀世音之別名此菩薩既悟自心以觀照之光深破昏毒不同二乘偏淺故曰行深夫昏毒即五蘊為萬苦根株千殃之本眾生未能空此故縈纏苦厄如蠶作繭於百沸湯中頭出頭沒絲無斷日菩薩既斷蘊絲故得空色兩融智悲並運若事若理譬庖丁解牛無物迎刃故稱自在舍利子色不異空空不異色色即是空空即是色受想行識亦復如是舍利子鶖子佛之弟子也其慧辨超卓識越等倫然未悟大乘真空尚醉枯寂故如來呼其名而告之曰我所謂照見五蘊空者非是離蘊之空即蘊之空也汝莫錯了五蘊色受想行識是也色則遠而言之太虗天地山河草木無分巨細凡可見者皆謂之色近而言之現前塊然血肉之軀是也受謂無始以來從生至死眼見耳聞鼻臭舌嘗身觸意緣皆吸前塵而生者想謂受而籌量善惡臧否寵辱是非行謂籌量無常遷流不決識謂籌量曉了判然無惑此五者合而言之實惟一念分而言之乃五用差別也舍利子是諸法空相不生不滅不垢不淨不增不減是故空中無色無受想行識無眼耳鼻舌身意無色聲香味觸法無眼界乃至無意識界無無明亦無無明盡乃至無老死亦無老死盡無苦集滅道無智亦無得如來慮鶖子及一切眾生餘疑未盡復揭而示之曰五蘊既空心光獨露浮雲淨盡滿月當天則生滅垢淨增減皆紅爐點雪矣故悟真空之後豈但五蘊元空即十二處十八界及十二因緣苦集滅道亦龜毛兔角也雖然冰不自融春回乃泮霜不自釋日出乃消五蘊乃至十八界十二因緣等法冰也霜也觀照般若如春如日冰霜既化所謂春之與日何啻已陳芻狗故曰無智亦無得以無所得故菩提薩埵依般若波羅蜜多故心無罣礙無罣礙故無有恐怖遠離顛倒夢想究竟涅槃三世諸佛依般若波羅蜜多故得阿耨多羅三藐三菩提嗟乎此段無得之光不特菩薩依之而無礙諸佛亦依而得菩提佛與菩薩光非有二而優劣迢然者何哉究光之始實無優劣以光極強照照極生迷故覺迷迷滅靈覺極圓者名之為佛光雖圓悟迷習漸除覺路尚遙名為菩薩以本光言之非惟眾生妄想即成佛亦妄想耳然未成佛者若無妄想悟入無門故曰一切眾生由妄想而墮生死亦由妄想而出生死由妄想而墮生死者凡夫也凡夫不悟此身眾苦根株此心攀緣賊媒放之不放游戲於六根六塵如蒼蠅為唾所粘濡滯腥沫至死不悟由妄想而出生死者或逢知識明誨或讀佛祖聖賢經書始悟蠅為唾粘之咎翻然悱憤乃慕鵬舉青冥若然則妄想之心得非扶搖之風哉故未證悟者此片妄想斷不可不堅不固有等愚痴凡夫錯解佛祖聖賢之旨見說無我無人無眾生無壽者毋意毋必毋固毋我及本來無一物天理上著不得人欲等語遂牢記胸中逢人高談危論以為已悟如是之人誠可哀憫且汝現前日用之閒七情六欲三毒無明如蛇如蝎誰敢觸著不幸而有觸之者未有不遭螫囓既自家毒氣曾未消得纖毫說甚大話汝欲消此毒氣須服清涼之藥始得清涼藥非龍肝鳳髓非善見空青即是上來所謂此片妄想不可不堅不固者是也果能此志堅固則七情六欲三毒無明漸化為般若光明矣觀想雖多以要言之一曰空想二曰假想三曰中想空想若成則內之身心外之世界若漆桶底脫直下玲瓏老氏所謂大患者永免矣假想若成皎月浮空長天一碧蹄涔江海散影分輝中想若成陶空鑄有如臂屈伸宛轉隨心不乖全體空想治見思之毒假想治塵沙無明之毒中想治根本無明之毒噫此三毒者乃天下之大毒也除佛之外誰不遭其毒害皮毒毒般若肉毒毒解脫骨毒毒法身是以天竺醫王制大神方以空想之藥治皮毒以假想之藥治肉毒以中想之藥治骨毒然想藥雖三而不越乎一念故達一念空者即成般若德念雖空洞不廢羣有即成解脫德有無相即空色相離不即不離一念相應即成法身德要到無罣閡地位無恐怖境界直須三惑都除若纖毫不盡縱菩薩猶沉覺礙況凡夫哉故曰餘塵尚諸學明極即如來又曰因明有見暗成無見不明自發則諸暗相永不能昏所謂因明有見者匪獨三光之明因空因假因中皆因明耳若不因明孤光自發凡聖情消又說甚麼三觀一心一心三觀即所謂文字般若觀照般若實相般若亦不勝贅焉然未到徹頭徹腦處此智慧光明寸步舍離不得若背明而行管取斷常坑中墮落有分在故知般若波羅蜜多是大神呪是大明呪是無上呪是無等等呪能除一切苦真實不虗故說般若波羅蜜多呪即說呪曰揭諦揭諦波羅揭諦波羅僧揭諦菩提薩婆訶大哉心光智不可知識不可識陰陽不能籠有無不能形容破障除昏凡聖無與等者謂之大神呪大明呪無上呪無等等呪不亦宜乎而般若有顯密自觀自在菩薩至於得阿耨多羅三藐三菩提謂之顯說般若自故知般若波羅蜜多乃至菩提薩婆訶謂之密談般若又呪者加蜾蠃之祝螟蛉念茲在茲似我之聲綿綿不斷則諸蟲受薰莫知然而化為蜾蠃矣諸佛如來以慈悲顯密薰一切眾生故一切眾生莫知然而化之嗚呼佛恩廣大誰知報者而正法垂秋祖道寥落顧鈍根小子道悳虗薄無以感人甘向秦庭號呼徹歲賦無衣而救楚者誰哉心經般若波羅蜜多心經夫智慧愚癡初非兩種彼岸此岸本是同源以其見有身心即名愚癡住此岸以其不見有身心即名智慧到彼岸也經則萬古不變之稱心則八部最先之主不變則凡聖可以共由最先則誰能舍此而求無上菩提哉觀自在菩薩行深般若波羅蜜多時照見五蘊皆空度一切苦厄眾生未始非菩薩但不達人法皆空被苦厄所陷故名眾生若了達無礙孰非菩薩舍利子色不異空空不異色色即是空空即是色受想行識亦復如是至此特呼名而告之者謂上菩薩所證之空非小乘偏空亦非頑空亦非斷空直即色之空耳色既可以即空則空亦可以即色故曰色不異空空不異色五蘊之中色蘊其一色空既可以相即餘蘊例然故曰受想行識亦復如是舍利子是諸法空相不生不滅不垢不淨不增不減是故空中無色無受想行識無眼耳鼻舌身意無色聲香味觸法無眼界乃至無意識界無無明亦無無明盡乃至無老死亦無老死盡無苦集滅道無智亦無得以無所得故至此再呼名而告之者佛慮其偏小習重卒難遊大乘二空法海故明揭顯露以啟迪之諸法空相譬如質礙之冰既已融化成水在方器則隨而方之在圓器則隨而圓之觸風可以為濤聲映地可以為天色在江湖可以浮萬斛在大旱可以為雲霓無往而莫不自在矣又方圓之器喻前境前境自有生滅垢淨增減如水成冰無非質礙學者知此則十二處十八界十二支及四諦皆瞭如也雖然境不能自空必假照以空之境空智在病去藥存終非本體藥亦洗之方盡染污故曰無智亦無得菩提薩埵依般若波羅蜜多故心無礙無礙故無有恐怖遠離顛倒夢想究竟涅槃三世諸佛依般若波羅蜜多故得阿耨多羅三藐三菩提故知般若波羅蜜多是大神呪是大明呪是無上呪是無等等呪能除一切苦真實不虗故說般若波羅蜜多呪即說呪曰揭諦揭諦波羅揭諦波羅僧揭諦菩提薩婆訶嗚呼甚矣偏小習重之難化也如此故如來種種告之令其深信意者此般若波羅蜜多不惟觀自在菩薩依之心無罣礙而得涅槃即三世諸佛亦因之而得無上菩提尚恐其驚疑未徹再敕之曰此般若波羅蜜多是大神呪是大明呪是無上呪是無等等呪神則威靈莫測明則無幽不燭無上則更無有上者無等則更無有等者聖人為物至矣盡矣無可以加矣猶說密呪以加持之予讀此經至是不覺涕泗橫流莫能自止比因抱疾潭柘山中念雲閒徐太僕琰衛法勞勤釋此以慰益其道心耳心經說般若波羅蜜多心經者實眾生大夜之明燈諸佛之慧命也梵語般若此飜智慧梵語波羅蜜多此飜到彼岸葢謂有智慧者照破煩惱不溺情波生死超然妙契本有所謂登彼岸焉心乃喻此經如人一身雖有百骸五藏心為主耳此經文雖簡略實六百卷雄文之心也經者古今不易常然徑路人得趨而進也觀自在菩薩者謂此菩薩以如上智慧圓照空有了無罣礙肇公云照不失虗則涉有而無累虗不失照則觀空而不醉即有無而離色空所以能有能無可空可色故曰自在若夫眾生執有二乘尚無各偏所見不能圓通便不自在夫智慧之與聰明大相懸絕聰明則由前塵而發智慧則由本心而生故聰明有生滅而智慧無依倚也所以不生滅耳行深般若波羅蜜多時者謂此菩薩所修觀智不同二乘偏淺乃深般若也惟其深般若故故能照徹色空本無二致元一實相自是凡夫不了見色而不見空二乘偏執見空而不見色一如恒河之水魚龍認為窟宅天人認為琉璃人閒世認為波流餓鬼認為猛𦦨四者所見不過皆情耳惟悟心者了無此見色既如是受想行識未嘗有異故曰受想行識亦復如是照見五蘊皆空則一切苦厄盡矣凡夫迷倒不悟此身四大假合執以為實故聞生則喜聞死則悲殊不知此身以四大觀之本不可得喚誰生死身既乃爾此心亦然妄想攀緣影子不過四蘊合成若以四蘊觀之是心亦不可得喚誰煩惱人不悟此聞譽則懽然為順聞毀則戚然不悅此乃恣情縱識不以觀行轉識而成智則將飄淪苦海逆浪千尋出沒無常改頭換面橫竪羽毛寧有已哉痛矣眾生佛本現成不肯承當眾生分外甘自擔荷受此荼毒猶未省悟舍利子佛之高弟也聰明絕倫才辨超眾佛呼其名而告之曰菩薩以智慧照徹五蘊大患永辭長揖三界汝知之乎即色之空而不廢涉世也是諸法空相者此空相照見五蘊之空也此空本無生滅本無垢淨本無增減或以道前道中道後釋之未必然也何故行人以智慧照五蘊時色空坐斷凡聖情盡此時寶劒當陽佛亦不能嬰其鋒鋩況菩薩與凡夫耶是故空中無色無受想行識無眼耳鼻舌身意無色聲香味觸法無眼界乃至無意識界者謂此菩薩以此智慧豈惟照五蘊空耳至於十二處十八界莫不皆空矣何故謂五蘊即十二處十二處即十八界佛以眾生根器不同隨機設教有迷心不迷色者為說五蘊有迷色不迷心者為說十二處有心色俱迷者為說十八界要而言之蘊處界三不出色心也無無明亦無無明盡乃至無老死亦無老死盡無苦集滅道無智亦無得者謂菩薩以智慧照之此真空之中非惟蘊入界本空至於十二因緣流轉亦空非惟流轉空耳還滅亦空非惟還滅空耳苦集滅道皆空也非惟種種皆空即此能空蘊入界三乃至苦集滅道之智亦不可得葢所既不有能不單立故也十二支及四諦雖則聲聞緣覺巧拙有異要而言之真空之中無是事也菩提薩埵依般若波羅蜜多故心無罣礙無罣礙故無有恐怖遠離顛倒夢想究竟涅槃三世諸佛依般若波羅蜜多故得阿耨多羅三藐三菩提者謂此經不惟眾生宗之度生死流而登彼岸直饒諸佛菩薩分真究竟亦必本此也此葢讚勸流通此經使諸眾生依般若而進修庶不遭魔外眩惑也永嘉曰大丈夫兮秉慧劒般若鋒兮金剛𦦨非但空摧外道心蚤曾落却天魔膽大都有志於出世者如此力量如此風雲之思如此激烈之懷抱如大火聚使萬物嬰之直下灰飛烟滅可也不然則少見可欲而兒女情生矣或云師之論此經不分因果不列科章似乎儱侗不合古規恐不宜也余則應之曰我佛所說千經萬論五時不等不過陶汰眾生情塵洗滌其見地苟情塵盡而見地正則古規不合之中實合之也子胡多語乎故知般若波羅蜜多是大神呪是大明呪是無上呪是無等等呪能除一切苦真實不虗此亦讚歎般若尊重效驗耳神則妙萬物而莫測可測則不神矣明則圓應萬有而無所累累則不明矣無上則更無過其上者有過之者則不上矣無等等則無可與等者圓滿充實更無及者也圭峰云彌滿清淨中不容他孰與等之已上皆顯說般若也然般若有三所謂文字觀照實相也葢非文字無以起觀照非觀照無以鑒實相非實相則菩薩無所宗極也極者何證之謂也夫證有淺深淺則斷見思及塵沙耳深則圓拔根本無明直抵妙覺而後已雖三觀一心兼修並進然斷見思則空觀之力居多斷塵沙無明則假觀之力居多斷根本無明則中觀之力居首夫見地明而不修觀行者何殊有田而不耕也雖修觀行而見地不明又如盲人行路非惟不能還家我恐其將墮坑落塹也若人怕生死而厭煩惱無如以四大觀身四蘊觀心焉夫四大觀身四蘊觀心之旨此如來剖心剜膽指箇方便冀眾生即此臭軀殻上攀緣影中使即妙悟此身此心原一實相耳然眾生流浪生死輪轉苦趣實非聲色貨利飲食男女牽障也特其不能以四大觀身四蘊觀心則見有身可得有心可礙有身可得則生死宛然有心可礙則憎愛熾然生死厚而憎愛深則本有智慧光明埋沒矣佛與眾生豈兩箇耶佛不過無死生無愛憎人耳眾生則有生死有憎愛佛也四大觀身者凡行人行住坐臥當以齋潔念頭回觀此身皮肉筋骨本屬地大血脉涕涶津液本屬水大暖氣屬火動轉屬風諦審觀察於我何有今橫執之而不舍離認以為實何殊兩鬼爭臭屍焉如是觀久積習行深生處漸熟熟處漸生至於練盡練之一字不可忽也苟非真為死生漢子逆順境臨便擔荷不起矣四蘊觀心者先觀受蘊究從何有推而窮之為無因忽生耶為託境生耶無因能生則前境未感本心寂寥靈徹烏得有所謂妄想耶托境而生則前境遷變心亦遷變遷變之心豈真我心若真我心天地以之建立萬物以之為本若其遷變安能為天地根蒂萬物之本乎故知遷變者特攀緣影子耳夫真心則塵生不生塵滅不滅照物而無累者也故毗舍浮佛偈曰假借四大以為身心本無生因境有前境若無心亦無罪福如幻起亦滅此偈世尊大慈全提緣起無生綱領也如能悟此則心經之妙盡於此矣夫緣起無生者謂心不自生生必由塵塵不自顯顯必由心惟不自生心無性也惟不自顯塵無性也心塵無性則無生現前無性心塵則緣生不廢心塵既爾萬法皆然矣此旨在於華嚴則謂之法界在法華則謂之實相或曰此經以破相為宗談空為趣豈與華嚴法華同轍而語哉夫華嚴法華皆顯示圓宗而此經密譚實相乃古德成言非不臆度穿鑿也噫眾生疑情不了此旨於無身中妄見有身於無心中妄見有心殊不知無身之身形充法界無心之心靈照羣品夫此身此心豈是高遠玄妙也耶即吾日用之中應緣之際未始不昭昭然也老洞華嚴曰佛法在日用處穿衣吃飯處屙屎放尿處舉心動念即不是了也龐居士曰日用事無別惟吾自偶諧神通并妙用運水及搬柴然此旨有悟而未修者有修而未成者有證而受用者今有人於此微有小悟即不修行便謂已了則修與證掉頭不顧癡到臈月三十日一場懡㦬也不此論非敢參入義黨比因海陽居士偶叩及此不覺率意而成故無啟請三寶證明加被偈也揭諦揭諦波羅揭諦波羅僧揭諦菩提薩婆訶者此密說般若也既謂之密則不不敢彊論矣心經說夫心經一書乃世出世閒聖賢豪傑之神術也是以得其旨者御大千而王天下如黠童牧羊鞭䇿指揮之閒靡不得其所者也究其關鍵則照見五蘊皆空一句又此經之心焉今有人於此志在聞道而欲兼善一切舍是書而他求所謂夜行而棄燭非愚即狂矣大抵道之不明世之難治皆根於我相我相既立見可欲者即欣然而悅之悅之而不滿所懷即勃然而怒矣天機由是而塞好惡由是而偏以故本有智慧光明埋沒盡矣以日用而觀之則愛憎交戰於靈臺情識浮沉於寵辱以今古而觀之七雄五伯之相戮漢唐宋元之得失雖復盡善不盡善不可同年而語及乎非武則亂不可定非智則國不可守要而言之皆不出我相也是以真性日昧妄想日濃質朴日漓世道日下故曰以智治國國之賊有我治人物之敵夫賊之與敵雖父母施之於子必不能行寧惟不能行將必反目而攻之矣如來知我相之毒天下其害甚大所以即一念而開色心即色心而開五蘊即色塵而開十二處又即五蘊而開十八界使夫眾生悟知身執心執俱本於我相我相根本又生於無明支支相緣苦集相起故達無明之所由生者則真性自朗達色心無性者則一念不可得達五蘊無性則色心亦不可得達十二處之所由生者即如庖丁解牛了無全牛矣以十二處觀現前此身亦無全身可得也達十八界之所由生者則知色心二法外則析為六塵內則析為六根中則即將現前分別歷歷覺知之心又析為六識嘻非我佛大慈深悲則我相之根毒害之本眾苦之垢豈易拔易滌哉滌垢如寒濤漱石拔根如金剛破物漱之不已石必終易破之不已物必終空石易終穿物空我廢所謂若虧其一必喪其兩耳夫物我既忘則本心自露故曰靈光獨耀逈脫根塵也若夫將此光照出世則覺路可登照世閒則古道可復余故曰心經一書世出世之神術也般若總部其名有八文則六百餘卷惟此經又六百卷雄文之關鍵也此經之關鍵又照見五蘊皆空一句是矣照見五蘊皆空又本乎色心二法色心二法又本乎瞥起一念瞥起一念又本乎真心惟真心初本澄湛本無根塵物我而獨立於五蘊之先絕無所感則一念瞥起所由雖大智高明之士扣其瞥起所由生竟無有能酬者也小子于此亦疑之久矣安得有破疑之大師我以身肉充供亦所甘心焉釋金剛經心外無法如來實語水外無波聖人切喻但眾生從無始以來名言習氣染深難化故聞凡著凡聞聖著聖聞有著有聞無著無聞生死著生死聞涅槃著涅槃聞世界著世界聞微塵眾著微塵眾本心即隱沒被名言所轉執而忘返埋沒自性所以如來於般若會上說金剛經即世界而破微塵眾即微塵眾而破世界堅習堅習既破微塵習除虧一喪兩一兩既喪本心頓露故六祖曰不思善不思惡阿那箇是明上座本來面目此老即善惡情上指渠曉得箇無善惡的這箇無善惡的名有多種曰本性曰真心曰佛性曰本覺等故天機深者不受名言所染能即名言而悟名言不及者如此經以世界微塵眾情上如來宛轉方便借微塵眾破世界有名無實借世界破微塵眾有名無實究竟兩者名實無當情消性復即與六祖因善惡之情悟無善惡本來面目初無差別即此而觀若不能即名言了悟得名言染不得的不惟世界即一合相微塵眾亦一合相也何以故情未破故吾故曰虧一喪兩茲眾位偶聚泖上結金剛般若緣此非就地抽苗皆是多生曾親近諸佛菩薩來所以不期邂逅道人與世泊然初無他慕今更深夜靜白燭光中不惜口業世出世法將高就低種種辟喻委曲剖析此一分經雖眾位根器生熟不同或聞道人拈提或有所入或無所入解者自今日後由麤而精既精則必入神既能入神則一切名言世界微塵聖凡善惡把柄在自手裏彼名言安能轉我未解者自今日後必須要解始不負堯峯中此翻邂逅且老病不與人期流光不可把玩世出世法各須努力眾生情計不此即彼不聖即凡故曰聖凡情盡體露真常今世界可碎微塵可合則世界與微塵未始有常也而眾生於未始有常之閒計世界為一計微塵為多不一即多不多即一酣計而不醒從無始以來至於今日死此生彼死彼生此究其所以不過我見未空隨處計著故如來曰一合相即不可說凡夫貪著其事利根眾生苟和合微塵而有世界世界果有乎碎世界而為微塵微塵果有乎嗚呼此貴在自悟不貴說破所以如來於此經提無生之綱於緣生之中真深慈大悲也夫碎世界而為微塵眾微塵果有乎合微塵眾而為世界世界果有乎此兩者互為主客迭相蕩洗而一多之情豈煩天風海濤鼓漱然後滌除者哉故善用其心者終日處乎一多之中而一多不能累也反是者則不勝累矣故此經曰一合相者即非一合相是名一合相而凡夫貪著其事者是不達一多無常主客無定故也如能達之則一合相未始非天人師焉蘇長公有言曰溪聲便是廣長舌吾則曰一合相便是廣長舌也或者以長公為是以我為非以我為是以長公為非此所謂癡人前不可說夢也世界與微塵眾往復研之但有名言俱無自體謂世界合微塵眾而有謂微塵眾碎世界而有皆眾生橫計也然此橫計不無其因始因於事不精理不徹而生事精則能了知事外無理理徹則能了知理外無事事外無理事果有乎理外無事理果有乎是以性宗不成相宗始精相宗不成性宗始圓精即圓故精而無思圓即精故圓而歷然無思故即事而契同歷然故即理而彌照此等受用自他滿足但因中易知而難證果中易證而難忘噫因中即受用果中受用忘此非披毛戴角者不能也夫我人眾生壽者四見初本一我見耳以展轉橫計遂成四見若以智眼觀之則一心不生我尚不有誰為我見我見既拔則餘者不待遣而自空矣又我見者無主宰中強作主宰之謂人見則待我而生眾生見即循情分別不能返照之謂壽者見不過貪生畏死之念也用是觀之則金剛經所說四見實不在經即在吾人周旋日用逆順之閒與佛何干雖然若不是這瞿曇老漢曲折點破則茫茫大塊終古不旦矣佛問須菩提曰若人碎三千大千世界而為微塵眾是微塵眾可謂多乎須菩提曰甚多予以是知須菩提之意以為不但多耳諦觀而察之誠乃有名無實故曰即非微塵眾是名微塵眾復次世界之意亦有名無實耳故曰即非世界是名世界葢微塵自無其體必碎世界而有世界亦無其體必合微塵而成故以世界觀塵世現而塵不現以微塵觀世塵形而世不形或計多碎相則多碎相現計一合相則一合相現多碎相即微塵之別名一合相即世界之異稱耳若當機頓了多碎相與一合相皆有名而無實則一多之情不待掃而自盡矣一多之情既盡則我固有之心光昭然現前矣故曰凡聖情盡體露真常又此情緣一而起謂之一情緣多而起謂之多情緣凡而起謂之凡情緣聖而起謂之聖情故一一多多凡凡聖聖不過一情之橫計耳又曰徧計又曰前塵相想又曰六塵緣影皆此情之別名也圭峰科此段義謂證法界有味乎哉夫有卷則有舒有聚則有散有合則有碎此自然之理也故如來呼須菩提而告之曰若三千大千世界可碎而為微塵是微塵眾果多耶少耶須菩提承佛而言曰甚多夫碎大千世界而為微塵以凡夫心量較之則不勝其多矣若如來所知則不勝其少也豈微塵多少之數如來不知乃待須菩提定耶葢如來逆知一切眾生雖根有鈍利之不同而執世界為一合相未始有不同者也但利根眾生一聞世界可碎而為微塵則不待須菩提言多微塵即非微塵眾是名微塵眾然後悟世界必非一合相柰鈍根眾生須待須菩提密破其微塵多眾之執然後知一合相初本非世界假眾微塵合而始成世界世界既合微塵眾而始有者則世界當一合相住時住本無住合本無合豈待碎世界而為微塵眾然後一合相始破哉又須菩提以為我與如來碎世界而為微塵合微塵而為世界合合碎碎重疊翻騰上根與中根固已皆悟世界本無合微塵而有微塵亦無碎世界而有至此則一多之執情不待觀空然後破也柰下根之難悟所以須菩提復拈三千大千世界即非世界是名世界顯告而曉之曰若世界實有者即是一合相世界若是一合相則如來往嘗又說一合相即非一合相是名一合相此又何耶如來與須菩提憫眾生執情之難破味著此身計為實有委曲翻騰而下根眾生執解未盡故如來呼須菩提而再告之曰一合相者即是不可說但凡夫之人貪著其事豈須菩提不知一合相即非一合相待如來再告之而後曉耶葢如來借須菩提而深責下根執現前之身橫謂實有而味著也嗚呼初碎世界而為微塵徵微塵而非有微塵非有則世界無體故須菩提不先破一合相之執而先破多微塵之執葢多微塵既破則一合相之執不待破而破矣何者多為一體多破則一無體矣一多情盡則世界與微塵皆清淨法界也指何物為世界微塵耶學者知此則我如來父子翻騰剖析之苦心方始知也如果知之則三千大千世界之堅初碎而為微塵再合微塵而為世界何異一紙卷舒浮雲之聚散者哉釋棱嚴經吾嘗讀佛頂經於七處徵心初有疑焉既而疑情忽消始知如來之心即我之心也吾之疑即阿難之疑也吾疑既消則阿難豈復疑之乎凡學者於七處徵心之辯皆謂初處不難餘者難耳殊不知有內則有外有外則立潛根立潛根則立中閒立中閒則立開眼見明合眼見暗立開眼見明合眼見暗則立隨所合處立隨所合處則立一切無著若然者則初徵內之辯為六者之尤也得其尤則餘黨自滅矣且眾生之執情特執心在內之情難破耳如執內之情既破餘者何難哉吾以是知學者謂六者難不謂初者難實不經苦心故也夫明心是明何心為明真心耶為明妄心耶若明真心真外無妄更教誰明真心耶若明妄心為妄心有心可明以明之耶為無心可明以明之耶有心可明則阿難認能推窮者為心世尊直咄之不許咄之不許者非不許也世尊之意冀阿難回機反照照此能推窮之心為在七處耶為不在七處耶若在七處則處處推心所在皆一無所在為不在七處則根境都無心託何處良以阿難於七處徵心時推窮不精呈答未了以為能推窮者固即七處推之無在然知無在之心又是何物若初計心在七處之心固依根塵而有二推之無在我已無疑但現前能知無在者又是何物此物字較之前物字又深一層矣前物字是依根塵而有之心後物字是離根塵而有之心雖直下推之無在而知無在者是必我心故阿難曰我以能推窮者為心殊不知未經七處推窮之心是有在之心既經七處推窮之後則有在之心已了無在久矣然有在之心是託有境而有知無在之心是託無在而有託有在而有之心阿難已忘之矣惟託無在而有之心尚認為心此所以佛雖咄之而阿難心終不死至於見聞覺知俱離而內守幽閒猶為法塵分別影事故阿難心稍有肯處然終不能全肯者阿難似未悟法塵分別之影此塵此影即無在之異名故也如阿難果知此塵此影本無在之境牽引而起初無有性則分別此影者又轉而為無塵智矣夫無塵智者從凡而至聖從迷而至悟苟微此智則一切眾生終不可成佛矣故此章題之曰明心不亦宜乎佛頂經曰因明有見暗成無見不明自發則諸暗相永不能昏余悟此始知孔老非同道也乃同化也自是余之信心彌切實以成佛自期矣然此光又豈待成佛而有耶即吾現前日用未嘗不烱烱然在也特以橫計明暗之執未消所以籍明塵則能見不籍則不能見故暗相可昏耳如明暗執謝於大夜之中見不殊白日矣而白日之中光亦無增焉嘉靖閒有書華嚴經者以精誠堅至妄念不生情執不起能於暗室書經如白晝余不敢自秘願與天下共乃屬四明李生記之根塵之初本光本自圓滿於圓滿中佛尚著不得況眾生乎以此光元無常性瞥爾不覺變起根塵光陷其中即名為識然識有六在眼司色謂之眼識乃至在意司法謂之意識又七識亦名意識而與此識不同葢名同體異耳凡一切眾生不以六塵為前境作牽引識總不生若無六根雖生亦無所托故曰境有牽心之業用根有托識之功能心與識名異體同勿生別解嗚呼以根塵之初言之堯與紂光無增減以根塵既立言之則堯與紂霄壤懸隔葢堯得之紂失之耳如緣見因明暗成無見此便是陷根塵的樣子如不明自發此便是廓落根塵的樣子又陷之與廓本無常法若得緣因佛性熏炙之則根塵之初圓滿本光終必開解解則會行行則終證設己解不行習終不消習既不消根塵難脫如解而能行不惟根塵逈脫即根塵皆復本光矣此事說則容易領略尤難解尚難領何況行哉但得能行何愁不證既得之自然發願廣大良以同體之悲稱性之慈大且無待寧局於小如四弘誓十願王等皆痛同體而發者也道人口門狹小一時為汝一氣吐不盡聊書此以作前茅程子宜知好惡努力精進緣見因明見初非緣明既非緣暗豈為緣我以是知有日月燈之明則見萬物無日月燈明則不見萬物以理準之無有是處何以故以見暗在眼前者暗既在前能所昭然兩非交涉以暗較明明亦如是夫因明而見物明謝則不見矣故曰緣見因明暗成無見也不因明而見物雖一切暗相現前而我無待之見本自昭然故曰不明自發則諸暗相永不能昏也雖然鴟梟夜撮蚤虱察秋毫晝則瞑目而不見太山又猫犬晝夜俱見晝夜俱見則與無待之見又何別焉夫猫犬根全則見根不全則不見惟聖人根全亦見根不全亦見至於頂亦見足亦見背亦見腹亦見周身四體八萬四千毛孔無不見者故大悲菩薩八萬四千母陀羅臂臂臂有手手手有眼良以書不盡言言不盡意聖人設象以盡其意猶一人之身身有六根六根所待者謂之六塵今棱嚴會上大覺聖人於六根之中略舉眼根因日月燈光之明塵塵能發識有識則見此妄見也真見則不待明塵而本照徹無遺者是也一根既然餘根皆爾故臨濟曰汝等諸人赤肉團上有一無位真人在人之六根乃能放大光明汝若生心擬會即非真人矣以手搔癢謂有能所以手把髻身不離地緣見因明見如我手癢如明緣以此而觀能所宛然不明自發獨立無待不明自發旨本符契橫計忽生千轉相因因因無盡識難窮究惟得真法界者不受識瞞得惟識者不受意言瞞此皆據用徵照苟非鵞王擇乳實難明暗自相代謝見精本自湛然吾不見時何不見吾不見之處若見不見自然非彼不見之相若不見吾不見之地自然非物云何非汝師曰大慧禪師一日問禮侍者喚作竹篦則觸不喚作竹篦則背如何禮答不得却曰望和尚為某作箇方便指示大慧向他道你是福州人我說箇喻子向你如將名品茘枝和皮殻一時剝了以手送在你口邊只是你不解吞達觀燈下看大慧語錄至此不覺失笑你眾人且道笑箇恁麼如薦得不勞達觀饒舌既薦不得老漢為汝說破此段經也不妨礙只如如來為阿難老婆心切至矣何異大慧和皮殻剝了名品茘枝送在禮侍者口邊只是他不解吞大底此事苟不到智訖情枯之地斷然承當不下且道如何是智訖情枯的樣子咄泥牛夜半歸來遠踏破前峰萬頃雲由彼覺明有明明覺失彼精了黏妄發光是以汝今離暗離明無有見體離動離靜元無聽質無通無塞齅性不生非變非恬嘗無所出不離不合覺觸本無無滅無生了知安寄汝但不循動靜合離恬變通塞生滅明暗如是十二諸有為相隨拔一根脫黏內伏伏歸元真發本明曜耀性發明諸餘五黏應拔圓脫不由前塵所起知見明不循根寄根明發由是六根互相為用阿難汝豈不知今此會中阿那律陀無目而見䟦難陀龍無耳而聽殑伽神女非鼻聞香驕梵鉢提異舌知味舜若多神無身覺觸如來光中映令暫現既為風質其體元無諸滅盡定得寂聲聞如此會中摩訶迦葉久滅意根圓明了知不因心念阿難今汝諸根若圓已內瑩發光如是浮塵及器世閒諸變化相如湯消冰應念化成無上知覺師曰靈光寂照彌滿清淨中不容他外此有法無有是處凡眾生見心外有法皆瞥爾念生念生即有我有我則有限量所以有內有外內則根識是外則依報是依報是無情正報是有情因有是是有我我所雖三細六粗生起次第有別究本言之原是一箇圓常佛性以眾生念起之後了不覺悟膠於根塵識託其中戀能戀所能即六根所即六塵根塵能所疆界確然是以眼識則能司色耳識則能司聲餘四例然所謂由彼覺明有明明覺覺明即是真心明覺即是妄心此妄心即真心迷轉者非離真心外別有妄心生既迷於真失彼精了黏妄發光根塵是所黏識是能黏譬如眼識不能自生必由明暗二塵引起纔有此識若無前塵識終不有故心外見法者則有前塵有前塵則有妄識既有妄識六根次第應用一點也差謬不得此皆是情識封蔀故也若能當下照此一念原無起相即念本無念尚不有安得有前塵凡有前塵為留礙者只是自家直下不能觀破此念故清涼云十世古今終始不離於當念無邊剎海自他不隔於毫端葢有念即有自他即有古今念他喚一尚不可何處有二由是觀之天地萬物一切含靈不出我一念又天台智者云一念具三千謂有念時念息三千泯謂無念時行者真發菩提心者當於起念時了不可得念息時洞照十虗所以這一節經最初不過迷了真心有妄心因有妄心即有根塵因有根塵即有疆界因有疆界便不能互用靈通此就迷上說若離暗離明既無見體難道就沒了見若沒了見即是木偶人也葢因明暗而有見者應物之識也離明暗而有見者真心之照也此箇關頭正是迷悟根本悟得來應物之識即是真見悟不來真心之照即是應物之識却不是兩件因迷悟斯有二致耳一根如是諸根亦然真心發照則不托於前塵而起起不托塵此是離物獨立而照獨立則心外無法心外無法不知又喚恁麼作根塵故雲門云盡大地是沙門一隻眼雲門此意即是經云今汝諸根若圓拔已內瑩發光如是浮塵及器世閒諸變化相如湯消冰應念化成無上知覺器世閒是無情眾生是有情如何眾生悟了道一切無情器世閒亦化成無上知覺此箇竅子不知在何處尋得這箇竅子著說無情器界成佛亦可說有情眾生不成佛亦可所謂拈頭作尾喚尾作頭權衡在手褎貶由誰到這裡說無六根而有見聞亦可有六根而無見聞亦可上來雲門的話頭有照處便有用在經旨直饒會得只是一箇照用處又存乎其人六根互用也不甚奇特會得從緣薦得相應捷之句即便受用得來也此節經雖由真起妄會妄歸真發許多作用不過自家日用尋常事耳以迷者謂之奇特又古德云靈光獨耀逈脫根塵這等說話只好為未發心的人說若少有見的聞此定然鼻笑不已既謂之靈光是活漉漉地說恁麼逈脫不逈脫且他本無畔岸這個軀殻子不過三五尺長以三五尺長置之無畔岸之中且道是逈脫不逈脫若道不逈脫六尺軀殻子安能籠得無畔岸的靈光若道逈脫只今大眾莫不在軀殻上作窩坐這箇窩坐雖只有五六尺長若不是箇真正英靈男子且慢莫提起說他逈脫不逈脫若然如是畢竟怎麼樣好三途一報五千劫得出頭來是幾時真心實不可以一體求多體得又不可以徧體知亦不可以不徧測離一離多離徧不徧所以又能一能多能徧能不徧也今阿難不悟真心惟攀緣橫計故如來知其病處隨機付藥究竟言之了無實義亦無定方如難阿難云若咸覺者挃應無在既挃一處徧體多覺斷無是理如來就阿難計處難之意者挃一支而四支咸覺則挃者亦知不挃者亦知則可言挃者無挃矣何則以三支不挃有知則一支挃者可即無挃也
