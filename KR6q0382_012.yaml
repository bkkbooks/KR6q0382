body:
  text: 明憨山德清閱釋毗舍浮佛偈夫外堅濕暖動而觀之則此身初非我有外前境而觀之則此心本無生處外心境而觀之則罪罪福福皆本無主也故曰假借四大以為身如來大慈豈欺我哉宋黃庭堅號山谷有貴人以絹求山谷書自所作文山谷笑曰庭堅所作文烏足寶惟寒山詩乃沃火宅清涼之具遂書與之復囑之曰寒山詩雖佳然源從七佛偈流出故山谷凡所行樂之地書七佛偈最多而七佛偈中毗舍浮佛偈尤為殊勝所以然者葢過去千佛微此佛則莫能成其終現在千佛微此佛則莫能成其始成始成終實係此偈是故讀誦書寫受持樂說流布毗舍浮佛偈者十方三世諸佛併其神力現出廣長舌相讚歎是人功德不少毗舍浮佛此言一切自在覺嗚呼一切自在覺一切不自在障初非異源故曰心佛及眾生是三無差別但諸佛善用其心則無往而非自在眾生不善用其心則無往而非障礙然此障礙不從天降不從地生亦非人與以其見有我身則死生榮辱至矣以其見有我心則好惡煩惱至矣夫死生榮辱好惡煩惱皆以我身我心為本源苟有勇猛丈夫能直下拔其本塞其源則眾生之障礙未始非諸佛之解脫也八大人覺經曰心為惡源形為罪藪予以是愈信山谷謂寒山詩為沃火宅清涼之具源從七佛偈流出無欺焉或問曰枯惡源空罪藪有道乎應之曰假借四大以為身心本無生因境有此半偈能讀而誦誦而思思而明明而達則惡源之枯不枯罪藪之空不空子自知之非予口舌所能告也夫心為惡源形為罪藪凡血氣之屬必有知血氣非形乎知非心乎嗚呼形之與心莫知是何怪物而毒眾生若此人有言曰修行本無他術苟能柰何得自己身心便了雖然柰何得自己身心豈細故哉是以聖人哀之設大方便使博地凡夫即惡源而為慈悲之海即罪藪而為功德之林達形非形了心非心非形則形充八極而無累非心則智周萬物而不勞如是妙用莫如毗舍浮佛頌也毗舍浮佛此言一切自在覺此自在覺烱然獨立於眾生日用之中初無障礙然在諸佛便得自在受用在眾生便成障礙且道病根在甚麼處咄大地眾生成正覺十方諸佛陷泥犁夫患本無根根於身心所以顏子墮肢體黜聰明者拔患根也老子亦曰我有大患為我有身我若無身何患之有由是言之身乃饑凍榮辱死生之樁也如以堅濕暖動觀身則患樁不待推而倒矣心乃好惡是非之樁如以物我同根觀心勞勤好惡襍毒之樁亦不待推而倒矣噫兩樁既倒身心情枯堅濕暖動即法身也能好惡為襍毒者即無分別智也以無分別智之魚游無邊際法身之海水不待忘魚魚自忘魚不待忘水水亦自忘魚水相忘而浮沈自在清冷之懷則魚與水皆象先之紹介也剖塵居士勉之毗舍浮佛此言自在覺覺與自在體用互稱耳葢覺則自在自在則覺故聖人體用圓融無粗不精精則一一則無待無待則無外無外則物我同根天地一體所以大不廢小體不廢用根兮塵兮根不自立由塵而樁塵不自立由根而賓由塵而樁樁果有乎由根而賓賓果有乎兩者既決物我寂寥故曰寂寥於萬化之域動用於一虗之中故根不礙塵塵不礙根大用全而無跡無跡則物我何在知此謂之覺根塵不相留礙謂之自在若然者根未嘗有根塵未嘗有塵聖人善用其心故自在而覺眾人不善用其心所以自在覺翻成不自在障耳余以是知以四大觀身有身用而無身相以前境觀心有心用而無我執故此半偈誠破死生之爻象治心病之醫王也夫身心之初有無身心者湛然圓滿而獨存焉伏羲氏得之而畫卦仲尼氏得之而翼易老氏得之二篇乃作吾大覺老人得之於靈山會上拈花微笑人天百萬聖凡交羅獨迦葉氏亦得之自是由阿難氏乃至於達磨氏大鑑氏南嶽氏青原氏並相繼而得之於是乎千變萬化鬼面神頭或以慈悲為三昧或以瞋怒為三昧或以苦行為三昧或以語言文字為三昧或以棒喝破沙盆為三昧以至於滾木毬握木蛇斬蛇伏虎叱龍之類書不勝舉如上種種三昧世出世法交相造化使夫眾生日用而不知而或知不知即名凡夫或知即名聖人嗚呼聖人與眾人初本一條惟以知不知乃凡聖分焉由是而觀知亦由我不知亦由我何天下知者寡而不知者多病在何處良以有生以來計身心以為我而身心之前者湛然圓滿妙物無累反昧之而不覺一不覺則永不覺所以威音同稟以至於今猶茫然無省勞他聖人右提左挈百計千方委曲施盡伎倆亦窮總不知覺古人呼此輩謂之行尸走肉白日小鬼不亦宜乎吾毗舍浮佛復不以眾生難度而退願心說此偈要使博地凡夫共登無上夫無上者謂身心之初有大圓鏡智光徹終古妙拔羣有威神莫測得之即聖失之則凡故也若然者凡聖之分不過於身心窠窟翻得破者則解脫無方不能翻得破者則障礙長劫葢死生無根以身為根好惡無本以心為本苟能以四大觀身身何所在前境觀心心從何起知身所在即身有而無累知心所起即心有而不生身有而無累生死何妨心有而不生應物何礙生死何妨則願輪常轉應物無礙則慧日常明雖然初心學人不以持偈為梯航則苦海難度又持偈有上中下之不同上者以其天機深妙觸偈即悟中者惟持久始得心開下者由讀而誦誦而能持持而能熟熟則或以此生得入或以多生得入入則本同上達無異以此觀之根無利鈍能信者皆得出苦何故自甘暴棄或以貧賤累而不能持偈或以富貴累而不能持偈貧賤富貴雖榮辱不等累無兩般且年光不可把玩老病不與人期一息不來便成他世凡百罪業是汝作者不免隨之隨而不離如影隨形天上人閒太虗空中總無你逃避處如可逃得則一切佛祖聖賢之聰明不若凡夫之愚癡矣假借四大以為身心本無生因境有夫有生之患莫大於生死而生死之患惟至人則能超然無累下是則孰不受其累然生死又本於有身老氏云我有大患為我有身故出世聖人示此偈開悟是輩此身不過五行攢簇而成四大合併而有所言四大者地水火風是也此四何名為大謂其無處不徧故稱之為大此四大在身則為肉為皮為筋骨為血脉為痰唾為津液為熱氣為動轉今現前此身不過此等合成既合成矣眾生不悟非堅確然執之為身故臨死生之際處利害關頭心神恍惚千算萬計不過要保全此個軀殻子殊不知此身皮肉筋骨感地而有血脉津液感水而有一切熱氣感火而有凡百運轉感風而有故智者不待閒時方作此想於日用中常作此想皮肉筋骨原從地有血脉津液原從水有熱氣原從火有動轉原從風有此四大者一切眾生凡有血氣之屬皆所共有我何癡迷確然妄執為身此想周旋俯仰進退屈伸常專注不斷漸漸純孰一旦頓悟此身何在故昔人有悟之者云將頭臨白刃猶似斬春風且一切生死眾患如箭我身如垛既悟此身堅濕暖動各還其本垛尚不有箭來誰受故曰假借四大以為身也夫心有真心有妄心真心則聖人與凡夫無所閒別者無所增損者廣大靈明廓然充滿本無生安有死本無來安有去離生死絕去來不離日用湛然常在不可以有心得不可以無心求惟神而明之者可幾也此心不悟雖衣冠楚楚總是行尸走肉人為萬物之靈於此不悚然懼惕然省者非顛倒即著鬼迷矣妄心者感物而有受制於物故逢順境則喜逢逆境則瞋憎愛交加靈臺汩沒一受於心恨不即釋喜不即化此皆妄心也真心雖然應物物不能累如明鏡照像雖辨妍醜而本無心妄心則因境有即受境累故曰心本無生因境有也毗舍浮佛此言一切自在覺既自在覺矣有何物而為障礙哉然未覺者不免一途成滯見色則被色障礙見空則被空障礙忽然而有身則被身障礙介然而有心則被心障礙身障礙生老病死心障礙喜怒哀樂是以周旋一光之中而妄成角立既角立矣一切不自在至矣生有老迫老有病迫病有死迫喜有怒迫怒有哀迫哀有樂迫迫者相催之謂也嗚呼生若定常老不可迫喜若定常哀不可迫以其無常流之莫能已也惟有道者達身無常四大成故達心無常前境生故達四無常一身待故達境無常因心有故借一蕩四四無所立借四蕩一一無所存借境蕩心心初不有借心蕩境境不自留一四互蕩心境兼忘一身而為無量之身身相不壞一心而慮周萬物寸抱本閒由一切不自在入一切自在達之者剎那可以超曠劫如其未達解脫幢即成行尸肉塊智慧津翻作苦海逆浪自古及今豪傑英雄打破這關捩子不得雖功高千古名光萬世於本分上事了無交涉故生時受生迷老時受老迷病時受病迷死時受死迷喜怒哀樂時受喜怒哀樂迷以迷續迷迷無斷日人為萬物之靈而靈不悟以靈續迷為一切黑業本山高海積未有撼竭之時少知自反者安得不懼乎又靈如融通之水迷如窒礙之冰融通則在方而方在圓而圓窒礙則方則定方圓則定圓方圓無滯之謂活方圓有定之謂死是故聖人居方圓而方圓莫能滯以無滯故所以能通天下之情眾人則不然見方而被方惑見圓而起圓執所以在聖人即死而活在眾人即活而死故聖人謂之生人眾人謂之死人由是觀之自上古以來所謂生人者能得幾何哉為聖不難難在通靈苟能通靈非惟身心俱靈大則虗空天地萬物之夥微則一介一塵一毛一髮靡不靈矣至於三藏六經諸子之流百工之技亦無不通故達身靈通無事可礙達心靈通無理可障化生老病死為無上涅槃迴喜怒哀樂證大菩提涅槃菩提從身心得若無身心二果何階故曰此身為塵勞山此心為襍毒海一旦達身無己塵勞山即功德聚也達心如幻襍毒海即般若漿也人為萬物之靈不自重甘為死人不為生人可悲已此半頌特十四字而已然大藏與一千七百則機緣九經二篇百家之要莫不備焉子若張而演之雖大塊為墨崑崙為筆天風為手虗空為紙莫能盡也故曰佛法有不思議力既曰不思議豈可以眾生臆見揣摩而能知耶但當諦信受持則終自悟入夫信則誠誠則一一則我持頌之心了無所附麗如是積久則身心橫計一朝𪹼落則生死鑄而為涅槃煩惱化而為菩提矣此兩者謂之二轉依果所謂轉生死而依涅槃轉煩惱而依菩提也然凡夫心識麤浮卒不能制之一處故須由讀而誦誦而持持而專專而一一則隣化隣化則將乘緣生而入無生矣達觀道人嘗以毗舍浮佛傳法偈授人時必曰持千百萬遍自在受用現前矣毗舍浮佛此言一切自在覺而深推其旨大要破眾生身心之執耳故曰假借四大以為身心本無生因境有即此觀之一切眾生從無始劫來至於今日莫能自在於死生憎愛之中者良以見有自身則身相為礙見有自心則心相為礙嗚呼身相礙於外心相礙於內一動一靜內外相礙無須臾超然之境可哀矣哉即此相礙之境在聖人日用中而身充法界如月赴眾水知周萬物如鏡照羣象不速而至不勞而遍東坡大悲閣記乃此偈註疏也其略曰大悲者觀世音之變也至何獨疑於大悲乎如以東坡之意推之則心念不靜應物必亂非東坡不知即動而靜即色而空葢東坡量自己分上只體得理具光景未到無身而現多身無心而智鑑羣品地位如此地位非大菩薩豈易為哉然觀東坡理具之旨則所見無惑矣體此無惑之見於憎愛境上死生關頭真實挨將去到佛菩薩地位終有時在也釋八大人覺經夫覺與不覺如拳手卷舒耳聖人知其如此所以即眾生日用不知之知開為八覺覺則如拳復手手復則提挈四生搬運三世束太虗如芥子撚大地為微塵舉無不成用無不驗皆十指之力也若手作拳則十指屈而不能信矣信既不能安得有如上之用哉故拳譬不覺手譬了覺以此觀之諸佛不覺則不異眾生眾生忽覺則不異諸佛如屈指則拳信指則手而信之與屈屈之與信機在心而不在拳手也然拳手可見而心不可見唯聖人因可見而見不可見故能以不可見役可見者所以可見者為聖人之利而不為聖人之害也而眾人以可見者為我有則不可見者愈遠而愈疎矣故曰性相近也習相遠也如一旦悟可見者即不可見者則日用不知之知不惟開而為八覺即千萬覺可開也此不知之知在諸佛則名八萬四千三昧此八萬四千三昧在眾生則名八萬四千煩惱嗟乎煩惱與三昧果有常耶果無常耶有常則眾生終難得佛無常則諸佛亦可以為眾生如諸佛還作眾生則眾生又何必求得佛哉凡誦持此經者果知我現前日用不知之知如來為我開為八覺我因八覺而悟廓之則八萬四千之覺在我日用不在諸佛言說也予故曰拳手可見而心不可見則不可見者果可以數量盡哉釋十二因緣所謂十二緣生者無明行識名色六入觸受愛取有生老死不了自心謂之無明既成無明則必循緣謂之行循緣則必分別謂之識既成識矣則必橫計橫計實無其體但有虗稱謂之名身因橫計所有塊然一物謂之色然而名色解雖次第乃一支也根境相敵謂之觸觸則領納謂之受受必耽著謂之愛愛而不捨計為常有謂之取取而執實謂之有有則有生生則有老老則有死自無明至老死謂之十二支此十二支為一切眾生生死煩惱之窟宅亦是一切諸佛菩提涅槃之樂土也顧行人治之何如耳夫十二因緣者謂因無明而緣行因行而緣識因識而緣名色因名色而緣六入因六入而緣觸因觸而緣受因受而緣愛因愛而緣取因取而緣有因有而緣生因生而緣老死是名十二因緣然無明與行則屬過去識乃過去之終現在之始耳名色六入觸受愛此五支則屬現在取乃現在之終未來之始也有生老死此三支則屬來世又無明有迷理無明有迷事無明迷理無明謂不了第一義諦普光明智中本無古今凡聖身心即此不了名之迷理無明迷事無明謂執現前四大假合之身四蘊橫集之心此是我身此是我心只此執著分別者順則歡喜逆則煩惱此點執受名之迷事無明故曰迷理無明未破決不能達本迷事無明未破決不能忘情以不達本故法身本有而不悟以不忘情故色身本無而橫執此執不消依之而造善惡之行行成謂之業業熟謂之果受苦樂時謂之報此就行一支而演說也識則以行業牽引受果報分別投胎妄起憎愛名識此識投胎之後在母胎中作赤白主無有形段可見但有其名故謂之名色即赤白和合至第五箇七日名形位謂諸根四肢似有而未全故謂之色六入則名色已後至第六箇七日名毛髮爪齒位至第七箇七日名具根位謂六根開張有入六塵之用故名六入此兩支皆胎中具若形位毛髮爪齒位又名色六入兩支閒開出也觸則出胎已後至三四歲時六根雖對六塵未能了知故苦樂想未生名觸受則謂從五六歲至十二三時因六塵觸對六根即能納受前境好惡等事雖能了別然未能起淫貪之心但名為受愛謂從十四五歲至十八九歲時貪於種種勝妙資具及淫欲等境然猶未能廣徧追求但名為愛取則從二十歲後貪欲轉盛於五塵境四方馳求曾無厭足故名為取此五支雖在胎出胎之不同總屬現在取則是現在終亦未來始先已揀之此復略顯有謂因馳求諸境起善惡業積聚牽引當生三有之果是名為有三有則欲有色有無色有是此三有又名三界生謂從現世善惡之業後世還於六道四生中受生是名為生老死謂從來世受生已後五蘊之身熟已還壞故名老死嗚呼此十二因緣非三達洞明五眼圓照孰能至於此雖然學不檢名名不審義義豈能精義既不精則終難入神義不入神則實用無徵實用無徵雖說時似悟對境終迷耳故一觸死生禍福之機便作不得主宰以致名敗德喪取笑千古退世人之信心即此觀之不以佛祖聖賢自任則十二因緣之名尚不及聞況能檢名審義精義入神以致用哉即太史公號稱博古於三世報復猶疑而不了況其他耶如史遷於十二因緣能檢名審義一心了知則三世報復決不至失言取笑於後人嗚呼惜哉八識規矩前五識性境現量通三性此言前五識於三境中惟緣性境三量中惟是現量三性俱通性境者謂所緣諸色境不帶名言得境自相也相者青黃赤白之謂名者長短方圓之稱現量者謂對境親明不起分別也性境屬境現量屬心三性者善性惡性無記性也三性俱通以五識性非恒一故性境若說根塵能所八法而成是落小乘如惟識則無有此境此境現前如明鏡照象湛然明了不起分別如云真境也善惡兩性在五識雖無分別而照從是起故通眼耳身三二地居三界分為九地自地獄至六欲天皆欲界也為一地四禪色界也有四地四空無色界也有四地共為九地欲界名五趣襍居地五識俱全初禪天名離生喜樂地是為二地止有眼耳身三識無鼻舌二識以無段食故自三地以上則五識俱無徧行別境善十一中二大八貪瞋癡此二句言五識心所徧行有五別境有正善心所十一中隨煩惱二大隨煩惱八根本煩惱六今止有貪瞋癡三共心所三十四皆任運無分別者五識同依淨色根白淨色根者指勝義而言惟天眼能見葢落形質者是浮塵根豈能照物以有勝義根在故能緣境言五個識同依勝義根而起也九緣七八好相隣九緣者空明根境作意分別依染淨依根本依種子也眼識具九緣而生耳識惟從八除明緣故鼻舌身惟七除空明二緣故合三離二觀塵世鼻舌身三識合中取境眼耳二識離中取境觀即能緣見分塵世即所緣相分愚者難分識與根此言小乘愚法聲聞不知根之與識各有種子現行以為根識互生也不知根之種現但能導識之種現謂根為生識之緣則可謂生識則不可以識自有能生之種子故也小乘未破所知障於法不了故難分耳變相觀空唯後得果中猶自不詮真佛有根本智有後得智根本智乃實智能親緣真如後得智乃權智但能了俗不能親緣真如果頭佛已破見思惑能六根互用變起相分復觀相空以不知前五及七八等識遂自認為後得智不知後得智乃從根本智而得者小乘雖有如理如量二智特其名耳豈真後得智耶即後得智在佛果中猶不詮真況因中乎詮契也根本智無分別所以親緣真如後得智從色根起是有分別的所以不能親緣無分別理小乘以無我為真如斷了六識分別執便能六根互用以為能親緣真如偈曰小家果頭佛理量徒有名迷名不知義疑大而起諍五識同一覺是以眼可聞耳不能見色實非本根咎咎在分別者以故見思破六根即互用彼小不知此未究七八五三者曉然了橫計渠自破既破棄舊法悲哀歸大乘羅什首初師疑什亦有辨一朝悟大理仍復師羅什圓明初發成無漏三類分身息苦輪前五識隨八識轉佛位中第八識轉為無漏白淨識而相應心所即成大圓鏡智歘爾現前故云初發則前五識即成無漏三類身者法報化三身中之化身也千丈大化身被大乘四加行菩薩丈六小化身被大乘三資糧位菩薩及二乘凡夫隨類化身則三乘普被六趣均沾以止息眾生苦輪也前八句明有漏後四句明無漏第六識俱頌其造善作惡不定之功能三性三量通三境三界輪時易可知善惡無記三性現比非三量性獨影帶質三境俱通也比者比類而知非者情有理無比度不著也帶質境有二以心緣心中閒相分從兩頭生帶本質生起名真帶質以心緣色中閒相分惟從見分一頭生起變帶質起名似帶質獨影亦有二一有質獨影五根種現皆托質起一無質獨影緣空花兔角及過未等所變相分是五塵落謝影子止緣過去五塵與未來變起五塵影子不緣見在五塵也前生六識攬法塵影子以成今生形種今生又因形起影是來生受形種子今生若能六識作觀破了我執不攬法塵則不受分段身矣六識輪轉三界顯易可知相應心所五十一此句是標數性界二句是立名欲令眾生因名以闡義因義以會理會理以致用致用在作觀上說致用以體道體道以立德善惡臨時別配之六識遇善境時與善心所相應遇不善無記境時與不善無記心所相應故曰別配之此特平平緣耳若增上緣則善心勇猛惡心所俱轉而為善矣性界受三恒轉易六識於三性三界併憂喜苦樂捨五受恒常轉變改易也根隨信等總相連根本煩惱六隨煩惱二十善十一等餘徧行五別境五不定四共五十一亦相連性界受等轉易也動身發語獨為最動身發語時於八箇識中行相最勝以有情故也引滿能招業力牽引引起也滿圓滿也言六識能造業招果發起初心歡喜地歡喜地因斷分別我法故此識於初地初心轉成無漏以斷有分別我法二執故俱生猶自現纏眠無分別我法二執與生俱生此時尚未斷猶纏縛眠伏以所知障未斷故遠行地後純無漏觀察圓明照大千遠行乃第七地也此識以前漏無漏閒襍而生至此地後則俱生二障永不現行而純無漏相應心所亦轉為妙觀察智而圓明照大千矣第七識帶質有覆通情本七識於三境中緣帶質境三性中惟有覆無記性有覆者障蔽真性通六識情故本八識也通情本故曰相分兩頭生七識緣八識見分為內自我七識是心本識亦是心所以說以心緣心真帶質八識是其本質故七識既以八識見分為內自我則八識見分即七識本位八識見分緣色即七識緣色也色非真故曰似帶質問帶質是帶八識本質而生了然如何是七識的境八識能藏一切所藏一切根身器界我愛執藏八識便有境了這境從何來是從六識來也便知七識原無體位其相分從六八兩頭而生隨緣執我量為非此識於無分別我法二執是任運綿綿故云隨緣執我八大徧行別境慧貪癡我見慢相隨大隨惟八徧行五別境止通慧根本煩惱止具四貪癡見慢是也恒審思量我相隨前五識非恒非審六識審而非恒惟此識恒常審推思察量度執八識見分為我故曰我相隨有情日夜鎮昏迷四惑八大相應起既執八識為內自我則有情恒處生死長夜而不自覺以與四惑八大相應而起四惑即根本煩惱四六轉呼為染淨依八個識俱為轉識惟六識作觀則諸識俱轉故轉獨加於六識呼七識為染淨之依葢六識有分別七識無分別有分別依無分別起以無分別近無情故極喜初心平等性無功用行我恒摧凡一地中具初中後三心即入住出也此識於初地初心斷一分無明便轉成無漏為似平等性智以因中轉也無功用行是八地無分別我法二執至此盡斷故曰我恒摧乃為真平等性智矣六識到第八地轉妙觀察智如何七識初地初心就轉平等智耶葢六識到觀成後轉妙觀察智初作觀時轉為似妙觀察智如來現起他受用十地菩薩所被機佛果位中現十種他受用身十地菩薩乃所被之機也第八識性惟無覆五遍行此識因中於三性中惟無覆無記性緣境之時相應心所惟五遍行界地隨他業力生此識於三界九地之中隨六識善惡業力而生以八識無記性故二乘不了因迷執由此能興論主諍此識最微細所以二乘愚法聲聞不信有此惟以前六識受熏持種斷了見思執為如理智六根互用執為如量智以無明全未破故所以大乘論主反覆辯論證有此識也浩浩三藏不可窮能持種子不失曰能藏受染淨等熏曰所藏七識執為我曰執藏三藏體用深廣故凡小不達淵深七浪境為風八識如澄湛之淵由前七個識攬前境為風興起波浪耳受薰持種根身器此識能受前染淨熏能持根身器界種子根是六根身為內世界器為外世界去後來先作主公惟此識為總報主不動地前纔捨藏金剛道後異熟空第八地為不動地此識初至此地纔捨能藏所藏執藏至金剛道後乃等覺位異熟者變異而熟異時而熟異類而熟金剛道後斷生相無明異熟種子方空也金剛觀智是智之名言其堅利能壞一切無明有生住異滅異熟空則瞥起一念無明空矣大圓無垢同時發普照十方塵剎中此識至佛果位中轉成上品無漏淨體號無垢識與相應大圓鏡智同發起時普照十方圓明世界唯識略解夫搜剔陰陽之奧囊括造化之精洞洪濛之源破渾沌之竅超儒老而獨高冠百氏而弘深舍唯識之宗而他求未之有也夫唯遮境有識簡心空遮境則識外無法簡空則非同枯滅是以夷斷常之坑塞生滅之路圓彰中道刊定因明魔外望絕凡聖共遵耳然識有八種有心王心所之殊苟非智慧空靈思量妙絕豈易窺其庭哉阿賴耶識等大略窮其所由生直以真如照極反昧生滅與不生滅和合謂之證自證分即如醒人忽爾昏作人語雖聞而不能了了謂之醒耶又不能了了謂之昏耶人語又聞此之謂昏醒相半迷悟之關也此等時節有人喚之則昏隨醒矣不喚則醒隨昏矣醒既隨昏而外不能了境又不作夢惟昏然而已謂之自證分此等時節位無能所冥然獨存也少頃頓夢種種悲歡苦樂據能觀而言謂之見分即所觀之所即相分或問曰見相二分前後生耶抗然生耶余應之曰見相二分謂之前後生者現量之中不許有無分別纔生分別現量滅矣謂之抗生則能所弗同也此四分乃八識之本故有志於此宗者不可不留神焉四分通澈則八識之綱思過半矣夫八識四分乃相宗之綱骨也阿賴耶識末那識分別識眼耳鼻舌身五識謂之八識證自證分自證分見分相分謂之四分究本言之八識四分初無別體特以真如隨緣乃成種種耳夫真如隨緣之旨最難明了良以真如清淨初無薰染如何瞥起隨緣耶於此參之不已忽然悟入所謂八識四分不煩少檢唯識之書便能了了矣故曰性宗通而相宗不通則性宗所見猶未圓滿通相宗而不通性宗則相宗所見亦未精徹性相俱通而未悟達磨之禪則如葉公畫龍頭角望之非不宛然也欲其濟亢旱興雷雨斷不能焉是以有志於出世而荷擔法道若性若相若禪宗敢不端誠而留神哉惟相宗名義數多若非心智妙密委曲精搜實未易明也今則取大略稍論而疏之但粗曉蒙孺耳大抵阿賴耶識通前眼耳鼻舌身五識當併而發揮之似覺易明葢阿賴耶識及前五識皆屬現量又皆上品果中轉也若第七識第六識則三品皆具三品者見道為下品修道為中品究竟為上品故七六因中轉也或曰前五識成無漏相應心品現身益物何以先言第八成無漏耶以圓明初發乃第八識相應心品成大圓鏡智故其前五根即第八識所變相分能變本識既成無漏所變五根自當即成無漏矣能發五根既成無漏則所發五識遂成無漏何疑哉或曰既言八識轉成四智何故却言相應心品耶對曰唯識第十云此四品總攝佛地一切有為功德皆盡此轉有漏八識七識六識五識相應心品如次而得智雖非識而依識轉識為主故說識轉得又有漏位智劣識強無漏位中智強識劣為勸有情依智捨識故說轉識成智也大乘所緣緣義曰言是帶己相者帶與己相各有二義言帶有二義者一則挾帶即能緣心親挾境體而緣二則變帶即能緣心變起相分而緣也親挾者謂之實境變起者謂之假境假境者何即實境影子也影子者何謂前五識親挾實境乃任運而緣不帶名言現量中也譬諸明鏡物臨即照原無心也纔覺妍醜現量已滅即落比量矣余是知假境影子意識所緣耳又能緣心變起相分而緣亦假境也今安慧宗中妄謂因中無漏五識能緣真如殊不知五識成智必待第八識轉而為根本智然後五識轉成所作智也此中目此智為後得者何也謂根本而後得也以五識及第八識皆屬現量果上同轉故也彼謂因中五識未轉智而能緣真如非妄而何縱於果上識雖轉智第能照俗而不能緣真如故護法師曰果中猶自不詮真況因中乎
