body:
  text: 明憨山德清閲雜說匡石暴亡說世有年志俱盛而求菩提一旦志不遂而暴亡或者便生誹謗驅烏子應之曰此亡者乃廣長舌相也善聽法者即於此悟國土危脆而況微軀乎如雪峰指亡僧髑髏示衆曰此僧為汝等却真實大衆如何薦取玄沙有頌曰萬里神光腦後相若然者則匡石先生之暴亡豈有亡不亡之窠臼為褦襶子作口實翻騰去耶魂魄辨精氣為物游魂為變是故知鬼神之情狀此孔子之言也而解者互有不同或謂精氣無知游魂有知或謂精氣與游魂皆無知也或謂精氣與游魂皆有知也是故學者所宗亦各不同焉然孔子之言若日月之在天而盲者不見豈日月之咎哉蓋孔子立言之意有順有逆有逆而復順三說焉而伊川晦菴謂魄與魂皆無知東坡與沈內翰謂魄與魂皆有知獨新建則謂魄無知而魂有知此皆能會通孔子之意者但解愈易而孔子之意愈晦耳何謂順自性而之情也何謂逆自情而之性也何謂逆而順聖人以為我復性而人不復則情不消情不消則我見熾然我見熾然則貪暴無厭爭鬬靡已故以復性之教教之使夫順者知逆逆者知順則原始反終死生之說可明也夫迷順而不知逆者恣情而昧性其生也為魄死也為鬼順而知逆者悟性而治情其生也為魂其死也為神魄之為言泊也夫泊者以衆人未聞道則無往而非情也而情無自體必假於根塵故衆人其資厚則氣強其資薄則氣弱所以其生也寄泊於物而強弱隨焉則其死也亦必泊於物而強弱隨焉若伯有為厲是也君子則不然既聞道矣知道外無物無物非道也所以貴為天子不以為榮賤為匹夫不以為辱若舜與禹是也即此觀之伊川之說非矣新建之論得失半焉唯蘇長公與沈內翰近是然蘇沈猶未能精辨順逆逆順三者之始終所以理全而事略事略則波虧波虧則水缺波譬事也水譬理也故事不融而理終不徹耳豫故曰衆人恣情而昧性則魄盛而魂衰君子則魂多而魄少以其聞道而能以理折情故也故魄為鬼之因鬼為魄之果魂為神之因神為魂之果因果精而魂魄鬼神之說明若鏡中見眉目耳夫何疑哉至於三魂七魄之說此衆人也魂多而魄少此君子也唯聖人無魄而惟神故其生也生不能纍而其死也豈獨有纍耶故曰妙萬物而無心謂之神又曰聖人無復夫無復者謂性外更無情可治也如有微情不盡終非無復故曰微塵尚諸學明極即如來又曰一切浮塵諸幻化相應念化成無上知覺即此言之則易之為書也深矣妙矣楞嚴之為經也妙矣深矣昔張無盡謂我讀佛經然後知儒是以非窮理盡性至於命者則魂魄鬼神之說始終逆順之淺深精而粗之粗而精之因之果之千曲萬折解情釋縛異其名言同其義理是而非之非而是之無疑處使之生疑有疑處使之無疑此聖人之深慈君子之苦心也學者不可不知焉示宇泰放光石說天下疑信之生不生於事則生於理故生於事者惑乎理矣生於理者疑於事矣以此觀之信理而不信事信事而不信理所謂信非真信疑非真疑也惟即理而信事即事而信理者豫又何言哉若夫孔陵之蓍草奘老之摩松事以理推理以事究情與無情之異皎如日星此石六稜而鋒鋭體質光潔映日流輝産於峨嵋而他山無之說者以為六稜以表六度鋒鋭以表精進充三學而統萬行體萬行而治衆習習治則即事成理即理成事而遍吉之德備矣夫峨嵋盤礡千里空翠接天絶巘奇峰倚伏萬狀豈星星之石而備衆德耶曰一花可識無邊之春勺水可分圓滿之月彼既如是此獨不然與似完齊說聖人不以長蛇封豕為患而以一身為患其憂亦深矣如章臺帶水阿房連雲極游觀之樂至死而不能返者可不哀哉松陵密郎知身是患不重厚生唯不重厚生凡百所治特似完而已故堂不圖高內不圖實茆茨可以蔽形饘粥可以糊吻以古硯古書素心貧骨薄金張之榮淡然自富紫柏道人適避風雨於斯喜其朴實所緝有野人之風題曰似完齊書此遺之交蘆生書千字文說夫畫本未畫未畫本於自心故自心欲一畫欲兩畫以至於千萬畫畫畫皆活未嘗死也何謂死活曰若見一畫即謂一畫見千萬畫即謂千萬畫是謂知死而不知活惟知活者畫雖無盡曉然了知機在我而不在畫也即如六十四卦三百八十四爻如一卦有常一爻落死則變化亦有窮矣唯其卦卦無常爻爻本活所以周流六虗上下無常情之性之鬼之神之往復莫測隱顯若惑先天而天不違後天而奉天時設不知活烏能臻此哉故蒼頡覩鳥跡而悟字母梵佉婁不煩感而悟字生於心雖文成橫豎而詮義未始不同焉如鳥跡而變大篆大篆變小篆小篆變隸隸變楷楷變草草則復幾乎鳥跡矣何異中竺而變四竺四竺而變胡胡變夷乎故曰通其變者始制者也因其變者乃衆人耳雖然始制幾聖衆人幾愚有能因畫而悟未畫因心而得悟心噫未畫畫母無心天地萬物之祖既知其母復得其祖則愚可以為聖聖可以同愚故曰大智若愚豫覩交蘆生手書千字文其字畫起伏縱橫變化有條而又不死於法果書者之能品耶孝侯諡說晉周孝侯逢大敵欲𢬵命一戰同僚勸曰將軍母老矣戰而不捷太夫人將安托乎孝侯曰我為大臣必盡臣節今日之事既為人臣安知有母哉遂戰歿朝廷嘉其忠諡曰孝侯由是觀之忠孝本一條學者以為孝是孝忠是忠作兩條解之非也大抵以我見前之心盡力事親謂之孝盡力事君謂之忠心無異心忠孝者名焉而已故達心者洞了忠孝為一狥名者橫執為二剛說夫子不剛不能孝臣不剛不能忠至於榮辱死生之際不以剛為地即為其眩惑不遑自持矣然剛亦未易言也必先於聞道聞道則識見高明即能了知天地萬物古先今後皆我自心影響影響由心而有心由影響而彰而影響現時衆人見之計天地萬物為大小計形器虗空為有無計一器所聚之塊為我身計前境所生之影為我心自此則靡所不至矣豈可以言說窮乎故曰剛也者五常性命之本也動靜說皮毬老人問黃龍孫曰昔人即動而靜其義安在孫曰靜在動上老人指座前牡丹徵之若此花芳穠時零落時豈非動乎謂芳穠自住芳穠零落自住零落以兩者各住謂之靜乎兩則非一一則非兩兩兩一一一一兩兩譬如夢中見花開謝見花謝開開先謝後謝先開後謂皆各性住於一世即謂之動上即靜此愚者之談也智則決其不然何以故開謝先後離夢不可得故夢非自有必因想生想非自有必因未想有未想不自有必因想顯所以未想為想父想為夢父夢為花父花為開謝父開謝為動靜父言靜在動上者復為動靜子子之言棄本太遠烏足徵之觀戲處處相逢是戲場何須傀儡夜登堂繁華過眼三更促名利牽人一線長稚子自應爭詫說矮人亦復浪悲傷本來面目何曾識且向尊前學楚狂此陽明傀儡詩也紫柏先生曰陽明之看戲戲亦道師衆人之歡樂何異傀儡故周穆王之怒偃師偃師析其傀儡穆王始悟非真人也今天下無論古今或衣冠相揖男女雜坐談笑超然若以頃刻散心回觀我此身果籍何物而成耶設必由五行而有五行生克無常能有我者尚無常況所有者乎如是觀身身不異戲則偃師所作寧非廣長舌相哉卓吾天臺聞卓吾有年數矣未遑一見適讀耿子庸傳始心見卓吾也卓吾謂天臺子以人倫為至卓吾以未發之中為人倫之至以故互執而不相化殆十年所乃今始化其自敘如此夫人倫猶波也未發猶水也執波為至固非矣執水為波之至寧不非乎良以已發外未發則已發無源矣必謂未發至於已發則未發似可取殊不知已發未發皆不可取皆不可舍者也如已發可取何異離水求波也未發可取何異離波求水也已發未發既皆不可取又皆可舍乎故曰取不得舍不得不可得中只麼得若然者卓吾天臺始相執而不化洎相化而不執何異太末蟲自取自舍於火聚之上耶古德有言曰死水固不可藏龍活水亦豈藏龍之所蓋就假龍言耳如真龍則死死活活在龍而不在水矣夫龍之為物也處空若水觸石則石化為水觸林木觸火皆不旋尾而化即此觀之謂空可取則太虗有剩矣謂空可舍則太虗有外矣空為色影尚不可以取舍倣佛之況有大於此者乎卓吾卓吾果真龍也耶果葉公之所畫者耶問本亭本不可問可問則非本矣何以故本不問本故如本可問何異水洗水金博金哉雖然善問者以未嘗問而問之答者亦以未嘗答而答之昔有僧問馬祖曰離四句絶百非請和尚直指西來意祖曰我今日勞倦不能為汝說問智藏去藏曰我亦頭痛不能說問海兄去海曰我却不會僧乃見祖舉藏海語祖曰藏頭黑海頭白僧亦懡羅而退天童頌此機緣堂堂坐斷舌頭路應笑毗耶老古錐吾味天童此頌乃知文殊問維摩不二意摩以默答之此則有問有答者也天台崑巖鄭居士萬歷壬寅冬曾問清淨本然之旨於紫柏道人道人曰居士機緣未熟熟後再問不遲噫夜光投人鮮不按劍翻思藏海不覺扼腕癸卯春冲禪人還國清寺紫柏道人先有問本亭偈寄居士且囑冲曰為居士搆一亭於國清泉石幽爽處榜曰問本以見道人不忘居士問本之意也落日懸鼓衆生根鈍執重耳目似具聰明心實聾瞽聖人知其如此開之以名言不可即名言寓其方所示其象物此所謂以情博情以境奪境始則鑄我成物終則會物成己然苦相多端若不親嘗知苦不易既知苦已即苦推樂樂雖不見理考不虗由是信力堅固作之不休終必克願懸鼓大義不過如此餘觀雖多方委曲調攝修習淺深次序歷然難混惟有志於出苦者用力不苟終必精深方知真慈初心也三界說夫一天地之閒有四大洲東曰神州西曰賀州南曰部州北曰盧州而其疆土不知幾千萬里按七政分野推之亦自有里數然南州人壽唯百歲富貴亦不大崇高東州則人壽二百五十歲富貴崇高固勝南州多矣以東州較西牛賀州則西州人壽五百歲崇高富貴復勝東州即西州較諸北俱盧州又天淵之不同也蓋北州人壽千歲中無夭折而富貴崇高可謂至矣若較諸四天王又不啻醯雞之匹大鵬耳乃至他化自在天之富貴匹諸初禪喜樂猶野人以曝背之暖獻萬乘之君由初禪天而至非非想層級轉勝下不如上大相懸絶也若以聲聞天眼視非非想壽命之與富貴崇高辟如朝生暮死之蟲沾滯涕唾焉今南州之人率以富貴自恃年華不惜從生至死昏擾欲夢曾不暫覺苟能以三州匹己以四王匹三州以非非想天匹夜摩忉利則南州所謂富貴崇高自恃視百年為長劫者可不悲夫故曰以法眼觀三界依正之報不啻獄囚豈欺我哉讀素問吾聞得般若菩薩能於一切法中得大自在由是觀之在儒而為明王聖師在老而為真人神人在佛而為大覺世雄在百家為其長各建旗鼓而鳴於世者皆菩薩之示現也豫讀黃帝素問至其略曰粗守關上守機機之動不離其空空中之機清淨而微其來不可逢其往不可追知機知道者不可掛以絲髮不覺置卷長嘆是書也非聖人莫能作焉豫以是知得其空者可以治其風得其風者可以治其火得其火者可以治其水得其水者可以治其地故地浮於水水資於火火憑乎風風載於空故得其空者造其微矣微則不可以朕兆求不可以將迎會若然者湛神於空徹視其形部分經絡腑臘淺深猶處堂奧而照萬有奚惑哉故良醫知守其機而會其微神游無滯靡細不察地惟四塵水則減一火又減一風則一而已矣一則纍輕故力用超乎三者地之堅水之濕火之燥風之動凡有所偏而不均調者病矣空則非四者之所囿故得空者始可以主乎四也四者有主猶民之得君民得君而世弗治者未之有焉雖然得空之微能治有形不能治無形能治無形非得心者莫能也故曰空生大覺中如海一漚發所謂得般若菩薩者是也金舌三目夫自心靈通而循緣成相故金舌和尚截舌以進唐文宗舌猶哦經如故帝異之遂諡金舌和尚焉蓋以火鍛之而成金色故也三目高僧左臂一目視物遠徹世多異之殊不知人心本靈以五欲封蔀故靈用弗顯夫大悲菩薩有千手千眼鬼車之鳥九頭異情由是觀之聖凡猶一指之屈伸耳指喻自心屈伸喻用故觀音善用自心而千手之執千目之照亦大海之一滴太倉之一粟也鬼車以不善用自心受斯醜報悲夫雖然蚯蚓截而兩頭動蚊蟲唼而一心驚知此者可與言金舌三目之異矣蘆芽夜話記過自古及今凡作史官者身及子孫不罹人禍必犯天刑蓋人為萬物靈雖賢愚不同轍不過大槩耳其心曲隱微之際賢者未必無一失愚者亦未必無一得大都世教檢人賢否斷然弗能徹照既弗徹照則落筆注人豈能無誤每見宋儒多犯此病惟出世大雄始能無蔽所以然者蓋此老三惑圓斷六通滿證眼徹無量世界耳聞無量世界鼻舌身心一一虗靈徹照無遺譬如軒轅懸於太空六合四維十方三世一塵一芥靡弗洞然自此老而降凡天下賢愚交遊淺深人情反復傷心動念皆不可私定臧否蓋大家處在無明窟中豈無差謬歲丁亥豫與蘆芽妙師燈下偶及世故不覺談一二交遊短處既而思我非如來安知無誤書此以記吾過寄聚光洞微作時文說如風在帆風不可見而帆飽舟行此可見者也如地中有泉所以能産百穀泉不可見而百穀秀實可見者也如春在花春不可見而花可見者也如水中鹽味水可見而味不可見惟飲水者乃知之耳如色裏膠青色可見而青不可見如日出銜山月圓當戶一半可見那一半雖不可見決知非無也如空生處即是色生此真實語然衆人但見空而不見色情封故也八者悟其一則餘皆等矣如汝等作時文既謂之時文此須我就人者也若待人就我便非時文矣然我就人須就而不就則無所不就矣惟無所不就所以人雖不欲我就不可得也然人不得不就之者蓋有不可見者存焉今人作文可見者有餘而不可見者索然苟能於不可見者以可見者為之紹介如雲中龍頭角雖不露而中自有神此皆僞不掩真真亦不掩僞故也故文如雲我意之所寄如龍倘懷抱不虗靈而欲我意如龍之神未之有也夫養懷抱端在以理治情情消則寸虗若青天之廓布文章自秀朗矣此之謂以我就人人雖欲不我就不可得者也戒貪暴說古以為官為家為公器故曰五帝官天下三王家天下今之人上焉者以為官為家為恥辱下焉者以為官為豪客爵位為緑林公然建旗鼓操長蛇封豕之矛而吞劫百姓習以成風天下無怪以此觀之則以為官為家為恥辱者乃救時之良劑也盜賊以緑林為藪兵刃為權則易捕設以衣冠為藪爵位為權則難擒故莊周云聖人不死大盜不止良有以夫雖然恃柄而劫生靈飽賂而藏軒冕上則聾瞽君之耳目中則同袍相為扶護下則百姓敢怒而不敢言殊不知生靈為國根本劫生靈乃所以滅君也君滅則爵位誰與衣冠誰主若然者則盜賊自窮其藪自削其權矣嗚呼人為萬物之靈不為聖賢而甘為盜賊必至藪窮權削而終不悟可不謂之大癡極愚乎法王人王說夫大道夢而天地分天地分而萬物生萬物生而受氣強弱之不同苟無王以主之則強凌弱弱受凌而弱者不能並生於天地之閒矣昔堯讓天下於許由許由惡聞而洗耳說者以為為巢許易為堯舜難堯舜當兼善之任圓通萬物之情設有一物不得其所雖南面樂不能解其憂此何心哉若巢許持獨善之見享獨善之福視天下若敝屣以形骸為大患薄外而厚內此又何心哉梅西子持兩說折衷於紫柏先生曰堯舜與巢許孰得孰喪先生春然應之曰皆得皆喪梅西子曰先生言實未解乞先生揭示曰子知有世出世法乎易形而上者謂之道形而下者謂之器故主其道者為法王主其器者為人王堯舜人王也其所設教惟尊天故每臨事必稱上帝即巢許亦皆尊天惟佛氏以法性無邊際設教以所性為封疆以九有為臣民九有者地獄餓鬼畜生人修羅天聲聞緣覺菩薩是也而匹以堯舜巢許之所教猶蹄涔之匹滄海也然人王惟一而法王則四有藏教法王有通教法王有別教法王有圓教法王藏教法王修空觀而斷見思通教法王修假觀而分斷塵沙別教法王則空假中三觀次第而修能斷十二品無明證分真三德至圓教法王則究竟三德三觀齊修三惑圓斷所謂皮煩惱肉煩惱骨煩惱圓斷無遺直登妙覺而歸於無得嗚呼此大道夢而天地分所謂由清淨本然而忽生山河大地者也蓋根器有小大迷悟有淺深於是藏通別圓不得不設而為四究之四即一也故聖人有冥權有顯權以冥權準之堯舜巢許皆不可思議者也若以顯權準之則堯舜巢許皆六凡之數也楞嚴有七趣雖神仙之徒亦六凡所攝寧堯舜巢許乎夫凡之與聖染之與淨非無生也皆緣生也而緣生之中趣萬不同皆夢也非覺也苟能從緣生而入無生則覺與夢皆覺矣莊周曰有大覺而後知大夢大覺者無醒無夢皆龜之毛而兔之角也今人每將方內之義以責方外之賓由未明乎人王法王之道故也使責者果知世出世道則亦各率其教而已又何責之有哉有土為之長謂之人王有道為之長謂之法王土有形埒則尊有所不尊道無邊際則無所不尊者也是故鐵輪不若銅輪之尊銅輪不若銀輪銀輪不若金輪金輪雖尊又不若帝釋與梵王之尊此皆就土形埒廣狹而尊者也惟法王之尊自凡及聖包無并有統十虗而無遺御萬有而無敝以道無邊際故無所不尊也無所不尊則不可以人主之法繩之矣故不土而君不爵而貴者謂之方外之賓今人必欲以世主之禮法羈紲方外之人至於羈紲之不能則便欲毀廢其教是以晉桓玄摛辭欲折遠公遠因其折徐申其理而玄怒為之頓銷豈假口舌以諍之哉理不可屈故也故人王以仁義為理法王以性為理仁義乃情之善者也易曰繼之者善也成之者性也即此觀之謂善繼性可也謂善即性不可也辟如謂子繼父可也謂子即父不可也蓋情有待而性無待也苟能緣情而復性聖人謂之逆性復而開物聖人謂之順故知順逆之理者則人王法王有所不尊無所不尊皎若日星又何待辨皮孟鹿門子問答客有號皮孟者謂鹿門子曰朱新安不識佛心兼不識孔子心孟擬作一書以駁之子以為何如鹿門子曰建安沈內翰著書十四篇雖論解辨之不同然駁世儒不識佛心者罄矣不獨駁新安也子又何駁哉雖然內翰之駁新安豈內翰能駁之乃新安自駁耳孟聞鹿門子語愕然曰凡所謂駁者必有一人駁一人方始成駁譬如兩掌拍則有聲孤掌則不能鳴也子謂新安自駁僕實不解願先生諭之鹿門子曰大槩立言者根於理不根於情雖聖人復出惡能駁我若根於情不根於理此所謂自駁寧煩人駁歟夫何故理無我而情有我故也無我則自心寂然有我則自心汩然寂然則感而遂通天下之故汩然則自心先渾亦如水渾不見天影也況能通天下之故哉聖人知理之與情如此故不以情通天下而以理通之也凡彼此勝負皆情有而理無者也朱新安不識佛心與孔子心乃以衆人之心推好佛之心何啻天淵相隔哉蓋衆人不善用其心日用何往而非情聖人了知心外無法則心無所待所以我隨理化而物亦無待故物物皆我我我皆物以物通物以我通我理徹而情空則何情不可通哉譬之水無自相所以隨器而方圓矣新安以情立言建安以理立言以無我而攻有我則攻無不破苟以有我攻無我我尚不有誰當我攻豫故曰新安自駁非建安駁之也皮孟子聞鹿門子之教再拜而稽首曰理之攻情何情不破情之攻理誰當其攻雖聖人復生不能易子之言也方便說夫天地之始若使有名則名名者其誰哉又謂天地之始本無名殊不知無名待名而有也故天地之始不可以無名名不可以有名名有無之名既窮則有無之實不待召而至矣實至則名不能惑名不能惑凡天之高地之厚萬物之多寡欲名其無名則無名欲名其有名則有名以至亦有亦無名非有非無名皆我名之也孰得而使之哉噫有使使者我嘗疑積不散不散則聚聚則一一則精精則通通則無疑矣乃知名也實也形也聲也心也皆蘧廬也非主人也或曰敢問主先生應之曰汝即主汝不知所以為客汝一日知之客未嘗非主也問者不解且跪而請曰解此有方便乎先生曰舉扇類月搖樹訓風以龍譬乾以馬譬坤而扇之與樹龍之與馬豈果風月乾坤哉但取其能譬四者耳子知此方便在子而不在我如子饑即索食渴即索飲饑之與渴是子之饑渴耶非子之饑渴耶是子之饑渴子當求子饑渴之前者是子乎非子乎若饑渴非子則索食索飲之情從何而來哉子能痛察於饑渴是非之閒一旦心開主人覿面此即子之師也即子之方便也雖然先生有一方便又方便外之方便耳子能深思而得之則天地萬物皆我四肢毛孔矣故曰悟心之人無壅不進如若未悟無通不壅物無壅通壅通在我我能悟心大地非塵我未悟心虗空棘林子果有志於道當精熟此篇字說覺林字說萬歷壬辰春王正月甲子日自清涼山擕諸法侶謁晉陽方山李長者遺像還道青石村休於寬師禪房其法孫通香者字蘊空余謂二三子曰夫蘊者積聚義也四大積聚名身四蘊積聚名心有身則大患至矣有心則衆擾至矣惟有道者視有若無視色即空當積聚處洞見積聚非有也譬如氷水焉方水之為氷也則謂之積聚能視氷即水氷豈有哉知此乃可以寂寥於萬化之餘動用於一虗之中矣若然者蘊不能自空必覺後始空也然覺支有七焉所謂擇法覺支精進覺支念覺支喜覺支猗覺支定覺支捨覺支簡邪正別真僞謂之擇聞道而力行謂之進進而不雜專注不移謂之念念熟有得心廣體胖謂之喜喜而不狂謂之猗猗者安也安而神凝乎象帝之先謂之定定而不戀泛應曲當開物成務謂之捨是以凡夫葑蔀於積聚不遑縣解榮之辱之名之利之死之生之憎之愛之如醉夢不醒也二乘廢積聚而縛於枯槁沉空滯寂以為至樂笑傲松泉目視雲漢聞苦而不哀見難而不救蕭然獨善其身不念同體也兩者固聖凡不相若也然究其病源奚啻避溺而投火哉故大覺聖人以焦芽敗種火宅癡子呵之不亦宜乎通香來前吾語汝凡夫固可厭二乘亦勿取宜以大菩薩為心始不墮斷常坑耳茲以覺林字汝蓋取諸李長者華嚴決疑論萬行以七覺為體七覺支以根本智為身之義香其勉之思微字說一微涉動境成此頺山勢一微塵裏轉大法輪靈山會上世尊拈花飲光微笑初微之與二微二微之與三微名雖同而實不同焉初則三假之始終次則依正無礙唯末後微笑此笑中有刀也故因成不覺至於相續相續不覺至於相待嗚乎心本無生因境而有者此非因成乎由此觀之因成即覺無生不遠因成不覺勢必流於相續相待也故曰初居圓成現量之中浮塵未起後落明了意根之地外狀潛形所謂圓成也者即因成之初有覺存焉謂之圓成者圓則極成則住極則變住則壞亦自然之勢也所以達者知此能不遠復若流入相續相待則遠之甚矣可不慨哉思微來前思一微涉動境耶思一微塵中轉大法輪耶思飲光破顏微笑耶此三思微隨根悟入所以果熟香殊也如能悟一微而得三微此上根也如三微次第悟入而得自受用三昧者此中根也如一微難入非下根而何又有沒量漢用三微而三微不能自用故能遇緣即宗生殺自在如此流類則非宗教所能管轄又非天魔外道可能親近唯有緣者觸著磕著無不瞥地思微來前吾問汝微之始有微乎微之終有微乎微之始有微則微不生微微之終有微則微不終微始終推微既皆無地豈有兩頭無微而中閒獨有哉思微能薦此則一微涉動境時境既無待微自何涉作此觀察是名正觀不作此觀邪觀無算剖塵字說夫空藏一粟芥塞大千衆人之所疑也兔角施名龜毛立號至人之權也疑則悶悶則死死則無我無我孰為緣主緣主不有即物而虗虗能靈靈而通通則變由是而觀衆人不疑緣心不死緣心不死前境有敵敵則不虗能所抗立於太虗空中蠻觸恣肆一怒萬尸靡所不至於是虗者弗靈靈而通者權變乖真故曰微塵不剖大經終隱微塵一剖經褁虗空謂之有耶虗空名負謂之無耶經稱實虗所以淨名口杜如來喪言雖然一真失覺萬惑雲興苟非明而勇者以恆繼之則一塵之固崑崙莫喻其堅長夜莫喻其黑剖塵當念人為萬物靈茫茫業海榮辱交爭年光易邁流芳難捉不幸失手既沉弗浮剖塵勉之曇生字說夫曇則不生生則不曇而曇而生墮字義成所謂懸河墻壁枯木花榮鳥但聞聲人惟聆響是以隔江搖手頑石點頭宗教濤驚聖凡交濕有分者悟在迷先白拈者覺非過後曇生禪人頗知忌諱入鱉腹而再出犯龍鱗而得生有佛處無故成仇無佛處有心作惡黃河雖險親曾洗耳少室未登亦解安心達觀道人愛其風致殊常行藏峭拔復以鱉餘警之曇生當痛勉焉照如字說心若不生何物為待凡有所待必因念萌譬如影必從形離形覓影紅罏片雪徒實虗名故曰一生二成此由性而情也又曰若虧其一必喪其二此即情而復性也雖然由性而情誰知所始即情復性誰知所終若曰知忘則始終匪得則二乘不必回心向大矣若曰既有所始必有所終始則名生終則名滅生滅未滅自心非圓惟圓乃如如則照生猶若止水生澄天光雲影無不洞然此乃果上之德用也豈初心者能之哉今以照如字若若當照果修因因非生滅因圓克果果非自然嗟乎因果之妙世所罕知直以報復言之殊不知黃面老人設此圈匱本破斷常迷執初不為報復設也報復乃旁義耳或曰宗門以戒定慧閒家具老漢大沒巴鼻喃喃以因果為繩索束縛後學豈古德標格耶余曰來前為汝注破其人亦知手腳惡匍匐而遁去金了生字說高山出雲無盡以其本虗故也遠水同天無辨以其本清故也夫人之生也直直生虗虗生清清而虗者謂之本不傷濁而礙者謂之傷本矣是以了緣生即無生者始覺之功也昧無生而奔緣生者不覺之咎也嗚呼始覺與不覺果嘗有性哉不覺有性則始覺奚生始覺有性則本覺奚冥紫柏老人放浪江湖有年數矣閲人固不少然而能達無生者亦不多見有新安金氏樂生者與老人遊從最久故其於緣生無性之旨閒嘗有所悟入也惜乎不幸短命而死行其所知不克其功所以光大者不遑現乎世今其侄字了生者老人蓋望其了亡叔所未了之公案也了生當痛勉之始不負老人之望焉且功名之與富貴貧賤之與吉凶譬如太虗塗彩浮雲過眼能幾何哉夫緣生擾擾從生至老百年旦暮一息不來復何醜好故曰境緣無好醜好醜起於心心若不分別好醜從何起以此而觀則一心不生萬緣頓泯離心之外覓絲毫許緣生了不可得喚何物作好醜耶了生果能了此始堪駕無生之舟泛緣生之海無擇朝夕來者恣其先登豈可以有心勘其有緣無緣者哉如高山出雲遠水混天果有心乎果無心乎清乎虗乎一乎二乎有知乎無知乎有知則分別未亡惡能契同無知即同木石復何貴之昔人有言曰萬物皆賤唯道至貴所以王公大人遇之則失其富貴輿臺皂隸遇之則忘其貧賤雖然外水無天離山無雲又離水無波離波無水貧賤富貴果一物乎果兩物乎紫柏老人唯解穿衣喫橫眠倒臥寧暇分別同異而同異之辨付之了生為我了之玄藏字說自摩竺入震旦為義學蒿矢達磨來文物為玄學前茅義則可以名言求玄則不可以知識得既不可以知識得則諸方衲子號稱玄學者終無所得耶昔有僧問尊宿曰寒暑到來向甚麼處回避宿曰向無寒暑處回避僧曰如何是無寒暑處宿曰寒時寒殺闍黎熱時熱殺闍黎則曰垂手還同萬仞崖正偏何必在安排琉璃寶殿藏明月忍俊韓盧空上階津禪人派通名津字玄藏或以問紫柏先生先生曰獅子蹴人韓盧逐塊子若薦此喚玄名藏亦可指藏名玄亦可如不薦此義乃玄則不藏藏則不玄又曹洞家以黑象正位以白象偏位正位即知識不可得者偏位即臨濟家人境俱不奪者故曰善財參遍處黑豆未生芽由是而觀謂玄名黑謂黑名玄謂玄名遠謂遠名藏無不可也法華曰法花經藏深固幽遠無人能到又曰是法非思量分別之所能解先生故曰謂玄即黑謂黑即玄謂玄即遠謂遠即藏謂藏即非思量者以此雖然道不虗行存乎其人義學玄學初非兩藏由智識而入乃名義學離情識而悟乃名玄學如亮座主見馬祖而乎大事此非由義而玄乎如晦堂心玄學透徹復從泐潭精楞嚴大意此非由玄而義乎津禪人苟薦寒暑之機玄亦可義亦可如未悟此生齊戒持律講誦經書崇飾塔寺真積力久一旦觸事而真道豈遠乎玄藏勉之常如字說夫天不常高地不常厚人不常靈如是則天不如天矣地不如地矣人不如人矣三才為萬物之統而皆不如獨萬物如乎哉然而如者何為也良以吉凶悔吝紛然而至本自如也此如在天可以為高在地可以為厚在人可以為靈在萬物可以各遂其所生今有人於此如不如則常不常不如則乖真不常則纍物真乖而物纍謂之顛倒故二乘顛倒醉於空寂凡夫顛倒醉於愛欲皆非如也茲以常如字某人當於吉凶悔吝之中死生得失之際心光弗昧終始常如則此說名當其實矣常如勉之金仲堅字說夫正金精而最堅者莫堅乎黃金故金堅也性以不改為義不改亦堅也茲金生姓金名性字仲堅豫徐而觀之則知金生志在堅之又堅猶恐未堅復字仲堅以堅之堅則堅固矣如以易道觀之則艮之又艮艮之又艮者也艮之又艮則身不獲而庭無人矣況又艮之艮哉夫身不獲則我忘庭無人則物忘我與物兼忘則身雖有物雖在未嘗有身與物也身與物既未嘗有則我之姓名與字獨有耶且心外無法何法非心心本妙物而無纍者也妙則泛應曲當無纍則超然而無待也此艮之止也昔人有言曰死水不藏龍此病艮之又艮者也蓋艮止也止則足矣而止之上又止之此何異死水乎即此觀之艮之又艮不但死水而已死水而臭者也豫故易金生之名名耀易其字字仲如耀則照與寂會如則寂與物通照與寂會則智周萬物而不勞寂與物通則形充八極而無患也雖然知之易而行之難行之易而證之難證之易而忘之難忘之易而用之難凡求無上菩提者苟不知五難之精粗橫謂一念不生全體自現何煩瑣瑣而廣求哉殊不知博則能約不博而約者非約也橫莽也故宗門大老悟心之後必皆遍遊諸方參求知識淘汰見地以圓差別豈無見而然耶蓋根本智固已發明而差別智未圓則根本智之用終是不全差別智圓則本智之用始全也故曰全機大用又禪門自曹溪之後馬祖與石頭諸老以謂自拈花微笑以至曹溪而拈花之機變而為義理窠臼使神而明者死矣於是翻然復義理而為禪機也使狂慧與夫世智辨聰揣摩之徒苟未到智訖情枯之地終不能會神而明之者也嗚呼江西石頭此心何心哉是不可思議之深心也而或者反謂禪家慣設隱語以欺人何失言至此耶良以己眼生盲遂謂舉世不覩日月也豈日月之咎乎盲者自咎耳仲如倘知此則生盲障翳豈不可抉之哉仲如勉之無所字說震旦鼻祖少林壁觀九易寒暑有號神光者斷臂求祖安心祖索光心光諦思少頃索而無物對曰覓心了不可得祖曰與汝安心竟於是光斷臂謝祖昔人為法忘身今汝之求不下昔人夫覓心可得則有所覓心不可得則無所明矣大槩所之所生必由乎能能之所起必由乎所心苟不安能未忘故能未忘者以有所故所之為咎能為媒故覓心無得則所無媒所既無媒能豈有妁往返推究能所都遺知都遺者復為都遺之能都遺成所亦勢然也莫若一心不生根境陸沈有所無所不生之影影不自生則生乎形未生為形已生為影影可見而不可捉謂有可乎形則可捉矣嘻無可捉則兔之有角龜之有毛截角為弓以毛為弦以無我為箭張而射之有無之鳥喪是時也有所耶無所耶無所來前吾語若若身假四大而成若心託前境而有四大是身何物非身哉前境是心心豈有無無所若能痛而思之思極情忘情忘則智枯智枯情忘則所者在無所不在紫柏先生矣無所勉之
