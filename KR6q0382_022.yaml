body:
  text: 明憨山德清閲雜記一日于比部言一屠牛者牛將屠忽跪而求生淚墮不止屠不勝怒遂刺其兩目牛死未移時屠剔牛肯綮刀忽躍刺其目斃焉嗚呼萬物一物也萬神一神也故以大道觀之天地我伯仲也以天地觀之萬物我伯仲也我戕伯仲則伯仲戕我何尤哉蘇長公跋張無盡清淨經曰作止任滅佛言四病無盡言作止任滅是四法門長公則曰無盡若見法門應無是語紫柏老人試拈問麟郎麟曰兩頭不著老人曰尚未信汝再道看麟則崖柴笑而已老人謂麟汝見車輪否能引重致遠千里往復輪若掩地則一轉不能也汝知此謂四病四法門果是兩頭語然汝還缺一籌者殊不知即兩頭耳夫龍之為物也隱顯莫測變化無常以故世多奇之殊不知有豢龍氏者駕之若牛馬驅之若犬羊夫復何奇豈非有欲則易制無欲卒難馴耶豎而趍者靈出萬物謂之人設有欲亦弗靈矣昔有鸜鵒效僧念佛久之一旦無疾而化既檢其餘燼得舍利若干粒燦然奪目聞而未知奇者將非黑業酒醉父母撼而未醒乎當湖有僧誦法華經有年數矣一蝦蟇聞經聲忽作拳跽狀者移時衆見怪而厭之少頃若禪坐撼之已息斷矣達觀道人聞而奇之以為法華會上八歲龍女能獻珠得佛獨擅其美而斯蟲復能數千載之下追其芳躅是不奇又孰為奇夫茫茫宇宙人豈少哉人弗能而蟲能之則有愧於牛馬多矣雖然誦經不誠音難悟物覩蝦蟇而後信誦者之誠也我聞唐修雅法師曰佛之意兮祖之髓吾之心兮經之旨合目冥心仔細聽醍醐滴入焦腸裡若然者則是蟲豈非醉醍醐而熟睡者耶達觀道人乙酉歲之伏牛山道出滁陽遘丁太僕時方炎暑與二三法侶納涼於滁之龍泉寺一時田侍御并鄒鍾二司馬俱問法於道人道人應機率性適忤鍾司馬司馬大怒威作百態道人未能以慈心三昧攝伏之終有愧焉使鍾君邂逅於今日必以道人為春風主人矣惜其即世早無及此緣也龍泉元封相去八十餘里故結夏焉寺主東州與杜生善道人於是始識杜生將七易寒暑矣田侍御兩司馬較諸二善友雖顯晦未始同條然皆識道人於乞食之初可無念哉乃今惟杜生不遠千里謁道人於曲阿于生之別墅余甚感之乃囑杜生曰汝識吾面莫若識吾心汝識吾心莫若識吾無心之心識吾無心之心又莫若識汝之本有心識得本有心雖復輿臺走卒軒冕莫若也如未識之急須識取豫登峨嵋往返幾三年以貪觀山水鬚髮不暇剃除遂成頭陀焉既至曲阿于觀察北園時比部為地主常熟繆生吳江周生並在豫以暑熱乃剃髮而留鬚髮幾四寸許以一囊紅花裹而藏之擕至清涼授開侍者寓清涼半載除夕鬚亦剃除亦授開侍者惟左右鬢命衆鬮之時一蘆運禪人得其右一微淵禪人得其左葉航江禪人鬮畢特請於余曰願得分少鬚髮供養豫覩其眉宇真色藹然乃分向授開侍者所藏髮一束與之雖然老漢以十方世界為一縷髮且道全身向什麼處安著以十方世界為全身且道一縷髮向什麼處掛著道得亦三十棒道不得亦三十棒如何即得不受棒去咄雲山萬疊水潺湲窣堵稜層頂如削嘉靖初蒲之萬固寺背七里許峰巒攢秀處有古剎曰讚嘆其中老納義秀者溫里人精進敦實日課阿彌佛十萬餘聲朝夕無閒五十餘年矣至於經行之所磚砌成漕或穿及底人試補之久復成漕今猶在也初有貧寒子不能自活來依秀秀納之久之見其動靜弗佳因呵曰汝真賊也無何果約其黨乘夜擊秀初擊秀稱佛聲猶洪再擊稱佛聲弗斷然亦微矣因死亦當垂絶之際佛聲不斷至於股折能跏趺而逝非五十年志氣堅強徑正烏能至此又有白居士者亦往來蒲城傭役得值不擇僧俗悉施與之一日灌園汲水忽遺身心鼻息乎絶有老嫗不知其定多方強救之醒七日旋定如初後遊陝定於盩厔冷廟中將九十日村人謂其死也而埋之嗚呼秀老精進而取殺居士禪定而活埋皆多生夙殃也五祖演和尚一日云我這裡禪似個什麼如人會作賊止一子其子一日忽問云我爺死後我却如何養家須學個事業始得其爺一夜引至巨室穿窬入宅開匱教兒子入其中取衣帛兒才入匱即鎖却父乃尋先竇而去其兒子在匱中計無所出故作鼠嚙聲其家點燈開視匱才開賊兒聳身跳出人不及措手得脫隨趕至中路賊兒忽見一井乃推巨石投井中追人却於井中覓賊兒直走歸家問爺爺云你且道怎生得出兒具說所以爺云恁麼却儘做得萬曆丁亥冬余結制蘆芽禪餘無事偶與主人妙師閲及此篇妙師捧腹笑而淚下余問何故若是妙師曰我笑中有痛余又問痛甚事妙師曰痛他父子情忘始做得賊余感妙師知言故録之迦旃延有慧辨善說法要於大衆中以解行稱第一常宴坐樹下有外道來問曰以我觀世人但有此世更無他世可得然乎迦旃延曰今此日月為天為人為此世為他世耶若無他世則無日月矣外道俯首如是轉折幾十而外道情枯智訖遂歸依之或者問佛迦旃延富樓那皆有慧辨何故佛曰渠二人多生修無我觀故曰修無我觀何以得慧辨佛曰汝不見鐘鼓乎本無心念而隨叩隨應以其內本空故也問者始解嘉靖閒夔州萬縣象鼻岩下有一庵禪師書華嚴經一日日暮殘陽已沒尚徐徐書之不已侍者報曰日光久沒何書經不止禪師聞則伸手不見指矣嗚呼本有常光無擇凡聖瞥爾情生暗相現前余追思一庵之精誠於書經之際此光忽露因綴之以偈曰筆頭無火夜生光了了徐書經幾行幽鳥一聲啼緑樹東風吹散百花香此偈余忘之矣適萬縣福城庵行行上人詣吳請華嚴經聞余書法華於金壇於見素之墨光亭特過信宿燈下偶及此豫憬然因再綴之以偈曰萬縣吳門共一天書經誰後復誰先夜深偶舉陳公案這段常光又現前松陵丁慈音言及金剛經應無所住而生其心句師拶之曰如何是應無所住而生其心丁生惘然師曰汝問我我為汝說丁生唯然師忽擊几一下問丁生聞否答曰聞師曰此非而生其心又問丁生汝聞時是有心聞無心聞答曰無心聞師曰此非應無所住既而師復說一偈曰木魚打得頻怕痛忽生瞋汝若知痛處禹門度金鱗丁生名法鱗解易先天有常則後天何始後天有常則先天何復唯先天無常而後天始開唯後天無常而先天可復也如伏羲未畫之先豈無易哉然非伏羲畫之則天下不知也豫讀蘇長公易解乃知六十四卦三百八十四爻雖性情有殊而無常則一也何者乾若有常則終為乾矣離自何始坤若有常則終為坤矣坎自何生故乾坤皆無常而離坎生焉至於一卦生八卦一爻生六十四爻不本於無常則其生也窮矣此就遠取諸物而言也如近取諸身則一身有四體手與足也總手與足而數之不過二十指就一指觀之可屈可伸若指有常則屈伸之路塞矣若屈伸有常則指終不得復為指矣吾以是知先天之易初無有常則後天之路不窮也後天之易無常而先天之途本自通也苟性若有常情何從生情若有常性何從明唯性無常則道可為器也唯情無常則器可復為道也聖人知其然所以即情而復性而不廢耳目之用即性而攝情而本無物我之纍也所以開物成務多方變化使天下沾其化而情消性復者如春陽之在萬物物無不化也如嚴冬之藏萬物物無不復也然易有理事焉性情焉卦爻焉三者體同而名異何哉所在因時之稱謂異也苟神而明之理可以為事事可以為理則性與情卦與爻獨不可以相易乎哉如易之數爻情是也如易之理卦性是也數明則吉凶消長之機在我而不在造物也理通則卷萬而藏一雖鬼神之靈陰陽之妙亦莫吾陶鑄也卦名大有蓋一陰而居尊位備有信順尚賢之三德而羣陽心服自歸之故名大有也唯初九處遠而不能通五故若有害也九二位與五應陽以柔通三以陽居陽位勢可以通天子復有上九冥而援之則其通上豈不易哉四則近五而三又非強梁者則專而附五矣而五自知柔不能獨立得上九而附之五既附上又能容四與三二乃本配專輔五而不憚勞可信也以此觀之初九雖則處遠其陰被五之德厚矣未有被其厚德而不懷報者也豫以是知一陰五陽而陽服其信順尚賢之德併甘心為其用也不亦宜乎我觀易之噬嗑乃知人之情若水火也蓋水不至下則不止也火不至空亦不止也以下與空水火之極也如噬嗑之初九惡六二之乘已也怒而噬之由膚而至鼻而六二以至柔之德自持以中正之道自安恬不為介意然終非初九之福也故天道損有餘而矜不足也又六三之惡九四乘已也亦怒而噬之是不知九四六五皆至堅而難噬者也六三由是而力窮矣然九四六五不推六三之力窮亦併力噬之則六三也欲敵之則力不勝欲安之則心不甘唯懷毒而已然則六三之力窮乃九四六五之福也九四六五皆堅而難噬則又六三之福也而六三得福不知唯懷毒焉可謂愚而陋矣若九四六五果知六三之有毒噬而能止則九四六五得福亦多矣唯上九也處噬之終不知戒而以噬為事則處終者凡噬之禍並歸之矣其荷校滅耳不亦宜乎嗚呼唯君子玩象而得意得意而知戒持理而折情情折而理充理充而日造乎無我之域故有犯而能容容則大大則無外無外則天地萬物皆可以範圍之豈可當噬嗑時我無術以禦之哉夫井不自井由人而井故井雖不可改而可夷也然井不自夷亦由人而夷即此觀之井夷不夷井潔不潔皆由人而已井何預哉故井無得喪而人有往來汔至則瓶入井而未得水未繘則瓶得水而未出井如繘而出井則有功而無凶未出井而羸其瓶則有凶而無吉也然皆存乎人不由乎井井唯應之而已又卦不自卦合六爻而後有卦爻亦不自爻分一卦而後有爻然合六爻而為卦則心在而情不存矣分一卦而為六爻則情在而心不存矣夫情果有情哉心果有心哉但應物而有纍則謂之情應物而無纍則謂之心故情與心名焉而已若其實也亦存乎其人耳故曰周流六虗上下無常無常者情也六虗者爻也爻乃虗位忽吉忽凶皆情之所致故曰吉凶以情遷設一心不生六虗不遊則應物而纍與無纍者全矣全則謂之卦卦則無我而靈者寓焉爻則有我而昧者寓焉心則又寓乎卦爻之閒故可以統情性統通也蓋善用其心則情通而非有性通而非無故老龐曰但願空諸所有甚勿實諸所無良有以也艮其背不獲其身行其庭不見其人此十四字本一義耳蓋人之有我以有身也身之有人以相待也身既不獲誰復我名我既無我人又誰見吾故曰此十四字是一義也咸之四爻吾知之矣如有心而應之終不甚光大也無心而聽天則未光者亦光大也噫吾才生心則性變而為情矣性無我而靈故能通天下之情情通則無事不吉不通則有我而滯故以之圖事吉亦變凶也一日文待者問余咸艮之旨余將拄杖擉其足失聲呌疼余徵之曰汝知咸艮之旨乎對曰弗知余復示之曰汝知之乎汝若不虗擉即不應汝若不止擉亦不知唯止資虗所以應之不窮唯虗資止所以智之不倦所謂咸艮者在於日用非在語言文字也智鑑曰一心不生萬法無咎廬山曰一微涉動境成此頺山勢豫聞二老之言久矣然終不大明了及讀易至漸卦始於二老之言了無所疑蓋卦寓性爻寓情如一心不生萬法無咎者即卦之意也如一微涉動靜成此頺山勢者即爻之意也大都一心不生則吉凶無地一微涉動則吉凶生矣故漸之六爻一微未涉之初有其位而無其人一微涉動之後則有是位而有是人矣唐李長者以漸卦六爻寓十信升進之意蓋十信自初至十皆以生滅心聞法悟解以解始染尚屬生滅未入無生滅位至入初住則分得無生滅矣豫讀易繫辭至在天成象在地成形變化現矣處覺象與形皆在在之籧廬而非在在象象形形者也如得在在象象形形者則象象形形一指之屈伸耳噫金之未銷也塊然而已及其既銷也則融然而已然外塊然而求融然外融然而求塊然吾知神聖亦無如之何也豫觀易至泰卦不覺掩卷長歎久之夫大壯之與夬卦當是時也小人愈衰而君子愈盛矣然而聖人獨安夫泰者以為世之小人不可勝盡必欲迫而逐之使其窮而無歸其勢必至於爭爭則勝負之勢未有決焉不若獨安乎泰使君子常居中而制其命而小人在外不為無措然後君子之患無由而起噫聖人之見遠矣後世君子不體聖人之意一得其位必欲盡逐小人飽快所懷殊不知君子小人邪正不同固雖天淵然而共以天地為父母天地之於子也賢不肖豈不自知哉知而容之以為既生之矣以其不肖而逐之則父母之心亦有所不忍也但當使賢者制其命不肖者聽其令則君子不失包荒之度而小人亦得以遂其所生若必欲盡逐小人而都用君子雖聖人復生不能行也知不能行而強行之謂之悖天之民苟使其人得其位行其志而國家元氣不至大壞蒼生不受其荼毒未之有也銘樊城仁王寺建大雄殿銘蓋聞西方般若一名而含多義中國無一名多義之名以翻譯之故存梵而略華也般若有文字有觀照有實相三者同名實異苟得其實名豈能淆又般若有八部惟仁王般若乃波斯匿王首問釋迦如來護國祐民之法波斯匿又名月光月光所問之經總八千餘言言言本於五忍而五忍之立蓋凡有國有家者不以為前茅則七大不祥相繼而起不祥起復不以五忍禦之則社稷亡矣又梵云般若此翻智慧良以一切不祥皆生於愚癡故君愚癡則失臣臣愚癡則不忠父愚癡則不慈子愚癡則不孝桀紂幽厲愚癡之尤也堯舜夷惠智慧之首也襄陽府樊城仁王寺建自宋景定閒迄國朝中廢而楚唐襄三王僉謂寺以仁王名必有謂既而訪之高人勝士乃知名本於經於是併力重建適逢世廟龍飛漢水易名仁皇焉萬曆辛卯屬有不淨火龍怒而浴之殿廡灰燼而楚唐襄三府主以為茲寺也我先王所建於是復并建之嗚呼波斯匿王為五天之長不以出世法為問而問世法護國祐民之具苟非夙植善本有大智慧豈能即世閒法而明出世法哉經以仁王名蓋旌其德也而楚唐襄三王亦並夙植善本繼月光之業而世為金湯豈偶然乎殿成禪客乾公從余問訊曰寺不幸而火浴之又幸楚唐襄三令主不忽祖宗之志復同鼎建敢乞先生一言光三主之德豫曰某人微言輕曷敢當此且楚才地顧擕布鼓於雷門公愀然久之復率住持等衆再問訊曰敘事記土木不無其人若夫考名審實暢般若之玄旨非師筆恐不大快余曰諾夫心外無法文字性離文字性離則觀照微密觀照微密則所謂無思而契同者得非實相而何大哉般若一名多義孔得之而治六經述春秋老得之而二篇作子得之而立論王通得之而作經李翱得之著復性之書新建得之揭良知之訓雖然有真般若有似般若真般若者了色即空了空即色故不死於枯稿不蕩於情波了知而修故修無所修以修無所修所以當境緣順逆之衝習染消而我無所修也似般若則解而不精忽修以逞見一旦危疑交至解失而氣喪境奪識情事敗醜布遺笑千古此逞相似般若之咎也凡一切黑白倘有志於般若者苟不能精義入神以致用不惟負我迦文聖人實負波斯匿王與夫楚唐襄三王世世金湯建寺之德銘曰寺名仁王緣起月光五忍之立立銷不祥自西而東法傳華中襄陽樊城是有禪宮宋景定閒實始創焉綿歷既久三王扶顛子孫繼護金湯彌堅龍飛漢水仁皇易題堯天佛日萬古光輝般若一名多義所存檢名審實妙不可言密在汝邊在我即粗離我我所翠竹真如火龍浴之殿堂灰飛三王併建波斯之遺豫願吾曹顧披方袍戒根清淨地産靈苗鬼神呵護梵剎堅牢晨昏祝聖地久天長舜田秀實覺樹花香世出世法光洞八荒凡有心者根塵頓忘靈𦦨熾然共徹真常足軒銘有引夫大道不癡無夢夢非獨有以癡為媒遡流窮源本末洞悉順而不返狼頓有無是以善觀者富有天下而無受貧等餓夫而有餘故小人絶窺上之心君子無多求之玷置三才於末世發大曉於重昏出者若魚投春海處者如獸老雲山禮樂用而不知日用運而忘照公忘私私忘公公私相忘如心忘身不見有餘不足誰待不足生足足忘不足始能惟足惟軒足乃充十虗而常愜軒乃示萬有而常無地待空浮水隨天到四時豫奪一念雌雄花茂園林草芳岡阜進退魚鳥坐臥得之者則頭頭自在失之者則處處乖張玄黃勞其目力好惡搖其心光當足而不能足足為欲師當軒而不能軒軒為我主名實難欺根塵易昧故去來無常賓主互用粗妙在人軒惟嚆矢銘曰一念不生諸塵無待光景無邊豈須錢買七情熾然蔽虧本天烟雲起滅以馬作船載諸顛倒狂醉寧了聲塵萬端枕上失曉聲色無匱匱惟耳目耳目無主主者不足惟無我者衆妙簇簇兼善一切獨立無欲足軒銘有序愚讀過秦論知賈生進退英雄雌黃強弱意獨在秦餘者不過倚數而已由是而觀秦已過矣然不知足至於鞭山填海希冀長年社稷且不為子孫有況他哉博浪離椎毫不醒悟既而陳勝吳廣之徒掉挺崛起秦為之板蕩今麟郎於此土階茅茨粗衣糲食出不為喜處不為憂借風月以陶情假詩書而理性於四部洲中六天之下較秦所逞乃太倉稊米耳於六天中有天曰兜率此言知足嗟乎知足則茅茨土階雖瑤宮金屋不能過之不知足雖處九天之上若在溝壑雖然有身而無心榮辱誰知有心而無身苦樂誰受身兮心兮一報之蘧廬橫謂我有自是靡患不至矣若然者身心猶非我有始為知足況身心之外者乎古顏氏之子墮體黜聰合於大同大同則天地非大塵毛非小即此而言知足待不知足而名如無不知足則知足亦毛焉而已雲門大師有函蓋乾坤句截斷衆流句隨波逐浪句三句一句得失在人此又足軒之證據也銘曰三句一句達人自知足軒之舌風行水瀰麟室銘有序龍為鱗蟲之長虎霸千峰之中獅子為百獸王哮吼震衆至於腦裂鳳凰飛鳴羽蟲雲從麒麟之性不受羇繫仁而無欲東西自如無欲近剛仁則近慈惟剛唯慈乾坤乃備用九用六出入自在故麒麟出聖人生焉麒麟死聖人悲焉嗚呼剛以慈濟威而不猛慈以剛克寬而不濫兩者不虧聖德乃全聖人初人明勇自強千屈不折終至邁常在鱗為龍在羽為凰在毛錯變異其行藏今以麟名子室子念人初碌碌童稚屯蒙未詳一旦啓正靈竅發光以明明德即心作佛言有異同義無中邊善思則無書不經不思則無經不書書記姓名經常無變變者受滅不變不生不生之心斷常莫侵百工技藝觸處行深老龐有言日用無別惟我偶諧諧則佛魔受役況其餘乎銘曰龍之與虎水陸疆土獅子麒麟各遵其路鳳凰飛鳴羽蟲生光麒麟産野瑞符聖王在物既然人當自強君子小人初無常種情理相攻勝敗漆桶楞伽之洲梵川之島鷗閣凌虗窗吞月曉此室麟名小子無驚佛魔在握以理治情佛智泉銘佛智深渺能消熱惱飲從眼入動念枯稿蒼石之下雲林之杪湛然本狀神會可了覩影知渠我惟顛倒兩存無功靡往非道鵬沙彌塔銘有序鵬子少為書生含毫弄舉子業及學為古文詩賦精陰陽讖緯之術皆臻其奧又以宿習現行復知歸敬大法既而游學燕京觸事感懷遂決剃染瘦骨稜層抱喘疾破積雪不怯嚴寒深雲而登清涼於萬曆辛卯十一月望日訪道人於妙德庵中遂克初志明年四月十日奄然而逝嗟哉俗壽三十二歲僧臘一百四十五日道人哀鵬志有餘而壽不永特銘之銘曰抱志未克死生變更耿然一念有願必成古之今之何殊晝夜晝夜之辟一指高下尻之與脊本無中邊求其兩端以黃為玄鵬子了此匪滯假真以誓為轂轉大法輪骨埋嘉福雞園爭秀舊佛新祖誰左誰右鵬其有靈當處速鑑三際同時普振清梵宛平縣資福寺開山守心端禪師塔銘有序師名鎮端字守心族姓陳世本山西潞安府長治縣師生多禎祥鄰里驚異弱不好弄風骨卓羣年十二依黎城縣洪福庵瑞禪師之高足惠忍為受業師居無何棄去登伏牛禮補陀既而入代之五臺山謁二虎禪師一見器焉為嗣法弟子及還故山瀋王聞而敬之延住資福禪院給供甚勤師一日曰大丈夫不出家即當以仁義輔弼明主澤流遐邇出家則當精深宗教徹法底源闡揚佛祖之道俾博地凡夫彈指登聖以報佛恩始不慚為男子顧吾於二者之閒一無所有瀋王雖勤厚濡滯一方莫能廣飯方來終非鄙志於是復棄去來燕山宛平縣盧溝橋東茆茨採椽聊為諸方息肩之地亦額資福者示不忘瀋王也資福西南隙師穿大井一口置石漕六方發願曰無論黑白愚智人畜凡有知者沾我滴水食我粒米同生阿彌陀佛國中無量壽覺親為授記登不退轉雖然以師受性嚴冷不喜阿世即豪貴臨門不少屈故自某年至某年施者簡寂常住荒寒師力抱枯淡歡接方來了無倦色或不堪其憂師曰自要弄這迦陀勤苦淡泊不為世采我分耳復何尤王恭妃亦聞其風而敬之遣中貴易茅茨採椽為金碧師方暢志樹功德幢為聖天子祝延聖壽徼福蒼生逮於萬曆二十年冬十二月預謂門弟子曰我明日行矣積年勞勤施主使我成就行門我去後若輩當併心常住無乏方來粥飯我死猶生也至期果端坐而逝諸檀信僉謂師預知時至倍加歸向焉師生於嘉靖二年某月日卒於萬曆二十年十二月日僧臘五十七世壽七十三門弟子依天竺法闍毗其願身歸骨於南岡之塔達觀道人諡師號曰普慈塔曰願光嗚呼禍福莫烈於死生而端師不為之撓超然脫去大患不能留難雖古之所謂豪傑之士挾仁義佐人主建大勳名垂芳百世至於臨死生之際軟暖不堪貽天下笑由是而觀則端師豈不為大道人者哉銘曰凡有知者皆為欲馭生因欲乘死因欲去唯師異此去來乘願勞勤死生不為欲販自生至老老而愈壯周濟一切始終匪兩樹塔南岡普為諸方生資以食死以骨藏燕山可磨願力靡竟無斷僧臨死之命兒孫念之勉強力支如盧溝水長流無贏吾君長胤母曰恭妃聞師德風篤信歸依師其有靈保此英檀福壽無疆萬世奠安為佛金湯廣建道場龍象蹴踏日月彌光野人之心淺而弗深赤抱盡剖鬼神鑑臨銘刻貞石天地同脉形有代謝心無今昔大悲菩薩多臂多目解并銘世疑大悲菩薩臂目廣多互相驚怪蓋不以理察橫以情觀苟以理察之則人人自信不暇豈獨疑於大悲乎如我一身之眇毛孔八萬四千布植森如六尺匪狹正當毛孔森顯則一身弗留一身現前則毛孔皆隱隱顯互換而一多歷然適此之時豈不有非一多之數所能牢籠繫綴者存乎若環輪之無竟應萬物而無窮大悲獨有而我獨無此情也非理也故以理應目則象帝之先我得而徹視也以理應耳則八荒之外蚊蚋之音我得而徹聽也我常靜坐忽然身心都遺耳目無邊遠近情化古今夢破始怪大悲臂目甚寡而世猶疑為多不亦癡乎雖然南人不信有千人之帳北人不信有萬斛之舟蓋其信情而不信理故也殊不知禍福死生物我廣狹古今代謝清濁浮沉皆情有而理無者也倘能以理折情則近取諸身遠取諸物皆我臂與目也若然者提挈四生智周萬有初非勇與明所能預者也銘曰本一精明暫應六根應而不返望流迷源大悲菩薩教我觀音不以耳聽目視禪深禪深莫測一六陳跡錦繡芻狗既陳勿惜一為無量無量為一事理無成慈及萬物循業發現我本平常三十二應塵剎放光若出有心菩薩病狂鼻祖東來眉山奇才大悲閣記揑聚放開卷舒自在理徹無礙桄榔林中長公放賴熊羆虎豹視以儕輩出怒入娛了不驚怪吾生公後知公三昧得自禪老語言黼黻曄若春花春容衒態不善觀者離花覓春春不可得泣岐沾巾文字語言道之光華何必排擯始謂不差韶石銘視端神凝牧豎在郊尼父見之悟其聞韶愀然鞭後至則樂凋不以耳聞音鳴寂寥初無古今寧有近遙是石舜心連雲岧嶤丁南羽結緑現銘混沌之精昌溪之骨南羽得之象罔不識玄池天啓彩筆龍遊彈指之閒諸佛雲湧莊嚴淨土熏炙羣生若見若聞當處解脫誰促大地成此片瓊囊括十虗現諸希有須彌為舌難盡贊揚口即大虗渾吞不出丁氏諸子互相寶之譬若眼珠明不可失于中甫宋端硯銘由天而人由人而天太古之色中有玄泉雲出無盡魚龍可眠若人得之造化同堅臥牛硯銘溪山無盡春草有餘饑渴弗擾憨臥超如毛頴為鞭一聲觫然頸尾屈伸蹄角柔堅噫鶴背輕危龍背滑歸來牛背穩如船孚泉硯辭修誠立信貫金石卓錫泉飛臥氷鯉出用無聖凡名有黑白甘冽異常孚翁血脉瓢銘納十方之虗不為大勺四溟之水不能溢實濟渴之勝具乃補饑之妙器其餘滴餘粒可以飽龍蛇足虎豹是為鉢之良輔獨高菴銘爽塏之陽卜居斯祥風度疏林香濤琅琅飯訖無事讀天竺之章閒或得意身世都忘本真揭露雲淨月光散步庭除薜衣清涼城市焦煩一刻十霜王侯兮若夢爭如落魄而徜徉竹瓢銘若之為物兮堅而有節虗而能容雅分溪邊之月閒挂石上之松偕而老兮萬壑千峰雲笠銘原本缺文頭上笠人不識譬如片雲覆松梢夜鶴歸來巢莫覓無巴生傳無巴生自言生於青草灘灘即姑蘇之松陵今之吳江也豫從無巴生遊甚久每於無巴行藏所忽之閒音聲笑貌之際與夫習氣動靜徐而察之似非青草灘人蓋無巴受性超放不耐世故於習俗繩墨了不相拘豫嘗規之無巴笑曰子奚不檢名而審實耶名檢則實審實審則名不虗名不虗賓即主也主即賓也物與我皆不得已而受形於天地之閒倘不達此則何往而非有待乎夫有待則有纍有纍則孔隙不待鑿而不可勝數矣吾嘗歷觀有待之大槩不出乎地水火風空見識七大而已如以自心觀七大則七大有名而無實矣方此之時且問子大火聚中為吾拈得一莖眉毛出乎豫曰不能無巴舍然大笑曰子雖從吾遊甚久然不我知若是謂之相知可乎子不聞龍樹有頌乎諸法不自生亦不從他生不共不無因是故說無生即此觀之有生則有我有我始有物脫求以名實之相外名則無實外實則無名吾故曰賓即主也主即賓也賓即主則主未嘗主主即賓則賓未嘗賓主未嘗主賓未嘗賓則我與物物與我不待觀空而始蕩然也故曰會萬物歸於己者其惟聖人乎如我有己則物豈可會乎如物有物則物亦不受會也所以有待顯而無待隱矣無待既隱則地以堅為孔隙水以濕為孔隙火以暖為孔隙風以動為孔隙空以無形為孔隙見以照為孔隙識以分別為孔隙皆不得無巴鼻者也如以自心觀此七者則地未嘗堅水未嘗濕火未嘗暖風未嘗動空未嘗無形見未嘗照識未嘗分別若然者謂七為一可也謂一為七可也七若可一則七未嘗七有待隱而無待顯矣一若可七則一未嘗一無待隱而有待顯矣吾以是知有待與無待初皆無性也如曹溪佛性無常諸法有常之說亦此謂乎故吾以自心觀九竅與六根我實未嘗有也然九竅六根不妨用而不廢我實未嘗無也有無路窮凡聖情斷子謂我有巴鼻可乎如木生也直人生也靜直則無私無私則無我靜則無擾無擾則本虗虗則靈靈則妙既妙矣有巴鼻可也無巴鼻可也雖然莊周謂七竅鑿而混沌死吾則曰孔隙鑿而巴鼻形所以鈎索得而祕之矣今吾一受形之後六根九竅巴鼻太多於是乎聲色鈎索於外好惡鈎索於內吾本無巴鼻者始不得自由矣故以無巴字我者陰借其名而鞭我後也子亦何疑而私察我耶豫聞無巴之義乃稽首謝不知之罪無巴曰罪本無性何謝之有哉豫不知答而退
