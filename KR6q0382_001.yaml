body:
  text: 明憨山德清閲法語釋迦文佛以文設教故文殊師利以文字三昧輔釋迦文而用揀擇之權於楞嚴會上進退二十五聖獨選擇觀音當機無有敢議其私者觀世音雖彌陀輔佐亦以聞思修入近乎文字三昧故釋迦文佛亦退三十二億恆河沙菩薩獨進觀世音豈非此方真教體清淨在音聞歟若文字三昧不以音聞為體是猶花不以春為神豈真花也哉蓋文字根於音聞音聞根於覺觀覺觀又根於無覺無觀者佛意欲一切衆生因有分別心入文字三昧因文字三昧入音聞之機因音聞之機入無覺無觀無覺無觀既入則最初有分別心至此不名有分別而名無覺無觀矣夫無覺無觀者所謂正因佛性也正因佛性既變而為情苟不以了因契之則正因終不能會也了因雖能契正因若微緣因熏發之則了因亦不能終自發也緣因即文字三昧之異名也了因即音聞之機之異名也學者苟能觸類而長之則文殊文字三昧與觀音音聞三昧皆不在文殊觀音與釋迦文佛在我日用而已故老龐曰日用事無別惟吾自偶諧神通并妙用運水及搬柴柴水即老龐文字三昧也神通即老龐音聞之機也惟吾自偶諧即老龐了因契會正因佛性者也即此觀之凡佛弟子不通文字般若即不得觀照般若不通觀照般若必不能契會實相般若實相般若即正因佛性也觀照般若即了因佛性也文字般若即緣因佛性也今天下學佛者必欲排去文字一超直入如來地志則高矣吾恐畫餅不能充饑也且文字佛語也觀照佛心也由佛語而達佛心此從凡而至聖者也由佛心而達佛語則聖人出無量義定放眉間白毫相光而為文字之海使一切衆生得沾海點皆得入流亡所以至空覺極圓寂滅現前而後已若然者即語言文字如春之花或者必欲棄花覔春非愚即狂也有志於入流亡所者當深思我釋迦文以文設教所以然之意如其明之即文字語言可也離文字語言可也如其未明即文字與離文字皆不可也非即非離亦不可也師曰娑婆世界與十方衆生世界皆根於空空復根於心故經曰空生大覺中如海一漚發有漏微塵國皆依空所生第衆生膠固於根塵之習久積成堅卒不易破故諸佛菩薩先以空藥治其堅有之病世之不知佛菩薩心者於經論中見其熾然談空遂謂佛以空為道榜其門曰空門殊不知衆生有病若愈則佛菩薩之空藥亦無所施空藥既無所施又以妙藥治其空病然衆生膠固根塵之習雖賴空藥而治空病一生苟微佛菩薩之妙藥則空病之害害尤不細世以佛門為空門者豈真知佛心哉或以曹溪本來無一物何處惹塵埃之語橫計於心便謂我本來無一物又有何塵埃可染請自審察我既本來無一物人舉手揖我我隨喜人以手㦸我我隨怒現前喜怒又何物乎如此物不能直下𪹼破則礙膺長劫有在敢謂橫計者本來無一物即曹溪之本來無一物乎佛菩薩說法如良醫用藥如良將用兵藥與兵豈有常哉但察病人與敵人情之所在何如耳苟得其所在之情則藥與兵如庖丁之解牛矣故世以佛門為空門及掠曹溪本來無一物為自己本來無一物者皆刀折而牛未解者也佛菩薩知衆生迷心而有空迷空而有身心迷身心而有前塵前塵即世界之屬身心即衆生之類然世界與衆生離空則無有根空離覺心則亦無根故佛菩薩教衆生始以解空終以悟心心悟則空與世界衆生皆不可得所謂大覺心者譬如浮雲相盡不待舉目而明月在前矣浮雲則空有之譬明月乃喻固有之常光耳或進曰由塵而達根由身心而達空由空而達心乞師指某甲只今心在何處師笑曰汝若無心設此問端又是何物進者罔措師曰將心問心指心不知心是汝錯是梅西錯曰是學人錯曰汝若果知自錯則汝行裏坐裏饑裏寒裏境緣順逆是非裏能不忘此錯則空生大覺中如海一漚發有漏微塵國皆依空所生汝有日自知在不惟衆生國土與虗空皆在汝心即大覺心離汝心亦不可得進者稽首而退夫理性之通也情性之塞也然理與情而屬心統之故曰心統性情即此觀之心乃獨處於性情之間者也故心悟則情可化而為理心迷則理變而為情矣若夫心之前者則謂之性性能應物則謂之心應物而無纍則謂之理應物而有纍者始謂之情也故曰無我而通者理也有我而塞者情也而通塞之勢自然不得不相反者也如曰性相近也習相遠也相近則不遠復之謂也相遠則不知復之謂也不遠復根於心之悟也不知復根於心之迷也故通塞遠近悟迷初皆無常者也心悟則無塞而不通心迷則無近而不遠也嗚呼心果何物乎能使人為聖人又能使人為衆人聖人與衆人亦皆無常者也顧我善用心不善用心何如耳心之為物不可以內外求不可以有無測內求不免計心於身內外求則不免計心於身外有求則不免計心於聲色形骸無求則不免計心於寂滅虗空如是求悟心者皆不善求者也故曰離心意識參若然者若攀緣心不歇則情根終不枯情根不枯則心意識終不能離心意識不能離則神不凝神不凝則不一不一則不能獨立不能獨立則有外有外則有待有待則物我亢然故觸不可意事不免勃然而怒遇可意事不覺欣然而喜喜怒交戰寤寐無停要而言之不過總為心意識搬弄壞了也故真參學者寒不知寒饑不知饑勞逸相忘形如枯木心如死灰方此之時知得心意識無坐地處如是積久一旦根塵逈脫常光現前至此則心之內外有無非內外有無皆憑我說雌說黃皆自然與修多羅合所謂閉門造車出門合轍是也古德有云不是死中發活一番終是藥汞銀觸火必飛去矣又曰不是一番寒徹骨怎得梅花撲鼻香此皆親證實悟之樣子也年來禪學與道學之徒初不知心是何物便潑口談禪孟浪講學一涉危疑便喪膽亡魂被境風吹壞了娘生鼻孔作不得一些主宰實不如三家村裏一丁不識不知但種田博飯吃人也龍樹乃九地菩薩其破四性則曰諸法不自生亦不從他生不共不無因是故說無生如嗜欲淺而天機深者一聞而能思思而能精精而遺聞聞遺所脫所脫則能消能所既蕩雖處於境緣順逆之中應而無纍則多生種子現行日損一日損之又損終至於無損忽然契同由是觀之則前之所謂根塵既消者與夫忽然契同者果一耶二耶一則前不是後二則舍前無後而學者不愧推四性之不精反疑龍樹之偈無譬病重而不耐服藥見病不去遂大怒而罵藥無也夫治身病必以神農為藥師治心病亦必以龍樹為藥師舍神農本草雖華陀扁鵲不能治身病而學者欲治心病不以龍樹破四性之偈治之欲其病愈亦未之有焉此偈豫初聞而駭既而疑因痛思不已用之境緣順逆之際多敗績敗愈多戰愈力自是敢戰而𢬵死豫始勝噫要知盤中飱粒粒皆辛苦若是種田人聞此必淚墮後生小子理惑心浮不知慚愧業必不消病難坐愈加以聞誨生不受善之心甘作護短之金湯嗚呼哀哉我知龍樹復生耳提面命不遭病者之唾罵無有是處夫利刀出匣光芒耀日削鐵如泥凡梓楠松柏經其斫削必皆成器此善用刀者也有等癡人刀雖快利惟用割泥泥無所成器刀刃日損此不善用刀者也譬如衆生心性本妙不以定慧觀照惟縱攀緣奔塵莫返流浪生死幻苦愈深了無出期此豈善用心者哉如利根上智以心性之光照破根境兩俱無性定慧功成即塵勞而得解脫即情識而達智光如是用刀得非剖金削玉凡所成器堅完不壞滿盛甘露遍灑一切凡沾滴許熱惱清涼得無量百千三昧皆非外來以心性本有故也故曰善用其心八萬四千煩惱即八萬四千三昧不善用其心八萬四千三昧即八萬四千煩惱嗟乎刀本無二善用則無割不成不善用者刀日就損夫光有真妄真則照萬古而無待妄則粘六塵而發光故曰離暗離明無有見體離動離靜無有聽質通塞離而恬變喪則嗅與嘗如糞中香氷中火合離離而生滅滅覺之與分別則有名而無實矣然塵之與根必相資而有相資而無故因境生心謂之粘妄發光不因境生而孤明圓照始謂之無待之光無待則內外之情空有待則內外之情封情空性復情生性迷故物能轉物者物為入路之資所以情不煩遣而空也老龐曰我見石頭始得目前萬境俱融又曰日用事無別惟吾自偶諧蓋此老以了知為火燒空根塵有待廢而無待全全則無外無外則更無纖塵為我障礙者也曹溪聞客讀金剛經一聞應無所住而生其心即根塵解脫而靈光圓此謂之見道未明道也故曰尊其所知則高明行其所知則光大比來學道失宗見道與明道多混談而不清甚且不免認情為性所以長沙岑大悲哀而說偈曰學道之人不識真只為從前認識神無量劫來生死本癡人喚作本來人此實為天下認情為性者頂門針也夫夫乃男子之稱有男子之稱而無男子之實所謂假男子而實婦人也如曹溪初本賣柴貧漢一聞金剛經便直下無疑此真奇男子也夾山回頭船子命斷則子疑父而父不得不翻船矣光甫汝既發心持金剛經於憎愛榮辱交加之際若不能以曹溪所悟者痛治現行則有待之情終難復性性不復則三塗一報五千劫乃光甫所當憂者光甫勉之示光甫漢大傅疏廣上疏乞骸骨帝賜黃金二十斤太子贈五十斤廣歸里中日令家供具設酒食請族人故舊賓客相娛樂歲餘金將盡廣子孫勸立産業廣曰吾豈老悖不念子孫哉顧自有舊田廬令子孫勤力其中足以供衣食今復增益之以為贏餘但教子孫怠惰耳況賢而多財則損其志愚而多財則益其過且夫富者衆之怨也吾既無以教化子孫不欲益其過而生怨於是族人悅服又龐德公釋耕於隴上而妻子耘於前荊州刺史劉表指而問曰先生苦居𤱶畝而不肯受祿後世何以遺於子孫乎德公曰世人皆遺之以危我獨遺之以安雖所遺不同未為無所遺也表嘆息而去二翁皆世諦之賢者其所見高明如此吾曹為出家兒不乞食自活而貪人供養橫受非禮究其咎之所自不過圖穿現成衣吃現成飯耳夫惡勞好逸人之常情衣不天降飯不地涌一衣一食皆必出自勞勤人勞勤而我安享之計欲久享而無患者無有是處疏仲翁本漢廷老臣賜金而不敢獨享與族人共之即其子孫亦不得有吾曹既處四民之外乞食以資殘喘則外四民其誰為我檀施哉檀施雖士農工商之不同然寸絲粒米皆出於勞勤也其勞勤而得之而歡然惠我者為欲求懺其罪與增其利益耳倘我有僧之名無僧之實必不能自利利他他生異世須改頭換面為畜生身酬其惠施始得如閻羅老子許汝滑稽軟頑瞞得他過則天堂地獄五福六極之說皆妄語也如來聖人豈為此妄語誑衆生耶且飲食男女人之大欲於此四者之中果然立得腳跟定何必避城市居山林乎此就上一等僧說蓋其佛知見已開佛悲願已發故也如此種僧豈有供養之而不能雪罪與增利益哉若佛知見雖未大開悲願雖未大發但能誦佛之言稍解其義依解修行此種謂之中等僧如但誦佛言不能解義惟恐玷法門勉強守戒此種謂之下等僧此三種僧雖淺深不同皆非有名無實者若人恭敬供養必罪消福長夫復何疑外此三者皆髠民非僧也汝向來雖祝髮而於僧之實曾反思無愧否僧實有愧則外侮之來實自取之故老人特舉西漢疏仲翁東漢龐德公兼上中下三種僧說以示汝汝當刳其心忘其形痛哭讀二三十過則後來做好僧從今日始示隆東華嚴寺了凡豫讀東坡觀音贊乃知東坡非迂儒所能倣佛也東坡以為一身之微八難萃聚何異一絲懸九鼎乎方此之時身不待忘而自忘身忘而世獨不忘無有是處身世忘則根與塵齊喪而無偶根塵無偶識自成智智照靈源所忘流入向所謂火坑刀山猛獸毒藥一切衆苦至此皆我入流之師也故入流不難了痛不痛為難果當痛之際痛究此痛果生於根耶外塵則無根果生於塵耶外根則無塵外塵則無根根乃塵家之根根豈我有哉外根則無塵塵乃根家之塵與根無二無二則一一則無外無外則無待至此喚甚麼作痛若了不徹覺有絲毫之痛豈真無待哉但衆生於此不徹了便與無待血脉斷絶無待血脉斷絶則有待血脉自續矣有待血脉既續橫見心外有法此非衆生以二故一身受衆苦乎苦極光回直照無待無待則無我況有物耶物我忘而照不枯則靈源妙湛遍灑焦枯枯沾甘露槁而秀茂此非若能真不二即是觀世音耶死生回環愛憎為根故我無心則夢中天地人物不煩遣而自空空待天地人物而名我無心時雖空亦無地也人為萬物靈不知此而他知則靈者昧焉所以寒暑迭遷古今代謝榮榮辱辱死死生生皆能劫我也如靈不昧則僞心空僞心空則彼劫我者豈待我建旗鼓然後逃哉人而知此則千窮萬變我應之而不勞矣夫饑而食寒而衣此人之常情也一旦辟穀而服水苟非有大於生死者吾欲求而得之得之則死生雖烈而不能禍福於我如是則水可服也如食雖辟水雖服而情根不枯忍饑妄想則服水不若吃飯為愈耳吾聞服水之源源於智積菩薩菩薩以衆生不得道者昏散纍之服水則饑饑則不能睡不能睡則醒多而睡少也醒多而睡少心持半偈志專神凝而妄想不生妄想不生則身心之執受終將無地矣故曰月在上方諸品靜心持半偈萬緣空緣空則我無偶我既無偶緣豈獨有偶哉噫至此則固有常光寧待生心而現前乎溈山曰靈光獨耀逈脫根塵體露真常不拘文字文字根塵也即此觀之辟食服水初若細事而收功之大如未見獨者難與言也示服水齊佛言凡三寶之地辦造飲食供養佛法僧之所謂之香積厨故辦造飲食者三德不解六味不辨兼自己身口意三業不淨則辦食之所不名香積厨謂之穢積厨矣何謂三德清淨柔軟如法是何謂六味淡醎辛酸甘苦是蓋奉佛供僧之食若不精潔葷穢不揀便失清淨德若不精細甘和稍有粗澀便失柔軟德若不隨時措辦制造得宜忽略縱情兼未供流涎便失如法德又三德若無六味調和亦不成就蓋淡味為諸味之體醎味其性潤能滋於肌膚故味之調者必以鹽為首辛味其性熱能暖臟腑之寒故味之辣者為辛酸味其性涼能解諸味之毒故味之酢者為酸甘味其性和能和脾胃故味甜者為甘苦味其性冷能解腑臟之熱故味嗇者為苦汝等即三德六味諦審觀察了知德之所以然與味之所以然之說加以無我無人無衆生無壽者之心率領六根四肢勤勇善巧辦造飲食奉佛供僧此人功德假使以滿虗空七寶布施無量劫不生疲厭慳吝之心與相較量其功德亦萬不及一何以故三德無闕六味無失此等飲食若觸佛鼻若入僧口如嗅旃檀如飲甘露五內調和百毛暢悅身適心安顯資色力冥資心力色力得資則身康健心力得資則神無擾身康健則進道有資神無擾則觀智易成凡飲食不如法則身多病心多擾身心既病且擾而能精進開悟者無有是處即此觀之修行人之性命實繫於厨中人之手故厨中人三德不辨六味不精謂之牛頭阿旁殺人無外如三德辨六味精更以無我無人無衆生無壽者之心率領六根四肢如法辦造飲食奉佛供僧者謂之大慈悲菩薩故曰三千諸佛皆出在厨中又為常住慳吝不尊賢敬貴當來得餓鬼報為常住破費不察來處艱難當來得貧乏報又辦造飲食六根不謹九竅放肆四肢不淨當來得糞蛆臭蟲報如上所述皆如來所言若聞若見當生慚愧遵而行之愚癡必破般若必開衆罪必消萬福必集現在身心安隱當來得無上道登菩薩位佛言無誑厨中佛子當體佛心出苦有分在示厨夫清淨本然則無方所云何忽生之後山河世界列焉自是則有方所矣方有東西南北之名有名則必有實故西方屬兌東方屬震北方屬坎南方屬離華嚴善財童子遍參知識何故略三方而獨詢南方得非南方離卦在耶蓋離中虗虗則明明則文故曰離乃文明之象也夫文字語言必本於音聲音聲又本於自心之虗靈華嚴四十二字字字包含義理無盡誠以字本於聲聲本於心心乃我固有之虗靈也且此四十二字攝四十二位法身大士因諸大士皆處南方故善財不憚百城烟水境風逆順誓於百尺竿頭更進百步者蓋欲歷盡諸大士門庭故也嗚呼諸大士門庭豈易歷哉苟不能以理折情則死生禍福之關誠不易破即首楞嚴五十五位真菩提路自初信以至等覺金剛道後於四十二品無明重重歷煆無明煆盡而妙覺始圓亦不出以理折情四字良以理無我情有我善造道者能以無我折有我則有我日消而無我日光光則明明則虗虗則靈靈則通既通而靈則我曹求無上道之能事畢矣故善財餘方不詢而獨詢南方者蓋離心之譬也亦心外無法故也既知心外無法則目前萬境頓融萬境融而謂我獨存者則此我何異龜之毛兔之角哉藏子如薦此始知問南非問南也乃問離也非問離也實問心也噫心不見心豈可以心問心耶悟則勿問疑則別參豫讀長沙岑禪師偈始知認識神為佛性以虗空為家鄉者不獨近世有之而季唐時已有之矣蓋此輩但知日用昭昭靈靈之識神便為佛性殊不知唯見性者識神即佛性也而未見性者佛性即識神也即此觀之識神與佛性固非兩物若未見性則識神是識神佛性是佛性斷不可儱侗而混說也如混說之則聖凡不分悟迷不辨聖凡不分而白衣有妄坐龍牀之罪悟迷不辨則衆生邪正不明是故佛祖門中教有性相宗有照用或信性而不信相終陷斷坑或信相而不信性必墮常穽或信照而不信用則情根難拔枉逞口解故溈山訶仰山曰寂子汝莫口解脫或信用而不信照則狂魔入心滅裂因果欺視死生以為知解絶無毫釐之用要在行得一分是一分徒誇知解於死生關頭終靠他一點不得殊不知徒誇知解而不能行固是病若全無知解而滅裂橫行則其病更大故長沙老漢哀愍是輩而說此偈偈曰學道之人不識真只為從前認識神無量劫來生死本癡人喚作本來人蘇子瞻曰君子與小人之心皆正君子與小人之腎皆邪然君子能以理養心故心行而腎從之小人不能以理養心故腎行而心從之心行而腎從之此邪從正也腎行而心從之此正從邪也邪從正則情消而理漸明正從邪則理昧而情漸流情消而理明則心將復於性也理昧而情流則心漸纍於物也心將復於性則坤復乾有日矣心漸纍於物則坤終不能復乾矣蓋乾即理也坤即情也心之為物以理養之則終復性不以理養之則漸將流於情矣情如水故以墜為性理如火故以𦦨為性墜則必墮於污暗𦦨則必升於高明故污暗是腎之氣分高明是心之氣分心常近於理腎常近於情惟性也處於理情之間苟以正學之水澆灌之則靈苗日茂不幸以邪學之水澆灌之則稊稗日長靈苗心之譬也稊稗腎之喻也昔人有言曰取將坎位中心實點化離宮腹內陰從此變成乾健體潛藏飛躍盡由心此詩意謂性變而為情乾變而為離坤變而為坎矣則乾之一陽陷於坤之二陰坤之一陰處乎乾之二陽離心之象也坎腎之象也至人知其如此故窮理盡性則坎之一陽可得復而為乾也離之一陰亦當還其坤也豫以理觀之則坎離既濟之說乾坤反覆之機本自了然何必疑滯而道家者流或以鉛汞名之至於龍虎梨棗嬰兒姹女種種名之者不過勸人於此道苟有志者自然不厭其名相瑣瑣困而求之困近忘忘則馳求心自歇馳求心既歇或於真人謦咳之間一聞千悟則知性既可變而為情情獨不可變而為性乎情既可變而為性則凡人而求為真人亦非分外事也自是情習漸除道心愈固情習既除則離中之一陰將還坤矣道心愈固則坎內之一陽終復乾也純陰消盡純陽復全則能入水不溺入火不焚金石可以直度虗空可以遊行故曰從此變成乾健體潛藏飛躍盡由心雖然此雖易知實難行者也蓋衆生情習純熟如油入苟非至明至勇者欲之出油不亦難哉夫世界實有則終不可碎微塵實有則終不可合今則合微塵而為世界碎世界而為微塵卷舒無常而合碎不昧無常則多一情盡不昧則合碎機存情盡則理有而塗窮機存則情枯而事顯是故大地雖堅觀等輕雲一身固愛了如聚沫形遺則神全神全則念息念息則心有而無生形遺則身虗而有用無生則靈而無我有用則無我而靈夫近取諸身可謂親矣遠取諸物可謂疏矣故衣食親於房室房室親於田畝田畝親於衆有之地今迦文老人呼須菩提而問之曰碎大千世界而為微塵可為多乎須菩提聞末知本以為塵雖有多碎之名初無多碎之實蓋外世界則無微塵故以世界觀微塵塵本無塵以微塵觀世界世本無世嗚呼世界於我可謂疏矣一身於我可謂親矣苟能因疏而悟親則飲食男女之欲豈待宰割身心竭力排遣然後清淨無纍耶雖然衆生自無始以來計四大假合之軀必為我有計四蘊合輳之心亦必我有執著不化堅如大地如油入欲其視堅成脆觀有即無而天機淺者固不易也如徐無鬼一見武侯便能轉其常情故使武侯熾然五欲之中無量熱惱頓化清涼此非我忘而物遺神合而形解者孰能至於此然不若點疏而悟親方省傷鋒犯手之喘即此觀之天機深淺則悟有先後故見過而訟輸於顏氏又知人者智自知者明顏氏非自知之明則過亦不易見非力行之勇則過亦不易訟吾與二三子多生有般若之緣適有此聚秋風既高行色搖搖此別之後志各堅牢自度度人泛舟驚濤一呼而上誰非傑豪三呼不應我涕沾袍念其同體無損秋毫背本逐末竛竮悴憔示弟子夫知廢則覺全知立則覺隱隱則昧昧則無往而非障也至於色之障眼聲之障耳香臭之障鼻味之障舌觸之障身法之障心所以根塵汩然常濁而不清矣嗚呼我之靈臺本來空清以種種障之自是空者不空清者不清空者不空則於無色處橫謂有色無觸處橫謂有觸無身處橫謂有身無心處橫謂有心身心備則死生好惡不召而至焉此何以故以知立覺隱故也夫知也者已發而昧中者也覺也者發而中節而不昧中者也昧中則不和不和則何往而非率情也情有私而性無我故率性則何往而非靈古德曰無我而靈者性也既曰無我而靈所謂色聲香味觸法眼耳鼻舌身意此十二者果有障乎果無障乎有障則有我有我則不靈所以根根塵塵皆成我障唯見性者了知性外無心心外無法以故種種凡為我障者不煩觀空而後空澄清而後清所謂本來空清者如天廓雲布未始不昭然者也覺慈來前吾語汝若果能覺則無往而不慈矣慈則視物之生即我之生不覺則我生非物生物生非我生抗然兩立兩立則分別起分別起則好惡不期私而私矣私則謂我生可貴物生可賤戕物之心莫知其然而生焉此心果慈乎果不慈乎汝若知此則覺自全知自廢覺全則無不照知廢則無不公公則自然無我無我而行慈此所謂覺慈也覺慈勉之示覺慈夫衆人之與聖人初非兩人也聖人人也衆人亦人也然聖人則無往而非率性衆人則無往而非率情率性則惺寂雙流率情則昏散齊騁惺寂雙流則根塵空而不廢能所之用昏散齊騁則根塵障而昧一真之體故我永嘉大師於無門之中開此十門門雖次第理實一條譬之珠雖有數線本一條故心通理達者門無不歷淺深不同然其究竟不越乎理即也天台智者大師有六即之科一理即二名字即三觀行即四相似即五分真即六究竟即此六即精而明之則楞嚴五十五位真菩提路不煩遍探而其要領在我矣覺皮來前吾語汝汝當諦聽此集乃永嘉祖師心髓也始由讀讀而誦誦而持持而精精則一一則獨立獨立則物我平等古今一條矣嘻人為萬物之靈不此精而他精非愚則狂也覺皮勉之示覺皮持永嘉集夫般若有三種所謂文字般若觀照般若實相般若是也又此三般若名三佛性緣因佛性了因佛性正因佛性是也嗟乎娑婆教體貴在音聞有音聲然後有文字有文字然後有緣因佛性有緣因佛性然後能熏發我固有之光固有光開始能了知正因佛性在諸佛不加多在衆生不加少如是了知諦印於心然後於境緣逆順之衝榮辱交加之際以此印光印破諸境根塵脫而常光現然後持此常光普照一切自利利他願輪無盡則菩薩能事畢矣即此觀之娑婆界中苟無文字般若則觀照般若無有開發觀照般若既不開發則將何物了知正因般若所以金剛般若波羅蜜經五千餘言字字放光句句日月又若明燈日月照不及處燈能繼焉是故若人能持金剛般若經者終必見性如曹溪六祖本是賣柴窮漢一聞金剛般若經應無所住而生其心便即開悟又正因佛性如木中之火了因佛性如火發而能燒木者緣因佛性如鑽燧木木雖有火不因鑽燧烟終不生烟既不生安能發火火既不發將何燒木木若不燒終難復土故木也者欲升而不能終升之物也然微土則無木木因土生火發而木化元還於土此木之終也噫性變而為情猶土生木也情熏而復性猶木還土也覺聲知此痛持此經至千萬遍持熟情消情消雲盡則性天廓布豈待覺聲瞪眼然後始見者哉覺聲勉之示覺聲持金剛經眼前世界若果實有則真如未隨緣時世界衆生初皆本無以初本無故終亦無有初始與終既皆無有必謂現前獨有此情也非理也譬如熱時𦦨日未出與日沒皆無此𦦨必謂是水計以止渴此鹿之癡也鹿若不癡安肯奔逐衆生不癡安肯分別故法喻同觀兩頭既無中間豈有理如函蓋合現在何分別分別既不生光消影亦滅逆觀分別時能所夢中雪開眼日在窗夢雪不可得量及所量空根塵初不惡此理也非情也示開先師曰自一精明分成六和合則眼等與六塵和合從無始以來我不能須臾離者也蓋開眼與醒中色塵和合合眼與夢中色塵和合故也即此觀之則六根與六塵和合若醒若夢塵塵相受自無始以來至於今日無有剎那頃而不和合者明矣又眼根與色塵和合之見謂之有待之見眼根不與色塵和合之見謂之無待之見有待之見必緣明而有明滅則不能見無待之見則不因明而有處暗室中不異白日也故楞嚴經曰緣見因明暗成無見不明自發則諸暗相永不能昏本朝楚石琦禪師閲楞嚴經至此遂大悟根與塵初不相到但衆生橫計未消於無明暗中橫見明暗耳教中謂之非量非比量現量也此橫見以非量用之者以第六識不能檢名審實精義入神從由塵發知之知知奔前境故被好醜所轉如此知苟能了好醜明暗之影因根有相則明暗之影亦初本無性既了明暗之影初本無性則由塵發知之知豈獨有性哉行者於日用中能作是觀察以理折情此方謂之比量也如是觀察久漸成熟熟則見思𪹼落則行者始入相似位矣此相似位在藏通二教皆是佛位非菩薩羅漢位也在圓教但名相似位耳別教即七住位行者至此位則眼可以觀聲耳可以聞色鼻舌與身皆可以互用矣若然者則眼耳鼻舌身五根照境時若第六識未起則五根之精如鏡之光好醜雖明了無分別也此無分別者謂之現量故永明曰初居圓成現量之中浮塵未起後落明了意根之地外狀潛形浮塵與意根皆指第六識而言也又非量者恣情橫見不能以理折情之謂比量者行者能於緣因佛性之海檢名審實實審則義精義精則理通理通則情不能昧我得比擬而用之至此謂之有心觀察乘理折情故以比量目之比量即無塵智也無塵智熟方得相似無心未得真無心也此理稍明教觀者皆能了了不待老漢雌黃饒舌雖然如是老漢此段熱腸自有大闡提知在又緣見因明之見雖謂之有待之見能以由塵發知因根有相互奪而痛觀之觀之有入則所不待忘而所未常有纍於見精也但行者此觀不熟情屈其理理不能信所以智通之信不開故不能出依通之信恆被情屈也如善觀之則知明暗自相陵奪本與見精了無交涉故永嘉曰一切數句非數句與我靈覺何交涉老漢則曰一切明暗非明暗與我見精何交涉於楞嚴會上佛敕羅睺羅擊鐘常亦此理也蓋聞精初不因鐘聲生而生亦不因鐘聲滅而滅聲塵動靜自相陵奪亦與聞精初無交涉也第慶喜計現前能推窮分別之心未破於見精聞精卒不能了了故佛特敕羅睺羅擊鐘佛意欲借聲塵動靜起滅令阿難即動靜起滅處會無動靜起滅者如香嚴見溈山時溈山曰聞汝一問則能十答我問汝父母未生前試道一句看香嚴屢答皆不能凑溈山之機乃乞溈山代答一語溈山曰我道得是我之三昧與汝有何交涉於是香嚴盡棄所學涕泣而行且曰我終身作箇長行粥飯僧罷了及住菴糞除瓦礫適聞擊竹聲則所知頓忘洞契自心於是向溈山大展而禮曰當時和尚若為我說破安有今日嚴有偈曰一擊忘所知更不假修持動容揚古路不墮悄然機噫如香嚴者所謂從緣薦得永無退失者也由是而觀則香嚴之所知即慶喜能推窮尋逐之心耳此心即由塵發知之知此知不忘則智通之信終不能入智通之信既不能入饒汝談玄說妙辨齊佛祖不過依通之信而已又由塵發知之知乃香嚴未見溈山之時能所心也此能所心雖溈山號稱大善知識卒不能使其忘之須待嚴聞擊竹聲自忘始得故此事決不可以情求者也蓋情求不出乎根塵妄想如能了達根塵無性則由塵之知亦自可忘也又香嚴謂之自誠而明若依教理折情治習而有所入謂之自明而誠昔有祖師問僧曰隔壁聞叉釧聲即是破戒汝作麼持戒僧曰好箇入路此僧得入與香嚴之入果同耶果異耶同則叉釧聲不是擊竹聲異則叉釧聲固不是擊竹聲然卒無有二也行者於此辨得雌雄則一精明分成六和合六和合復成一精明揑聚放開任汝施為若辨不得古人有一頌汝輩再咬嚼去果然咬嚼得破再來見老漢未晚也頌曰不汝還者復是誰殘紅留在釣魚磯日斜風定無人掃燕子銜將水際飛示開先
