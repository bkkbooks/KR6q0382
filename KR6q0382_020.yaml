body:
  text: 明憨山得清閱五常偈南無仁慈佛愛人如愛己此心常不昧如來即出世南無義氣佛愛人必得所臨事不苟且立地成正覺南無禮節佛事事要明白長幼序不亂世尊即是你南無智慧佛變通無滯礙扶正不扶邪化苦而為福南無信心佛真實無所改一念與萬年始終常若一如是五如來人人本自有善用佛放光不善佛滅度我願一切眾死生與好惡務須善用心莫被情欲轉生時佛不死死時佛豈滅不滅不生處此是吉祥地伍員申包胥伍員包胥初為莫逆一曰亡楚一曰存楚員若忌胥豈能亡楚胥若忌員亦難存楚兩人如鏡互相照本光不昧大用現前擔荷不下擬心進退是曰野狐非師子種不變隨緣偈始從一塊金造出諸鳥獸鳥獸亡其本鬬爭分彼此智者見之笑愚者見之怒笑則鄙其癡怒則助其鬬我觀天下人助鬬何其眾笑者萬無一惟願乘佛光怒笑俱照破逆順恒自在讀東坡贊石恪畫維摩頌我觀石子不思議神力大於維摩詰能將過去毗耶室普令觀者如見掌三十二士不二談口門滾滾川江注病夫無語答文殊耳熱面黃口寂默聖凡乘隙亂雌黃到頭誰解知明暗現成香飯圖一飽飽觀妙喜延復捉師子座高二萬餘菩薩更多容不隘方丈無增眾不減如燈互照無相礙我觀蘇公更巧奪劫掠夢中石處士復將維摩置腦後逞己自在神通句卷舒語默臂屈伸壯士寧費纖毫力善使觀者駭且驚豈殊胡蝶遭風雨紛紛紙上尋入路競覓高堂避漂溺自笑老漢旁弗禁一拳打倒眉山子奪得驪珠光更奇覆盆頓教成曉國胡蝶夢回春初霽毗耶城裡人方語陸太宰手印偈夫禍福莫烈於死生而死生之前茅必發端於老病老病疑危之際雖有孟賁之勇神禹之智莫能施也今太宰臨老病疑危之頃而神不撓手印堅持老病不能累望其眉宇而氣色澄明豈非一生心力精堅之明乎達觀道人因問疾目覩其事贊嘆說偈曰手印堅持眾所見者手印之初不可心測豈能目覩是不能覩即壞不壞智者了然眾人驚恠題金壇龍山圓通庵四佛臺一身千閒屋猶嫌住處窄四佛共一臺欣然各相得凡聖本來同迷悟乃成隔呵呵呵會也麼桃紅李白春將半明月清風調不同示某念佛偈五十八歲前汝果年多少於此痛觀之多少年便了了得好念佛未了念佛早生死從身有離身何處討兩人未見我燈光如天曉還家仔細參邪路爾勿造慈音母難日偈慈音今日生慈母得身輕般若煩誰轉金輪說法聲能將毛孔聽日用顯威靈誰料慈音舌金剛千尺丁示石門故倪道人偈來時無物去還同來去分明鼓橐風若使亡靈知此意眼開眼合有何蹤破生死心偈現前分別心畢竟生何處若使生自心境無孰為地境能生分別境豈分別境設謂相因生兩無難成合合無不應理終入自然計智者痛觀察癡人輕放過於此寬不究生死心難破示紀禪人并序紫栢先生往讀東坡觀音贊最愛其呼者若自痛則必不能呼今聞紀禪人渡江之險於險中排遣初雖自覺有力至浪愈大風愈高則終不免被風浪轉却此禪人不欺之言也雖然從此不欺於逆順境緣風波險處勉強排遣日久則信位可入也因而說偈遺禪人稍為精進之助云千波萬浪一舟危勉強支吾能幾時試問命根將斷處就中誰是大悲師母難偈我娘生我我無生久負我娘一片情今日尹山炷香者為娘請得走方僧住山偈住山無甚巧一味朴頭來雨後開新地燈昏剪舊煤照心翻貝葉襯足護蒼苔久斷風塵路何人問大梅觀花偈江上芙蓉開花含秋波奇風搖疑顧盻遊子心魂癡花豈有子心子心何不思以思思心前自悟花汝師此意頗不淺心開輸天機明暗偈設不點燈暗則滿前忽點燈時明無缺圓暗實有暗明何從生明若有明暗何從形每作此觀根境蕭然蕭然之時濕無中邊水當寒沍堅相難除氷當和暖融相本如明暗氷水以類萬物一物得入物物皆蜜蜜有邊中佛難分析分析不能攀緣自寂見徹觀熟死生逆順宰割虗空千古一瞬孰為滅度孰為出世乘智願輪而權而實權止兒啼實則自畢明暗吾師曷忘其德氷水吾友敢別好醜舟泊南徐楊枝吾肘無隱齋頭鎮江閘口奇郎代筆知郎點首同行皆睡夢翻筋斗廬山黃龍潭募供佛燈油偈并引夫火不自傳必假於薪薪亦不自燒必假於火然謂薪盡而火滅則非達人之見也何者蓋薪有盡而火無盡故也若火有盡凡有薪處則有火凡無薪處則無火矣今則不然以方諸向月以盤承之即少頃而水盈盤矣謂此水果從月來若微方諸則獨月不能流水謂從珠來珠不待月珠何不水出謂珠月合而有水此又不然初月與珠各求其水水皆無自寧有兩無合而有水乎世之君子果以格物致知之學不為分外當徐而察之薪盡而火果盡乎方諸與月果合而流水乎如察而久之誠積將明一旦悟通然後知形而上者未嘗非器也形而下者未嘗非道也若然者則我日用之閒迎賓待客折旋俯仰是非榮辱境緣逆順身心勞逸穿衣喫飯屙屎放尿寒則索衣饑則索食順我則喜逆我則瞋者亦當徐而察之器耶道耶道耶器耶必自了然矣廬山黃龍潭有金像毗盧遮那佛毗盧遮那者此言光明遍一切處既光明遍一切處矣何假於燈蓋日以照晝月以燭夜繼日月之明明於無盡者惟燈為然聖人欲人即象得意意得象忘此又大覺末後句也奇男子何必登黃龍覩佛像然後開悟即共兒女團圞於燈燭光中夜飲懽歌酣睡之後睡熟酒解微開醉眼徐察此燈之光從油生耶從燈薪生耶火自明耶倘於此際一旦悟光生處管取者醉漢不須三大劫修行立地成佛在襄陽君子不以達觀之言為狂能采聽之則黃龍化主檀越如麻矣偈曰廬嶽黃龍潭乞油供如來不知誰有緣懽喜捨淨財用買香潔油然燈照佛臺光明永無盡聞見心花開油亦從水出水偏與火乖戰爭兩不已水去油火偕此理甚微妙知行世莫猜緣生即無生道器本同胎胎產無量佛皆從光明來願諸施油者皆契毗盧懷承恩寺十景偈寶獅巖尾拂青天首撼空等閒一吼怖毛蟲文殊老漢騎將去遊遍十方塵剎中臥牛池不臥蒼龍臥白牛大千世界角尖收尋常懶犯人苗稼雲影天光水草優千峰菴路在虗空不在塵白雲堆處臥禪人春來一雨千峰淨樹杪泉飛五朵新鎻鳳橋鳳舞龍飛恐不歸石樑為鎻永覉遲相逢若問僧多少萬指森森繞硯池廣德剎竿旛動鈴鳴調豈同曹溪謾道不因風魚蝦若許平田摝今日桃花舊日紅五眼泉五眼人人本自周無明地迸豁清眸若將橫目分凡聖兔角挑雲過別丘涅槃臺除却身心問吉凶分明宰割太虗空涅槃臺上清秋夜萬里無雲月正中成公塔院寶地空林落葉多先師靈骨在洪波荷鋤擬斸水中月輸我拋香禮上坡洗心軒覓心無得洗心方熱惱都教當處涼若使遊人知此意松風水月舌根長觀音塚萬峰深處普門開道骨寧甘火宅霾大士果然煬帝子麒麟何事產牛胎照身心偈身若即心誰是身心若即身誰是心身若即心則生死何來心若即身則煩惱何在身心了徹疑不生即此身心真般若般若現前身心空身心雖空身心在此身即是真法身此心即是真妙心法身本來無生死眾生迷之生死起妙心本來無煩惱眾生迷之煩惱擾自達身心水即波尋常日用頭頭偕相逢不是兒女戲身心不悟真狗彘況乃人為萬物靈大事不明須怖驚怖驚日久諸佛憐變身為我說無生眼前早晚相見者誰不胸堂點佛燈佛燈雖點不照己開眼如同夜裏行初于聞中入流亡所頌百戰將軍未肯降太虗空裏割疆場凍雷出地醒殘夢別有梅花一段香豬偈養豬充口腹因愛結成讐豬若知此意終朝不食愁愁兼與不食豬死肉有不頗賴豬未知肥肉過汝喉終來汝作豬還須償豬油此理果弗謬勸汝養豬休文薪偈若微文字薪觀照火無附若微觀照火身心薪不然薪然俄成灰灰飛身心盡湛然實相燈光明無內外自燒復燒人一燈傳百千百千傳無窮終古常若旦十方無夜時文字薪功德是故有智者即文字得心心外了無法文字心之光以光照眼根無色能待眼以光為雷音耳聞耳識空以雷為妙香鼻齅鼻無得以香為上味舌嘗嘗即智以味為觸塵覺觸身根遺生死在何處龜毛縛兔角以觸為法則五塵落謝影緣非因緣變分別變所緣影影各具三種子習氣現雖經千萬劫六根更無量四生七趣中浮沈難可數種子習現等熏種影不亂不亂各有則故以法則名我作文薪偈名緣因佛性熏汝了與正實相燈傳永無論冤與親皆入光明海釋中論偈并序已去無有去未去亦無去離已去未去去時亦無去此偈明何義良以未去為正去之因正去為未去之果正去復為已去之因已去為正去之果用是觀之正去不能自去必假未去而有去既必假未去而有去去本無自性既了去無性未去已去皆然譬如有中閒則有兩頭智者了達此三時無去來去來亦不昧未去不名去已去不名去離已去未去去去誰去去又離正去去已未去不得離兩有中間斷無有是處離中有兩頭亦無有是處我以差別智往返推去來龜毛與兔角有名而無實於一法見徹於諸法不疑於諸法有疑於一法未了若人有善根頓達是偈已一切修多羅洞明如指掌拳手與屈伸卷舒得自在光明偈無量光明藏隨緣用不同始終若有性事事豈圓通勉少年偈子房椎秦氣豈止萬丈虹一旦能自下進履圯橋翁吾聞老屠叟與客宴笑閒呼客客疾跪客面無怒顏跪久竟無語仍呼客共餐客疑敢問叟此跪何所以老屠舒徐言少年登高科未經貧賤抑此跪若不忘平生用不盡子房進履後圯翁骨已朽至今聞其風使人毛骨竦跪者埋黃土相國付流水此跪無今古聞者無不勇此勇遇聲色聲色不能惑此勇治夷虜夷虜不敢忒我願以此勇日用持不忘在在極樂國午齋偈并序予有泉石之疾久患未瘳偶午齋未訖山水忽臨不覺眼根食色舌不廢味自笑自癡說此偈耳舌以飯為食眼以色為食舌眼一時食次第非次第山水富煙雲菜飯醎酸具是同是異耶本是一人事此中覔能所如人手揩鼻鼻外若有手是他非是我此義初明白豈煩求索得病偈示通方人人無病時自謂生鐵鑄及至有病日何止軟如絮四大互增損眾苦靡不至所習佛知見試之了無濟病中難作主臨死豈不錯一錯千萬劫稱錘沈海底若欲出頭來須待馬生角安得奇男子病時如不病寒熱交攻時寸心安若海驚濤恣潑天濕性初弗改即此不改者了達譬指掌開握與舒卷壯士屈伸臂病猶嬴劣夫病者如壯士相角勝與負愚者亦可決況復有智人於此何疑惑知病虗不有般若頓現前纔覺有微苦般若即隱沒病苦與般若何曾是兩物清涼及熱惱剎那順忽倒病根在何處病者自尋討一旦得其根病愈呵呵笑聞鐘偈根中若有塵塵中若有根根塵既交參能所互不斷根中若無塵塵中若無根根塵不交參誰先復誰後真妄各有路同行不同入入則頓了知未入徒支離是事大不小大雄始能了禮四祖偈南無四祖信大師童真便知求解脫苟非夙具靈骨來憂深慮遠何至此一朝狹路逢璨老當頭一椎迸臭汗了知縛脫兩頭語黎奴白牯常為隊臨行接得無姓兒窮家破具從他紹多情突地出黃梅賺殺牛頭貧徹骨人天自是失依怙抱贓呌屈誰相悉銜花百鳥覓踪由何異層氷求烈𦦨我懸狗馬心已久帶疾慈光一稽首惟願我祖憐弱喪死生夢中頻拔濟禮五祖偈稽首五祖忍大師片時不計計長時山前山後種松子松高引得鶴來棲鶴來弗解騎鶴去有去有來非所慮長生固勝短生多莫若無生死亦住一朝釋鋤拜牀下法道可得相分付堂頭嫌老許再來只顧問娘匪問父賺得阿娘肚忽大舉族紛紛爭痛惡一身孑然無所依敗堂冷廟延朝暮生兒便會道無姓觸著堂頭心上病西來衣鉢總交渠赤卵咆哮行祖令十方諸佛縮却項嶺南獦獠神通廣獵人隊裏覓生涯七百高流空腹脹蜀道難行世所知誰云傳命法懸絲我常深夜念及此世閒想淚沾緇衣今日濁港灘頭過離娘墩前草如故西風落木行路難子母恩情從此破聖凡偈兔子懷胎產六龍不惟為雨更為風臨機縱奪能翻弄一片春光萬卉融微顯台宗性惡妙旨偈亦云非性偈稽首十方三寶尊未來過去現在者我今哀求請證明惟願冥顯有加被三際不離一念有豈離三際有一念譬如一指有屈伸廢屈立伸血脉斷染淨亦隨緣所熏隨緣善惡二相顯顯者可見謂之修不可見者謂之性性惟非性自不覺不覺不離染與淨了知染淨既如是一指屈伸奚足病屈伸離指不可得染淨離心亦何有心即本體染淨源源亦非性寧染淨惟有悟心方決了決了始知台宗妙台宗之妙在性惡性惡三昧三昧王一切染淨橫自在皆藉性惡功德力盲師不見性惡玄廢染立淨壞佛體弟子仰仗三寶力述偈微顯台宗旨更願見者及聞者同悟性惡利含識臘月八日供佛乳麋偈如來成道是今日成道畢竟何所得我等今日未成道未成畢竟何所失現前大眾當痛參參透乳麋用鼻喫莫憎此是孟浪言言言字字塗毒汁蜂觸紙窓偈二首縱使千飛與萬飛心因境有豈真知但將能所俱拋却不假鑽研透不疑來時初不有遮攔纔欲投明透便難若肯反觀來甚處去來何路不天寬示徐孟孺偈掉轉頭來一拍時就中無地著思惟徐郎覿面知歸處始信春來花滿枝聖智偈并序若謂念未動是聖智則了得念未動是聖智之知此了涉念耶不涉念耶涉念則有念定不能測無念不涉念則念既不涉知亦本無謂了念未動是聖智此了何異虗空揣骨思之聖智昭然休更覓山河之外別無靈但能當處尋生滅方信紅爐有剩氷雷郎吃茶偈念未生時誰吃茶寧知茶不自噇他就中別有通喉路滴滴須教成露花芭蕉菴聽雨偈直謂重泉樹杪來𮙎𮙎巖壑起輕雷何須方外尋幽僻城市雲林趣不乖雨打芭蕉一樣聲聽來迷悟太分明桃花只許靈雲見敢保盤山夢未醒皖公靈跡行盡千峰與萬峰飛泉響自半天中背巖有路通幽處流水桃花問皖公示宇靖偈春來誰不愛花紅驀地東風起太空艶冶凋零一條看此心無處不虗融逆順偈婬怒無常總是渠逢緣逆順乘除從教伎倆翻天地幾度推尋失舊居偶成偈天上人閒勢利同但將罪福判雌雄達觀老漢偏奇猾慣解藏身兔角中宣州興教坦禪師偈并序宗門武庫溫州牛氏子世業打銀因磨洗銀瓶次有省出家號宣州興教坦禪師恠底牛郎業打銀銀瓶磨次現全身廣長舌相無多子獨許渠儂見得親應事粘滯不覺失笑賦此賊後張弓悔已遲更教賊後笑愚癡何當明鏡無留礙妍醜難瞞不屬知寄王元美法身有口能噇飯大地無塵翳眼睛此事遙知已相委願垂一語印愚情悼王方麓先生偈未生曾道是華嚴習氣臨終果現前釋尾儒頭難辨別還同竹篦勘癡禪無題二十首丈六金身賣酒標一朝爛醉睡如猫牡丹花下春風裏多少馨香帶露飄狂心未歇似猿猴日夜翻騰者髑髏一把無明火燒却紫烟堆裏好回頭莫待焚燒始轉頭正當強健好調牛皮膚脫落全身白水遠山長任自由水國微茫坐入禪六銖縹緲散花天只今靈骨無尋處風雨蕭蕭送客船踏來空翠幾千重曲折曹溪鎻梵宮欲問嶺南傳底事青山白鳥水聲中百尺危梁架碧溪行人到此莫思惟浪花風捲晴飛雨掉得頭來已濕衣縣空架地力難移恠石為腔蘚作皮無孔鐵椎敲便響禪流直下不須疑道人無往不悲秋何事扁舟帶月浮白雪陽春誰接拍石門流水暗相投君家幾箇長松樹引得天風作海濤熱惱任教千萬斛此中一坐自全消浮雲初不染虗空起滅從交淡復濃若使身心成兔角應酬萬有自春風白鳥銜魚上釣磯漁翁初不涉思惟水天空濶相忘處坐者坐兮飛者飛萬別千差總此心誰融大地作黃金愛憎交錯難銷處多少男兒被陸沈春來花草興綢繆丹室珠林挾妓遊盧舍那身隨處現醉中幾箇解回頭空林何處夜鳴鐘踏遍蒼苔叩梵宮此會不須言底事相看箕踞明月中萬別千差總不妨無心觸處可相忘雖然六入如空聚見豕何曾喚作羊春來樹杪百重泉飽飯眠雲聽不厭若使陶潛知此意何須弦斷始無弦阿娘奶頭大如斗不食小兒見之走飲乳輸他親所生一口未了復一口廣長舌相覆虗空大地山河舒卷中若問人天何處著歸宗口裏有拳容凡當我處皆非我我若無時我始全縱使虗空為辟喻虗空我後我曾先流水青山笑我癡涉川絕嶺慣忘疲南來北往緣何事一線真機世不知究心想偈并序二首皮毬子曰一心不生為善無地況為惡乎故無論逆順境風扇中則念之生雖有心擬禁而不起無是理也但起善念當勉力而充擴之若起惡念當究此念是貪耶是瞋耶貪近淫瞋近殺淫之為過過莫大焉殺之為禍禍莫甚焉我清淨廓然之中而忽生此不祥之念幸而有始無終則過禍似可逃也不幸念起而始終之小則殺身喪名敗德大則一墮阿鼻魂靈受罸一日一夜萬死萬生卒難出離且我此身究其所自初本於父精母血雜而有之現前能分別之心初本於父母交遘之時不達前境惟心乃受境惑故男子投胎時於母作可意想女子投胎時於父亦作可意想既而此想身成之後不名想而名心矣此精血雜成之穢心主之後不名穢而名身矣故有智男女解作此觀觀久得力則於飲食男女之閒雖境風扇鼓自然念不生也噫念果不生則向之清淨廓然還復入我手矣故曰雖然舊閣閒田地一度耘來方始休至此然後說栽田博飯喫無愧於心焉若未詣此祖翁田地尚屬別人管業我安敢妄想偈曰𦎬臊交媾始成身中有貪淫即識神兩者若能看得破何妨寒凍作陽春祖翁田地賣年深執券風塵何處尋見說豺狼與狐兔荒寒荊棘久成林行昌刺祖偈行昌刺六祖却被六祖刺世人誰得知豈非冤枉事智識偈五識攬性境是名因緣變行解猶未起名言豈能及同時意忽生五為退殘客五退六既進六攬獨影耳由塵發知故此知非本有由知塵現容此容異晴空了知不了知識智競分路識則假名賊智則克家子熾然善分別我法執漸釋入流而亡所所亡能亦失能所無地時𨍏轢搖不息示于中甫國賊患在智心賊患在玄三叉乃見刺諸塵解脫源龍潭虎豹窟驚悸雪松邊示于潤甫六祖本樵夫悟心乃成祖此心是何物證之邁今古非獨釋迦然仲尼亦復爾如若道未聞雖生不殊死且道道奚聞最初從信入堅持久不惰自然人指路遵之直截行寸心勿回互世有毀譽風此是諸魔使遇之力愈堅始信真寔做一點疑惑生無媒自招禍苟非英靈漢逆風難把柁淨土偈心淨佛土淨心穢此土穢淨穢既在心如何別尋理但觀心未生淨穢在何處此觀若透徹眾罪自消滅不待蓮花開香光從口發南無阿彌陀佛即自心覺覺即情不生情生成殺佛殺佛墮地獄難生蓮花國能使情不生彌陀自來迎蓮花為胞胎永不作眾生念佛雖不難難破逆順關逆順關若破始面彌陀顏自警眾人關意處飲食男女耳我輩所急者治心藥貴止止時不由觀茲止非盡美止觀相為師循環妙無已現前赤肉團善用初非累誰謂臭髑髏金剛堅莫比色生空匪殊波水謾彼此古德曾有言亡僧痛為子當陽既不薦白骨為汝死回首石樓癡覆舟華亭耻死生等戲具心了何足齒吃水齋聞皷偈我昔吃水齋幾月分別輕身心有若無六根瀉皷聲仔細推所以擊皷道士耳此觀尚隔河聲乃發於邇始悟念不生古今無異路遠近分別起法身豈有阻六尺空中雲雲起有無際聚散初無常何苦徒橫計橫計若不消驢年出生死脫女身偈有身有女執無身執自消眾生久顛倒橫執身堅牢堅濕暖動觀女身等龜毛此觀若成熟蓮花為胎胞更將憎愛空心空境寂寥能所情塵蕩童真著方袍參禪與學道永無魔外撓真祥痛持偈女身當處超常如寺偈逆順本無性似有惟橫計若知喜即瞋步步安樂地示聞郎鬼怕捺硬人識怕捺硬智強久自成熟忽契無分別示修慈有我眾生我無我諸佛我真妄我明白頓超生死路明暗偈生滅不生滅譬喻明與暗一存一不存未合波羅蜜生滅不生滅譬喻明與暗兩存不兩遇乃合波羅蜜斷婬偈有引夫言清行濁開眼說律合眼行婬醒夢雖殊婬根無二故此根未拔生死難逃今世後世眼合眼開根塵主客授受無窮苟能一念不起婬機自枯於眾生分中念起是常不起是變於菩薩日用不起是常念起是變常變無根隨習所熏熟則名常生則名變名雖有換初無異同故能以戒定慧之香熏而不斷則淨用現前以貪瞋癡之水潤之則染用力猛故寂音尊者觀音贊有曰憫我心明力不逮時時種子發現行此我尊者踢翻好醜窠臼而能吐言真實如雲盡長空明月顯露清淨光潔如此也偈曰十方三世中惟我一人婬婬機斷不難婬人處處滿婬機卒難斷時時互相熏增長無有已我斷人不斷斷斷熏復深染淨各有源源窮染淨洗戒根盤虗空空外無有物有婬無地藏戒殺生偈以心觀天地天地伯仲同以天地觀心物方分雌雄雌雄生強弱強弱生戰攻勝負不相下互吞豈有窮未窮能知變口腹戒肥膿臥佛偈睡者不忘石焉能臥石上石非忘睡者石則有我相誰謂雙忘中鼻風吹樹嚮陰陽既不到出入息難狀惟有本色人聞斯稱絕唱聞雷偈將雨雷先鳴轟然聲達耳遂即究聞者猶未決能所所聞既無知能聞寧獨起若復合而聞細推無此理能所既不有合者是何物合乃且共生龍樹曾不許無因如可聞山河皆吾耳往返研其因畢竟窮無始無始不昧聞聞時遺彼此玄沙老古錐昔日曾有偈皷中無鐘響鐘中無皷意鐘皷不交參句句無終始六識功能偈第六分別觀生法功成本位粗相滅細相乃通七識分生法以無分別觀觀之不已無功成乘此無功鑄異熟異熟既融任運入五八剎那同時轉聖人能事自此畢駕此無事自在船逆順風波渡羣有究竟如上種種德皆是六識作觀力餘識但坐不能行惟六能行未始坐張翁吃酒李翁醉說與傍人誰肯信三量三境攝心所以此之故功在六聖凡迷悟六不行總是天晴地下濕醒夢偈紫栢老人妄想多夜來合眼夢不少夢中好惡幾千般開眼何曾有莖草腦髓心肝命所係夢中有人平白取解空未熟取時慳成就慳貪多巧計直得計窮瞋發盡腦髓心肝宛然具將觀具者等夢中死生榮辱恣遊戲持華嚴偈大方廣佛華嚴經如來初轉根本輪此輪轉不離四門理轉事轉事理轉事事無礙最幽玄拈來便用無廉纖離理無事波水同事理互轉亦流類若微第四事事幽前三終未離窠臼窠臼不離情不枯情不枯兮智不訖智不訖兮覺為礙境風逆順難自在理障事障誰為魔覺不為礙事事快若能受持此經卷洞達吾偈根本在且道根本畢竟在何處所熱惱燒心誰著火清涼徹骨豈天來長松館雪偈明月在天雲障之障雲疎漏露明月幻作梨花與柳絮鋪遍江山無空缺白象兒休裂蹶境緣逆順蹴踏時金毛聞之亦腦裂三月桃花笑路人主人於此心能歇修補大藏經板偈百年三萬六千日憂勤功利何其急若將長劫較百年百年不殊出入息出入息中營勝事苟非明勇誰能得功利不過周微生勝事資我脫苦趣勝事之中最勝者續佛慧命第一義慧命得續欲命枯娑婆鑄為極樂土此意智者獨了然愚者狐疑難信入吾偈不實是綺語舌根生生常破碎西子說法偈世人盡愛西施美范蠡不愛却載去此意若使吳王知伍員頭始留得住我聞西施美亦愛愛情如火燒心裏無限精神為此枯千排萬遣無用處偶讀圓覺普眼章西施之醜難掩藏三十六物仔細觀但覺其臭不覺香香臭互奪本無地范蠡滿載明月光此光要使照千古伍員頭斷日中霜萬花叢裏去復來西施翻作說法王試觀捧心顰眉時芙蓉兩岸秋波長得漁欵乃聲何奇耳根一染平空亡雲居山復古偈有序青山無古今白雲有去來法運之通塞人情之愛憎道場之興廢俱循業發現不可以有心期亦不可以無心待者也予別雲居二十餘年近憩歸宗金輪峰之陽一日雲居紹住山過予問訊且曰雲居近有諸緣山主肝腦塗地鼎建古剎予曰此亦循業發現耳問何謂業予曰業命也又問何謂命曰命用也又問何謂用予震聲一喝曰在眼能見在耳能聞此是恁麼紹不薦予說偈曰見聞歷歷自何來纔復生心光早霾此去歐峰三尺半杖頭日月照塵埃示等觀讀棱嚴經偈有序有身之身眾苦所聚有心之心萬慮所縈惟無身之身形充八極而無患無心之心智周萬物而不勞眾生日用不知病在外封六尺內迷方寸苟有智男子達封非封了迷非迷然後以一身為無量身神頭鬼臉輔弼法門以一心為無窮心奇媒異智通達佛法寄廣長舌於諸子百氏之岐使歸大道是為真報佛恩十卷楞嚴一柄刀全牛不見眼中毛試將智刃游心馬積劫無明當下消讀東坡觀音贊當年客少室飯訖乃經行栢根見短刻畫觀音形上有東坡讚讀之蚊上鐵徐而久味之一日頓了徹自是恣口門到處為人說眉山蘇長公覓佛心已歇心歇光自圓事理皆活潑戲謔與譏呵譬如青天裂天裂眼界高天外風景別如若自不見反笑人見拙示周季華眾生無明熾執身招死生聖人憫其愚教以一觀四見四了不昧一身不可得此滌凡夫垢非是二乘執又以一遣四四亦不可得一四俱不有直下無生智不可以數求不可以情會情數兩坐斷肉塊金剛體譬如手作拳或者作拳想或以拳作手或者作手想拳若有拳性作手不可得手若有手性作拳亦不得拳手兩無性執者寧非惑雖無拳手性拳手宛然爾我以拳手偈相逢誰薦取自信合佛心龍神謹護持願凡見聞者俱悟無生理分別能所偈若使分別因境有境有於我何交涉一切凡小未了知根塵擾擾無由歇了知兩者但名言能所何曾是兩橛環輪之上覓始終笑殺東村王大姐了知成修佛真子煩惱未除超十地此知止觀大導師愚者棄師尋覺路無能所中怖根境誰知根境覺路資氷多水多何須疑眾生若使無我所聖凡血脉皆枯斷撥無因果成魔種却疑了知非親兒誰知生滅不生滅智識一條有同別我今說此妙伽陀何異幽宵懸日月大家苦樂光明中日用不知盲者咎醫王一朝抉障翳光明初不離眼有此光若謂醫王與尋常見暗是何物示知幾病中偈祁寒溽暑覉旅不歸啖熱吞冷惟自知之境緣錯迕飲氣支持苟弗以理消釋甚難逆順榮辱理遇本閒若以情遣紛擾無端喜則屬陽怒則屬陰陽易舒暢陰易結沈舒暢融通面目光澤結沈凝滯毒乘為賊賊據肯䏿痛不可勝究其所以惟業是生業生無地造者惟心心外有法聖人沈吟南嶽大師身忽腫脹求生不得求死無恙轉側靡停苦極覺朗知病惟業知業惟能推能之初無我而靈腫脹頓消獲宿命智過去善惡雲度沼沚纖毫不昧如見十指貴郎貴郎病臥一床正當病痛情識張皇智不可治力不可降痛痛痛覺能所兩角我代渠觀根塵廓落病乃知識誘我得入奇哉奇哉我入賊出一塵正受塵塵歷歷自他無閒維摩神力八萬師座總納丈室大小相容位分不失問何宗旨端郎把筆筆如寶劍聖凡失色且道末後一句又作麼生燈燭光中相問疾淨明茶飯自然香示賀仰庵有引夫心無真妄而真妄名生良以迷無真妄之心而真妄之名不得不立焉又有迷真妄之名而不求其實役役然巔毛白而執名不返可不痛哉夫物必有名名必有物名物不相負而天機深者即名為梯緣而上之終得其實實得心明則真妄可辨矣何謂真無我而靈熾然而分別與性不違此真之始也何謂妄流逸前境迷而不返妄之謂也又妄身假四大而有妄心亦假四蘊而有故妄身盈不五尺妄心周不逾身今天下競以五尺者為真身不逾身者為真心不知果真乎果妄乎吾聞空無邊際乃法身中影子故曰空生大覺中如海一漚發吾聞聖凡依正亦無有窮盡依真心而建立故曰心外無法又凡夫迷真既久故真生妄熟而於妄熟之中籍佛祖聖賢師友眷屬緣因熏發了因初啟培而養之境風順逆死生好惡交加之閒以勇濟明以明扶勇銳然而進精然而深是謂以生滅心開生滅解和泥帶水究竟十信皆圓解生滅之力也入住則力非生滅矣吾悲憫汝兄弟身處塵勞腥膻之穽而能長齋不茹一切血肉真火宅蓮華也乃說此偈曰因境而生因境而滅生滅無常憑境貿易從無始來至於今日執此為心認賊為子自劫家寶無時不爾失功德財一貧如洗背無生滅隨順生滅十二緣生以為窟宅忻忻戀著莫思舍離不舍離中眾苦積集如影隨形怒逐不去從劫至劫等汲井輪下上無歇如上眾苦初本無地一迷本智幻出諸有無能所處建立人我戈劍勝負血流漂杵皆自心作離心無有即心觀察本智何物有何因緣變出根境一旦精明如子得母彼十二支皆功德使自利利他無有窮極示李次德偈水外有波波必不濕波若果濕何波非水愚人不了見彼波相千變萬化洶湧無常生滅多狀逐彼名言為境所轉熾然分別從無始來了無休息改頭換面鱗甲羽毛人間天上升沈隨業此皆波也迷水疑波謂波非水故名愚人智者不然了波即水達境唯心本無凡聖豈有古今靈然無我為羣有祖故知祖者必能孝順悟自心者必能奉重如不奉重說食不飽乾慧無用觸事臨機情見妄覓法珠在掌勿誤墮失年光難把老病莫期小子痛慚日用勿昧弔顧諟齋偈世有塗毒鼓有擊則有聲毋論心有無聞者靡不喪若使無人擊聲亦無所有無聲而有聞聞者聞何物是故塗毒鼓有毒等無毒雖復鼓上臥毒不能毒人所以無緣者佛亦不能化吾鼓則不然以名而為之塗毒於名上以傳而為枹一人傳百人百人傳無盡如是無盡枹援之擊茲鼓無論見不見聞者無不死有人未見我但聞我名號誰知塗毒名聞聲毒入耳毒入而不發決無有是處公曾聞我名豈得不受毒以此因緣故公終偷心死心死性則活性活孰非佛吾是以知公已墮諸佛數悼藏主法本偈有引夫割股救人不若割股救親割股救親莫若割俗亡身弘法何以故資我身者不能使我無生生我身者不能使我無患老氏曰我有大患為我有身我若無身何患之有惟亡身弘法之德近則使我即大患而為藥草遠則使我鑄緣生而終契無生以患為藥智者所甘從緣悟入眾入所昧智甘眾昧水中擇乳苟非明而勇者孰能鑑此爾少業瑜珈既而遇大善知識割瑜珈而從禪禪雖未悟而操介卓倫教雖未了而弘法無懈惜其志有餘而氣不能持於萬曆某月日大命將終猶謂法侶曰我今生乏財凡作佛事則多難少易此去再出頭來倘得作宰官身則刻藏不難也嗚呼為僧知僧貧而不知官貧為官知官貧而不知僧貧僧貧於財官貧於閒兩者所貧皆非識心達本者也故為官多受勞辱則曰莫若為僧清閑為僧多受貧困則曰莫若宰官如意殊不知勞勤莫先於有心大患莫若於有身惟了心非心達身非身者照窮萬有而不勞形充十虗而無患然後發同體之悲接無量之眾運智於無何有之鄉究竟無上燈傳不絕乃吾曹能事故曰厭生死苦失佛法道今爾發願雖與眾殊然以吾曹本色斷之步驟失矣夫形有聚散心無古今有聚散者既化則無古今者寧不存耶汝生以慈父事我且為法而死若不以率性之痛誨超情之椎輪提撕本色恐成埋沒聽吾偈曰四十九年前四十九年後反復覓生死日中見北斗厭僧欲為官官貧汝知不俸薄不能給合家餓如狗為官得有財必從貪中來以貪作佛事培福反培災賴有弘法願終與眾人殊舍身復受身慎勿失戒珠戒珠如不失生處自光潔所願終當克九原休泣血我若老未死遲汝疾出頭果不昧初心來充法海牛耕徧大藏田福慧始無邊假使熱鐵輪在汝頂上旋𢬵教燒箇死亦是好因緣示王孟夙偈若人靜坐時妄想來打攪種種力排遣此妄終不了不了妄是賊賊必劫我寶我寶既劫去主人等枯槁人為萬物靈枯槁豈相較若欲得真靜必先求動自此動為我生此動為物起此動果我生物未感不有此動為物起物感木人無往復究竟動物我求無得物我求既無橫謂合而有兩無合若可水可洗其水水既可相洗己眼見己眼己眼能見眼諦觀君自省醒夢偈夢裏冤親相逢喜瞋醒中無異奔逸前塵鼠餓翻盆醒知非真幻兼泡影喻此夢身露電倐忽臂交故新仲尼哀之菩薩沾巾顏子未薦坐忘彌勤肢墮聰黜離雲月輪清光充滿照絕邊中以眼觀聲普門圓通百川一月觸處相逢念彼善財參尋未回難光覓月月被雲霾身等夢幻泡影露電殻雖假合恒作是觀一觀若成餘五自現見思消融是身舒卷譬如白雲豈涉牽絆跣足經行脚跟具眼墨畫偈萬物本虗惟人自擾一心本真逐物顛倒惟物惟心悟之皆妙以未悟故成敵狂鬧惟大覺人日用了了見物即心見心匪槁智周萬有茲靈常皎即色入空廢器小道即空接粗眾無不曉以覿墨畫賦此寄奧伊峰偈非縱非橫凡聖莫測瞥爾生心雷轟耳側持戒偈有序五戒名根本戒盖人天聖凡之根本也廓而大之則名沙彌十戒再廓而大之則名比丘二百五十戒然皆以初五戒為根本故名根本五戒凡具諸覺而有生者如於初根本五戒中不持一戒兩戒決不能生人中故曰戒勝則生勝戒劣則生劣大塊閒所以富貴與貧賤斷非造物使然皆自心所造爾古人有曰五戒不持人天路絕咦人天路絕且問汝舉足向甚麼處去偈曰五戒不持人天路窮舉足何往牛馬胎中持戒不難難在重道苟能重道何戒不皎戒皎根香香遍十方是凡是聖出沒香光如戒有破頭頭死路我不敢言爾痛自悟
