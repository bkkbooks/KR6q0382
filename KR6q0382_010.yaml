body:
  text: 明憨山德清閲法語示元復復述姚少師在崇國寺自題其像曰看破芭蕉拄杖子等間徹骨露風流有時搖動龜毛拂直得虗空笑點頭師説芭蕉拄杖子身之謂也我若看破則心無纍心無纍則明明則性可見矣凡見性之人龜毛可以為拂拂可以為天地卷舒太虗屈伸萬象在我而不在造物也此姚自贊也紫柏則不然芭蕉杖子即龜毛生殺縱橫氣意豪是聖是凡魂膽落薰風吹落樹頭桃師問復姚老子有何長處紫柏有何短處若長短辨不出便是眼中無珠漢雖然紫柏只知天經地義禮也姚老子若跳得這禮字圈匱出饒他三十棒如跳不出三十棒一棒也不饒紫柏左右視曰姚老子何在復目睜師曰不在者且放過他在者代受棒始得復問人之性在母腹中時有乎抑在母既生之後一落地時方有乎師問你説性有邊際否性有古今否復曰性無邊際無古今師曰性既無邊際古今豈可以母之腹中立有性不有性論與既生之後有性不有性論稜嚴曰清淨本然云何忽生山河大地此滿慈問如來之詞也夫清淨本然猶水也山河大地猶氷也水則融通氷則窒礙疑窒礙不是融通謂氷即水可乎然離水無氷謂氷非水可乎復問所謂忽生者果何旨耶師曰忽則非有心所及必欲窮忽所以然之説則忽似可以有心所測也雖然以佛性無常水可以成氷以諸法外真常而不能自建故知氷可復水也又有我而昧者外無我而靈者則有我而昧者不可得也聖人知其如此先會物歸己然後開物成務無往而不達也夫何故良以外己無物外物無己外己無物則開物成務之物未嘗非己也外物無己則物不待會而已全矣然此理知而不能行則多生染習終不能消行而不能證則固有之靈亦終不能全復證而不能忘則稱性之用終不現前故曰有大機必有大用水寒極則成氷寒過則氷還復水性變而為情情盛則陰極凡一切染習種子皆屬陰也照性成修則染習勢也漸自損減淨種功能亦漸增益轉依有六惟損力益能轉是初心者日用逆順關頭之利器也然非慚愧助其勝解則餘轉便不能入矣師問復曰汝身之可把捉者皮肉筋骨而已濕暖動者皆不可把捉也可把捉者謂地大不可把捉者或謂水或謂火或謂風總名四大有本四大有末四大本四大汝尋常所履之地所飲之水所食熱物所能鼓萬物者是也末四大汝身皮肉筋骨與濕暖動是也然末不離本始假借本而有身有身如不假本而資之身必敗壞此理甚明但衆人封於情計不能以理折情所以執身之習不易消耳聖人以心用身衆人以身纍心以心用身者如口吐沫一吐不知有幾千沫星如周顛仙以一身而化多身也以身纍心者計可把捉皮肉筋骨為我之身而不知終非我有也此身始本不為我有終亦不為我有則中間所有者又豈我之有耶聖人當有此身之時即不有其有故至於將死之時地還地水還水火還火風還風即以其所借者交還之何怖懼之有死惟其不怖懼則一點靈明凝定如泰山何得昏亂以故死纍於其所借者而不纍於其所未亂者況有此一點靈明在自然死者不死而復借本地大與本水火風大為身死而復生生而復死更歷千萬世而機不息也此説雖是然未知六塵緣影為心所以然之故本末四大縱件數借還似亦了了觀其會物歸己則終成兩橛如能究徹緣影之心則靈明始凝又靈明凝定亦有淺深如斷見思惑得羅漢果斷塵沙惑得菩薩果斷根本無明盡者始得佛果故曰心數理妙孔老未知也墨香庵常言乳參水則漓醪參水則薄去古遠而人心澆故以不怪者為怪謂怪者常也有法古之風者見之則以捏怪目之宜然也或曰民性多暴聖人道之以其仁民性多逆聖人道之以其義民性多縱聖人道之以其禮民性多愚聖人道之以其智民性多妄聖人道之以其信殊不知民性非暴可以道之於仁民性非逆可以道之於義民性非縱可以道之於禮民性非愚可以道之於智民性非妄可以道之於信若然者暴而道之以仁逆而道之以義縱而道之以禮愚而道之以智妄而道之以信皆治之也非道之也治之如鯀治水道之如禹道水故逆其性者功弗置順其性者續乃成若性本暴而道之以仁吾知聖人復生其道難行矣大都習可以治性可以道故暴者習也非性也披林逐虎兕入水嬰蛟龍世以之為勇非勇也能以至公之理折隱私之情勝而弗敗者是為勇也或曰今道有赤子將為牛馬所踐見之者無問賢不肖必惕惕然皆欲驅牛馬以活之也至夫國有弱君室有色婦而謀其國欲其室者惟恨其君與夫不罹赤子之禍也噫是復何心哉即欲活之之心耳微涉可欲瞥然失照一至此乎故曰不見可欲使心不亂夫技與道同出而異名耳故善於道者技亦道也不善於道者道亦技也若然者道與技果一乎哉果異乎哉夫煩惱之與菩提濁波之與清水空之與色屈之與信果一物乎兩物乎忽而弗觀則三惑浩然反而推之則三德宛爾此非勞形役骨而可入貴乎於妄心忽生時窮其所自或牽於聲耶或牽於色耶逆耶順耶生耶死耶隨心生處即而體之極而窮之生於自乎生於他乎兩者合而生乎綿然無間堅然痛究至於智力無所加功情根無地可植越著精彩如飢狗之嚙枯骨細嚼則無味舍之則無聊嚙之嚙之又嚙之忽而精力之與枯骨能所命斷始不疑空不異色屈不異信煩惱不異菩提衆生不異諸佛矣噫能𢬵命者可以殺人能割情者可以入道雖聖人復生不易吾言矣夫心術無常顧其所馮如何耳故馮於十惡則泥犁見焉馮於慳貪則餓鬼見焉馮於愚癡則畜生見焉馮於五戒則見之人馮於十善則見之天馮於四諦則聲聞道成馮於十二因緣則緣覺果就馮於六度則菩薩慈弘馮於最上乘則佛果圓滿至於馮於六經則謂之儒馮於百家則謂之百氏若韓非馮於刑名孫武馮於兵較之畜生之與餓鬼餓鬼之與地獄三者推其所馮雖皆不善此果報非因心也噫人為萬物之靈如所馮果善則克聖奚難哉而韓非孫武既為人矣不幸而所馮不善導天下以殺戮則其泥犁以為園觀長劫遊戲吾知其不免乎或曰刑名以救德教之不備兵乃戮寡而救多皆仁術也子何俱非之對曰考之出世之典徵之治世之經未有不聞大道而善用者也如善用之自非聖人莫能焉夫廓然無朕奚吉奚凶陰陽既不可以籠罩禍福豈可以雌雄之哉噫介爾有知萬物生焉是以觀爻象可以推休咎聽音聲可以定吉凶也若然者一心不生則三藏六經惡能筌蹄之乎夫深山重淵蛟龍虎兕之所恃也多財高位富姓貴耀之所恃也然蛟龍虎兕富姓貴耀皆不能免其患者以恃賈之耳雖然外天下者則不可悅以富貴外富貴者則不可辱以貧賤也噫恃潔而高世賈患而傷生者名乎非名乎若然者則蛟龍虎兕不為暴富姓貴耀不為貪而至暴至貪者非外天下忘富貴者乎夫榮之賈辱利之賈盜人皆易知也而名之招忌德之招謗道之招毀知而未真乎果真知乎非真蹈其閫者豈易知哉天下皆慕富貴而厭貧賤皆惡飢寒而好飽暖殊不知非貧賤飢寒為之地則富貴飽暖何自而來哉夫旱極則水至潦極則旱來是以聖人履霜而知氷驗來而知往也若然者未至其極猶可備之既至其極極則不返備之何益凡為之於未有一為而萬成萬成而一不損損則萬亦何益以其不損謂之益矣夫招生死者身也招好惡者心也生死之與好惡聖人痛患之以其患之患無所患也衆人不患之故患患之耳今有人於此雖未能即去其招知招為患之媒以其知之媒日疏矣於是知疏媒者雖未齊聖聖由是始也夫惺之與夢晝之與夢天乎人乎在天則謂之晝夜在人則謂之惺夢故知此者天亦可也人亦可也若然者天之與人在我而不在造物明矣吾嘗思天之上更有何物思地之下載我者誰乎思之思之又思之思不及處則不可以口門吐矣又豈可以言語形狀之哉雖然真悲者無聲真親者無情故聲容情生則天地大而我細矣夫榮者夢辱富者夢盜飢者夢食渴者夢飲勇者夢怯怯者夢勇南人夢舟北人夢馬天機深者夢山水雲物以其所嗜不同故夢之各別耳是以至人達此知天地可以反復山海可以移易死生可以遊戲故曰悟唯識者可以紹佛祖之位或問余曰布袋和尚何笑之多哉曰怕人怪耳問者聞余言以為紿而不信是不知圖大事者慮必遠行遠道者輜必重布袋和尚與雙林傅大士皆彌勒化身也此老為當來之佛任釋迦之東宮事非細矣若不深思遠謀則臨時悔無及也問者曰吾聞子之言若深告我者也苦僕根鈍識昏卒未能領略乞詳而示之豫復謂之曰子知之乎傅大士制藏輪布袋和尚以笑面對人蓋慮娑婆化周龍華將始若不預培衆生般若之因結天下歡喜之緣則臨成佛時機感愚癡衆生多瞋愚癡則聞法無益多瞋則行慈不普兩者聖人之重責重責不慮成佛何為乎且衆生以十分言之識字者寡而不識字者多順之則喜逆之則瞋故寄廣長舌於輪藏結歡喜緣於笑面也若然者六根皆眼逆順皆春故以眼見輪藏者耳聞輪藏者手摸輪藏者身觸輪藏者意緣輪藏者若口贊若口毀皆於輪藏培般若因此既培之彼則成之故布袋之笑乃英雄之賣憨也傅大士之制輪藏乃豪傑之網羅也余故曰圖大事者謀必遠涉遠道者輜必重問者感泣而謝焉凡善笑者必善哭善走者必善蹶是以飛廉惡來皆不得其死韓娥秦青世皆以能謳聞若然者則布袋和尚之笑非笑也屈原之愁非愁也豫以是知彌勒以笑説法三閭大夫以愁得道也至於仲由結纓而死死非真死飛廉之與惡來非真死可乎窗前有松天上有月風搖窗影不知者夜見之疑以為鬼怖而失聲求救旁人人曉之曰非鬼也月上窗明風搖松影耳何故妄怖怖者雖聞其言終疑著鬼至於黎明日上躬自之不覺失笑始悟非鬼也嗚呼窗間之影夜見之即疑為鬼晝見之則不以為鬼影非有二見者一人何自起自倒若是乎夫十方依正三世猶窗間之影耳凡夫見之以為有二乘見之以為空菩薩見之以為心故曰若人識得心大地無寸土吾少時但知人有過不知己有過既長雖知人有過亦知己有過矣久之但知己有過不知人有過矣水不自清人清之也人不清之水自清也譬夫心不自明人明之也人不明之心自明也噫雖不自明謂之無明可乎心有四德常樂我淨是也常則無生滅樂則無好惡我則無主宰淨則染不得故得常者天地毀而不老得樂者衆苦交而超然得我者造萬有而無心得淨者處五濁而清泠雖然四者即心之有乎離心之有乎離即之有乎三者辨則四德可言也一日忽覺身心超然從夕至旦此樂不失偶觸逆境便不超然也病在覺故如樂不覺則苦亦不覺矣噫覺之為害也若是況不覺乎夫飢而得食渴而得飲貧而得富富而得官此四者其始得之也喜不可以言語形容焉況愚而得智智而得忘忘而得心其樂豈可以言語形容之哉夫人而無仰食者非奴則婢也故家有十人仰食者其相必不寒家有百人仰食者其相必殊衆至千人仰食萬人仰食者猶星中之月也其光明碩大可知矣於戲凡人仰之而食者財有餘故耳殊不知富有法財能博濟萬古之蒼生者則其光明之普又非星中之月可並矣由此觀之世財可以資生不能資無生生則有死死則有盡無生則無死無死則無盡若然者資生之德有盡資無生之恩寧有盡哉故仰食於人者以自不能資生故也自既不能資生豈能資人之生乎如牛馬不能自生必資於人然後可生也故無人仰食者謂之奴婢乃貴之也非賤之也故古人罵義學之徒謂之奴兒婢子良有以焉或曰人有聖賢之異道無聖賢之異我則曰人無聖賢之異道有聖賢之異故曰一切聖賢皆以無為法而有差別也或曰道者説也路也殊不知有説則有聲有路則可行有聲非道可行非到非道非到道非道也或者愛畫花而不愛生花有笑之者曰愛假而不愛真愚矣乎其人曰生花造化所化畫花吾心所畫造物乃吾心中之影子以影生者為真吾以心生者不為假吾非乎子非乎必有知者然後可辨也或者犯淫病而不能治至於病篤欲死良醫拱手焉吾因問病者曰淫從何生答曰淫從心生吾再問曰心從何生曰不知吾曰心尚不知將何生淫淫尚不生將何生病病者悶然而不應自夕至旦疑而不解疑重則淫輕淫輕則病減忽然悟心無生所謂淫與病者龜之毛兔之角也惡可實哉或者參究趙州庭前柏樹子話頭有年矣亦嘗自謂有所悟一日叩之子參庭前柏樹子話既無義路則汝謂之無義路又何從而得也耶吾嘗於喜怒哀樂四者之間尋其頭目果是何物而能喜能怒能哀能樂乎又正喜時則怒安在正怒時則喜安在正哀時則樂安在正樂時則哀安在朝尋之暮尋之日尋之月尋之年尋之積年尋之一旦得其頭面始知喜時非人怒時非人哀時非人樂時非人皆我也我喜我怒我哀我樂我自尋之俱非人也雖然乃已發之伎倆耳如未發之時則四者頭面又安在哉知此則可與言喜怒哀樂也又知喜怒哀樂者始可與言未發也噫未發果可言乎果不可言乎然而善言之者以不言言之言之不言奚不可哉聲之與色果障道乎果不障道乎説者以為聰明鑿而真知喪矣殊不知風鳴萬松月照千峰聲乎色乎障道乎不障道乎此既不障則艷姬清唱豈獨障道哉若然者聲色惡能障道人自障耳人障道而反誣聲色何異張翁吃酒李翁醉也龍之喜淵虎之喜林雖水陸不同然皆喜其可庇形也殊不知龍無欲虎無毒雖陸蟠晝出其誰害之人所以室之者以龍頷有夜光之珠虎能食人故也或者以為天之高自高也地之厚自厚也日之明自明也月之圓自圓也燈之光自光也殊不知離吾心則天失其高明而地失其博厚矣若然者日之明月之圓燈之光皆吾心之彩也噫人能知此可與言天地之道乎平受為苦樂之因苦樂為平受之果三受互藉無有暫停如汲井輪循環無始忽憎忽愛忽愛忽憎憎愛忽窮現平受容忽攖逆順受容隨失失成愛憎是以無受之明如雲籠月光不能顯受盡雲空本月昭然此受不可以無功而遣不可以有功而驅無功則受豈自空有功則反資受地反復推循理無所出若然者則受終不可空耶受不可空則衆生絶成佛之梯諸佛塞度生之路聖凡兩病學佛何益天道憫疏略人道貴周密疏略者於人則不競於時則失利周密者於人則善競於時則多利競而多利者雖取勝於目前未必有益於身後也不競而失利者雖負敗於目前未必無益於身後也且人不勝天敗豈有常哉毛道凡夫初無見諦於諸逆順憎愛無常或我之所憎人之所愛或我之所愛人之所憎皆妄也然而離妄求真離波求水未之有焉故曰迷悟真妄如臂屈伸本無背面若悟者妄即真也迷者真即妄也所以能屈能伸者臂也能真能妄者心也故知臂者不可以屈伸惑之了心者不可以迷悟拘之於諸欲境觀若險崖則染因為淨之資矣於諸勝境不生欣仰則淨因為染之隙矣故曰境無染淨惟精進者則觸途成觀也地非水無以浮水非地無以載靜推兩者之功卒不能折衷能折衷者可以為師矣天下皆知富貴之與貧賤有而不無者也昨天堂之與地獄或者決以為無殊不知富貴貧賤既有而不無奚獨天堂地獄無而不有也哉吾賦性剛褊人少有逆之則勃然不悅然而事過即忘之矣噫吾雖忘之受吾觸者安能忘之哉若然者我忘而人不忘未忘也須人我俱忘始忘也夫見後而不見先者未可與語春也見下而不見上者未可與語主也故牛馬知牧而不知主魚鳥知春而不知冬殊不知非冬奚春非主奚牧皆不思耳故思之思之鬼神將通之況主與冬哉噫人而不思則去牛馬不遠矣夫萬物皆心也以未悟本心故物能障我如悟本心我能轉物矣是以聖人促萬劫為一瞬延一刻為千古散一物為萬物如片月在天影臨萬水也卷萬物為一物如影散百川一月所攝也此非神力為之吾性分如是耳不吃糖者不知甜不吃醋者不知酸甜酸尚爾況大道乎夫一心不生萬法無咎人物交輳本來廓如也若然者羣芳非色滂沛非聲明矣故曰哀樂相生正明目而視之不可得而見也傾耳而聽之不可得而聞也忍字為義以刀刺心則使識字曉義者知觸事之際念不可輕起也如念起不當乎理即拔慧刀以刺之乃惡念消而善心長矣善淳而化之則幾乎道矣忍也如是可不警哉吾問王子曰仲由聞過則喜令名無窮奚哉曰惟心虗者能受善故天地雖大虗能包之虗則久長令名之無窮宜矣善惡無常愛憎無住故衆人可以希賢賢人可以希聖喜可以為怒怒可以為喜如四者有常則聖人設教益天下之愚矣羅籠五臟者形骸也主宰一身者自心也形骸可見而五臟可知唯自心非但人莫能知即自知自心猶己眼觀己眼也故介然有知物即生心今有人於此召羣愚而為叛其討叛者不以誠而以詐豈唯叛不可討使天下失信自此始矣我未嘗見有大無明人如有之千尺層氷一朝燸動即汪洋莫測也若人以為骨賤氣昏於大道不敢企焉殊不知鱗蟲可以為龍羽蟲可以為鳳善惡無常清濁無主勤勤於善而不息則近性近則順順則化化則虗虗則靈然虗而靈者即心而求耶外心而求耶即心而求則把柄在我不屬造物明矣若然者骨之貴賤氣之清濁豈有常哉顧其所習如何耳故曰性相近也習相遠也必以骨賤氣昏而不能聖此自棄之徒也既自棄矣雖終年日月與聖人為侶亦不能熏之矣況下焉者乎人為萬物之靈雖五尺童子亦能習而言之及徵其所謂靈者何物雖大儒老衲未始不罔錯者也故曰事事尋常總不差相逢舉著便淆訛且道病根在恁麼處參三十年來為汝説破天生日月不為穿窬而張明地闕江湖不為車馬而設險然行者之惡險盜者之惡明不啻吳越之讐也惟天廢日月地塞江湖則兩者無憾矣噫天廢日月則羣生失明地塞江湖則萬物焦心故天不為盜者之惡明而廢日月地不為行者之惡險而塞江湖仲尼不為桓魋之疾賢而避是非也或曰子之道不能行因毀者之多耳曰吾道之不能行非毀者之過也過在吾修道之弗誠耳誠則感物必弘矣雖然昔人有聞乞肉聲而悟道覩桃花而識心豈既死之豬無知之木賢於吾者耶介然有知召毀之始廓然無我縱毀誰知無知而知不昧是非此可毀乎不可毀乎或曰牛頭融公未見四祖時則百鳥銜花天人獻供既見之後花鳥不來天人絶響何哉曰鬼神敬德而不知道知道則孰非聖人何花鳥天人之別哉夫天理之與人欲微塵之與大地果一乎哉果二乎哉一之則衆人皆聖人也不一則是聖人設教為無益也故知氷即水者氷非有也知水即氷者水非有也水非有則理不礙事氷非有則事不礙理事不礙理則行彌十界而常寂理不礙事則知周萬物而不勞不勞則教無不施常寂則道無不一道無不一如花在春教無不施如春在花果一乎哉果二乎哉或曰惠迪吉從逆凶有是乎哉噫無是則日月可以使之墜江海可以使之枯矣今日月在天江海固然有是乎哉無是乎哉昔有指鹿為馬證龜成鱉者天下不平之今則指鹿為麟證龜為龍天下皆然之哀哉夫風之驅雲水之轉石何無心而有力焉情之昏性習之惑知亦若莫之為而為之其有心也耶無心也耶何力捍而莫能制乎陽燧取火方諸取水故向月則水注向日則火然夫水之與火果生於日月乎果生於諸燧乎果生於盤艾乎若生於日月則非諸燧水何不注火何不然若生於諸燧未向日月時亦何不注不然耶知此則可與語神化矣有形而最大者莫過乎天地無形而最大者莫過乎太虗包諸有無而最大者莫過乎自心自心如鏡之光兩者光中之影也故見光者則影無留礙執影者則本光常失本光常失則光用不顯光用不顯則影執不消安有即影見光者與之言自心之光乎夫形者心之影影者形之影今有人於此圖影欲真殊不知縱真影也生形者豈可以筆墨圖之哉或曰何物非心哉但因分別而心成物耳直不分別物物皆心也故馬顧影而不驚狐見侶而不疑初無二見故也火可見此相火非性火若性火則周遍而不可見故凡薪傳則見不傳則不見者相火非性火也乃若云水性濕火性熱此則又以性喻義耳以世眼觀人不足盡人何以故地獄衆生見丈六金身如黑象腿佛尚如此況其他乎有我則我在天地中無我則天地在我中如現前各人之身畢竟因何而有究其所歸父母情未動赤白決不流身何所有父母既情動四大隨感生精華非形質似形而非形非形任運長所以有此身由是而觀以父母情動為因赤白二交而為緣窮身之因與緣不過如此乃心之因則在我而不在父母父母雖交會我若無憎愛想豈無故投以是而推之因境生心則境為生心之因感受氣分亦緣也心力無狀取功名而試之此試之有也次忘身心而試之此試之無也有無俱試而弗醉始能妙萬物而神矣故曰能豪傑而未聖賢者執有心堅事所以遂也惟豪傑而能聖賢者有無之主也噫有之主尚難立況無之主乎昔人有言曰有無二法攝盡一切法非獨立於有無之初而用有無者惡能吐此與淨瓶數枝花無生殘紅墮水面點胭脂亦是春深路惟心之外別無一法離心有法無有是處若知此者長於金屋死於泥塗籧篨為棺何異驪山驪山秦椁鑿石千仞骨鄰下天可謂深藏藏深冗深盜得致富由是觀之泥塗秦槨孰我孰若是以達人未死忘生未生忘死空中種樹春豈有邊花開結果實占大地無生若可知為有知知無生無知知無生有知則生已有生安知無生哉無知知無生既曰無知誰知無生若知無生還同有知生無所立謂之行尸死有所負謂之債鬼地大四塵成水大三塵火大二塵風大一塵故塵多者質重質重者力微唯心無一塵故力不可思議塵謂色香味觸也一身之親莫親於皮是故以針刺皮悽然覺痛難禁焉然皮之親不若肉之親肉之親不若骨之親骨之親不若髓之親髓之親不若心之親故曰心生則種種法生今天下不唯不以親者為親反以不親者為親是以親親者終不親矣嗚呼心作天堂心作地獄心作聖人心作衆人至於大之天地廣之萬物皆心之造作而世之號稱聰明有識者若問其身與心之所從來皆莫知何説也此而不悲更復何悲夫喜怒無常其猶板築而人情膠執妄結悲歡是以讐如吳越愛如妻子一言相合即割封成好一事相乖即背恩忘義悠悠古今率惑於茲惟有道者知喜可使怒怒可使喜二俱無常視同鏡像故好惡交前而心常間也一念不生孤明圓照六塵葑蔀本妙失真是以情波浩瀚業火焦然三界朽居并遭焚溺唯徹見自心者知念不單生必籍塵起塵難獨立必憑念彰反復推尋當處寂滅故神珠在掌光非外來悟物除真而不作用想也四十八願彌陀如來因中為法藏比丘時對世自在王佛所發之願也若以衆生有思惟心測度之即一願尚難擔荷況四十八願哉殊不知於理推之虗空之無際天地之高厚萬物之廣多聖乎凡乎有知乎無知乎皆不越我自心者也故曰空生大覺中如海一漚發有漏微塵國皆依空所生漚滅空本無況復諸三有以此觀之則法藏所發之願如來印證之辭證之於理即之於事皎如日星夫復何疑又衆生習俗庸鄙識不高明橫計六尺之軀為身方寸之心為心無論貴賤賢愚榮榮辱辱順順逆逆窮神殫慮嚴飾萬態自生至死無須臾之休歇者特未能窺破此身此心耳是以大覺聖人愍而哀之發廣大之願昭廓心境使一切衆生豁清慧目獲無身之身無心之心無身則大患永息無心則勞勤頓空故曰大患莫若於有身勞勤莫先於有智也然則無身之身形充八極無心之心照窮萬有人為萬物之靈於此大身廣心冥然不悟局於臭軀殼上墮於妄想夢中毫不自覺反乃驚怪於法藏比丘者果靈乎哉達觀未見樹而夢藤莊周自知人而化蝶然藤無知而蝶有知無知則無情有知則有識無情必無感有識必有因無感而入夢有識而相緣一以此夢一以彼夢夢雖無別夢源匪同惟知源者可詳夢也夫道之在人如空在谷谷也者千呼則千應萬呼則萬響以其空在故也人為萬物靈以惡言觸之即勃然而怒以美言獎之則春然而喜千觸則千怒萬獎則萬喜今觸則今怒古獎則古喜由是而觀則千呼千應萬呼萬響者豈谷能然哉空能應也知此則怒怒喜喜今今古古非有妙喜怒今古而喜怒今古不能纍者存則觸之將至應有窮焉墨光亭常言宴坐靜堂胸次寂寥若可以喻太虗忽聞聲響即瞥然心生便覺方寸稍窒而太虗之度不復有矣是以靜中所得難以應世應世則失故曰不可以靜中求亦不可以動中求超然動靜之外而不廢其用可也又曰動用於一虗之中寂寥於萬化之域雖然會得做不到者未易及此好生惡死人物皆然以知覺齊故也夫知覺齊終當得聖故曰有心者皆可成聖戒殺非怖罪也特不敢食聖人肉耳使虎狼知此寧再害物人為最靈嗜殺不止是人不如虎狼也明可以破暗乎暗可以蔽明乎明能破暗明即自破暗能蔽明暗即自蔽何哉明非暗則功不留暗非明則勢不立故曰明中有暗不與暗相遇暗中有明不與明相睹念果有生乎念果無生乎有生則生不生生無生則無生不生若然者則介然一念乃無生之梯乎大凡逆境生則不過毀謗罵詈死則不過相殺相戮能觀身非有觀心如幻則罵詈殺戮何損何加故曰若真修道人不見世間過一心不生萬法無咎此三祖之言也脫白驅烏率能道之然一心不生雖龐眉老宿或不易到況其下者乎紫柏先生未能醒夢一如故開眼即醒合眼即夢醒夢交馳初無暫息有時即夢推醒中之境有時即醒推夢中之境醒夢雖殊然境不越乎逆順推來推去日久歲深忽然醒夢皆空而能醒能夢者乃憨笑而嘲紫柏先生曰汝開眼時推尋我合眼時推尋我推尋得我如老鼠入牛角相似我今跳出醒夢圈匱汝再能奈我乎紫柏先生震怒喝曰直饒汝躲根在醒夢之表亦是夢中誇夢也於是渠不答而遁去且道渠遁向何處去古德有曰蝦跳不出斗夫已過之事猶醒中之夢也果且有乎哉果且無乎哉有則雖造物之妙莫能使之即呈焉無則猶計之若不能忘耳故至愚之人不忘昨毆也惟有道者能忘之大黃之與人參藥中之春秋雖販夫竈婦無不曉然也如病犯在食大黃雖暴必甘服之者以其暴能泄積也今有人於此以暴言危計種種加陷於我我能春然受之褊習之積日消而不自知若然者則大黃未必非人參之地也以思為眼見身始終聞為思之始思為聞之終思為修之始修為思之終修為證之始證為修之終證為度之始度為證之終如環輪相轉願王無盡如大白牛牽最上乘車運豈有終哉尚色者不知有利尚利者不知有名尚名者不知有身尚身者不知有心尚心者不知有性尚性者不知無性之性由是言之蛇而龍凡而聖尚而已矣是以尚尚者可以情通可以理執惟無所尚者謂之滿覺既滿既覺尚何加哉故曰如來藏中不許有識有識則藏破破則漏或漏於小或漏於外乃至漏於地獄等皆從識始合眼即夢夢而求醒以謂已醒一切人境靡不現前殊不知謂醒之醒猶在夢中忽然大醒方知夢中之醒初非真醒若然者夢由心有無心無夢醒由夢有無夢無醒豫是以知介爾有知無心而不境廓然無思無境而非心夢兮醒兮心兮境兮如水洗水如金博金厭夢而求醒痛醒而求空此所謂把髻投衙誰為訟主智進全名餘度皆字先以定動後以智拔良以煩惱山堅非定力不足以搖撼之無明根深非智光不足以照其無本徹其無體周處志在斬蛟則不見水可溺李廣志在射虎則不見石可堅商丘開信利而不疑害則出入於火而不見火可燒與夫從高而墜亦不見高可危豫是以知水本不溺石本不堅火本不燒高本不危而或者畏溺而不敢入畏堅而不敢射畏熱而不敢近畏危而不敢墜者皆自溺自堅自燒自危也嘻知此則能出入於死生吉凶之域而無害矣凡菩薩欲成佛者必以四弘誓為椎論舍是而修則小道矣或者疑之曰煩惱斷不斷在我而已至於衆生無邊法門無量力有強弱證有愚智曷能槩盡之歟殊不知人但無恆心耳心果能恆則劫石可磨滄海可竭況其他哉且煩惱未斷則慧風不大多聞弗逮則法雷不遠故易之恆雷風恆蓋非雷無以驚昏蟄非風無以鼓萬物夫昏蟄既醒復能鼓之非恆而何不恆者巫醫尚不可作能與有為乎莊周以為魚之大莫過乎鯤鯨鳥之大莫過乎鵬人之巨莫過乎龍伯國氏此三者天下有情之至大者也殊不知應持菩薩以不見佛頂致疑由十方上窮三十二恆河沙而佛頂不見如故若然者則周所謂鯤鵬龍伯氏不異焦螟螻蟻矣而或者又以吾言弘濶勝大而弗信今請實之夫小大生乎有待有待生於有心如一心不生物我兩化覓無待尚不可得況有待哉人因口腹以錢為網窮舌根之味結報復之怨故楚子將死猶貪熊蹯竟不遑食而被弒噫子父尚然況受噉者乎人心無常猶若水耳方圓隨器初無定體遇可欲境心則成貪遇不可欲境心則成瞋遇可欲不可欲境猶豫不決心則成癡故方癡時則貪瞋無地方瞋時則癡貪無源若境不觸心心不染境則所謂貪瞋癡三者會而為常光矣雖然會不徒耳苟未了心境皆心如眼不見眼手不捉手會豈易易哉匹夫匹婦不達死生幽明之故凡有所感憤以為一死永不復生往往甘非命死者豈少哉殊不知死果不復生則聖賢勞勤以為善反不若匹夫匹婦之智矣聖賢以知生必有死不為生纍死必有生不為死愚所以為善而無倦焉如果死不復生則桀紂所為之惡孰代其償責歟夫以是知堯舜為善必不謬桀紂為惡必大愚由是而觀匹夫匹婦有所不堪甘心而死者乃桀紂之餘氣也有問皮毬子曰色即空乎皮毬子曰子喚何物為色大之天地耶小之萬物耶若以天地為色則天地外遍計依他而不有若以萬物為色外天地則萬物復何可得耶夫遍計者謂於無色處橫計有色色計空消則橫計色影殊不知外色無空計色之計既消復計色影與計色之計何異哉大都衆生不明自心心外見法或起色見或起空見空色無常隨計所見譬如氷水本非兩物忽然為氷忽然為水衆人於無常忽然之中計氷為質礙計水為融通計質礙者固迷其本矣計融通者亦迷其末矣蓋融通無性待質礙而有號質礙亦無性待融通而立名夫名者賓也非實也今天下宗賓而失實以離色求空為拙即色明空為巧拙拙巧巧情計橫生窩巢萬種見聞棲泊如綿著棘如膠投漆自無始以來至於即今不以超情求入惟任情問道道變為情故曰空色如子情為其母又曰情為化母又曰情為有無母子以情問吾以情答蓋因情酬情情在子而不在我矣子若忘情始知我不以情答子也子未忘情我雖超情應子子亦謂情子若知此則即色即空之旨亦在子而不在我矣皮毬子曰至顯而不可見者情也故深情厚貌之人父子不相測至隱而不難見者性也故見性之人聖人衆人無相疑也今天下恣情而忽性父生子而疑於子子生於父而疑父蓋恣情則習相遠也如伏羲氏生千古之上而文王仲尼生千古之下仲尼不疑周公文王不疑伏羲蓋不忽性則性相近也故曰凡百衆人以交神之道見之則於開物成務之際不生心而仁普不裁制而義當不威儀而禮明不變通而智不惑不盟約而信不爽此無他蓋率性而然也應物而物不能搖謂之寂不搖者本無生謂之滅無生而應物應物而不搖謂之寂滅夫但能周一身者妄知也遍能周萬有者真知也妄知外真知則如波離水也真知外妄知如水不即波也然知有真妄又何哉蓋知本無真妄以衆人自真自妄耳如天機深者知妄知不離真知而有則妄自窮矣妄既窮則真之待安能獨立耶噫真妄情枯本知昭然於日用之間辟如春著花容不取則艷然在目設生心取之而花神逝矣故曰不離當處常湛然覓即知君不可見以此觀之則本知充然常在以衆人心粗而不精故日用昧之耳稜嚴曰心精遺聞聞遺則所謂聲塵者皆會本妙矣故曰一切浮塵及器世間諸變化相如湯消氷應念化成無上知覺夫佛語本平常辟如地堅水濕火暖風動義本如是豈待刳去本妙之心思方始洞然哉雖然如庸常魔入其心肺至於世智辨聰者雖於佛語平常亦不易入也蓮密瓣鎖蓬蓬鎖子子鎖密三鎖而斯藏苟無斯藏則生生無盡者幾乎息矣故能知此則無盡者皆在握矣既皆在握則聖聖凡凡愚愚智智或生或殺柄不在人人安能見豈惟人不見自亦難見如密知密密則不密矣故曰鬼神可以知者念後之事也常則安異則駭駭則疑疑則無主無主則為變化所眩矣剛柔所搖矣故常也者破疑之利器也鳥之所以能飛魚之所以能躍人皆見之而眼之所以能見耳之所以能聞人皆莫能自覺是以終身而見終身而聞終不能知聞見者是何物焉悲夫蓬蓬而鳴者孰不知其風焉潺湲而流者孰不知其水焉而忽卷屋拔茅漂州蕩縣則不知其所以致之端也能知其端雖復旋嵐偃嶽稽天浸地未始驚也夫羞惡之心無恥之習猶吳越耳吳強則併越越強則併吳此自然之勢也如學者見理未定操志非堅凡卒然臨事之際不覺不知習乘理隙一鼓而下理君敗績矣老氏曰上士聞道勤而行之中士聞道若存若亡下士聞道大笑之不笑不足以為道豫則曰上士聞道大笑之不笑不足以為道中士聞道勤而行之下士聞道若存若亡或者以老為是以豫為非非唯不得豫心且不知老矣亮公過江止何園寺顏延之張緒眷德留連每嘆曰安汰吐珠玉於前斌亮振金聲於後清言妙緒將絶復興嗚呼良馬微伯樂則終困於鹽車至人微識者則沒世而不聞浩然滄海豈唯一珠隤然泰山寧無異木我大覺聖人統九有而為君宅大千以為國智山崇峻教海汪洋之中則異木神珠斷不可以車載斗量能知其數也但智者見之謂之智仁者見之謂之仁耳自心清曠止水澄空不可以喻其至也得其至則餘欲自忘矣及一微涉動則吉凶不召而集吉凶既集利害盈前而患得患失之心浮沉於寸虗之館所謂清曠自心早埋沒矣自心埋沒則萬事無主唯見可欲者即欣然而欲得見不可欲者則刺然而弗快心光既蔽羣暗雲生矣我聞善用其心者五逆十惡皆菩提之康莊也而不善用其心者三學六度皆般若之仇讐也由是觀之青山白雲未必為幽間紫陌紅塵未必為喧擾顧其人遇之如何耳故曰我自調心非干汝事公孫大娘之舞劍也不知劍之舞我手也我手之舞劍也劍兮手兮相忘而相用雖有聖智莫可測識況物我未忘者安能知此乎故曰技無大小能入神者乃與造化同功也由是觀之大之天地小之萬物物物皆手手手皆劍矣敵何自而入焉知此者可與言觸事而真體之即神與道不在心欲不在物心生則道失物棄欲自存是以建心求道者傷刳物制欲者狂譬之自刎而求生耽形而逃影吾知稚子見之必哀其傷而笑其狂矣今天下方將以傷狂為指南道烏乎明欲烏乎止
