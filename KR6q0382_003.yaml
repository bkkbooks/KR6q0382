body:
  text: 明憨山德清閲法語貪則不止瞋則不反癡則不覺是以無窮之苦長劫淪墜皆三者所致然此三者不越乎瞥然一念果能念起即覺覺之不息雖至愚之人可以鑄三毒為三德猶己指之屈信耳況聰明者乎雖然愚者欲寡智者多緣多緣則精神不一而照功有隙故反不若愚人之專也由是推之於世故之中非智則不利惟於學道智為大障故曰以智治國國之賊不以智治國國之福或曰既以智為障道而念起即覺非智乎曰智無二體用之克念則謂覺用之利私則謂智且覺之為言如大夢忽醒智之為言如夢中之計較也故覺之與智少有不同耳古人云自訟此言少通文義者未必不能了了然觸好惡關頭便昧却了也故知見愈多行門愈廣反為障道之賊此賊不滅雖與佛同胞無益英靈男子能於好惡境上如急流撐篙相似篙篙不失則萬斛之舟輕若鴻毛矣且道好惡之流怒如奔馬若何著鞭咄直於好其人知其惡惡其人知其善好好惡惡此知較然不惑如明鏡當臺妍醜交臨本光常淨便是篙篙不失的樣子也雖然亦有好惡不能瞞者但知而不能行不行之弊非外魔障礙乃我多生我相現行為之崇耳此崇現前即當於我有仇之人觀想其相以其兩足加我頸上口呼我名而罵我手捶我頭而恨我爾時反照自心起惡念否若有念起即當於是人作父母想作如來想直待我之惡念消融譬如陽回大地層冰頓釋則逆境之賊破矣爾時自信戰功可立又於順境之賊更增勇猛凡所愛者必以天下至公之理痛折私昵如折之不斷即作仇想此想現前愛魔自滅如是頭頭不肯放過愛魔之窟破之何難乎或曰但以心外無法觀之善惡好惡境界自然不可得矣何必瑣瑣碎碎作這等㤓工夫耶噫慧勝而無實行者是不知事障還須事消理障還須理遣故患弱病者不可進之以瀉藥患實病者不可進之以參苓若然者慧勝而無實行果勝乎哉果不勝乎哉知此可以言自訟之效也夫止觀無門即以昏散為戶昏散無地即以明靜為源是以善造道者必以止觀之火煆昏散之礦煆之既精精成定慧故聖人反復乾坤而不亂定之力也徹窮萬有而不迷慧之功也若然者凡則即明靜而為昏散聖則即昏散而成定慧如土為器善作者即成上器而不善作者即為下器耳究始終而推之上器土也下器亦土也然上器以盛宗廟之膳下器以貯輿臺之食譬夫聖凡皆性特苦樂天淵耳故凡不可不仰於聖苦不可不慕乎樂仰聖在乎明道慕樂必須斷苦明道貴悟自心斷苦必先絶惡雖然自心未悟則出苦之志豈堅出苦志疲則惡緣之本寧易哉以是之故自心不徹難與言止觀之作略者也凡煉心者必以話頭為椎輪然而有有心話頌有無心話頭有心話頭則初機精進者有無心話頭則無功任運者有有心話頭於現行時即伎倆窮矣惟無功任運者生則於昏沉睡熟之際死則於悶絶息斷之時如水清珠雖汩汩乎濁流之中而光耀炯然也余以是知尋常世所謂散心稱佛者臨命終時冀其得力不殊一星之火欲沸滄海豈不愚哉夫嗜羶臭者不可與語芳潔也執狹小者不可與語廣大也然而至羶至臭至狹至小者身也至芳至潔至廣至大者心也而天下自古自今自男自女自賢自愚皆以至羶至臭至狹至小者執嗜而不厭何哉良以皆未悟至芳至潔至廣至大者故也如悟而知之雖鳥獸蟲魚之微亦莫不慕此而厭彼矣況首出萬物至靈至聖者乎雖然此身之羶臭狹小吾不件數而示之此心之芳潔廣大吾不若揭日月以明之使其昭然共覩天下豈能即信之哉噫此身之羶臭狹小自足至頂自內至外周觀悉數地則皮肉筋骨水則涕唾津液黃痰白痰赤痰又若血之腥尿之臊屎之臭蛔蟯百蟲蟠屈宛轉伸縮浮沈於五臟六腑之間以為高天厚地嘉山秀水奇花艷草瑤宮金屋珍餐寶味皆樂之而不厭也以臭為香以穢為潔以苦為樂竊謂是足以為極樂矣寧知天地之外更有他樂耶由是觀之人為萬物最靈者而嗜執至羶至臭至狹至小之身曾不知覺何異乎彼之蛔蟯百蟲蟠屈於革囊之中以為至芳至潔至廣至大而竟弗悟者哉且皮肉之類感土而有濕者感水而有暖者感火而有動者感風而有凡有感必有還還則所謂至羶至臭至狹至小者皆不可得也況嗜而執之者乎豈不即化羶臭狹小而成芳潔廣大之心乎故曰心山育功德流馨萬由延又曰空生大覺中如海一漚發知此始可與語心之芳潔廣大矣紙盡姑置之古人之交朋友也取其長而舍其短就其賢而矜其愚長則補賢則師是以心愈誠而志愈堅德愈茂而身愈下下則受受則廣廣則大大則無極無極則不窮不窮則能常矣故反愆而責己者進德之基也含怒而尤人者召禍之始也冀其不窮而能常惡可得哉心無好惡好惡由情故情有愛憎而境成順逆也是以遇順境如登春臺熙然與之偕忘觸逆境不啻乎白刃撼胸與之偕死嗚呼人生若夢憎愛如雲夢有惺寐雲有聚散惟所以能惺能夢者如太虗焉故知太虗者何妨雲之聚散乎今有人於此好其人推之層霄之上惡其人陷之重泉之下吾知其寸虗無竇天光奚生哉眼光照境初無憎愛不為旃檀先照不為狗糞後照是謂平等光也此片平等之光在佛祖分上一喜一怒一哀一樂無往而非本光於凡夫分上熱惱雲中時一迸露而現行力猛即復蔽之故曰彩雲影裏神仙現手把紅羅扇遮面急須著眼看神仙莫看神仙手中扇所謂雲之與扇者即五蘊坑中煩惱執著也故善造道者能於好惡難克之際此光迸露之頃著眼窺徹不被現行所轉是謂豪雄少不精彩癡雲頓合始作觀照則力費排遣如一夫當萬幸克者幾人哉於光露之時一肩領過積劫無明當下冰消如兵不血刃天下太平矣南印度香至國王施無價寶珠供養般若多羅尊者時國王有三子其季開士也尊者欲試彼所得乃以所施珠問三王子曰此珠圓明有能及此否第一子月淨多羅第二子功德多羅皆曰此珠七寶中尊固無踰此非尊者道力孰能受之第三子菩提多羅曰此是世寶未足為上於諸寶中法寶為上此是世光未足為上於諸光中智光為上此是世明未足為上於諸明中心明為上此珠光明不能自照要假智光光辨於此既辨此已即知是珠知既是珠即明其寶若明其寶寶不自寶若辨其珠珠不自珠珠不自珠要假智珠而辨世珠寶不自寶要假智寶以明法寶然則師有其道其寶即現衆生有道心寶亦然尊者歎其辨慧又戰國諸侯之所寶惟以珠玉為論而知所寶者惟齊威王楚王孫圉而已威王不以徑寸之珠為寶楚王孫圉不以白珩為寶是知所寶在此兩不在彼雖然華竺不同而風軌未始不同故以寶為寶者照惟盈丈以人為寶直照千里震旦鼻祖菩提多羅知寶外無道道外無寶惟時有通塞用有行藏既而少林壁觀九年得一神光華聯珠貫以色為聲聽之以目頓使心精遺聞珠體獨露靈焰為燈光傳無盡象先而不曜畫後而圓照不曜近昏圓照近智重以悲承之則燈又化為高廣大車矣是車也竪窮三際橫遍十方兼載凡聖包舉古今由是而觀則魏王之乘小大何如哉故曰化家為國者不知道化心為道者可以兼忘天下豫以是知萬物一物萬神一神唯善用其心者何物非神反是者何神非物何物非神雖雲山重疊眼絶纖塵何神非物雖靜默淵澄心多窒礙又曰道遠乎哉觸事而真聖遠乎哉體之即神又曰中有一寶祕在形山然此寶復有解寶行寶證寶忘寶唯解寶者則知尊其所知矣行寶者其寶光漸將完矣證寶者寶雖已完不忘則用不全故惟忘寶者乃能用寶也嗟乎寶之所以然寧易知哉如知而不能行行而不能證中道廢弛證而不能忘如人在甕如魚在陸且未能自用況能用物乎萬物浮沈出沒苦海雖人天有異橫竪不倫長劫迷墜情為其根情之所起以迷自心自心靈徹照極循動動則有昏昏又生動昏動交加如轆轤下上靡有窮已究實言之情本於愛愛滋貪疾貪而不足遂生不悅好惡無常互生互滅於如意境係戀耽湎如醉如癡害當頃刻猶自嬉嬉以相忘故耳大都不忘則一體生異忘則異體如一有二有對有對角立角立之際抗然爾我微逆即知惟於順境相忘之至異而如一一則無對無對難覺又衆生最初受生由愛而來順境滋之任運冥合所以逆境易覺順境常迷能於順境照之不昧則愛源漸竭嗔波亦停瞋不自瞋由愛所生愛既漸除瞋豈不滅譬如伐木既截其根枝柯自墜瞋愛交損亦復如是地無邊際皆吾足履聲無邊際皆吾心聞地乃所履心乃能聞所履者死能靜不能動能聞者活而恆活故萬聲不昧巨細了然恆故聲自起滅聞者不遷譬諸寶鏡光明圓滿象觸即照妍難瞞唯其照而不情叢應無迹無迹之妙應不流影所以從古至今彌照彌閒我心本光普應萬有有未嘗關足之履也其亦如然吾言地死指物之權耳根既妙身根亦圓足不自顯因地以彰地不自露因足以知猶若交蘆兩虗相倚頓悟足地能聞亦爾夫人之所以有生死者以見思未斷耳見則五利使也思則五鈍使也歷三界九地而言之故所以有開合也五利使者謂身見邊見邪見戒取見戒禁取見是也五鈍使者謂貪瞋癡慢疑是也此十合言也開則天台四教儀注中可尋偹覽也此十斷盡藏教果頭位也圓教七信相似位也果頭七信二位賢聖便能六通縱任無違山壁由之直度矣斷此十惑初修空觀空分別我法二執二執即十惑也亦開合有異耳惟圓教修進逈異常途而一心三觀圓修滿進最初行者存志意在直破根本無明不在見思塵沙也然而觀志堅猛任運而進見思粗惑帶落之也如壯夫入陳射人先射馬擒賊先擒王也然刀頭展處王之左右任運而傷者未嘗不有也王者根本無明也左右者見思惑也見思如盡將破塵沙矣然而非空觀能破惟用假觀此惑可破塵沙之為言者言其不明者多也不明者何法耶謂世出世法世則經濟王伯天文地理陰陽算數吉凶消長文武雜藝萬物所由周知根本出世則三學六度十方塵剎佛土或說法之軌度生之儀種種方便三十七品及八萬法門等一皆通徹則塵沙無明斷矣此菩薩初斷此惑遍遊十方國土承事十方諸佛一一問明一一印正了無餘疑自是而後烏玄鵠白莫不知之矣此假觀工夫不過博訪先覺無事不知也言無明者謂觸事面墻也塵沙既破將破根本無明矣根本之為言者言其能為一切衆生惑業根本故也此根本無明最初本淨本不覺故迷而循動三細生焉此三細者為見思塵沙根本見思塵沙是其枝條枝條雖則先斷根本猶在行者此際惟以中觀之斧破之然此三細於楞嚴經中分為四十二品破之四十二位者謂十住十行十回向十地等覺後心兼前塵沙無明故曰四十二品初住菩薩以中觀力四十二品中斷最初一品無明而入初住即能王百佛土封疆矣一佛土封疆一大千是也一大千者即積一千箇天地謂之小千積一千箇小千謂之中千積一千箇中千謂之大千而初住菩薩如此大千佛土能王一百矣夫飲食男女聲色貨利未始為障道而所以障道者特自身自心耳故昔人有言功勞莫先於有智大患莫若於有身智即妄心也身即妄身也夫妄心者託物而生者也妄身者假物而成者也然唯真心物生不生物滅不滅真身氣聚不聚氣散不散物者何前塵之謂也氣者何四大之謂也所謂妄心者觸境生情好惡代謝從生至老從老至死綿然不斷於不淨處耽湎味著如自髓腦執吝不舍雖有良師父兄善友言以覺之非唯不能頓然棄舍改惡遷善猶至於結恨者不少也此縱妄心情識順則歡然逆則不悅如此者所謂人頭牛耳又有勞勞勤勤深謀遠慮以養生為計者貧則冀富富則冀貴貴則冀壽壽則冀仙情波浩浩無有窮已此謂癡衆生也究而言之如此妄念終朝汩汩畢世辛勤不過最初一點妄心不能空耳我故曰飲食男女聲色貨利非能障道也障道者惟此妄心也此妄心又名智者何哉以其善謀能畫故也若能廢此妄心從前種種勤勞如湯消氷泮然蕩矣然能廢此心者非真為死生漢子英靈豪傑未易易也金剛般若經中須菩提首以降心為問者蓋知此心苦海源頭生死根株故也此心一廢智識銷融所謂真心者如浮雲散而明月彰矣明月照世高低遠近四海百川行潦蹄涔處處影見然未嘗有心也惟悟此心者雖凡夫而即佛矣不悟佛亦凡夫也妄心真心並陳於此有志出世者留心焉妄身真身不暇言矣能所分而不斷者良以能本非所所本非能然則能不自能所不自所能不自能由所故能所不自所由能故所由所故能則功屬於所矣由能故所亦功歸於能矣功屬於所則獨立者所也功歸於能則獨立者能也凡謂獨立則無待故曰不分不獨立則有待故曰分知此則得實相之用矣實相者毫無滲漏之謂也古人云難易相成是以難即易之機故畏難者謂之自塞易機易者靈而常通之謂也通即易易即變變則神大智道人每曉人曰世之迷倒者莫甚貪欲而貪欲之起起於前境前境雖衆惟男女色相最為妖嫚男愛女色觀女如花女愛男相觀男如寶綿著生愛雖白刃甘蹈湯火可赴敗名喪德玷俗戕生亦不暇顧矣殊不知揭妝飾而觀之四衢之中頭蓬醜露豈惟不生愛著且嘔噦不勝矣再揭皮而觀之寧獨嘔噦且不勝恐怖矣再去肉而觀之則白骨頺然寧獨恐怖已哉始悟由空有骨由骨有肉由肉有皮四者具而加嚴飾乃能惑人今天下紛然如登春臺如觀好花至死不悟可不哀哉奚若外嚴飾而觀其皮外皮而觀其肉骨外肉骨而觀其空外空而觀無生夫無生者衆聖之所宅萬靈之所始故曰惟得始者可以善終如不窮其始而死雖金棺銀槨藏之吉地謂之善終者乎作若有作安能有止止若有止豈復有任任若有任安得有滅惟其不作不止不任不滅所以能作作止止任任滅滅也有人薦此則三世十方五蘊十八界拈取絲毫許向人前拋擲吾恐黃面瞿曇亦無辣手楞嚴經曰妙觸宣明此語開剖本光無剩矣第學者思致不妙往往當面蹉過昔有堂頭問僧隔壁聽叉釧聲即破戒戒作麼持僧曰好箇入路由是而觀在身則為妙觸宣明在耳則為妙聲宣明一根既然何根不爾又四祖信大師年十四參粲大師曰願和尚與信箇解脫法門粲曰解脫則且止即今誰縛汝信遂大悟於言下古德有言曰搕著撞著無非入路良不我欺也師曰坐靜有三品曰下劣坐平等坐增上坐下劣坐者但能舌拄齦齶齒關謹密雙手握拳夾脊天柱挺竪不欹以信力為主或持半偈或持佛號及呪上有嚴師慈護下有法侶夾輔是謂下劣坐也平等坐者初以識破根塵識三界為主於三界始末洞悉無疑臨坐時視身如雲影視心如網風別無作手若能堅徑昏散痛癢自然剝落或一坐半日或兩三日飲食不進氣力仍舊是謂平等坐也增上坐者是以洞徹本心為事或以古德機緣關技癢者自然凝結不化若負戴天不共之仇我不欲瞋悶而瞋悶塞破虗空直得依正聖凡合下盡翻窠窟有此等志氣力量纍足蒲團以刻超劫而無超劫之心到此時昏散無渠栖泊處盡十方三世都盧是一箇話頭迥迥然在前塞煞眉眼忽然心地有𪹼豆之機不生欣喜何以故渠我故有今適相逢有何奇特是謂增上坐也小人與君子處莫之然恆有不快君子之心此正小人之情也如小人幸而自知此情痛力克治則不煩歲月便覺與君子處則快然與衆人處則惕然矣從此以明勇為前茅克治弗已將來與衆人處則快然與君子處則惕然也如至此更克治之不休則又非深於悟自心者不能耳天機粗澀佛語即障萬苦駢集而天機深者皆導師也故曰善用其心觸處緣因不善用心頭頭障礙如威音之前未有佛興而因緣無地則威音之師畢竟其誰殊不知苦即導師何用別徵然威音之後亦以苦亦以樂亦以不苦不樂雜示而為熏機又萬不同也惟威音非苦煎逼雖天機深覺亦難開覺開則一切緣因皆從中流出此威音果上之用也思之則凡有疑滯可觸類而通矣凡夫之知周乎六尺聖人之知無外不了然凡夫之知離無外不了之知則知無所本如喚六尺之知心為自心則心惟六尺而六尺之外毫無所知如洗蕩此知則無外不了之知終不得矣如不洗蕩此知則無外不了之知亦終不得矣故曰即能知不得遍知離能知不得遍知離即離非不得遍知即離即非不得遍知此聖人萬古不欺之言也大抵衆生之機不越四料簡有高而不能下者有下而不能高者有不能高下者有能高能下者善教者隨機引接夫真心明淨本自圓照照極昏生瞥成業相由是轉現頓興冥然能所然而智相未起猶無分別因不了現相從自心生妄生分別分別即智相也智相即是意識種種愛憎千態萬狀變幻無常妄分彊界若無意識而眼耳鼻舌身之五識雖各寄根各守分限然皆無分別既無分別五本無五則眼耳等識言一亦可言五亦可六根不能互用總因意識橫計眼則能見耳則能聞等意識若空則眼耳識等終日見聞未嘗見聞以無分別故凡有分別即有能所能分別者是心所分別者是境心境角立物我紛然故迷彼明淨所以一箇精明分為六用眼乃見色耳乃聞聲情塵交互妄生妄滅無有了期故眼離明暗則無見體餘五亦然見體既無誰明塵相塵相既無見體亦無塵見雙亡元一真心此箇真心情生則轉為根塵情空則根塵元是真心根塵真心迷之成二悟之元一只此一名待二乃有二若不有一何所寄譬如說箇不可得待有可得有此不可得始有可得若無不可得可得亦何所寄則前所謂業轉現三相及智相復歸元真蓋迷元真而有此等悟此等而顯元真此等元真不是兩物譬如一箇醒人少有昏生雖聞外聲又不明了雖不明了又聞外聲喚他作醒實不明了喚他作昏又聞外聲到此境界謂之昏醒相半有人喚之則隨醒邊無人喚之則隨昏邊既隨昏邊外不了境內不作夢昏然而凝能所未成少頃入夢能所則有初者謂之證自證分二者謂之自證分入夢則分兩分能見者謂之見分所見者謂之相分法喻參合理自曉然色生處即是空生空生處即是色生萬法雖廣無越空色苟能洞達色空則無塞非通無通非圓圓則理徹事窮佛祖聖賢便可同一鼻孔出氣矣根塵非物妄想成迷妄想元空根塵成滯余以是知根塵非妄想而不有妄想非根塵而本無不有則山河非礙本無則念慮非知山河非礙則無往而非身念慮非知則無往而非心無往而非身則塵塵剎剎皆功德之聚無往而非心則念念心心總妙應之機情與無情本來一片佛與衆生元非兩致是以衆生笑語即如來圓極之談諸佛梵音即衆生詼諧之語或謂我但按指海印發光或謂我謦咳涕唾皆西來意真不我欺自是衆生不了自心非幻成幻直下知歸本來成現雖然造斯玄極功由慧力譬夫觀語實相者究語所從若生於覺觀外無匡郭則音韻不成若生於根器內無覺觀則鼓擊無由反復推窮兩端不有二既不有中又何來當體無依豁然獨露如是則豈五目之能窺四智之可測哉示弟子修行易而悟心難悟心易而治心難治心易而無心難無心易而用心難如倚門傍戶者不可與語此也學佛者倚傍釋迦學儒者倚傍孔子學道者倚傍老子離却倚傍露地上立腳如師子王往返遊行跳躑自在了無依倚唯悟徹心光者信手便用若定上座從臨濟來或問如何是禪和窮到底定即搊住擲向橋下有同行者解之定曰若不是這老凍膿直教禪和窮到底定可謂信手便用者矣如是之用出世即名為佛經世即名為儒養生即名為老彼倚門傍戶者譬猶賈舟自無勢力假冒他勢扁其額曰某翰閣某部寺某臺諫以欺誑一切不知者鮮不望風而靡若彼真主卒然相值則所冒扁不唯不敢炫耀而且覆藏之不暇矣嗚呼男兒家頂天立地睜眉努眼高談濶論孰不自謂聖賢豪傑之徒一朝撞著個沒面目漢子將無孔鐵椎輕輕敲擊未有不眼目動定支吾不及如是而安望其能知四難之旨乎皮裘子曰外離無合外合無離離由合生合由離起以離推合合無所從以合推離離無所自至人知離合無我遂推自於遠近無常古今無待也是以先天而生不為老後天而降不為少近取諸身既其然矣遠取諸物未始有二道焉於六塵之中就觸塵推之如此然受杖楚者不能究痛之始終則不免魂驚骨駭酸楚入心雖息斷形消神遊氣散而能知者尚抱痛取生生隔世矣而痛猶歷然或自祖而傳於父自父而傳於子子孫相繼積五代而痛始化嗚呼衆生積情情積成堅至於賢女化為貞石萇弘血光為碧推其所以然之故始從迷性為情情積而萬化無恆故變化者不出乎有待有待始終之別名也智者知其如此直推痛於未痛之前於既痛之後始終了無受痛之地正當痛時以勇乘明應念化痛為樂痛化則在有而能無樂存則在無而能有在有而能無可以卷舒塵剎於毛孔在無而能有可以展毛孔而吐山河也故曰善觀察者即一塵而入佛智乃今以觸之一塵始於離合相推延而至遠近古今靡不達也況入塵塵三昧者哉一切寤時於有色處則見色於無色處不見色此天下之常情也一切夢時於無色處則見有色於有色處不見色此亦天下之常情也惟達道者以夢時無色處見色之情驗寤時有色處見色之妄皎如日星更有何惑哉夫疑情縱想則情愈滯而惑愈深繫意念明則澄鑑朗照而造極彌密心如水火擁之聚之則其用彌全決之散之則其勢彌薄故論云質微則勢重質重則勢微如地質重故勢不如水水性重故力不如火火不如風風不如心心無形故力無上神通變化入不思議心之力也心力既全乃能轉昏入明明雖愈於不明而明未全也明全在於忘照照忘然後無明非明無非明耳乃幾乎息矣幾乎息者慧之功也故經云無禪不智無智不禪然則禪非智不照照非禪不成大哉禪智之業可不務乎僧問臨濟見大愚還如何黃蘗便知渠大事已徹師曰寒者得酒顏面生春飢者得飯精神發悅況醉無上醍醐者哉包萬物者天地也包天地者泰清也包泰清者知是何物有物則不能載有形無物則功何所存知則不疑疑則不知不知而不求其知終不知矣人為萬物之靈知愚知賢知寒知暑知香知臭知古知今於是物也而獨不知人果靈乎不靈乎般若者真智慧火也凡夫二乘皆有而不皆善用之或執有或執無知有知無所謂真知也真智慧火觸有有壞觸無無壞矣因境有之心凡有而聖無惟無生之心聖凡共有凡有而聖無者有待之影也聖凡共有者無待之光也向上一路則又非無待有待可能倣佛惟本色衲子鼻孔在手所以生殺自在聖凡交馳正與而奪正殺而生夜光在盤其宛轉橫斜衝突流轉不可以意得之惟其不可以意得者不可以即知求離知求非即非離求因送亡僧骨入普同塔問大衆曰此把骨頭與天界寺佛牙且道是同是別同則凡聖不分別則心外有法速道速道衆無對良久曰一入普同僧海裏慈悲波浪潑天香饑渴燒心令人熱惱幾死少得飲食濟之便覺無限清涼不求而足殊不知飢渴之初有不饑渴者存焉但肯徐而察之如池開水滿月忽現前豈待傍人指點然後見哉雖然衆人以飲食男女生飢渴自衆人而上者以功名生飢渴或以義理道德性命生飢渴雖復高明與卑暗之不同而飢渴之前者未始不同也故君子急以聞道為前茅夫空色一條而或兩之兩之者人自兩耳所謂一者果兩乎者然一若不兩則萬物奚源兩若不一則衆人絶梯聖之階矣故曰但願空諸所有慎物實諸所無梧桐壯風芭蕉壯雨梧桐芭蕉産於地而風雨來乎天如風雨不資乎兩者之善壯則飄風驟雨乃知其威而微細時桐蕉雖有若無也故曰天不資地無以生地不資天無以長夫有形之大者莫過乎天地尚必相須而能成其體故毛蟲羽蟲苟無雌雄則其化也易窮今有人於此進道德而退勢利殊不知微進則退無其母微退則進無其資若然者道德勢利初非兩物也惟善用者勢力皆道德也不善用則道德隱然流而為勢利昧者不知也是故道不足則以德濟之德不足必資乎仁義仁義不足必流於刑名惟聖繼聖則不流降是吾不得而知焉古之憂天下者以飲食男女為大欲思欲治之殊不知憂其一而不憂其二者也夫飲食男女若無能知則相悅之地甘味之本無由矣能知之不憂而憂所知是不知類也然能知難破類油入以其習熟成性苟不能洞明本心以無我而靈者治之則油終不出矣今天下號稱講道者不知能知是賊豢養無法又力滋培之所謂無我而靈者亦終屈而不伸矣更有甚者認能知為主人公為見性為良知噫喚奴作郎何其甚也夫螻蟻之知能周芥許鵾鵬之知能周數千里然究其所從名有大小能則一也故曰剖一微塵出大千經卷非聞道者不能焉如龍聞以神蛇眼聞牛鼻聞根易而聞不殊則能知者可以類推矣一身九想初皆強觀強觀力熟應念但見見脹則惡見壞則恐恐惡難堪計棄此身如厭死蛇腥臭逆鼻魂夢觳觫況復眼觀行者至此欲覔淫心等焦穀芽如石女兒十方推求五內遍搜一切毛孔往復搜剔臭穢薰蒸淫念何地推求一死乃快吾意一想力成欲海頓枯若彼諸想一一成就何穢不滌穢想既爾淨想之因初無定相一微之忽忽而隨流流而不返計臭為香由忽積刻由刻積時由時積日由日積月由月積歲由歲積劫由劫積迷如油入情不復性難出油一迷永迷覺路昏黑愛欲為命升沉萬端六道板築三塗習熟刀血火燒飲食衣服苦痛無量徹心入骨聖人哀之教即此想強觀不淨不淨功圓顛倒習化即蛇而龍即凡而聖長揖苦趣生死縛解無我之樂樂無有盡逆推其功由一想始發揮談論是文字般若能勘破身心迷情是觀照般若佛與衆生同體是實相般若此心本來喚識不得喚智不得故曰說似一物則不中奈何無性隨緣瞥生一念自爾之後三細六粗次第名焉所謂大圓鏡智者法身上用平等性智在凡夫時名染污識此染污非是外染污謂其計八識見分為我究理言之見分實非其我以其橫執而計之為此識體此識體以我為主即生癡見慢愛謂之四惑此四惑不比六識煩惱動心發念乃生乃是莫知然而然凡觸境界自然而憎自然而惡此習最細又喚做俱生無明此就染言也若就淨言之六識作法空觀即七識法執自伏如六識作二空觀久六識自轉為妙觀察智久而精進觀力漸猛即七識我法二執溶然冰銷成平等性智至於八識及前五識化為大圓鏡智成所作智此二智在果上一念相應時轉不涉階級者也前所謂三細六粗者八識之異稱也由是觀之莫愁八識不成大圓鏡智五識不成成所作智但要六識上著得力見得透日積月深自然轉識成智六識既轉成智不坐頂墮加功不已七識自然轉平等性智此二智在凡夫最初發心出世一念至於第七地是其收功也至於八地九地十地及等覺皆無功用到也此來佛法大患患不在天魔外道患在盲師資七大錯耳一者以為禪家古德機緣可以悟道悟道斷不在教乘上我且問你安禪師讀楞嚴破句悟道永嘉看維摩經悟道普菴肅禪師英邵武皆讀華嚴論悟道你謂唯禪家機緣可悟道教乘不可悟道豈非大錯二者以為知見理路障自悟門道不從眼耳入須一切屏絶直待冷灰豆𪹼發明大事始為千了百當一得永得我且問你當世黑白中誰是有知見理路者你若果檢點得一個半個出我也不管他悟道不悟道敢不惜之只恐亦不多得一日王介甫問蔣山元禪師曰教外別傳可得聞乎元曰公有障且以教海資茂霛根更一兩生來乃可耳今人去介甫遠甚尚未解𭺗先學走豈非大錯三者以為念佛求生淨土易而不難比之參禪看教唯此著子最為穩當我且問你淨土染心人生耶淨心人生耶半淨半染人生耶全淨心人生耶若染心人可生淨土則名實相乖因果離背若半染半淨生淨土者吾聞古德有言若人臨終之際有芥子許情識念娑婆世斷不能生淨土若全淨心生者心既全淨何往而非淨土奚用淨土為如是以為念佛一著子能勝參禪看教豈非大錯四者有等瞎公雞聞真雞啼假雞啼皆倣效作種種聲以為動念即乖本體思量便落鬼家活計況復有言乎我且問你此等見識為是解為是行解則何乖動念何病思量古人有五斗米飯熟後方能酬一轉語亦不乖本體諸大禪老皆許其悟徹又曰思之思之鬼神將通之非鬼神通之心開而明也思量何傷觀音聞思修三慧熏化一切你遍以思量為病豈非大錯五者人生未必無欲有欲能制而弗隨非賢者不能又有縱而不制者頗籍多生慧種稍涉獵教乘或得一知半解即眼空一切以為古人造理不過如此本來無事何必別參於逆順境風之中又東飄西蕩作不得一毫主宰我且問你古人見得即用得著你這般沒頭腦即見得用不得尚未夢見敢無慚無愧莾撞說大話徒招苦報豈非大錯六者三教中人各無定見學儒未通棄儒學佛學佛未通棄佛學老學老未通流入傍門無所不至我且問你你果到孔孟境界也未若已到決不作這般去就若未到儒尚未通安能學佛佛尚未通何暇學老又有一等人謂佛家道理先是義利關頭便見不明白何況聖道且其書汪洋汗漫卒不能摸其邊徼不如各守己道却不省事我且問你你悟佛心否若悟佛心心自無疑無疑則無悔無悔即入信今你不愧自己天機淺陋反疑佛經豈非大錯七者在家出家之人較唐宋黑白天淵不同唐宋時人若裴休蘇軾於宗教兩途並皆有所悟入或一句一偈讚揚吾道猶夜光照乘千古之下光不可掩粲然與佛日爭明即吾曹或與之酬酢若韜光禪師答白樂天偈寂音尊者酬陳瑩中之古詩亦自風致有餘至於文經序雖長篇短述不等然與修多羅若合符契非真得佛心者孰能臻此至本朝自宋濂以來能以語言文字讚揚吾道者不道全無敢謂亦少蓋唐宋諸公與方外人遊俱能超情離見裂破俗網置得失榮辱於空華之中心心相照如兩鏡交光相似故其遺風餘烈後人自不能附贅嗚呼以情求道所謂首越而之燕也去情求道所謂離波而覔水也若人於兩者之間別有出身之路不涉忌諱管取不參禪不看教敢保他悟道有日如以兩者之間立腳跟不定不若做個長行粥飯人豈不是好又今之僧俗或親師訪友未見師友之心便乃揣摩卜度某師不過如此某友亦不過如此此心既生則雖如來復起亦不能利益渠矣況其它乎凡親師訪友譬如摘桃寧暇管其樹之曲直唯在桃美而已若然者親師訪友剛以情識求道豈非大錯如是七錯我也是趂口胡說一上不知黑白賢豪以為如何然此七錯亦是醍醐亦是毒藥能善用之毒藥未始非醍醐不善用之醍醐未始非毒藥我又問你此七錯一念未生時著在何處一念已生時著在何處若人辨得出老漢與他提鞋挈瓶有日在如辨不出不可草草惹他明眼人笑你去念非忘塵而不息者蓋念與塵如形與影若謂形先而影後影先而形後形影本非能所此皆未了心外無法而隨情穿鑿者也夫心外無法法外無心然心法若似二者何哉良由以理照之則心外無法法外無心以情分別則物我抗然難以消釋橫謂見前分別者我心何疑見前所分別者彼物何疑物我橫執積執成堅堅塞十方何往非執辟如蜂蜜初無中邊嗚呼此執之纍我遡流窮源自無始以來至於今日猶澆水於冰冰日漸厚堅者不化而厚者愈堅如是積習堅於大地厚於須彌若欲破蕩苟非了悟本心目前無待於境緣逆順中痛以無待之光智慧猛火燒然力深則此習千佛出世終難化也靈潤法師野火四來無逃避處同行逸散潤師即作唯心觀禦之以為火實自心豈有心能燒心之理此觀稍入火即潛息此乃破蕩堅習之樣子也如是而塵自忘而念自消塵忘念消本心始全以全應物物無不順物無不順雖應無應應而無應則古今中外誰物誰我即如以我周旋於我我外何物以物周旋於物物外何我故曰艮其背不獲其身行其庭不見其人也此蓋自遠而習近者之能事也如得近者駕近以接物則此道光大矣示學者圓顱方服頂冠束帶謂之黑白之徒此兩種人或由儒而入佛由佛而入儒或終不相入或相入而變化無窮儒亦可佛亦可此之種種遡而上之云何忽生之前辟如大火聚上無一可泊泊則焦爛不旋踵矣故曰衆生攀緣之心處處能緣唯不能緣於般若之上由是而觀以攀緣心學出世法出世法皆攀緣也以無攀緣心學世間法世間法皆般若也今有人於此謂文字語言不足以見道惟參禪究話頭足以見道如文字語言不足以見道則永嘉讀維摩經而悟六祖聽金剛經而悟普菴肅看棗柏華嚴論而悟天台智者讀法華經得旋陀羅尼三昧如此樣子難以廣舉又宗門機緣皆諸祖舊案苟得其人據案則典刑可步賞罰可行照用不惑綱宗在握於暗嗚叱咤之間棒喝雷霆之下偷心頓死活句縱橫苟不得其人所謂千七百則葛藤翻成魔繞一遭纏縛萬劫難解何以故見刺入心故古德有言曰文字語言葛藤閒具本無死活死活由人活人用之則無往不活死人則無往不死所患不在語言文字葛藤顧其人所用何如耳又外語言文字而求道者即語言文字而求道者世人謂之宗教宗教既分各相非是一則以為宗可以悟心教惟義路義路惡足明自心哉殊不知精義則能入神入神便能致用悟心亦精義之別名故宗門大老有大機大用苟不入神機用何自故曰解得佛語祖師語自然現前真萬古之名言也常黑庸白菽麥不辨雌雄未識妄自謂文字語言我不必求之離文字頓然超語者吾始快心如此之流眼中親曾勘十個却有五雙都懷此見不化管取佛語終不精佛心終不明兩者既無所入復旁搜曲問雌黃諸方某善知識如何某善知識不如何一旦利害當頭死生信急如何不如何亦總記不起了況能死生自在乎故曰憂不深不免忽略病多太細求猜刻鬼在我願一切黑白賢豪教不可不精宗不可不明教精則佛語我語也宗明則祖心我心也到此田地即佛入儒即儒入佛終不相入無可無不可自知用處誰搖動得汝雖然猶是途路之勞向上一著猶未夢見在示法屬
